# Task-fit directives — how the overview classifies models per task category.
# Reports read this file every time they regenerate (after each run, rescore,
# or delete), so the Task fit section always reflects the latest results.
# Editing this file changes PRESENTATION only, never scores — no suite
# version bump needed.

thresholds:
  excellent: 0.95   # category score >= this  -> excellent (recommended)
  capable: 0.85     # >= this                 -> capable
  weak: 0.70        # >= this -> weak; below  -> avoid

value_pick:
  min_score: 0.85   # a value pick must be at least "capable" in the category...
  min_tps: 120      # ...and generate at/above this many tok/s

# Ranking note shown under the table (edit freely)
note: >-
  Top quality = highest category score (ties share the crown). Value pick =
  fastest generator among models scoring at least the capable threshold —
  the rational choice when latency or bulk throughput matters more than the
  last few points.

# Failure & retry assessment — classifies every non-clean result and computes
# the "attributed score" (model capability with non-model failures removed).
# Presentation/diagnosis only; never changes the raw score.
assess:
  fleet_budget: 32768      # expected max_tokens for non-claude models; a
                           # length-stop BELOW this is a config bug (harness),
                           # at/above it is a fair-budget model spiral
  spiral_frac: 0.97        # length-stop with tokens_out >= frac*cap and no
                           # usable answer => rumination spiral (model)
  pass_threshold: 0.8      # score >= this is a pass (not a failure)
  suspect_key_min_models: 2  # N models converging on the SAME 0-scored answer
                             # => the answer key is suspect (harness), not the
                             # models (this would have caught rs-010)
  suspect_key_min_avg: 0.85  # ...but ONLY if those models are strong on
                             # average — separates "the key is wrong" from
                             # "weak models share a trap answer" (real fails)
  # attributions removed from the ATTRIBUTED score (our faults, not the
  # model's): harness bugs and infra/gateway flakiness. Model limitations and
  # known context limits still count — those are real capability signal.
  attributed_excludes: [harness, infra]
  # known "trap" answers for twisted-classic tasks — the memorized answer the
  # twist is designed to punish. A model whose answer matches one of these
  # gets the specific "fell-for-trap" reason instead of generic "wrong". Kept
  # here (not in task metas) so classification stays presentation-only.
  traps:
    # rs-007-monty-fall was removed at the v0.5 flip (dead trap)
    rs-008-river-boat: ["7"]
    rs-009-birthday-twist: ["23"]
    rs-010-ants-rod: ["40"]
    # rs-011-gear-axle-train (v0.6): meshing the shared shaft instead of copying
    # its rpm gives 108 (correct is 72). Surface forms — the 2-decimal ask.
    rs-011-gear-axle-train: ["108", "108.0", "108.00"]

# ---------------------------------------------------------------------------
# Local electricity — turns the GPU energy the harness already measures into a
# marginal cost, so "local models are free" stops being an assumption.
#
# HONEST LIMITS (stated on /info too):
#   * GPU ONLY. Excludes CPU, RAM, board, PSU losses and cooling — so this is a
#     LOWER BOUND on what a local run really draws from the wall.
#   * MARGINAL. It ignores hardware amortisation entirely. A 5090 costs orders
#     of magnitude more than the electricity it will ever burn on this suite.
# Presentation only: edit freely, no suite version bump.
# ---------------------------------------------------------------------------
power:
  cost_per_kwh: 0.13      # your electricity rate
  currency: "$"

# ---------------------------------------------------------------------------
# Scout triage. `harness scout <model>` (or the Scout button on /watch) screens a
# candidate on 5 discriminating tasks and produces a mean 0-1. This decides
# whether the model is worth a full 39-task run -- scouts live in scouts/, never
# in the versioned dataset. Presentation only: edit freely, no version bump.
#   mean >= promote    -> PROMOTE   (run the full suite)
#   mean >= borderline -> BORDERLINE (your judgment)
#   else               -> SKIP      (not worth a full run)
# ---------------------------------------------------------------------------
scout:
  promote: 0.6
  borderline: 0.35
