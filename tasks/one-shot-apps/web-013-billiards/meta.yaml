id: web-013-billiards
category: one-shot-apps
tier: 1
title: Billiards — playable game + physics (reflection, elastic, pockets)
timeout_s: 900
max_retries: 1
checker_timeout_s: 300
scoring:
  type: webapp
  # Physics + playability are machine-graded to 0.8; the last 0.2 is fit-and-
  # finish, awarded by a human on /review. And it is a GAME: if the cue ball
  # cannot be shot (test_playable_can_shoot fails) it is not playable, so the
  # whole score — machine and craft — is capped at 0.5.
  automated_max: 0.8
  gate:
    when_failed: "playable_can_shoot"
    cap: 0.5
