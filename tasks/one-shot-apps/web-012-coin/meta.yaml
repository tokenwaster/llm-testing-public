id: web-012-coin
category: one-shot-apps
tier: 1
title: Procedural coin mint — render, material, motion
timeout_s: 900
max_retries: 1
checker_timeout_s: 300
scoring:
  type: webapp
  # The machine can verify MECHANICS - it turns, it shines, it is struck, the
  # states are right - and that is worth 0.8. It cannot judge craft: gpt-5.6-sol
  # shipped MIRRORED lettering and passed every mechanical check, because relief,
  # specular and rotation are all perfect when the words read backwards. The last
  # 0.2 is a human's, awarded on /review (animation + visual craft, 0.00-0.10
  # each). So a coin nobody has looked at tops out at 0.8, by design.
  automated_max: 0.8
