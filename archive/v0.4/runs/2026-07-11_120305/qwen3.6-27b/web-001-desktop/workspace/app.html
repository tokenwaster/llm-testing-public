<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Segoe UI', Cantarell, Ubuntu, sans-serif;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }

  #desktop {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    position: relative;
    overflow: hidden;
  }

  #desktop::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(121, 60, 160, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(237, 100, 166, 0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── Taskbar / Dock ── */
  #taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(30, 30, 46, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 9999;
    padding: 0 16px;
  }

  .dock-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
    background: rgba(255,255,255,0.06);
    color: #e0e0e0;
    font-size: 20px;
  }

  .dock-btn:hover {
    background: rgba(255,255,255,0.14);
    transform: scale(1.08);
  }

  .dock-btn:active {
    transform: scale(0.95);
  }

  .dock-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #e95420;
    box-shadow: 0 0 6px #e95420;
  }

  .dock-btn svg { width: 24px; height: 24px; }

  .dock-label {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,30,46,0.95);
    color: #ddd;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .dock-btn:hover .dock-label { opacity: 1; }

  /* ── Top Bar ── */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(20, 20, 30, 0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    color: #ccc;
    font-size: 13px;
    z-index: 9998;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #topbar .clock { font-weight: 500; letter-spacing: 0.3px; }

  /* ── Windows ── */
  .window {
    position: absolute;
    min-width: 360px;
    min-height: 240px;
    background: rgba(32, 32, 48, 0.96);
    backdrop-filter: blur(16px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .window.focused {
    box-shadow:
      0 12px 48px rgba(0,0,0,0.6),
      0 4px 12px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
  }

  .window.hidden { display: none; }

  .win-titlebar {
    height: 38px;
    background: rgba(40, 40, 58, 0.9);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: grab;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .win-titlebar:active { cursor: grabbing; }

  .win-title {
    flex: 1;
    color: #ccc;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    pointer-events: none;
  }

  .win-controls {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .win-ctrl-btn {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: filter 0.15s;
  }

  .win-ctrl-btn:hover { filter: brightness(1.3); }

  .win-close { background: #e95420; }
  .win-minimize { background: #f7931e; }
  .win-maximize { background: #2ecc71; }

  .win-body {
    flex: 1;
    overflow: auto;
    color: #ddd;
    font-size: 13px;
  }

  /* ── Files App ── */
  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(36, 36, 52, 0.8);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #files-up {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }

  #files-up:hover { background: rgba(255,255,255,0.15); }
  #files-up:disabled { opacity: 0.3; cursor: default; }

  #files-path {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    color: #aaa;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .files-content {
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
  }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    min-width: 80px;
    text-align: center;
    color: #ddd;
    font-size: 12px;
  }

  .fs-item:hover { background: rgba(255,255,255,0.08); }
  .fs-item:active { background: rgba(255,255,255,0.12); }

  .fs-icon {
    font-size: 32px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .fs-name {
    word-break: break-all;
    max-width: 80px;
    line-height: 1.3;
  }

  /* ── Notepad App ── */
  .notepad-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(36, 36, 52, 0.8);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #new-tab {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
  }

  #new-tab:hover { background: rgba(255,255,255,0.15); }

  #tabs {
    display: flex;
    gap: 2px;
    padding: 6px 10px 0;
    background: rgba(30, 30, 44, 0.9);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab {
    padding: 6px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    color: #999;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab:hover { background: rgba(255,255,255,0.08); color: #ccc; }

  .tab.active {
    background: rgba(32, 32, 48, 0.96);
    color: #e0e0e0;
    border-color: rgba(255,255,255,0.1);
  }

  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .tab-close:hover { background: rgba(233, 84, 32, 0.6); color: #fff; }

  #editor {
    flex: 1;
    width: 100%;
    background: rgba(28, 28, 42, 0.95);
    color: #d4d4d4;
    border: none;
    padding: 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 4;
  }

  #editor::placeholder { color: #555; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ── Desktop Icons ── */
  .desktop-icons {
    position: absolute;
    top: 36px;
    left: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .desktop-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 6px;
    border-radius: 8px;
    cursor: pointer;
    color: #ddd;
    font-size: 11px;
    text-align: center;
    transition: background 0.15s;
    min-width: 72px;
  }

  .desktop-icon:hover { background: rgba(255,255,255,0.08); }
  .desktop-icon .di-icon { font-size: 36px; margin-bottom: 4px; }
</style>
</head>
<body>

<div id="desktop">
  <!-- Top Bar -->
  <div id="topbar">
    <span>Activities</span>
    <span class="clock" id="clock"></span>
    <span>⚡ 🔋 📶</span>
  </div>

  <!-- Desktop Icons -->
  <div class="desktop-icons">
    <div class="desktop-icon" ondblclick="openWindow('files')">
      <span class="di-icon">📁</span>
      <span>Files</span>
    </div>
    <div class="desktop-icon" ondblclick="openWindow('notepad')">
      <span class="di-icon">📝</span>
      <span>Notepad</span>
    </div>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window hidden" style="width:640px;height:460px;top:80px;left:120px;">
    <div class="win-titlebar" data-window="files-window">
      <div class="win-controls">
        <button class="win-ctrl-btn win-close" onclick="closeWindow('files')"></button>
        <button class="win-ctrl-btn win-minimize"></button>
        <button class="win-ctrl-btn win-maximize"></button>
      </div>
      <span class="win-title">Files</span>
    </div>
    <div class="win-body" style="display:flex;flex-direction:column;">
      <div class="files-toolbar">
        <button id="files-up" onclick="navigateUp()">⬆ Up</button>
        <div id="files-path">/</div>
      </div>
      <div class="files-content" id="files-content"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window hidden" style="width:600px;height:440px;top:100px;left:200px;">
    <div class="win-titlebar" data-window="notepad-window">
      <div class="win-controls">
        <button class="win-ctrl-btn win-close" onclick="closeWindow('notepad')"></button>
        <button class="win-ctrl-btn win-minimize"></button>
        <button class="win-ctrl-btn win-maximize"></button>
      </div>
      <span class="win-title">Notepad</span>
    </div>
    <div class="win-body" style="display:flex;flex-direction:column;">
      <div class="notepad-toolbar">
        <button id="new-tab" onclick="createNewTab()">+ New Tab</button>
      </div>
      <div id="tabs"></div>
      <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="open-files" class="dock-btn" onclick="openWindow('files')">
      <span class="dock-label">Files</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button id="open-notepad" class="dock-btn" onclick="openWindow('notepad')">
      <span class="dock-label">Notepad</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ─── Clock ───
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 10000);

// ─── Fake Filesystem ───
const FS = {
  '/': {
    type: 'dir',
    children: {
      'bin': {
        type: 'dir',
        children: {
          'bash': { type: 'file', size: '12K' },
          'ls': { type: 'file', size: '8K' },
          'cat': { type: 'file', size: '6K' },
          'grep': { type: 'file', size: '10K' },
          'python3': { type: 'file', size: '45K' },
          'node': { type: 'file', size: '32K' }
        }
      },
      'etc': {
        type: 'dir',
        children: {
          'passwd': { type: 'file', size: '2K' },
          'hosts': { type: 'file', size: '512B' },
          'fstab': { type: 'file', size: '1K' },
          'nginx': {
            type: 'dir',
            children: {
              'nginx.conf': { type: 'file', size: '4K' },
              'sites-enabled': {
                type: 'dir',
                children: {
                  'default': { type: 'file', size: '2K' }
                }
              }
            }
          }
        }
      },
      'home': {
        type: 'dir',
        children: {
          'user': {
            type: 'dir',
            children: {
              'Documents': {
                type: 'dir',
                children: {
                  'resume.txt': { type: 'file', size: '3K' },
                  'notes.md': { type: 'file', size: '1K' },
                  'project-plan.pdf': { type: 'file', size: '256K' }
                }
              },
              'Downloads': {
                type: 'dir',
                children: {
                  'archive.tar.gz': { type: 'file', size: '15M' },
                  'photo.jpg': { type: 'file', size: '2.4M' },
                  'setup.sh': { type: 'file', size: '512B' }
                }
              },
              'Pictures': {
                type: 'dir',
                children: {
                  'wallpaper.png': { type: 'file', size: '4.1M' },
                  'screenshot.png': { type: 'file', size: '1.8M' },
                  'vacation': {
                    type: 'dir',
                    children: {
                      'IMG_001.jpg': { type: 'file', size: '3.2M' },
                      'IMG_002.jpg': { type: 'file', size: '2.9M' },
                      'IMG_003.jpg': { type: 'file', size: '3.5M' }
                    }
                  }
                }
              },
              '.bashrc': { type: 'file', size: '4K' },
              '.profile': { type: 'file', size: '2K' },
              'readme.txt': { type: 'file', size: '1K' }
            }
          }
        }
      },
      'usr': {
        type: 'dir',
        children: {
          'bin': {
            type: 'dir',
            children: {
              'vim': { type: 'file', size: '28K' },
              'git': { type: 'file', size: '18K' }
            }
          },
          'share': {
            type: 'dir',
            children: {
              'applications': {
                type: 'dir',
                children: {
                  'firefox.desktop': { type: 'file', size: '1K' },
                  'code.desktop': { type: 'file', size: '1K' }
                }
              },
              'themes': {
                type: 'dir',
                children: {
                  'Adwaita': { type: 'dir', children: {} }
                }
              }
            }
          },
          'lib': {
            type: 'dir',
            children: {
              'libssl.so': { type: 'file', size: '512K' },
              'libcurl.so': { type: 'file', size: '256K' }
            }
          }
        }
      },
      'var': {
        type: 'dir',
        children: {
          'log': {
            type: 'dir',
            children: {
              'syslog': { type: 'file', size: '1.2M' },
              'auth.log': { type: 'file', size: '800K' },
              'kern.log': { type: 'file', size: '600K' }
            }
          },
          'www': {
            type: 'dir',
            children: {
              'html': {
                type: 'dir',
                children: {
                  'index.html': { type: 'file', size: '4K' },
                  'style.css': { type: 'file', size: '2K' }
                }
              }
            }
          },
          'tmp': {
            type: 'dir',
            children: {}
          }
        }
      }
    }
  }
};

let currentPath = '/';

function getNode(path) {
  if (path === '/') return FS['/'];
  const parts = path.split('/').filter(Boolean);
  let node = FS['/'];
  for (const p of parts) {
    if (node.children && node.children[p]) {
      node = node.children[p];
    } else {
      return null;
    }
  }
  return node;
}

function renderFiles() {
  const node = getNode(currentPath);
  const container = document.getElementById('files-content');
  const pathEl = document.getElementById('files-path');
  const upBtn = document.getElementById('files-up');

  pathEl.textContent = currentPath;
  upBtn.disabled = currentPath === '/';

  container.innerHTML = '';

  if (!node || !node.children) return;

  const entries = Object.entries(node.children);
  // Sort: directories first, then files, alphabetically
  entries.sort((a, b) => {
    const aIsDir = a[1].type === 'dir' ? 0 : 1;
    const bIsDir = b[1].type === 'dir' ? 0 : 1;
    if (aIsDir !== bIsDir) return aIsDir - bIsDir;
    return a[0].localeCompare(b[0]);
  });

  for (const [name, entry] of entries) {
    const item = document.createElement('div');
    item.className = 'fs-item';
    item.textContent = '';

    const icon = document.createElement('div');
    icon.className = 'fs-icon';

    const nameEl = document.createElement('div');
    nameEl.className = 'fs-name';
    nameEl.textContent = name;

    if (entry.type === 'dir') {
      icon.textContent = '📁';
      item.ondblclick = () => {
        currentPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
        renderFiles();
      };
    } else {
      const ext = name.split('.').pop().toLowerCase();
      const icons = {
        txt: '📄', md: '📄', pdf: '📕', sh: '⚙️',
        jpg: '🖼️', png: '🖼️', gz: '📦', tar: '📦',
        html: '🌐', css: '🎨', js: '📜',
        log: '📋', conf: '⚙️', desktop: '🖥️',
        so: '🔧', py: '🐍',
      };
      icon.textContent = icons[ext] || '📄';
    }

    item.appendChild(icon);
    item.appendChild(nameEl);
    container.appendChild(item);
  }
}

function navigateUp() {
  if (currentPath === '/') return;
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  currentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
  renderFiles();
}

// ─── Notepad / Tabs ───
const STORAGE_KEY = 'ubuntu_notepad_tabs';

let tabs = [];
let activeTabId = null;

function generateId() {
  return 'tab_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

function loadTabs() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      tabs = parsed.tabs || [];
      activeTabId = parsed.activeTabId || null;
    }
  } catch(e) {
    tabs = [];
    activeTabId = null;
  }
  if (tabs.length === 0) {
    const t = { id: generateId(), title: 'Untitled', content: '' };
    tabs.push(t);
    activeTabId = t.id;
  }
  if (!tabs.find(t => t.id === activeTabId)) {
    activeTabId = tabs.length > 0 ? tabs[0].id : null;
  }
}

function saveTabs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tabs: tabs,
      activeTabId: activeTabId
    }));
  } catch(e) {}
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';

  for (const tab of tabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.innerHTML = `<span>${tab.title}</span><button class="tab-close" data-tab-id="${tab.id}">×</button>`;

    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) {
        closeTab(e.target.dataset.tabId);
        return;
      }
      switchTab(tab.id);
    });

    container.appendChild(el);
  }

  const activeTab = tabs.find(t => t.id === activeTabId);
  const editor = document.getElementById('editor');
  if (activeTab) {
    editor.value = activeTab.content;
  } else {
    editor.value = '';
  }
}

function switchTab(id) {
  // Save current tab content
  const current = tabs.find(t => t.id === activeTabId);
  if (current) {
    current.content = document.getElementById('editor').value;
  }
  activeTabId = id;
  renderTabs();
  saveTabs();
}

function createNewTab() {
  // Save current
  const current = tabs.find(t => t.id === activeTabId);
  if (current) {
    current.content = document.getElementById('editor').value;
  }

  const t = { id: generateId(), title: 'Untitled', content: '' };
  tabs.push(t);
  activeTabId = t.id;
  renderTabs();
  saveTabs();
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;

  // Save current editor content
  const current = tabs.find(t => t.id === activeTabId);
  if (current) {
    current.content = document.getElementById('editor').value;
  }

  tabs.splice(idx, 1);

  if (tabs.length === 0) {
    const t = { id: generateId(), title: 'Untitled', content: '' };
    tabs.push(t);
    activeTabId = t.id;
  } else if (activeTabId === id) {
    activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
  }

  renderTabs();
  saveTabs();
}

// Save on input
document.getElementById('editor').addEventListener('input', function() {
  const active = tabs.find(t => t.id === activeTabId);
  if (active) {
    active.content = this.value;
    saveTabs();
  }
});

// ─── Window Management ───
function openWindow(app) {
  const winId = app === 'files' ? 'files-window' : 'notepad-window';
  const win = document.getElementById(winId);
  win.classList.remove('hidden');
  focusWindow(win);
  updateDockButtons();

  if (app === 'files') {
    renderFiles();
  } else if (app === 'notepad') {
    renderTabs();
  }
}

function closeWindow(app) {
  const winId = app === 'files' ? 'files-window' : 'notepad-window';
  const win = document.getElementById(winId);
  win.classList.add('hidden');
  updateDockButtons();
}

function focusWindow(win) {
  document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
}

function updateDockButtons() {
  const filesWin = document.getElementById('files-window');
  const notepadWin = document.getElementById('notepad-window');
  document.getElementById('open-files').classList.toggle('active', !filesWin.classList.contains('hidden'));
  document.getElementById('open-notepad').classList.toggle('active', !notepadWin.classList.contains('hidden'));
}

// ─── Draggable Windows ───
let dragState = null;

document.querySelectorAll('.win-titlebar').forEach(titlebar => {
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('win-ctrl-btn')) return;
    const win = titlebar.closest('.window');
    focusWindow(win);

    const rect = win.getBoundingClientRect();
    dragState = {
      win: win,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top
    };
    e.preventDefault();
  });
});

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const { win, offsetX, offsetY } = dragState;
  let x = e.clientX - offsetX;
  let y = e.clientY - offsetY;
  // Keep within viewport
  x = Math.max(0, Math.min(x, window.innerWidth - 100));
  y = Math.max(28, Math.min(y, window.innerHeight - 56 - 40));
  win.style.left = x + 'px';
  win.style.top = y + 'px';
});

document.addEventListener('mouseup', () => {
  dragState = null;
});

// Click on window to focus
document.querySelectorAll('.window').forEach(win => {
  win.addEventListener('mousedown', () => focusWindow(win));
});

// ─── Init ───
loadTabs();
renderFiles();
updateDockButtons();
</script>
