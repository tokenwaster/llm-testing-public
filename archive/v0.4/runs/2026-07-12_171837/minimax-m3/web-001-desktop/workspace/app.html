<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ubuntu Desktop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Ubuntu', 'Cantarell', 'Segoe UI', system-ui, sans-serif;
  }

  #desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(ellipse at top left, #5e3a8e 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #e95420 0%, transparent 50%),
      linear-gradient(135deg, #2c1810 0%, #1a0f2e 50%, #0f0f1e 100%);
    overflow: hidden;
  }

  #desktop::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 25% 25%, rgba(255,255,255,0.03) 1px, transparent 1px),
      radial-gradient(circle at 75% 75%, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(20, 20, 20, 0.92);
    display: flex;
    align-items: center;
    padding: 0 12px;
    color: #fff;
    font-size: 13px;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .topbar-item {
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 4px;
    font-weight: 500;
  }
  .topbar-item:hover { background: rgba(255,255,255,0.1); }
  .topbar-item.brand { color: #E95420; font-weight: 700; }

  #clock {
    margin-left: auto;
    font-size: 12px;
    opacity: 0.9;
    padding: 4px 10px;
  }

  #taskbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(20, 20, 20, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 16px;
    z-index: 1000;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .launcher {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 24px;
    transition: all 0.15s;
    position: relative;
  }
  .launcher:hover {
    background: rgba(233, 84, 32, 0.5);
    transform: translateY(-3px);
  }
  .launcher.active::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    background: #E95420;
    border-radius: 50%;
  }

  .window {
    position: absolute;
    width: 640px;
    height: 440px;
    min-width: 360px;
    min-height: 240px;
    background: #1e1e1e;
    border-radius: 10px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
  }

  .window.hidden { display: none; }

  .window-titlebar {
    height: 38px;
    background: linear-gradient(to bottom, #3a3a3a, #2a2a2a);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: move;
    user-select: none;
    border-bottom: 1px solid rgba(0,0,0,0.4);
  }

  .window-title {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    flex: 1;
    margin-left: 4px;
  }

  .window-controls {
    display: flex;
    gap: 7px;
  }

  .win-btn {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 0;
    transition: filter 0.1s;
  }
  .win-btn:hover { filter: brightness(1.2); }
  .win-close { background: #ff5f57; }
  .win-min { background: #febc2e; }
  .win-max { background: #28c840; }

  .window-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
    color: #ddd;
    min-height: 0;
  }

  #files-toolbar {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: #252525;
    border-bottom: 1px solid rgba(0,0,0,0.3);
    gap: 8px;
  }

  #files-up {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: #ddd;
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
  }
  #files-up:hover { background: rgba(255,255,255,0.08); }
  #files-up:active { background: rgba(233, 84, 32, 0.3); }

  #files-path {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.1);
    color: #ddd;
    padding: 5px 10px;
    border-radius: 5px;
    font-family: 'Ubuntu Mono', 'Courier New', monospace;
    font-size: 12px;
    outline: none;
  }

  #files-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .fs-item {
    display: flex;
    align-items: center;
    padding: 7px 12px;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 2px;
    font-size: 13px;
    user-select: none;
    transition: background 0.1s;
  }
  .fs-item:hover { background: rgba(233, 84, 32, 0.2); }
  .fs-item:active { background: rgba(233, 84, 32, 0.35); }

  .fs-icon {
    margin-right: 10px;
    font-size: 18px;
    width: 22px;
    text-align: center;
  }

  #tabs {
    display: flex;
    background: #252525;
    border-bottom: 1px solid rgba(0,0,0,0.3);
    overflow-x: auto;
    min-height: 36px;
    align-items: stretch;
  }

  .tab {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    background: #2a2a2a;
    border-right: 1px solid rgba(0,0,0,0.3);
    cursor: pointer;
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
    gap: 8px;
    min-width: 120px;
    max-width: 200px;
    transition: background 0.1s;
  }
  .tab.active {
    background: #1e1e1e;
    color: #fff;
    box-shadow: inset 0 2px 0 #E95420;
  }
  .tab:hover:not(.active) { background: #333; }

  .tab-name {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tab-close {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tab-close:hover { background: #ff5f57; color: #fff; }

  #new-tab {
    background: transparent;
    border: none;
    color: #aaa;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 300;
    transition: all 0.1s;
  }
  #new-tab:hover { color: #fff; background: #333; }

  #editor {
    flex: 1;
    background: #1e1e1e;
    color: #ddd;
    border: none;
    padding: 14px;
    font-family: 'Ubuntu Mono', 'Courier New', monospace;
    font-size: 13px;
    resize: none;
    outline: none;
    line-height: 1.6;
    tab-size: 4;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  .desktop-icon {
    position: absolute;
    width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    padding: 8px;
    border-radius: 6px;
    transition: background 0.1s;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.1); }
  .desktop-icon .icon { font-size: 36px; margin-bottom: 4px; }
  .desktop-icon .label { color: #fff; font-size: 11px; text-align: center; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
</style>
</head>
<body>
<div id="desktop">
  <div id="topbar">
    <div class="topbar-item brand">Ubuntu</div>
    <div class="topbar-item">Activities</div>
    <div class="topbar-item">Files</div>
    <div class="topbar-item">Edit</div>
    <div class="topbar-item">View</div>
    <div class="topbar-item">Help</div>
    <div id="clock"></div>
  </div>

  <div class="desktop-icon" style="top: 60px; left: 30px;" id="desktop-files">
    <div class="icon">📁</div>
    <div class="label">Files</div>
  </div>
  <div class="desktop-icon" style="top: 160px; left: 30px;" id="desktop-notepad">
    <div class="icon">📝</div>
    <div class="label">Notepad</div>
  </div>

  <div id="taskbar">
    <button class="launcher" id="open-files" title="Files">📁</button>
    <button class="launcher" id="open-notepad" title="Notepad">📝</button>
  </div>

  <div class="window hidden" id="files-window" style="left: 100px; top: 80px;">
    <div class="window-titlebar">
      <div class="window-title">Files</div>
      <div class="window-controls">
        <button class="win-btn win-min" title="Minimize"></button>
        <button class="win-btn win-max" title="Maximize"></button>
        <button class="win-btn win-close" title="Close"></button>
      </div>
    </div>
    <div class="window-body">
      <div id="files-toolbar">
        <button id="files-up">↑ Up</button>
        <input id="files-path" readonly value="/">
      </div>
      <div id="files-list"></div>
    </div>
  </div>

  <div class="window hidden" id="notepad-window" style="left: 220px; top: 120px;">
    <div class="window-titlebar">
      <div class="window-title">Notepad</div>
      <div class="window-controls">
        <button class="win-btn win-min" title="Minimize"></button>
        <button class="win-btn win-max" title="Maximize"></button>
        <button class="win-btn win-close" title="Close"></button>
      </div>
    </div>
    <div class="window-body">
      <div id="tabs">
        <button id="new-tab" title="New Tab">+</button>
      </div>
      <textarea id="editor" placeholder="Start typing..." spellcheck="false"></textarea>
    </div>
  </div>
</div>

<script>
const filesystem = {
  '/': {
    type: 'dir',
    children: {
      'bin': { type: 'dir', children: {
        'bash': { type: 'file', content: 'Bash shell binary executable' },
        'ls': { type: 'file', content: 'List directory contents' },
        'cat': { type: 'file', content: 'Concatenate and display files' },
        'grep': { type: 'file', content: 'Search text patterns' },
        'cp': { type: 'file', content: 'Copy files and directories' },
        'mv': { type: 'file', content: 'Move or rename files' },
      }},
      'etc': { type: 'dir', children: {
        'hostname': { type: 'file', content: 'ubuntu-desktop' },
        'hosts': { type: 'file', content: '127.0.0.1 localhost\n::1 localhost' },
        'passwd': { type: 'file', content: 'root:x:0:0:root:/root:/bin/bash\nuser:x:1000:1000:user:/home/user:/bin/bash' },
        'os-release': { type: 'file', content: 'NAME="Ubuntu"\nVERSION="22.04 LTS (Jammy Jellyfish)"\nID=ubuntu' },
        'fstab': { type: 'file', content: '/dev/sda1 / ext4 defaults 0 1' },
      }},
      'home': { type: 'dir', children: {
        'user': { type: 'dir', children: {
          'Documents': { type: 'dir', children: {
            'welcome.txt': { type: 'file', content: 'Welcome to Ubuntu Desktop!\n\nThis is a simulated Linux environment.\nDouble-click folders to navigate, and files to open them.' },
            'todo.md': { type: 'file', content: '# TODO\n- Learn Linux commands\n- Explore the filesystem\n- Have fun!' },
            'report.txt': { type: 'file', content: 'Annual report draft - work in progress.' },
            'notes.txt': { type: 'file', content: 'Meeting notes from last week.' },
          }},
          'Downloads': { type: 'dir', children: {
            'installer.deb': { type: 'file', content: 'Debian package installer' },
            'photo.jpg': { type: 'file', content: 'JPEG image (2.4 MB)' },
            'archive.zip': { type: 'file', content: 'Compressed archive' },
          }},
          'Pictures': { type: 'dir', children: {
            'wallpaper.png': { type: 'file', content: 'Desktop wallpaper image' },
            'screenshot.png': { type: 'file', content: 'Screenshot capture' },
            'vacation.jpg': { type: 'file', content: 'Vacation photo from summer' },
            'avatar.png': { type: 'file', content: 'Profile picture' },
          }},
          'Music': { type: 'dir', children: {
            'song.mp3': { type: 'file', content: 'Audio file' },
            'playlist.m3u': { type: 'file', content: 'Music playlist' },
          }},
          'Videos': { type: 'dir', children: {
            'movie.mp4': { type: 'file', content: 'Video file' },
          }},
          '.bashrc': { type: 'file', content: '# Bash configuration\nexport PATH=$PATH:/usr/local/bin\nalias ll="ls -la"' },
          'README': { type: 'file', content: 'This is the home directory of user.' },
        }},
      }},
      'usr': { type: 'dir', children: {
        'bin': { type: 'dir', children: {
          'python3': { type: 'file', content: 'Python 3 interpreter' },
          'node': { type: 'file', content: 'Node.js runtime' },
          'git': { type: 'file', content: 'Git version control' },
        }},
        'lib': { type: 'dir', children: {
          'libc.so.6': { type: 'file', content: 'C standard library' },
        }},
        'share': { type: 'dir', children: {
          'icons': { type: 'dir', children: {} },
          'docs': { type: 'dir', children: {} },
          'applications': { type: 'dir', children: {} },
        }},
        'local': { type: 'dir', children: {
          'bin': { type: 'dir', children: {} },
        }},
      }},
      'var': { type: 'dir', children: {
        'log': { type: 'dir', children: {
          'syslog': { type: 'file', content: 'System log file' },
          'auth.log': { type: 'file', content: 'Authentication log' },
          'kern.log': { type: 'file', content: 'Kernel log' },
        }},
        'www': { type: 'dir', children: {
          'index.html': { type: 'file', content: '<html><body>Hello World</body></html>' },
        }},
        'tmp': { type: 'dir', children: {} },
      }},
      'tmp': { type: 'dir', children: {
        'tempfile': { type: 'file', content: 'Temporary file' },
      }},
      'root': { type: 'dir', children: {
        '.bashrc': { type: 'file', content: 'Root user bash config' },
      }},
      'opt': { type: 'dir', children: {
        'google': { type: 'dir', children: {} },
      }},
    }
  }
};

let currentPath = '/';

function getNode(path) {
  if (path === '/' || path === '') return filesystem['/'];
  const parts = path.split('/').filter(p => p);
  let node = filesystem['/'];
  for (const part of parts) {
    if (!node || !node.children || !node.children[part]) return null;
    node = node.children[part];
  }
  return node;
}

function renderFiles() {
  const node = getNode(currentPath);
  const list = document.getElementById('files-list');
  const pathInput = document.getElementById('files-path');
  pathInput.value = currentPath;
  list.innerHTML = '';

  if (!node || node.type !== 'dir') {
    list.innerHTML = '<div style="padding:20px;color:#888;">Not a directory</div>';
    return;
  }

  const entries = Object.entries(node.children).sort((a, b) => {
    if (a[1].type !== b[1].type) return a[1].type === 'dir' ? -1 : 1;
    return a[0].localeCompare(b[0]);
  });

  if (entries.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#888;text-align:center;">This folder is empty</div>';
    return;
  }

  for (const [name, child] of entries) {
    const item = document.createElement('div');
    item.className = 'fs-item';
    let icon = '📄';
    if (child.type === 'dir') icon = '📁';
    else if (name.endsWith('.txt') || name.endsWith('.md')) icon = '📃';
    else if (name.endsWith('.jpg') || name.endsWith('.png')) icon = '🖼️';
    else if (name.endsWith('.mp3')) icon = '🎵';
    else if (name.endsWith('.mp4')) icon = '🎬';
    else if (name.endsWith('.html')) icon = '🌐';
    else if (name.endsWith('.deb') || name.endsWith('.zip')) icon = '📦';
    else if (name.startsWith('.')) icon = '⚙️';

    item.innerHTML = `<span class="fs-icon">${icon}</span><span>${name}</span>`;
    item.addEventListener('dblclick', () => {
      if (child.type === 'dir') {
        currentPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
        renderFiles();
      } else {
        openNotepadWithContent(child.content || '', name);
      }
    });
    list.appendChild(item);
  }
}

document.getElementById('files-up').addEventListener('click', () => {
  if (currentPath === '/') return;
  const parts = currentPath.split('/').filter(p => p);
  parts.pop();
  currentPath = '/' + parts.join('/');
  renderFiles();
});

const STORAGE_KEY = 'ubuntu-notepad-v1';
let tabs = [];
let activeTabId = null;

function loadTabs() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (data && Array.isArray(data.tabs) && data.tabs.length > 0) {
      tabs = data.tabs;
      activeTabId = data.activeTabId || tabs[0].id;
      return;
    }
  } catch (e) {}
  createNewTab();
}

function saveTabs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ tabs, activeTabId }));
}

function createNewTab(content, name) {
  const id = 'tab-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  const tab = { id, name: name || 'Untitled', content: content || '' };
  tabs.push(tab);
  activeTabId = id;
  saveTabs();
  renderTabs();
  renderEditor();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const newBtn = document.getElementById('new-tab');
  tabsEl.innerHTML = '';
  tabsEl.appendChild(newBtn);

  for (const tab of tabs) {
    const tabEl = document.createElement('div');
    tabEl.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    tabEl.dataset.id = tab.id;

    const nameEl = document.createElement('span');
    nameEl.className = 'tab-name';
    nameEl.textContent = tab.name || 'Untitled';

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '×';
    closeBtn.title = 'Close tab';
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeTab(tab.id);
    });

    tabEl.appendChild(nameEl);
    tabEl.appendChild(closeBtn);
    tabEl.addEventListener('click', () => switchTab(tab.id));
    tabsEl.appendChild(tabEl);
  }
}

function switchTab(id) {
  if (id === activeTabId) return;
  const editor = document.getElementById('editor');
  const currentTab = tabs.find(t => t.id === activeTabId);
  if (currentTab) {
    currentTab.content = editor.value;
    updateTabName(currentTab);
  }
  activeTabId = id;
  saveTabs();
  renderTabs();
  renderEditor();
}

function closeTab(id) {
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (activeTabId === id) {
    activeTabId = tabs.length > 0 ? tabs[Math.min(idx, tabs.length - 1)].id : null;
  }
  if (tabs.length === 0) {
    createNewTab();
    return;
  }
  saveTabs();
  renderTabs();
  renderEditor();
}

function updateTabName(tab) {
  const firstLine = (tab.content || '').split('\n')[0] || '';
  tab.name = firstLine.slice(0, 24).trim() || 'Untitled';
}

function renderEditor() {
  const editor = document.getElementById('editor');
  const tab = tabs.find(t => t.id === activeTabId);
  editor.value = tab ? tab.content : '';
}

document.getElementById('new-tab').addEventListener('click', () => {
  const editor = document.getElementById('editor');
  const currentTab = tabs.find(t => t.id === activeTabId);
  if (currentTab) {
    currentTab.content = editor.value;
    updateTabName(currentTab);
  }
  createNewTab();
});

document.getElementById('editor').addEventListener('input', (e) => {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    tab.content = e.target.value;
    updateTabName(tab);
    saveTabs();
    const tabEl = document.querySelector(`.tab[data-id="${tab.id}"] .tab-name`);
    if (tabEl) tabEl.textContent = tab.name;
  }
});

function openNotepadWithContent(content, filename) {
  showWindow('notepad-window', 'open-notepad');
  createNewTab(content, filename);
}

let topZ = 100;

function showWindow(winId, launcherId) {
  const win = document.getElementById(winId);
  const launcher = document.getElementById(launcherId);
  win.classList.remove('hidden');
  launcher.classList.add('active');
  bringToFront(win);
}

function hideWindow(winId, launcherId) {
  const win = document.getElementById(winId);
  const launcher = document.getElementById(launcherId);
  win.classList.add('hidden');
  launcher.classList.remove('active');
}

function bringToFront(win) {
  topZ++;
  win.style.zIndex = topZ;
}

function setupWindow(winId, launcherId) {
  const win = document.getElementById(winId);
  const launcher = document.getElementById(launcherId);
  const closeBtn = win.querySelector('.win-close');

  launcher.addEventListener('click', () => showWindow(winId, launcherId));
  closeBtn.addEventListener('click', () => hideWindow(winId, launcherId));

  win.addEventListener('mousedown', () => bringToFront(win));

  const titlebar = win.querySelector('.window-titlebar');
  let isDragging = false;
  let startX, startY, startLeft, startTop;

  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.window-controls')) return;
    isDragging = true;
    const rect = win.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left;
    startTop = rect.top;
    bringToFront(win);
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    let newLeft = startLeft + dx;
    let newTop = startTop + dy;
    newTop = Math.max(28, newTop);
    newLeft = Math.max(-win.offsetWidth + 100, newLeft);
    win.style.left = newLeft + 'px';
    win.style.top = newTop + 'px';
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
  });
}

setupWindow('files-window', 'open-files');
setupWindow('notepad-window', 'open-notepad');

document.getElementById('desktop-files').addEventListener('dblclick', () => {
  showWindow('files-window', 'open-files');
});
document.getElementById('desktop-notepad').addEventListener('dblclick', () => {
  showWindow('notepad-window', 'open-notepad');
});

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('clock').textContent = `${date}  ${time}`;
}
updateClock();
setInterval(updateClock, 1000);

loadTabs();
renderTabs();
renderEditor();
renderFiles();
</script>
</body>
</html>
