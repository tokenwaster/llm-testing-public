<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ubuntu‑like Desktop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; font-family: Ubuntu, "Segoe UI", sans-serif; background: #1e1e1e; color: #e0e0e0; }
  #desktop { position: relative; width: 100%; height: 100%; background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%); }
  /* Taskbar / Dock */
  #taskbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; padding: 8px 16px; background: rgba(30,30,30,0.9); backdrop-filter: blur(8px); border-top: 1px solid #333; border-radius: 12px 12px 0 0; z-index: 1000; }
  #taskbar button { background: #333; border: none; color: #e0e0e0; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
  #taskbar button:hover { background: #444; }
  #taskbar button:active { background: #555; }
  /* Window base */
  .window { position: absolute; min-width: 360px; min-height: 240px; background: #2b2b2b; border: 1px solid #444; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 100; }
  .window-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: #333; border-bottom: 1px solid #444; border-radius: 8px 8px 0 0; user-select: none; cursor: default; }
  .window-title { font-weight: 600; font-size: 13px; }
  .win-close { background: transparent; border: none; color: #e0e0e0; font-size: 16px; line-height: 1; cursor: pointer; padding: 4px; border-radius: 4px; }
  .win-close:hover { background: #c0392b; color: #fff; }
  .window-content { flex: 1; overflow: auto; padding: 12px; }
  /* Files app */
  #files-path { font-family: monospace; font-size: 13px; margin-bottom: 8px; padding: 6px 10px; background: #333; border-radius: 4px; }
  #files-up { margin-bottom: 8px; }
  #files-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .fs-item { display: flex; flex-direction: column; align-items: center; padding: 10px; background: #333; border-radius: 6px; cursor: pointer; transition: background 0.2s; user-select: none; }
  .fs-item:hover { background: #3d3d3d; }
  .fs-item.folder { color: #7aa2f7; }
  .fs-item.file { color: #9ece6a; }
  .fs-item-icon { font-size: 28px; margin-bottom: 4px; }
  .fs-item-name { font-size: 12px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  /* Notepad app */
  #tabs { display: flex; gap: 2px; margin-bottom: 8px; border-bottom: 1px solid #444; padding-bottom: 2px; }
  .tab { padding: 6px 12px; background: #333; border: 1px solid #444; border-bottom: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; color: #b0b0b0; transition: background 0.2s, color 0.2s; }
  .tab:hover { background: #3a3a3a; color: #e0e0e0; }
  .tab.active { background: #2b2b2b; color: #e0e0e0; border-color: #444; }
  #new-tab { padding: 6px 10px; background: #333; border: 1px solid #444; border-radius: 6px; color: #e0e0e0; cursor: pointer; font-size: 13px; }
  #new-tab:hover { background: #3a3a3a; }
  #editor { width: 100%; height: 100%; min-height: 200px; background: #1e1e1e; border: 1px solid #444; border-radius: 4px; color: #d0d0d0; font-family: monospace; font-size: 14px; line-height: 1.5; padding: 10px; resize: none; outline: none; }
  #editor:focus { border-color: #7aa2f7; }
</style>
</head>
<body>
<div id="desktop">
  <div id="taskbar">
    <button id="open-files">Files</button>
    <button id="open-notepad">Notepad</button>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window" style="top: 80px; left: 80px; width: 560px; height: 420px;">
    <div class="window-header">
      <span class="window-title">Files</span>
      <button class="win-close" aria-label="Close">&times;</button>
    </div>
    <div class="window-content">
      <div id="files-path">/</div>
      <button id="files-up" disabled>↑ Up</button>
      <div id="files-list"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window" style="top: 120px; left: 140px; width: 600px; height: 460px;">
    <div class="window-header">
      <span class="window-title">Notepad</span>
      <button class="win-close" aria-label="Close">&times;</button>
    </div>
    <div class="window-content" style="display:flex; flex-direction:column; height:100%;">
      <div id="tabs"></div>
      <button id="new-tab">+ New Tab</button>
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
  </div>
</div>

<script>
/* ---------- Filesystem data ---------- */
const fs = {
  '/': {
    type: 'folder',
    children: {
      bin: { type: 'folder', children: {} },
      etc: { type: 'folder', children: {} },
      home: {
        type: 'folder',
        children: {
          user: {
            type: 'folder',
            children: {
              Documents: { type: 'folder', children: {} },
              Downloads: { type: 'folder', children: {} },
              Pictures: { type: 'folder', children: {} },
              'readme.txt': { type: 'file', content: 'Welcome to your home folder!' }
            }
          }
        }
      },
      usr: { type: 'folder', children: {} },
      var: { type: 'folder', children: {} }
    }
  }
};

/* ---------- State ---------- */
let currentPath = ['']; // root represented as empty string for easier join
const filesWindow = document.getElementById('files-window');
const notepadWindow = document.getElementById('notepad-window');
const filesPathEl = document.getElementById('files-path');
const filesUpBtn = document.getElementById('files-up');
const filesListEl = document.getElementById('files-list');
const tabsEl = document.getElementById('tabs');
const newTabBtn = document.getElementById('new-tab');
const editorEl = document.getElementById('editor');

/* ---------- Helpers ---------- */
function getNode(pathArray) {
  let node = fs['/'];
  for (let i = 1; i < pathArray.length; i++) {
    const name = pathArray[i];
    if (node.children && node.children[name]) {
      node = node.children[name];
    } else return null;
  }
  return node;
}

function renderPath() {
  filesPathEl.textContent = currentPath.length === 1 ? '/' : '/' + currentPath.slice(1).join('/');
  filesUpBtn.disabled = currentPath.length === 1;
}

function renderListing() {
  const node = getNode(currentPath);
  filesListEl.innerHTML = '';
  if (!node || !node.children) return;
  Object.entries(node.children).sort(([a],[b]) => a.localeCompare(b)).forEach(([name, entry]) => {
    const div = document.createElement('div');
    div.className = `fs-item ${entry.type}`;
    div.dataset.name = name;
    div.dataset.type = entry.type;
    div.innerHTML = `
      <span class="fs-item-icon">${entry.type === 'folder' ? '📁' : '📄'}</span>
      <span class="fs-item-name">${name}</span>
    `;
    filesListEl.appendChild(div);
  });
}

/* ---------- Files app events ---------- */
filesListEl.addEventListener('dblclick', e => {
  const item = e.target.closest('.fs-item');
  if (!item) return;
  if (item.dataset.type === 'folder') {
    currentPath.push(item.dataset.name);
    renderPath();
    renderListing();
  }
});

filesUpBtn.addEventListener('click', () => {
  if (currentPath.length > 1) {
    currentPath.pop();
    renderPath();
    renderListing();
  }
});

/* ---------- Notepad app ---------- */
const STORAGE_KEY = 'notepadTabs';
let tabs = [];
let activeTabId = null;

function loadTabs() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      tabs = JSON.parse(data);
      if (tabs.length === 0) createTab();
      else activeTabId = tabs[0].id;
    } else {
      createTab();
    }
  } catch (_) {
    createTab();
  }
  renderTabs();
  showActiveTab();
}

function saveTabs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
}

function createTab(title = 'Untitled') {
  const id = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
  const tab = { id, title, content: '' };
  tabs.push(tab);
  activeTabId = id;
  saveTabs();
  return tab;
}

function renderTabs() {
  tabsEl.innerHTML = '';
  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    btn.dataset.id = tab.id;
    btn.textContent = tab.title;
    btn.addEventListener('click', () => switchTab(tab.id));
    tabsEl.appendChild(btn);
  });
}

function switchTab(id) {
  // save current editor content to active tab before switching
  const current = tabs.find(t => t.id === activeTabId);
  if (current) {
    current.content = editorEl.value;
  }
  activeTabId = id;
  saveTabs();
  renderTabs();
  showActiveTab();
}

function showActiveTab() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    editorEl.value = tab.content;
  } else {
    editorEl.value = '';
  }
}

editorEl.addEventListener('input', () => {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    tab.content = editorEl.value;
    saveTabs();
  }
});

newTabBtn.addEventListener('click', () => {
  const tab = createTab(`Untitled ${tabs.length + 1}`);
  renderTabs();
  showActiveTab();
});

/* ---------- Window management ---------- */
function showWindow(win) {
  win.style.display = 'flex';
  // bring to front
  win.style.zIndex = ++topZ;
}
let topZ = 200;

document.getElementById('open-files').addEventListener('click', () => {
  showWindow(filesWindow);
  renderPath();
  renderListing();
});

document.getElementById('open-notepad').addEventListener('click', () => {
  showWindow(notepadWindow);
  if (tabs.length === 0) loadTabs(); // ensure loaded once
});

document.querySelectorAll('.win-close').forEach(btn => {
  btn.addEventListener('click', e => {
    e.target.closest('.window').style.display = 'none';
  });
});

/* ---------- Initial load ---------- */
loadTabs(); // load notepad data immediately so it's ready
</script>
</body>
</html>
