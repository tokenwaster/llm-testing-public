<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falling Sand</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: #0f0f0f;
    color: #e5e5e5;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 16px 0;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    max-width: 500px;
  }
  button {
    background: #1a1a1a;
    color: #e5e5e5;
    border: 1px solid #333;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  button:hover {
    background: #2a2a2a;
    border-color: #555;
  }
  .mat-btn.active {
    border-color: #84cc16;
    background: #1a250a;
    color: #a3e635;
    box-shadow: 0 0 10px rgba(132, 204, 22, 0.3);
  }
  #clear {
    background: #2a0f0f;
    border-color: #552222;
    color: #ff8888;
  }
  #clear:hover {
    background: #3a1515;
    border-color: #773333;
  }
  .canvas-container {
    position: relative;
    line-height: 0;
  }
  canvas {
    background: #111;
    border: 1px solid #333;
    image-rendering: pixelated;
    cursor: crosshair;
    width: 500px;
    height: 500px;
    max-width: 100%;
    touch-action: none;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
  <h1>Falling Sand</h1>
  <div class="controls">
    <button id="mat-sand" class="mat-btn active">Sand</button>
    <button id="mat-water" class="mat-btn">Water</button>
    <button id="mat-wall" class="mat-btn">Wall</button>
    <button id="mat-acid" class="mat-btn">Acid</button>
    <button id="mat-empty" class="mat-btn">Eraser</button>
    <button id="clear">Clear</button>
  </div>
  <div class="canvas-container">
    <canvas id="sand"></canvas>
  </div>

<script>
  const w = 100;
  const h = 100;
  const cellSize = 5;
  const EMPTY = 0, SAND = 1, WATER = 2, WALL = 3, ACID = 4;
  const MAT_NAMES = ["empty", "sand", "water", "wall", "acid"];
  const MAT_VALS = { empty: EMPTY, sand: SAND, water: WATER, wall: WALL, acid: ACID };
  const COLORS = [
    [17, 17, 17, 255],
    [220, 177, 89, 255],
    [59, 130, 246, 255],
    [136, 136, 136, 255],
    [132, 204, 22, 255]
  ];

  const grid = new Uint8Array(w * h);
  const moved = new Uint8Array(w * h);

  const canvas = document.getElementById('sand');
  const ctx = canvas.getContext('2d');
  canvas.width = w * cellSize;
  canvas.height = h * cellSize;

  const off = document.createElement('canvas');
  off.width = w;
  off.height = h;
  const offCtx = off.getContext('2d');
  const offImg = offCtx.createImageData(w, h);

  function swap(x1, y1, x2, y2) {
    let i1 = y1 * w + x1;
    let i2 = y2 * w + x2;
    let tmp = grid[i1];
    grid[i1] = grid[i2];
    grid[i2] = tmp;
    moved[i1] = 1;
    moved[i2] = 1;
  }

  function tick(n) {
    for (let s = 0; s < n; s++) {
      moved.fill(0);
      for (let y = h - 1; y >= 0; y--) {
        for (let x = 0; x < w; x++) {
          let i = y * w + x;
          if (moved[i]) continue;
          let mat = grid[i];
          if (mat === EMPTY || mat === WALL) continue;

          if (mat === SAND) {
            if (y + 1 < h) {
              let bi = (y + 1) * w + x;
              let bmat = grid[bi];
              if (bmat === EMPTY || bmat === WATER || bmat === ACID) {
                swap(x, y, x, y + 1);
                continue;
              }
            }
            let dir = Math.random() < 0.5 ? -1 : 1;
            let movedDiag = false;
            for (let d of [dir, -dir]) {
              let nx = x + d;
              if (nx >= 0 && nx < w && y + 1 < h) {
                let di = (y + 1) * w + nx;
                let dmat = grid[di];
                if (dmat === EMPTY || dmat === WATER || dmat === ACID) {
                  swap(x, y, nx, y + 1);
                  movedDiag = true;
                  break;
                }
              }
            }
            if (movedDiag) continue;
          } else if (mat === WATER) {
            if (y + 1 < h) {
              let bi = (y + 1) * w + x;
              if (grid[bi] === EMPTY) {
                swap(x, y, x, y + 1);
                continue;
              }
            }
            let dir = Math.random() < 0.5 ? -1 : 1;
            let movedDiag = false;
            for (let d of [dir, -dir]) {
              let nx = x + d;
              if (nx >= 0 && nx < w && y + 1 < h) {
                let di = (y + 1) * w + nx;
                if (grid[di] === EMPTY) {
                  swap(x, y, nx, y + 1);
                  movedDiag = true;
                  break;
                }
              }
            }
            if (movedDiag) continue;
            let movedHoriz = false;
            for (let d of [dir, -dir]) {
              let nx = x + d;
              if (nx >= 0 && nx < w) {
                let hi = y * w + nx;
                if (grid[hi] === EMPTY) {
                  swap(x, y, nx, y);
                  movedHoriz = true;
                  break;
                }
              }
            }
            if (movedHoriz) continue;
          } else if (mat === ACID) {
            let targets = [];
            if (y + 1 < h) targets.push([x, y + 1]);
            if (x - 1 >= 0) targets.push([x - 1, y]);
            if (x + 1 < w) targets.push([x + 1, y]);
            for (let i = targets.length - 1; i > 0; i--) {
              let j = Math.floor(Math.random() * (i + 1));
              [targets[i], targets[j]] = [targets[j], targets[i]];
            }
            let dissolved = false;
            for (let [tx, ty] of targets) {
              let ti = ty * w + tx;
              let tmat = grid[ti];
              if (tmat === SAND || tmat === WALL) {
                grid[ti] = EMPTY;
                grid[i] = EMPTY;
                moved[ti] = 1;
                moved[i] = 1;
                dissolved = true;
                break;
              }
            }
            if (dissolved) continue;

            if (y + 1 < h) {
              let bi = (y + 1) * w + x;
              if (grid[bi] === EMPTY) {
                swap(x, y, x, y + 1);
                continue;
              }
            }
            let dir = Math.random() < 0.5 ? -1 : 1;
            let movedDiag = false;
            for (let d of [dir, -dir]) {
              let nx = x + d;
              if (nx >= 0 && nx < w && y + 1 < h) {
                let di = (y + 1) * w + nx;
                if (grid[di] === EMPTY) {
                  swap(x, y, nx, y + 1);
                  movedDiag = true;
                  break;
                }
              }
            }
            if (movedDiag) continue;
            let movedHoriz = false;
            for (let d of [dir, -dir]) {
              let nx = x + d;
              if (nx >= 0 && nx < w) {
                let hi = y * w + nx;
                if (grid[hi] === EMPTY) {
                  swap(x, y, nx, y);
                  movedHoriz = true;
                  break;
                }
              }
            }
            if (movedHoriz) continue;
          }
        }
      }
    }
  }

  function render() {
    for (let i = 0; i < w * h; i++) {
      let c = COLORS[grid[i]];
      let idx = i * 4;
      offImg.data[idx] = c[0];
      offImg.data[idx+1] = c[1];
      offImg.data[idx+2] = c[2];
      offImg.data[idx+3] = c[3];
    }
    offCtx.putImageData(offImg, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, canvas.width, canvas.height);
  }

  window.sim = {
    w,
    h,
    tick,
    get: (x, y) => {
      if (x < 0 || x >= w || y < 0 || y >= h) return "empty";
      return MAT_NAMES[grid[y * w + x]];
    },
    set: (x, y, material) => {
      if (x < 0 || x >= w || y < 0 || y >= h) return;
      let v = MAT_VALS[material];
      if (v !== undefined) grid[y * w + x] = v;
    },
    clear: () => {
      grid.fill(EMPTY);
    }
  };

  let selectedMat = SAND;
  let isPainting = false;
  let lastPos = null;

  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.floor((e.clientX - rect.left) * scaleX / cellSize);
    const y = Math.floor((e.clientY - rect.top) * scaleY / cellSize);
    return {x, y};
  }

  function paint(x, y) {
    const r = 2;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx*dx + dy*dy <= r*r) {
          window.sim.set(x + dx, y + dy, MAT_NAMES[selectedMat]);
        }
      }
    }
  }

  function startPaint(e) {
    isPainting = true;
    lastPos = getMousePos(e);
    paint(lastPos.x, lastPos.y);
  }

  function movePaint(e) {
    if (!isPainting) return;
    const pos = getMousePos(e);
    if (lastPos) {
      let dx = pos.x - lastPos.x;
      let dy = pos.y - lastPos.y;
      let steps = Math.max(Math.abs(dx), Math.abs(dy));
      for (let i = 1; i <= steps; i++) {
        let ix = Math.round(lastPos.x + dx * (i / steps));
        let iy = Math.round(lastPos.y + dy * (i / steps));
        paint(ix, iy);
      }
    } else {
      paint(pos.x, pos.y);
    }
    lastPos = pos;
  }

  function endPaint() {
    isPainting = false;
    lastPos = null;
  }

  canvas.addEventListener('mousedown', startPaint);
  canvas.addEventListener('mousemove', movePaint);
  window.addEventListener('mouseup', endPaint);

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    startPaint(e.touches[0]);
  }, {passive: false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    movePaint(e.touches[0]);
  }, {passive: false});
  window.addEventListener('touchend', endPaint);

  const matBtns = {
    'mat-sand': SAND,
    'mat-water': WATER,
    'mat-wall': WALL,
    'mat-acid': ACID,
    'mat-empty': EMPTY
  };
  for (const [id, mat] of Object.entries(matBtns)) {
    const btn = document.getElementById(id);
    btn.addEventListener('click', () => {
      selectedMat = mat;
      document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  }
  document.getElementById('clear').addEventListener('click', () => {
    window.sim.clear();
  });

  function loop() {
    tick(1);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>
