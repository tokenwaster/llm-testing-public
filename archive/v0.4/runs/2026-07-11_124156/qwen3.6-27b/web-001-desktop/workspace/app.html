<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #1e1e2e;
    --bg-darker: #181825;
    --bg-panel: #252536;
    --bg-window: #1e1e2e;
    --bg-header: #313244;
    --accent: #7c6ff7;
    --accent-hover: #9488ff;
    --text: #cdd6f4;
    --text-dim: #a6adc8;
    --text-bright: #f5e0dc;
    --border: #45475a;
    --danger: #f38ba8;
    --success: #a6e3a1;
    --folder-color: #f9e2af;
    --file-color: #cdd6f4;
    --taskbar-h: 48px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    color: var(--text);
    user-select: none;
  }

  #desktop {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #1a1a2e 100%);
    position: relative;
    overflow: hidden;
  }

  #desktop::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(124,111,247,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(249,226,175,0.05) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 80%, rgba(166,227,161,0.04) 0%, transparent 40%);
    pointer-events: none;
  }

  /* ── Taskbar ── */
  #taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--taskbar-h);
    background: var(--bg-darker);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 16px;
    z-index: 1000;
    backdrop-filter: blur(12px);
  }

  .launcher-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: var(--bg-panel);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    position: relative;
  }

  .launcher-btn:hover {
    background: var(--bg-header);
    transform: scale(1.08);
  }

  .launcher-btn:active {
    transform: scale(0.95);
  }

  .launcher-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
  }

  .launcher-btn svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  .launcher-btn .tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-header);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    border: 1px solid var(--border);
  }

  .launcher-btn:hover .tooltip {
    opacity: 1;
  }

  /* ── Windows ── */
  .window {
    position: absolute;
    min-width: 360px;
    min-height: 240px;
    background: var(--bg-window);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    transition: box-shadow 0.2s;
  }

  .window.focused {
    box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.35);
    z-index: 200;
  }

  .window-header {
    height: 38px;
    background: var(--bg-header);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    cursor: grab;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }

  .window-header:active { cursor: grabbing; }

  .window-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .win-close {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .win-close:hover {
    background: var(--danger);
    color: #1e1e2e;
  }

  .window-body {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── Files App ── */
  #files-window {
    width: 520px;
    height: 400px;
    top: 60px;
    left: 80px;
  }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #files-up {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-header);
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }

  #files-up:hover { background: var(--accent); border-color: var(--accent); }
  #files-up:disabled { opacity: 0.3; cursor: default; }
  #files-up:disabled:hover { background: var(--bg-header); border-color: var(--border); }

  #files-path {
    flex: 1;
    background: var(--bg-darker);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .files-content {
    flex: 1;
    padding: 8px;
    overflow-y: auto;
  }

  .fs-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 13px;
  }

  .fs-item:hover { background: rgba(124,111,247,0.1); }

  .fs-item .icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fs-item.folder .icon { color: var(--folder-color); }
  .fs-item.file .icon { color: var(--file-color); }

  .fs-item .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Notepad App ── */
  #notepad-window {
    width: 560px;
    height: 420px;
    top: 90px;
    left: 200px;
  }

  #tabs {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding: 6px 8px 0;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 8px 8px 0 0;
    background: var(--bg-header);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.1s;
    white-space: nowrap;
    max-width: 140px;
  }

  .tab:hover { background: var(--border); }

  .tab.active {
    background: var(--bg-window);
    color: var(--text);
    border-color: var(--border);
    font-weight: 600;
  }

  .tab .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    transition: all 0.1s;
  }

  .tab .tab-close:hover { background: var(--danger); color: #1e1e2e; }

  #new-tab {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-header);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.12s;
    flex-shrink: 0;
    margin-left: 4px;
    margin-bottom: 1px;
  }

  #new-tab:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  #editor {
    flex: 1;
    width: 100%;
    background: var(--bg-window);
    color: var(--text);
    border: none;
    padding: 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 4;
  }

  #editor::placeholder { color: var(--text-dim); opacity: 0.5; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── Animations ── */
  .window { animation: winOpen 0.2s ease-out; }
  @keyframes winOpen {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .window.hiding {
    animation: winClose 0.15s ease-in forwards;
  }
  @keyframes winClose {
    to { opacity: 0; transform: scale(0.97) translateY(4px); }
  }

  /* ── Desktop icons area ── */
  .desktop-icons {
    position: absolute;
    top: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 1;
  }

  .desktop-icon {
    width: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }

  .desktop-icon:hover { background: rgba(255,255,255,0.08); }

  .desktop-icon .di-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .desktop-icon .di-label {
    font-size: 11px;
    color: var(--text);
    text-align: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }

  /* ── Clock ── */
  .taskbar-right {
    position: absolute;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }

  #clock {
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<div id="desktop">
  <!-- Desktop Icons -->
  <div class="desktop-icons">
    <div class="desktop-icon" ondblclick="openWindow('files')">
      <div class="di-icon">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#f9e2af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="di-label">Files</span>
    </div>
    <div class="desktop-icon" ondblclick="openWindow('notepad')">
      <div class="di-icon">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#a6e3a1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </div>
      <span class="di-label">Notepad</span>
    </div>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window" style="display:none;">
    <div class="window-header" data-window="files-window">
      <button class="win-close" onclick="closeWindow('files')">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="window-title">Files</span>
      <div style="width:28px"></div>
    </div>
    <div class="window-body">
      <div class="files-toolbar">
        <button id="files-up" onclick="navigateUp()" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div id="files-path">/</div>
      </div>
      <div class="files-content" id="files-content"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window" style="display:none;">
    <div class="window-header" data-window="notepad-window">
      <button class="win-close" onclick="closeWindow('notepad')">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <span class="window-title">Notepad</span>
      <div style="width:28px"></div>
    </div>
    <div class="window-body">
      <div id="tabs"></div>
      <textarea id="editor" placeholder="Start typing..."></textarea>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="open-files" class="launcher-btn" onclick="openWindow('files')">
      <span class="tooltip">Files</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button id="open-notepad" class="launcher-btn" onclick="openWindow('notepad')">
      <span class="tooltip">Notepad</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </button>
    <div class="taskbar-right">
      <span id="clock"></span>
    </div>
  </div>
</div>

<script>
// ─── Filesystem ───
const FS = {
  '/': {
    type: 'folder',
    children: {
      'bin': {
        type: 'folder',
        children: {
          'bash': { type: 'file' },
          'ls': { type: 'file' },
          'cat': { type: 'file' },
          'grep': { type: 'file' },
          'vim': { type: 'file' },
          'python3': { type: 'file' },
          'node': { type: 'file' }
        }
      },
      'etc': {
        type: 'folder',
        children: {
          'hostname': { type: 'file' },
          'passwd': { type: 'file' },
          'fstab': { type: 'file' },
          'nginx': {
            type: 'folder',
            children: {
              'nginx.conf': { type: 'file' },
              'sites-enabled': {
                type: 'folder',
                children: {
                  'default': { type: 'file' }
                }
              }
            }
          },
          'ssh': {
            type: 'folder',
            children: {
              'sshd_config': { type: 'file' },
              'ssh_config': { type: 'file' }
            }
          }
        }
      },
      'home': {
        type: 'folder',
        children: {
          'user': {
            type: 'folder',
            children: {
              'Documents': {
                type: 'folder',
                children: {
                  'resume.txt': { type: 'file' },
                  'notes.md': { type: 'file' },
                  'project-plan.txt': { type: 'file' }
                }
              },
              'Downloads': {
                type: 'folder',
                children: {
                  'archive.tar.gz': { type: 'file' },
                  'image.png': { type: 'file' },
                  'setup.sh': { type: 'file' }
                }
              },
              'Pictures': {
                type: 'folder',
                children: {
                  'wallpaper.jpg': { type: 'file' },
                  'screenshot.png': { type: 'file' },
                  'vacation': {
                    type: 'folder',
                    children: {
                      'beach.jpg': { type: 'file' },
                      'mountain.jpg': { type: 'file' }
                    }
                  }
                }
              },
              'Music': {
                type: 'folder',
                children: {
                  'playlist.m3u': { type: 'file' }
                }
              },
              '.bashrc': { type: 'file' },
              '.profile': { type: 'file' }
            }
          }
        }
      },
      'usr': {
        type: 'folder',
        children: {
          'bin': {
            type: 'folder',
            children: {
              'python3': { type: 'file' },
              'pip3': { type: 'file' }
            }
          },
          'lib': {
            type: 'folder',
            children: {
              'python3': { type: 'folder', children: {} }
            }
          },
          'share': {
            type: 'folder',
            children: {
              'applications': { type: 'folder', children: {} }
            }
          }
        }
      },
      'var': {
        type: 'folder',
        children: {
          'log': {
            type: 'folder',
            children: {
              'syslog': { type: 'file' },
              'auth.log': { type: 'file' },
              'kern.log': { type: 'file' }
            }
          },
          'www': {
            type: 'folder',
            children: {
              'html': {
                type: 'folder',
                children: {
                  'index.html': { type: 'file' }
                }
              }
            }
          },
          'tmp': { type: 'folder', children: {} }
        }
      }
    }
  }
};

let currentPath = '/';

function getNode(path) {
  if (path === '/') return FS['/'];
  const parts = path.split('/').filter(Boolean);
  let node = FS['/'];
  for (const part of parts) {
    if (node.children && node.children[part]) {
      node = node.children[part];
    } else {
      return null;
    }
  }
  return node;
}

function renderFiles() {
  const node = getNode(currentPath);
  const content = document.getElementById('files-content');
  const pathEl = document.getElementById('files-path');
  const upBtn = document.getElementById('files-up');

  pathEl.textContent = currentPath;
  upBtn.disabled = currentPath === '/';

  if (!node || !node.children) {
    content.innerHTML = '<div style="padding:20px;color:var(--text-dim);text-align:center;">Empty directory</div>';
    return;
  }

  const entries = Object.entries(node.children);
  // Sort: folders first, then files, alphabetically within each group
  entries.sort((a, b) => {
    const aIsFolder = a[1].type === 'folder' ? 0 : 1;
    const bIsFolder = b[1].type === 'folder' ? 0 : 1;
    if (aIsFolder !== bIsFolder) return aIsFolder - bIsFolder;
    return a[0].localeCompare(b[0]);
  });

  content.innerHTML = entries.map(([name, entry]) => {
    const isFolder = entry.type === 'folder';
    const iconSvg = isFolder
      ? `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" stroke="none">
           <path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/>
         </svg>`
      : `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
           <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
           <polyline points="14 2 14 8 20 8"/>
         </svg>`;

    return `<div class="fs-item ${isFolder ? 'folder' : 'file'}" 
                 ondblclick="${isFolder ? `navigateTo('${name}')` : ''}"
                 title="${name}">
              <span class="icon">${iconSvg}</span>
              <span class="name">${name}</span>
            </div>`;
  }).join('');
}

function navigateTo(folderName) {
  if (currentPath === '/') {
    currentPath = '/' + folderName;
  } else {
    currentPath = currentPath + '/' + folderName;
  }
  renderFiles();
}

function navigateUp() {
  if (currentPath === '/') return;
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  currentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
  renderFiles();
}

// ─── Notepad ───
let tabs = [];
let activeTabId = null;

function loadTabs() {
  try {
    const saved = localStorage.getItem('notepad-tabs');
    if (saved) {
      const data = JSON.parse(saved);
      tabs = data.tabs || [];
      activeTabId = data.activeTabId || null;
    }
  } catch(e) {
    tabs = [];
    activeTabId = null;
  }
  if (tabs.length === 0) {
    createTab();
  }
  if (!activeTabId || !tabs.find(t => t.id === activeTabId)) {
    activeTabId = tabs[0].id;
  }
}

function saveTabs() {
  localStorage.setItem('notepad-tabs', JSON.stringify({
    tabs: tabs,
    activeTabId: activeTabId
  }));
}

function createTab() {
  const id = 'tab-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
  tabs.push({ id, title: 'Untitled', content: '' });
  activeTabId = id;
  saveTabs();
  renderTabs();
  updateEditor();
}

function switchTab(id) {
  // Save current editor content
  const currentTab = tabs.find(t => t.id === activeTabId);
  if (currentTab) {
    currentTab.content = document.getElementById('editor').value;
  }
  activeTabId = id;
  saveTabs();
  renderTabs();
  updateEditor();
}

function closeTab(id, e) {
  if (e) e.stopPropagation();
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    createTab();
    return;
  }
  if (activeTabId === id) {
    activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
  }
  saveTabs();
  renderTabs();
  updateEditor();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = tabs.map(tab => {
    const isActive = tab.id === activeTabId;
    return `<div class="tab ${isActive ? 'active' : ''}" onclick="switchTab('${tab.id}')">
              <span>${tab.title}</span>
              <button class="tab-close" onclick="closeTab('${tab.id}', event)">×</button>
            </div>`;
  }).join('') + `<button id="new-tab" onclick="createTab()">+</button>`;
}

function updateEditor() {
  const tab = tabs.find(t => t.id === activeTabId);
  const editor = document.getElementById('editor');
  if (tab && editor.value !== tab.content) {
    editor.value = tab.content;
  }
}

// Save content on every input
document.addEventListener('DOMContentLoaded', () => {
  const editor = document.getElementById('editor');
  editor.addEventListener('input', () => {
    const tab = tabs.find(t => t.id === activeTabId);
    if (tab) {
      tab.content = editor.value;
      // Update title based on content
      const lines = editor.value.trim().split('\n');
      tab.title = lines[0] ? lines[0].substring(0, 20) : 'Untitled';
      saveTabs();
      renderTabs();
    }
  });
});

// ─── Window Management ───
function openWindow(app) {
  const winId = app === 'files' ? 'files-window' : 'notepad-window';
  const win = document.getElementById(winId);
  win.style.display = 'flex';
  win.classList.remove('hiding');
  focusWindow(win);
  updateLauncherState();

  if (app === 'files') {
    renderFiles();
  } else if (app === 'notepad') {
    loadTabs();
    renderTabs();
    updateEditor();
  }
}

function closeWindow(app) {
  const winId = app === 'files' ? 'files-window' : 'notepad-window';
  const win = document.getElementById(winId);
  win.classList.add('hiding');
  setTimeout(() => {
    win.style.display = 'none';
    win.classList.remove('hiding');
  }, 150);
  updateLauncherState();
}

function focusWindow(win) {
  document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
}

function updateLauncherState() {
  const filesWin = document.getElementById('files-window');
  const notepadWin = document.getElementById('notepad-window');
  document.getElementById('open-files').classList.toggle('active', filesWin.style.display !== 'none' && filesWin.style.display !== '');
  document.getElementById('open-notepad').classList.toggle('active', notepadWin.style.display !== 'none' && notepadWin.style.display !== '');
}

// ─── Draggable Windows ───
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.window-header').forEach(header => {
    let isDragging = false;
    let startX, startY, origX, origY;

    header.addEventListener('mousedown', (e) => {
      if (e.target.closest('.win-close')) return;
      const win = header.closest('.window');
      focusWindow(win);
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      origX = win.offsetLeft;
      origY = win.offsetTop;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const win = header.closest('.window');
      win.style.left = (origX + dx) + 'px';
      win.style.top = (origY + dy) + 'px';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
  });

  // Click on window to focus
  document.querySelectorAll('.window').forEach(win => {
    win.addEventListener('mousedown', () => focusWindow(win));
  });

  // Clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 30000);

  // Initial render
  renderFiles();
});
</script>
