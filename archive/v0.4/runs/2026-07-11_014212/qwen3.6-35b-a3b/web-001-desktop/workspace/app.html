<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Ubuntu', 'Segoe UI', Cantarell, sans-serif; }

  /* Desktop */
  #desktop {
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* Top Bar */
  #topbar {
    height: 28px;
    background: #1a1a1a;
    color: #ddd;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 13px;
    z-index: 100;
    border-bottom: 1px solid #0d0d0d;
  }
  #topbar .left { display: flex; align-items: center; gap: 16px; }
  #topbar .right { display: flex; align-items: center; gap: 14px; }
  #topbar .app-menu { font-weight: 600; color: #fff; letter-spacing: 0.5px; }
  #topbar .menu-item { cursor: pointer; padding: 2px 6px; border-radius: 3px; }
  #topbar .menu-item:hover { background: #333; }

  /* Taskbar / Dock */
  #taskbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(20, 20, 20, 0.92);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 200;
    border-top: 1px solid #333;
  }
  .dock-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.15s;
    position: relative;
  }
  .dock-btn:hover { transform: scale(1.12); }
  .dock-btn:active { transform: scale(0.95); }
  .dock-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px;
    width: 18px; height: 3px;
    background: #e95420;
    border-radius: 2px;
  }
  #open-files { background: linear-gradient(135deg, #3a3a3a, #2a2a2a); }
  #open-files:hover { background: linear-gradient(135deg, #4a4a4a, #3a3a3a); }
  #open-notepad { background: linear-gradient(135deg, #3a3a3a, #2a2a2a); }
  #open-notepad:hover { background: linear-gradient(135deg, #4a4a4a, #3a3a3a); }
  .dock-btn svg { width: 26px; height: 26px; }

  /* Windows */
  .app-window {
    position: absolute;
    background: #2d2d2d;
    border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 50;
    min-width: 360px;
    min-height: 240px;
  }
  .app-window.visible { display: flex; }
  .win-titlebar {
    height: 38px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: grab;
    flex-shrink: 0;
    border-bottom: 1px solid #333;
  }
  .win-titlebar:active { cursor: grabbing; }
  .win-title {
    flex: 1;
    text-align: center;
    color: #ccc;
    font-size: 13px;
    font-weight: 500;
    pointer-events: none;
  }
  .win-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: #e95420;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
  }
  .win-close:hover { background: #c7431b; }

  /* Files App */
  #files-window { width: 720px; height: 480px; top: 60px; left: 80px; }
  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: #252525;
    border-bottom: 1px solid #3a3a3a;
  }
  #files-up {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #333;
    color: #ccc;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  #files-up:hover { background: #444; }
  #files-path {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    padding: 5px 10px;
    color: #ddd;
    font-size: 13px;
    font-family: 'Ubuntu Mono', 'Consolas', monospace;
  }
  .files-body {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-content: flex-start;
  }
  .fs-item {
    width: 90px;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    text-align: center;
  }
  .fs-item:hover { background: rgba(255,255,255,0.07); }
  .fs-item .fs-icon { font-size: 36px; line-height: 1; }
  .fs-item .fs-name {
    font-size: 11px;
    color: #ddd;
    word-break: break-word;
    line-height: 1.2;
    max-width: 80px;
  }
  .fs-item.folder .fs-icon { color: #e9a020; }
  .fs-item.file .fs-icon { color: #aaa; }

  /* Notepad App */
  #notepad-window { width: 640px; height: 460px; top: 80px; left: 160px; }
  .notepad-toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: #252525;
    border-bottom: 1px solid #3a3a3a;
  }
  #new-tab {
    height: 28px;
    padding: 0 10px;
    border-radius: 5px;
    border: 1px solid #444;
    background: #333;
    color: #ddd;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #new-tab:hover { background: #444; }
  #tabs {
    display: flex;
    align-items: center;
    gap: 0;
    background: #1e1e1e;
    border-bottom: 1px solid #3a3a3a;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .tab {
    padding: 7px 16px;
    font-size: 12px;
    color: #999;
    cursor: pointer;
    border-right: 1px solid #333;
    background: transparent;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .tab:hover { background: #2a2a2a; color: #ccc; }
  .tab.active { background: #2d2d2d; color: #e95420; border-bottom: 2px solid #e95420; }
  .tab .tab-close {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #888;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .tab .tab-close:hover { background: #555; color: #fff; }
  #editor {
    flex: 1;
    background: #1e1e1e;
    color: #d4d4d4;
    border: none;
    padding: 12px;
    font-family: 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    outline: none;
    overflow-y: auto;
  }
  #editor::placeholder { color: #555; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<div id="desktop">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="left">
      <span class="app-menu">Activities</span>
      <span class="menu-item" id="topbar-app-name">Files</span>
    </div>
    <div class="right">
      <span class="menu-item" id="topbar-clock"></span>
    </div>
  </div>

  <!-- Windows -->
  <!-- Files Window -->
  <div id="files-window" class="app-window">
    <div class="win-titlebar" data-drag="files-window">
      <span class="win-title">Files</span>
      <button class="win-close" data-close="files-window">✕</button>
    </div>
    <div class="files-toolbar">
      <button id="files-up">↑</button>
      <span id="files-path">/</span>
    </div>
    <div class="files-body" id="files-body"></div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="app-window">
    <div class="win-titlebar" data-drag="notepad-window">
      <span class="win-title">Text Editor</span>
      <button class="win-close" data-close="notepad-window">✕</button>
    </div>
    <div class="notepad-toolbar">
      <button id="new-tab">＋ New Tab</button>
    </div>
    <div id="tabs"></div>
    <textarea id="editor" placeholder="Start typing..."></textarea>
  </div>

  <!-- Taskbar / Dock -->
  <div id="taskbar">
    <button id="open-files" class="dock-btn" title="Files">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e9a020" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button id="open-notepad" class="dock-btn" title="Text Editor">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5b9bd5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  // ===== Clock =====
  function updateClock() {
    const now = new Date();
    const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById('topbar-clock').textContent = now.toLocaleDateString('en-US', opts);
  }
  updateClock();
  setInterval(updateClock, 30000);

  // ===== File System Data =====
  const fileSystem = {
    '/': { type: 'dir', children: ['bin', 'etc', 'home', 'usr', 'var'] },
    '/bin': { type: 'dir', children: ['bash', 'ls', 'cat', 'cp', 'mv', 'rm'] },
    '/etc': { type: 'dir', children: ['passwd', 'hostname', 'fstab', 'ssh'] },
    '/etc/ssh': { type: 'dir', children: ['sshd_config', 'ssh_config'] },
    '/home': { type: 'dir', children: ['user'] },
    '/home/user': { type: 'dir', children: ['Documents', 'Downloads', 'Pictures', '.bashrc', '.profile'] },
    '/home/user/Documents': { type: 'dir', children: ['readme.txt', 'notes.md'] },
    '/home/user/Downloads': { type: 'dir', children: ['archive.tar.gz', 'setup.deb'] },
    '/home/user/Pictures': { type: 'dir', children: ['wallpaper.png', 'screenshot.png'] },
    '/usr': { type: 'dir', children: ['bin', 'lib', 'share'] },
    '/usr/bin': { type: 'dir', children: ['python3', 'gcc', 'git', 'vim'] },
    '/usr/lib': { type: 'dir', children: ['libc.so', 'libssl.so'] },
    '/usr/share': { type: 'dir', children: ['doc', 'man', 'locale'] },
    '/var': { type: 'dir', children: ['log', 'tmp', 'cache'] },
    '/var/log': { type: 'dir', children: ['syslog', 'auth.log'] },
    '/var/tmp': { type: 'dir', children: [] },
    '/var/cache': { type: 'dir', children: ['apt'] },
  };

  // Fake file metadata
  const fileMeta = {
    'bash': { type: 'file', icon: '📄' },
    'ls': { type: 'file', icon: '📄' },
    'cat': { type: 'file', icon: '📄' },
    'cp': { type: 'file', icon: '📄' },
    'mv': { type: 'file', icon: '📄' },
    'rm': { type: 'file', icon: '📄' },
    'passwd': { type: 'file', icon: '📄' },
    'hostname': { type: 'file', icon: '📄' },
    'fstab': { type: 'file', icon: '📄' },
    'sshd_config': { type: 'file', icon: '📄' },
    'ssh_config': { type: 'file', icon: '📄' },
    '.bashrc': { type: 'file', icon: '📄' },
    '.profile': { type: 'file', icon: '📄' },
    'readme.txt': { type: 'file', icon: '📄' },
    'notes.md': { type: 'file', icon: '📄' },
    'archive.tar.gz': { type: 'file', icon: '📦' },
    'setup.deb': { type: 'file', icon: '📦' },
    'wallpaper.png': { type: 'file', icon: '🖼️' },
    'screenshot.png': { type: 'file', icon: '🖼️' },
    'python3': { type: 'file', icon: '📄' },
    'gcc': { type: 'file', icon: '📄' },
    'git': { type: 'file', icon: '📄' },
    'vim': { type: 'file', icon: '📄' },
    'libc.so': { type: 'file', icon: '📄' },
    'libssl.so': { type: 'file', icon: '📄' },
    'syslog': { type: 'file', icon: '📄' },
    'auth.log': { type: 'file', icon: '📄' },
  };

  let currentPath = '/';

  function getDir(path) {
    return fileSystem[path];
  }

  function isDir(path) {
    return fileSystem[path] && fileSystem[path].type === 'dir';
  }

  function isFile(name) {
    return !isDir(currentPath + '/' + name);
  }

  function renderFiles() {
    const body = document.getElementById('files-body');
    const pathEl = document.getElementById('files-path');
    pathEl.textContent = currentPath;
    body.innerHTML = '';

    const dir = getDir(currentPath);
    if (!dir) return;

    // Sort: directories first, then files
    const sorted = [...dir.children].sort((a, b) => {
      const aIsDir = isDir(currentPath + '/' + a);
      const bIsDir = isDir(currentPath + '/' + b);
      if (aIsDir && !bIsDir) return -1;
      if (!aIsDir && bIsDir) return 1;
      return a.localeCompare(b);
    });

    sorted.forEach(name => {
      const fullPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
      const isFolder = isDir(fullPath);
      const meta = fileMeta[name];
      const icon = isFolder ? '📁' : (meta ? meta.icon : '📄');

      const item = document.createElement('div');
      item.className = 'fs-item ' + (isFolder ? 'folder' : 'file');
      item.innerHTML = `<span class="fs-icon">${icon}</span><span class="fs-name">${name}</span>`;

      item.addEventListener('dblclick', function(e) {
        e.preventDefault();
        if (isFolder) {
          currentPath = fullPath;
          renderFiles();
        }
      });

      body.appendChild(item);
    });
  }

  document.getElementById('files-up').addEventListener('click', function() {
    if (currentPath !== '/') {
      currentPath = currentPath.substring(0, currentPath.lastIndexOf('/')) || '/';
      renderFiles();
    }
  });

  // ===== Notepad App =====
  const STORAGE_KEY = 'notepad-tabs';

  function loadTabs() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) return JSON.parse(data);
    } catch(e) {}
    return [];
  }

  function saveTabs() {
    const tabs = getTabsData();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
  }

  let tabs = loadTabs();
  let activeTabId = null;

  function generateId() {
    return 'tab-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
  }

  function ensureTabs() {
    if (tabs.length === 0) {
      const id = generateId();
      tabs.push({ id: id, name: 'Untitled', content: '' });
      activeTabId = id;
      saveTabs();
    }
    if (!activeTabId || !tabs.find(t => t.id === activeTabId)) {
      activeTabId = tabs[0].id;
    }
  }

  function getTabsData() {
    const editor = document.getElementById('editor');
    const currentContent = editor ? editor.value : '';
    const activeTab = tabs.find(t => t.id === activeTabId);
    if (activeTab) {
      activeTab.content = currentContent;
    }
    return tabs;
  }

  function renderTabs() {
    ensureTabs();
    const tabsContainer = document.getElementById('tabs');
    tabsContainer.innerHTML = '';

    tabs.forEach(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
      tabEl.innerHTML = `<span>${tab.name}</span><button class="tab-close" data-tab-id="${tab.id}">✕</button>`;

      tabEl.querySelector('.tab').addEventListener('click', function(e) {
        if (e.target.classList.contains('tab-close')) return;
        switchTab(tab.id);
      });

      tabEl.querySelector('.tab-close').addEventListener('click', function(e) {
        e.stopPropagation();
        closeTab(tab.id);
      });

      tabsContainer.appendChild(tabEl);
    });

    // Update editor
    const activeTab = tabs.find(t => t.id === activeTabId);
    if (activeTab) {
      document.getElementById('editor').value = activeTab.content;
    }
  }

  function switchTab(id) {
    // Save current
    getTabsData();
    activeTabId = id;
    renderTabs();
    saveTabs();
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    tabs.splice(idx, 1);
    if (tabs.length === 0) {
      const newId = generateId();
      tabs.push({ id: newId, name: 'Untitled', content: '' });
      activeTabId = newId;
    } else if (activeTabId === id) {
      activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
    }
    renderTabs();
    saveTabs();
  }

  document.getElementById('new-tab').addEventListener('click', function() {
    getTabsData();
    const id = generateId();
    const num = tabs.length + 1;
    tabs.push({ id: id, name: 'Untitled ' + num, content: '' });
    activeTabId = id;
    renderTabs();
    saveTabs();
  });

  document.getElementById('editor').addEventListener('input', function() {
    const activeTab = tabs.find(t => t.id === activeTabId);
    if (activeTab) {
      activeTab.content = this.value;
    }
    saveTabs();
  });

  // ===== Window Management =====
  const windows = {
    'files-window': { el: null, visible: false },
    'notepad-window': { el: null, visible: false },
  };

  function toggleWindow(id) {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.classList.contains('visible')) {
      el.classList.remove('visible');
      windows[id].visible = false;
    } else {
      el.classList.add('visible');
      windows[id].visible = true;
      if (id === 'files-window') renderFiles();
      if (id === 'notepad-window') {
        getTabsData();
        renderTabs();
      }
    }
    updateDockActive();
  }

  function updateDockActive() {
    document.getElementById('open-files').classList.toggle('active', windows['files-window'].visible);
    document.getElementById('open-notepad').classList.toggle('active', windows['notepad-window'].visible);
  }

  document.getElementById('open-files').addEventListener('click', function() {
    toggleWindow('files-window');
    document.getElementById('topbar-app-name').textContent = 'Files';
  });

  document.getElementById('open-notepad').addEventListener('click', function() {
    toggleWindow('notepad-window');
    document.getElementById('topbar-app-name').textContent = 'Text Editor';
  });

  document.querySelectorAll('.win-close').forEach(btn => {
    btn.addEventListener('click', function() {
      const winId = this.getAttribute('data-close');
      toggleWindow(winId);
    });
  });

  // ===== Draggable Windows =====
  document.querySelectorAll('.win-titlebar[data-drag]').forEach(titlebar => {
    let isDragging = false;
    let startX, startY, origLeft, origTop;

    titlebar.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('win-close')) return;
      isDragging = true;
      const winId = this.getAttribute('data-drag');
      const win = document.getElementById(winId);
      startX = e.clientX;
      startY = e.clientY;
      origLeft = win.offsetLeft;
      origTop = win.offsetTop;
      win.style.zIndex = 60;
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      const winId = titlebar.getAttribute('data-drag');
      const win = document.getElementById(winId);
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      win.style.left = (origLeft + dx) + 'px';
      win.style.top = (origTop + dy) + 'px';
    });

    document.addEventListener('mouseup', function() {
      isDragging = false;
    });
  });

  // ===== Init =====
  renderFiles();
  ensureTabs();
  renderTabs();
})();
</script>
</body>
</html>
