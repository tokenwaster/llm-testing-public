<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initiallag=1.0">
    <title>Ubuntu Desktop Clone</title>
    <style>
        :root {
            --ubuntu-orange: #e95420;
            --ubuntu-purple: #3d5a80;
            --ubuntu-dark: #2c001e;
            --window-bg: #300a24;
            --taskbar-bg: rgba(0, 0, 0, 0.6);
            --text-color: #ffffff;
            --header-bg: #4e6781;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Ubuntu', sans-serif, Arial;
        }

        #desktop {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2c001e 0%, #3d5a80 100%);
            position: relative;
            overflow: hidden;
        }

        #taskbar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--taskbar-bg);
            padding: 8px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            backdrop-filter: blur(10px);
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .launcher-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .launcher-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            border-radius: 50%;
        }

        /* Window Styles */
        .window {
            position: absolute;
            min-width: 360px;
            min-height: 240px;
            background: var(--window-bg);
            color: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .win-header {
            background: var(--header-bg);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .win-title {
            font-size: 14px;
            font-weight: bold;
        }

        .win-controls {
            display: flex;
            gap: 8px;
        }

        .win-close {
            background: #e95420;
            border: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
        }

        .win-content {
            flex: 1;
            padding: 15px;
            overflow: auto;
            position: relative;
        }

        /* Files App Styles */
        #files-path {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: block;
            word-break: break-all;
        }

        #files-up {
            cursor: pointer;
            color: var(--ubuntu-orange);
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }

        .fs-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }

        .fs-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
        }

        .fs-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .fs-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 5px;
            background: #666;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Notepad Styles */
        #tabs {
            display: flex;
            gap: 2px;
            background: rgba(0,0,0,0.2);
            padding: 5px 5px 0 5px;
        }

        .tab {
            padding: 6px 12px;
            background: #444;
            color: #ccc;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--window-bg);
            color: white;
        }

        #new-tab {
            padding: 2px 8px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            font-size: 18px;
        }

        #editor {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            outline: none;
            font-family: monospace;
            padding: 5px;
        }

        .notepad-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
    </wrap>
    </style>
</head>
<body>

<div id="desktop">
    <!-- Taskbar -->
    <div id="taskbar">
        <button id="open-files" class="launcher-btn" title="Files">📁</button>
        <button id="open-notepad" class="launcher-btn" title="Notepad">📝</button>
    </div>

    <!-- Files Window -->
    <div id="files-window" class="window">
        <div class="win-header">
            <span class="win-title">Files</span>
            <div class="win-controls">
                <button class="win-close"></button>
            </div>
        </div>
        <div class="win-content">
            <div id="files-up" style="display:none;">&larr; Up</div>
            <div id="files-path">/</div>
            <div id="fs-container" class="fs-list"></div>
        </div>
    </div>

    <!-- Notepad Window -->
    <div id="notepad-window" class="window">
        <div class="win-header">
            <span class="win-title">Notepad</span>
            <div class="win-controls">
                <button class="win-close"></button>
            </div>
        </div>
        <div class="notepad-container">
            <div id="tabs">
                <!-- Tabs injected here -->
                <button id="new-tab">+</button>
            </div>
            <div class="win-content" style="padding:0;">
                <textarea id="editor"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    /** 
     * FILESYSTEM LOGIC
     */
    const fsTree = {
        name: '/',
        type: 'dir',
        children: [
            { name: 'bin', type: 'dir', children: [] },
            { name: 'etc', type: 'dir', children: [] },
            { name: 'home', type: 'dir', children: [
                { name: 'user', type: 'dir', children: [
                    { name: 'Documents', type: 'dir', children: [] },
                    { name: 'Downloads', type: 'dir', children: [] },
                    { name: 'Pictures', type: 'dir', children: [] }
                ]}
            ]},
            { name: 'usr', type: 'dir', children: [] },
            { name: 'var', type: 'dir', children: [] }
        ]
    };

    let currentDir = fsTree;
    const pathDisplay = document.getElementById('files-path');
    const fsContainer = document.getElementById('fs-container');
    const filesUpBtn = document.getElementById('files-up');

    function getFullPath(node, root) {
        // This is a simplified way to find the path by traversing up if we had parent refs
        // But since we'll track currentDir as a reference, let's just build it via a search or stack.
        // For this implementation, we will maintain a 'stack' of directories.
    }

    let dirStack = [fsTree];

    function renderFiles() {
        const dir = dirStack[dirStack.length - 1];
        
        // Update Path Text
        let pathStr = "";
        for(let i=0; i<dirStack.length; i++) {
            if (dirStack[i].name === '/') pathStr += "/";
            else pathStr += "/" + dirStack[i].name;
        }
        pathDisplay.innerText = pathStr === "" ? "/" : pathStr.replace('//', '/');

        // Update Up Button
        filesUpBtn.style.display = dirStack.length > 1 ? 'block' : 'none';
        filesUpBtn.onclick = () => {
            dirStack.pop();
            renderFiles();
        };

        fsContainer.innerHTML = '';
        dir.children.forEach(child => {
            const item = document.createElement('div');
            item.className = 'fs-item';
            
            const icon = document.createElement('div');
            icon.className = 'fs-icon';
            icon.innerText = child.type === 'dir' ? '📁' : '📄';
            
            const label = document.createElement('span');
            label.innerText = child.name;

            item.appendChild(icon);
            item.appendChild(label);
            
            item.ondblclick = () => {
                if (child.type === 'dir') {
                    dirStack.push(child);
                    renderFiles();
                }
            };
            fsContainer.appendChild(item);
        });
    }

    /** 
     * NOTEPAD LOGIC
     */
    let tabs = [];
    let activeTabId = null;
    const tabStrip = document.getElementById('tabs');
    const editor = document.topElement || document.getElementById('editor'); // fallback
    const editorEl = document.getElementById('editor');
    const newTabBtn = document.getElementById('new-tab');

    function loadNotepad() {
        const saved = localStorage.getItem('ubuntu_notepad');
        if (saved) {
            const data = JSON.parse(saved);
            tabs = data.tabs;
            activeTabId = data.activeTabId;
        } else {
            const initialId = Date.now();
            tabs = [{ id: initialId, title: 'Untitled', content: '' }];
            activeTabId = initialId;
        }
        renderTabs();
    }

    function saveNotepad() {
        localStorage.setItem('ubuntu_notepad', JSON.stringify({
            tabs: tabs,
            activeTabId: activeTabId
        }));
    }

    function renderTabs() {
        // Clear existing tabs (keep the + button)
        const buttons = tabStrip.querySelectorAll('.tab');
        buttons.forEach(b => b.remove());

        tabs.forEach(tab => {
            const t = document.createElement('div');
            t.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
            t.innerText = tab.title;
            t.onclick = () => switchTab(tab.id);
            tabStrip.insertBefore(t, newTabBtn);
        });

        const activeTab = tabs.find(t => t.id === activeTabId);
        editorEl.value = activeTab ? activeTab.content : '';
    }

    function switchTab(id) {
        activeTabId = id;
        renderTabs();
        saveNotepad();
    }

    newTabBtn.onclick = () => {
        const newId = Date.now();
        tabs.push({ id: newId, title: 'New Tab', content: '' });
        activeTabId = newEVentId = newId;
        renderTabs();
        saveNotepad();
    };

    editorEl.oninput = (e) => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) {
            tab.content = e.target.value;
            // Update title if it's the first line
            const lines = tab.content.split('\n');
            tab.title = lines[0].substring(0, 15) || 'Untitled';
            saveNotepad();
            // We don't re-render tabs on every keystroke to avoid losing focus, 
            // but we update the title in the background.
        }
    };

    /**
     * WINDOW MANAGEMENT (DRAGGING & CLOSING)
     */
    function setupWindow(winId, launcherId) {
        const win = document.getElementById(winId);
        const launcher = document.getElementById(launcherId);
        const closeBtn = win.querySelector('.win-close');
        const header = win.querySelector('.win-header');

        launcher.onclick = () => {
            win.style.display = 'flex';
            bringToFront(win);
        };

        closeBtn.onclick = () => {
            win.style.display = 'none';
        };

        // Dragging logic
        let isDragging = false;
        let offsetX, offsetY;

        header.onmousedown = (e) => {
            isDragging = true;
            offsetX = e.clientX - win.offsetLeft;
            offsetY = e.clientY - win.offsetTop;
            bringToFront(win);
        };

        document.onmousemove = (e) => {
            if (!isDragging) return;
            win.style.left = (e.clientX - offsetX) + 'px';
            win.style.top = (e.clientY - offsetY) + 'px';
        };

        document.onmouseup = () => {
            isDragging = false;
        };
    }

    let zCounter = 100;
    function bringToFront(win) {
        zCounter++;
        win.style.zIndex = zCounter;
    }

    // Initialize everything
    window.onload = () => {
        renderFiles();
        loadNotepad();
        setupWindow('files-window', 'open-files');
        setupWindow('notepad-window', 'open-notepad');
    };
</script>

</body>
</html>
