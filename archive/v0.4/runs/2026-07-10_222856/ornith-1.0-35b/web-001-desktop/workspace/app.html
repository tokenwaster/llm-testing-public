<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }

  #desktop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #2c001e 0%, #4a0033 25%, #1a3a5c 60%, #0d1f3c 100%);
    display: flex;
    flex-direction: column;
    z-index: 0;
  }

  /* Top bar */
  #topbar {
    height: 28px;
    background: rgba(20, 20, 20, 0.95);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    color: #e0e0e0;
    font-size: 13px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #topbar .left { display: flex; align-items: center; gap: 16px; }
  #topbar .center { color: #aaa; font-size: 12px; letter-spacing: 0.3px; }
  #topbar .right { display: flex; align-items: center; gap: 14px; }

  /* Taskbar / Dock */
  #taskbar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(30, 30, 30, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 14px;
    padding: 6px 10px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 90;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .dock-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
  }
  .dock-btn:hover { transform: scale(1.1); }
  .dock-btn:active { transform: scale(0.95); }

  #open-files { background: linear-gradient(135deg, #e8721a, #d4600f); color: white; font-size: 20px; }
  #open-notepad { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-size: 20px; }

  .dock-btn .dot {
    position: absolute;
    bottom: -4px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #ff9f43;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .dock-btn.active .dot { opacity: 1; }

  /* Windows */
  .app-window {
    position: absolute;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    min-width: 360px;
    min-height: 240px;
    z-index: 50;
    animation: windowOpen 0.2s ease-out;
  }

  @keyframes windowOpen {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .win-titlebar {
    height: 38px;
    background: rgba(45, 45, 45, 0.97);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: default;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .win-titlebar .title {
    color: #ccc;
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    text-align: center;
    margin-right: 60px;
  }

  .win-controls {
    position: absolute;
    right: 8px;
    display: flex;
    gap: 7px;
  }

  .win-controls button {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: transparent;
    transition: all 0.15s;
    background: rgba(255,255,255,0.08);
  }
  .win-controls button:hover { color: #333; }
  .win-close-btn { background: #e74c3c !important; }
  .win-close-btn:hover { background: #ff6b6b !important; color: white !important; }

  .win-body {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
  }

  /* Files app */
  #files-window { width: 720px; height: 480px; top: 60px; left: 100px; background: #2d2d2d; }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: rgba(50, 50, 50, 0.95);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #files-up {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,0.07);
    color: #ccc;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #files-up:hover { background: rgba(255,255,255,0.14); color: white; }

  #files-path {
    flex: 1;
    height: 32px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.25);
    color: #e8a040;
    font-size: 13px;
    padding: 0 12px;
    outline: none;
    font-family: 'Ubuntu Mono', 'Consolas', monospace;
  }
  #files-path:focus { border-color: rgba(255,160,64,0.5); }

  .files-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .fs-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    color: #e0e0e0;
    font-size: 14px;
  }
  .fs-item:hover { background: rgba(255,255,255,0.07); }
  .fs-item.selected { background: rgba(59, 130, 246, 0.25); }

  .fs-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  .fs-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fs-size { color: #888; font-size: 12px; flex-shrink: 0; }

  /* Notepad app */
  #notepad-window { width: 640px; height: 460px; top: 80px; left: 180px; background: #2d2d2d; }

  .notepad-tabs-bar {
    display: flex;
    align-items: center;
    background: rgba(35, 35, 35, 0.97);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    min-height: 38px;
    padding: 4px 8px 0;
    gap: 2px;
  }

  #new-tab {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,0.07);
    color: #ccc;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    margin-right: 4px;
    flex-shrink: 0;
  }
  #new-tab:hover { background: rgba(255,255,255,0.14); color: white; }

  #tabs {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    overflow-x: auto;
    flex: 1;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 8px 8px 0 0;
    background: rgba(255,255,255,0.04);
    color: #aaa;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    border: 1px solid transparent;
    border-bottom: none;
    position: relative;
    min-width: 80px;
  }
  .tab:hover { background: rgba(255,255,255,0.08); color: #ddd; }
  .tab.active {
    background: rgba(50, 50, 50, 0.95);
    color: #fff;
    border-color: rgba(255,255,255,0.06);
  }

  .tab-close {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    flex-shrink: 0;
  }
  .tab-close:hover { background: rgba(231,76,60,0.8); color: white; }

  #editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #editor {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: #2d2d2d;
    color: #e8e8e8;
    font-family: 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px 16px;
    tab-size: 2;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* Window drag highlight */
  .app-window.dragging { opacity: 0.92; box-shadow: 0 16px 64px rgba(0,0,0,0.6); }
</style>
</head>
<body>

<div id="desktop">
  <!-- Top bar -->
  <div id="topbar">
    <div class="left">
      <span style="font-weight:700;letter-spacing:0.5px;">Activities</span>
    </div>
    <div class="center" id="clock"></div>
    <div class="right">
      <span>🔊</span>
      <span>📶</span>
      <span>🔋 87%</span>
    </div>
  </div>

  <!-- Windows container -->
  <div id="windows-container"></div>

  <!-- Taskbar / Dock -->
  <div id="taskbar">
    <button class="dock-btn" id="open-files" title="Files">
      📁
      <span class="dot"></span>
    </button>
    <button class="dock-btn" id="open-notepad" title="Notepad">
      ✏️
      <span class="dot"></span>
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById('clock').textContent = now.toLocaleDateString('en-US', opts);
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Filesystem data ──
  const fs = {
    '/': [
      { name: 'bin', type: 'folder' },
      { name: 'boot', type: 'folder' },
      { name: 'dev', type: 'folder' },
      { name: 'etc', type: 'folder' },
      { name: 'home', type: 'folder' },
      { name: 'lib', type: 'folder' },
      { name: 'media', type: 'folder' },
      { name: 'mnt', type: 'folder' },
      { name: 'opt', type: 'folder' },
      { name: 'proc', type: 'folder' },
      { name: 'root', type: 'folder' },
      { name: 'run', type: 'folder' },
      { name: 'sbin', type: 'folder' },
      { name: 'srv', type: 'folder' },
      { name: 'sys', type: 'folder' },
      { name: 'tmp', type: 'folder' },
      { name: 'usr', type: 'folder' },
      { name: 'var', type: 'folder' }
    ],
    '/bin': [
      { name: 'bash', type: 'file', size: '1.2M' },
      { name: 'cat', type: 'file', size: '34K' },
      { name: 'cp', type: 'file', size: '67K' },
      { name: 'ls', type: 'file', size: '45K' },
      { name: 'mkdir', type: 'file', size: '28K' },
      { name: 'rm', type: 'file', size: '31K' }
    ],
    '/boot': [
      { name: 'grub', type: 'folder' },
      { name: 'vmlinuz', type: 'file', size: '8.4M' },
      { name: 'initrd.img', type: 'file', size: '22M' }
    ],
    '/dev': [
      { name: 'sda', type: 'file', size: '' },
      { name: 'sdb', type: 'file', size: '' },
      { name: 'null', type: 'file', size: '' },
      { name: 'zero', type: 'file', size: '' }
    ],
    '/etc': [
      { name: 'passwd', type: 'file', size: '1.2K' },
      { name: 'hostname', type: 'file', size: '8B' },
      { name: 'fstab', type: 'file', size: '512B' },
      { name: 'ssh', type: 'folder' },
      { name: 'network', type: 'folder' }
    ],
    '/etc/ssh': [
      { name: 'sshd_config', type: 'file', size: '3.4K' },
      { name: 'ssh_host_rsa_key', type: 'file', size: '1.7K' }
    ],
    '/etc/network': [
      { name: 'interfaces', type: 'file', size: '256B' }
    ],
    '/home': [
      { name: 'user', type: 'folder' },
      { name: '.bashrc', type: 'file', size: '3.7K' }
    ],
    '/home/user': [
      { name: 'Documents', type: 'folder' },
      { name: 'Downloads', type: 'folder' },
      { name: 'Pictures', type: 'folder' },
      { name: 'Music', type: 'folder' },
      { name: '.bashrc', type: 'file', size: '3.7K' },
      { name: '.profile', type: 'file', size: '802B' }
    ],
    '/home/user/Documents': [
      { name: 'report.txt', type: 'file', size: '14K' },
      { name: 'notes.md', type: 'file', size: '2.3K' },
      { name: 'todo.list', type: 'file', size: '512B' }
    ],
    '/home/user/Downloads': [
      { name: 'ubuntu-24.04.iso', type: 'file', size: '4.7G' },
      { name: 'archive.tar.gz', type: 'file', size: '156M' }
    ],
    '/home/user/Pictures': [
      { name: 'wallpaper.png', type: 'file', size: '2.1M' },
      { name: 'screenshot-01.png', type: 'file', size: '890K' }
    ],
    '/home/user/Music': [
      { name: 'playlist.m3u', type: 'file', size: '128B' }
    ],
    '/lib': [
      { name: 'modules', type: 'folder' },
      { name: 'ld.so.cache', type: 'file', size: '45K' }
    ],
    '/media': [],
    '/mnt': [],
    '/opt': [
      { name: 'vscode', type: 'folder' }
    ],
    '/proc': [
      { name: 'cpuinfo', type: 'file', size: '' },
      { name: 'meminfo', type: 'file', size: '' },
      { name: 'version', type: 'file', size: '' }
    ],
    '/root': [
      { name: '.bash_history', type: 'file', size: '4.2K' }
    ],
    '/run': [],
    '/sbin': [
      { name: 'fdisk', type: 'file', size: '89K' },
      { name: 'mkfs.ext4', type: 'file', size: '156K' }
    ],
    '/srv': [],
    '/sys': [],
    '/tmp': [
      { name: '.X11-unix', type: 'folder' },
      { name: 'pip-root-abc123', type: 'folder' }
    ],
    '/usr': [
      { name: 'bin', type: 'folder' },
      { name: 'lib', type: 'folder' },
      { name: 'local', type: 'folder' },
      { name: 'share', type: 'folder' }
    ],
    '/usr/bin': [
      { name: 'python3', type: 'file', size: '5.6M' },
      { name: 'node', type: 'file', size: '42M' },
      { name: 'git', type: 'file', size: '8.9M' }
    ],
    '/usr/lib': [
      { name: 'x86_64-linux-gnu', type: 'folder' }
    ],
    '/usr/local': [
      { name: 'bin', type: 'folder' },
      { name: 'lib', type: 'folder' }
    ],
    '/usr/share': [
      { name: 'man', type: 'folder' },
      { name: 'doc', type: 'folder' }
    ],
    '/var': [
      { name: 'log', type: 'folder' },
      { name: 'cache', type: 'folder' },
      { name: 'lib', type: 'folder' },
      { name: 'tmp', type: 'folder' }
    ],
    '/var/log': [
      { name: 'syslog', type: 'file', size: '1.2M' },
      { name: 'auth.log', type: 'file', size: '340K' },
      { name: 'kern.log', type: 'file', size: '890K' }
    ],
    '/var/cache': [
      { name: 'apt', type: 'folder' }
    ],
    '/var/lib': [],
    '/var/tmp': []
  };

  // ── Files app ──
  let filesWindow = null;
  let currentPath = '/';

  function getIcon(name, type) {
    if (type === 'folder') return '📁';
    const ext = name.split('.').pop().toLowerCase();
    const icons = { txt: '📄', md: '📝', list: '📋', iso: '💿', tar: '📦', gz: '📦', m3u: '🎵', png: '🖼️', jpg: '🖼️', sh: '⚙️', conf: '⚙️', cfg: '⚙️' };
    return icons[ext] || '📄';
  }

  function renderFiles() {
    const list = document.querySelector('.files-list');
    if (!list) return;
    list.innerHTML = '';
    const entries = fs[currentPath] || [];
    // Sort: folders first, then files
    const sorted = [...entries].sort((a, b) => {
      if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });

    for (const entry of sorted) {
      const item = document.createElement('div');
      item.className = 'fs-item';
      item.innerHTML = `
        <span class="fs-icon">${getIcon(entry.name, entry.type)}</span>
        <span class="fs-name">${entry.name}</span>
        ${entry.size ? `<span class="fs-size">${entry.size}</span>` : ''}
      `;

      if (entry.type === 'folder') {
        item.addEventListener('dblclick', () => {
          currentPath = currentPath === '/' ? '/' + entry.name : currentPath + '/' + entry.name;
          renderFiles();
          const pathEl = document.getElementById('files-path');
          if (pathEl) pathEl.value = currentPath;
        });
      }

      list.appendChild(item);
    }
  }

  function openFiles() {
    if (filesWindow && !filesWindow.closed) {
      filesWindow.focus();
      return;
    }
    const container = document.getElementById('windows-container');
    const win = document.createElement('div');
    win.id = 'files-window';
    win.className = 'app-window';
    win.innerHTML = `
      <div class="win-titlebar" data-drag="true">
        <span class="title">Files</span>
        <div class="win-controls">
          <button class="win-close-btn win-close" title="Close">✕</button>
        </div>
      </div>
      <div class="win-body">
        <div class="files-toolbar">
          <button id="files-up" title="Go up">↑</button>
          <input type="text" id="files-path" value="/" readonly />
        </div>
        <div class="files-list"></div>
      </div>
    `;
    container.appendChild(win);

    // Close button
    win.querySelector('.win-close').addEventListener('click', () => {
      win.remove();
      filesWindow = null;
      updateDockDots();
    });

    // Up navigation
    document.getElementById('files-up').addEventListener('click', () => {
      if (currentPath === '/') return;
      currentPath = currentPath.replace(/\/[^/]+$/, '') || '/';
      renderFiles();
      const pathEl = document.getElementById('files-path');
      if (pathEl) pathEl.value = currentPath;
    });

    // Make draggable
    makeDraggable(win);

    filesWindow = win;
    updateDockDots();
    renderFiles();
  }

  function closeFiles() {
    const w = document.getElementById('files-window');
    if (w) w.remove();
    filesWindow = null;
    updateDockDots();
  }

  // ── Notepad app ──
  let notepadWindow = null;
  const STORAGE_KEY = 'notepad-tabs';

  function loadTabs() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveTabs(tabs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
  }

  let activeTabIndex = 0;

  function renderNotepad() {
    const tabsContainer = document.getElementById('tabs');
    if (!tabsContainer) return;
    const tabs = loadTabs();
    tabsContainer.innerHTML = '';
    tabs.forEach((tab, i) => {
      const el = document.createElement('div');
      el.className = 'tab' + (i === activeTabIndex ? ' active' : '');
      const name = tab.name || `Untitled ${i + 1}`;
      el.innerHTML = `<span class="tab-label">${name}</span><button class="tab-close" data-idx="${i}">✕</button>`;

      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-close')) return;
        activeTabIndex = i;
        renderNotepad();
        const editor = document.getElementById('editor');
        if (editor) editor.value = tabs[i].content || '';
      });

      el.querySelector('.tab-close').addEventListener('click', () => {
        const updated = loadTabs();
        updated.splice(i, 1);
        saveTabs(updated);
        if (activeTabIndex >= updated.length && updated.length > 0) activeTabIndex = updated.length - 1;
        else if (updated.length === 0) activeTabIndex = 0;
        renderNotepad();
        const editor = document.getElementById('editor');
        if (editor && updated.length > 0) editor.value = updated[activeTabIndex].content || '';
      });

      tabsContainer.appendChild(el);
    });

    // Update editor content
    const editor = document.getElementById('editor');
    if (editor) {
      const tabs = loadTabs();
      if (tabs[activeTabIndex]) {
        editor.value = tabs[activeTabIndex].content || '';
      } else {
        editor.value = '';
      }
    }
  }

  function openNotepad() {
    if (notepadWindow && !notepadWindow.closed) {
      notepadWindow.focus();
      return;
    }

    // Ensure at least one tab exists
    let tabs = loadTabs();
    if (tabs.length === 0) {
      tabs.push({ name: 'Untitled', content: '' });
      saveTabs(tabs);
    }
    activeTabIndex = Math.min(activeTabIndex, tabs.length - 1);

    const container = document.getElementById('windows-container');
    const win = document.createElement('div');
    win.id = 'notepad-window';
    win.className = 'app-window';
    win.innerHTML = `
      <div class="win-titlebar" data-drag="true">
        <span class="title">Text Editor</span>
        <div class="win-controls">
          <button class="win-close-btn win-close" title="Close">✕</button>
        </div>
      </div>
      <div class="notepad-tabs-bar">
        <button id="new-tab" title="New tab">+</button>
        <div id="tabs"></div>
      </div>
      <div id="editor-wrap">
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
    `;
    container.appendChild(win);

    // Close button
    win.querySelector('.win-close').addEventListener('click', () => {
      saveTabs(loadTabs());
      win.remove();
      notepadWindow = null;
      updateDockDots();
    });

    // New tab
    document.getElementById('new-tab').addEventListener('click', () => {
      const tabs = loadTabs();
      const idx = tabs.length + 1;
      tabs.push({ name: `Untitled ${idx}`, content: '' });
      saveTabs(tabs);
      activeTabIndex = tabs.length - 1;
      renderNotepad();
    });

    // Editor input → persist
    document.getElementById('editor').addEventListener('input', () => {
      const editor = document.getElementById('editor');
      const tabs = loadTabs();
      if (tabs[activeTabIndex]) {
        tabs[activeTabIndex].content = editor.value;
        saveTabs(tabs);
      }
    });

    // Tab key in textarea inserts spaces
    document.getElementById('editor').addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const ta = e.target;
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 2;
      }
    });

    makeDraggable(win);

    notepadWindow = win;
    updateDockDots();
    renderNotepad();
  }

  function closeNotepad() {
    saveTabs(loadTabs());
    const w = document.getElementById('notepad-window');
    if (w) w.remove();
    notepadWindow = null;
    updateDockDots();
  }

  // ── Dock dots ──
  function updateDockDots() {
    const filesBtn = document.getElementById('open-files');
    const notesBtn = document.getElementById('open-notepad');
    if (filesWindow) filesBtn.classList.add('active'); else filesBtn.classList.remove('active');
    if (notepadWindow) notesBtn.classList.add('active'); else notesBtn.classList.remove('active');
  }

  // ── Draggable windows ──
  function makeDraggable(win) {
    const titlebar = win.querySelector('.win-titlebar');
    let isDragging = false, startX, startY, origX, origY;

    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('win-close') || e.target.closest('.win-controls')) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = win.getBoundingClientRect();
      origX = rect.left;
      origY = rect.top;
      win.classList.add('dragging');

      // Bring to front
      document.querySelectorAll('.app-window').forEach(w => w.style.zIndex = 50);
      win.style.zIndex = 60;

      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      win.style.left = (origX + dx) + 'px';
      win.style.top = (origY + dy) + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        win.classList.remove('dragging');
      }
    });
  }

  // ── Launcher buttons ──
  document.getElementById('open-files').addEventListener('click', openFiles);
  document.getElementById('open-notepad').addEventListener('click', openNotepad);

})();
</script>
</body>
</html>
