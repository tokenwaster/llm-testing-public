<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game with 24 Bots</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            color: #4cc9f0;
            text-shadow: 0 0 5px rgba(76, 201, 240, 0.5);
        }
        
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        #maze {
            width: 600px;
            height: 600px;
            background-color: #16213e;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .hud {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 200px;
        }
        
        .hud-panel {
            background-color: #16213e;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        
        .hud-title {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .hud-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4cc9f0;
        }
        
        button#reset {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(233, 69, 96, 0.3);
        }
        
        button#reset:hover {
            background-color: #ff5e78;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(233, 69, 96, 0.4);
        }
        
        button#reset:active {
            transform: translateY(0);
        }
        
        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #a0a0c0;
            max-width: 800px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Maze Game with 24 Bots</h1>
    
    <div class="game-container">
        <canvas id="maze" width="600" height="600"></canvas>
        
        <div class="hud">
            <div class="hud-panel">
                <div class="hud-title">Completed Bots</div>
                <div id="completed" class="hud-value">0</div>
            </div>
            
            <div class="hud-panel">
                <div class="hud-title">Time Elapsed</div>
                <div id="timer" class="hud-value">0.0s</div>
            </div>
            
            <button id="reset">Reset Game</button>
        </div>
    </div>
    
    <p class="instructions">
        Watch 24 autonomous pathfinding bots navigate through a randomly generated maze.
        Each bot uses BFS to find the shortest path from spawn (bottom-left) to exit (top-right).
    </p>

    <script>
        // Maze dimensions
        const MAZE_WIDTH = 15;
        const MAZE_HEIGHT = 15;
        
        // Canvas setup
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');
        const CELL_SIZE = Math.min(canvas.width, canvas.height) / MAZE_WIDTH;
        
        // Game state
        let maze = [];
        let bots = [];
        let completedCount = 0;
        let startTime = 0;
        let animationId = null;
        let isRunning = false;
        
        // Bot class
        class Bot {
            constructor(x, y) {
                this.startX = x;
                this.startY = y;
                this.x = x;
                this.y = y;
                this.path = [];
                this.pathIndex = 0;
                this.completed = false;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            }
            
            reset() {
                this.x = this.startX;
                this.y = this.startY;
                this.path = [];
                this.pathIndex = 0;
                this.completed = false;
            }
        }
        
        // Maze generation using recursive backtracking
        function generateMaze(width, height) {
            const maze = Array(height).fill().map(() => Array(width).fill(1));
            
            function isInside(x, y) {
                return x >= 0 && x < width && y >= 0 && y < height;
            }
            
            function carve(x, y) {
                maze[y][x] = 0;
                
                const directions = [
                    { dx: 0, dy: -2 }, // up
                    { dx: 2, dy: 0 },  // right
                    { dx: 0, dy: 2 },  // down
                    { dx: -2, dy: 0 }  // left
                ];
                
                // Shuffle directions for randomness
                directions.sort(() => Math.random() - 0.5);
                
                for (const dir of directions) {
                    const nx = x + dir.dx;
                    const ny = y + dir.dy;
                    
                    if (isInside(nx, ny) && maze[ny][nx] === 1) {
                        maze[y + dir.dy / 2][x + dir.dx / 2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            
            // Start carving from (1,1)
            carve(1, 1);
            
            // Ensure exit at bottom-right is open
            maze[height - 2][width - 1] = 0;
            maze[height - 1][width - 2] = 0;
            
            return maze;
        }
        
        // BFS pathfinding
        function findPath(startX, startY, endX, endY) {
            const queue = [{ x: startX, y: startY }];
            const visited = new Set();
            visited.add(`${startX},${startY}`);
            const parentMap = new Map();
            
            while (queue.length > 0) {
                const { x, y } = queue.shift();
                
                if (x === endX && y === endY) {
                    // Reconstruct path
                    const path = [];
                    let curr = `${endX},${endY}`;
                    while (curr !== `${startX},${startY}`) {
                        const [cx, cy] = curr.split(',').map(Number);
                        path.push({ x: cx, y: cy });
                        curr = parentMap.get(curr);
                    }
                    path.push({ x: startX, y: startY });
                    return path.reverse();
                }
                
                const directions = [
                    { dx: 0, dy: -1 }, // up
                    { dx: 1, dy: 0 },  // right
                    { dx: 0, dy: 1 },  // down
                    { dx: -1, dy: 0 }  // left
                ];
                
                for (const dir of directions) {
                    const nx = x + dir.dx;
                    const ny = y + dir.dy;
                    
                    if (
                        isInside(nx, ny) && 
                        maze[ny][nx] === 0 && 
                        !visited.has(`${nx},${ny}`)
                    ) {
                        visited.add(`${nx},${ny}`);
                        parentMap.set(`${nx},${ny}`, `${x},${y}`);
                        queue.push({ x: nx, y: ny });
                    }
                }
            }
            
            return []; // No path found
        }
        
        function isInside(x, y) {
            return x >= 0 && x < MAZE_WIDTH && y >= 0 && y < MAZE_HEIGHT;
        }
        
        // Initialize game
        function initGame() {
            // Generate maze
            maze = generateMaze(MAZE_WIDTH, MAZE_HEIGHT);
            
            // Reset bots
            bots = [];
            for (let i = 0; i < 24; i++) {
                const bot = new Bot(1, MAZE_HEIGHT - 2); // Spawn near bottom-left
                bot.path = findPath(bot.x, bot.y, MAZE_WIDTH - 2, 1); // Path to exit near top-right
                bots.push(bot);
            }
            
            completedCount = 0;
            startTime = Date.now();
            isRunning = true;
            
            updateHUD();
        }
        
        // Update HUD elements
        function updateHUD() {
            document.getElementById('completed').textContent = completedCount;
            
            const elapsedMs = Date.now() - startTime;
            document.getElementById('timer').textContent = (elapsedMs / 1000).toFixed(1) + 's';
            
            return elapsedMs;
        }
        
        // Draw maze and bots
        function draw() {
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cellSize = Math.min(canvas.width, canvas.height) / MAZE_WIDTH;
            
            // Draw walls
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (maze[y][x] === 1) {
                        ctx.fillStyle = '#3a4a7a';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        
                        // Add wall texture
                        ctx.strokeStyle = '#2d3c65';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x * cellSize + 2, y * cellSize + 2, cellSize - 4, cellSize - 4);
                    }
                }
            }
            
            // Draw spawn area
            ctx.fillStyle = 'rgba(76, 201, 240, 0.2)';
            ctx.fillRect((MAZE_WIDTH - 1) * cellSize, (MAZE_HEIGHT - 1) * cellSize, cellSize, cellSize);
            
            // Draw exit area
            ctx.fillStyle = 'rgba(76, 201, 240, 0.2)';
            ctx.fillRect(0, 0, cellSize, cellSize);
            
            // Draw bots
            for (const bot of bots) {
                if (!bot.completed) {
                    const cx = bot.x * cellSize + cellSize / 2;
                    const cy = bot.y * cellSize + cellSize / 2;
                    
                    ctx.beginPath();
                    ctx.arc(cx, cy, cellSize / 3, 0, Math.PI * 2);
                    ctx.fillStyle = bot.color;
                    ctx.fill();
                    
                    // Add glow effect
                    ctx.shadowColor = bot.color;
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }
            
            // Draw completed bots at exit
            for (const bot of bots) {
                if (bot.completed) {
                    const cx = (MAZE_WIDTH - 2) * cellSize + cellSize / 2;
                    const cy = 1 * cellSize + cellSize / 2;
                    
                    ctx.beginPath();
                    ctx.arc(cx, cy, cellSize / 4, 0, Math.PI * 2);
                    ctx.fillStyle = bot.color;
                    ctx.fill();
                }
            }
        }
        
        // Animation loop
        function animate() {
            if (!isRunning) return;
            
            updateHUD();
            draw();
            
            animationId = requestAnimationFrame(animate);
        }
        
        // Start game
        initGame();
        animate();
        
        // Expose game API on window
        window.game = {
            get bots() {
                return bots;
            },
            
            get completed() {
                return completedCount;
            },
            
            get elapsedMs() {
                return Date.now() - startTime;
            },
            
            tick(n) {
                for (let step = 0; step < n; step++) {
                    let activeBots = false;
                    
                    for (const bot of bots) {
                        if (!bot.completed && bot.path.length > 1) {
                            // Move to next position in path
                            if (bot.pathIndex < bot.path.length - 1) {
                                bot.pathIndex++;
                                const nextPos = bot.path[bot.pathIndex];
                                bot.x = nextPos.x;
                                bot.y = nextPos.y;
                                
                                activeBots = true;
                                
                                // Check if reached exit
                                if (bot.x === MAZE_WIDTH - 2 && bot.y === 1) {
                                    bot.completed = true;
                                    completedCount++;
                                }
                            }
                        }
                    }
                    
                    // If no bots are moving, we can stop early
                    if (!activeBots) break;
                }
                
                updateHUD();
                draw();
            },
            
            reset() {
                cancelAnimationFrame(animationId);
                initGame();
                animate();
            }
        };
        
        // Reset button handler
        document.getElementById('reset').addEventListener('click', () => {
            window.game.reset();
        });
    </script>
</body>
</html>
