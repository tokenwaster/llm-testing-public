<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Desktop Clone</title>
    <style>
        :root {
            --ubuntu-orange: #e95420;
            --ubuntu-purple: #300a24;
            --ubuntu-dark: #2c001e;
            --window-bg: #3d3d3d;
            --taskbar-bg: rgba(0, 0, 0, 0.6);
            --text-color: #ffffff;
            --border-color: #555;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Ubuntu', sans-serif, Arial, sans-serif;
        }

        #desktop {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, var(--ubuntu-purple) 0%, var(--ubuntu-dark) 100%);
            position: relative;
            overflow: hidden;
        }

        /* Taskbar/Dock */
        #taskbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .launcher-btn {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 24px;
        }

        .launcher-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .launcher-btn:active {
            transform: scale(0.95);
        }

        /* Window Styles */
        .window {
            position: absolute;
            min-width: 360px;
            min-height: 240px;
            background: var(--window-bg);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .window-header {
            background: #2d2d2d;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .window-title {
            color: #ddd;
            font-size: 14px;
            font-weight: bold;
        }

        .win-close {
            background: #e95420;
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .win-close:hover {
            background: #ff6b4a;
        }

        .window-content {
            flex: 1;
            padding: 0;
            overflow: auto;
            color: white;
        }

        /* Files App Styles */
        #files-path {
            background: #222;
            padding: 5px 10px;
            font-size: 13px;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #files-up {
            cursor: pointer;
            color: var(--ubuntu-orange);
            font-weight: bold;
            margin-right: 5px;
        }

        .fs-list {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .fs-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            word-break: break-all;
        }

        .fs-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .fs-icon {
            font-size: 32px;
            margin-bottom: 5px;
        }

        /* Notepad App Styles */
        #tabs {
            display: flex;
            background: #222;
            padding: 5px 5px 0 5px;
            gap: 2px;
            border-bottom: 1px solid #444;
        }

        .tab {
            padding: 6px 15px;
            background: #333;
            color: #aaa;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .tab.active {
            background: var(--window-bg);
            color: white;
        }

        #new-tab {
            padding: 6px 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        #editor {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            resize: none;
            font-family: 'Courier New', monospace;
            outline: none;
        }

    </wrap>
    </style>
</head>
<body>

<div id="desktop">
    <!-- Windows will be injected here -->

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="launcher-btn" id="open-files" title="Files">📁</div>
        <div class="launcher-btn" id="open-notepad" title="Notepad">📝</div>
    </div>
</div>

<script>
    /** 
     * FILESYSTEM DATA 
     */
    const fsData = {
        'bin': {},
        'etc': {},
        'home': {
            'user': {
                'Documents': { 'resume.txt': null, 'budget.xlsx': null },
                'Downloads': { 'ubuntu-iso.dmg': null },
                'Pictures': { 'wallpaper.png': null }
            }
        },
        'usr': {},
        'var': {}
    };

    let currentPath = []; // Array of keys to traverse fsData

    /** 
     * NOTEPAD STATE 
     */
    let notepadTabs = []; // { id: string, title: string, content: string }
    let activeTabId = null;

    /**
     * UTILS
     */
    function getFolderAt(pathArr) {
        let current = fsData;
        for (const part of pathArr) {
            if (current[part] && typeof current[part] === 'object') {
                current = current[part];
            } else {
                return null;
            }
        }
        return current;
    }

    function formatPath(pathArr) {
        return '/' + pathArr.join('/');
    }

    /**
     * WINDOW MANAGEMENT
     */
    function createWindow(id, title, contentHtml) {
        // Check if already exists
        const existing = document.getElementById(id);
        if (existing) {
            existing.style.display = 'flex';
            return;
        }

        const win = document.createElement('div');
        win.id = id;
        win.className = 'window';
        win.style.top = '50px';
        win.style.left = '50px';
        
        win.innerHTML = `
            <div class="window-header">
                <span class="window-title">${title}</span>
                <button class="win-close">&times;</button>
            </div>
            <div class="window-content">
                ${contentHtml}
            </div>
        `;

        // Close functionality
        win.querySelector('.win-close').onclick = () => {
            win.style.display = 'none';
        };

        // Draggable logic
        const header = win.querySelector('.window-header');
        let isDragging = false;
        let offsetX, offsetY;

        header.onmousedown = (e) => {
            isDragging = true;
            offsetX = e.clientX - win.offsetLeft;
            offsetY = e.clientY - win.offsetTop;
            // Bring to front
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
            win.style.zIndex = 100;
        };

        document.onmousemove = (e) => {
            if (!isDragging) return;
            win.style.left = (e.clientX - offsetX) + 'px';
            win.style.top = (e.clientY - offsetY) + 'px';
        };

        document.onmouseup = () => {
            isDragging = false;
        };

        document.getElementById('desktop').appendChild(win);
    }

    /**
     * FILES APP LOGIC
     */
    function renderFiles() {
        const win = document.getElementById('files-window');
        if (!win) return;

        const content = win.querySelector('.window-content');
        const folder = getFolderAt(currentPath);
        
        let html = `
            <div id="files-path">
                ${currentPath.length > 0 ? '<span id="files-up">..</span>' : ''}
                <span>${formatPath(currentPath)}</span>
            </div>
            <div class="fs-list">
        `;

        for (const key in folder) {
            const isDir = typeof folder[key] === 'object' && folder[key] !== null;
            const icon = isDir ? '📁' : '📄';
            html += `
                <div class="fs-item" data-name="${key}" data-isdir="${isDir}">
                    <div class="fs-icon">${icon}</div>
                    <div class="fs-label">${key}</div>
                </div>
            `;
        }

        html += `</div>`;
        content.innerHTML = html;

        // Re-attach events
        const items = content.querySelectorAll('.fs-item');
        items.forEach(item => {
            item.ondblclick = () => {
                const name = item.getAttribute('data-name');
                const isDir = item.getAttribute('data-isdir') === 'true';
                if (isDir) {
                    currentPath.push(name);
                    renderFiles();
                }
            };
        });

        const upBtn = content.querySelector('#files-up');
        if (upBtn) {
            upBtn.onclick = () => {
                currentPath.pop();
                renderFiles();
            };
        }
    }

    /**
     * NOTEPAD APP LOGIC
     */
    function initNotepad() {
        const saved = localStorage.getItem('notepad_data');
        if (saved) {
            const parsed = JSON.parse(saved);
            notepadTabs = parsed.tabs || [];
            activeTabId = parsed.activeTabId || null;
        }

        if (notepadTabs.length === 0) {
            createNewTab();
        } else if (!notepadTabs.find(t => t.id === activeTabId)) {
            activeTabId = notepadTabs[0].id;
        }

        renderNotepad();
    }

    function createNewTab() {
        const id = 'tab-' + Date.now();
        const newTab = { id, title: 'Untitled', content: '' };
        notepadTabs.push(newTab);
        activeTabId = id;
        saveNotepad();
        renderNotepad();
    }

    function saveNotepad() {
        localStorage.setItem('notepad_data', JSON.stringify({
            tabs: notepadTabs,
            activeTabId: activeTabId
        }));
    }

    function renderNotepad() {
        const win = document.getElementById('notepad-window');
        if (!win) return;

        const content = win.querySelector('.window-content');
        const activeTab = notepadTabs.find(t => t.id === active ​activeTabId) || notepadTabs[0];

        let html = `
            <div id="tabs">
                ${notepadTabs.map(tab => `
                    <div class="tab ${tab.id === activeTabId ? 'active' : ''}" data-id="${tab.id}">
                        ${tab.title}
                    </div>
                `).join('')}
                <div id="new-tab">+</div>
            </div>
            <textarea id="editor" placeholder="Start typing...">${activeTab.content}</textarea>
        `;

        content.innerHTML = html;

        // Tab switching
        content.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                activeTabId = t.getAttribute('data-id');
                saveNotepad();
                renderNotepad();
            };
        });

        // New tab
        content.querySelector('#new-tab').onclick = () => {
            createNewTab();
        };

        // Editor content update
        const editor = content.querySelector('#editor');
        editor.oninput = (e) => {
            activeTab.content = e.target.value;
            saveNotepad();
        };
    }

    /**
     * INITIALIZATION
     */
    document.getElementById('open-files').onclick = () => {
        createWindow('files-window', 'Files', '');
        renderFiles();
    };

    document.getElementById('open-notepad').onclick = () => {
        createWindow('notepad-window', 'Notepad', '');
        initNotepad();
    };

    // Start with empty desktop, but ready to go
</script>

</body>
</html>
