<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desktop</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow: hidden; }

#desktop {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  font-family: 'Segoe UI', Ubuntu, system-ui, sans-serif;
  background: #1e0e3a;
  background-image:
    radial-gradient(ellipse 70% 55% at 12% 88%, rgba(233,84,32,.28) 0%, transparent 58%),
    radial-gradient(ellipse 60% 65% at 88% 12%, rgba(110,30,160,.30) 0%, transparent 58%),
    radial-gradient(ellipse 90% 50% at 50% 50%, rgba(30,14,58,.6) 0%, transparent 72%);
  user-select: none;
}

/* ── Top panel ── */
#top-panel {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 30px;
  background: rgba(10,5,22,.88);
  backdrop-filter: blur(14px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  z-index: 9999;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
.panel-side { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.82); }
#clock { font-size: 13px; color: rgba(255,255,255,.9); letter-spacing: .02em; }
.panel-icon { font-size: 14px; cursor: default; }

/* ── Taskbar ── */
#taskbar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 62px;
  background: rgba(8,4,18,.92);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,.07);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 9999;
}
.dock-btn {
  width: 46px; height: 46px;
  border-radius: 13px;
  border: 1px solid rgba(255,255,255,.11);
  background: rgba(255,255,255,.08);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .14s, background .14s, box-shadow .14s;
  position: relative;
}
.dock-btn:hover {
  background: rgba(255,255,255,.18);
  transform: translateY(-7px) scale(1.09);
  box-shadow: 0 10px 28px rgba(0,0,0,.45);
}
.dock-btn::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 11px);
  left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.82);
  color: #fff;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .14s;
  font-family: inherit;
}
.dock-btn:hover::after { opacity: 1; }

/* ── Window base ── */
.window {
  position: absolute;
  display: none;
  flex-direction: column;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 28px 90px rgba(0,0,0,.78), 0 0 0 1px rgba(255,255,255,.1);
  background: #1a1a2e;
  min-width: 360px;
  min-height: 240px;
}
.win-titlebar {
  height: 40px;
  background: #24243a;
  border-bottom: 1px solid rgba(0,0,0,.35);
  display: flex;
  align-items: center;
  padding: 0 14px;
  cursor: move;
  flex-shrink: 0;
}
.win-controls { display: flex; gap: 7px; margin-right: 14px; }
.win-btn {
  width: 13px; height: 13px;
  border-radius: 50%;
  border: none; cursor: pointer;
  transition: filter .1s;
}
.win-btn:hover { filter: brightness(1.25); }
.win-close   { background: #ff5f57; }
.win-minimize{ background: #febc2e; }
.win-maximize{ background: #28c840; }
.win-title {
  flex: 1; text-align: center;
  color: rgba(255,255,255,.68);
  font-size: 13px; font-weight: 500;
  pointer-events: none;
}
.win-body {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: #1a1a2e;
}

/* ── Files app ── */
#files-window { width: 700px; height: 500px; top: 70px; left: 80px; }

#files-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: #202030;
  border-bottom: 1px solid rgba(0,0,0,.4);
  flex-shrink: 0;
}
#files-up {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  color: rgba(255,255,255,.8);
  width: 30px; height: 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background .13s;
  flex-shrink: 0;
}
#files-up:hover { background: rgba(255,255,255,.16); }
#files-path {
  flex: 1;
  background: rgba(0,0,0,.28);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  padding: 5px 12px;
  color: #b8b8d8;
  font-size: 13px;
  font-family: 'Cascadia Code','Consolas',monospace;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1;
}
#files-grid {
  flex: 1;
  padding: 10px;
  display: flex; flex-wrap: wrap; align-content: flex-start; gap: 4px;
  overflow-y: auto;
}
#files-grid::-webkit-scrollbar { width: 8px; }
#files-grid::-webkit-scrollbar-track { background: rgba(0,0,0,.2); }
#files-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,.14); border-radius: 4px; }
.fs-item {
  width: 82px;
  padding: 8px 5px 10px;
  border-radius: 10px;
  cursor: default;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  transition: background .12s;
  color: rgba(255,255,255,.82);
}
.fs-item:hover { background: rgba(255,255,255,.07); }
.fs-item.selected { background: rgba(233,84,32,.32); }
.fs-item .fs-icon { font-size: 30px; line-height: 1; }
.fs-item .fs-name {
  font-size: 11.5px;
  text-align: center;
  word-break: break-all;
  line-height: 1.3;
  max-width: 74px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
#files-statusbar {
  padding: 5px 12px;
  font-size: 11px;
  color: rgba(255,255,255,.38);
  border-top: 1px solid rgba(0,0,0,.35);
  background: #202030;
  flex-shrink: 0;
}

/* ── Notepad app ── */
#notepad-window { width: 600px; height: 480px; top: 110px; left: 330px; }

#tabs-bar {
  display: flex; align-items: stretch;
  background: #141422;
  border-bottom: 1px solid rgba(0,0,0,.45);
  flex-shrink: 0;
  overflow-x: auto;
}
#tabs-bar::-webkit-scrollbar { height: 3px; }
#tabs-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); }
#tabs { display: flex; flex: 1; }
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px;
  height: 36px;
  font-size: 12px;
  color: rgba(255,255,255,.48);
  cursor: pointer;
  border-right: 1px solid rgba(0,0,0,.35);
  white-space: nowrap;
  max-width: 160px; min-width: 76px;
  transition: background .12s, color .12s;
  flex-shrink: 0;
}
.tab:hover { background: rgba(255,255,255,.04); color: rgba(255,255,255,.7); }
.tab.active { background: #1e1e30; color: rgba(255,255,255,.92); }
.tab .tab-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.tab-x {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.38);
  font-size: 15px;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
}
.tab-x:hover { background: rgba(255,255,255,.1); color: #fff; }
#new-tab {
  width: 36px; height: 36px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,.45);
  font-size: 22px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: color .12s, background .12s;
  line-height: 1;
}
#new-tab:hover { color: #fff; background: rgba(255,255,255,.06); }
#editor {
  flex: 1;
  border: none; outline: none; resize: none;
  background: #0f0f1e;
  color: #cecee8;
  font-family: 'Cascadia Code','Consolas','Courier New',monospace;
  font-size: 14px;
  line-height: 1.68;
  padding: 16px 20px;
  caret-color: #e95420;
}
#editor::-webkit-scrollbar { width: 8px; }
#editor::-webkit-scrollbar-track { background: #0f0f1e; }
#editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,.11); border-radius: 4px; }
#editor::placeholder { color: rgba(255,255,255,.2); }

/* ── Desktop icons ── */
.desk-icon {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  width: 72px; padding: 8px 4px;
  border-radius: 10px;
  cursor: default; gap: 5px;
  color: rgba(255,255,255,.88);
  font-size: 11px; text-align: center;
  text-shadow: 0 1px 5px rgba(0,0,0,.75);
  transition: background .12s;
}
.desk-icon:hover { background: rgba(255,255,255,.1); }
.desk-icon .di { font-size: 38px; filter: drop-shadow(0 3px 7px rgba(0,0,0,.6)); }
</style>
</head>
<body>
<div id="desktop">

  <!-- Top panel -->
  <div id="top-panel">
    <div class="panel-side">

    </div>
  </div>

  </div>

</div><!-- #desktop -->
<script>
'use strict';

/* ══════════════════════════════════════════
   Clock
══════════════════════════════════════════ */
(function startClock() {
  const el = document.getElementById('clock');
  function tick() {
    const n = new Date();
    el.textContent =
      n.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}) +
      '  ' +
      n.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  }
  tick();
  setInterval(tick, 5000);
})();

/* ══════════════════════════════════════════
   Window management
══════════════════════════════════════════ */
let z = 200;

function bringUp(win) { win.style.zIndex = ++z; }

function showWin(id) {
  const w = document.getElementById(id);
  w.style.display = 'flex';
  bringUp(w);
}

function hideWin(id) {
  document.getElementById(id).style.display = 'none';
}

// Close buttons
document.querySelectorAll('.win-close').forEach(btn => {
  btn.addEventListener('click', () => hideWin(btn.dataset.win));
});

// Raise on mousedown
document.querySelectorAll('.window').forEach(w => {
  w.addEventListener('mousedown', () => bringUp(w));
});

// Launchers
document.getElementById('open-files').addEventListener('click', () => {
  showWin('files-window');
  fsRender();
});
document.getElementById('open-notepad').addEventListener('click', () => {
  showWin('notepad-window');
  tabRender();
});

/* ══════════════════════════════════════════
   Drag
══════════════════════════════════════════ */
document.querySelectorAll('.win-titlebar').forEach(bar => {
  const win = bar.closest('.window');
  let dragging = false, ox = 0, oy = 0;

  bar.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    dragging = true;
    const r = win.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    bringUp(win);
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = Math.max(0, Math.min(e.clientX - ox, innerWidth  - win.offsetWidth))  + 'px';
    win.style.top  = Math.max(30, Math.min(e.clientY - oy, innerHeight - win.offsetHeight)) + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
});

/* ══════════════════════════════════════════
   Filesystem (static fake data)
══════════════════════════════════════════ */
const FS = {

  '/usr/bin':                   { children: ['python3','node','git','vim','nano','curl','wget','ssh','gcc','make','ffmpeg'] },
  '/usr/include':               { children: ['stdio.h','stdlib.h','string.h','math.h','unistd.h'] },

  '/usr/lib/x86_64-linux-gnu':  { children: ['libc.so.6','libm.so.6','libpthread.so.0'] },
  '/usr/lib/python3':           { children: ['dist-packages','lib-dynload'] },
  '/usr/lib/python3/dist-packages': { children: [] },
  '/usr/lib/python3/lib-dynload':   { children: [] },

  '/var/cache/apt/archives':    { children: [] },

  '/var/cache/man':             { children: [] },

  '/var/lib/apt':               { children: ['lists','periodic'] },
  '/var/lib/apt/lists':         { children: [] },

  '/var/lib/dpkg':              { children: ['info','status','lock'] },
  '/var/lib/dpkg/info':         { children: [] },
  '/var/lib/systemd':           { children: [] },
  '/var/lib/NetworkManager':    { children: [] },
  '/var/run':                   { children: ['lock','user','NetworkManager'] },
  '/var/run/lock':              { children: [] },
  '/var/run/user':              { children: [] },
  '/var/run/NetworkManager':    { children: [] },
  '/var/spool':                 { children: ['cron','mail'] },
  '/var/spool/cron':            { children: ['crontabs'] },
  '/var/spool/cron/crontabs':   { children: [] },
  '/var/spool/mail':            { children: ['user'] },
};

function isDir(p) { return Object.prototype.hasOwnProperty.call(FS, p); }

const EXT_ICONS = {
  '.txt':'📄', '.md':'📄', '.ini':'📄', '.conf':'📄', '.cfg':'📄',
  '.log':'📋', '.dat':'📋',
  '.pdf':'📕',
  '.png':'🖼️', '.jpg':'🖼️', '.jpeg':'🖼️', '.gif':'🖼️',
  '.tar.gz':'📦', '.gz':'📦', '.zip':'📦', '.deb':'📦', '.tar':'📦', '.xz':'📦',
  '.iso':'💿', '.mp4':'🎬', '.mkv':'🎬',
  '.sh':'⚙️', '.desktop':'⚙️',
  '.h':'📎', '.c':'📎', '.so.6':'🔧', '.so':'🔧',
  '.rsa':'🔑', '.pub':'🔑',
  '.ods':'📊',
};

function fileIcon(name, dir) {
  if (dir) return '📁';
  if (name.endsWith('.tar.gz') || name.endsWith('.log.xz') || name.endsWith('.eipp.log.xz')) return '📦';
  const dot = name.indexOf('.');
  if (dot !== -1) {
    // try longest extension first
    for (const ext of Object.keys(EXT_ICONS)) {
      if (name.endsWith(ext)) return EXT_ICONS[ext];
    }
  }
  return '📄';
}

let cwd = '/';

function fsRender() {
  const grid   = document.getElementById('files-grid');
  const pathEl = document.getElementById('files-path');
  const status = document.getElementById('files-statusbar');

  pathEl.textContent = cwd;
  grid.innerHTML = '';

  const node = FS[cwd];
  const children = (node && node.children) ? node.children : [];

  children.forEach(name => {
    const fullPath = (cwd === '/' ? '' : cwd) + '/' + name;
    const dir = isDir(fullPath);

    const item = document.createElement('div');
    item.className = 'fs-item';
    item.innerHTML =
      '<span class="fs-icon">' + fileIcon(name, dir) + '</span>' +
      '<span class="fs-name">' + name + '</span>';

    item.addEventListener('click', e => {
      document.querySelectorAll('.fs-item.selected').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      e.stopPropagation();
    });

    if (dir) {
      item.addEventListener('dblclick', () => {
        cwd = fullPath;
        fsRender();
      });
    }

    grid.appendChild(item);
  });

  const n = children.length;
  status.textContent = n + ' item' + (n !== 1 ? 's' : '');
}

// Deselect on grid background click
document.getElementById('files-grid').addEventListener('click', e => {
  if (e.target.id === 'files-grid')
    document.querySelectorAll('.fs-item.selected').forEach(i => i.classList.remove('selected'));
});

document.getElementById('files-up').addEventListener('click', () => {
  if (cwd === '/') return;
  const parts = cwd.split('/').filter(Boolean);
  parts.pop();
  cwd = parts.length ? '/' + parts.join('/') : '/';
  fsRender();
});

/* ══════════════════════════════════════════
   Notepad — tabbed, localStorage persistent
══════════════════════════════════════════ */
const LS_TABS = 'ntpad_tabs_v3';
const LS_ACT  = 'ntpad_active_v3';

let tabs = [];
let activeId = null;
let seq = 1;

function loadTabs() {
  try {
    const raw = localStorage.getItem(LS_TABS);
    if (raw) {
      tabs = JSON.parse(raw);
      if (tabs.length) seq = Math.max(...tabs.map(t => t.id)) + 1;
    }
  } catch (_) { tabs = []; }

  if (!tabs.length) {
    tabs = [{ id: seq++, label: 'Untitled', content: '' }];
  }

  try {
    const a = parseInt(localStorage.getItem(LS_ACT));
    if (!isNaN(a) && tabs.find(t => t.id === a)) activeId = a;
  } catch (_) {}

  if (activeId === null) activeId = tabs[0].id;
}

function saveTabs() {
  // flush current editor into active tab
  const ed = document.getElementById('editor');
  const cur = tabs.find(t => t.id === activeId);
  if (cur && ed) cur.content = ed.value;
  try {
    localStorage.setItem(LS_TABS, JSON.stringify(tabs));
    localStorage.setItem(LS_ACT,  String(activeId));
  } catch (_) {}
}

function tabRender() {
  const strip = document.getElementById('tabs');
  const ed    = document.getElementById('editor');
  strip.innerHTML = '';

  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeId ? ' active' : '');
    el.dataset.id = tab.id;

    const lbl = document.createElement('span');
    lbl.className = 'tab-label';
    lbl.textContent = tab.label;

    const x = document.createElement('button');
    x.className = 'tab-x';
    x.innerHTML = '&#215;';
    x.title = 'Close';

    el.appendChild(lbl);
    el.appendChild(x);

    el.addEventListener('click', e => { if (e.target !== x) tabSwitch(tab.id); });
    x.addEventListener('click', e => { e.stopPropagation(); tabClose(tab.id); });

    strip.appendChild(el);
  });

  const active = tabs.find(t => t.id === activeId);
  if (active && ed) {
    ed.value = active.content;
    ed.focus();
  }
}

function tabSwitch(id) {
  const ed = document.getElementById('editor');
  const cur = tabs.find(t => t.id === activeId);
  if (cur && ed) cur.content = ed.value;
  activeId = id;
  saveTabs();
  tabRender();
}

function tabClose(id) {
  if (tabs.length === 1) {
    // Reset rather than close
    tabs[0].content = '';
    tabs[0].label = 'Untitled';
    saveTabs();
    tabRender();
    return;
  }
  const idx = tabs.findIndex(t => t.id === id);
  tabs.splice(idx, 1);
  if (activeId === id) activeId = tabs[Math.min(idx, tabs.length - 1)].id;
  saveTabs();
  tabRender();
}

document.getElementById('new-tab').addEventListener('click', () => {
  const ed = document.getElementById('editor');
  const cur = tabs.find(t => t.id === activeId);
  if (cur && ed) cur.content = ed.value;
  const t = { id: seq++, label: 'Untitled', content: '' };
  tabs.push(t);
  activeId = t.id;
  saveTabs();
  tabRender();
});

document.getElementById('editor').addEventListener('input', () => {
  const ed = document.getElementById('editor');
  const tab = tabs.find(t => t.id === activeId);
  if (!tab) return;
  tab.content = ed.value;

  // derive label from first non-empty line, trimmed, max 22 chars
  const first = ed.value.split('\n').find(l => l.trim()) || '';
  tab.label = first.trim().slice(0, 22) || 'Untitled';

  saveTabs();

  // patch label in strip without full re-render
  const lel = document.querySelector('.tab[data-id="' + activeId + '"] .tab-label');
  if (lel) lel.textContent = tab.label;
});

/* ══════════════════════════════════════════
   Init
══════════════════════════════════════════ */
loadTabs();
fsRender();   // pre-render (window is hidden — harmless)

window.addEventListener('beforeunload', saveTabs);
</script>
