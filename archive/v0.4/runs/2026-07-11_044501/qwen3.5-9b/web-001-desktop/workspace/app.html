<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ubuntu Desktop Environment</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --taskbar-bg: #2d2d2d;
            --window-bg: #303030;
            --text-color: #e0e0e0;
            --accent-color: #d9534f; /* Ubuntu Red-ish */
            --hover-bg: #404040;
            --border-radius: 4px;
        }

        * { box-sizing: border-box; user-select: none; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Ubuntu', 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); }

        /* Desktop Area */
        #desktop {
            width: 100vw;
            height: calc(100vh - 48px); /* Minus taskbar height */
            position: relative;
            background: linear-gradient(135deg, #2b32b2 0%, #1488cc 100%); /* Fallback wallpaper */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48Y2lyY2xlIGN4PSIxMDAiIGN5PSIxMDAiIHI9IjUwIiBmaWxsPSIjMmIzMmIyIi8+PGNpcmNsZSBjeD0iMzAwIiBjeT0iMzAwIiByPSI1MCIgZmlsbD0iIzFkODhjYyIvPjwvc3ZnPg==');
        }

        /* Taskbar */
        #taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background-color: var(--taskbar-bg);
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.3);
        }

        .launcher {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 10px;
        }

        .launcher:hover { background-color: var(--hover-bg); }
        
        /* Icons (CSS Shapes) */
        .icon-files { color: #4caf50; font-size: 24px; }
        .icon-notepad { color: #ffeb3b; font-size: 24px; }

        /* Window Styling */
        .window {
            position: absolute;
            background-color: var(--window-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 360px;
            min-height: 240px;
            border: 1px solid #555;
        }

        .window.hidden { display: none; }

        .title-bar {
            height: 32px;
            background-color: #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 10px;
            cursor: default; /* Simplified for this task */
        }

        .window-title { font-size: 14px; font-weight: bold; }

        .win-close {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }
        .win-close:hover { color: var(--accent-color); }

        /* Files App Specifics */
        #files-window { top: 20px; left: 20px; width: 600px; height: 400px; }
        
        #files-toolbar {
            padding: 8px;
            background-color: #3a3a3a;
            border-bottom: 1px solid #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #files-path { font-family: monospace; color: #aaa; font-size: 14px; }
        
        .btn-up {
            background: #555; border: none; color: white; padding: 4px 8px; cursor: pointer; border-radius: 3px;
        }
        .btn-up:hover { background: #666; }

        #files-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .fs-item {
            display: flex;
            align-items: center;
            padding: 5px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .fs-item:hover { background-color: var(--hover-bg); }
        .fs-item.folder { color: #87ceeb; }
        .fs-item.file { color: #aaa; }

        /* Notepad App Specifics */
        #notepad-window { top: 50px; left: 100px; width: 600px; height: 450px; }
        
        #tabs-container {
            background-color: #3a3a3a;
            display: flex;
            align-items: center;
            padding-left: 5px;
            border-bottom: 1px solid #555;
            height: 32px;
        }

        .tab {
            background-color: #444;
            padding: 4px 10px;
            margin-right: 2px;
            font-size: 13px;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
        }

        .tab.active { background-color: var(--window-bg); border-top: 2px solid #d9534f; }
        
        #new-tab-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            padding: 0 10px;
        }

        #editor-container { flex-grow: 1; position: relative; }
        
        #editor {
            width: 100%;
            height: 100%;
            background-color: var(--window-bg);
            color: #ddd;
            border: none;
            resize: none;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            outline: none;
        }

    </style>
</head>
<body>

    <!-- Desktop Environment -->
    <div id="desktop">
        
        <!-- Files Window -->
        <div id="files-window" class="window hidden">
            <div class="title-bar">
                <span class="window-title">Files</span>
                <button class="win-close">&times;</button>
            </div>
            <div id="files-toolbar">
                <button id="files-up" class="btn-up" title="Go Up">↑</button>
                <span id="files-path">/</span>
            </div>
            <div id="files-list"></div>
        </div>

        <!-- Notepad Window -->
        <div id="notepad-window" class="window hidden">
            <div class="title-bar">
                <span class="window-title">Text Editor</span>
                <button class="win-close">&times;</button>
            </div>
            <div id="tabs-container">
                <!-- Tabs injected here -->
            </div>
            <div id="editor-container">
                <textarea id="editor" placeholder="Type here..."></textarea>
            </div>
        </div>

    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="launcher icon-files" id="open-files" title="Files">
            📁
        </div>
        <div class="launcher icon-notepad" id="open-notepad" title="Notepad">
            📝
        </div>
    </div>

    <script>
        // --- State Management ---
        
        // Fake File System Structure
        const fileSystem = {
            name: '',
            type: 'dir',
            children: {
                bin: { name: 'bin', type: 'dir', children: {} },
                etc: { name: 'etc', type: 'dir', children: {} },
                home: { 
                    name: 'home', 
                    type: 'dir', 
                    children: {
                        user: {
                            name: 'user',
                            type: 'dir',
                            children: {
                                Documents: { name: 'Documents', type: 'dir', children: {} },
                                Downloads: { name: 'Downloads', type: 'dir', children: {} },
                                Pictures: { name: 'Pictures', type: 'dir', children: {} }
                            }
                        }
                    }
                },
                usr: { name: 'usr', type: 'dir', children: {} },
                var: { name: 'var', type: 'dir', children: {} }
            }
        };

        // Notepad State (Persisted in localStorage)
        let notepadData = JSON.parse(localStorage.getItem('notepad_data')) || {};
        
        // Current File System Path Stack
        let pathStack = []; 
        let currentPathStr = '/';

        // --- DOM Elements ---
        const filesWindow = document.getElementById('files-window');
        const notepadWindow = document.getElementById('notepad-window');
        const openFilesBtn = document.getElementById('open-files');
        const openNotepadBtn = document.getElementById('open-notepad');
        
        const filesPathEl = document.getElementById('files-path');
        const filesListEl = document.getElementById('files-list');
        const filesUpBtn = document.getElementById('files-up');

        const tabsContainer = document.getElementById('tabs-container');
        const editor = document.getElementById('editor');
        const newTabBtn = document.createElement('button');
        newTabBtn.id = 'new-tab';
        newTabBtn.innerHTML = '+';
        newTabBtn.className = ''; // No class initially, will add style inline or via JS

        const closeButtons = document.querySelectorAll('.win-close');

        // --- Initialization ---

        function init() {
            // Setup Notepad persistence
            if (Object.keys(notepadData).length === 0) {
                // Create one default tab on first load
                createTab('Untitled-1', '');
            }

            // Render initial tabs
            renderTabs();
            
            // Bind events
            bindEvents();
        }

        function bindEvents() {
            // Launchers
            openFilesBtn.addEventListener('click', () => {
                filesWindow.classList.remove('hidden');
                resetFileView();
            });

            openNotepadBtn.addEventListener('click', () => {
                notepadWindow.classList.remove('hidden');
                renderTabs(); // Refresh tabs to show active state
            });

            // Window Close Buttons
            closeButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const win = e.currentTarget.closest('.window');
                    win.classList.add('hidden');
                });
            });

            // Files App Events
            filesUpBtn.addEventListener('click', () => navigateUp());

            // Notepad Events
            newTabBtn.addEventListener('click', createNewTab);
            
            editor.addEventListener('input', saveNotepadState);
        }

        // --- File System Logic ---

        function resetFileView() {
            pathStack = [];
            currentPathStr = '/';
            renderFiles();
        }

        function navigateUp() {
            if (pathStack.length > 0) {
                pathStack.pop();
                updatePathDisplay();
                renderFiles();
            }
        }

        function getChildren(pathObj) {
            return Object.keys(pathObj.children).map(key => ({
                name: key,
                type: 'dir',
                children: pathObj.children[key]
            }));
        }

        function navigateInto(name, parentObj) {
            const child = parentObj.children[name];
            if (child && child.type === 'dir') {
                // Add to stack
                pathStack.push({ name: child.name, children: child.children });
                
                // Update display path string
                let newPath = '/';
                let currentDir = fileSystem;
                for(let p of pathStack) {
                    newPath += `/${p.name}`;
                    currentDir = p.children[p.name];
                }
                currentPathStr = newPath;
                
                updatePathDisplay();
                renderFiles();
            }
        }

        function updatePathDisplay() {
            filesPathEl.textContent = currentPathStr;
        }

        function renderFiles() {
            filesListEl.innerHTML = '';
            
            if (pathStack.length === 0) {
                // Root level
                const rootChildren = Object.keys(fileSystem.children).map(key => ({
                    name: key,
                    type: 'dir',
                    children: fileSystem.children[key]
                }));
                renderList(rootChildren);
            } else {
                // Deep level
                const currentDirObj = pathStack[pathStack.length - 1];
                const children = Object.keys(currentDirObj.children).map(key => ({
                    name: key,
                    type: 'dir',
                    children: currentDirObj.children[key]
                }));
                renderList(children);
            }
        }

        function renderList(items) {
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = `fs-item ${item.type}`;
                el.textContent = item.name;
                
                // Double click to enter
                el.addEventListener('dblclick', () => navigateInto(item.name, pathStack[pathStack.length-1]));

                filesListEl.appendChild(el);
            });
        }

        function resetFileView() {
             pathStack = [];
             currentPathStr = '/';
             renderFiles();
        }

        // --- Notepad Logic ---

        function saveNotepadState() {
            const activeTabId = document.querySelector('.tab.active').id;
            notepadData[activeTabId] = editor.value;
            localStorage.setItem('notepad_data', JSON.stringify(notepadData));
        }

        function createNewTab() {
            const timestamp = Date.now();
            const newId = `tab-${timestamp}`;
            const title = `Untitled-${Math.floor(Math.random() * 100)}`;
            
            // Create data entry if not exists
            if (!notepadData[newId]) {
                notepadData[newId] = '';
            }

            createTab(title, newId);
        }

        function createTab(title, id) {
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.id = id;
            tabEl.textContent = title;
            
            // Click to switch
            tabEl.addEventListener('click', () => switchTab(id));

            tabsContainer.appendChild(tabEl);
            
            // If this is the first tab (or only one), make it active immediately
            if (tabsContainer.children.length === 1) {
                switchTab(id);
            } else {
                // Update active class on existing tabs to remove old highlights
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tabEl.classList.add('active');
                
                // Focus editor and load content
                editor.value = notepadData[id] || '';
                saveNotepadState();
            }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(id);
            
            if (activeTab) {
                activeTab.classList.add('active');
                editor.value = notepadData[id];
                saveNotepadState();
            }
        }

        function renderTabs() {
            // Re-render tabs to ensure state matches DOM
            tabsContainer.innerHTML = '';
            
            Object.keys(notepadData).forEach(id => {
                const title = document.getElementById(id).textContent;
                createTab(title, id);
            });
        }

        // --- Start App ---
        init();

    </script>
</body>
</html>
