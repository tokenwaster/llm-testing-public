<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:'Segoe UI',Ubuntu,sans-serif;}

#desktop{
  width:100vw;height:100vh;
  background:radial-gradient(ellipse at 30% 60%, #3d1a4e 0%, #2c001e 40%, #1a1a2e 100%);
  position:relative;overflow:hidden;user-select:none;
}

/* ── Top bar ── */
#topbar{
  position:absolute;top:0;left:0;right:0;height:28px;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  display:flex;align-items:center;padding:0 14px;
  color:#ddd;font-size:13px;z-index:2000;gap:20px;
}
#topbar-right{margin-left:auto;display:flex;gap:14px;align-items:center;}
#topbar-time{font-weight:500;}

/* ── Dock / Taskbar ── */
#taskbar{
  position:absolute;left:0;top:28px;bottom:0;width:62px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;
  padding:16px 0 8px;gap:10px;z-index:1500;
  border-right:1px solid rgba(255,255,255,0.06);
}
.dock-btn{
  width:46px;height:46px;border-radius:13px;border:none;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#fff;font-size:10px;font-weight:500;
  transition:transform 0.12s,box-shadow 0.12s;
  position:relative;gap:2px;
}
.dock-btn:hover{transform:scale(1.12);box-shadow:0 4px 18px rgba(0,0,0,0.5);}
.dock-btn:active{transform:scale(0.96);}
.dock-btn svg{width:26px;height:26px;}
#open-files{background:linear-gradient(145deg,#f5a623,#e07b00);}
#open-notepad{background:linear-gradient(145deg,#2d8fcf,#1a5fa0);}
.dock-separator{width:36px;height:1px;background:rgba(255,255,255,0.15);margin:4px 0;}

/* ── Windows ── */
.window{
  position:absolute;
  background:#2d2d2d;
  border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,0.85),0 0 0 1px rgba(255,255,255,0.08);
  display:none;flex-direction:column;
  min-width:360px;min-height:240px;
  overflow:hidden;
}
.win-titlebar{
  height:34px;background:linear-gradient(180deg,#484848,#3c3c3c);
  display:flex;align-items:center;padding:0 10px;
  cursor:move;flex-shrink:0;border-bottom:1px solid #222;
}
.win-controls{display:flex;gap:7px;align-items:center;}
.win-btn{
  width:13px;height:13px;border-radius:50%;border:none;
  cursor:pointer;transition:filter 0.1s;
}
.win-btn:hover{filter:brightness(1.25);}
.win-close{background:#ff5f57;}
.win-min{background:#febc2e;}
.win-max{background:#28c840;}
.win-title{flex:1;text-align:center;color:#ccc;font-size:13px;font-weight:500;margin-right:46px;}
.win-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* ── Files App ── */
#files-window{width:640px;height:420px;top:60px;left:80px;}
#files-toolbar{
  display:flex;align-items:center;padding:6px 8px;gap:6px;
  background:#383838;border-bottom:1px solid #222;flex-shrink:0;
}
#files-up{
  background:#505050;border:1px solid #666;color:#ddd;
  border-radius:5px;padding:4px 12px;cursor:pointer;font-size:13px;
  transition:background 0.1s;
}
#files-up:hover{background:#606060;}
#files-path{
  flex:1;background:#1a1a1a;color:#9cd;border:1px solid #444;
  border-radius:5px;padding:3px 10px;font-size:13px;font-family:monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#files-list{
  flex:1;overflow-y:auto;padding:10px;
  display:flex;flex-wrap:wrap;align-content:flex-start;gap:2px;
}
.fs-item{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 6px;border-radius:7px;cursor:pointer;
  color:#ddd;font-size:11.5px;width:82px;text-align:center;word-break:break-all;
  transition:background 0.1s;
}
.fs-item:hover{background:rgba(255,255,255,0.08);}
.fs-item.selected{background:rgba(80,140,255,0.28);}
.fs-item .fs-icon{font-size:30px;margin-bottom:5px;line-height:1;}
.fs-item .fs-name{line-height:1.3;}

/* ── Notepad App ── */
#notepad-window{width:540px;height:400px;top:90px;left:160px;}
#tabs{
  display:flex;align-items:stretch;
  background:#333;border-bottom:1px solid #222;
  overflow-x:auto;flex-shrink:0;min-height:33px;
}
#tabs::-webkit-scrollbar{height:3px;}
#tabs::-webkit-scrollbar-thumb{background:#555;}
.tab{
  display:flex;align-items:center;padding:0 10px 0 12px;
  color:#999;cursor:pointer;font-size:13px;white-space:nowrap;
  border-right:1px solid #222;gap:6px;min-width:80px;
  transition:background 0.1s,color 0.1s;
}
.tab:hover{background:rgba(255,255,255,0.04);color:#ccc;}
.tab.active{background:#2d2d2d;color:#eee;border-bottom:2px solid #e07b00;}
.tab-x{
  font-size:12px;color:#666;cursor:pointer;padding:1px 3px;border-radius:3px;
  transition:color 0.1s,background 0.1s;line-height:1;
}
.tab-x:hover{color:#ff5f57;background:rgba(255,95,87,0.15);}
#new-tab{
  padding:0 14px;background:transparent;border:none;
  color:#888;cursor:pointer;font-size:20px;line-height:1;
  flex-shrink:0;transition:color 0.1s;
}
#new-tab:hover{color:#fff;}
#editor{
  flex:1;background:#1e1e1e;color:#d4d4d4;
  border:none;resize:none;outline:none;
  padding:14px;font-family:'Consolas','Courier New',monospace;
  font-size:14px;line-height:1.6;
}

/* ── Scrollbars ── */
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-track{background:#1a1a1a;}
::-webkit-scrollbar-thumb{background:#484848;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#585858;}
</style>
</head>
<body>
<div id="desktop">

  <!-- Top bar -->
  <div id="topbar">
    <span style="font-weight:600;color:#e8a217;">&#9651; Activities</span>
    <span style="color:#bbb;">Files</span>
    <span style="color:#bbb;">Notepad</span>
    <div id="topbar-right">
      <span>&#x1F50A;</span>
      <span>&#x1F4F6;</span>
      <span id="topbar-time">00:00</span>
    </div>
  </div>

  <!-- Dock -->
  <div id="taskbar">
    <button class="dock-btn" id="open-files" title="Files">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.11 0-2 .89-2 2v12c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.11-.9-2-2-2z"/></svg>
      Files
    </button>
    <button class="dock-btn" id="open-notepad" title="Notepad">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      Notes
    </button>
    <div class="dock-separator"></div>
  </div>

  <!-- Files Window -->
  <div class="window" id="files-window">
    <div class="win-titlebar" id="files-drag-handle">
      <div class="win-controls">
        <button class="win-btn win-close" data-win="files-window"></button>
        <button class="win-btn win-min"></button>
        <button class="win-btn win-max"></button>
      </div>
      <span class="win-title">Files</span>
    </div>
    <div class="win-body">
      <div id="files-toolbar">
        <button id="files-up">&#8593; Up</button>
        <div id="files-path">/</div>
      </div>
      <div id="files-list"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div class="window" id="notepad-window">
    <div class="win-titlebar" id="notepad-drag-handle">
      <div class="win-controls">
        <button class="win-btn win-close" data-win="notepad-window"></button>
        <button class="win-btn win-min"></button>
        <button class="win-btn win-max"></button>
      </div>
      <span class="win-title">Notepad</span>
    </div>
    <div class="win-body">
      <div id="tabs">
        <button id="new-tab" title="New tab">+</button>
      </div>
      <textarea id="editor" placeholder="Start typing…"></textarea>
    </div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════
//  FILESYSTEM
// ═══════════════════════════════════════════
const FS = {
  '/':                          {type:'dir', children:['bin','etc','home','usr','var']},
  '/bin':                       {type:'dir', children:['bash','ls','cat','cp','mv','rm','mkdir','grep','chmod','echo']},
  '/etc':                       {type:'dir', children:['hosts','fstab','passwd','shadow','group','hostname','resolv.conf','apt']},
  '/etc/apt':                   {type:'dir', children:['sources.list','preferences']},
  '/home':                      {type:'dir', children:['user']},
  '/home/user':                 {type:'dir', children:['Documents','Downloads','Pictures','.bashrc','.profile','.ssh']},
  '/home/user/.ssh':            {type:'dir', children:['id_rsa','id_rsa.pub','known_hosts']},
  '/home/user/Documents':       {type:'dir', children:['resume.txt','notes.txt','todo.txt','Projects','Work']},
  '/home/user/Documents/Projects':{type:'dir', children:['webapp','scripts','data-analysis']},
  '/home/user/Documents/Projects/webapp':{type:'dir', children:['index.html','style.css','app.js','README.md']},
  '/home/user/Documents/Projects/scripts':{type:'dir', children:['backup.sh','deploy.sh','cleanup.sh']},
  '/home/user/Documents/Projects/data-analysis':{type:'dir', children:['analysis.py','data.csv','report.pdf']},
  '/home/user/Documents/Work':  {type:'dir', children:['meeting-notes.txt','Q3-report.pdf','budget.xlsx']},
  '/home/user/Downloads':       {type:'dir', children:['ubuntu-24.04.iso','setup.sh','archive.tar.gz','photo-backup.zip']},
  '/home/user/Pictures':        {type:'dir', children:['wallpaper.png','screenshot.png','avatar.jpg','Vacation','Screenshots']},
  '/home/user/Pictures/Vacation':{type:'dir', children:['beach.jpg','sunset.jpg','city.jpg','hiking.jpg']},
  '/home/user/Pictures/Screenshots':{type:'dir', children:['desktop-2024.png','error-log.png']},
  '/usr':                       {type:'dir', children:['bin','lib','share','local','include']},
  '/usr/bin':                   {type:'dir', children:['python3','node','git','vim','nano','curl','wget','ssh','gcc']},
  '/usr/lib':                   {type:'dir', children:['systemd','udev','python3','x86_64-linux-gnu']},
  '/usr/share':                 {type:'dir', children:['applications','doc','fonts','icons','man','locale']},
  '/usr/local':                 {type:'dir', children:['bin','lib','share','etc']},
  '/usr/include':               {type:'dir', children:['stdio.h','stdlib.h','string.h']},
  '/var':                       {type:'dir', children:['log','tmp','cache','lib','run','spool']},
  '/var/log':                   {type:'dir', children:['syslog','auth.log','kern.log','dpkg.log','apt']},
  '/var/log/apt':               {type:'dir', children:['history.log','term.log']},
  '/var/tmp':                   {type:'dir', children:[]},
  '/var/cache':                 {type:'dir', children:['apt','man','fontconfig']},
  '/var/lib':                   {type:'dir', children:['dpkg','apt','systemd']},
  '/var/run':                   {type:'dir', children:['utmp','sshd.pid']},
  '/var/spool':                 {type:'dir', children:['cron','mail']},
};

function isDir(path){ return FS[path] && FS[path].type === 'dir'; }
function getChildren(path){ return (FS[path] && FS[path].children) || []; }
function joinPath(parent, name){ return parent === '/' ? '/' + name : parent + '/' + name; }

const FILE_ICONS = {
  dir:'📁', sh:'⚙️', bash:'⚙️', txt:'📄', md:'📝',
  js:'📜', html:'🌐', css:'🎨', py:'🐍',
  png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️',
  iso:'💿', tar:'📦', gz:'📦', zip:'📦',
  log:'📋', conf:'⚙️', cfg:'⚙️', list:'📋',
  pdf:'📕', xlsx:'📊', csv:'📊',
  pub:'🔑', rsa:'🔑', h:'📎', c:'📎',
};
function iconFor(fullPath, name){
  if(isDir(fullPath)) return '📁';
  const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : name.toLowerCase();
  return FILE_ICONS[ext] || FILE_ICONS[name] || '📄';
}

// ═══════════════════════════════════════════
//  FILES APP
// ═══════════════════════════════════════════
let currentPath = '/';

function renderFiles(){
  const pathEl = document.getElementById('files-path');
  const list   = document.getElementById('files-list');
  pathEl.textContent = currentPath;
  list.innerHTML = '';

  const children = getChildren(currentPath);
  if(children.length === 0){
    list.innerHTML = '<div style="color:#666;padding:20px;font-size:13px;">Empty directory</div>';
    return;
  }
  children.forEach(name => {
    const full = joinPath(currentPath, name);
    const item = document.createElement('div');
    item.className = 'fs-item';
    item.innerHTML = `<span class="fs-icon">${iconFor(full,name)}</span><span class="fs-name">${name}</span>`;
    item.addEventListener('click', e => {
      document.querySelectorAll('.fs-item').forEach(i=>i.classList.remove('selected'));
      item.classList.add('selected');
      e.stopPropagation();
    });
    item.addEventListener('dblclick', () => {
      if(isDir(full)){ currentPath = full; renderFiles(); }
    });
    list.appendChild(item);
  });
}

document.getElementById('files-list').addEventListener('click', () => {
  document.querySelectorAll('.fs-item').forEach(i=>i.classList.remove('selected'));
});

document.getElementById('files-up').addEventListener('click', () => {
  if(currentPath === '/') return;
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  currentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
  renderFiles();
});

// ═══════════════════════════════════════════
//  NOTEPAD (tabbed, localStorage)
// ═══════════════════════════════════════════
const LS_KEY = 'desktop_notepad_v1';
let notepadTabs = [];
let activeTab   = null;
let tabCounter  = 0;

function loadNotepadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const state = JSON.parse(raw);
      notepadTabs = state.tabs || [];
      tabCounter  = state.counter || notepadTabs.length;
      activeTab   = state.activeId || (notepadTabs[0] && notepadTabs[0].id) || null;
    }
  } catch(e){}
  if(notepadTabs.length === 0){
    tabCounter = 0;
    const t = newTabObj();
    notepadTabs.push(t);
    activeTab = t.id;
  }
}

function saveNotepadState(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({tabs:notepadTabs, counter:tabCounter, activeId:activeTab}));
  } catch(e){}
}

function newTabObj(){
  tabCounter++;
  return {id:'tab_'+tabCounter, name:'Untitled '+tabCounter, content:''};
}

function flushEditorToActive(){
  const t = notepadTabs.find(t=>t.id===activeTab);
  if(t) t.content = document.getElementById('editor').value;
}

function renderNotepadTabs(){
  const strip = document.getElementById('tabs');
  const btn   = document.getElementById('new-tab');
  strip.querySelectorAll('.tab').forEach(el=>el.remove());
  notepadTabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id === activeTab ? ' active' : '');
    el.dataset.id = t.id;
    el.innerHTML = `<span class="tab-label">${escHtml(t.name)}</span><span class="tab-x" data-id="${t.id}">&#x2715;</span>`;
    el.addEventListener('click', e => {
      if(e.target.classList.contains('tab-x')) return;
      flushEditorToActive();
      activeTab = t.id;
      document.getElementById('editor').value = t.content;
      renderNotepadTabs();
      saveNotepadState();
    });
    el.querySelector('.tab-x').addEventListener('click', e => {
      e.stopPropagation();
      closeNotepadTab(t.id);
    });
    strip.insertBefore(el, btn);
  });
}

function closeNotepadTab(id){
  flushEditorToActive();
  const idx = notepadTabs.findIndex(t=>t.id===id);
  if(idx === -1) return;
  notepadTabs.splice(idx,1);
  if(notepadTabs.length === 0){
    const t = newTabObj();
    notepadTabs.push(t);
    activeTab = t.id;
  } else if(activeTab === id){
    activeTab = notepadTabs[Math.min(idx, notepadTabs.length-1)].id;
  }
  document.getElementById('editor').value = notepadTabs.find(t=>t.id===activeTab)?.content || '';
  renderNotepadTabs();
  saveNotepadState();
}

document.getElementById('new-tab').addEventListener('click', () => {
  flushEditorToActive();
  const t = newTabObj();
  notepadTabs.push(t);
  activeTab = t.id;
  document.getElementById('editor').value = '';
  renderNotepadTabs();
  saveNotepadState();
  document.getElementById('editor').focus();
});

document.getElementById('editor').addEventListener('input', () => {
  const t = notepadTabs.find(t=>t.id===activeTab);
  if(t){ t.content = document.getElementById('editor').value; saveNotepadState(); }
});

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════
//  WINDOW MANAGEMENT
// ═══════════════════════════════════════════
let zTop = 100;

function openWindow(id){
  const w = document.getElementById(id);
  w.style.display = 'flex';
  bringToFront(w);
}
function closeWindow(id){
  document.getElementById(id).style.display = 'none';
}
function bringToFront(w){
  zTop++;
  w.style.zIndex = zTop;
}

// Close buttons (.win-close)
document.querySelectorAll('.win-close').forEach(btn => {
  btn.addEventListener('click', () => closeWindow(btn.dataset.win));
});

// Launchers
document.getElementById('open-files').addEventListener('click', () => {
  openWindow('files-window');
  renderFiles();
});
document.getElementById('open-notepad').addEventListener('click', () => {
  openWindow('notepad-window');
});

// Focus on click
document.querySelectorAll('.window').forEach(w => {
  w.addEventListener('mousedown', () => bringToFront(w));
});

// ── Drag ──
function makeDraggable(handleId, winId){
  const handle = document.getElementById(handleId);
  const win    = document.getElementById(winId);
  let dragging=false, ox=0, oy=0, wl=0, wt=0;

  handle.addEventListener('mousedown', e => {
    if(e.target.classList.contains('win-btn')) return;
    dragging = true;
    ox = e.clientX; oy = e.clientY;
    wl = win.offsetLeft; wt = win.offsetTop;
    bringToFront(win);
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    let nl = wl + (e.clientX - ox);
    let nt = wt + (e.clientY - oy);
    // Clamp so titlebar stays on screen
    nl = Math.max(-win.offsetWidth+80, Math.min(window.innerWidth-80, nl));
    nt = Math.max(28, Math.min(window.innerHeight-40, nt));
    win.style.left = nl+'px';
    win.style.top  = nt+'px';
  });
  document.addEventListener('mouseup', () => { dragging=false; });
}
makeDraggable('files-drag-handle',   'files-window');
makeDraggable('notepad-drag-handle', 'notepad-window');

// ── Touch drag support ──
function makeTouchDraggable(handleId, winId){
  const handle = document.getElementById(handleId);
  const win    = document.getElementById(winId);
  let ox=0, oy=0, wl=0, wt=0;

  handle.addEventListener('touchstart', e => {
    if(e.target.classList.contains('win-btn')) return;
    const t = e.touches[0];
    ox = t.clientX; oy = t.clientY;
    wl = win.offsetLeft; wt = win.offsetTop;
    bringToFront(win);
  }, {passive:true});
  handle.addEventListener('touchmove', e => {
    const t = e.touches[0];
    win.style.left = (wl + t.clientX - ox)+'px';
    win.style.top  = (wt + t.clientY - oy)+'px';
    e.preventDefault();
  }, {passive:false});
}
makeTouchDraggable('files-drag-handle',   'files-window');
makeTouchDraggable('notepad-drag-handle', 'notepad-window');

// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock(){
  const d = new Date();
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('topbar-time').textContent =
    `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}  ${h}:${m}`;
}
updateClock();
setInterval(updateClock, 10000);

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
loadNotepadState();
renderNotepadTabs();
document.getElementById('editor').value = notepadTabs.find(t=>t.id===activeTab)?.content || '';
renderFiles();
</script>
</body>
</html>
