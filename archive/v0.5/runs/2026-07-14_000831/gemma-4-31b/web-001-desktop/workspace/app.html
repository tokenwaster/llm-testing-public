<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Web Desktop</title>
    <style>
        :root {
            --bg-color: #300a24;
            --accent-color: #e95420;
            --window-bg: #2c2c2c;
            --text-color: #ffffff;
            --taskbar-bg: rgba(0, 0, 0, 0.6);
            --border-color: #444;
            --hover-color: #4a4a4a;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        #desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #5E2750 0%, #2C001E 100%);
            overflow: hidden;
        }

        /* Taskbar */
        #taskbar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            height: 60px;
            background: var(--taskbar-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            z-index: 9999;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .launcher {
            width: 40px;
            height: 40px;
            background: #444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }
        .launcher:hover { background: var(--accent-color); }
        .launcher:active { transform: scale(0.9); }

        /* Windows */
        .window {
            position: absolute;
            width: 450px;
            height: 320px;
            min-width: 360px;
            min-height: 240px;
            background: var(--window-bg);
            color: var(--text-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            z-index: 10;
        }

        .win-header {
            height: 35px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            cursor: move;
            user-select: none;
        }

        .win-title { font-size: 13px; font-weight: bold; }
        .win-close {
            width: 24px;
            height: 24px;
            background: #ff5f56;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .win-close:hover { background: #ff3b30; }

        .win-body {
            flex: 1;
            position: relative;
            overflow: auto;
            display: flex;
            flex-direction: column;
        }

        /* Files App */
        #files-toolbar {
            background: #3d3d3d;
            padding: 5px 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        #files-path {
            font-family: monospace;
            font-size: 12px;
            flex: 1;
            background: #222;
            padding: 2px 5px;
            border-radius: 3px;
        }
        #files-up {
            cursor: pointer;
            background: #555;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }

        #files-list {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            align-content: start;
        }

        .fs-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
            user-select: none;
        }
        .fs-item:hover { background: var(--hover-color); }
        .fs-item::before {
            content: '📁';
            font-size: 30px;
            margin-bottom: 5px;
        }
        .fs-item.file::before { content: '📄'; }

        /* Notepad App */
        #notepad-tabs-container {
            display: flex;
            background: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
        }
        #tabs { display: flex; }
        .tab {
            padding: 8px 15px;
            background: #333;
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 12px;
            user-select: none;
            display: flex;
            align-items: center;
        }
        .tab.active { background: var(--window-bg); border-bottom: 2px solid var(--accent-color); }
        #new-tab {
            padding: 0 15px;
            background: #1a1a1a;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            line-height: 30px;
        }
        #new-tab:hover { background: #444; }

        #editor {
            width: 100%;
            height: 100%;
            background: var(--window-bg);
            color: white;
            border: none;
            resize: none;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }
    </style>
</head>
<body>

<div id="desktop">
    <!-- Taskbar -->
    <div id="taskbar">
        <button id="open-files" class="launcher" title="Files">📁</button>
        <button id="open-notepad" class="launcher" title="Notepad">📝</button>
    </div>

    <!-- Files Window -->
    <div id="files-window" class="window">
        <div class="win-header">
            <span class="win-title">Files</span>
            <button class="win-close">×</button>
        </div>
        <div class="win-body">
            <div id="files-toolbar">
                <button id="files-up">Up</button>
                <div id="files-path">/</div>
            </div>
            <div id="files-list"></div>
        </div>
    </div>

    <!-- Notepad Window -->
    <div id="notepad-window" class="window">
        <div class="win-header">
            <span class="win-title">Notepad</span>
            <button class="win-close">×</button>
        </div>
        <div class="win-body">
            <div id="notepad-tabs-container">
                <div id="tabs"></div>
                <button id="new-tab">+</button>
            </div>
            <textarea id="editor"></textarea>
        </div>
    </div>
</div>

<script>
    /** 
     * WINDOW MANAGEMENT 
     */
    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        const header = el.querySelector('.win-header');
        
        header.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
            // Bring to front
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
            el.style.zIndex = 100;
        }

        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }

    const windows = document.querySelectorAll('.window');
    windows.forEach(win => {
        makeDraggable(win);
        win.querySelector('.win-close').onclick = () => win.style.display = 'none';
    });

    document.getElementById('open-files').onclick = () => {
        const win = document.getElementById('files-window');
        win.style.display = 'flex';
        win.style.zIndex = 100;
    };
    document.getElementById('open-notepad').onclick = () => {
        const win = document.getElementById('notepad-window');
        win.style.display = 'flex';
        win.style.zIndex = 100;
    };

    /** 
     * FILES APP LOGIC 
     */
    const fsData = {
        '/': { type: 'dir', children: ['bin', 'etc', 'home', 'usr', 'var'] },
        '/bin': { type: 'dir', children: ['bash', 'ls', 'grep'] },
        '/etc': { type: 'dir', children: ['passwd', 'hosts'] },
        '/home': { type: 'dir', children: ['user'] },
        '/home/user': { type: 'dir', children: ['Documents', 'Downloads', 'Pictures', 'todo.txt'] },
        '/home/user/Documents': { type: 'dir', children: ['resume.pdf', 'notes.txt'] },
        '/home/user/Downloads': { type: 'dir', children: [] },
        '/home/user/Pictures': { type: 'dir', children: ['wallpaper.jpg', 'vacation.png'] },
        '/usr': { type: 'dir', children: ['bin', 'lib', 'local'] },
        '/var': { type: 'dir', children: ['log', 'tmp'] },
        '/usr/bin': { type: 'dir', children: [] },
        '/usr/lib': { type: 'dir', children: [] },
        '/usr/local': { type: 'dir', children: [] },
        '/var/log': { type: 'dir', children: ['syslog'] },
        '/var/tmp': { type: 'dir', children: [] },
    };

    let currentPath = '/';

    function renderFiles() {
        const list = document.getElementById('files-list');
        const pathDisplay = document.getElementById('files-path');
        list.innerHTML = '';
        pathDisplay.innerText = currentPath;

        const entries = fsData[currentPath]?.children || [];
        entries.forEach(name => {
            const fullPath = (currentPath === '/' ? '' : currentPath) + '/' + name;
            const item = document.createElement('div');
            item.className = 'fs-item';
            if (!fsData[fullPath]) item.classList.add('file');
            item.innerText = name;
            
            item.ondblclick = () => {
                if (fsData[fullPath] && fsData[fullPath].type === 'dir') {
                    currentPath = fullPath;
                    renderFiles();
                }
            };
            list.appendChild(item);
        });
    }

    document.getElementById('files-up').onclick = () => {
        if (currentPath === '/') return;
        const parts = currentPath.split('/').filter(p => p);
        parts.pop();
        currentPath = '/' + parts.join('/');
        if (currentPath === '') currentPath = '/';
        renderFiles();
    };

    /** 
     * NOTEPAD APP LOGIC 
     */
    let tabs = [];
    let activeTabId = null;

    const editor = document.getElementById('editor');
    const tabsContainer = document.getElementById('tabs');

    function saveToStorage() {
        localStorage.setItem('ubuntu_notepad_tabs', JSON.stringify(tabs));
        localStorage.setItem('ubuntu_notepad_active', activeTabId);
    }

    function loadFromStorage() {
        const savedTabs = localStorage.getItem('ubuntu_notepad_tabs');
        const savedActive = localStorage.getItem('ubuntu_notepad_active');
        if (savedTabs) {
            tabs = JSON.parse(savedTabs);
            activeTabId = savedActive;
            if (!tabs.length) {
                createNewTab();
            } else {
                renderTabs();
                switchTab(activeTabId);
            }
        } else {
            createNewTab();
        }
    }

    function createNewTab() {
        const id = Date.now().toString();
        tabs.push({ id, name: `Untitled ${tabs.length + 1}`, content: '' });
        activeTabId = id;
        renderTabs();
        switchTab(id);
        saveToStorage();
    }

    function renderTabs() {
        tabsContainer.innerHTML = '';
        tabs.forEach(tab => {
            const el = document.createElement('div');
            el.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
            el.innerText = tab.name;
            el.onclick = () => switchTab(tab.id);
            tabsContainer.appendChild(el);
        });
    }

    function switchTab(id) {
        activeTabId = id;
        const tab = tabs.find(t => t.id === id);
        editor.value = tab ? tab.content : '';
        renderTabs();
    }

    editor.oninput = () => {
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) {
            tab.content = editor.value;
            saveToStorage();
        }
    };

    document.getElementById('new-tab').onclick = createNewTab;

    // Init
    renderFiles();
    loadFromStorage();

</script>
</body>
</html>
