<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; line-height: 1.5; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        h2 { margin-top: 0; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; }
        input, select { padding: 5px; width: 100%; box-sizing: border-box; }
        #form-error { color: red; font-weight: bold; margin-bottom: 10px; min-height: 1.2em; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .cat-total { background: #f4f4f4; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .expense-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        .expense-row:last-child { border-bottom: none; }
        .exp-del { color: white; background: #d9534f; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 20px; }
        .filter-item { flex: 1; min-width: 150px; }
        #total-container { font-size: 1.2em; font-weight: bold; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Personal Expense Tracker</h1>

    <!-- Entry Form -->
    <div class="section">
        <h2>Add Expense</h2>
        <div id="form-error"></div>
        <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
                <option value="groceries">Groceries</option>
                <option value="transport">Transport</option>
                <option value="bills">Bills</option>
                <option value="fun">Fun</option>
            </select>
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date">
        </div>
        <div class="form-group">
            <label for="note">Note (Optional)</label>
            <input type="text" id="note">
        </div>
        <button id="add-expense">Add Expense</button>
    </div>

    <!-- Filters -->
    <div class="section">
        <h2>Filters</h2>
        <div class="filters">
            <div class="filter-item">
                <label for="filter-category">Category</label>
                <select id="filter-category">
                    <option value="all">All</option>
                    <option value="groceries">Groceries</option>
                    <option value="transport">Transport</option>
                    <option value="bills">Bills</option>
                    <option value="fun">Fun</option>
                </select>
            </div>
            <div class="filter-item">
                <label for="filter-from">From Date</label>
                <input type="date" id="filter-from">
            </div>
            <div class="filter-item">
                <label for="filter-to">To Date</label>
                <input type="date" id="filter-to">
            </div>
        </div>
    </div>

    <!-- Summary -->
    <div class="section">
        <h2>Summary</h2>
        <div class="summary-grid" id="category-summaries">
            <!-- Category totals will be injected here -->
        </div>
        <div id="total-container">
            Total: $<span id="total">0.00</span>
        </div>
    </div>

    <!-- List -->
    <div class="section">
        <h2>Expenses</h2>
        <div id="expense-list"></div>
    </div>

    <script>
        const categories = ['groceries', 'transport', 'bills', 'fun'];
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

        // DOM Elements
        const amountInp = document.getElementById('amount');
        const categoryInp = document.getElementById('category');
        const dateInp = document.getElementById('date');
        const noteInp = document.getElementById('note');
        const addBtn = document.getElementById('add-expense');
        const errorDiv = document.getElementById('form-error');

        const filterCat = document.getElementById('filter-category');
        const filterFrom = document.getElementById('filter-from');
        const filterTo = document.getElementById('filter-to');

        const totalEl = document.getElementById('total');
        const catSummaryContainer = document.getElementById('category-summaries');
        const listContainer = document.getElementById('expense-list');

        // Initialize Category Summary Elements
        function initCategorySummaries() {
            catSummaryContainer.innerHTML = '';
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'cat-total';
                div.setAttribute('data-cat', cat);
                div.innerText = `${cat}: $0.00`;
                catSummaryContainer.appendChild(div);
            });
        }

        function save() {
            localStorage.setItem('expenses', JSON.stringify(expenses));
            render();
        }

        function render() {
            const catVal = filterCat.value;
            const fromVal = filterFrom.value;
            const toVal = filterTo.value;

            // Filter and Sort (Newest First)
            const filtered = expenses.filter(exp => {
                const matchCat = (catVal === 'all' || exp.category === catVal);
                const matchFrom = (!fromVal || exp.date >= fromVal);
                const matchTo = (!toVal || exp.date <= toVal);
                return matchCat && matchFrom && matchTo;
            }).sort((a, b) => b.date.localeCompare(a.date));

            // Render List
            listContainer.innerHTML = '';
            let grandTotal = 0;
            const catTotals = {};
            categories.forEach(c => catTotals[c] = 0);

            filtered.forEach((exp, index) => {
                grandTotal += exp.amount;
                catTotals[exp.category] += exp.amount;

                const row = document.createElement('div');
                row.className = 'expense';
                row.innerHTML = `
                    <div class="expense-row">
                        <span><strong>${exp.date}</strong> | ${exp.category} | $${exp.amount.toFixed(2)} ${exp.note ? `(${exp.note})` : ''}</span>
                        <button class="exp-del" data-id="${exp.id}">Delete</button>
                    </div>
                `;
                listContainer.appendChild(row);
            });

            // Update Total
            totalEl.innerText = grandTotal.toFixed(2);

            // Update Category Totals
            categories.forEach(cat => {
                const el = document.querySelector(`.cat-total[data-cat="${cat}"]`);
                if (el) el.innerText = `${cat}: $${catTotals[cat].toFixed(2)}`;
            });
        }

        function addExpense() {
            const amount = parseFloat(amountInp.value);
            const category = categoryInp.value;
            const date = dateInp.value;
            const note = noteInp.value;

            // Validation
            if (isNaN(amount) || amount <= 0) {
                errorDiv.innerText = "Please enter a valid positive number for amount.";
                return;
            }
            if (!date) {
                errorDiv.innerText = "Please select a date.";
                return;
            }

            // Success
            errorDiv.innerText = "";
            expenses.push({
                id: Date.now(),
                amount,
                category,
                date,
                note
            });

            amountInp.value = ''; // Reset amount field
            save();
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            save();
        }

        // Event Listeners
        addBtn.addEventListener('click', addExpense);
        
        listContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('exp-del')) {
                deleteExpense(parseInt(e.target.getAttribute('data-id')));
            }
        });

        filterCat.addEventListener('change', render);
        filterFrom.addEventListener('input', render);
        filterTo.addEventListener('input', render);

        // Init
        initCategorySummaries();
        render();
    </script>
</body>
</html>
