<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop Replica</title>
<style>
  :root {
    --aubergine: #300a24;
    --panel: rgba(28, 24, 31, 0.92);
    --window: #29262d;
    --window-dark: #201e24;
    --border: #4b4650;
    --text: #f4f1f5;
    --muted: #bbb3c0;
    --orange: #e95420;
    --orange-light: #ff7c45;
    --blue: #4f9eea;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background: var(--aubergine);
  }

  #desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(circle at 70% 20%, rgba(214, 79, 42, 0.45), transparent 22%),
      radial-gradient(circle at 25% 80%, rgba(120, 33, 93, 0.6), transparent 32%),
      linear-gradient(135deg, #1d0a24 0%, #4b1237 46%, #e05b31 130%);
  }

  #desktop::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.22;
    background-image:
      linear-gradient(135deg, transparent 0 47%, rgba(255,255,255,0.08) 47% 48%, transparent 48%),
      linear-gradient(45deg, transparent 0 65%, rgba(0,0,0,0.2) 65% 66%, transparent 66%);
    background-size: 230px 230px, 320px 320px;
    pointer-events: none;
  }

  .topbar {
    position: absolute;
    z-index: 30;
    top: 0;
    left: 0;
    right: 0;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: rgba(19, 16, 21, 0.88);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
  }

  .topbar strong {
    font-size: 14px;
    letter-spacing: 0.2px;
  }

  .topbar-right {
    color: #ddd6e1;
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .desktop-label {
    position: absolute;
    z-index: 1;
    top: 66px;
    left: 28px;
    width: 78px;
    text-align: center;
    color: white;
    font-size: 13px;
    text-shadow: 0 1px 4px #000;
  }

  .desktop-icon {
    width: 52px;
    height: 44px;
    margin: 0 auto 6px;
    border-radius: 8px;
    background: linear-gradient(135deg, #f7c548, #e87926);
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .desktop-icon::before {
    content: "";
    position: absolute;
    width: 20px;
    height: 8px;
    top: -4px;
    left: 6px;
    border-radius: 4px 4px 0 0;
    background: #ffd86b;
  }

  #taskbar {
    position: absolute;
    z-index: 30;
    left: 0;
    bottom: 0;
    top: 34px;
    width: 70px;
    padding: 13px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: rgba(25, 22, 27, 0.86);
    border-right: 1px solid rgba(255,255,255,0.1);
  }

  .launcher {
    width: 52px;
    height: 52px;
    border: 0;
    border-radius: 13px;
    cursor: pointer;
    color: white;
    font-size: 26px;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 3px 8px rgba(0,0,0,0.24);
    transition: transform 0.15s, background 0.15s;
  }

  .launcher:hover {
    transform: scale(1.09);
    background: rgba(255,255,255,0.17);
  }

  #open-files {
    background: linear-gradient(135deg, #f6c846, #df7624);
  }

  #open-notepad {
    background: linear-gradient(135deg, #5ba7f1, #3569bd);
  }

  .window {
    position: absolute;
    z-index: 5;
    width: 680px;
    height: 440px;
    min-width: 360px;
    min-height: 240px;
    display: none;
    flex-direction: column;
    resize: both;
    overflow: hidden;
    border: 1px solid #5b5661;
    border-radius: 10px;
    background: var(--window);
    box-shadow: 0 20px 50px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.5);
  }

  #files-window {
    left: 125px;
    top: 78px;
  }

  #notepad-window {
    left: 225px;
    top: 118px;
  }

  .window.active {
    border-color: #8b838f;
  }

  .titlebar {
    height: 42px;
    min-height: 42px;
    display: flex;
    align-items: center;
    padding: 0 9px 0 15px;
    background: linear-gradient(#3a363e, #302d34);
    border-bottom: 1px solid #4b4650;
    cursor: grab;
    user-select: none;
  }

  .titlebar:active {
    cursor: grabbing;
  }

  .window-title {
    flex: 1;
    font-size: 14px;
    font-weight: bold;
  }

  .window-controls {
    display: flex;
    gap: 6px;
  }

  .win-control {
    width: 27px;
    height: 27px;
    border: 0;
    border-radius: 50%;
    color: #eee;
    background: transparent;
    font-size: 18px;
    line-height: 24px;
    cursor: pointer;
  }

  .win-control:hover {
    background: rgba(255,255,255,0.15);
  }

  .win-close:hover {
    background: #d94841;
  }

  .files-toolbar {
    min-height: 48px;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: #252229;
  }

  #files-up {
    width: 32px;
    height: 30px;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
    background: #45414a;
    font-size: 19px;
  }

  #files-up:hover {
    background: #5c5661;
  }

  #files-up:disabled {
    opacity: 0.4;
    cursor: default;
  }

  #files-path {
    flex: 1;
    min-width: 0;
    padding: 7px 10px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    border-radius: 5px;
    color: #e9e3eb;
    background: #19171c;
    font-family: monospace;
    font-size: 14px;
  }

  #files-list {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
    align-content: start;
    gap: 9px;
    padding: 16px;
    overflow: auto;
    background: #2a272e;
  }

  .fs-item {
    min-height: 92px;
    padding: 10px 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    border: 1px solid transparent;
    border-radius: 8px;
    color: #f5f2f6;
    text-align: center;
    font-size: 13px;
    cursor: default;
    word-break: break-word;
  }

  .fs-item:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.1);
  }

  .fs-icon {
    width: 44px;
    height: 34px;
    position: relative;
    border-radius: 4px;
    background: linear-gradient(#f8d562, #eaa92d);
    box-shadow: inset 0 -4px rgba(180,116,13,0.26), 0 3px 4px rgba(0,0,0,0.2);
  }

  .fs-icon.folder::before {
    content: "";
    position: absolute;
    top: -5px;
    left: 4px;
    width: 20px;
    height: 8px;
    border-radius: 4px 4px 0 0;
    background: #ffdd68;
  }

  .fs-icon.file {
    width: 30px;
    height: 39px;
    background: linear-gradient(135deg, #f7f4ed 0 77%, #c9c3b9 77%);
    box-shadow: 0 3px 4px rgba(0,0,0,0.2);
  }

  .fs-icon.file::after {
    content: "≡";
    position: absolute;
    color: #7d8792;
    top: 9px;
    left: 8px;
    font-size: 19px;
  }

  .notepad-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: #1e1c21;
  }

  #tabs {
    min-height: 42px;
    display: flex;
    align-items: stretch;
    gap: 3px;
    padding: 5px 6px 0;
    overflow-x: auto;
    background: #252229;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    max-width: 160px;
    min-width: 105px;
    padding: 0 13px;
    border: 1px solid transparent;
    border-bottom: 0;
    border-radius: 7px 7px 0 0;
    overflow: hidden;
    color: #c8c2cc;
    background: #343039;
    cursor: pointer;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
  }

  .tab:hover {
    background: #45404a;
  }

  .tab.active {
    color: white;
    background: #1d1b20;
    border-color: #514b56;
  }

  #new-tab {
    width: 33px;
    min-width: 33px;
    height: 31px;
    margin: 5px 7px 5px 2px;
    border: 0;
    border-radius: 6px;
    color: white;
    background: #47424c;
    cursor: pointer;
    font-size: 21px;
  }

  #new-tab:hover {
    background: var(--orange);
  }

  #editor {
    flex: 1;
    width: 100%;
    min-height: 0;
    resize: none;
    outline: none;
    border: 0;
    padding: 16px;
    color: #f3eef4;
    background: #1d1b20;
    font: 15px/1.5 "Courier New", monospace;
  }

  #editor::selection {
    background: #a3465c;
  }

  @media (max-width: 760px) {
    #taskbar {
      width: 58px;
      padding: 10px 4px;
    }

    .launcher {
      width: 46px;
      height: 46px;
    }

    .window {
      width: calc(100vw - 76px);
      height: 360px;
      min-width: 360px;
    }

    #files-window, #notepad-window {
      left: 66px;
      top: 48px;
    }
  }
</style>
</head>
<body>
<div id="desktop">
  <div class="topbar">
    <strong>Activities</strong>
    <div>Ubuntu Desktop</div>
    <div class="topbar-right"><span>◉</span><span>⌁</span><span id="clock"></span></div>
  </div>

  <div class="desktop-label">
    <div class="desktop-icon"></div>
    Home
  </div>

  <nav id="taskbar" aria-label="Application dock">
    <button id="open-files" class="launcher" title="Files" aria-label="Open Files">📁</button>
    <button id="open-notepad" class="launcher" title="Notepad" aria-label="Open Notepad">📝</button>
  </nav>

  <section id="files-window" class="window" aria-label="Files window">
    <div class="titlebar">
      <span class="window-title">Files</span>
      <div class="window-controls">
        <button class="win-control win-close" type="button" aria-label="Close Files">×</button>
      </div>
    </div>
    <div class="files-toolbar">
      <button id="files-up" type="button" title="Parent folder" aria-label="Go to parent folder">↑</button>
      <div id="files-path">/</div>
    </div>
    <div id="files-list" aria-label="Filesystem listing"></div>
  </section>

  <section id="notepad-window" class="window" aria-label="Notepad window">
    <div class="titlebar">
      <span class="window-title">Notepad</span>
      <div class="window-controls">
        <button class="win-control win-close" type="button" aria-label="Close Notepad">×</button>
      </div>
    </div>
    <div class="notepad-body">
      <div style="display:flex; min-height:42px; background:#252229;">
        <div id="tabs" aria-label="Notepad tabs"></div>
        <button id="new-tab" type="button" title="New tab" aria-label="Create new tab">+</button>
      </div>
      <textarea id="editor" aria-label="Text editor" spellcheck="true"></textarea>
    </div>
  </section>
</div>

<script>
(function () {
  const desktop = document.getElementById("desktop");
  const filesWindow = document.getElementById("files-window");
  const notepadWindow = document.getElementById("notepad-window");
  let highestZ = 10;

  function raiseWindow(win) {
    highestZ += 1;
    win.style.zIndex = highestZ;
    document.querySelectorAll(".window").forEach(w => w.classList.remove("active"));
    win.classList.add("active");
  }

  function showWindow(win) {
    win.style.display = "flex";
    raiseWindow(win);
  }

  document.getElementById("open-files").addEventListener("click", function () {
    showWindow(filesWindow);
  });

  document.getElementById("open-notepad").addEventListener("click", function () {
    showWindow(notepadWindow);
  });

  document.querySelectorAll(".window").forEach(function (win) {
    win.addEventListener("mousedown", function () {
      raiseWindow(win);
    });

    win.querySelector(".win-close").addEventListener("click", function (event) {
      event.stopPropagation();
      win.style.display = "none";
    });

    const titlebar = win.querySelector(".titlebar");
    titlebar.addEventListener("mousedown", function (event) {
      if (event.target.closest("button")) return;

      raiseWindow(win);
      const rect = win.getBoundingClientRect();
      const startX = event.clientX;
      const startY = event.clientY;
      const originalLeft = rect.left;
      const originalTop = rect.top;

      function move(eventMove) {
        const maxLeft = Math.max(0, window.innerWidth - 160);
        const maxTop = Math.max(34, window.innerHeight - 80);
        win.style.left = Math.max(0, Math.min(maxLeft, originalLeft + eventMove.clientX - startX)) + "px";
        win.style.top = Math.max(34, Math.min(maxTop, originalTop + eventMove.clientY - startY)) + "px";
      }

      function stop() {
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", stop);
      }

      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", stop);
    });
  });

  const filesystem = {
    "/": [
      { name: "bin", type: "folder" },
      { name: "etc", type: "folder" },
      { name: "home", type: "folder" },
      { name: "usr", type: "folder" },
      { name: "var", type: "folder" },
      { name: "README.txt", type: "file" }
    ],
    "/bin": [
      { name: "bash", type: "file" },
      { name: "cat", type: "file" },
      { name: "ls", type: "file" }
    ],
    "/etc": [
      { name: "hostname", type: "file" },
      { name: "network", type: "folder" },
      { name: "os-release", type: "file" }
    ],
    "/etc/network": [
      { name: "interfaces", type: "file" }
    ],
    "/home": [
      { name: "user", type: "folder" }
    ],
    "/home/user": [
      { name: "Documents", type: "folder" },
      { name: "Downloads", type: "folder" },
      { name: "Pictures", type: "folder" },
      { name: "welcome.txt", type: "file" }
    ],
    "/home/user/Documents": [
      { name: "Projects", type: "folder" },
      { name: "notes.txt", type: "file" },
      { name: "report.odt", type: "file" }
    ],
    "/home/user/Documents/Projects": [
      { name: "desktop-app", type: "folder" },
      { name: "ideas.md", type: "file" }
    ],
    "/home/user/Documents/Projects/desktop-app": [
      { name: "app.html", type: "file" }
    ],
    "/home/user/Downloads": [
      { name: "ubuntu-wallpaper.jpg", type: "file" },
      { name: "archive.zip", type: "file" }
    ],
    "/home/user/Pictures": [
      { name: "Sunset.png", type: "file" },
      { name: "Vacation", type: "folder" }
    ],
    "/home/user/Pictures/Vacation": [
      { name: "mountains.jpg", type: "file" }
    ],
    "/usr": [
      { name: "bin", type: "folder" },
      { name: "share", type: "folder" }
    ],
    "/usr/bin": [
      { name: "python3", type: "file" },
      { name: "nano", type: "file" }
    ],
    "/usr/share": [
      { name: "applications", type: "folder" }
    ],
    "/usr/share/applications": [
      { name: "org.gnome.Files.desktop", type: "file" }
    ],
    "/var": [
      { name: "log", type: "folder" },
      { name: "tmp", type: "folder" }
    ],
    "/var/log": [
      { name: "syslog", type: "file" }
    ],
    "/var/tmp": []
  };

  const pathElement = document.getElementById("files-path");
  const filesList = document.getElementById("files-list");
  const filesUp = document.getElementById("files-up");
  let currentPath = "/";

  function childPath(parent, name) {
    return parent === "/" ? "/" + name : parent + "/" + name;
  }

  function parentPath(path) {
    if (path === "/") return "/";
    const parts = path.split("/").filter(Boolean);
    parts.pop();
    return parts.length ? "/" + parts.join("/") : "/";
  }

  function renderFiles() {
    pathElement.textContent = currentPath;
    filesUp.disabled = currentPath === "/";
    filesList.innerHTML = "";

    const items = filesystem[currentPath] || [];
    items.forEach(function (item) {
      const element = document.createElement("div");
      element.className = "fs-item";
      element.dataset.type = item.type;
      element.dataset.name = item.name;
      element.title = item.type === "folder" ? "Double-click to open " + item.name : item.name;

      const icon = document.createElement("span");
      icon.className = "fs-icon " + (item.type === "folder" ? "folder" : "file");

      const name = document.createElement("span");
      name.textContent = item.name;

      element.appendChild(icon);
      element.appendChild(name);

      if (item.type === "folder") {
        element.addEventListener("dblclick", function () {
          currentPath = childPath(currentPath, item.name);
          renderFiles();
        });
      }

      filesList.appendChild(element);
    });
  }

  filesUp.addEventListener("click", function () {
    if (currentPath !== "/") {
      currentPath = parentPath(currentPath);
      renderFiles();
    }
  });

  renderFiles();

  const STORAGE_KEY = "ubuntu-desktop-notepad-tabs-v1";
  const tabsElement = document.getElementById("tabs");
  const editor = document.getElementById("editor");
  const newTabButton = document.getElementById("new-tab");

  let noteState = {
    activeId: null,
    tabs: []
  };

  function makeId() {
    return "tab-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
  }

  function defaultTab(number) {
    return {
      id: makeId(),
      title: "Untitled " + number,
      content: ""
    };
  }

  function saveNotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(noteState));
  }

  function loadNotes() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && Array.isArray(saved.tabs) && saved.tabs.length) {
        noteState.tabs = saved.tabs.filter(function (tab) {
          return tab && typeof tab.id === "string" && typeof tab.content === "string";
        }).map(function (tab, index) {
          return {
            id: tab.id,
            title: typeof tab.title === "string" ? tab.title : "Untitled " + (index + 1),
            content: tab.content
          };
        });

        if (noteState.tabs.length) {
          noteState.activeId = noteState.tabs.some(tab => tab.id === saved.activeId)
            ? saved.activeId
            : noteState.tabs[0].id;
          return;
        }
      }
    } catch (error) {
      /* Invalid saved data is replaced by a clean document. */
    }

    const first = defaultTab(1);
    noteState = { activeId: first.id, tabs: [first] };
    saveNotes();
  }

  function activeTab() {
    return noteState.tabs.find(tab => tab.id === noteState.activeId);
  }

  function renderTabs() {
    tabsElement.innerHTML = "";
    noteState.tabs.forEach(function (tab) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "tab" + (tab.id === noteState.activeId ? " active" : "");
      button.textContent = tab.title;
      button.title = tab.title;
      button.dataset.tabId = tab.id;
      button.addEventListener("click", function () {
        const current = activeTab();
        if (current) current.content = editor.value;
        noteState.activeId = tab.id;
        saveNotes();
        renderTabs();
        editor.value = activeTab().content;
        editor.focus();
      });
      tabsElement.appendChild(button);
    });

    const activeButton = tabsElement.querySelector(".tab.active");
    if (activeButton) activeButton.scrollIntoView({ block: "nearest", inline: "nearest" });
  }

  newTabButton.addEventListener("click", function () {
    const current = activeTab();
    if (current) current.content = editor.value;

    const tab = defaultTab(noteState.tabs.length + 1);
    noteState.tabs.push(tab);
    noteState.activeId = tab.id;
    saveNotes();
    renderTabs();
    editor.value = "";
    editor.focus();
  });

  editor.addEventListener("input", function () {
    const current = activeTab();
    if (current) {
      current.content = editor.value;
      saveNotes();
    }
  });

  loadNotes();
  renderTabs();
  editor.value = activeTab().content;

  function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  updateClock();
  setInterval(updateClock, 30000);
})();
</script>
</body>
</html>
