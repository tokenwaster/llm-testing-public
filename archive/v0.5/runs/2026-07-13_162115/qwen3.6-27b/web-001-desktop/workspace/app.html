<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #1e1e2e;
    --bg-panel: #2a2a3c;
    --bg-window: #2e2e40;
    --bg-header: #232336;
    --bg-hover: #3a3a52;
    --bg-active: #4a4a66;
    --accent: #e95420;
    --accent-hover: #ff7a45;
    --text: #e0e0e0;
    --text-dim: #9999aa;
    --border: #3d3d55;
    --folder-color: #e95420;
    --file-color: #7eb8da;
    --success: #4caf50;
  }

  body {
    font-family: 'Segoe UI', Cantarell, Ubuntu, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    background: var(--bg-dark);
    color: var(--text);
    user-select: none;
  }

  #desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
    overflow: hidden;
  }

  /* Desktop icons */
  .desktop-icon {
    position: absolute;
    width: 80px;
    text-align: center;
    cursor: pointer;
    padding: 8px 4px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.08); }
  .desktop-icon .icon-img {
    width: 48px; height: 48px; margin: 0 auto 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .desktop-icon .icon-label {
    font-size: 11px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    word-break: break-word;
  }

  /* Taskbar */
  #taskbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(20, 20, 35, 0.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    z-index: 9999;
    gap: 6px;
  }

  .taskbar-btn {
    width: 42px; height: 42px;
    border: none; border-radius: 10px;
    background: transparent;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    position: relative;
  }
  .taskbar-btn:hover { background: var(--bg-hover); transform: scale(1.08); }
  .taskbar-btn:active { transform: scale(0.95); }
  .taskbar-btn.active::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 50%; transform: translateX(-50%);
    width: 18px; height: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  .taskbar-sep {
    width: 1px; height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  .taskbar-clock {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.3;
  }

  /* Windows */
  .app-window {
    position: absolute;
    min-width: 360px;
    min-height: 240px;
    background: var(--bg-window);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    transition: box-shadow 0.2s;
  }
  .app-window.focused {
    box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 2px 12px rgba(0,0,0,0.35);
    z-index: 101;
  }

  .win-header {
    height: 38px;
    background: var(--bg-header);
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: grab;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .win-header:active { cursor: grabbing; }
  .win-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    pointer-events: none;
  }
  .win-controls {
    display: flex; gap: 6px;
    margin-left: auto;
  }
  .win-controls button {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .win-controls button:hover { filter: brightness(1.3); }
  .win-close { background: #e74c3c !important; }
  .win-minimize { background: #f39c12 !important; }
  .win-maximize { background: #27ae60 !important; }

  .win-body {
    flex: 1;
    overflow: auto;
    padding: 0;
    min-height: 200px;
  }

  /* Files app */
  .files-toolbar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }
  .files-toolbar button {
    background: var(--bg-hover);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .files-toolbar button:hover { background: var(--bg-active); }
  #files-path {
    flex: 1;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Consolas', 'Courier New', monospace;
    text-align: center;
  }

  .files-content {
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
  }

  .fs-item {
    width: 90px;
    padding: 10px 6px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .fs-item:hover { background: var(--bg-hover); }
  .fs-item .fs-icon { font-size: 36px; line-height: 1; }
  .fs-item .fs-name {
    font-size: 11px;
    word-break: break-all;
    line-height: 1.3;
    color: var(--text);
  }
  .fs-item.folder .fs-icon { color: var(--folder-color); }
  .fs-item.file .fs-icon { color: var(--file-color); }

  /* Notepad app */
  .notepad-tabs-bar {
    display: flex;
    align-items: center;
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 4px 4px 0 4px;
    gap: 2px;
    flex-shrink: 0;
  }
  #tabs {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
  }
  .tab {
    padding: 6px 14px;
    background: var(--bg-panel);
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    transition: background 0.12s, color 0.12s;
    display: flex;
    align-items: center;
    gap: 6px;
    max-width: 160px;
  }
  .tab:hover { background: var(--bg-hover); }
  .tab.active {
    background: var(--bg-window);
    color: var(--text);
    border-color: var(--border);
  }
  .tab-close {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .tab-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

  #new-tab {
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
    flex-shrink: 0;
  }
  #new-tab:hover { background: var(--bg-hover); color: var(--text); }

  #editor {
    width: 100%;
    height: 100%;
    background: var(--bg-window);
    color: var(--text);
    border: none;
    resize: none;
    padding: 12px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.5;
    outline: none;
    tab-size: 4;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-active); }

  /* Animations */
  @keyframes winOpen {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .app-window { animation: winOpen 0.2s ease-out; }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 16px; height: 16px;
    cursor: nwse-resize;
  }
</style>
</head>
<body>

<div id="desktop">
  <!-- Desktop Icons -->
  <div class="desktop-icon" style="top:20px;left:20px;" ondblclick="openFiles()">
    <div class="icon-img">📁</div>
    <div class="icon-label">Files</div>
  </div>
  <div class="desktop-icon" style="top:110px;left:20px;" ondblclick="openNotepad()">
    <div class="icon-img">📝</div>
    <div class="icon-label">Notepad</div>
  </div>
  <div class="desktop-icon" style="top:200px;left:20px;">
    <div class="icon-img">🗑️</div>
    <div class="icon-label">Trash</div>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="app-window" style="display:none; width:620px; height:440px; top:60px; left:100px;">
    <div class="win-header" data-window="files-window">
      <div class="win-controls">
        <button class="win-close" onclick="closeWindow('files-window')"></button>
        <button class="win-minimize" onclick="minimizeWindow('files-window')"></button>
        <button class="win-maximize" onclick="maximizeWindow('files-window')"></button>
      </div>
      <div class="win-title">📁 Files</div>
    </div>
    <div class="win-body" style="display:flex;flex-direction:column;">
      <div class="files-toolbar">
        <button id="files-up" onclick="navigateUp()">⬆ Up</button>
        <div id="files-path">/</div>
      </div>
      <div class="files-content" id="files-content"></div>
    </div>
    <div class="resize-handle" data-window="files-window"></div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="app-window" style="display:none; width:600px; height:420px; top:80px; left:180px;">
    <div class="win-header" data-window="notepad-window">
      <div class="win-controls">
        <button class="win-close" onclick="closeWindow('notepad-window')"></button>
        <button class="win-minimize" onclick="minimizeWindow('notepad-window')"></button>
        <button class="win-maximize" onclick="maximizeWindow('notepad-window')"></button>
      </div>
      <div class="win-title">📝 Notepad</div>
    </div>
    <div class="win-body" style="display:flex;flex-direction:column;">
      <div class="notepad-tabs-bar">
        <div id="tabs"></div>
        <button id="new-tab" onclick="createNewTab()" title="New Tab">+</button>
      </div>
      <textarea id="editor" style="flex:1;" oninput="onEditorInput()"></textarea>
    </div>
    <div class="resize-handle" data-window="notepad-window"></div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="open-files" class="taskbar-btn" onclick="openFiles()" title="Files">📁</button>
    <button id="open-notepad" class="taskbar-btn" onclick="openNotepad()" title="Notepad">📝</button>
    <div class="taskbar-sep"></div>
    <div class="taskbar-clock" id="clock"></div>
  </div>
</div>

<script>

  '/var/log/dpkg.log': { type: 'file', content: '2024-01-15 10:00:01 status installed bash:amd64 5.1-6' },

  '/var/cache/apt': { type: 'folder', children: ['archives'] },

// ===================== FILES APP =====================
let currentPath = '/';

function getFolderItems(path) {
  const entry = fileSystem[path];
  if (!entry || entry.type !== 'folder') return [];
  return entry.children.map(name => {
    const fullPath = path === '/' ? '/' + name : path + '/' + name;
    const child = fileSystem[fullPath];
    return {
      name: name,
      type: child ? child.type : 'file',
      path: fullPath
    };
  });
}

function renderFiles() {
  const container = document.getElementById('files-content');
  const pathEl = document.getElementById('files-path');
  pathEl.textContent = currentPath;

  const items = getFolderItems(currentPath);
  container.innerHTML = '';

  if (items.length === 0) {
    container.innerHTML = '<div style="padding:20px;color:var(--text-dim);text-align:center;width:100%;">Empty folder</div>';
    return;
  }

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'fs-item ' + item.type;
    el.textContent = item.name;

    const icon = document.createElement('div');
    icon.className = 'fs-icon';
    icon.textContent = item.type === 'folder' ? '📁' : getFileIcon(item.name);
    el.insertBefore(icon, el.firstChild);

    const nameEl = document.createElement('div');
    nameEl.className = 'fs-name';
    nameEl.textContent = item.name;
    el.appendChild(nameEl);

    el.addEventListener('dblclick', () => {
      if (item.type === 'folder') {
        navigateTo(item.path);
      }
    });

    container.appendChild(el);
  });
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    'txt': '📄', 'md': '📄', 'py': '🐍', 'js': '📜',
    'jpg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
    'mp3': '🎵', 'wav': '🎵', 'm3u': '🎵',
    'mp4': '🎬', 'mkv': '🎬', 'avi': '🎬',
    'pdf': '📕', 'doc': '📘',
    'gz': '📦', 'tar': '📦', 'zip': '📦',
    'so': '⚙️', 'conf': '⚙️', 'cfg': '⚙️',
    'log': '📋', 'desktop': '🖥️',
    '1': '📖', 'gz': '📦'
  };
  return icons[ext] || '📄';
}

function navigateTo(path) {
  currentPath = path;
  renderFiles();
}

function navigateUp() {
  if (currentPath === '/') return;
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  currentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
  renderFiles();
}

// ===================== NOTEPAD APP =====================
let notepadTabs = [];
let activeTabIndex = 0;

function loadNotepadState() {
  try {
    const saved = localStorage.getItem('notepad-tabs');
    if (saved) {
      notepadTabs = JSON.parse(saved);
      if (notepadTabs.length === 0) notepadTabs.push({ name: 'Untitled', content: '' });
      activeTabIndex = Math.min(activeTabIndex, notepadTabs.length - 1);
    } else {
      notepadTabs = [{ name: 'Untitled', content: '' }];
      activeTabIndex = 0;
    }
  } catch(e) {
    notepadTabs = [{ name: 'Untitled', content: '' }];
    activeTabIndex = 0;
  }
}

function saveNotepadState() {
  try {
    localStorage.setItem('notepad-tabs', JSON.stringify(notepadTabs));
  } catch(e) {}
}

function renderTabs() {
  const tabsContainer = document.getElementById('tabs');
  tabsContainer.innerHTML = '';

  notepadTabs.forEach((tab, i) => {
    const tabEl = document.createElement('div');
    tabEl.className = 'tab' + (i === activeTabIndex ? ' active' : '');
    tabEl.textContent = tab.name;
    tabEl.addEventListener('click', () => switchTab(i));

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '×';
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeTab(i);
    });

    tabEl.appendChild(closeBtn);
    tabsContainer.appendChild(tabEl);
  });

  const editor = document.getElementById('editor');
  if (notepadTabs[activeTabIndex]) {
    editor.value = notepadTabs[activeTabIndex].content;
  }
}

function switchTab(index) {
  activeTabIndex = index;
  renderTabs();
}

function closeTab(index) {
  if (notepadTabs.length <= 1) {
    // Keep at least one tab
    notepadTabs[0] = { name: 'Untitled', content: '' };
    activeTabIndex = 0;
  } else {
    notepadTabs.splice(index, 1);
    if (activeTabIndex >= notepadTabs.length) {
      activeTabIndex = notepadTabs.length - 1;
    }
  }
  saveNotepadState();
  renderTabs();
}

function createNewTab() {
  const name = 'Untitled ' + (notepadTabs.length + 1);
  notepadTabs.push({ name: name, content: '' });
  activeTabIndex = notepadTabs.length - 1;
  saveNotepadState();
  renderTabs();
}

function onEditorInput() {
  const editor = document.getElementById('editor');
  if (notepadTabs[activeTabIndex]) {
    notepadTabs[activeTabIndex].content = editor.value;
    saveNotepadState();
  }
}

// ===================== WINDOW MANAGEMENT =====================
let windowZIndex = 100;
let dragState = null;
let resizeState = null;

function openFiles() {
  const win = document.getElementById('files-window');
  win.style.display = 'flex';
  focusWindow(win);
  renderFiles();
  updateTaskbar();
}

function openNotepad() {
  const win = document.getElementById('notepad-window');
  win.style.display = 'flex';
  focusWindow(win);
  renderTabs();
  updateTaskbar();
}

function closeWindow(id) {
  document.getElementById(id).style.display = 'none';
  updateTaskbar();
}

function minimizeWindow(id) {
  document.getElementById(id).style.display = 'none';
  updateTaskbar();
}

function maximizeWindow(id) {
  const win = document.getElementById(id);
  if (win.dataset.maximized === 'true') {
    win.style.top = win.dataset.origTop;
    win.style.left = win.dataset.origLeft;
    win.style.width = win.dataset.origWidth;
    win.style.height = win.dataset.origHeight;
    win.style.borderRadius = '10px';
    win.dataset.maximized = 'false';
  } else {
    win.dataset.origTop = win.style.top;
    win.dataset.origLeft = win.style.left;
    win.dataset.origWidth = win.style.width;
    win.dataset.origHeight = win.style.height;
    win.style.top = '0';
    win.style.left = '0';
    win.style.width = '100vw';
    win.style.height = 'calc(100vh - 52px)';
    win.style.borderRadius = '0';
    win.dataset.maximized = 'true';
  }
}

function focusWindow(win) {
  document.querySelectorAll('.app-window').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
  windowZIndex++;
  win.style.zIndex = windowZIndex;
  updateTaskbar();
}

function updateTaskbar() {
  const filesBtn = document.getElementById('open-files');
  const notepadBtn = document.getElementById('open-notepad');
  filesBtn.classList.toggle('active', document.getElementById('files-window').style.display !== 'none');
  notepadBtn.classList.toggle('active', document.getElementById('notepad-window').style.display !== 'none');
}

// Dragging
document.addEventListener('mousedown', (e) => {
  // Focus window on click
  const win = e.target.closest('.app-window');
  if (win) focusWindow(win);

  // Check resize handle
  const resizeHandle = e.target.closest('.resize-handle');
  if (resizeHandle) {
    const winId = resizeHandle.dataset.window;
    const w = document.getElementById(winId);
    if (w.dataset.maximized === 'true') return;
    resizeState = {
      win: w,
      startX: e.clientX,
      startY: e.clientY,
      startW: w.offsetWidth,
      startH: w.offsetHeight
    };
    e.preventDefault();
    return;
  }

  // Check drag header
  const header = e.target.closest('.win-header');
  if (header && !e.target.closest('.win-controls')) {
    const winId = header.dataset.window;
    const w = document.getElementById(winId);
    if (w.dataset.maximized === 'true') return;
    dragState = {
      win: w,
      offsetX: e.clientX - w.offsetLeft,
      offsetY: e.clientY - w.offsetTop
    };
    e.preventDefault();
  }
});

document.addEventListener('mousemove', (e) => {
  if (dragState) {
    dragState.win.style.left = (e.clientX - dragState.offsetX) + 'px';
    dragState.win.style.top = (e.clientY - dragState.offsetY) + 'px';
  }
  if (resizeState) {
    const newW = Math.max(360, resizeState.startW + (e.clientX - resizeState.startX));
    const newH = Math.max(240, resizeState.startH + (e.clientY - resizeState.startY));
    resizeState.win.style.width = newW + 'px';
    resizeState.win.style.height = newH + 'px';
  }
});

document.addEventListener('mouseup', () => {
  dragState = null;
  resizeState = null;
});

// ===================== CLOCK =====================
function updateClock() {
  const now = new Date();
  const el = document.getElementById('clock');
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  el.textContent = time + '\n' + date;
}
setInterval(updateClock, 1000);
updateClock();

// ===================== INIT =====================
loadNotepadState();
renderFiles();
renderTabs();
</script>
