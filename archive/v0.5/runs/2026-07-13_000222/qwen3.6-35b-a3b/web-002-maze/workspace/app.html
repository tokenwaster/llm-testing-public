<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Explorer Bots</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }
  #controls {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #controls button {
    padding: 8px 20px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #0f3460;
    color: #e0e0e0;
    font-weight: 600;
    transition: background 0.2s;
  }
  #controls button:hover { background: #16213e; }
  #controls button:active { background: #1a1a5e; }
  .stat {
    font-size: 15px;
    font-weight: 600;
    color: #e94560;
    min-width: 120px;
    text-align: center;
  }
  #maze {
    border: 3px solid #e94560;
    border-radius: 4px;
    background: #0a0a1a;
    display: block;
  }
  #legend {
    margin-top: 10px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
</style>
</head>
<body>
<div id="controls">
  <button id="reset">Reset</button>
  <div class="stat">Completed: <span id="completed">0</span>/24</div>
  <div class="stat">Time: <span id="timer">0</span> ticks</div>
</div>
<canvas id="maze" width="600" height="600"></canvas>
<div id="legend">24 bots explore the maze to find the exit. Timer freezes when all arrive.</div>

<script>
(function() {
  "use strict";

  // --- Seeded PRNG (mulberry32) ---
  function mulberry32(seed) {
    let s = seed | 0;
    return function() {
      s |= 0; s = s + 0x6D2B79F5 | 0;
      let t = Math.imul(s ^ s >>> 15, 1 | s);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // --- Constants ---
  const MAZE_ROWS = 20;
  const MAZE_COLS = 20;
  const NUM_BOTS = 24;
  const CELL_SIZE = 30;
  const WALL_THICKNESS = 2;
  const CANVAS_SIZE = MAZE_ROWS * CELL_SIZE + WALL_THICKNESS * 2;

  // --- Maze generation (iterative DFS / recursive backtracker) ---
  function generateMaze(rows, cols, rng) {
    const grid = [];
    for (let r = 0; r < rows; r++) {
      grid[r] = [];
      for (let c = 0; c < cols; c++) {
        grid[r][c] = { n: true, e: true, s: true, w: true, visited: false };
      }
    }

    const stack = [];
    const startR = 0, startC = 0;
    grid[startR][startC].visited = true;
    stack.push({ r: startR, c: startC });

    const dirs = [
      { dr: -1, dc: 0, wall: 'n', opp: 's' },
      { dr: 0, dc: 1, wall: 'e', opp: 'w' },
      { dr: 1, dc: 0, wall: 's', opp: 'n' },
      { dr: 0, dc: -1, wall: 'w', opp: 'e' }
    ];

    while (stack.length > 0) {
      const current = stack[stack.length - 1];
      const neighbors = [];
      for (const d of dirs) {
        const nr = current.r + d.dr;
        const nc = current.c + d.dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !grid[nr][nc].visited) {
          neighbors.push({ r: nr, c: nc, dir: d });
        }
      }
      if (neighbors.length > 0) {
        const chosen = neighbors[Math.floor(rng() * neighbors.length)];
        grid[current.r][current.c][chosen.dir.wall] = false;
        grid[chosen.r][chosen.c][chosen.dir.opp] = false;
        grid[chosen.r][chosen.c].visited = true;
        stack.push({ r: chosen.r, c: chosen.c });
      } else {
        stack.pop();
      }
    }

    return grid;
  }

  // --- Bot class ---
  function createBot(id, seed, mazeRows, mazeCols) {
    const rng = mulberry32(seed);
    // Shuffle direction order for this bot
    const dirOrder = [0, 1, 2, 3];
    for (let i = dirOrder.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [dirOrder[i], dirOrder[j]] = [dirOrder[j], dirOrder[i]];
    }

    return {
      id: id,
      r: 0,
      c: 0,
      displayR: 0,
      displayC: 0,
      path: [{ r: 0, c: 0 }],
      deadEnds: [],
      // DFS stack: cells we're currently exploring
      stack: [{ r: 0, c: 0 }],
      // Edges used by this bot: Set of "r1,c1,r2,c2"
      edgesUsed: new Set(),
      finishTick: null,
      color: `hsl(${(id * 15) % 360}, 80%, 60%)`,
      dirOrder: dirOrder,
      done: false,
      // Cells fully explored by this bot (all neighbors visited)
      fullyExplored: new Set(),
      // Cells visited (entered) by this bot
      visited: new Set(['0,0']),
      // For each cell, track which neighbors have been explored
      // exploredNeighbors: Map<cellKey, Set<neighborKey>>
      exploredNeighbors: new Map(),
      // Current state
      state: 'exploring', // 'exploring' or 'backtracking'
      backtrackPath: [],
      // Index of next cell to move to during backtracking
      backtrackIdx: 0
    };
  }

  // --- Game state ---
  let maze = null;
  let bots = [];
  let elapsed = 0;
  let finished = false;
  let completedCount = 0;
  let spawn = { r: 0, c: 0 };
  let exit = { r: MAZE_ROWS - 1, c: MAZE_COLS - 1 };
  let animFrame = null;
  let lastTickTime = 0;
  let tickAccumulator = 0;
  let tickSpeed = 100;

  // --- Canvas setup ---
  const canvas = document.getElementById('maze');
  const ctx = canvas.getContext('2d');
  canvas.width = CANVAS_SIZE;
  canvas.height = CANVAS_SIZE;

  // --- DOM refs ---
  const completedEl = document.getElementById('completed');
  const timerEl = document.getElementById('timer');
  const resetBtn = document.getElementById('reset');

  // --- Initialize game ---
  function init(seed) {
    const rng = mulberry32(seed || 42);
    maze = generateMaze(MAZE_ROWS, MAZE_COLS, rng);
    spawn = { r: 0, c: 0 };
    exit = { r: MAZE_ROWS - 1, c: MAZE_COLS - 1 };
    elapsed = 0;
    finished = false;
    completedCount = 0;

    bots = [];
    for (let i = 0; i < NUM_BOTS; i++) {
      bots.push(createBot(i, seed ? seed + i + 1 : i + 1, MAZE_ROWS, MAZE_COLS));
    }

    completedEl.textContent = '0';
    timerEl.textContent = '0';
    draw();
  }

  // --- Get walls for a cell ---
  function getWalls(r, c) {
    if (r < 0 || r >= MAZE_ROWS || c < 0 || c >= MAZE_COLS) {
      return { n: true, e: true, s: true, w: true };
    }
    return {
      n: maze[r][c].n,
      e: maze[r][c].e,
      s: maze[r][c].s,
      w: maze[r][c].w
    };
  }

  // --- Check if two cells are connected ---
  function isConnected(r1, c1, r2, c2) {
    if (r1 === r2 && c1 === c2) return true;
    if (r1 === r2 + 1 && c1 === c2) return !maze[r1][c1].n;
    if (r1 === r2 - 1 && c1 === c2) return !maze[r2][c2].n;
    if (c1 === c2 + 1 && r1 === r2) return !maze[r1][c1].w;
    if (c1 === c2 - 1 && r1 === r2) return !maze[r2][c2].w;
    return false;
  }

  // --- Edge key ---
  function edgeKey(r1, c1, r2, c2) {
    return r1 + ',' + c1 + ',' + r2 + ',' + c2;
  }

  // --- Cell key ---
  function cellKey(r, c) {
    return r + ',' + c;
  }

  // --- Bot step ---
  function botStep(bot) {
    if (bot.done) return;

    // Check if at exit
    if (bot.r === exit.r && bot.c === exit.c) {
      bot.done = true;
      bot.finishTick = elapsed;
      return;
    }

    if (bot.state === 'backtracking') {
      botBacktrack(bot);
      return;
    }

    botExplore(bot);
  }

  function botExplore(bot) {
    if (bot.done) return;

    const ck = cellKey(bot.r, bot.c);

    // Get all valid neighbors (connected cells)
    const dirs = [
      { dr: -1, dc: 0, wall: 'n' },
      { dr: 0, dc: 1, wall: 'e' },
      { dr: 1, dc: 0, wall: 's' },
      { dr: 0, dc: -1, wall: 'w' }
    ];

    const neighbors = [];
    for (const d of dirs) {
      const nr = bot.r + d.dr;
      const nc = bot.c + d.dc;
      if (nr >= 0 && nr < MAZE_ROWS && nc >= 0 && nc < MAZE_COLS) {
        if (isConnected(bot.r, bot.c, nr, nc)) {
          neighbors.push({ r: nr, c: nc, dir: d });
        }
      }
    }

    // Get explored neighbors for this cell
    let exploredNbrs = bot.exploredNeighbors.get(ck);
    if (!exploredNbrs) {
      exploredNbrs = new Set();
      bot.exploredNeighbors.set(ck, exploredNbrs);
    }

    // Find unexplored neighbors (not in exploredNbrs) that haven't had their edge used
    const unexplored = [];
    for (const n of neighbors) {
      const nk = cellKey(n.r, n.c);
      if (!exploredNbrs.has(nk)) {
        const ek = edgeKey(bot.r, bot.c, n.r, n.c);
        if (!bot.edgesUsed.has(ek)) {
          unexplored.push(n);
        }
      }
    }

    if (unexplored.length > 0) {
      // Pick next unexplored neighbor using bot's direction preference
      let chosen = null;
      for (const di of bot.dirOrder) {
        for (const n of unexplored) {
          const dIdx = dirs.findIndex(d => d.dr === n.dir.dr && d.dc === n.dir.dc);
          if (dIdx === di) {
            chosen = n;
            break;
          }
        }
        if (chosen) break;
      }
      if (!chosen) chosen = unexplored[0];

      // Move to chosen neighbor
      const nr = chosen.r;
      const nc = chosen.c;
      const ek = edgeKey(bot.r, bot.c, nr, nc);
      bot.edgesUsed.add(ek);

      bot.r = nr;
      bot.c = nc;
      bot.path.push({ r: nr, c: nc });
      bot.visited.add(cellKey(nr, nc));

      // Mark current cell's neighbor as explored
      exploredNbrs.add(cellKey(nr, nc));

      // Push to stack
      bot.stack.push({ r: bot.r, c: bot.c });
    } else {
      // All neighbors explored or edges used up
      // Mark this cell as fully explored
      bot.fullyExplored.add(ck);
      bot.deadEnds.push({ r: bot.r, c: bot.c });

      // Backtrack
      if (bot.stack.length <= 1) {
        bot.done = true;
        bot.finishTick = elapsed;
        return;
      }

      // Pop from stack to find where to backtrack to
      bot.stack.pop();
      const target = bot.stack[bot.stack.length - 1];

      // Build backtrack path using flood fill / BFS to find path back
      bot.backtrackPath = findPath(bot.r, bot.c, target.r, target.c, bot);
      bot.backtrackIdx = 0;

      if (bot.backtrackPath.length === 0) {
        bot.done = true;
        bot.finishTick = elapsed;
        return;
      }

      bot.state = 'backtracking';
    }
  }

  function findPath(fromR, fromC, toR, toC, bot) {
    // BFS to find path from current position to target
    // Only use edges that haven't been used by this bot
    const visited = new Set();
    const queue = [{ r: fromR, c: fromC, path: [] }];
    visited.add(cellKey(fromR, fromC));

    const dirs = [
      { dr: -1, dc: 0 },
      { dr: 0, dc: 1 },
      { dr: 1, dc: 0 },
      { dr: 0, dc: -1 }
    ];

    while (queue.length > 0) {
      const curr = queue.shift();
      if (curr.r === toR && curr.c === toC) {
        return curr.path;
      }
      for (const d of dirs) {
        const nr = curr.r + d.dr;
        const nc = curr.c + d.dc;
        const nk = cellKey(nr, nc);
        if (nr >= 0 && nr < MAZE_ROWS && nc >= 0 && nc < MAZE_COLS && !visited.has(nk)) {
          const ek = edgeKey(curr.r, curr.c, nr, nc);
          if (!bot.edgesUsed.has(ek) && isConnected(curr.r, curr.c, nr, nc)) {
            visited.add(nk);
            queue.push({ r: nr, c: nc, path: [...curr.path, { r: nr, c: nc }] });
          }
        }
      }
    }
    return [];
  }

  function botBacktrack(bot) {
    if (bot.done) return;

    if (bot.backtrackIdx >= bot.backtrackPath.length) {
      // Backtracking complete, resume exploring
      bot.state = 'exploring';
      bot.backtrackPath = [];
      bot.backtrackIdx = 0;
      botExplore(bot);
      return;
    }

    const target = bot.backtrackPath[bot.backtrackIdx];
    const dr = Math.sign(target.r - bot.r);
    const dc = Math.sign(target.c - bot.c);
    const nr = bot.r + dr;
    const nc = bot.c + dc;

    // Record edge traversal
    const ek = edgeKey(bot.r, bot.c, nr, nc);
    bot.edgesUsed.add(ek);

    bot.r = nr;
    bot.c = nc;
    bot.path.push({ r: nr, c: nc });
    bot.visited.add(cellKey(nr, nc));

    bot.backtrackIdx++;

    // Check if we reached the backtrack target
    if (nr === target.r && nc === target.c) {
      bot.backtrackPath = [];
      bot.backtrackIdx = 0;
      bot.state = 'exploring';
      botExplore(bot);
    }
  }

  // --- Tick ---
  function tick(n) {
    if (finished) return;

    for (let i = 0; i < n; i++) {
      // Step each bot
      for (const bot of bots) {
        if (!bot.done) {
          botStep(bot);
        }
      }

      elapsed++;

      // Check completion
      completedCount = bots.filter(b => b.done).length;

      if (completedCount >= NUM_BOTS) {
        finished = true;
      }
    }

    // Update DOM
    completedEl.textContent = completedCount;
    timerEl.textContent = elapsed;
    draw();
  }

  // --- Draw ---
  function draw() {
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Draw cells
    for (let r = 0; r < MAZE_ROWS; r++) {
      for (let c = 0; c < MAZE_COLS; c++) {
        const x = c * CELL_SIZE + WALL_THICKNESS;
        const y = r * CELL_SIZE + WALL_THICKNESS;
        ctx.fillStyle = '#16213e';
        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
      }
    }

    // Draw exit
    const ex = exit.c * CELL_SIZE + WALL_THICKNESS;
    const ey = exit.r * CELL_SIZE + WALL_THICKNESS;
    ctx.fillStyle = '#e94560';
    ctx.fillRect(ex + 2, ey + 2, CELL_SIZE - 4, CELL_SIZE - 4);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', ex + CELL_SIZE / 2, ey + CELL_SIZE / 2);

    // Draw spawn
    const sx = spawn.c * CELL_SIZE + WALL_THICKNESS;
    const sy = spawn.r * CELL_SIZE + WALL_THICKNESS;
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(sx + 2, sy + 2, CELL_SIZE - 4, CELL_SIZE - 4);
    ctx.fillStyle = '#fff';
    ctx.fillText('S', sx + CELL_SIZE / 2, sy + CELL_SIZE / 2);

    // Draw walls
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = WALL_THICKNESS;
    ctx.lineCap = 'round';

    for (let r = 0; r < MAZE_ROWS; r++) {
      for (let c = 0; c < MAZE_COLS; c++) {
        const x = c * CELL_SIZE + WALL_THICKNESS;
        const y = r * CELL_SIZE + WALL_THICKNESS;

        if (maze[r][c].s && r < MAZE_ROWS - 1) {
          ctx.beginPath();
          ctx.moveTo(x, y + CELL_SIZE);
          ctx.lineTo(x + CELL_SIZE, y + CELL_SIZE);
          ctx.stroke();
        }
        if (maze[r][c].e && c < MAZE_COLS - 1) {
          ctx.beginPath();
          ctx.moveTo(x + CELL_SIZE, y);
          ctx.lineTo(x + CELL_SIZE, y + CELL_SIZE);
          ctx.stroke();
        }
      }
    }
    // Outer walls
    ctx.beginPath();
    ctx.moveTo(WALL_THICKNESS, WALL_THICKNESS);
    ctx.lineTo(WALL_THICKNESS + MAZE_COLS * CELL_SIZE, WALL_THICKNESS);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(WALL_THICKNESS, WALL_THICKNESS);
    ctx.lineTo(WALL_THICKNESS, WALL_THICKNESS + MAZE_ROWS * CELL_SIZE);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(WALL_THICKNESS + MAZE_COLS * CELL_SIZE, WALL_THICKNESS);
    ctx.lineTo(WALL_THICKNESS + MAZE_COLS * CELL_SIZE, WALL_THICKNESS + MAZE_ROWS * CELL_SIZE);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(WALL_THICKNESS, WALL_THICKNESS + MAZE_ROWS * CELL_SIZE);
    ctx.lineTo(WALL_THICKNESS + MAZE_COLS * CELL_SIZE, WALL_THICKNESS + MAZE_ROWS * CELL_SIZE);
    ctx.stroke();

    // Draw bots
    for (const bot of bots) {
      const bx = bot.displayC * CELL_SIZE + WALL_THICKNESS + CELL_SIZE / 2;
      const by = bot.displayR * CELL_SIZE + WALL_THICKNESS + CELL_SIZE / 2;
      const radius = bot.done ? 4 : 5;

      ctx.beginPath();
      ctx.arc(bx, by, radius, 0, Math.PI * 2);
      ctx.fillStyle = bot.done ? '#4ecca3' : bot.color;
      ctx.fill();

      if (!bot.done) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }

  // --- Animation loop ---
  function animate(timestamp) {
    if (!lastTickTime) lastTickTime = timestamp;
    const delta = timestamp - lastTickTime;

    if (!finished) {
      tickAccumulator += delta;
      while (tickAccumulator >= tickSpeed) {
        tick(1);
        tickAccumulator -= tickSpeed;
      }
    }

    // Smooth interpolation
    if (!finished) {
      for (const bot of bots) {
        bot.displayR += (bot.r - bot.displayR) * 0.3;
        bot.displayC += (bot.c - bot.displayC) * 0.3;
      }
      draw();
    }

    animFrame = requestAnimationFrame(animate);
  }

  // --- Reset ---
  function reset(seed) {
    if (animFrame) {
      cancelAnimationFrame(animFrame);
    }
    init(seed);
    lastTickTime = 0;
    tickAccumulator = 0;
    animFrame = requestAnimationFrame(animate);
  }

  // --- Public API ---
  window.game = {
    tick: function(n) {
      tick(n);
    },
    reset: function(seed) {
      reset(seed);
    },
    get elapsed() {
      return elapsed;
    },
    get size() {
      return { rows: MAZE_ROWS, cols: MAZE_COLS };
    },
    get spawn() {
      return { r: spawn.r, c: spawn.c };
    },
    get exit() {
      return { r: exit.r, c: exit.c };
    },
    walls: function(r, c) {
      return getWalls(r, c);
    },
    get bots() {
      return bots.map(bot => ({
        id: bot.id,
        path: bot.path.map(p => ({ r: p.r, c: p.c })),
        deadEnds: bot.deadEnds.map(p => ({ r: p.r, c: p.c })),
        finishTick: bot.finishTick
      }));
    }
  };

  // --- Event listeners ---
  resetBtn.addEventListener('click', function() {
    reset(Math.random() * 1000000 | 0);
  });

  // --- Start ---
  reset(42);
})();
</script>
</body>
</html>
