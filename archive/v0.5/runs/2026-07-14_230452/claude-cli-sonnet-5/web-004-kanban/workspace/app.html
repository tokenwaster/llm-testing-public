<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root {
    --bg: #f4f5f7;
    --col-bg: #ebecf0;
    --card-bg: #ffffff;
    --accent: #5b6dfa;
    --text: #1f2330;
    --muted: #6b7280;
    --danger: #e5484d;
    --shadow: 0 1px 2px rgba(9, 30, 66, 0.15), 0 1px 3px rgba(9, 30, 66, 0.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    text-align: center;
    margin: 0 0 20px;
    font-size: 26px;
    font-weight: 700;
  }

  .toolbar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }

  #new-card {
    width: 320px;
    max-width: 60vw;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #d0d3d9;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  #new-card:focus {
    border-color: var(--accent);
  }

  #add-card {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  #add-card:hover {
    background: #4759e0;
  }

  #add-card:active {
    transform: scale(0.97);
  }

  .board {
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .column {
    background: var(--col-bg);
    border-radius: 12px;
    width: 300px;
    min-height: 400px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    transition: background 0.15s;
  }

  .column.drag-over {
    background: #dfe3f5;
    outline: 2px dashed var(--accent);
    outline-offset: -4px;
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px 12px;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #42526e;
  }

  .count {
    background: #dfe1e6;
    color: #42526e;
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 12px;
    font-weight: 700;
  }

  .card-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: grab;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }

  .card:active {
    cursor: grabbing;
  }

  .card.dragging {
    opacity: 0.4;
  }

  .card-title {
    flex: 1;
  }

  .card-del {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .card-del:hover {
    background: #fdecea;
    color: var(--danger);
  }
</style>
</head>
<body>

<h1>Kanban Board</h1>

<div class="toolbar">
  <input type="text" id="new-card" placeholder="Add a new card to To Do...">
  <button id="add-card">Add Card</button>
</div>

<div class="board">
  <div class="column" id="col-todo" data-status="todo">
    <div class="column-header">
      <span>To Do</span>
      <span class="count">0</span>
    </div>
    <div class="card-container"></div>
  </div>

  <div class="column" id="col-doing" data-status="doing">
    <div class="column-header">
      <span>Doing</span>
      <span class="count">0</span>
    </div>
    <div class="card-container"></div>
  </div>

  <div class="column" id="col-done" data-status="done">
    <div class="column-header">
      <span>Done</span>
      <span class="count">0</span>
    </div>
    <div class="card-container"></div>
  </div>
</div>

<script>
(function () {
  const STORAGE_KEY = 'kanban-board-state';
  const columns = {
    todo: document.getElementById('col-todo'),
    doing: document.getElementById('col-doing'),
    done: document.getElementById('col-done')
  };

  let state = loadState();
  if (!state || !Array.isArray(state.cards)) {
    state = { cards: [] };
  }

  let nextId = state.cards.reduce((max, c) => Math.max(max, c.id), 0) + 1;

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function render() {
    Object.keys(columns).forEach(status => {
      const container = columns[status].querySelector('.card-container');
      container.innerHTML = '';
      const cardsInColumn = state.cards.filter(c => c.status === status);
      cardsInColumn.forEach(cardData => {
        container.appendChild(buildCardEl(cardData));
      });
      columns[status].querySelector('.count').textContent = cardsInColumn.length;
    });
  }

  function buildCardEl(cardData) {
    const el = document.createElement('div');
    el.className = 'card';
    el.draggable = true;
    el.dataset.id = cardData.id;

    const title = document.createElement('span');
    title.className = 'card-title';
    title.textContent = cardData.title;

    const delBtn = document.createElement('button');
    delBtn.className = 'card-del';
    delBtn.textContent = '\u00D7';
    delBtn.setAttribute('aria-label', 'Delete card');
    delBtn.addEventListener('click', () => {
      state.cards = state.cards.filter(c => c.id !== cardData.id);
      saveState();
      render();
    });

    el.appendChild(title);
    el.appendChild(delBtn);

    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', String(cardData.id));
      e.dataTransfer.effectAllowed = 'move';
      el.classList.add('dragging');
    });

    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
    });

    return el;
  }

  function addCard(title) {
    const trimmed = title.trim();
    if (!trimmed) return;
    state.cards.push({ id: nextId++, title: trimmed, status: 'todo' });
    saveState();
    render();
  }

  document.getElementById('add-card').addEventListener('click', () => {
    const input = document.getElementById('new-card');
    addCard(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('new-card').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      document.getElementById('add-card').click();
    }
  });

  Object.keys(columns).forEach(status => {
    const columnEl = columns[status];

    columnEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      columnEl.classList.add('drag-over');
    });

    columnEl.addEventListener('dragleave', e => {
      if (!columnEl.contains(e.relatedTarget)) {
        columnEl.classList.remove('drag-over');
      }
    });

    columnEl.addEventListener('drop', e => {
      e.preventDefault();
      columnEl.classList.remove('drag-over');
      const id = Number(e.dataTransfer.getData('text/plain'));
      const cardData = state.cards.find(c => c.id === id);
      if (cardData) {
        cardData.status = status;
        saveState();
        render();
      }
    });
  });

  render();
})();
</script>

</body>
</html>
