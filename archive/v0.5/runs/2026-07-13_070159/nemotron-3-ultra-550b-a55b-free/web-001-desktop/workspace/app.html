<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ubuntu‑style Desktop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #1e1e1e; color: #eee; }
  #desktop { position: fixed; inset: 0; background: #2c2c2c; background-image: radial-gradient(circle at 20% 30%, #3a3a3a 0%, transparent 60%), radial-gradient(circle at 80% 70%, #333 0%, transparent 50%); }
  #taskbar { position: fixed; bottom: 0; left: 0; right: 0; height: 48px; background: #1a1a1a; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 12px; gap: 8px; z-index: 1000; }
  .launcher-btn { background: #333; border: 1px solid #444; color: #eee; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; transition: background .15s; }
  .launcher-btn:hover { background: #444; }
  .launcher-btn:active { background: #555; }

  .window { position: absolute; min-width: 360px; min-height: 240px; background: #2b2b2b; border: 1px solid #444; border-radius: 8px 8px 0 0; overflow: hidden; display: none; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 10; }
  .window-header { background: #333; border-bottom: 1px solid #444; padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; cursor: default; user-select: none; }
  .window-title { font-weight: 600; font-size: 13px; color: #ddd; }
  .win-close { background: transparent; border: none; color: #bbb; font-size: 16px; line-height: 1; cursor: pointer; padding: 2px 6px; border-radius: 3px; }
  .win-close:hover { background: #c0392b; color: #fff; }
  .window-content { flex: 1; overflow: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  /* Files app */
  #files-path { font-family: monospace; font-size: 13px; color: #aaa; padding: 4px 8px; background: #1e1e1e; border: 1px solid #333; border-radius: 4px; }
  #files-up { align-self: flex-start; }
  #files-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; flex: 1; overflow: auto; }
  .fs-item { background: #333; border: 1px solid #444; border-radius: 4px; padding: 10px 8px; text-align: center; cursor: pointer; transition: background .15s, border-color .15s; user-select: none; }
  .fs-item:hover { background: #3d3d3d; border-color: #555; }
  .fs-item.folder { font-weight: 600; color: #8ab4f8; }
  .fs-item.file { color: #ccc; }

  /* Notepad app */
  #tabs { display: flex; gap: 2px; border-bottom: 1px solid #444; padding-left: 4px; }
  .tab { background: #333; border: 1px solid #444; border-bottom: none; border-radius: 4px 4px 0 0; padding: 6px 14px; font-size: 12px; color: #ddd; cursor: pointer; position: relative; user-select: none; }
  .tab.active { background: #2b2b2b; border-color: #444; color: #fff; }
  .tab-close { margin-left: 8px; color: #999; font-size: 11px; cursor: pointer; opacity: 0; transition: opacity .15s; }
  .tab:hover .tab-close { opacity: 1; }
  .tab-close:hover { color: #fff; }
  #new-tab { background: #333; border: 1px solid #444; color: #ddd; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; align-self: flex-start; }
  #new-tab:hover { background: #444; }
  #editor { flex: 1; background: #1e1e1e; border: 1px solid #333; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 13px; color: #eee; resize: none; outline: none; line-height: 1.5; }
  #editor::placeholder { color: #666; }
</style>
</head>
<body>
<div id="desktop">
  <div id="taskbar">
    <button id="open-files" class="launcher-btn">Files</button>
    <button id="open-notepad" class="launcher-btn">Notepad</button>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window" style="top:80px; left:80px; width:520px; height:380px;">
    <div class="window-header">
      <span class="window-title">Files</span>
      <button class="win-close" aria-label="Close">&times;</button>
    </div>
    <div class="window-content">
      <div id="files-path">/</div>
      <button id="files-up" class="launcher-btn" style="font-size:12px; padding:4px 10px;">Up</button>
      <div id="files-list"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window" style="top:120px; left:140px; width:560px; height:420px;">
    <div class="window-header">
      <span class="window-title">Notepad</span>
      <button class="win-close" aria-label="Close">&times;</button>
    </div>
    <div class="window-content">
      <div id="tabs"></div>
      <button id="new-tab" class="launcher-btn" style="font-size:12px; padding:4px 10px;">+ New Tab</button>
      <textarea id="editor" placeholder="Start typing..."></textarea>
    </div>
  </div>
</div>

<script>
/* ---------- Global state ---------- */
let highestZ = 20;
const fsTree = {
  '/': [
    {name:'bin', type:'folder'},
    {name:'etc', type:'folder'},
    {name:'home', type:'folder'},
    {name:'usr', type:'folder'},
    {name:'var', type:'folder'}
  ],
  '/home': [
    {name:'user', type:'folder'}
  ],
  '/home/user': [
    {name:'Documents', type:'folder'},
    {name:'Downloads', type:'folder'},
    {name:'Pictures', type:'folder'},
    {name:'readme.txt', type:'file'},
    {name:'notes.md', type:'file'}
  ]
};
let currentPath = '/';

/* ---------- Helpers ---------- */
function $(id){ return document.getElementById(id); }
function showWin(win){ win.style.display = 'flex'; win.style.zIndex = ++highestZ; }
function hideWin(win){ win.style.display = 'none'; }
function bringToFront(win){ win.style.zIndex = ++highestZ; }
function getEntries(path){ return fsTree[path] || []; }
function parentPath(path){
  if(path === '/') return '/';
  const parts = path.split('/').filter(Boolean);
  parts.pop();
  return '/' + parts.join('/');
}
function joinPath(base, name){
  if(base === '/') return '/' + name;
  return base + '/' + name;
}

/* ---------- Files App ---------- */
const filesWin = $('files-window');
const filesPathEl = $('files-path');
const filesUpBtn = $('files-up');
const filesList = $('files-list');

function renderFiles(){
  filesPathEl.textContent = currentPath;
  filesList.innerHTML = '';
  const entries = getEntries(currentPath);
  entries.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'fs-item ' + entry.type;
    el.textContent = entry.name;
    el.dataset.type = entry.type;
    el.dataset.name = entry.name;
    el.addEventListener('dblclick', () => {
      if(entry.type === 'folder'){
        currentPath = joinPath(currentPath, entry.name);
        renderFiles();
      }
    });
    filesList.appendChild(el);
  });
}
filesUpBtn.addEventListener('click', () => {
  if(currentPath !== '/'){
    currentPath = parentPath(currentPath);
    renderFiles();
  }
});

/* ---------- Notepad App ---------- */
const notepadWin = $('notepad-window');
const tabsEl = $('tabs');
const newTabBtn = $('new-tab');
const editor = $('editor');

let tabs = []; // {id, title, content}
let activeTabId = null;
const STORAGE_KEY = 'notepadTabs';
const ACTIVE_KEY = 'notepadActive';

function loadTabs(){
  try{
    const data = localStorage.getItem(STORAGE_KEY);
    const active = localStorage.getItem(ACTIVE_KEY);
    if(data){
      tabs = JSON.parse(data);
      if(active && tabs.some(t => t.id === active)) activeTabId = active;
      else activeTabId = tabs[0]?.id || null;
    }
  }catch(e){ tabs = []; }
  if(!tabs.length){
    const id = 'tab-' + Date.now();
    tabs.push({id, title:'Untitled', content:''});
    activeTabId = id;
    saveTabs();
  }
  renderTabs();
}
function saveTabs(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
  if(activeTabId) localStorage.setItem(ACTIVE_KEY, activeTabId);
}
function renderTabs(){
  tabsEl.innerHTML = '';
  tabs.forEach(tab => {
    const tabEl = document.createElement('div');
    tabEl.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    tabEl.dataset.id = tab.id;
    tabEl.innerHTML = `<span>${escapeHtml(tab.title)}</span><span class="tab-close" data-id="${tab.id}">×</span>`;
    tabEl.addEventListener('click', e => {
      if(e.target.classList.contains('tab-close')) return;
      setActiveTab(tab.id);
    });
    tabEl.querySelector('.tab-close').addEventListener('click', e => {
      e.stopPropagation();
      closeTab(tab.id);
    });
    tabsEl.appendChild(tabEl);
  });
  updateEditor();
}
function setActiveTab(id){
  activeTabId = id;
  saveTabs();
  renderTabs();
}
function updateEditor(){
  const tab = tabs.find(t => t.id === activeTabId);
  if(tab){
    editor.value = tab.content;
    editor.disabled = false;
  }else{
    editor.value = '';
    editor.disabled = true;
  }
}
editor.addEventListener('input', () => {
  const tab = tabs.find(t => t.id === activeTabId);
  if(tab){
    tab.content = editor.value;
    saveTabs();
  }
});
newTabBtn.addEventListener('click', () => {
  const id = 'tab-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  const title = 'Untitled ' + (tabs.length + 1);
  tabs.push({id, title, content:''});
  setActiveTab(id);
});
function closeTab(id){
  if(tabs.length === 1) return; // prevent closing last tab
  const idx = tabs.findIndex(t => t.id === id);
  if(idx === -1) return;
  tabs.splice(idx, 1);
  if(activeTabId === id){
    activeTabId = tabs[Math.max(0, idx-1)].id;
  }
  saveTabs();
  renderTabs();
}
function escapeHtml(str){
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Window Controls ---------- */
function setupWindow(winId, openBtnId){
  const win = $(winId);
  const openBtn = $(openBtnId);
  const closeBtn = win.querySelector('.win-close');
  openBtn.addEventListener('click', () => {
    if(win.style.display === 'none' || win.style.display === ''){
      showWin(win);
    }else{
      bringToFront(win);
    }
  });
  closeBtn.addEventListener('click', () => hideWin(win));
  // bring to front on mousedown anywhere in window
  win.addEventListener('mousedown', () => bringToFront(win));
}
setupWindow('files-window', 'open-files');
setupWindow('notepad-window', 'open-notepad');

/* ---------- Init ---------- */
renderFiles();
loadTabs();
</script>
</body>
</html>
