<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ubuntu Web Desktop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    user-select: none;
  }

  #desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(ellipse at 20% 25%, rgba(233, 84, 32, 0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 75%, rgba(118, 42, 134, 0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(46, 38, 86, 0.6) 0%, transparent 70%),
      linear-gradient(135deg, #2c001e 0%, #5e2750 30%, #762a86 60%, #1a1a2e 100%);
    overflow: hidden;
  }

  #desktop::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 70% 20%, rgba(255,255,255,0.06) 0%, transparent 30%),
      radial-gradient(circle at 30% 80%, rgba(255,255,255,0.04) 0%, transparent 40%);
    pointer-events: none;
  }

  /* Top bar */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(15, 15, 20, 0.92);
    color: #f0f0f0;
    display: flex;
    align-items: stretch;
    font-size: 12px;
    z-index: 5000;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .topbar-item {
    padding: 0 12px;
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .topbar-item:hover { background: rgba(255,255,255,0.08); }

  .topbar-item.brand { font-weight: 600; }

  #clock {
    margin-left: auto;
    padding: 0 14px;
    display: flex;
    align-items: center;
    font-variant-numeric: tabular-nums;
  }

  /* Desktop icons */
  .desktop-icons {
    position: absolute;
    top: 48px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 1;
  }

  .desktop-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 84px;
    cursor: pointer;
    padding: 8px 4px;
    border-radius: 8px;
    color: white;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    transition: background 0.15s, transform 0.1s;
  }

  .desktop-icon:hover {
    background: rgba(255,255,255,0.12);
  }

  .desktop-icon.selected {
    background: rgba(233, 84, 32, 0.3);
  }

  .desktop-icon:active { transform: scale(0.97); }

  .desktop-icon .icon {
    font-size: 42px;
    margin-bottom: 4px;
    line-height: 1;
  }

  .desktop-icon .label {
    font-size: 11px;
    text-align: center;
    line-height: 1.25;
    word-wrap: break-word;
  }

  /* Taskbar/dock */
  #taskbar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    height: 60px;
    background: rgba(20, 20, 28, 0.88);
    border-radius: 14px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 6px;
    z-index: 5000;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
  }

  .launcher {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    transition: all 0.15s;
    position: relative;
  }

  .launcher:hover {
    background: rgba(255,255,255,0.16);
    transform: translateY(-3px);
  }

  .launcher.active {
    background: rgba(233, 84, 32, 0.3);
  }

  .launcher.active::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%;
    transform: translateX(-50%);
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #E95420;
  }

  .dock-separator {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.1);
    margin: 0 4px;
  }

  /* Windows */
  .window {
    position: absolute;
    background: #1e1e2e;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08);
    display: none;
    flex-direction: column;
    overflow: hidden;
    min-width: 360px;
    min-height: 240px;
    z-index: 100;
  }

  .window.open { display: flex; }

  .titlebar {
    height: 36px;
    background: linear-gradient(to bottom, #2d2d3f, #252535);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: grab;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 10px;
    flex-shrink: 0;
  }

  .titlebar:active { cursor: grabbing; }

  .titlebar .title {
    color: #cdd6f4;
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    text-align: center;
    margin-right: 28px;
  }

  .win-close {
    background: transparent;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 14px;
    margin-left: auto;
    line-height: 1;
  }

  .win-close:hover {
    background: rgba(255,95,87,0.25);
    color: #ff8888;
  }

  /* Files app */
  #files-window {
    width: 640px;
    height: 440px;
  }

  .files-toolbar {
    height: 44px;
    background: #252535;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  .icon-btn {
    background: rgba(255,255,255,0.05);
    border: none;
    color: #cdd6f4;
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-btn:hover { background: rgba(255,255,255,0.14); }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #files-path {
    flex: 1;
    background: #181825;
    border: 1px solid rgba(255,255,255,0.06);
    color: #cdd6f4;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
    outline: none;
    min-width: 0;
  }

  #files-path:focus { border-color: rgba(233, 84, 32, 0.6); }

  .files-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 4px;
    align-content: start;
  }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px;
    border-radius: 6px;
    cursor: pointer;
    color: #cdd6f4;
    font-size: 12px;
    text-align: center;
    word-break: break-word;
    transition: background 0.1s, border-color 0.1s;
    border: 1px solid transparent;
  }

  .fs-item:hover {
    background: rgba(233, 84, 32, 0.18);
    border-color: rgba(233, 84, 32, 0.3);
  }

  .fs-item.selected {
    background: rgba(233, 84, 32, 0.32);
    border-color: rgba(233, 84, 32, 0.55);
  }

  .fs-item .icon {
    font-size: 38px;
    margin-bottom: 4px;
    line-height: 1;
  }

  .fs-item .name {
    line-height: 1.25;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .empty-folder {
    grid-column: 1 / -1;
    color: #6c7086;
    padding: 40px;
    text-align: center;
    font-style: italic;
  }

  .files-statusbar {
    height: 24px;
    background: #252535;
    border-top: 1px solid rgba(255,255,255,0.05);
    color: #888;
    font-size: 11px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  /* Notepad app */
  #notepad-window {
    width: 580px;
    height: 420px;
  }

  .tabs-bar {
    display: flex;
    align-items: flex-end;
    background: #181825;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 4px 4px 0 4px;
    gap: 2px;
    min-height: 34px;
    flex-shrink: 0;
    overflow-x: auto;
  }

  .tab {
    display: flex;
    align-items: center;
    padding: 6px 6px 6px 12px;
    background: #252535;
    border-radius: 8px 8px 0 0;
    color: #888;
    font-size: 12px;
    cursor: pointer;
    gap: 6px;
    border: 1px solid transparent;
    white-space: nowrap;
    max-width: 200px;
    transition: background 0.1s;
    flex-shrink: 0;
  }

  .tab:hover { background: #2d2d40; color: #aaa; }

  .tab.active {
    background: #1e1e2e;
    color: #cdd6f4;
    border-color: rgba(255,255,255,0.06);
  }

  .tab .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 150px;
  }

  .tab .tab-close {
    background: transparent;
    border: none;
    color: inherit;
    cursor: pointer;
    padding: 0 6px;
    border-radius: 3px;
    font-size: 16px;
    line-height: 1;
    opacity: 0.5;
  }

  .tab .tab-close:hover {
    background: rgba(255,95,87,0.3);
    opacity: 1;
  }

  #new-tab {
    background: transparent;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 4px 10px 8px;
    font-size: 18px;
    border-radius: 4px;
    line-height: 1;
    flex-shrink: 0;
  }

  #new-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }

  #editor {
    flex: 1;
    background: #1e1e2e;
    color: #cdd6f4;
    border: none;
    padding: 14px;
    font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    resize: none;
    outline: none;
    line-height: 1.5;
    user-select: text;
  }

  #editor::placeholder { color: #585b70; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.12);
    border-radius: 5px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.22);
    background-clip: padding-box;
    border: 2px solid transparent;
  }

  /* Notification */
  #notification {
    position: fixed;
    bottom: 90px;
    left: 50%;
    background: rgba(30, 30, 46, 0.96);
    color: #cdd6f4;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    font-size: 13px;
    z-index: 99999;
    border: 1px solid rgba(255,255,255,0.1);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="desktop">

  <!-- Top bar -->
  <div id="topbar">
    <div class="topbar-item brand" id="topbar-activities">Activities</div>
    <div class="topbar-item" id="topbar-files">Files</div>
    <div class="topbar-item" id="topbar-notepad">Notepad</div>
    <div class="topbar-item" id="topbar-help">Help</div>
    <div id="clock"></div>
  </div>

  <!-- Desktop icons -->
  <div class="desktop-icons">
    <div class="desktop-icon" data-app="files">
      <div class="icon">📁</div>
      <div class="label">Files</div>
    </div>
    <div class="desktop-icon" data-app="notepad">
      <div class="icon">📝</div>
      <div class="label">Notepad</div>
    </div>
    <div class="desktop-icon" data-app="files" data-path="/home/user/Documents">
      <div class="icon">📂</div>
      <div class="label">Documents</div>
    </div>
    <div class="desktop-icon" data-app="files" data-path="/home/user">
      <div class="icon">🏠</div>
      <div class="label">Home</div>
    </div>
  </div>

  <!-- Taskbar/Dock -->
  <div id="taskbar">
    <button class="launcher" id="open-files" title="Files">📁</button>
    <button class="launcher" id="open-notepad" title="Notepad">📝</button>
    <div class="dock-separator"></div>
    <button class="launcher" id="open-files-2" title="Files">📁</button>
  </div>

  <!-- Files Window -->
  <div class="window" id="files-window">
    <div class="titlebar">
      <div class="title">Files</div>
      <button class="win-close" data-close="files-window" title="Close">✕</button>
    </div>
    <div class="files-toolbar">
      <button id="files-up" class="icon-btn" title="Up one level">↑</button>
      <button id="files-home" class="icon-btn" title="Home">⌂</button>
      <button id="files-refresh" class="icon-btn" title="Refresh">↻</button>
      <input type="text" id="files-path" value="/" spellcheck="false">
    </div>
    <div class="files-content" id="files-content"></div>
    <div class="files-statusbar" id="files-status">0 items</div>
  </div>

  <!-- Notepad Window -->
  <div class="window" id="notepad-window">
    <div class="titlebar">
      <div class="title">Notepad</div>
      <button class="win-close" data-close="notepad-window" title="Close">✕</button>
    </div>
    <div class="tabs-bar">
      <div id="tabs"></div>
      <button id="new-tab" title="New tab">+</button>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Start typing..."></textarea>
  </div>

</div>

<script>
/* =========================================================
   FILESYSTEM DATA
   ========================================================= */
const fs = {
  '/': ['bin', 'etc', 'home', 'usr', 'var'],
  '/bin': ['bash', 'cat', 'chmod', 'cp', 'echo', 'grep', 'ls', 'mkdir', 'mv', 'pwd', 'rm', 'sh', 'touch'],
  '/etc': ['apt', 'fstab', 'hostname', 'hosts', 'passwd', 'resolv.conf', 'shadow', 'sudoers'],
  '/etc/apt': ['sources.list', 'trusted.gpg'],
  '/home': ['user'],
  '/home/user': ['Documents', 'Downloads', 'Music', 'Pictures', 'Videos', '.bashrc', '.profile', 'README.md'],
  '/home/user/Documents': ['notes.txt', 'resume.pdf', 'todo.md', 'project-plan.md', 'budget.csv'],
  '/home/user/Downloads': ['chrome.deb', 'firefox.deb', 'archive.zip', 'image.png', 'installer.exe'],
  '/home/user/Music': ['song1.mp3', 'song2.mp3', 'album.flac', 'playlist.m3u'],
  '/home/user/Pictures': ['wallpaper.jpg', 'vacation.png', 'screenshot.png', 'avatar.gif', 'family.jpg'],
  '/home/user/Videos': ['movie.mp4', 'clip.webm', 'tutorial.mkv'],
  '/usr': ['bin', 'lib', 'local', 'share', 'src'],
  '/usr/bin': ['firefox', 'gnome-terminal', 'node', 'python3', 'vim', 'code'],
  '/usr/lib': ['x86_64-linux-gnu'],
  '/usr/local': ['bin', 'share'],
  '/usr/share': ['icons', 'themes'],
  '/usr/src': ['linux-headers-5.15.0'],
  '/usr/lib/x86_64-linux-gnu': ['libc.so.6', 'libm.so.6'],
  '/usr/local/bin': [],
  '/usr/local/share': [],
  '/usr/share/icons': ['hicolor'],
  '/usr/share/themes': ['Yaru', 'Adwaita'],
  '/usr/src/linux-headers-5.15.0': ['Makefile', 'README'],
  '/var': ['log', 'tmp', 'www'],
  '/var/log': ['syslog', 'auth.log', 'kern.log', 'dpkg.log'],
  '/var/tmp': [],
  '/var/www': ['html'],
  '/var/www/html': ['index.html', 'style.css']
};

const FILE_EXTS = {
  '.txt': '📄', '.pdf': '📕', '.md': '📝', '.doc': '📘', '.docx': '📘', '.csv': '📊',
  '.png': '🖼️', '.jpg': '🖼️', '.gif': '🖼️', '.jpeg': '🖼️', '.svg': '🖼️', '.bmp': '🖼️',
  '.mp3': '🎵', '.wav': '🎵', '.flac': '🎵', '.m3u': '🎵', '.ogg': '🎵',
  '.mp4': '🎬', '.webm': '🎬', '.avi': '🎬', '.mkv': '🎬', '.mov': '🎬',
  '.zip': '📦', '.tar': '📦', '.gz': '📦', '.deb': '📦', '.exe': '📦', '.rar': '📦', '.7z': '📦',
  '.html': '🌐', '.css': '🎨', '.js': '⚙️', '.json': '⚙️', '.conf': '⚙️', '.xml': '⚙️',
  '.log': '📜', '.so': '⚙️', '.list': '📜', '.iso': '💿', '.img': '💿',
  '.sh': '⚙️', '.py': '🐍', '.c': '⚙️', '.cpp': '⚙️', '.h': '⚙️', '.rs': '⚙️',
  '.gpg': '🔒', '.key': '🔑', '.pem': '🔒', '.md5': '🔒',
  '.png': '🖼️'
};

function getIconForName(name) {
  if (name.startsWith('.')) {
    const ext = name.substring(name.lastIndexOf('.')).toLowerCase();
    return FILE_EXTS[ext] || '📄';
  }
  if (name.includes('.')) {
    const ext = name.substring(name.lastIndexOf('.')).toLowerCase();
    if (FILE_EXTS[ext]) return FILE_EXTS[ext];
  }
  return '📄';
}

/* =========================================================
   FILES APP
   ========================================================= */
let currentPath = '/';

function joinPath(base, name) {
  if (base === '/') return '/' + name;
  return base + '/' + name;
}

function parentPath(p) {
  if (p === '/') return '/';
  const parts = p.split('/').filter(x => x);
  parts.pop();
  return parts.length === 0 ? '/' : '/' + parts.join('/');
}

function navigateTo(path) {
  if (!fs.hasOwnProperty(path)) {
    showNotification('Path not found: ' + path);
    return false;
  }
  currentPath = path;
  renderFiles();
  return true;
}

function renderFiles() {
  const content = document.getElementById('files-content');
  const pathInput = document.getElementById('files-path');
  const upBtn = document.getElementById('files-up');
  const status = document.getElementById('files-status');

  pathInput.value = currentPath;
  upBtn.disabled = currentPath === '/';
  content.innerHTML = '';

  const items = fs[currentPath] || [];
  if (items.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-folder';
    empty.textContent = 'This folder is empty';
    content.appendChild(empty);
    status.textContent = '0 items';
    return;
  }

  // Sort: folders first, then files, alphabetically (case-insensitive)
  const sorted = [...items].sort((a, b) => {
    const aFull = joinPath(currentPath, a);
    const bFull = joinPath(currentPath, b);
    const aDir = fs.hasOwnProperty(aFull);
    const bDir = fs.hasOwnProperty(bFull);
    if (aDir !== bDir) return aDir ? -1 : 1;
    return a.toLowerCase().localeCompare(b.toLowerCase());
  });

  sorted.forEach(name => {
    const fullPath = joinPath(currentPath, name);
    const isFolder = fs.hasOwnProperty(fullPath);
    const icon = isFolder ? '📁' : getIconForName(name);

    const item = document.createElement('div');
    item.className = 'fs-item';
    item.dataset.name = name;
    item.dataset.path = fullPath;

    const iconEl = document.createElement('div');
    iconEl.className = 'icon';
    iconEl.textContent = icon;
    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = name;
    item.appendChild(iconEl);
    item.appendChild(nameEl);

    if (isFolder) {
      item.addEventListener('dblclick', () => navigateTo(fullPath));
    } else {
      item.addEventListener('dblclick', () => {
        showNotification('Cannot open "' + name + '" — this is a demo filesystem.');
      });
    }

    item.addEventListener('click', (e) => {
      document.querySelectorAll('.fs-item.selected').forEach(s => s.classList.remove('selected'));
      item.classList.add('selected');
      e.stopPropagation();
    });

    content.appendChild(item);
  });

  const folders = sorted.filter(n => fs.hasOwnProperty(joinPath(currentPath, n))).length;
  const files = sorted.length - folders;
  status.textContent = folders + ' folder' + (folders !== 1 ? 's' : '') + ', ' +
                       files + ' file' + (files !== 1 ? 's' : '');
}

document.getElementById('files-up').addEventListener('click', () => {
  if (currentPath !== '/') navigateTo(parentPath(currentPath));
});

document.getElementById('files-home').addEventListener('click', () => {
  navigateTo('/home/user');
});

document.getElementById('files-refresh').addEventListener('click', renderFiles);

const filesPathInput = document.getElementById('files-path');
filesPathInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    let val = filesPathInput.value.trim();
    if (!val) { filesPathInput.value = currentPath; return; }
    if (!val.startsWith('/')) val = '/' + val;
    if (val.length > 1 && val.endsWith('/')) val = val.replace(/\/+$/, '') || '/';
    if (!navigateTo(val)) {
      filesPathInput.value = currentPath;
    }
  }
  if (e.key === 'Escape') {
    filesPathInput.value = currentPath;
    filesPathInput.blur();
  }
});

// Click in content area to deselect
document.getElementById('files-content').addEventListener('click', (e) => {
  if (e.target.id === 'files-content') {
    document.querySelectorAll('.fs-item.selected').forEach(s => s.classList.remove('selected'));
  }
});

/* =========================================================
   WINDOW MANAGEMENT
   ========================================================= */
let topZ = 100;

function bringToFront(win) {
  topZ++;
  win.style.zIndex = topZ;
}

function openWindow(id) {
  const win = document.getElementById(id);
  if (!win) return;
  if (!win.classList.contains('open')) {
    win.classList.add('open');
    if (!win.dataset.positioned) {
      const rect = win.getBoundingClientRect();
      const w = rect.width || 500;
      const h = rect.height || 320;
      win.style.left = Math.max(20, Math.floor((window.innerWidth - w) / 2)) + 'px';
      win.style.top = Math.max(40, Math.floor((window.innerHeight - h) / 2 - 40)) + 'px';
      win.dataset.positioned = '1';
    }
  }
  bringToFront(win);
  if (id === 'files-window') {
    document.getElementById('open-files').classList.add('active');
  } else if (id === 'notepad-window') {
    document.getElementById('open-notepad').classList.add('active');
  }
}

function closeWindow(id) {
  const win = document.getElementById(id);
  if (!win) return;
  win.classList.remove('open');
  if (id === 'files-window') document.getElementById('open-files').classList.remove('active');
  if (id === 'notepad-window') document.getElementById('open-notepad').classList.remove('active');
}

document.getElementById('open-files').addEventListener('click', () => openWindow('files-window'));
document.getElementById('open-notepad').addEventListener('click', () => openWindow('notepad-window'));
const files2 = document.getElementById('open-files-2');
if (files2) files2.addEventListener('click', () => openWindow('files-window'));

document.getElementById('topbar-files').addEventListener('click', () => openWindow('files-window'));
document.getElementById('topbar-notepad').addEventListener('click', () => openWindow('notepad-window'));
document.getElementById('topbar-help').addEventListener('click', () => {
  showNotification('Double-click folders to navigate. Use ↑ for parent. Tabs save automatically.');
});

document.querySelectorAll('.win-close').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    closeWindow(btn.dataset.close);
  });
});

// Bring windows to front on mousedown
document.querySelectorAll('.window').forEach(win => {
  win.addEventListener('mousedown', () => bringToFront(win));
});

/* =========================================================
   DRAGGING
   ========================================================= */
let dragState = null;

document.querySelectorAll('.window').forEach(win => {
  const tb = win.querySelector('.titlebar');
  tb.addEventListener('mousedown', (e) => {
    if (e.target.closest('.win-close')) return;
    if (e.button !== 0) return;
    const rect = win.getBoundingClientRect();
    dragState = {
      win: win,
      startX: e.clientX,
      startY: e.clientY,
      startLeft: rect.left,
      startTop: rect.top
    };
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  });
});

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  let newLeft = dragState.startLeft + dx;
  let newTop = dragState.startTop + dy;
  newLeft = Math.max(-dragState.win.offsetWidth + 80, Math.min(window.innerWidth - 80, newLeft));
  newTop = Math.max(0, Math.min(window.innerHeight - 70, newTop));
  dragState.win.style.left = newLeft + 'px';
  dragState.win.style.top = newTop + 'px';
});

document.addEventListener('mouseup', () => {
  if (dragState) {
    dragState = null;
    document.body.style.cursor = '';
  }
});

/* =========================================================
   DESKTOP ICONS
   ========================================================= */
document.querySelectorAll('.desktop-icon').forEach(icon => {
  icon.addEventListener('click', (e) => {
    document.querySelectorAll('.desktop-icon.selected').forEach(i => i.classList.remove('selected'));
    icon.classList.add('selected');
    e.stopPropagation();
  });
  icon.addEventListener('dblclick', (e) => {
    const app = icon.dataset.app;
    if (app === 'files') {
      openWindow('files-window');
      if (icon.dataset.path) navigateTo(icon.dataset.path);
    } else if (app === 'notepad') {
      openWindow('notepad-window');
    }
    e.stopPropagation();
  });
});

document.getElementById('desktop').addEventListener('click', (e) => {
  if (e.target.id === 'desktop' || e.target.classList.contains('desktop-icons')) {
    document.querySelectorAll('.desktop-icon.selected').forEach(i => i.classList.remove('selected'));
    document.querySelectorAll('.fs-item.selected').forEach(s => s.classList.remove('selected'));
  }
});

/* =========================================================
   NOTIFICATIONS
   ========================================================= */
let notifEl = null;
let notifTimeout = null;
function showNotification(msg) {
  if (!notifEl) {
    notifEl = document.createElement('div');
    notifEl.id = 'notification';
    notifEl.style.opacity = '0';
    notifEl.style.transform = 'translateX(-50%) translateY(20px)';
    document.body.appendChild(notifEl);
  }
  notifEl.textContent = msg;
  // Force reflow
  void notifEl.offsetWidth;
  notifEl.style.opacity = '1';
  notifEl.style.transform = 'translateX(-50%) translateY(0)';
  if (notifTimeout) clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => {
    notifEl.style.opacity = '0';
    notifEl.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2500);
}

/* =========================================================
   NOTEPAD APP
   ========================================================= */
let tabs = [];
let activeTabId = null;
const STORAGE_KEY = 'ubuntu-web-notepad-v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data && Array.isArray(data.tabs) && data.tabs.length > 0) {
        tabs = data.tabs.map(t => ({
          id: t.id || generateId(),
          title: typeof t.title === 'string' ? t.title : 'Untitled',
          content: typeof t.content === 'string' ? t.content : ''
        }));
        activeTabId = data.activeTabId;
        if (!tabs.find(t => t.id === activeTabId)) {
          activeTabId = tabs[0].id;
        }
        return;
      }
    }
  } catch (e) {
    console.warn('Failed to load notepad state', e);
  }
  createNewTab(true);
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tabs: tabs,
      activeTabId: activeTabId
    }));
  } catch (e) {
    console.warn('Failed to save notepad state', e);
  }
}

function generateId() {
  return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function deriveTitle(content) {
  const firstLine = (content || '').split('\n')[0].trim();
  if (!firstLine) return 'Untitled';
  return firstLine.length > 22 ? firstLine.slice(0, 22) + '…' : firstLine;
}

function createNewTab(silent) {
  const tab = {
    id: generateId(),
    title: 'Untitled',
    content: ''
  };
  tabs.push(tab);
  activeTabId = tab.id;
  renderTabs();
  if (!silent) {
    saveState();
    setTimeout(() => document.getElementById('editor').focus(), 0);
  }
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.id = tab.id;

    const titleEl = document.createElement('span');
    titleEl.className = 'tab-title';
    titleEl.textContent = tab.title;
    titleEl.title = tab.title;

    const closeEl = document.createElement('button');
    closeEl.className = 'tab-close';
    closeEl.textContent = '×';
    closeEl.title = 'Close tab';
    closeEl.setAttribute('aria-label', 'Close tab');

    el.appendChild(titleEl);
    el.appendChild(closeEl);

    el.addEventListener('mousedown', (e) => {
      // Prevent dragging window when clicking tab
      e.stopPropagation();
    });

    el.addEventListener('click', (e) => {
      if (e.target === closeEl) return;
      switchToTab(tab.id);
    });

    closeEl.addEventListener('mousedown', (e) => {
      e.stopPropagation();
    });
    closeEl.addEventListener('click', (e) => {
      e.stopPropagation();
      closeTab(tab.id);
    });

    tabsEl.appendChild(el);
  });
  updateEditor();
}

function switchToTab(id) {
  if (activeTabId === id) return;
  activeTabId = id;
  renderTabs();
  saveState();
  document.getElementById('editor').focus();
}

function updateEditor() {
  const editor = document.getElementById('editor');
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    if (editor.value !== tab.content) {
      const selStart = editor.selectionStart;
      const selEnd = editor.selectionEnd;
      editor.value = tab.content;
      try {
        editor.selectionStart = Math.min(selStart, tab.content.length);
        editor.selectionEnd = Math.min(selEnd, tab.content.length);
      } catch (e) {}
    }
  } else {
    editor.value = '';
  }
}

function closeTab(id) {
  if (tabs.length === 1) {
    tabs[0].content = '';
    tabs[0].title = 'Untitled';
    activeTabId = tabs[0].id;
  } else {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    const wasActive = activeTabId === id;
    tabs.splice(idx, 1);
    if (wasActive) {
      activeTabId = tabs[Math.max(0, idx - 1)].id;
    }
  }
  renderTabs();
  saveState();
}

document.getElementById('new-tab').addEventListener('mousedown', (e) => {
  e.stopPropagation();
});
document.getElementById('new-tab').addEventListener('click', (e) => {
  e.stopPropagation();
  createNewTab();
});

const editor = document.getElementById('editor');
editor.addEventListener('input', (e) => {
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  tab.content = e.target.value;
  const newTitle = deriveTitle(tab.content);
  if (tab.title !== newTitle) {
    tab.title = newTitle;
    const tabEl = document.querySelector('.tab[data-id="' + tab.id + '"] .tab-title');
    if (tabEl) {
      tabEl.textContent = newTitle;
      tabEl.title = newTitle;
    }
  }
  saveState();
});

editor.addEventListener('blur', () => saveState());

editor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
    e.preventDefault();
    saveState();
    showNotification('Saved ✓');
  }
  if (e.key === 'Tab' && !e.shiftKey) {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    editor.dispatchEvent(new Event('input'));
  }
});

/* =========================================================
   CLOCK
   ========================================================= */
function updateClock() {
  const now = new Date();
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  let h = now.getHours();
  const m = now.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const time = h + ':' + m + ' ' + ampm;
  const date = days[now.getDay()] + ' ' + months[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('clock').textContent = date + '   ' + time;
}
updateClock();
setInterval(updateClock, 30 * 1000);

/* =========================================================
   INIT
   ========================================================= */
loadState();
renderTabs();
renderFiles();
