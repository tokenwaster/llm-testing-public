<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ubuntu Desktop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: "Segoe UI", Ubuntu, Arial, sans-serif; }
  body { background: #2b2b2b; color: #fff; }

  #desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(circle at 30% 20%, #5e2750 0%, transparent 45%),
      radial-gradient(circle at 75% 70%, #1c3d5a 0%, transparent 50%),
      linear-gradient(135deg, #2c001e 0%, #1a1a2e 100%);
    overflow: hidden;
  }

  /* Top bar */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 13px;
    color: #fff;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  #topbar .activities { cursor: pointer; padding: 0 8px; }
  #topbar .clock { position: absolute; left: 50%; transform: translateX(-50%); }
  #topbar .icons { margin-left: auto; display: flex; gap: 10px; opacity: 0.9; }

  /* Desktop icons */
  .desk-icon {
    position: absolute;
    width: 84px;
    text-align: center;
    color: #fff;
    font-size: 12px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    cursor: default;
    user-select: none;
    padding: 6px;
    border-radius: 6px;
  }
  .desk-icon:hover { background: rgba(255,255,255,0.1); }
  .desk-icon .glyph {
    font-size: 38px;
    line-height: 1;
    margin-bottom: 4px;
    display: block;
  }

  /* Taskbar / dock */
  #taskbar {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(30, 30, 30, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    z-index: 1000;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  #taskbar button {
    width: 48px; height: 48px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  #taskbar button:hover { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
  #taskbar button:active { transform: translateY(0); }
  #taskbar button.active { background: rgba(233, 84, 32, 0.5); }

  /* Windows */
  .window {
    position: absolute;
    min-width: 360px;
    min-height: 240px;
    background: #383838;
    border: 1px solid rgba(0,0,0,0.5);
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .window.hidden { display: none !important; }
  .win-titlebar {
    height: 34px;
    background: linear-gradient(#3c3c3c, #2f2f2f);
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: grab;
    user-select: none;
    border-bottom: 1px solid rgba(0,0,0,0.4);
  }
  .win-titlebar:active { cursor: grabbing; }
  .win-title { flex: 1; font-size: 13px; color: #eee; }
  .win-controls { display: flex; gap: 8px; }
  .win-btn {
    width: 14px; height: 14px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: rgba(0,0,0,0.55);
  }
  .win-close { background: #e95420; }
  .win-min { background: #f5b50e; }
  .win-max { background: #5fd35f; }
  .win-btn:hover { filter: brightness(1.15); }
  .win-body { flex: 1; overflow: auto; position: relative; }

  /* Files app */
  #files-window { width: 560px; height: 380px; left: 80px; top: 70px; }
  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #2f2f2f;
    border-bottom: 1px solid rgba(0,0,0,0.3);
  }
  #files-up {
    padding: 4px 10px;
    background: #4a4a4a;
    color: #fff;
    border: 1px solid rgba(0,0,0,0.4);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }
  #files-up:hover { background: #5a5a5a; }
  #files-path {
    flex: 1;
    background: #2a2a2a;
    color: #ddd;
    border: 1px solid rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 5px 8px;
    font-family: monospace;
    font-size: 13px;
  }
  .files-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 6px;
    padding: 14px;
  }
  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px;
    border-radius: 6px;
    cursor: pointer;
    color: #eee;
    font-size: 12px;
    text-align: center;
    user-select: none;
  }
  .fs-item:hover { background: rgba(255,255,255,0.08); }
  .fs-item.selected { background: rgba(233, 84, 32, 0.35); }
  .fs-item .icon { font-size: 34px; line-height: 1; margin-bottom: 6px; }
  .fs-item .name { word-break: break-word; max-width: 90px; }

  /* Notepad app */
  #notepad-window { width: 520px; height: 400px; left: 200px; top: 110px; }
  .notepad-tabs {
    display: flex;
    align-items: center;
    background: #2f2f2f;
    border-bottom: 1px solid rgba(0,0,0,0.4);
    padding: 4px 6px 0 6px;
    gap: 4px;
    min-height: 34px;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: #3a3a3a;
    border-radius: 6px 6px 0 0;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    max-width: 140px;
    border: 1px solid rgba(0,0,0,0.3);
    border-bottom: none;
  }
  .tab.active {
    background: #4a4a4a;
    color: #fff;
  }
  .tab .tab-name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }
  .tab .tab-close {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    cursor: pointer;
  }
  .tab .tab-close:hover { background: rgba(255,80,80,0.6); }
  #new-tab {
    padding: 5px 10px;
    background: transparent;
    color: #ddd;
    border: 1px dashed rgba(255,255,255,0.25);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  #new-tab:hover { background: rgba(255,255,255,0.08); }
  #editor {
    flex: 1;
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: #1e1e1e;
    color: #e8e8e8;
    font-family: "Consolas", "Ubuntu Mono", monospace;
    font-size: 14px;
    padding: 12px;
    line-height: 1.5;
  }
  .notepad-status {
    background: #2a2a2a;
    color: #aaa;
    font-size: 11px;
    padding: 3px 10px;
    border-top: 1px solid rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div id="desktop">
  <div id="topbar">
    <span class="activities">Activities</span>
    <span class="clock" id="clock">--:--</span>
    <span class="icons">🔊 ⚙</span>
  </div>

  <div class="desk-icon" style="left:24px; top:48px;">
    <span class="glyph">📁</span>
    <span>Home</span>
  </div>
  <div class="desk-icon" style="left:24px; top:148px;">
    <span class="glyph">🗑️</span>
    <span>Trash</span>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window hidden">
    <div class="win-titlebar" data-drag>
      <div class="win-title">Files</div>
      <div class="win-controls">
        <button class="win-btn win-min" title="Minimize"></button>
        <button class="win-btn win-max" title="Maximize"></button>
        <button class="win-btn win-close" title="Close"></button>
      </div>
    </div>
    <div class="win-body" style="display:flex; flex-direction:column;">
      <div class="files-toolbar">
        <button id="files-up">↑ Up</button>
        <input id="files-path" value="/" readonly>
      </div>
      <div class="files-list" id="files-list"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window hidden">
    <div class="win-titlebar" data-drag>
      <div class="win-title">Notepad</div>
      <div class="win-controls">
        <button class="win-btn win-min" title="Minimize"></button>
        <button class="win-btn win-max" title="Maximize"></button>
        <button class="win-btn win-close" title="Close"></button>
      </div>
    </div>
    <div class="win-body" style="display:flex; flex-direction:column;">
      <div class="notepad-tabs" id="tabs">
        <button id="new-tab" title="New tab">+</button>
      </div>
      <textarea id="editor" placeholder="Type something..."></textarea>
      <div class="notepad-status">
        <span id="np-status-tab">No tabs</span>
        <span id="np-status-info">0 chars</span>
      </div>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="open-files" title="Files">📁</button>
    <button id="open-notepad" title="Notepad">📝</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ---------- Filesystem data ---------- */
  const FS = {
    "/": { type: "dir", children: ["bin", "etc", "home", "usr", "var", "tmp", "opt"] },
    "/bin": { type: "dir", children: ["bash", "ls", "cp", "mv", "cat"] },
    "/bin/bash": { type: "file", content: "ELF binary (fake)" },
    "/bin/ls": { type: "file", content: "ELF binary (fake)" },
    "/bin/cp": { type: "file", content: "ELF binary (fake)" },
    "/bin/mv": { type: "file", content: "ELF binary (fake)" },
    "/bin/cat": { type: "file", content: "ELF binary (fake)" },

    "/etc": { type: "dir", children: ["hostname", "passwd", "fstab", "apt"] },
    "/etc/hostname": { type: "file", content: "ubuntu-desktop" },
    "/etc/passwd": { type: "file", content: "root:x:0:0:root:/root:/bin/bash\nuser:x:1000:1000:user:/home/user:/bin/bash" },
    "/etc/fstab": { type: "file", content: "/dev/sda1 / ext4 defaults 0 1" },
    "/etc/apt": { type: "dir", children: ["sources.list"] },
    "/etc/apt/sources.list": { type: "file", content: "deb http://archive.ubuntu.com focal main" },

    "/home": { type: "dir", children: ["user"] },
    "/home/user": { type: "dir", children: ["Documents", "Downloads", "Pictures", "Music", ".bashrc", "notes.txt"] },
    "/home/user/.bashrc": { type: "file", content: "# ~/.bashrc\nexport PS1='\\u@\\h:\\w$ '" },
    "/home/user/notes.txt": { type: "file", content: "Remember to buy milk." },

    "/home/user/Documents": { type: "dir", children: ["report.txt", "todo.md"] },
    "/home/user/Documents/report.txt": { type: "file", content: "Quarterly report draft..." },
    "/home/user/Documents/todo.md": { type: "file", content: "# TODO\n- [ ] finish report\n- [x] setup desktop" },

    "/home/user/Downloads": { type: "dir", children: ["ubuntu-20.04.iso", "installer.deb"] },
    "/home/user/Downloads/ubuntu-20.04.iso": { type: "file", content: "ISO image (fake)" },
    "/home/user/Downloads/installer.deb": { type: "file", content: "Debian package (fake)" },

    "/home/user/Pictures": { type: "dir", children: ["wallpaper.png", "photo.jpg"] },
    "/home/user/Pictures/wallpaper.png": { type: "file", content: "PNG image (fake)" },
    "/home/user/Pictures/photo.jpg": { type: "file", content: "JPEG image (fake)" },

    "/home/user/Music": { type: "dir", children: ["song.mp3"] },
    "/home/user/Music/song.mp3": { type: "file", content: "MP3 audio (fake)" },

    "/usr": { type: "dir", children: ["bin", "lib", "share"] },
    "/usr/bin": { type: "dir", children: ["python3", "git"] },
    "/usr/bin/python3": { type: "file", content: "ELF binary (fake)" },
    "/usr/bin/git": { type: "file", content: "ELF binary (fake)" },
    "/usr/lib": { type: "dir", children: ["libc.so"] },
    "/usr/lib/libc.so": { type: "file", content: "Shared library (fake)" },
    "/usr/share": { type: "dir", children: ["doc", "icons"] },
    "/usr/share/doc": { type: "dir", children: ["README"] },
    "/usr/share/doc/README": { type: "file", content: "Documentation root." },
    "/usr/share/icons": { type: "dir", children: ["hicolor"] },
    "/usr/share/icons/hicolor": { type: "dir", children: [] },

    "/var": { type: "dir", children: ["log", "tmp", "lib"] },
    "/var/log": { type: "dir", children: ["syslog", "auth.log"] },
    "/var/log/syslog": { type: "file", content: "system boot started..." },
    "/var/log/auth.log": { type: "file", content: "user logged in." },
    "/var/tmp": { type: "dir", children: [] },
    "/var/lib": { type: "dir", children: ["dpkg"] },
    "/var/lib/dpkg": { type: "dir", children: ["status"] },
    "/var/lib/dpkg/status": { type: "file", content: "package db" },

    "/tmp": { type: "dir", children: [] },
    "/opt": { type: "dir", children: [] }
  };

  function normalize(path) {
    const parts = path.split("/").filter(Boolean);
    const stack = [];
    for (const p of parts) {
      if (p === ".") continue;
      if (p === "..") stack.pop();
      else stack.push(p);
    }
    return "/" + stack.join("/");
  }
  function parentOf(path) {
    if (path === "/") return "/";
    const parts = path.split("/").filter(Boolean);
    parts.pop();
    return "/" + parts.join("/");
  }
  function entryAt(path) {
    const p = normalize(path) === "" ? "/" : normalize(path);
    return FS[p === "" ? "/" : p];
  }
  function iconFor(name, isDir) {
    if (isDir) return "📁";
    if (/\.(png|jpg|jpeg|gif|svg)$/.test(name)) return "🖼️";
    if (/\.(mp3|wav|ogg)$/.test(name)) return "🎵";
    if (/\.(iso|img)$/.test(name)) return "💿";
    if (/\.(deb|rpm)$/.test(name)) return "📦";
    if (/\.(so|so\..*)$/.test(name)) return "🔧";
    if (name === "bash" || name === "sh") return "⚙️";
    return "📄";
  }

  /* ---------- Files app ---------- */
  const filesWindow = document.getElementById("files-window");
  const filesPath = document.getElementById("files-path");
  const filesList = document.getElementById("files-list");
  const filesUp = document.getElementById("files-up");
  let currentPath = "/";

  function renderFiles() {
    filesPath.value = currentPath;
    filesList.innerHTML = "";
    const entry = entryAt(currentPath);
    if (!entry || entry.type !== "dir") return;
    const kids = entry.children || [];
    kids.forEach(name => {
      const childPath = normalize(currentPath + "/" + name);
      const child = entryAt(childPath);
      const isDir = child && child.type === "dir";
      const item = document.createElement("div");
      item.className = "fs-item";
      item.dataset.path = childPath;
      item.dataset.name = name;
      item.dataset.isdir = isDir ? "1" : "0";
      item.innerHTML =
        '<span class="icon">' + iconFor(name, isDir) + "</span>" +
        '<span class="name">' + name + "</span>";
      item.addEventListener("click", () => {
        document.querySelectorAll(".fs-item.selected").forEach(s => s.classList.remove("selected"));
        item.classList.add("selected");
      });
      item.addEventListener("dblclick", () => {
        if (isDir) {
          currentPath = childPath === "" ? "/" : childPath;
          renderFiles();
        } else {
          // open file content in notepad as a new tab
          openNotepad();
          const content = (child && child.content) || "";
          createTab(name, content);
        }
      });
      filesList.appendChild(item);
    });
  }
  filesUp.addEventListener("click", () => {
    currentPath = parentOf(currentPath);
    renderFiles();
  });

  /* ---------- Window helpers ---------- */
  function showWindow(win) {
    win.classList.remove("hidden");
    bringToFront(win);
  }
  function hideWindow(win) { win.classList.add("hidden"); }
  let zCounter = 10;
  function bringToFront(win) {
    zCounter += 1;
    win.style.zIndex = zCounter;
  }

  document.getElementById("open-files").addEventListener("click", () => {
    if (filesWindow.classList.contains("hidden")) showWindow(filesWindow);
    else bringToFront(filesWindow);
    renderFiles();
  });
  document.getElementById("open-notepad").addEventListener("click", () => {
    openNotepad();
  });
  function openNotepad() {
    if (notepadWindow.classList.contains("hidden")) showWindow(notepadWindow);
    else bringToFront(notepadWindow);
    ensureTabs();
  }

  /* Close buttons */
  document.querySelectorAll(".win-close").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const win = btn.closest(".window");
      hideWindow(win);
    });
  });
  /* Minimize = hide */
  document.querySelectorAll(".win-min").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const win = btn.closest(".window");
      hideWindow(win);
    });
  });
  /* Maximize toggle */
  document.querySelectorAll(".win-max").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const win = btn.closest(".window");
      if (win.dataset.maxd === "1") {
        win.style.left = win.dataset.prevLeft;
        win.style.top = win.dataset.prevTop;
        win.style.width = win.dataset.prevW;
        win.style.height = win.dataset.prevH;
        win.dataset.maxd = "0";
      } else {
        win.dataset.prevLeft = win.style.left;
        win.dataset.prevTop = win.style.top;
        win.dataset.prevW = win.style.width;
        win.dataset.prevH = win.style.height;
        win.style.left = "0px";
        win.style.top = "28px";
        win.style.width = "100vw";
        win.style.height = "calc(100vh - 28px - 80px)";
        win.dataset.maxd = "1";
      }
    });
  });

  /* Dragging */
  document.querySelectorAll("[data-drag]").forEach(bar => {
    bar.addEventListener("mousedown", (e) => {
      if (e.target.classList.contains("win-btn")) return;
      const win = bar.closest(".window");
      bringToFront(win);
      const startX = e.clientX, startY = e.clientY;
      const rect = win.getBoundingClientRect();
      const offX = startX - rect.left, offY = startY - rect.top;
      function move(ev) {
        let x = ev.clientX - offX;
        let y = ev.clientY - offY;
        y = Math.max(28, y);
        win.style.left = x + "px";
        win.style.top = y + "px";
      }
      function up() {
        document.removeEventListener("mousemove", move);
        document.removeEventListener("mouseup", up);
      }
      document.addEventListener("mousemove", move);
      document.addEventListener("mouseup", up);
    });
  });

  /* ---------- Notepad app ---------- */
  const notepadWindow = document.getElementById("notepad-window");
  const tabsEl = document.getElementById("tabs");
  const newTabBtn = document.getElementById("new-tab");
  const editor = document.getElementById("editor");
  const statusTab = document.getElementById("np-status-tab");
  const statusInfo = document.getElementById("np-status-info");

  const STORE_KEY = "ubuntu_notepad_tabs_v1";
  let tabs = []; // [{id, name, content}]
  let activeId = null;

  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data && Array.isArray(data.tabs)) {
          tabs = data.tabs.map(t => ({ id: t.id || genId(), name: t.name || "Untitled", content: t.content || "" }));
          activeId = data.activeId && tabs.some(t => t.id === data.activeId) ? data.activeId : (tabs[0] ? tabs[0].id : null);
        }
      }
    } catch (e) { console.warn("load failed", e); }
  }
  function saveState() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify({ tabs, activeId }));
    } catch (e) { console.warn("save failed", e); }
  }
  function genId() { return "tab_" + Math.random().toString(36).slice(2, 9); }

  function renderTabs() {
    // remove existing .tab elements (keep #new-tab)
    tabsEl.querySelectorAll(".tab").forEach(t => t.remove());
    tabs.forEach(t => {
      const el = document.createElement("div");
      el.className = "tab" + (t.id === activeId ? " active" : "");
      el.dataset.id = t.id;
      const name = document.createElement("span");
      name.className = "tab-name";
      name.textContent = t.name;
      const close = document.createElement("span");
      close.className = "tab-close";
      close.textContent = "×";
      close.addEventListener("click", (e) => {
        e.stopPropagation();
        closeTab(t.id);
      });
      el.addEventListener("click", () => activateTab(t.id));
      el.appendChild(name);
      el.appendChild(close);
      tabsEl.insertBefore(el, newTabBtn);
    });
    updateEditor();
  }
  function updateEditor() {
    const active = tabs.find(t => t.id === activeId);
    if (active) {
      editor.value = active.content;
      editor.disabled = false;
      statusTab.textContent = "Tab: " + active.name;
      statusInfo.textContent = active.content.length + " chars";
    } else {
      editor.value = "";
      editor.disabled = true;
      statusTab.textContent = "No tabs";
      statusInfo.textContent = "0 chars";
    }
  }
  function activateTab(id) {
    activeId = id;
    renderTabs();
    saveState();
  }
  function createTab(name, content) {
    const t = { id: genId(), name: name || "Untitled", content: content || "" };
    tabs.push(t);
    activeId = t.id;
    renderTabs();
    saveState();
    return t;
  }
  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    tabs.splice(idx, 1);
    if (activeId === id) {
      activeId = tabs[idx] ? tabs[idx].id : (tabs[idx - 1] ? tabs[idx - 1].id : (tabs[0] ? tabs[0].id : null));
    }
    renderTabs();
    saveState();
  }
  function ensureTabs() {
    if (tabs.length === 0) {
      createTab("Untitled", "");
    } else {
      renderTabs();
    }
  }
  newTabBtn.addEventListener("click", () => {
    createTab("Untitled", "");
  });
  editor.addEventListener("input", () => {
    const active = tabs.find(t => t.id === activeId);
    if (active) {
      active.content = editor.value;
      statusInfo.textContent = active.content.length + " chars";
      saveState();
    }
  });

  /* ---------- Init ---------- */
  loadState();
  renderFiles();
  renderTabs();

  // Clock
  function tick() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    document.getElementById("clock").textContent = hh + ":" + mm;
  }
  tick();
  setInterval(tick, 1000 * 30);

  // Click desktop to deselect
  document.getElementById("desktop").addEventListener("click", (e) => {
    if (e.target.id === "desktop") {
      document.querySelectorAll(".fs-item.selected").forEach(s => s.classList.remove("selected"));
    }
  });
})();
</script>
</body>
</html>
