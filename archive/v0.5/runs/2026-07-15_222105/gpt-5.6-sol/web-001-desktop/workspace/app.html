<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubuntu Desktop</title>
  <style>
    :root {
      color-scheme: dark;
      --orange: #e95420;
      --orange-light: #ff7445;
      --panel: #242127;
      --panel-2: #302d33;
      --surface: #1e1c21;
      --surface-light: #39353c;
      --border: rgba(255, 255, 255, 0.12);
      --muted: #b8b3ba;
      --text: #f7f4f8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Ubuntu, Arial, sans-serif;
      background: #26172e;
      color: var(--text);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    #desktop {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 360px;
      min-height: 240px;
      overflow: hidden;
      user-select: none;
      background:
        radial-gradient(circle at 78% 33%, rgba(233, 84, 32, 0.35), transparent 28%),
        radial-gradient(circle at 20% 75%, rgba(101, 35, 104, 0.44), transparent 34%),
        linear-gradient(135deg, #2c1539 0%, #461641 38%, #7b293d 72%, #b94730 100%);
    }

    #desktop::before {
      content: "";
      position: absolute;
      inset: 30px 0 0;
      pointer-events: none;
      opacity: 0.48;
      background:
        radial-gradient(ellipse at 55% 115%, transparent 0 36%, rgba(255, 255, 255, 0.08) 36.3% 36.8%, transparent 37.1%),
        radial-gradient(ellipse at 55% 115%, transparent 0 48%, rgba(255, 255, 255, 0.055) 48.2% 48.7%, transparent 49%);
    }

    #topbar {
      position: absolute;
      z-index: 1000;
      top: 0;
      left: 0;
      right: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(24, 22, 26, 0.96);
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.35);
      font-size: 13px;
      font-weight: 600;
    }

    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 13px;
      height: 100%;
    }

    .activity-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 9px rgba(233, 84, 32, 0.7);
    }

    .status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #eae7eb;
    }

    #clock {
      min-width: 126px;
      text-align: center;
    }

    .desktop-shortcut {
      position: absolute;
      top: 54px;
      left: 18px;
      width: 84px;
      padding: 8px 4px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      text-align: center;
      cursor: default;
    }

    .desktop-shortcut:hover,
    .desktop-shortcut:focus-visible {
      background: rgba(255, 255, 255, 0.1);
      outline: 1px solid rgba(255, 255, 255, 0.12);
    }

    .desktop-shortcut svg {
      width: 48px;
      height: 48px;
      display: block;
      margin: 0 auto 5px;
      filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.35));
    }

    .desktop-shortcut span {
      display: block;
      overflow: hidden;
      color: white;
      text-overflow: ellipsis;
      text-shadow: 0 1px 3px black;
      font-size: 13px;
    }

    #taskbar {
      position: absolute;
      z-index: 1100;
      left: 50%;
      bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 17px;
      background: rgba(31, 27, 34, 0.88);
      box-shadow:
        0 12px 32px rgba(0, 0, 0, 0.45),
        inset 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
    }

    .launcher {
      position: relative;
      width: 50px;
      height: 50px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: background 140ms, transform 140ms;
    }

    .launcher:hover,
    .launcher:focus-visible {
      background: rgba(255, 255, 255, 0.12);
      outline: none;
      transform: translateY(-2px);
    }

    .launcher.running::after {
      content: "";
      position: absolute;
      bottom: 3px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--orange-light);
    }

    .launcher svg {
      width: 35px;
      height: 35px;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.3));
    }

    .app-window {
      position: absolute;
      z-index: 10;
      min-width: 360px;
      min-height: 240px;
      width: 720px;
      height: 500px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 10px;
      background: var(--surface);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.48),
        0 3px 10px rgba(0, 0, 0, 0.35);
    }

    .app-window.hidden {
      display: none;
    }

    #files-window {
      top: 70px;
      left: max(115px, calc(50% - 390px));
    }

    #notepad-window {
      top: 94px;
      left: max(140px, calc(50% - 300px));
      width: 680px;
      height: 480px;
    }

    .titlebar {
      height: 39px;
      flex: 0 0 39px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 14px;
      background: linear-gradient(#39363c, #302d33);
      border-bottom: 1px solid rgba(0, 0, 0, 0.6);
      cursor: grab;
    }

    .titlebar:active {
      cursor: grabbing;
    }

    .window-title {
      flex: 1;
      text-align: center;
      margin-left: 34px;
      overflow: hidden;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .win-close {
      width: 27px;
      height: 27px;
      display: grid;
      place-items: center;
      padding: 0 0 2px;
      border: 0;
      border-radius: 50%;
      background: #4b474e;
      color: #f5f2f6;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .win-close:hover,
    .win-close:focus-visible {
      background: #d94343;
      outline: none;
    }

    .files-toolbar {
      height: 48px;
      flex: 0 0 48px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      background: #2c292f;
      border-bottom: 1px solid var(--border);
    }

    #files-up {
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #3a363e;
      cursor: pointer;
      font-size: 20px;
    }

    #files-up:hover:not(:disabled) {
      background: #4a454e;
    }

    #files-up:disabled {
      opacity: 0.42;
      cursor: default;
    }

    #files-path {
      height: 34px;
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #211f23;
      color: #f3f0f4;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-family: ui-monospace, "Cascadia Mono", monospace;
      font-size: 13px;
      user-select: text;
    }

    .files-body {
      min-height: 0;
      flex: 1;
      display: flex;
    }

    .files-sidebar {
      width: 158px;
      flex: 0 0 158px;
      padding: 10px 8px;
      background: #29262c;
      border-right: 1px solid var(--border);
    }

    .sidebar-label {
      padding: 4px 10px 7px;
      color: #918b94;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .place-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 2px;
      padding: 8px 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .place-button:hover,
    .place-button.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .place-button svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    #files-list {
      min-width: 0;
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      grid-auto-rows: 98px;
      align-content: start;
      gap: 6px;
      padding: 14px;
      overflow: auto;
      background: #201e22;
    }

    .fs-item {
      min-width: 0;
      height: 94px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 9px 5px 5px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      cursor: default;
    }

    .fs-item:hover {
      background: rgba(255, 255, 255, 0.065);
    }

    .fs-item.selected {
      border-color: rgba(233, 84, 32, 0.7);
      background: rgba(233, 84, 32, 0.19);
    }

    .fs-item svg {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.25));
      pointer-events: none;
    }

    .fs-name {
      width: 100%;
      overflow: hidden;
      color: #eeeaf0;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      pointer-events: none;
    }

    .notepad-toolbar {
      height: 43px;
      flex: 0 0 43px;
      display: flex;
      align-items: flex-end;
      padding: 5px 8px 0;
      background: #29262c;
      border-bottom: 1px solid var(--border);
    }

    #tabs {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .tab {
      max-width: 170px;
      min-width: 105px;
      height: 32px;
      flex: 0 0 auto;
      padding: 0 13px;
      overflow: hidden;
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 7px 7px 0 0;
      background: #353139;
      color: #bdb7c0;
      cursor: pointer;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .tab:hover {
      background: #403b44;
    }

    .tab.active {
      border-color: var(--border);
      background: #1e1c21;
      color: white;
    }

    #new-tab {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      margin-left: 5px;
      padding: 0;
      border: 0;
      border-radius: 7px 7px 0 0;
      background: #3b3740;
      cursor: pointer;
      font-size: 22px;
    }

    #new-tab:hover {
      background: var(--orange);
    }

    #editor {
      width: 100%;
      min-height: 0;
      flex: 1;
      resize: none;
      padding: 20px 22px;
      border: 0;
      outline: 0;
      background: #1e1c21;
      color: #f4f1f5;
      caret-color: var(--orange-light);
      font-family: ui-monospace, "Cascadia Mono", "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.65;
      tab-size: 4;
      user-select: text;
    }

    #editor::selection {
      background: rgba(233, 84, 32, 0.55);
    }

    .editor-status {
      height: 25px;
      flex: 0 0 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-top: 1px solid var(--border);
      background: #29262c;
      color: #aaa4ad;
      font-size: 11px;
    }

    @media (max-width: 650px) {
      .files-sidebar {
        display: none;
      }

      .app-window,
      #notepad-window {
        left: 0 !important;
        width: max(360px, 100vw);
      }
    }
  </style>
</head>
<body>
  <main id="desktop">
    <header id="topbar">
      <div class="top-left">
        <span class="activity-dot"></span>
        <span>Activities</span>
      </div>
      <div id="clock" aria-label="Current date and time"></div>
      <div class="top-right" aria-label="System status">
        <span class="status-icon" title="Network">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 9.5C8.2 5.2 15.8 5.2 21 9.5M6.5 13c3.2-2.7 7.8-2.7 11 0M10 16.4c1.2-1 2.8-1 4 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="19" r="1.3" fill="currentColor"/>
          </svg>
        </span>
        <span class="status-icon" title="Volume">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 9h4l5-4v14l-5-4H5zM17 9c1.8 1.6 1.8 4.4 0 6M19.5 6.5c3.4 3.1 3.4 7.9 0 11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="status-icon" title="Power">
          <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 7H5v10h14V7h-3M10 5h4v2h2v10H8V7h2z" fill="currentColor"/>
          </svg>
        </span>
      </div>
    </header>

    <button class="desktop-shortcut" id="desktop-home" type="button" aria-label="Open Home folder">
      <svg viewBox="0 0 64 64" aria-hidden="true">
        <path d="M6 17h22l6 7h24v29a5 5 0 0 1-5 5H11a5 5 0 0 1-5-5z" fill="#d89521"/>
        <path d="M6 22h52v8H6z" fill="#f2b849"/>
        <path d="M7 28h50l-5 27H12z" fill="#e9a52e"/>
      </svg>
      <span>Home</span>
    </button>

    <section id="files-window" class="app-window hidden" aria-label="Files window">
      <div class="titlebar">
        <div class="window-title">Files</div>
        <button class="win-close" type="button" aria-label="Close Files">×</button>
      </div>
      <div class="files-toolbar">
        <button id="files-up" type="button" aria-label="Go to parent folder" title="Parent folder">↑</button>
        <div id="files-path">/</div>
      </div>
      <div class="files-body">
        <aside class="files-sidebar">
          <div class="sidebar-label">Places</div>
          <button class="place-button" type="button" data-path="/home/user">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z" fill="#e95420"/>
            </svg>
            Home
          </button>
          <button class="place-button" type="button" data-path="/home/user/Documents">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 2h9l5 5v15H5z" fill="#ddd"/>
              <path d="M14 2v6h5" fill="#aaa"/>
            </svg>
            Documents
          </button>
          <button class="place-button" type="button" data-path="/home/user/Downloads">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 4h16v16H4z" rx="2" fill="#5f9fd7"/>
              <path d="M12 6v9m-4-4 4 4 4-4" fill="none" stroke="white" stroke-width="2"/>
            </svg>
            Downloads
          </button>
          <button class="place-button" type="button" data-path="/home/user/Pictures">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="16" rx="2" fill="#9b63c7"/>
              <circle cx="9" cy="9" r="2" fill="#fff3"/>
              <path d="m4 18 5-5 3 3 3-4 5 6" fill="#f2d45c"/>
            </svg>
            Pictures
          </button>
          <div class="sidebar-label" style="margin-top:12px">System</div>
          <button class="place-button" type="button" data-path="/">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="4" width="18" height="16" rx="2" fill="#77727b"/>
              <circle cx="7" cy="8" r="1.2" fill="#e95420"/>
              <path d="M6 15h12" stroke="#ddd" stroke-width="2"/>
            </svg>
            Computer
          </button>
        </aside>
        <div id="files-list" aria-label="Folder contents"></div>
      </div>
    </section>

    <section id="notepad-window" class="app-window hidden" aria-label="Notepad window">
      <div class="titlebar">
        <div class="window-title">Notepad</div>
        <button class="win-close" type="button" aria-label="Close Notepad">×</button>
      </div>
      <div class="notepad-toolbar">
        <div id="tabs" role="tablist" aria-label="Open notes"></div>
        <button id="new-tab" type="button" aria-label="Create new tab" title="New tab">+</button>
      </div>
      <textarea id="editor" spellcheck="true" aria-label="Note editor"></textarea>
      <div class="editor-status">
        <span>Plain Text</span>
        <span id="editor-count">0 characters</span>
      </div>
    </section>

    <nav id="taskbar" aria-label="Applications">
      <button id="open-files" class="launcher" type="button" aria-label="Open Files" title="Files">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path d="M4 13h18l5 6h17v22a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z" fill="#d98b18"/>
          <path d="M4 18h40v7H4z" fill="#f2b544"/>
          <path d="M5 23h38l-4 20H9z" fill="#e9a52e"/>
        </svg>
      </button>
      <button id="open-notepad" class="launcher" type="button" aria-label="Open Notepad" title="Notepad">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <rect x="8" y="5" width="33" height="39" rx="4" fill="#eeeaf0"/>
          <rect x="8" y="5" width="7" height="39" rx="3" fill="#e95420"/>
          <path d="M20 16h15M20 23h15M20 30h12M20 37h9" stroke="#625d66" stroke-width="2.3" stroke-linecap="round"/>
          <path d="M18 5v6M25 5v6M32 5v6" stroke="#817b84" stroke-width="2"/>
        </svg>
      </button>
    </nav>
  </main>

  <script>
    (() => {
      "use strict";

      const desktop = document.getElementById("desktop");
      const filesWindow = document.getElementById("files-window");
      const notepadWindow = document.getElementById("notepad-window");
      const openFiles = document.getElementById("open-files");
      const openNotepad = document.getElementById("open-notepad");
      let topZ = 20;

      function focusWindow(win) {
        topZ += 1;
        win.style.zIndex = topZ;
      }

      function showWindow(win, launcher) {
        win.classList.remove("hidden");
        launcher.classList.add("running");
        focusWindow(win);
      }

      openFiles.addEventListener("click", () => showWindow(filesWindow, openFiles));
      openNotepad.addEventListener("click", () => {
        showWindow(notepadWindow, openNotepad);
        requestAnimationFrame(() => document.getElementById("editor").focus());
      });

      document.querySelectorAll(".win-close").forEach(button => {
        button.addEventListener("click", event => {
          const win = event.currentTarget.closest(".app-window");
          win.classList.add("hidden");
          if (win === filesWindow) openFiles.classList.remove("running");
          if (win === notepadWindow) openNotepad.classList.remove("running");
        });
      });

      document.querySelectorAll(".app-window").forEach(win => {
        win.addEventListener("pointerdown", () => focusWindow(win));

        const bar = win.querySelector(".titlebar");
        bar.addEventListener("pointerdown", event => {
          if (event.target.closest("button") || event.button !== 0) return;

          focusWindow(win);
          const rect = win.getBoundingClientRect();
          const offsetX = event.clientX - rect.left;
          const offsetY = event.clientY - rect.top;
          bar.setPointerCapture(event.pointerId);

          const move = moveEvent => {
            const maxLeft = Math.max(0, window.innerWidth - 80);
            const maxTop = Math.max(30, window.innerHeight - 80);
            const left = Math.min(maxLeft, Math.max(0, moveEvent.clientX - offsetX));
            const top = Math.min(maxTop, Math.max(30, moveEvent.clientY - offsetY));
            win.style.left = left + "px";
            win.style.top = top + "px";
          };

          const stop = () => {
            bar.removeEventListener("pointermove", move);
            bar.removeEventListener("pointerup", stop);
            bar.removeEventListener("pointercancel", stop);
          };

          bar.addEventListener("pointermove", move);
          bar.addEventListener("pointerup", stop);
          bar.addEventListener("pointercancel", stop);
        });
      });

      function updateClock() {
        const now = new Date();
        document.getElementById("clock").textContent = now.toLocaleString([], {
          weekday: "short",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      updateClock();
      setInterval(updateClock, 15000);

      const folder = children => ({ type: "folder", children });
      const file = () => ({ type: "file" });

      const filesystem = folder({
        bin: folder({
          bash: file(),
          cat: file(),
          cp: file(),
          ls: file(),
          mkdir: file()
        }),
        etc: folder({
          network: folder({}),
          apt: folder({}),
          hostname: file(),
          hosts: file()
        }),
        home: folder({
          user: folder({
            Documents: folder({
              "Ideas.txt": file(),
              "Project Notes.txt": file(),
              "Welcome.txt": file()
            }),
            Downloads: folder({
              "ubuntu-guide.pdf": file(),
              "wallpaper.png": file()
            }),
            Pictures: folder({
              Wallpapers: folder({
                "Sunset.jpg": file(),
                "Mountains.jpg": file()
              }),
              "Desktop.png": file()
            }),
            Music: folder({}),
            Videos: folder({}),
            "todo.txt": file()
          })
        }),
        usr: folder({
          bin: folder({}),
          lib: folder({}),
          share: folder({})
        }),
        var: folder({
          log: folder({
            "system.log": file()
          }),
          cache: folder({}),
          tmp: folder({})
        }),
        opt: folder({}),
        tmp: folder({}),
        "README.txt": file()
      });

      let currentParts = [];
      const filesPath = document.getElementById("files-path");
      const filesList = document.getElementById("files-list");
      const filesUp = document.getElementById("files-up");

      function nodeAt(parts) {
        let node = filesystem;
        for (const part of parts) {
          if (!node || node.type !== "folder") return null;
          node = node.children[part];
        }
        return node;
      }

      function pathToParts(path) {
        return path.split("/").filter(Boolean);
      }

      function folderIcon() {
        return `
          <svg viewBox="0 0 56 48" aria-hidden="true">
            <path d="M3 10h21l6 7h23v26a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z" fill="#d78b1e"/>
            <path d="M3 15h50v9H3z" fill="#f1b447"/>
            <path d="M4 22h48l-4 23H8z" fill="#e4a12e"/>
          </svg>`;
      }

      function fileIcon() {
        return `
          <svg viewBox="0 0 48 52" aria-hidden="true">
            <path d="M8 2h21l11 11v35a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V5a3 3 0 0 1 3-3z" fill="#e9e6ea"/>
            <path d="M29 2v12h11" fill="#b9b5bb"/>
            <path d="M12 23h21M12 29h21M12 35h17M12 41h13" stroke="#77717a" stroke-width="2" stroke-linecap="round"/>
          </svg>`;
      }

      function navigate(pathOrParts) {
        const parts = Array.isArray(pathOrParts) ? pathOrParts : pathToParts(pathOrParts);
        const node = nodeAt(parts);
        if (!node || node.type !== "folder") return;

        currentParts = parts;
        filesPath.textContent = "/" + currentParts.join("/");
        filesUp.disabled = currentParts.length === 0;
        filesList.replaceChildren();

        const entries = Object.entries(node.children).sort((a, b) => {
          if (a[1].type !== b[1].type) return a[1].type === "folder" ? -1 : 1;
          return a[0].localeCompare(b[0]);
        });

        entries.forEach(([name, entry]) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "fs-item";
          item.dataset.name = name;
          item.dataset.type = entry.type;
          item.innerHTML = (entry.type === "folder" ? folderIcon() : fileIcon()) +
            `<span class="fs-name"></span>`;
          item.querySelector(".fs-name").textContent = name;

          item.addEventListener("click", () => {
            filesList.querySelectorAll(".fs-item").forEach(other => other.classList.remove("selected"));
            item.classList.add("selected");
          });

          item.addEventListener("dblclick", () => {
            if (entry.type === "folder") navigate(currentParts.concat(name));
          });

          filesList.appendChild(item);
        });

        document.querySelectorAll(".place-button").forEach(button => {
          const normalized = "/" + currentParts.join("/");
          button.classList.toggle("active", button.dataset.path === normalized);
        });
      }

      filesUp.addEventListener("click", () => {
        if (currentParts.length) navigate(currentParts.slice(0, -1));
      });

      document.querySelectorAll(".place-button").forEach(button => {
        button.addEventListener("click", () => navigate(button.dataset.path));
      });

      document.getElementById("desktop-home").addEventListener("dblclick", () => {
        navigate("/home/user");
        showWindow(filesWindow, openFiles);
      });

      navigate("/");

      const STORAGE_KEY = "ubuntuDesktopNotepadTabs";
      const tabsElement = document.getElementById("tabs");
      const newTabButton = document.getElementById("new-tab");
      const editor = document.getElementById("editor");
      const editorCount = document.getElementById("editor-count");

      let notesState = {
        tabs: [],
        activeId: null,
        nextNumber: 1
      };

      function loadNotes() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (saved && Array.isArray(saved.tabs) && saved.tabs.length) {
            notesState.tabs = saved.tabs.map((tab, index) => ({
              id: String(tab.id ?? ("restored-" + index)),
              title: String(tab.title ?? ("Untitled " + (index + 1))),
              content: String(tab.content ?? "")
            }));
            notesState.activeId = notesState.tabs.some(tab => tab.id === saved.activeId)
              ? saved.activeId
              : notesState.tabs[0].id;
            notesState.nextNumber = Number.isFinite(saved.nextNumber)
              ? saved.nextNumber
              : notesState.tabs.length + 1;
            return;
          }
        } catch (_) {}

        notesState = {
          tabs: [{
            id: "tab-" + Date.now(),
            title: "Untitled 1",
            content: ""
          }],
          activeId: null,
          nextNumber: 2
        };
        notesState.activeId = notesState.tabs[0].id;
      }

      function saveNotes() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(notesState));
        } catch (_) {}
      }

      function activeTab() {
        return notesState.tabs.find(tab => tab.id === notesState.activeId);
      }

      function updateCount() {
        const count = editor.value.length;
        editorCount.textContent = count + (count === 1 ? " character" : " characters");
      }

      function renderTabs() {
        tabsElement.replaceChildren();

        notesState.tabs.forEach(tabData => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "tab" + (tabData.id === notesState.activeId ? " active" : "");
          tab.textContent = tabData.title;
          tab.dataset.id = tabData.id;
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-selected", tabData.id === notesState.activeId ? "true" : "false");

          tab.addEventListener("click", () => {
            const current = activeTab();
            if (current) current.content = editor.value;
            notesState.activeId = tabData.id;
            renderTabs();
            saveNotes();
            editor.focus();
          });

          tabsElement.appendChild(tab);
        });

        const current = activeTab();
        editor.value = current ? current.content : "";
        updateCount();

        const selected = tabsElement.querySelector(".tab.active");
        if (selected) selected.scrollIntoView({ block: "nearest", inline: "nearest" });
      }

      newTabButton.addEventListener("click", () => {
        const current = activeTab();
        if (current) current.content = editor.value;

        const number = notesState.nextNumber++;
        const newTab = {
          id: "tab-" + Date.now() + "-" + Math.random().toString(36).slice(2),
          title: "Untitled " + number,
          content: ""
        };

        notesState.tabs.push(newTab);
        notesState.activeId = newTab.id;
        renderTabs();
        saveNotes();
        editor.focus();
      });

      editor.addEventListener("input", () => {
        const current = activeTab();
        if (current) {
          current.content = editor.value;
          saveNotes();
        }
        updateCount();
      });

      loadNotes();
      renderTabs();
      saveNotes();
    })();
  </script>
</body>
</html>
