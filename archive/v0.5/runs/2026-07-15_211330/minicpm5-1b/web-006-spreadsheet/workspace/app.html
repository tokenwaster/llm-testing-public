    <script>
        // Sheet object (assuming window.sheet exists)
        const sheet = window.sheet;
        
        // Function to set a formula in a cell
        function setFormula(cellId, formula) {
            const cell = document.getElementById(cellId);
            if (!cell || !formula) return;
            
            try {
                // Check for circular references by comparing computed values of two cells
                let cycleFound = false;
                
                // Get formulas from the cell (if any)
                const formulas = sheet.getFormula(cellId, 'A1');
                if (formulas && formulas.length > 0) {
                    // Compare each formula with another cell's formula
                    for (let i = 0; i < formulas.length - 1; i++) {
                        const formula1 = formulas[i];
                        const formula2 = sheet.getFormula(cellId, formulas[i]);
                        
                        if (formula1 === formula2) {
                            cycleFound = true;
                            break;
                        }
                    }
                }
                
                // If circular reference found, set to "#CYCLE"
                if (cycleFound) {
                    cell.value = '#CYCLE';
                } else {
                    // Set the formula
                    sheet.setFormula(cellId, formula);
                    
                    // Update all cells that depend on this formula
                    updateDependentCells(cellId, formula);
                }
            } catch (error) {
                console.error(`Error setting formula in cell ${cellId}:`, error);
                alert("Invalid formula syntax or reference to non-cell");
            }
        }
        
        // Function to update all cells that depend on a given formula
        function updateDependentCells(cellId, formula) {
            const formulas = sheet.getFormula(cellId, 'A1');
            
            if (!formulas || formulas.length === 0) return;
            
            for (let i = 0; i < formulas.length - 1; i++) {
                const formula1 = formulas[i];
                const cellToUpdate = sheet.getCell(cellId, formulas[i]);
                
                // Check if the updated cell's value changes
                if (sheet.getValue(cellToUpdate) !== formula1.value) {
                    setFormula(cellToUpdate.id, formula);
                }
            }
        }
        
        // Function to update all cells that depend on a given cell's value
        function updateCellsByValue(value) {
            const formulas = sheet.getFormula('A1');

                }
            }
        }
