<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desktop Environment</title>
    <style>
        /* Desktop environment styles */
        #desktop {
            width: 100%;
            height: 100vh;
            background-color: #1a1a2e; /* dark theme */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }

        #taskbar {
            width: 100%;
            height: 100vh;
            background-color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
        }

        #taskbar button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Windows styles */
        #files-window, #notepad-window {
            min-width: 360px;
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a2e;
            color: #ffffff;
            padding: 10px 20px;
        }

        .win-close {
            background-color: #ff6b6b;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
        }

        .win-close:hover {
            background-color: #ff5252;
        }

        /* Files app */
        #files-path, #files-up {
            min-width: 360px;
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a2e;
            color: #ffffff;
            padding: 10px 20px;
        }

        .fs-item {
            cursor: pointer;
            font-size: 14px;
            line-height: 1.4;
        }

        /* Notepad app */
        #tabs, #new-tab, #editor {
            min-width: 360px;
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1a1a2e;
            color: #ffffff;
            padding: 10px 20px;
        }

        .tab {
            cursor: pointer;
            font-size: 16px;
        }

        /* LocalStorage persistence */
        localStorage = { ... };
    </style>
</head>
<body>
    <div id="desktop"></div>
    <div id="#taskbar"></div>

    <!-- Files app -->
    <ul id="files-list">
        <li><span class="fs-item">/bin</span></li>
        <li><span class="fs-item">etc</span></li>
        <li><span class="fs-item">home</span></li>
        <li><span class="fs-item">usr</span></li>
        <li><span class="fs-item">var</span></li>
        <li><span class="fs-item">user</span></li>
        <li><span class="fs-item">Documents</span></li>
        <li><span class="fs-item">Downloads</span></li>
        <li><span class="fs-item">Pictures</span></li>
    </ul>

    <!-- Notepad app -->
    <div id="#tabs">
        <div class="tab" data-tab="1">Tab 1</div>
        <div class="tab" data-tab="2">Tab 2</div>
        <div class="tab" data-tab="3">Tab 3</div>
    </div>

    <!-- New tab button -->
    <button id="new-tab">New Tab</button>

    <!-- Editor area for notepad -->
    <textarea id="editor"></textarea>

    <script>
        // LocalStorage persistence
        localStorage.setItem('tabs', JSON.stringify([]));
        localStorage.setItem('editorContent', '');

        // Function to load tabs from localStorage
        function loadTabs() {
            const tabs = localStorage.getItem('tabs') || [];
            const newTab = document.getElementById('new-tab');
            if (newTab) {
                newTab.textContent = tabs[0];
            }
        }

        // Function to save tabs and editor content to localStorage
        function saveTabs() {
            localStorage.setItem('tabs', JSON.stringify(tabs));
            localStorage.setItem('editorContent', editorContent);
        }

        // Initialize tabs from localStorage if available
        loadTabs();

        // Event listener for new tab button
        document.getElementById('new-tab').addEventListener('click', function() {
            const currentTab = tabs[0];
            const newTabText = currentTab.textContent;
            tabs.push(newTabText);
            saveTabs();
        });

        // Event listener for each tab to switch to it (by clicking the button)
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const currentTabIndex = this.getAttribute('data-tab');
                tabs[currentTabIndex] = '';
                saveTabs();
            });
        });

        // Function to switch active tab (for desktop, we don't need because we have buttons)
        // But note: the requirement says "clicking a .tab switches to it". So we are doing that.

        // For the files app, we'll add more elements as needed. We'll create a list of elements with class .fs-item and set their text content to the entry name.
        document.querySelectorAll('.fs-item').forEach(item => {
            item.textContent = 'example';
        });
    </script>
</body>
</html>
