<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', system-ui, -apple-system, sans-serif;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }

  /* ── Desktop Root ── */
  #desktop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #2c001e 0%, #4a0033 25%, #77216f 50%, #e95420 80%, #ff790d 100%);
    background-size: cover;
    z-index: 0;
  }

  /* ── Top Bar ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    z-index: 1000;
    color: #eee;
    font-size: 13px;
    letter-spacing: 0.2px;
  }
  #topbar .left { display: flex; align-items: center; gap: 6px; }
  #topbar .ubuntu-logo {
    width: 18px; height: 18px;
    background: radial-gradient(circle, #e95420 3px, transparent 4px);
    border-radius: 50%;
    position: relative;
  }
  #topbar .center { color: #ccc; font-size: 12px; }
  #topbar .right { display: flex; align-items: center; gap: 14px; color: #ddd; font-size: 12px; }

  /* ── Taskbar / Dock ── */
  #taskbar {
    position: fixed;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(30, 30, 30, 0.85);
    backdrop-filter: blur(16px);
    border-radius: 16px;
    z-index: 1000;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  .dock-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
  }
  .dock-btn:hover { transform: scale(1.15); }
  .dock-btn:active { transform: scale(0.95); }

  #open-files {
    background: linear-gradient(135deg, #3e8e41, #2f6b30);
    color: white;
    font-size: 20px;
  }
  #open-notepad {
    background: linear-gradient(135deg, #4a90d9, #357abd);
    color: white;
    font-size: 20px;
  }

  .dock-btn .dot-indicator {
    position: absolute;
    bottom: -4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #e95420;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .dock-btn.active .dot-indicator { opacity: 1; }

  /* ── Window Base ── */
  .app-window {
    position: absolute;
    min-width: 360px;
    min-height: 240px;
    background: #2d2d2d;
    border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    transition: box-shadow 0.2s;
  }
  .app-window.focused {
    box-shadow: 0 12px 56px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
    z-index: 200;
  }

  .win-titlebar {
    height: 38px;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: grab;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .win-titlebar:active { cursor: grabbing; }

  .win-titlebar .title-text {
    color: #ddd;
    font-size: 13px;
    font-weight: 500;
    flex: 1;
    text-align: center;
    margin-right: 60px;
    letter-spacing: 0.2px;
  }

  .win-controls {
    position: absolute;
    right: 8px;
    display: flex;
    gap: 7px;
  }
  .win-controls button {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
    font-size: 0;
    line-height: 1;
  }
  .win-controls button:hover { opacity: 0.8; }
  .btn-minimize { background: #f5c542; }
  .btn-maximize { background: #46d166; }
  .win-close {
    background: #e95420 !important;
    color: white !important;
    font-size: 10px !important;
    line-height: 14px !important;
    text-align: center;
    width: 18px !important;
    height: 18px !important;
    border-radius: 50% !important;
    cursor: pointer !important;
    border: none !important;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    margin-left: 4px;
  }

  .win-body {
    flex: 1;
    overflow: auto;
    background: #2d2d2d;
    color: #e0e0e0;
  }

  /* ── Files App ── */
  #files-window { top: 60px; left: 80px; width: 720px; height: 480px; }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #363636;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #files-up {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #files-up:hover { background: rgba(255,255,255,0.12); color: #fff; }

  #files-path {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 6px 14px;
    color: #e95420;
    font-size: 13px;
    font-family: 'Ubuntu Mono', 'Fira Code', monospace;
    outline: none;
  }

  .files-list {
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px;
  }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 6px;
    min-height: 90px;
  }
  .fs-item:hover { background: rgba(255,255,255,0.07); }
  .fs-item:active { background: rgba(255,255,255,0.12); }

  .fs-icon { font-size: 36px; line-height: 1; }
  .fs-name {
    font-size: 11px;
    color: #ccc;
    text-align: center;
    word-break: break-word;
    max-width: 100%;
    line-height: 1.3;
  }

  /* ── Notepad App ── */
  #notepad-window { top: 80px; left: 200px; width: 640px; height: 500px; }

  .notepad-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #363636;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  #new-tab {
    height: 30px;
    padding: 0 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #e95420, #c74216);
    color: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #new-tab:hover { background: linear-gradient(135deg, #ff6b3a, #e95420); transform: scale(1.03); }

  #tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
    background: transparent;
    flex-shrink: 0;
  }
  .tab:hover { background: rgba(255,255,255,0.07); color: #ddd; }
  .tab.active {
    background: rgba(233, 84, 32, 0.2);
    color: #e95420;
    font-weight: 600;
  }

  .tab-close {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #888;
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .tab-close:hover { background: rgba(233,84,32,0.4); color: white; }

  #editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #editor {
    flex: 1;
    background: #1e1e1e;
    color: #d4d4d4;
    border: none;
    resize: none;
    padding: 16px;
    font-family: 'Ubuntu Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.7;
    outline: none;
    tab-size: 2;
    overflow-y: auto;
  }

  /* ── Scrollbar Styling ── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* ── Animations ── */
  @keyframes windowOpen {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .app-window.opening { animation: windowOpen 0.2s ease-out forwards; }

  /* ── Resize Handle ── */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 16px; height: 16px;
    cursor: nwse-resize;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- Desktop -->
<div id="desktop">

  <!-- Top Bar -->
  <div id="topbar">
    <div class="left">
      <div class="ubuntu-logo"></div>
      <span style="font-weight:600;letter-spacing:0.5px;">Activities</span>
    </div>
    <div class="center" id="clock-display"></div>
    <div class="right">
      <span>🔊</span>
      <span>📶</span>
      <span>🔋 87%</span>
      <span id="topbar-time"></span>
    </div>
  </div>

  <!-- Taskbar / Dock -->
  <div id="taskbar">
    <button class="dock-btn" id="open-files" title="Files">
      📁
      <span class="dot-indicator"></span>
    </button>
    <button class="dock-btn" id="open-notepad" title="Notepad">
      📝
      <span class="dot-indicator"></span>
    </button>
  </div>

  <!-- Files Window -->
  <div class="app-window" id="files-window" style="display:none;">
    <div class="win-titlebar" data-drag="files-window">
      <span class="title-text">Files</span>
      <div class="win-controls">
        <button class="btn-minimize"></button>
        <button class="btn-maximize"></button>
        <button class="win-close">×</button>
      </div>
    </div>
    <div class="files-toolbar">
      <button id="files-up" title="Go up one level">↑</button>
      <input type="text" id="files-path" readonly value="/">
    </div>
    <div class="win-body">
      <div class="files-list" id="files-list"></div>
    </div>
    <div class="resize-handle"></div>
  </div>

  <!-- Notepad Window -->
  <div class="app-window" id="notepad-window" style="display:none;">
    <div class="win-titlebar" data-drag="notepad-window">
      <span class="title-text">Text Editor</span>
      <div class="win-controls">
        <button class="btn-minimize"></button>
        <button class="btn-maximize"></button>
        <button class="win-close">×</button>
      </div>
    </div>
    <div class="notepad-toolbar">
      <button id="new-tab">＋ New Tab</button>
      <div id="tabs"></div>
    </div>
    <div id="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="resize-handle"></div>
  </div>

</div>

<script>
(function() {
  'use strict';

  // ════════════════════════════════════════
  // Clock
  // ════════════════════════════════════════
  function updateClock() {
    const now = new Date();
    const opts = { weekday: 'short', month: 'short', day: 'numeric' };
    document.getElementById('clock-display').textContent = now.toLocaleDateString('en-US', opts);
    document.getElementById('topbar-time').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ════════════════════════════════════════
  // Window Management (drag, focus, close)
  // ════════════════════════════════════════
  let topZ = 200;
  const windows = {};

  function bringToFront(winId) {
    const el = document.getElementById(winId);
    if (!el || !el.style.display || el.style.display === 'none') return;
    topZ++;
    el.style.zIndex = topZ;
    el.classList.add('focused');
    // Remove focused from others
    document.querySelectorAll('.app-window').forEach(w => {
      if (w.id !== winId) w.classList.remove('focused');
    });
  }

  function initDrag(winId) {
    const win = document.getElementById(winId);
    const titlebar = win.querySelector('.win-titlebar');
    let offsetX, offsetY, dragging = false;

    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('win-close') || e.target.closest('.win-controls')) return;
      bringToFront(winId);
      const rect = win.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      dragging = true;
      titlebar.style.cursor = 'grabbing';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      win.style.transition = 'none';
      win.style.left = Math.max(0, e.clientX - offsetX) + 'px';
      win.style.top = Math.max(28, e.clientY - offsetY) + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (dragging) {
        dragging = false;
        titlebar.style.cursor = 'grab';
        win.style.transition = '';
      }
    });

    win.addEventListener('mousedown', () => bringToFront(winId));
  }

  // ════════════════════════════════════════
  // Files App — Filesystem Data
  // ════════════════════════════════════════
  const filesystem = {
    '/': {
      bin: 'folder', etc: 'folder', home: 'folder', usr: 'folder', var: 'folder',
      lib: 'folder', tmp: 'folder', root: 'folder', sbin: 'folder', dev: 'folder'
    },
    '/etc': {
      passwd: 'file', hosts: 'file', fstab: 'file', sshd_config: 'file',
      hostname: 'file', resolv.conf: 'file', profile: 'file', bashrc: 'file',
      default: 'folder', init.d: 'folder'
    },
    '/etc/default': { grub: 'file', user: 'file' },
    '/etc/init.d': { networking: 'script', cron: 'script', ssh: 'script' },
    '/home': { user: 'folder', guest: 'folder' },
    '/home/user': {
      Documents: 'folder', Downloads: 'folder', Pictures: 'folder',
      Music: 'folder', Videos: 'folder', Desktop: 'folder',
      '.bashrc': 'file', '.profile': 'file', '.ssh': 'folder',
      notes.txt: 'file', todo.md: 'file'
    },
    '/home/user/Documents': {
      report.pdf: 'file', resume.docx: 'file', project_plan.md: 'file',
      work: 'folder', personal: 'folder'
    },
    '/home/user/Documents/work': { meeting_notes.txt: 'file', slides.pptx: 'file' },
    '/home/user/Documents/personal': { diary.txt: 'file', recipes.md: 'file' },
    '/home/user/Downloads': { ubuntu.iso: 'file', wallpaper.png: 'file', archive.tar.gz: 'file' },
    '/home/user/Pictures': { screenshot.png: 'file', vacation: 'folder', icons: 'folder' },
    '/home/user/Pictures/vacation': { beach.jpg: 'file', mountains.jpg: 'file' },
    '/home/user/Pictures/icons': { home.svg: 'file', settings.svg: 'file' },
    '/home/user/Music': { playlist.m3u: 'file', favorite.mp3: 'file' },
    '/home/user/Videos': { tutorial.mp4: 'file' },
    '/home/user/Desktop': { shortcut.desktop: 'file' },
    '/home/user/.ssh': { id_rsa: 'file', id_rsa.pub: 'file', known_hosts: 'file' },
    '/home/guest': { Desktop: 'folder' },
    '/home/guest/Desktop': {},
    '/usr': { bin: 'folder', lib: 'folder', share: 'folder', local: 'folder' },
    '/usr/bin': { python3: 'script', node: 'script', gcc: 'script', vim: 'script', nano: 'script' },
    '/usr/lib': { x86_64-linux-gnu: 'folder' },
    '/usr/share': { applications: 'folder', doc: 'folder', locale: 'folder' },
    '/usr/local': { bin: 'folder', lib: 'folder' },
    '/var': { log: 'folder', cache: 'folder', tmp: 'folder', www: 'folder' },
    '/var/log': { syslog: 'file', auth.log: 'file', kern.log: 'file', dpkg.log: 'file' },
    '/var/cache': {},
    '/var/tmp': {},
    '/var/www': { html: 'folder' },
    '/var/www/html': { index.html: 'file' },
    '/lib': { modules: 'folder', x86_64-linux-gnu: 'folder' },
    '/tmp': { session_cache: 'folder' },
    '/tmp/session_cache': {},
    '/root': { .bashrc: 'file', .profile: 'file' },
    '/sbin': { fdisk: 'script', mount: 'script', reboot: 'script' },
    '/dev': { sda: 'block', null: 'char', zero: 'char' }
  };

  // Ensure all paths exist in filesystem object
  function ensurePath(path) {
    if (!filesystem[path]) filesystem[path] = {};
    return filesystem[path];
  }

  let currentFilesPath = '/';

  const icons = {
    folder: '📁', file: '📄', script: '⚙️', block: '💾', char: '🔌'
  };

  function renderFiles() {
    const list = document.getElementById('files-list');
    const pathInput = document.getElementById('files-path');
    pathInput.value = currentFilesPath;
    list.innerHTML = '';

    const dir = filesystem[currentFilesPath] || {};
    const entries = Object.entries(dir);

    if (entries.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'grid-column:1/-1;text-align:center;padding:40px;color:#888;font-size:13px;';
      empty.textContent = 'This folder is empty';
      list.appendChild(empty);
      return;
    }

    // Sort: folders first, then files alphabetically
    entries.sort((a, b) => {
      if (a[1] === 'folder' && b[1] !== 'folder') return -1;
      if (a[1] !== 'folder' && b[1] === 'folder') return 1;
      return a[0].localeCompare(b[0]);
    });

    entries.forEach(([name, type]) => {
      const item = document.createElement('div');
      item.className = 'fs-item';
      item.innerHTML = `<span class="fs-icon">${icons[type] || '📄'}</span><span class="fs-name">${name}</span>`;

      // Double-click to navigate into folders
      if (type === 'folder') {
        item.addEventListener('dblclick', () => {
          currentFilesPath = currentFilesPath === '/' ? '/' + name : currentFilesPath + '/' + name;
          renderFiles();
        });
      }

      list.appendChild(item);
    });
  }

  document.getElementById('files-up').addEventListener('click', () => {
    if (currentFilesPath === '/') return;
    const parts = currentFilesPath.split('/').filter(Boolean);
    parts.pop();
    currentFilesPath = '/' + parts.join('/') || '/';
    renderFiles();
  });

  // ════════════════════════════════════════
  // Notepad App — Tabbed Editor with Persistence
  // ════════════════════════════════════════
  const STORAGE_KEY = 'notepad_tabs_v1';

  function loadTabs() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { return []; }
  }

  function saveTabs(tabs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
  }

  let tabs = loadTabs();
  let activeTabIndex = -1;

  if (tabs.length === 0) {
    tabs.push({ name: 'Untitled', content: '' });
  }
  activeTabIndex = Math.min(activeTabIndex >= 0 ? activeTabIndex : 0, tabs.length - 1);

  function renderTabs() {
    const container = document.getElementById('tabs');
    container.innerHTML = '';

    tabs.forEach((tab, i) => {
      const el = document.createElement('button');
      el.className = 'tab' + (i === activeTabIndex ? ' active' : '');
      el.innerHTML = `<span>${escapeHtml(tab.name)}</span>`;

      if (tabs.length > 1) {
        const closeBtn = document.createElement('button');
        closeBtn.className = 'tab-close';
        closeBtn.textContent = '×';
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          closeTab(i);
        });
        el.appendChild(closeBtn);
      }

      el.addEventListener('click', () => {
        activeTabIndex = i;
        renderTabs();
        document.getElementById('editor').value = tabs[i].content;
      });

      container.appendChild(el);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function closeTab(index) {
    if (tabs.length <= 1) return;
    tabs.splice(index, 1);
    saveTabs(tabs);
    if (activeTabIndex >= tabs.length) activeTabIndex = tabs.length - 1;
    renderTabs();
    document.getElementById('editor').value = tabs[activeTabIndex].content;
  }

  function createNewTab() {
    const num = tabs.length + 1;
    tabs.push({ name: 'Untitled ' + num, content: '' });
    activeTabIndex = tabs.length - 1;
    saveTabs(tabs);
    renderTabs();
    document.getElementById('editor').value = '';
  }

  function syncEditor() {
    if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
      const val = document.getElementById('editor').value;
      tabs[activeTabIndex].content = val;
      saveTabs(tabs);
    }
  }

  // Debounced save
  let saveTimeout;
  function debouncedSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(syncEditor, 300);
  }

  document.getElementById('editor').addEventListener('input', debouncedSave);

  document.getElementById('new-tab').addEventListener('click', createNewTab);

  // ════════════════════════════════════════
  // Window Open / Close Logic
  // ════════════════════════════════════════
  function openWindow(winId, dockBtnId) {
    const win = document.getElementById(winId);
    if (win.style.display === 'none') {
      win.style.display = 'flex';
      win.classList.add('opening');
      setTimeout(() => win.classList.remove('opening'), 200);
      bringToFront(winId);

      // Dock indicator
      const dockBtn = document.getElementById(dockBtnId);
      if (dockBtn) dockBtn.classList.add('active');

      // Init app-specific rendering
      if (winId === 'files-window') renderFiles();
      if (winId === 'notepad-window') {
        renderTabs();
        if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
          document.getElementById('editor').value = tabs[activeTabIndex].content;
        }
      }
    } else {
      bringToFront(winId);
    }
  }

  function closeWindow(winId, dockBtnId) {
    const win = document.getElementById(winId);
    win.style.display = 'none';
    win.classList.remove('focused');

    // Dock indicator
    const dockBtn = document.getElementById(dockBtnId);
    if (dockBtn) dockBtn.classList.remove('active');
  }

  // Launcher buttons
  document.getElementById('open-files').addEventListener('click', () => openWindow('files-window', 'open-files'));
  document.getElementById('open-notepad').addEventListener('click', () => openWindow('notepad-window', 'open-notepad'));

  // Close buttons (class .win-close)
  document.querySelectorAll('.win-close').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const win = btn.closest('.app-window');
      if (!win) return;
      closeWindow(win.id, win.id === 'files-window' ? 'open-files' : 'open-notepad');
    });
  });

  // ════════════════════════════════════════
  // Initialize Drag for all windows
  // ════════════════════════════════════════
  initDrag('files-window');
  initDrag('notepad-window');

})();
</script>
</body>
</html>
