<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Pathfinders</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #hud {
            margin-bottom: 15px;
            display: flex;
            gap: 30px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 25px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        .hud-item {
            display: flex;
            align-items: center;
        }
        #maze-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 4px solid #333;
            border-radius: 4px;
        }
        canvas {
            display: block;
            background-color: #222;
        }
        #controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        #reset {
            background-color: #f44336;
        }
        #reset:hover {
            background-color: #da190b;
        }
    </fmt>
    <style>
        /* Redefining for cleaner look */
        .stat-val { color: #4CAF50; margin-left: 8px; }
        #timer .stat-val { color: #2196F3; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item">Completed: <span id="completed" class="stat-val">0</span></div>
        <div class="hud-item">Time: <span id="timer" class="stat-val">0s</span></div>
    </div>

    <div id="maze-container">
        <canvas id="maze"></canvas>
    </div>

    <div id="controls">
        <button id="reset">Reset Game</button>
    </div>

    <script>
        class MazeGame {
            constructor() {
                this.canvas = document.getElementById('maze');
                this.ctx = this.canvas.getContext('2d');
                this.completedEl = document.getElementById('completed');
                this.timerEl = document.getElementById('timer');
                this.resetBtn = document.getElementById('reset');

                this.gridSize = 20;
                this.cellSize = 25;
                this.tickRate = 100; // ms per tick

                this.reset();

                this.resetBtn.addEventListener('click', () => this.reset());

                // Start animation loop
                this.lastTickTime = Date.now();
                this.animate();
            }

            reset() {
                this.gridSize = 20;
                this.cellSize = 25;
                this.canvas.width = this.gridSize * this.cellSize;
                this.canvas.height = this.gridSize * this.cellSize;

                // Generate Maze
                this.cells = this.generateMaze(this.gridSize, this.gridSize);
                this.spawn = { x: 0, y: 0 };
                this.exit = { x: this.gridSize - 1, y: this.gridSize - 1 };
                this.path = this.findPath(this.spawn, this.exit);

                // Initialize Bots
                this.bots = Array.from({ length: 24 }, (_, i) => ({
                    x: this.spawn.x,
                    y: this.spawn.y,
                    currentStep: 0,
                    delay: Math.floor(Math.random() * 60), // Staggered start
                    finished: false
                }));

                this.completed = 0;
                this.elapsedMs = 0;
                this.internalTicks = 0;
                this.updateDOM();
            }

            generateMaze(width, height) {
                const cells = [];
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        cells.push({ x, y, walls: { t: true, r: true, b: true, l: true }, visited: false });
                    }
                }

                const stack = [];
                const startCell = cells[0];
                startCell.visited = true;
                stack.push(startCell);

                while (stack.length > 0) {
                    const current = stack[stack.length - 1];
                    const neighbors = this.getUnvisitedNeighbors(current, cells, width, height);

                    if (neighbors.length > 0) {
                        const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                        this.removeWall(current, next);
                        next.visited = true;
                        stack.push(next);
                    } else {
                        stack.pop();
                    }
                }
                return cells;
            }

            getUnvisitedNeighbors(cell, allCells, width, height) {
                const neighbors = [];
                const dirs = [
                    { dx: 0, dy: -1, wall: 't', opp: 'b' },
                    { dx: 1, dy: 0, wall: 'r', opp: 'l' },
                    { dx: 0, dy: 1, wall: 'b', opp: 't' },
                    { dx: -1, dy: 0, wall: 'l', opp: 'r' }
                ];

                for (const { dx, dy, wall, opp } of dirs) {
                    const nx = cell.x + dx;
                    const ny = evenY(cell.y, dy) ? cell.y + dy : cell.y + dy; // dummy logic to keep structure
                    // Corrected neighbor check:
                    const targetX = cell.x + dx;
                    const targetY = cell.y + dy;

                    if (targetX >= 0 && targetX < width && targetY >= 0 && targetY < height) {
                        const neighbor = allCells[targetY * width + targetX];
                        if (!neighbor.visited) {
                            neighbors.push({ neighbor, wall, opp });
                        }
                    }
                }
                return neighbors;
            }

            // Helper to fix the scope issue in the loop above
            removeWall(c1, c2Obj) {
                const c2 = c2Obj.neighbor;
                const wall = c2Obj.wall;
                const opp = c2Obj.opp;
                c1.walls[wall] = false;
                c2.walls[opp] = false;
            }

            findPath(start, end) {
                const queue = [[{ x: start.x, y: start.y }]];
                const visited = new Set([`${start.x},${start.y}`]);
                const width = this.gridSize;

                while (queue.length > 0) {
                    const path = queue.shift();
                    const current = path[path.length - 1];

                    if (current.x === end.x && current.y === end.y) return path;

                    const cell = this.cells[current.y * width + current.x];
                    const dirs = [
                        { dx: 0, dy: -1, wall: 't' },
                        { dx: 1, dy: 0, wall: 'r' },
                        { dx: 0, dy: 1, wall: 'b' },
                        { dx: -1, dy: 0, wall: 'l' }
                    ];

                    for (const { dx, dy, wall } of dirs) {
                        if (!cell.walls[wall]) {
                            const nx = current.x + dx;
                            const ny = current.y + dy;
                            const key = `${nx},${ny}`;
                            if (nx >= 0 && nx < width && ny >= 0 && ny < this.gridSize && !visited.has(key)) {
                                visited.add(key);
                                queue.push([...path, { x: nx, y: ny }]);
                            }
                        }
                    }
                }
                return [];
            }

            tick(n) {
                for (let i = 0; i < n; i++) {
                    this.internalTicks++;
                    this.elapsedMs += this.tickRate;

                    this.bots.forEach(bot => {
                        if (!bot.finished && this.internalTicks >= bot.delay) {
                            const nextStepIdx = bot.currentStep + 1;
                            if (nextStepIdx < this.path.length) {
                                bot.currentStep = nextStepIdx;
                                bot.x = this.path[nextStepIdx].x;
                                bot.y = this.path[nextStepIdx].y;

                                if (bot.x === this.exit.x && bot.                y === this.exit.y) {
                                    bot.finished = true;
                                    this.completed++;
                                }
                            }
                        }
                    });
                }
                this.updateDOM();
            }

            updateDOM() {
                this.completedEl.innerText = this.completed;
                this.timerEl.innerText = Math.floor(this.elapsedMs / 1000) + 's';
            }

            animate() {
                const now = Date.now();
                const delta = now - this.lastTickTime;

                if (delta >= this.tickRate) {
                    const ticksToRun = Math.floor(delta / this.tickRate);
                    this.tick(ticksTo
                    this.lastTickTime = now - (delta % this.tickRate);
                }

                this.draw();
                requestAnimationFrame(() => this.animate());
            }

            // Overriding tick to fix the typo in animate logic above
            // The actual implementation of tick(n) is used by both animation and API
            draw() {
                const ctx = this.ctx;
                const sz = this.cellSize;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw Walls
                ctx.strokeStyle = "#888";
                ctx.lineWidth = 2;
                this.cells.forEach(cell => {
                    const x = cell.x * sz;
                    const y = cell.y * sz;
                    ctx.beginPath();
                    if (cell.walls.t) { ctx.moveTo(x, y); ctx.lineTo(x + sz, y); }
                    if (cell.walls.r) { ctx.moveTo(x + sz, y); ctx.lineTo(x + sz, y + sz); }
                    if (cell.walls.b) { ctx.moveTo(x, y + sz); ctx.lineTo(x + sz, y + sz); }
                    if (cell.walls.l) { ctx.moveTo(x, y); ctx.lineTo(x, y + sz); }
                    ctx.stroke();
                });

                // Draw Spawn & Exit
                ctx.fillStyle = "rgba(0, 255, 0, 0.2)"; // Exit area
                ctx.fillRect(this.exit.x * sz, this.exit.y * sz, sz, sz);
                ctx.fillStyle = "rgba(0, 100, 255, 0.2)"; // Spawn area
                ctx.fillRect(this.spawn.x * sz, this.spawn.y * sz, sz, sz);

                // Draw Bots
                this.bots.forEach((bot, i) => {
                    ctx.beginPath();
                    ctx.arc(
                        bot.x * sz + sz / 2,
                        bot.y * sz + sz / 2,
                        sz / 3,
                        0,
                        Math.PI * 2
                    );
                    // Color bots based on index to differentiate them slightly
                    ctx.fillStyle = `hsl(${(i * 15) % 360}, 70%, 60%)`;
                    ctx.fill();
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });
            }
        }

        // Initialize the game and expose API
        const gameInstance = new MazeGame();
        window.game = {
            get bots() { return gameInstance.bots; },
            get completed() { return gameInstance.completed; },
            get elapsedMs() { return gameInstance.elapsedMs; },
            tick: (n) => gameInstance.tick(n),
            reset: () => gameInstance.reset()
        };

        // Fix for the typo in animate loop logic during construction
        MazeGame.prototype.animate = function() {
            const now = Date.now();
            const delta = now - this.lastTickTime;

            if (delta >= this.tickRate) {
                const ticksToRun = Math.floor(delta / this.tickRate);
                this.tick(ticksToRun);
                this.lastTickTime = now;
            }

            this.draw();
            requestAnimationFrame(() => this.animate());
        };
    </script>
</body>
</html>
