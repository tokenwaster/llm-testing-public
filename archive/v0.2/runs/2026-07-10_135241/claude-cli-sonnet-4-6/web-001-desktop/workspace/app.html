<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', sans-serif;
    background: #1a1a2e;
    user-select: none;
  }

  #desktop {
    position: relative;
    width: 100vw; height: 100vh;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(120,40,200,0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(40,80,200,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(200,60,120,0.2) 0%, transparent 50%),
      linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 40%, #0a1628 100%);
    overflow: hidden;
  }

  /* Subtle grid overlay */
  #desktop::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    background: rgba(15,15,25,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px; z-index: 1000; color: rgba(255,255,255,0.85);
    font-size: 12px; font-weight: 500;
  }
  #topbar-left { display: flex; align-items: center; gap: 16px; }
  #topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-dot { width: 6px; height: 6px; border-radius: 50%; background: #e95420; }
  #topbar-time { font-size: 12px; color: rgba(255,255,255,0.8); }

  /* Taskbar/Dock */
  #taskbar {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(15,15,25,0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 8px 16px;
    display: flex; align-items: center; gap: 10px;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
  }

  .dock-btn {
    width: 52px; height: 52px; border-radius: 12px;
    border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 10px; font-weight: 500;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
  }
  .dock-btn:hover { transform: translateY(-6px) scale(1.08); }
  .dock-btn:active { transform: translateY(-3px) scale(1.04); }
  .dock-btn svg { width: 28px; height: 28px; }

  #open-files {
    background: linear-gradient(135deg, #2d7dd2, #1a5fa8);
    color: rgba(255,255,255,0.9);
    box-shadow: 0 4px 16px rgba(45,125,210,0.4);
  }
  #open-notepad {
    background: linear-gradient(135deg, #e8a020, #c07010);
    color: rgba(255,255,255,0.9);
    box-shadow: 0 4px 16px rgba(232,160,32,0.4);
  }

  /* Windows */
  .window {
    position: absolute;
    min-width: 360px; min-height: 240px;
    background: #1e1e2e;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04) inset;
    display: flex; flex-direction: column;
    z-index: 100;
    overflow: hidden;
    resize: both;
  }
  .window.hidden { display: none !important; }

  .win-titlebar {
    height: 36px; min-height: 36px;
    background: linear-gradient(180deg, #2a2a3e, #252535);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; padding: 0 12px;
    gap: 8px; cursor: move; flex-shrink: 0;
  }
  .win-dots { display: flex; gap: 6px; }
  .win-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.2);
    cursor: pointer; transition: filter 0.1s;
  }
  .win-dot:hover { filter: brightness(1.3); }
  .win-dot.red { background: #ff5f57; }
  .win-dot.yellow { background: #febc2e; }
  .win-dot.green { background: #28c840; }
  .win-close { background: #ff5f57; border: 1px solid rgba(0,0,0,0.2); }
  .win-title {
    flex: 1; text-align: center; font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.7); pointer-events: none;
  }
  .win-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* Files Window */
  #files-window { width: 600px; height: 420px; top: 80px; left: 80px; }

  #files-toolbar {
    height: 40px; min-height: 40px;
    background: #252535;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0;
  }
  #files-up {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  #files-up:hover { background: rgba(255,255,255,0.12); }
  #files-path {
    flex: 1; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    color: rgba(255,255,255,0.85); font-size: 13px; padding: 4px 10px;
    font-family: 'Ubuntu Mono', monospace;
  }

  #files-content {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px;
  }
  #files-content::-webkit-scrollbar { width: 6px; }
  #files-content::-webkit-scrollbar-track { background: transparent; }
  #files-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .fs-item {
    width: 80px; height: 80px; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; padding: 8px 4px;
    transition: background 0.12s;
    color: rgba(255,255,255,0.85); font-size: 11px; text-align: center;
    word-break: break-all;
  }
  .fs-item:hover { background: rgba(255,255,255,0.07); }
  .fs-item.selected { background: rgba(45,125,210,0.3); }
  .fs-item svg { width: 36px; height: 36px; flex-shrink: 0; }

  /* Notepad Window */
  #notepad-window { width: 620px; height: 460px; top: 100px; left: 200px; }

  #tabs-bar {
    background: #252535;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: stretch; flex-shrink: 0;
    min-height: 36px; overflow-x: auto;
  }
  #tabs-bar::-webkit-scrollbar { height: 3px; }
  #tabs-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

  #tabs { display: flex; align-items: stretch; flex: 1; }

  .tab {
    padding: 0 14px; min-width: 100px; max-width: 160px;
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.5); cursor: pointer;
    border-right: 1px solid rgba(255,255,255,0.06);
    transition: background 0.1s, color 0.1s;
    white-space: nowrap; overflow: hidden;
    position: relative;
  }
  .tab:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.75); }
  .tab.active {
    background: #1e1e2e; color: rgba(255,255,255,0.9);
    border-bottom: 2px solid #e95420;
  }
  .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .tab-close {
    width: 16px; height: 16px; border-radius: 50%; border: none;
    background: transparent; color: rgba(255,255,255,0.4); cursor: pointer;
    font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.1s, color 0.1s;
  }
  .tab-close:hover { background: rgba(255,0,0,0.3); color: #fff; }

  #new-tab {
    width: 32px; min-width: 32px; border: none; background: transparent;
    color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0;
  }
  #new-tab:hover { color: #fff; background: rgba(255,255,255,0.06); }

  #editor {
    flex: 1; background: #1e1e2e; border: none; outline: none; resize: none;
    color: rgba(255,255,255,0.85); font-family: 'Ubuntu Mono', 'Courier New', monospace;
    font-size: 13px; line-height: 1.6; padding: 12px 16px;
    caret-color: #e95420;
  }
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  /* Status bar */
  #notepad-statusbar {
    height: 24px; min-height: 24px;
    background: #e95420; display: flex; align-items: center; padding: 0 12px;
    font-size: 11px; color: rgba(255,255,255,0.9); gap: 12px; flex-shrink: 0;
  }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="desktop">

  <!-- Top bar -->
  <div id="topbar">
    <div id="topbar-left">
      <div class="topbar-dot"></div>
      <span>Activities</span>
    </div>
    <div id="topbar-right">
      <span id="topbar-time"></span>
    </div>
  </div>

  <!-- Files Window -->
  <div class="window" id="files-window">
    <div class="win-titlebar" data-win="files-window">
      <div class="win-dots">
        <div class="win-dot red win-close" data-win="files-window"></div>
        <div class="win-dot yellow"></div>
        <div class="win-dot green"></div>
      </div>
      <div class="win-title">Files</div>
      <div style="width:48px"></div>
    </div>
    <div class="win-body">
      <div id="files-toolbar">
        <button id="files-up" title="Go up">&#8593;</button>
        <div id="files-path">/</div>
      </div>
      <div id="files-content"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div class="window hidden" id="notepad-window">
    <div class="win-titlebar" data-win="notepad-window">
      <div class="win-dots">
        <div class="win-dot red win-close" data-win="notepad-window"></div>
        <div class="win-dot yellow"></div>
        <div class="win-dot green"></div>
      </div>
      <div class="win-title">Notepad</div>
      <div style="width:48px"></div>
    </div>
    <div class="win-body">
      <div id="tabs-bar">
        <div id="tabs"></div>
        <button id="new-tab" title="New tab">+</button>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Start typing…"></textarea>
      <div id="notepad-statusbar">
        <span id="editor-pos">Ln 1, Col 1</span>
        <span>UTF-8</span>
        <span>Plain Text</span>
      </div>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button class="dock-btn" id="open-files" title="Files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)"/>
      </svg>
      Files
    </button>
    <button class="dock-btn" id="open-notepad" title="Notepad">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="4" y="2" width="16" height="20" rx="2" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)"/>
        <line x1="8" y1="8" x2="16" y2="8" stroke="rgba(255,255,255,0.7)"/>
        <line x1="8" y1="12" x2="16" y2="12" stroke="rgba(255,255,255,0.7)"/>
        <line x1="8" y1="16" x2="12" y2="16" stroke="rgba(255,255,255,0.7)"/>
      </svg>
      Notepad
    </button>
  </div>

</div>

<script>
// ── Clock ─────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('topbar-time').textContent =
    now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) +
    '  ' + now.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
}
updateClock();
setInterval(updateClock, 10000);

// ── Filesystem ────────────────────────────────────────────────────────
const FS = {
  '/': { type:'dir', children: ['bin','etc','home','usr','var','tmp','opt'] },
  '/bin': { type:'dir', children: ['bash','ls','cp','mv','rm','cat','echo','grep','find','chmod'] },
  '/etc': { type:'dir', children: ['passwd','hosts','fstab','hostname','resolv.conf','apt','ssh','cron.d'] },
  '/etc/apt': { type:'dir', children: ['sources.list','trusted.gpg'] },
  '/etc/ssh': { type:'dir', children: ['sshd_config','ssh_config','known_hosts'] },
  '/home': { type:'dir', children: ['user'] },
  '/home/user': { type:'dir', children: ['Documents','Downloads','Pictures','Music','Videos','Desktop','.bashrc','.profile'] },
  '/home/user/Documents': { type:'dir', children: ['notes.txt','resume.pdf','project-plan.md','taxes-2025.pdf'] },
  '/home/user/Downloads': { type:'dir', children: ['ubuntu-24.04.iso','package.deb','archive.tar.gz','readme.txt'] },
  '/home/user/Pictures': { type:'dir', children: ['wallpaper.png','screenshot.png','vacation','memes'] },
  '/home/user/Pictures/vacation': { type:'dir', children: ['beach.jpg','sunset.jpg','food.jpg'] },
  '/home/user/Pictures/memes': { type:'dir', children: ['linux_meme.png','coding.gif'] },
  '/home/user/Music': { type:'dir', children: ['playlist.m3u','favorites'] },
  '/home/user/Music/favorites': { type:'dir', children: ['track01.mp3','track02.mp3','track03.flac'] },
  '/home/user/Videos': { type:'dir', children: ['tutorial.mp4','recording.mkv'] },
  '/home/user/Desktop': { type:'dir', children: ['shortcuts.txt'] },
  '/usr': { type:'dir', children: ['bin','lib','local','share','include'] },
  '/usr/bin': { type:'dir', children: ['python3','node','npm','git','vim','nano','curl','wget'] },
  '/usr/lib': { type:'dir', children: ['systemd','python3','x86_64-linux-gnu'] },
  '/usr/local': { type:'dir', children: ['bin','lib','share'] },
  '/usr/share': { type:'dir', children: ['doc','man','icons','fonts'] },
  '/var': { type:'dir', children: ['log','cache','tmp','lib','run'] },
  '/var/log': { type:'dir', children: ['syslog','auth.log','kern.log','dpkg.log','apt'] },
  '/var/cache': { type:'dir', children: ['apt','fontconfig'] },
  '/tmp': { type:'dir', children: ['.X11-unix','tmux-1000'] },
  '/opt': { type:'dir', children: ['google','brave'] },
};

function isDir(path) {
  return FS[path] && FS[path].type === 'dir';
}

function getEntries(path) {
  if (!FS[path] || !FS[path].children) return [];
  return FS[path].children;
}

function joinPath(base, name) {
  if (base === '/') return '/' + name;
  return base + '/' + name;
}

function parentPath(path) {
  if (path === '/') return '/';
  const parts = path.split('/');
  parts.pop();
  return parts.join('/') || '/';
}

// SVG icons
function folderIcon(color='#2d7dd2') {
  return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" fill="${color}" stroke="${color}" stroke-width="0.5"/>
  </svg>`;
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const colors = {
    txt:'#aaa', md:'#6af', pdf:'#e55', iso:'#c8a', deb:'#a8c',
    gz:'#fa8', tar:'#fa8', mp3:'#8fa', flac:'#8fa', mp4:'#f8a',
    mkv:'#f8a', png:'#8cf', jpg:'#8cf', gif:'#8cf', sh:'#8f8',
    conf:'#fc8', log:'#aaa', list:'#aaa',
  };
  const col = colors[ext] || '#8899aa';
  return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 2h9l4 4v16a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z" fill="${col}22" stroke="${col}" stroke-width="1.2"/>
    <polyline points="14,2 14,6 18,6" stroke="${col}" stroke-width="1.2" fill="none"/>
    <text x="12" y="16" text-anchor="middle" font-size="5" fill="${col}" font-family="monospace">${ext.toUpperCase().slice(0,4)}</text>
  </svg>`;
}

function hiddenFileIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 2h9l4 4v16a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z" fill="#44445522" stroke="#666" stroke-width="1.2" stroke-dasharray="2 1"/>
  </svg>`;
}

// Files state
let currentPath = '/';
let lastClick = { name: null, time: 0 };

function renderFiles() {
  const content = document.getElementById('files-content');
  document.getElementById('files-path').textContent = currentPath;
  content.innerHTML = '';

  const entries = getEntries(currentPath);
  entries.forEach(name => {
    const fullPath = joinPath(currentPath, name);
    const dir = isDir(fullPath);
    const hidden = name.startsWith('.');

    const item = document.createElement('div');
    item.className = 'fs-item';
    item.dataset.name = name;
    item.dataset.fullpath = fullPath;
    item.dataset.isdir = dir ? '1' : '0';

    let icon;
    if (dir) {
      const folderColors = {
        Documents:'#2d7dd2', Downloads:'#e8a020', Pictures:'#28c840',
        Music:'#9b59b6', Videos:'#e74c3c', Desktop:'#1abc9c',
        home:'#e8a020', usr:'#3498db', bin:'#e74c3c', etc:'#e67e22',
        var:'#8e44ad', tmp:'#7f8c8d', opt:'#2ecc71', lib:'#1abc9c',
        local:'#3498db', share:'#e8a020', log:'#c0392b', cache:'#7f8c8d',
        user:'#f39c12',
      };
      icon = folderIcon(folderColors[name] || '#4a90d9');
    } else if (hidden) {
      icon = hiddenFileIcon();
    } else {
      icon = fileIcon(name);
    }

    item.innerHTML = icon + `<span>${name}</span>`;
    item.addEventListener('click', () => {
      document.querySelectorAll('.fs-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      const now = Date.now();
      if (lastClick.name === name && now - lastClick.time < 500 && dir) {
        currentPath = fullPath;
        renderFiles();
      }
      lastClick = { name, time: now };
    });

    content.appendChild(item);
  });
}

document.getElementById('files-up').addEventListener('click', () => {
  currentPath = parentPath(currentPath);
  renderFiles();
});

renderFiles();

// ── Notepad / localStorage ────────────────────────────────────────────
const LS_KEY = 'desktop_notepad_v1';

function loadNotepadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { tabs: [{id: 1, name: 'Untitled 1', content: ''}], activeId: 1, nextId: 2 };
}

function saveNotepadState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(notepadState));
  } catch(e) {}
}

let notepadState = loadNotepadState();

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  notepadState.tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === notepadState.activeId ? ' active' : '');
    el.dataset.id = tab.id;
    el.innerHTML = `<span class="tab-name">${escHtml(tab.name)}</span><button class="tab-close" data-id="${tab.id}" title="Close tab">×</button>`;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) return;
      switchTab(tab.id);
    });
    tabsEl.appendChild(el);
  });

  // Close buttons
  tabsEl.querySelectorAll('.tab-close').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeTab(parseInt(btn.dataset.id));
    });
  });

  // Update editor
  const active = notepadState.tabs.find(t => t.id === notepadState.activeId);
  const editor = document.getElementById('editor');
  if (active) {
    editor.value = active.content;
  } else {
    editor.value = '';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchTab(id) {
  // Save current content
  const cur = notepadState.tabs.find(t => t.id === notepadState.activeId);
  if (cur) cur.content = document.getElementById('editor').value;
  notepadState.activeId = id;
  saveNotepadState();
  renderTabs();
}

function closeTab(id) {
  if (notepadState.tabs.length === 1) {
    // Reset to empty instead of closing last tab
    notepadState.tabs[0].content = '';
    notepadState.tabs[0].name = 'Untitled 1';
    notepadState.activeId = notepadState.tabs[0].id;
    saveNotepadState();
    renderTabs();
    return;
  }
  const idx = notepadState.tabs.findIndex(t => t.id === id);
  notepadState.tabs.splice(idx, 1);
  if (notepadState.activeId === id) {
    const newIdx = Math.min(idx, notepadState.tabs.length - 1);
    notepadState.activeId = notepadState.tabs[newIdx].id;
  }
  saveNotepadState();
  renderTabs();
}

document.getElementById('new-tab').addEventListener('click', () => {
  // Save current
  const cur = notepadState.tabs.find(t => t.id === notepadState.activeId);
  if (cur) cur.content = document.getElementById('editor').value;

  const id = notepadState.nextId++;
  notepadState.tabs.push({ id, name: `Untitled ${id}`, content: '' });
  notepadState.activeId = id;
  saveNotepadState();
  renderTabs();
  document.getElementById('editor').focus();
});

document.getElementById('editor').addEventListener('input', (e) => {
  const cur = notepadState.tabs.find(t => t.id === notepadState.activeId);
  if (cur) {
    cur.content = e.target.value;
    // Update tab name from first line
    const firstLine = cur.content.split('\n')[0].trim();
    if (firstLine) {
      cur.name = firstLine.length > 20 ? firstLine.slice(0, 20) + '…' : firstLine;
    } else {
      cur.name = `Untitled ${cur.id}`;
    }
    saveNotepadState();
    renderTabs();
  }
});

// Editor cursor position
document.getElementById('editor').addEventListener('keyup', updateEditorPos);
document.getElementById('editor').addEventListener('click', updateEditorPos);
function updateEditorPos() {
  const ed = document.getElementById('editor');
  const text = ed.value.substring(0, ed.selectionStart);
  const lines = text.split('\n');
  const ln = lines.length;
  const col = lines[lines.length - 1].length + 1;
  document.getElementById('editor-pos').textContent = `Ln ${ln}, Col ${col}`;
}

renderTabs();

// ── Window Management ─────────────────────────────────────────────────
function showWindow(id) {
  const win = document.getElementById(id);
  win.classList.remove('hidden');
  bringToFront(win);
}

function hideWindow(id) {
  document.getElementById(id).classList.add('hidden');
}

function bringToFront(win) {
  let maxZ = 100;
  document.querySelectorAll('.window').forEach(w => {
    const z = parseInt(w.style.zIndex) || 100;
    if (z > maxZ) maxZ = z;
  });
  win.style.zIndex = maxZ + 1;
}

// Launcher buttons
document.getElementById('open-files').addEventListener('click', () => showWindow('files-window'));
document.getElementById('open-notepad').addEventListener('click', () => {
  showWindow('notepad-window');
  renderTabs();
  setTimeout(() => document.getElementById('editor').focus(), 50);
});

// Close buttons
document.querySelectorAll('.win-close').forEach(btn => {
  btn.addEventListener('click', () => {
    hideWindow(btn.dataset.win);
  });
});

// Click on window brings to front
document.querySelectorAll('.window').forEach(win => {
  win.addEventListener('mousedown', () => bringToFront(win));
});

// ── Dragging ──────────────────────────────────────────────────────────
let drag = null;

document.querySelectorAll('.win-titlebar').forEach(tb => {
  tb.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('win-dot')) return;
    const win = document.getElementById(tb.dataset.win);
    const rect = win.getBoundingClientRect();
    drag = {
      win,
      dx: e.clientX - rect.left,
      dy: e.clientY - rect.top,
    };
    bringToFront(win);
    e.preventDefault();
  });
});

document.addEventListener('mousemove', (e) => {
  if (!drag) return;
  const x = e.clientX - drag.dx;
  const y = e.clientY - drag.dy;
  drag.win.style.left = Math.max(0, x) + 'px';
  drag.win.style.top = Math.max(28, y) + 'px';
  drag.win.style.right = 'auto';
  drag.win.style.bottom = 'auto';
});

document.addEventListener('mouseup', () => { drag = null; });

// ── Initial state ─────────────────────────────────────────────────────
// Files window shown by default, notepad hidden
// (files-window is already visible, notepad-window has class "hidden")
</script>
