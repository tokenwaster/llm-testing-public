<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Environment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Ubuntu, 'Droid Sans', sans-serif;
            overflow: hidden;
        }

        #desktop {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2d3436 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
        }

        #taskbar {
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            position: relative;
            z-index: 100;
        }

        .launcher {
            height: 40px;
            padding: 0 16px;
            background: linear-gradient(180deg, #e95420 0%, #dd4814 100%);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .launcher:hover {
            background: linear-gradient(180deg, #f26430 0%, #e95420 100%);
            box-shadow: 0 4px 8px rgba(233, 84, 32, 0.3);
        }

        .launcher:active {
            transform: scale(0.98);
        }

        .window {
            position: absolute;
            background: #2d2d2d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            min-width: 360px;
            min-height: 240px;
            z-index: 10;
        }

        .window.hidden {
            display: none;
        }

        .window-header {
            background: linear-gradient(180deg, #3d3d3d 0%, #2d2d2d 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
            border-radius: 6px 6px 0 0;
        }

        .window-title {
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        .win-close {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .win-close:hover {
            background: rgba(255, 67, 54, 0.8);
        }

        .window-content {
            flex: 1;
            overflow: auto;
            padding: 16px;
            color: white;
        }

        #files-window {
            width: 600px;
            height: 400px;
            left: 50px;
            top: 100px;
        }

        #files-path {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            font-family: 'Ubuntu Mono', monospace;
            color: #888;
        }

        #files-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fs-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
            font-size: 13px;
        }

        .fs-item:hover {
            background: rgba(233, 84, 32, 0.3);
        }

        .fs-item.folder::before {
            content: '📁 ';
        }

        .fs-item.file::before {
            content: '📄 ';
        }

        #files-up {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: rgba(233, 84, 32, 0.2);
            border: none;
            color: #e95420;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        #files-up:hover {
            background: rgba(233, 84, 32, 0.4);
        }

        #files-up:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #notepad-window {
            width: 700px;
            height: 500px;
            right: 50px;
            top: 100px;
        }

        #tabs {
            display: flex;
            gap: 4px;
            padding: 8px;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px 4px 0 0;
            color: white;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tab.active {
            background: #3d3d3d;
            border-color: rgba(233, 84, 32, 0.5);
        }

        .tab-close {
            width: 16px;
            height: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .tab-close:hover {
            color: white;
        }

        #editor {
            flex: 1;
            background: #1a1a1a;
            color: #d0d0d0;
            border: none;
            padding: 12px;
            font-family: 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        #new-tab {
            padding: 6px 12px;
            background: linear-gradient(180deg, #e95420 0%, #dd4814 100%);
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #new-tab:hover {
            background: linear-gradient(180deg, #f26430 0%, #e95420 100%);
        }

        .notepad-controls {
            display: flex;
            align-items: center;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="desktop">
        <div id="taskbar">
            <button class="launcher" id="open-files">📁 Files</button>
            <button class="launcher" id="open-notepad">📝 Notepad</button>
        </div>

        <div id="files-window" class="window hidden">
            <div class="window-header">
                <div class="window-title">File Manager</div>
                <button class="win-close">×</button>
            </div>
            <div class="window-content">
                <button id="files-up">← Up</button>
                <div id="files-path">/</div>
                <div id="files-list"></div>
            </div>
        </div>

        <div id="notepad-window" class="window hidden">
            <div class="window-header">
                <div class="window-title">Notepad</div>
                <button class="win-close">×</button>
            </div>
            <div class="notepad-controls">
                <div id="tabs"></div>
                <button id="new-tab">+ New</button>
            </div>
            <textarea id="editor" placeholder="Start typing..."></textarea>
        </div>
    </div>

    <script>
        const filesystem = {
            '/': {
                type: 'folder',
                children: {
                    'bin': { type: 'folder', children: {} },
                    'etc': { type: 'folder', children: {} },
                    'home': {
                        type: 'folder',
                        children: {
                            'user': {
                                type: 'folder',
                                children: {
                                    'Documents': { type: 'folder', children: {} },
                                    'Downloads': { type: 'folder', children: {} },
                                    'Pictures': { type: 'folder', children: {} },
                                    'README.txt': { type: 'file' },
                                }
                            }
                        }
                    },
                    'usr': { type: 'folder', children: {} },
                    'var': { type: 'folder', children: {} },
                }
            }
        };

        let currentPath = '/';
        let notepadTabs = [];
        let activeTab = null;

        function init() {
            initFilesApp();
            initNotepadApp();
            setupWindowDragging();
        }

        function initFilesApp() {
            const openFilesBtn = document.getElementById('open-files');
            const filesWindow = document.getElementById('files-window');
            const filesUp = document.getElementById('files-up');

            openFilesBtn.addEventListener('click', () => {
                filesWindow.classList.remove('hidden');
                bringToFront(filesWindow);
                renderFilesApp();
            });

            filesWindow.querySelector('.win-close').addEventListener('click', () => {
                filesWindow.classList.add('hidden');
            });

            filesUp.addEventListener('click', navigateUp);
            renderFilesApp();
        }

        function renderFilesApp() {
            const pathEl = document.getElementById('files-path');
            const listEl = document.getElementById('files-list');
            const filesUp = document.getElementById('files-up');

            pathEl.textContent = currentPath;
            listEl.innerHTML = '';

            const node = getNodeAtPath(currentPath);
            if (!node || node.type !== 'folder') return;

            const entries = Object.entries(node.children);
            entries.sort((a, b) => {
                if (a[1].type !== b[1].type) return a[1].type === 'folder' ? -1 : 1;
                return a[0].localeCompare(b[0]);
            });

            entries.forEach(([name, entry]) => {
                const item = document.createElement('div');
                item.className = `fs-item ${entry.type}`;
                item.textContent = name;

                if (entry.type === 'folder') {
                    item.addEventListener('dblclick', () => {
                        currentPath = (currentPath === '/' ? '' : currentPath) + '/' + name;
                        renderFilesApp();
                    });
                }

                listEl.appendChild(item);
            });

            filesUp.disabled = currentPath === '/';
        }

        function navigateUp() {
            if (currentPath === '/') return;
            currentPath = currentPath.split('/').slice(0, -1).join('/') || '/';
            renderFilesApp();
        }

        function getNodeAtPath(path) {
            if (path === '/') return filesystem['/'];
            const parts = path.split('/').filter(Boolean);
            let node = filesystem['/'];
            for (const part of parts) {
                if (node.type !== 'folder' || !node.children[part]) return null;
                node = node.children[part];
            }
            return node;
        }

        function initNotepadApp() {
            const openNotepadBtn = document.getElementById('open-notepad');
            const notepadWindow = document.getElementById('notepad-window');
            const newTabBtn = document.getElementById('new-tab');
            const editor = document.getElementById('editor');

            loadNotepadFromStorage();

            openNotepadBtn.addEventListener('click', () => {
                notepadWindow.classList.remove('hidden');
                bringToFront(notepadWindow);
                if (notepadTabs.length === 0) {
                    createNewTab();
                } else {
                    renderTabs();
                    if (activeTab !== null && notepadTabs[activeTab]) {
                        editor.value = notepadTabs[activeTab].content;
                    }
                }
            });

            notepadWindow.querySelector('.win-close').addEventListener('click', () => {
                saveNotepadToStorage();
                notepadWindow.classList.add('hidden');
            });

            newTabBtn.addEventListener('click', createNewTab);

            editor.addEventListener('input', () => {
                if (activeTab !== null && notepadTabs[activeTab]) {
                    notepadTabs[activeTab].content = editor.value;
                    saveNotepadToStorage();
                }
            });

            if (notepadTabs.length === 0) {
                createNewTab();
            }
        }

        function createNewTab() {
            const newTab = {
                id: Date.now(),
                name: `Tab ${notepadTabs.length + 1}`,
                content: ''
            };
            notepadTabs.push(newTab);
            activeTab = notepadTabs.length - 1;
            renderTabs();
            document.getElementById('editor').value = '';
            saveNotepadToStorage();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            const editor = document.getElementById('editor');
            tabsContainer.innerHTML = '';

            notepadTabs.forEach((tab, index) => {
                const tabEl = document.createElement('div');
                tabEl.className = 'tab';
                if (index === activeTab) tabEl.classList.add('active');

                const name = document.createElement('span');
                name.textContent = tab.name;
                tabEl.appendChild(name);

                const closeBtn = document.createElement('button');
                closeBtn.className = 'tab-close';
                closeBtn.textContent = '×';
                closeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    notepadTabs.splice(index, 1);
                    if (activeTab >= notepadTabs.length) {
                        activeTab = Math.max(0, notepadTabs.length - 1);
                    }
                    if (notepadTabs.length === 0) {
                        createNewTab();
                    } else {
                        renderTabs();
                        if (activeTab !== null) {
                            editor.value = notepadTabs[activeTab].content;
                        }
                    }
                    saveNotepadToStorage();
                });
                tabEl.appendChild(closeBtn);

                tabEl.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('tab-close')) {
                        activeTab = index;
                        renderTabs();
                        editor.value = tab.content;
                    }
                });

                tabsContainer.appendChild(tabEl);
            });
        }

        function saveNotepadToStorage() {
            localStorage.setItem('notepad-tabs', JSON.stringify(notepadTabs));
            localStorage.setItem('notepad-active', activeTab);
        }

        function loadNotepadFromStorage() {
            const saved = localStorage.getItem('notepad-tabs');
            const savedActive = localStorage.getItem('notepad-active');
            if (saved) {
                notepadTabs = JSON.parse(saved);
                activeTab = savedActive ? parseInt(savedActive) : 0;
            }
        }

        function bringToFront(el) {
            const windows = document.querySelectorAll('.window');
            let maxZ = 10;
            windows.forEach(w => {
                const z = parseInt(window.getComputedStyle(w).zIndex) || 10;
                if (z > maxZ) maxZ = z;
            });
            el.style.zIndex = maxZ + 1;
        }

        function setupWindowDragging() {
            document.querySelectorAll('.window').forEach(w => {
                let isDragging = false;
                let offsetX = 0;
                let offsetY = 0;

                const header = w.querySelector('.window-header');
                header.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    offsetX = e.clientX - w.offsetLeft;
                    offsetY = e.clientY - w.offsetTop;
                    bringToFront(w);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        w.style.left = Math.max(0, e.clientX - offsetX) + 'px';
                        w.style.top = Math.max(50, e.clientY - offsetY) + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });
            });
        }

        init();
    </script>
</body>
</html>
