<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Segoe UI', Ubuntu, sans-serif;
    font-size: 14px;
    user-select: none;
  }

  #desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #1a1a2e;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(94,44,165,0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(22,100,170,0.3) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(180,60,60,0.15) 0%, transparent 50%);
    overflow: hidden;
  }

  /* Top bar */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 30px;
    background: rgba(30,30,40,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    z-index: 9999;
    color: #ddd;
    font-size: 13px;
  }

  #topbar .tb-left { display: flex; align-items: center; gap: 14px; flex: 1; }
  #topbar .tb-right { display: flex; align-items: center; gap: 12px; }
  #topbar .tb-activities {
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  #topbar .tb-activities:hover { background: rgba(255,255,255,0.1); }
  #topbar .tb-clock { color: #ccc; }
  #topbar .tb-icons { display: flex; gap: 6px; align-items: center; }
  #topbar .tb-icon { font-size: 15px; cursor: pointer; opacity: 0.75; transition: opacity 0.15s; }
  #topbar .tb-icon:hover { opacity: 1; }

  /* Taskbar / dock */
  #taskbar {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(30,30,42,0.88);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 8px 16px;
    z-index: 9998;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  #taskbar .dock-sep {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.12);
    margin: 0 4px;
  }

  .dock-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 10px;
    border: none;
    background: transparent;
    transition: transform 0.15s, background 0.15s;
    outline: none;
  }
  .dock-btn:hover {
    background: rgba(255,255,255,0.08);
    transform: translateY(-4px) scale(1.08);
  }
  .dock-btn:active { transform: translateY(-2px) scale(1.03); }
  .dock-btn .icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .dock-btn .label {
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  #open-files .icon { background: linear-gradient(135deg, #3d7ebf, #2a5a99); }
  #open-notepad .icon { background: linear-gradient(135deg, #e8a020, #c47010); }

  /* Windows */
  .win {
    position: absolute;
    min-width: 360px;
    min-height: 240px;
    background: #1e1e2e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    transition: box-shadow 0.15s;
  }
  .win:focus-within, .win.active {
    box-shadow: 0 24px 72px rgba(0,0,0,0.7), 0 0 0 1px rgba(147,112,219,0.3);
    z-index: 200;
  }
  .win.hidden { display: none; }

  .win-titlebar {
    height: 38px;
    background: #252535;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    cursor: grab;
    flex-shrink: 0;
  }
  .win-titlebar:active { cursor: grabbing; }

  .win-controls { display: flex; gap: 6px; }
  .win-ctrl {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: filter 0.15s;
    flex-shrink: 0;
  }
  .win-ctrl:hover { filter: brightness(1.25); }
  .win-close { background: #e74c3c; }
  .win-min   { background: #f39c12; }
  .win-max   { background: #2ecc71; }

  .win-title {
    flex: 1;
    text-align: center;
    color: #bbb;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    pointer-events: none;
  }

  .win-body {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Files window */
  #files-window { width: 580px; height: 420px; top: 60px; left: 80px; }

  #files-toolbar {
    height: 42px;
    background: #22223a;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    flex-shrink: 0;
  }

  #files-up {
    width: 30px;
    height: 28px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #ccc;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #files-up:hover { background: rgba(255,255,255,0.12); }
  #files-up:disabled { opacity: 0.3; cursor: default; }

  #files-path {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 4px 10px;
    color: #a0c4e8;
    font-size: 13px;
    font-family: monospace;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  #files-listing {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 4px;
    align-content: start;
  }
  #files-listing::-webkit-scrollbar { width: 6px; }
  #files-listing::-webkit-scrollbar-track { background: transparent; }
  #files-listing::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    text-align: center;
  }
  .fs-item:hover { background: rgba(255,255,255,0.07); }
  .fs-item.selected { background: rgba(94,130,219,0.25); }
  .fs-item .fs-icon { font-size: 28px; line-height: 1; }
  .fs-item .fs-name {
    font-size: 11px;
    color: #ccc;
    word-break: break-word;
    line-height: 1.3;
    max-width: 84px;
  }

  .fs-statusbar {
    height: 26px;
    background: #1a1a2a;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 12px;
    color: #666;
    font-size: 11px;
    flex-shrink: 0;
  }

  /* Notepad window */
  #notepad-window { width: 560px; height: 420px; top: 90px; left: 200px; }

  #tabs-bar {
    background: #1a1a2a;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: stretch;
    padding: 0 8px;
    gap: 2px;
    flex-shrink: 0;
    min-height: 38px;
    overflow-x: auto;
  }
  #tabs-bar::-webkit-scrollbar { height: 3px; }
  #tabs-bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  #tabs {
    display: flex;
    align-items: stretch;
    gap: 2px;
    flex: 1;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: #888;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    margin-top: 5px;
    transition: background 0.1s, color 0.1s;
    min-height: 30px;
    user-select: none;
  }
  .tab:hover { background: rgba(255,255,255,0.08); color: #bbb; }
  .tab.active {
    background: #1e1e2e;
    border-color: rgba(255,255,255,0.1);
    color: #e0e0f0;
  }
  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #666;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: background 0.1s, color 0.1s;
    flex-shrink: 0;
    padding: 0;
  }
  .tab-close:hover { background: rgba(231,76,60,0.4); color: #fff; }

  #new-tab {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 18px;
    margin: auto 0 auto 4px;
    transition: background 0.1s, color 0.1s;
    flex-shrink: 0;
  }
  #new-tab:hover { background: rgba(255,255,255,0.1); color: #ccc; }

  #editor {
    flex: 1;
    background: #1e1e2e;
    color: #d4d4d4;
    border: none;
    resize: none;
    padding: 12px 16px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    line-height: 1.6;
    outline: none;
  }
  #editor::placeholder { color: #444; }

  .notepad-statusbar {
    height: 24px;
    background: #14141f;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    color: #555;
    font-size: 11px;
    flex-shrink: 0;
  }

  /* Wallpaper subtle grid */
  #desktop::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Resize handle */
  .win-resize {
    position: absolute;
    bottom: 0; right: 0;
    width: 16px; height: 16px;
    cursor: se-resize;
    z-index: 10;
  }
  .win-resize::after {
    content: '';
    position: absolute;
    bottom: 4px; right: 4px;
    width: 8px; height: 8px;
    border-right: 2px solid rgba(255,255,255,0.2);
    border-bottom: 2px solid rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
<div id="desktop">
  <!-- Top bar -->
  <div id="topbar">
    <div class="tb-left">
      <span class="tb-activities">Activities</span>
      <span style="color:#888;font-size:12px;">Files</span>
    </div>
    <div class="tb-clock" id="clock">--:--</div>
    <div class="tb-right">
      <div class="tb-icons">
        <span class="tb-icon" title="Network">&#9wireless;</span>
        <span class="tb-icon">&#128276;</span>
        <span class="tb-icon">&#9881;</span>
      </div>
    </div>
  </div>

  <!-- Files Window -->
  <div class="win" id="files-window">
    <div class="win-titlebar" id="files-titlebar">
      <div class="win-controls">
        <button class="win-ctrl win-close" data-target="files-window" title="Close"></button>
        <button class="win-ctrl win-min" title="Minimize"></button>
        <button class="win-ctrl win-max" title="Maximize"></button>
      </div>
      <div class="win-title">&#128193; Files</div>
      <div style="width:52px"></div>
    </div>
    <div class="win-body">
      <div id="files-toolbar">
        <button id="files-up" title="Go up">&#8593;</button>
        <div id="files-path">/</div>
      </div>
      <div id="files-listing"></div>
      <div class="fs-statusbar" id="files-status">0 items</div>
    </div>
    <div class="win-resize" id="files-resize"></div>
  </div>

  <!-- Notepad Window -->
  <div class="win hidden" id="notepad-window">
    <div class="win-titlebar" id="notepad-titlebar">
      <div class="win-controls">
        <button class="win-ctrl win-close" data-target="notepad-window" title="Close"></button>
        <button class="win-ctrl win-min" title="Minimize"></button>
        <button class="win-ctrl win-max" title="Maximize"></button>
      </div>
      <div class="win-title">&#128221; Notepad</div>
      <div style="width:52px"></div>
    </div>
    <div class="win-body" style="flex-direction:column;">
      <div id="tabs-bar">
        <div id="tabs"></div>
        <button id="new-tab" title="New tab">+</button>
      </div>
      <textarea id="editor" placeholder="Start typing..."></textarea>
      <div class="notepad-statusbar">
        <span id="np-chars">0 chars</span>
        <span id="np-lines">1 line</span>
      </div>
    </div>
    <div class="win-resize" id="notepad-resize"></div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button class="dock-btn" id="open-files">
      <div class="icon">&#128193;</div>
      <span class="label">Files</span>
    </button>
    <div class="dock-sep"></div>
    <button class="dock-btn" id="open-notepad">
      <div class="icon">&#128221;</div>
      <span class="label">Notepad</span>
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Clock ─────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 5000);

  // ── Window management ─────────────────────────────────────────────────────
  function bringToFront(win) {
    document.querySelectorAll('.win').forEach(w => w.classList.remove('active'));
    win.classList.add('active');
  }

  document.querySelectorAll('.win').forEach(win => {
    win.addEventListener('mousedown', () => bringToFront(win));
  });

  // Close buttons
  document.querySelectorAll('.win-close').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const target = btn.dataset.target;
      document.getElementById(target).classList.add('hidden');
    });
  });

  // Dragging
  function makeDraggable(win, titlebar) {
    let dragging = false, ox = 0, oy = 0;
    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('win-ctrl')) return;
      dragging = true;
      const rect = win.getBoundingClientRect();
      ox = e.clientX - rect.left;
      oy = e.clientY - rect.top;
      bringToFront(win);
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const deskRect = document.getElementById('desktop').getBoundingClientRect();
      let nx = e.clientX - ox - deskRect.left;
      let ny = e.clientY - oy - deskRect.top;
      nx = Math.max(0, Math.min(nx, deskRect.width - win.offsetWidth));
      ny = Math.max(30, Math.min(ny, deskRect.height - win.offsetHeight));
      win.style.left = nx + 'px';
      win.style.top  = ny + 'px';
    });
    document.addEventListener('mouseup', () => { dragging = false; });
  }

  makeDraggable(
    document.getElementById('files-window'),
    document.getElementById('files-titlebar')
  );
  makeDraggable(
    document.getElementById('notepad-window'),
    document.getElementById('notepad-titlebar')
  );

  // Resizing
  function makeResizable(win, handle) {
    let resizing = false, sx = 0, sy = 0, sw = 0, sh = 0;
    handle.addEventListener('mousedown', (e) => {
      resizing = true;
      sx = e.clientX; sy = e.clientY;
      sw = win.offsetWidth; sh = win.offsetHeight;
      bringToFront(win);
      e.preventDefault();
      e.stopPropagation();
    });
    document.addEventListener('mousemove', (e) => {
      if (!resizing) return;
      const nw = Math.max(360, sw + (e.clientX - sx));
      const nh = Math.max(240, sh + (e.clientY - sy));
      win.style.width  = nw + 'px';
      win.style.height = nh + 'px';
    });
    document.addEventListener('mouseup', () => { resizing = false; });
  }

  makeResizable(
    document.getElementById('files-window'),
    document.getElementById('files-resize')
  );
  makeResizable(
    document.getElementById('notepad-window'),
    document.getElementById('notepad-resize')
  );

  // Launcher buttons
  document.getElementById('open-files').addEventListener('click', () => {
    const w = document.getElementById('files-window');
    w.classList.remove('hidden');
    bringToFront(w);
  });

  document.getElementById('open-notepad').addEventListener('click', () => {
    const w = document.getElementById('notepad-window');
    w.classList.remove('hidden');
    bringToFront(w);
    renderTabs();
    renderEditor();
  });

  // ── Filesystem ────────────────────────────────────────────────────────────
  const FS = {
    '/': {
      type: 'dir',
      children: ['bin','etc','home','usr','var','tmp','proc','dev']
    },
    '/bin': {
      type: 'dir',
      children: ['bash','ls','cp','mv','rm','cat','echo','grep','find','chmod']
    },
    '/etc': {
      type: 'dir',
      children: ['hostname','hosts','fstab','passwd','group','os-release','apt','ssh','cron.d']
    },
    '/etc/apt': { type: 'dir', children: ['sources.list', 'trusted.gpg'] },
    '/etc/ssh': { type: 'dir', children: ['sshd_config','ssh_config'] },
    '/etc/cron.d': { type: 'dir', children: ['cron.daily','cron.weekly'] },
    '/etc/hostname': { type: 'file' },
    '/etc/hosts':    { type: 'file' },
    '/etc/fstab':    { type: 'file' },
    '/etc/passwd':   { type: 'file' },
    '/etc/group':    { type: 'file' },
    '/etc/os-release': { type: 'file' },
    '/home': {
      type: 'dir',
      children: ['user']
    },
    '/home/user': {
      type: 'dir',
      children: ['Documents','Downloads','Pictures','Music','Videos','Desktop','.bashrc','.profile','.ssh']
    },
    '/home/user/Documents': {
      type: 'dir',
      children: ['resume.pdf','notes.txt','budget.xlsx','project-proposal.docx']
    },
    '/home/user/Downloads': {
      type: 'dir',
      children: ['ubuntu-22.04.iso','setup.sh','archive.tar.gz','photo.jpg']
    },
    '/home/user/Pictures': {
      type: 'dir',
      children: ['wallpaper.png','screenshot.png','vacation','family']
    },
    '/home/user/Pictures/vacation': {
      type: 'dir',
      children: ['beach.jpg','mountains.jpg','city.jpg']
    },
    '/home/user/Pictures/family': {
      type: 'dir',
      children: ['christmas.jpg','birthday.jpg']
    },
    '/home/user/Music': { type: 'dir', children: ['playlist.m3u','song.mp3'] },
    '/home/user/Videos': { type: 'dir', children: ['movie.mp4','clip.webm'] },
    '/home/user/Desktop': { type: 'dir', children: ['shortcut.lnk'] },
    '/home/user/.ssh': { type: 'dir', children: ['id_rsa','id_rsa.pub','known_hosts'] },
    '/usr': {
      type: 'dir',
      children: ['bin','lib','local','share','include']
    },
    '/usr/bin':   { type: 'dir', children: ['python3','node','npm','git','curl','wget'] },
    '/usr/lib':   { type: 'dir', children: ['systemd','python3','x86_64-linux-gnu'] },
    '/usr/local': { type: 'dir', children: ['bin','lib','share'] },
    '/usr/local/bin': { type: 'dir', children: ['code','claude'] },
    '/usr/share': { type: 'dir', children: ['doc','man','fonts','icons'] },
    '/usr/include': { type: 'dir', children: ['stdio.h','stdlib.h','string.h'] },
    '/var': {
      type: 'dir',
      children: ['log','cache','tmp','run','lib']
    },
    '/var/log': { type: 'dir', children: ['syslog','auth.log','kern.log','apt'] },
    '/var/log/apt': { type: 'dir', children: ['history.log','term.log'] },
    '/var/cache': { type: 'dir', children: ['apt','pip'] },
    '/var/tmp':  { type: 'dir', children: [] },
    '/var/run':  { type: 'dir', children: ['sshd.pid','docker.pid'] },
    '/var/lib':  { type: 'dir', children: ['dpkg','apt'] },
    '/tmp':  { type: 'dir', children: ['session.tmp','lock.pid'] },
    '/proc': { type: 'dir', children: ['1','cpuinfo','meminfo','version'] },
    '/dev':  { type: 'dir', children: ['null','zero','random','sda','sda1','tty'] },
  };

  const fileIcons = {
    dir: '&#128193;',
    sh:  '&#128220;',
    py:  '&#128013;',
    js:  '&#128218;',
    pdf: '&#128196;',
    jpg: '&#128247;',
    png: '&#128247;',
    mp3: '&#127925;',
    mp4: '&#127902;',
    iso: '&#128191;',
    tar: '&#128230;',
    gz:  '&#128230;',
    zip: '&#128230;',
    txt: '&#128196;',
    md:  '&#128196;',
    log: '&#128203;',
    cfg: '&#9881;',
    conf:'&#9881;',
    h:   '&#128220;',
    lnk: '&#128279;',
  };

  function getIcon(name, type) {
    if (type === 'dir') return fileIcons.dir;
    const ext = name.split('.').pop().toLowerCase();
    return fileIcons[ext] || '&#128196;';
  }

  function normPath(p) {
    if (p !== '/' && p.endsWith('/')) p = p.slice(0, -1);
    return p;
  }

  let currentPath = '/';

  function navigateTo(path) {
    path = normPath(path);
    const node = FS[path];
    if (!node || node.type !== 'dir') return;
    currentPath = path;
    renderFiles();
  }

  function renderFiles() {
    const listing = document.getElementById('files-listing');
    const pathEl  = document.getElementById('files-path');
    const statusEl = document.getElementById('files-status');
    const upBtn   = document.getElementById('files-up');

    pathEl.textContent = currentPath;
    upBtn.disabled = (currentPath === '/');

    const node = FS[currentPath];
    listing.innerHTML = '';

    if (!node || !node.children || node.children.length === 0) {
      statusEl.textContent = '0 items';
      return;
    }

    const children = node.children;
    statusEl.textContent = children.length + ' item' + (children.length !== 1 ? 's' : '');

    children.forEach(name => {
      const fullPath = (currentPath === '/' ? '' : currentPath) + '/' + name;
      const child = FS[fullPath];
      const type = (child && child.type === 'dir') ? 'dir' : 'file';

      const el = document.createElement('div');
      el.className = 'fs-item';
      el.dataset.name = name;
      el.dataset.path = fullPath;
      el.dataset.type = type;

      const iconEl = document.createElement('div');
      iconEl.className = 'fs-icon';
      iconEl.innerHTML = getIcon(name, type);

      const nameEl = document.createElement('div');
      nameEl.className = 'fs-name';
      nameEl.textContent = name;

      el.appendChild(iconEl);
      el.appendChild(nameEl);
      listing.appendChild(el);

      el.addEventListener('click', () => {
        document.querySelectorAll('.fs-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
      });

      el.addEventListener('dblclick', () => {
        if (type === 'dir') {
          navigateTo(fullPath);
        }
      });
    });
  }

  document.getElementById('files-up').addEventListener('click', () => {
    if (currentPath === '/') return;
    const parts = currentPath.split('/').filter(Boolean);
    parts.pop();
    const parent = parts.length === 0 ? '/' : '/' + parts.join('/');
    navigateTo(parent);
  });

  // Init files
  renderFiles();

  // ── Notepad ───────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'desktop_notepad_v1';

  function loadNotepadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return { tabs: [{ id: 1, title: 'Note 1', content: '' }], activeId: 1, nextId: 2 };
  }

  function saveNotepadState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notepadState));
    } catch(e) {}
  }

  let notepadState = loadNotepadState();

  function getActiveTab() {
    return notepadState.tabs.find(t => t.id === notepadState.activeId) || notepadState.tabs[0];
  }

  function renderTabs() {
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';
    notepadState.tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === notepadState.activeId ? ' active' : '');
      el.dataset.id = tab.id;

      const titleSpan = document.createElement('span');
      titleSpan.textContent = tab.title;

      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.innerHTML = '&#215;';
      closeBtn.title = 'Close tab';
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeTab(tab.id);
      });

      el.appendChild(titleSpan);
      el.appendChild(closeBtn);
      tabsEl.appendChild(el);

      el.addEventListener('click', () => {
        notepadState.activeId = tab.id;
        saveNotepadState();
        renderTabs();
        renderEditor();
      });
    });
  }

  function renderEditor() {
    const editor = document.getElementById('editor');
    const active = getActiveTab();
    if (active) {
      editor.value = active.content || '';
    } else {
      editor.value = '';
    }
    updateEditorStatus();
  }

  function updateEditorStatus() {
    const val = document.getElementById('editor').value;
    document.getElementById('np-chars').textContent = val.length + ' chars';
    const lines = val === '' ? 1 : val.split('\n').length;
    document.getElementById('np-lines').textContent = lines + ' line' + (lines !== 1 ? 's' : '');
  }

  function closeTab(id) {
    if (notepadState.tabs.length === 1) {
      notepadState.tabs[0].content = '';
      notepadState.tabs[0].title = 'Note 1';
      notepadState.activeId = notepadState.tabs[0].id;
      saveNotepadState();
      renderTabs();
      renderEditor();
      return;
    }
    const idx = notepadState.tabs.findIndex(t => t.id === id);
    notepadState.tabs.splice(idx, 1);
    if (notepadState.activeId === id) {
      const newIdx = Math.max(0, idx - 1);
      notepadState.activeId = notepadState.tabs[newIdx].id;
    }
    saveNotepadState();
    renderTabs();
    renderEditor();
  }

  document.getElementById('new-tab').addEventListener('click', () => {
    const id = notepadState.nextId++;
    const title = 'Note ' + id;
    notepadState.tabs.push({ id, title, content: '' });
    notepadState.activeId = id;
    saveNotepadState();
    renderTabs();
    renderEditor();
  });

  document.getElementById('editor').addEventListener('input', (e) => {
    const active = getActiveTab();
    if (active) {
      active.content = e.target.value;
      saveNotepadState();
    }
    updateEditorStatus();
  });

  // Init notepad
  renderTabs();
  renderEditor();
})();
</script>
</body>
</html>
