<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Game of Life</title>
<style>
  :root { color-scheme: dark; }
  body { background:#0d0d0d; color:#eee; font:14px system-ui,sans-serif;
    margin:0; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; gap:14px; padding:24px; }
  h1 { font-size:18px; font-weight:650; margin:0; }
  #life { background:#111; border:1px solid #333; border-radius:8px;
    width:480px; height:480px; image-rendering:pixelated; cursor:crosshair; }
  .bar { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  button { background:#1c1c1b; color:#eee; border:1px solid #333;
    border-radius:7px; padding:7px 14px; font:inherit; cursor:pointer; }
  button:hover { border-color:#3987e5; }
  button.on { background:#3987e5; border-color:#3987e5; color:#fff; }
  .note { color:#898781; font-size:12px; }
</style>
</head>
<body>
  <h1>Conway's Game of Life</h1>
  <canvas id="life" width="480" height="480"></canvas>
  <div class="bar">
    <button id="step">Step</button>
    <button id="play">Play</button>
    <button id="random">Random</button>
    <button id="clear">Clear</button>
  </div>
  <div class="note">Click / drag on the grid to toggle cells. B3/S23, edges are dead.</div>
<script>
(() => {
  const W = 60, H = 60;                       // grid cells (>= 40)
  const canvas = document.getElementById('life');
  const ctx = canvas.getContext('2d');
  const CELL = canvas.width / W;
  let grid = new Uint8Array(W * H);
  const idx = (x, y) => y * W + x;

  const life = {
    w: W, h: H,
    get(x, y) { return (x < 0 || y < 0 || x >= W || y >= H) ? 0 : grid[idx(x, y)]; },
    set(x, y, v) { if (x >= 0 && y >= 0 && x < W && y < H) grid[idx(x, y)] = v ? 1 : 0; },
    clear() { grid = new Uint8Array(W * H); draw(); },
    step() {
      const next = new Uint8Array(W * H);     // SIMULTANEOUS update
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          let n = 0;
          for (let dy = -1; dy <= 1; dy++)
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx, ny = y + dy;     // bounded: outside is dead
              if (nx >= 0 && ny >= 0 && nx < W && ny < H) n += grid[idx(nx, ny)];
            }
          const alive = grid[idx(x, y)];
          next[idx(x, y)] = (alive ? (n === 2 || n === 3) : (n === 3)) ? 1 : 0;
        }
      }
      grid = next;
      draw();
    },
  };
  window.life = life;

  function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#6ee36e';
    for (let y = 0; y < H; y++)
      for (let x = 0; x < W; x++)
        if (grid[idx(x, y)])
          ctx.fillRect(x * CELL, y * CELL, CELL - 0.5, CELL - 0.5);
  }

  // painting
  let painting = false, paintVal = 1;
  const cellAt = e => {
    const r = canvas.getBoundingClientRect();
    return [Math.floor((e.clientX - r.left) / r.width * W),
            Math.floor((e.clientY - r.top) / r.height * H)];
  };
  canvas.addEventListener('mousedown', e => {
    painting = true;
    const [x, y] = cellAt(e); paintVal = life.get(x, y) ? 0 : 1;
    life.set(x, y, paintVal); draw();
  });
  canvas.addEventListener('mousemove', e => {
    if (!painting) return; const [x, y] = cellAt(e); life.set(x, y, paintVal); draw();
  });
  window.addEventListener('mouseup', () => painting = false);

  document.getElementById('step').onclick = () => life.step();
  document.getElementById('clear').onclick = () => life.clear();
  document.getElementById('random').onclick = () => {
    for (let i = 0; i < grid.length; i++) grid[i] = Math.random() < 0.3 ? 1 : 0;
    draw();
  };
  let timer = null;
  const playBtn = document.getElementById('play');
  playBtn.onclick = () => {
    if (timer) { clearInterval(timer); timer = null; playBtn.classList.remove('on'); }
    else { timer = setInterval(() => life.step(), 100); playBtn.classList.add('on'); }
  };
  draw();
})();
</script>
</body>
</html>
