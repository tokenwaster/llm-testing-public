<!doctype html>
<html><head><meta charset="utf-8"><title>Kanban</title>
<style>
body { margin:0; background:#14141c; color:#eee; font:14px system-ui; padding:20px; }
#addbar { display:flex; gap:8px; margin-bottom:16px; }
#new-card { flex:1; max-width:340px; background:#1e1e28; color:#eee;
  border:1px solid #444; border-radius:6px; padding:8px 10px; }
#add-card { background:#3b6ea5; color:#fff; border:0; border-radius:6px;
  padding:8px 18px; cursor:pointer; }
#board { display:flex; gap:14px; align-items:flex-start; }
.column { background:#1b1b25; border:1px solid #333; border-radius:10px;
  width:260px; min-height:200px; padding:12px; }
.column h2 { font-size:13px; margin:0 0 10px; color:#9ecbff;
  text-transform:uppercase; letter-spacing:.06em; }
.cards { min-height:120px; display:flex; flex-direction:column; gap:8px; }
.card { background:#262635; border:1px solid #3a3a4c; border-radius:8px;
  padding:10px 12px; cursor:grab; display:flex; justify-content:space-between;
  gap:8px; }
.card-del { background:transparent; border:0; color:#888; cursor:pointer; }
.card-del:hover { color:#e66; }
.column.over { border-color:#3b6ea5; }
</style></head><body>
<div id="addbar">
  <input id="new-card" placeholder="New card title…">
  <button id="add-card">Add</button>
</div>
<div id="board">
  <div class="column" id="col-todo" data-status="todo">
    <h2>To Do <span class="count">0</span></h2><div class="cards"></div></div>
  <div class="column" id="col-doing" data-status="doing">
    <h2>Doing <span class="count">0</span></h2><div class="cards"></div></div>
  <div class="column" id="col-done" data-status="done">
    <h2>Done <span class="count">0</span></h2><div class="cards"></div></div>
</div>
<script>
let cards = JSON.parse(localStorage.getItem("kanban") || "[]");
let seq = cards.reduce((a, c) => Math.max(a, c.id), 0);
const save = () => localStorage.setItem("kanban", JSON.stringify(cards));

function render() {
  for (const status of ["todo", "doing", "done"]) {
    const col = document.getElementById("col-" + status);
    const box = col.querySelector(".cards");
    box.innerHTML = "";
    const mine = cards.filter(c => c.status === status);
    col.querySelector(".count").textContent = mine.length;
    for (const c of mine) {
      const el = document.createElement("div");
      el.className = "card";
      el.draggable = true;
      el.dataset.id = c.id;
      const span = document.createElement("span");
      span.textContent = c.title;
      const del = document.createElement("button");
      del.className = "card-del";
      del.textContent = "✕";
      del.addEventListener("click", () => {
        cards = cards.filter(x => x.id !== c.id); save(); render();
      });
      el.append(span, del);
      el.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", String(c.id));
        e.dataTransfer.effectAllowed = "move";
      });
      box.appendChild(el);
    }
  }
}

document.querySelectorAll(".column").forEach(col => {
  col.addEventListener("dragover", e => {
    e.preventDefault(); e.dataTransfer.dropEffect = "move";
    col.classList.add("over");
  });
  col.addEventListener("dragleave", () => col.classList.remove("over"));
  col.addEventListener("drop", e => {
    e.preventDefault(); col.classList.remove("over");
    const id = +e.dataTransfer.getData("text/plain");
    const card = cards.find(c => c.id === id);
    if (card) { card.status = col.dataset.status; save(); render(); }
  });
});

document.getElementById("add-card").addEventListener("click", () => {
  const input = document.getElementById("new-card");
  const title = input.value.trim();
  if (!title) return;
  cards.push({ id: ++seq, title, status: "todo" });
  input.value = "";
  save(); render();
});

render();
</script></body></html>
