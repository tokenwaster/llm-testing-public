<!doctype html>
<html><head><meta charset="utf-8"><title>Expenses</title>
<style>
body { margin:0 auto; max-width:720px; background:#14141c; color:#eee;
  font:14px system-ui; padding:24px; }
input, select, button { background:#1e1e28; color:#eee; border:1px solid #444;
  border-radius:6px; padding:7px 10px; font:inherit; }
#add-expense { background:#3b6ea5; border:0; cursor:pointer; }
form, #filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
#form-error { color:#e66; min-height:18px; font-size:12.5px; }
.expense { display:flex; gap:14px; padding:8px 10px; border-bottom:1px solid #2a2a36; }
.expense .amt { font-weight:600; width:80px; }
.exp-del { background:transparent; border:0; color:#888; cursor:pointer; margin-left:auto; }
#summary { margin-top:14px; color:#bbb; }
</style></head><body>
<h2>Expenses</h2>
<form id="expense-form" onsubmit="return false">
  <input id="amount" type="number" step="0.01" placeholder="Amount">
  <select id="category">
    <option>groceries</option><option>transport</option>
    <option>bills</option><option>fun</option>
  </select>
  <input id="date" type="date">
  <input id="note" placeholder="Note (optional)">
  <button id="add-expense">Add</button>
</form>
<div id="form-error"></div>
<div id="filters">
  <select id="filter-category">
    <option>all</option><option>groceries</option><option>transport</option>
    <option>bills</option><option>fun</option>
  </select>
  <input id="filter-from" type="date">
  <input id="filter-to" type="date">
</div>
<div id="list"></div>
<div id="summary">
  Total: <b id="total">0.00</b>
  <div>
    <span class="cat-total" data-cat="groceries">groceries: 0.00</span> ·
    <span class="cat-total" data-cat="transport">transport: 0.00</span> ·
    <span class="cat-total" data-cat="bills">bills: 0.00</span> ·
    <span class="cat-total" data-cat="fun">fun: 0.00</span>
  </div>
</div>
<script>
let expenses = JSON.parse(localStorage.getItem("expenses") || "[]");
let seq = expenses.reduce((a, e) => Math.max(a, e.id), 0);
const save = () => localStorage.setItem("expenses", JSON.stringify(expenses));

function visible(e) {
  const cat = document.getElementById("filter-category").value;
  const from = document.getElementById("filter-from").value;
  const to = document.getElementById("filter-to").value;
  if (cat !== "all" && e.category !== cat) return false;
  if (from && e.date < from) return false;
  if (to && e.date > to) return false;
  return true;
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const sorted = expenses.slice().sort((a, b) => b.date.localeCompare(a.date));
  let total = 0;
  const cats = { groceries: 0, transport: 0, bills: 0, fun: 0 };
  for (const e of sorted) {
    const row = document.createElement("div");
    row.className = "expense";
    const vis = visible(e);
    if (!vis) row.style.display = "none";
    else { total += e.amount; cats[e.category] += e.amount; }
    row.innerHTML = `<span class="amt">${e.amount.toFixed(2)}</span>
      <span>${e.category}</span><span>${e.date}</span>
      <span>${e.note ? e.note.replace(/</g, "&lt;") : ""}</span>`;
    const del = document.createElement("button");
    del.className = "exp-del"; del.textContent = "✕";
    del.addEventListener("click", () => {
      expenses = expenses.filter(x => x.id !== e.id); save(); render();
    });
    row.appendChild(del);
    list.appendChild(row);
  }
  document.getElementById("total").textContent = total.toFixed(2);
  document.querySelectorAll(".cat-total").forEach(el => {
    el.textContent = `${el.dataset.cat}: ${cats[el.dataset.cat].toFixed(2)}`;
  });
}

document.getElementById("add-expense").addEventListener("click", () => {
  const err = document.getElementById("form-error");
  const amount = parseFloat(document.getElementById("amount").value);
  const date = document.getElementById("date").value;
  if (!isFinite(amount) || amount <= 0) {
    err.textContent = "Enter a positive numeric amount."; return;
  }
  if (!date) { err.textContent = "Pick a date."; return; }
  err.textContent = "";
  expenses.push({ id: ++seq, amount, date,
    category: document.getElementById("category").value,
    note: document.getElementById("note").value.trim() });
  document.getElementById("amount").value = "";
  save(); render();
});
["filter-category", "filter-from", "filter-to"].forEach(id =>
  document.getElementById(id).addEventListener("input", render));

render();
</script></body></html>
