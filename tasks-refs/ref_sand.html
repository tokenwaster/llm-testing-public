<!doctype html>
<html><head><meta charset="utf-8"><title>Sand</title>
<style>
body { margin:0; background:#14141c; color:#eee; font:14px system-ui;
  display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px; }
#tools button { background:#2a2a36; color:#eee; border:1px solid #444;
  padding:6px 14px; cursor:pointer; }
#tools button.on { background:#3b6ea5; }
canvas { border:1px solid #444; image-rendering:pixelated; }
</style></head><body>
<div id="tools">
  <button id="mat-sand" class="on">Sand</button>
  <button id="mat-water">Water</button>
  <button id="mat-wall">Wall</button>
  <button id="mat-acid">Acid</button>
  <button id="mat-empty">Erase</button>
  <button id="clear">Clear</button>
</div>
<canvas id="sand" width="500" height="500"></canvas>
<script>
const W = 100, H = 100, SCALE = 5;
const EMPTY = 0, SAND = 1, WATER = 2, WALL = 3, ACID = 4;
const NAMES = ["empty", "sand", "water", "wall", "acid"];
const IDS = { empty: EMPTY, sand: SAND, water: WATER, wall: WALL, acid: ACID };
const COLORS = ["#14141c", "#d9b24a", "#3b7fd4", "#777788", "#69d43b"];
let grid = new Uint8Array(W * H);
const cvs = document.getElementById("sand"), ctx = cvs.getContext("2d");
const at = (x, y) => (x < 0 || y < 0 || x >= W || y >= H) ? WALL : grid[y * W + x];
const put = (x, y, v) => { if (x >= 0 && y >= 0 && x < W && y < H) grid[y * W + x] = v; };

function step() {
  for (let y = H - 1; y >= 0; y--) {
    const ltr = Math.random() < 0.5;
    for (let i = 0; i < W; i++) {
      const x = ltr ? i : W - 1 - i;
      const m = at(x, y);
      if (m === SAND) {
        const below = at(x, y + 1);
        if (below === EMPTY) { put(x, y, EMPTY); put(x, y + 1, SAND); }
        else if (below === WATER || below === ACID) {
          put(x, y, below); put(x, y + 1, SAND);
        } else {
          const d = Math.random() < 0.5 ? -1 : 1;
          if (at(x + d, y + 1) === EMPTY && at(x + d, y) === EMPTY) {
            put(x, y, EMPTY); put(x + d, y + 1, SAND);
          } else if (at(x - d, y + 1) === EMPTY && at(x - d, y) === EMPTY) {
            put(x, y, EMPTY); put(x - d, y + 1, SAND);
          }
        }
      } else if (m === WATER || m === ACID) {
        if (m === ACID) {  // dissolve below or beside
          for (const [dx, dy] of [[0, 1], [-1, 0], [1, 0]]) {
            const t = at(x + dx, y + dy);
            if (t === SAND || t === WALL) { put(x + dx, y + dy, EMPTY); }
          }
        }
        const below = at(x, y + 1);
        if (below === EMPTY) { put(x, y, EMPTY); put(x, y + 1, m); }
        else {
          const d = Math.random() < 0.5 ? -1 : 1;
          if (at(x + d, y + 1) === EMPTY) { put(x, y, EMPTY); put(x + d, y + 1, m); }
          else if (at(x - d, y + 1) === EMPTY) { put(x, y, EMPTY); put(x - d, y + 1, m); }
          else if (at(x + d, y) === EMPTY) { put(x, y, EMPTY); put(x + d, y, m); }
          else if (at(x - d, y) === EMPTY) { put(x, y, EMPTY); put(x - d, y, m); }
        }
      }
    }
  }
}

function draw() {
  ctx.fillStyle = COLORS[EMPTY];
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++) {
      const m = grid[y * W + x];
      if (m !== EMPTY) {
        ctx.fillStyle = COLORS[m];
        ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
      }
    }
}

window.sim = {
  w: W, h: H,
  tick(n) { for (let i = 0; i < n; i++) step(); draw(); },
  get(x, y) { return NAMES[at(x, y)] || "wall"; },
  set(x, y, mat) { put(x, y, IDS[mat] ?? EMPTY); draw(); },
  clear() { grid = new Uint8Array(W * H); draw(); },
};

let material = SAND, painting = false;
document.querySelectorAll("#tools button[id^=mat-]").forEach(b =>
  b.addEventListener("click", () => {
    material = IDS[b.id.slice(4)];
    document.querySelectorAll("#tools button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
  }));
document.getElementById("clear").addEventListener("click", () => window.sim.clear());
function paint(e) {
  const r = cvs.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / r.width * W);
  const y = Math.floor((e.clientY - r.top) / r.height * H);
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++) put(x + dx, y + dy, material);
  draw();
}
cvs.addEventListener("mousedown", e => { painting = true; paint(e); });
cvs.addEventListener("mousemove", e => { if (painting) paint(e); });
window.addEventListener("mouseup", () => painting = false);

draw();
(function loop() { window.sim.tick(1); requestAnimationFrame(loop); })();
</script></body></html>
