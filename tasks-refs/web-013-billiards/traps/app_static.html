<!doctype html><meta charset="utf-8"><title>Billiards</title>
<style>body{background:#0b3d1a}#table{background:#0f7a35;border:14px solid #5b3a1a}</style>
<canvas id="table" width="800" height="400"></canvas>
<script>
(() => {
  const W=800,H=400,R=11,g=document.getElementById("table").getContext("2d");
  let balls=[];
  function draw(){ g.clearRect(0,0,W,H);
    for(const b of balls){ g.beginPath(); g.fillStyle="#f4f4f0";
      g.arc(b.x,b.y,R,0,7); g.fill(); } }
  window.sim={ W,H,R,
    reset:(s)=>{ balls=(s||[]).map(b=>({x:b.x,y:b.y,vx:b.vx||0,vy:b.vy||0,potted:false})); draw(); },
    step:(dt)=>{ draw(); },   // no physics — the trap
    state:()=>balls.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,potted:b.potted})) };
  window.sim.reset([{x:200,y:200},{x:560,y:200}]);
})();
</script>
