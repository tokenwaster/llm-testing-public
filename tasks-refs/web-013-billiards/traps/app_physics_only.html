<!doctype html><meta charset="utf-8"><title>Billiards</title>
<style>body{background:#0b3d1a}#t{background:#0f7a35;border:14px solid #5b3a1a}</style>
<canvas id="t" width="800" height="400"></canvas>
<script>
(() => {
  const W=800,H=400,R=11,POCKET=22,FR=0.55;
  const P=[[0,0],[W/2,0],[W,0],[0,H],[W/2,H],[W,H]];
  const g=document.getElementById("t").getContext("2d"); let balls=[];
  function reset(s){ balls=(s||[]).map(b=>({x:b.x,y:b.y,vx:b.vx||0,vy:b.vy||0,potted:false,cue:!!b.cue})); draw(); }
  function pot(b){ for(const[px,py]of P) if(Math.hypot(b.x-px,b.y-py)<=POCKET){b.potted=true;b.vx=0;b.vy=0;return;} }
  function step(dt){
    for(const b of balls){ if(b.potted)continue; b.x+=b.vx*dt;b.y+=b.vy*dt;
      if(b.x<R){b.x=R;b.vx=-b.vx;}else if(b.x>W-R){b.x=W-R;b.vx=-b.vx;}
      if(b.y<R){b.y=R;b.vy=-b.vy;}else if(b.y>H-R){b.y=H-R;b.vy=-b.vy;}
      const d=Math.max(0,1-FR*dt); b.vx*=d;b.vy*=d;
      if(Math.hypot(b.vx,b.vy)<1e-3){b.vx=0;b.vy=0;} pot(b); }
    for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){
      const a=balls[i],c=balls[j]; if(a.potted||c.potted)continue;
      let dx=c.x-a.x,dy=c.y-a.y,dd=Math.hypot(dx,dy);
      if(dd>0&&dd<2*R){const nx=dx/dd,ny=dy/dd,ov=2*R-dd;
        a.x-=nx*ov/2;a.y-=ny*ov/2;c.x+=nx*ov/2;c.y+=ny*ov/2;
        const vr=(a.vx-c.vx)*nx+(a.vy-c.vy)*ny;
        if(vr>0){a.vx-=vr*nx;a.vy-=vr*ny;c.vx+=vr*nx;c.vy+=vr*ny;}}}
    draw();
  }
  function draw(){ g.clearRect(0,0,W,H); for(const b of balls){ if(b.potted)continue;
    g.beginPath();g.fillStyle="#f4f4f0";g.arc(b.x,b.y,R,0,7);g.fill(); } }
  reset([{x:200,y:200,cue:true},{x:560,y:200}]);
  window.sim={W,H,R,reset,step,state:()=>balls.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,potted:b.potted,cue:b.cue}))};
})();
</script>
