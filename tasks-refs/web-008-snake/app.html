<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Snake</title>
<style>
  :root { color-scheme: dark; }
  body { background:#0d0d0d; color:#eee; font:14px system-ui,sans-serif; margin:0;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    gap:12px; padding:24px; }
  h1 { font-size:18px; margin:0; }
  #snake { background:#111; border:1px solid #333; border-radius:8px;
    width:480px; height:480px; }
  .bar { display:flex; gap:8px; align-items:center; }
  button { background:#1c1c1b; color:#eee; border:1px solid #333;
    border-radius:7px; padding:7px 14px; font:inherit; cursor:pointer; }
  button:hover { border-color:#3987e5; }
  #score { font-weight:650; min-width:70px; }
</style>
</head>
<body>
  <h1>Snake</h1>
  <canvas id="snake" width="480" height="480"></canvas>
  <div class="bar">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    <span id="score">Score: 0</span>
  </div>
<script>
(() => {
  const N = 24;                                  // grid cells per side (>=10)
  const canvas = document.getElementById('snake');
  const ctx = canvas.getContext('2d');
  const CELL = canvas.width / N;
  const scoreEl = document.getElementById('score');

  let snake, dir, pending, food, alive, score;

  function reset() {
    snake = [[10, 12], [9, 12], [8, 12]];        // head first, moving right
    dir = 'right'; pending = 'right';
    food = [15, 12];
    alive = true; score = 0;
    scoreEl.textContent = 'Score: 0';
    draw();
  }

  const DELTA = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] };
  const OPP = { up: 'down', down: 'up', left: 'right', right: 'left' };

  function setDir(d) {
    if (!DELTA[d]) return;
    if (d === OPP[dir]) return;                  // no 180° reversal
    pending = d;
  }

  function tick() {
    if (!alive) return;
    dir = pending;
    const [dx, dy] = DELTA[dir];
    const head = [snake[0][0] + dx, snake[0][1] + dy];
    // wall collision
    if (head[0] < 0 || head[1] < 0 || head[0] >= N || head[1] >= N) {
      alive = false; draw(); return;
    }
    const eating = head[0] === food[0] && head[1] === food[1];
    // self collision (ignore the tail cell it is about to vacate, unless growing)
    const body = eating ? snake : snake.slice(0, -1);
    if (body.some(c => c[0] === head[0] && c[1] === head[1])) {
      alive = false; draw(); return;
    }
    snake.unshift(head);
    if (eating) { score++; scoreEl.textContent = 'Score: ' + score; spawnFood(); }
    else snake.pop();
    draw();
  }

  function spawnFood() {
    let x, y, tries = 0;
    do { x = Math.floor(Math.random() * N); y = Math.floor(Math.random() * N); tries++; }
    while (snake.some(c => c[0] === x && c[1] === y) && tries < 500);
    food = [x, y];
  }

  function draw() {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e24a4a';
    ctx.fillRect(food[0] * CELL, food[1] * CELL, CELL - 1, CELL - 1);
    ctx.fillStyle = alive ? '#6ee36e' : '#7a7a7a';
    for (const [x, y] of snake) ctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
  }

  window.game = {
    w: N, h: N,
    reset, tick, setDir,
    setFood(x, y) { food = [x, y]; draw(); },
    snake() { return snake.map(c => c.slice()); },
    food() { return food.slice(); },
    alive() { return alive; },
    score() { return score; },
  };

  document.addEventListener('keydown', e => {
    const k = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' }[e.key];
    if (k) { setDir(k); e.preventDefault(); }
  });
  let timer = null;
  document.getElementById('start').onclick = () => {
    if (!timer) timer = setInterval(tick, 120);
  };
  document.getElementById('pause').onclick = () => { clearInterval(timer); timer = null; };
  document.getElementById('reset').onclick = () => { clearInterval(timer); timer = null; reset(); };
  reset();
})();
</script>
</body>
</html>
