<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Bouncy Balls</title>
<style>
  :root{color-scheme:dark}
  body{background:#0d0d0d;color:#eee;font:14px system-ui,sans-serif;margin:0;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px}
  h1{font-size:18px;margin:0}
  #sim{background:#111;border:1px solid #333;border-radius:8px;width:480px;height:480px;cursor:pointer}
  .bar{display:flex;gap:8px}
  button{background:#1c1c1b;color:#eee;border:1px solid #333;border-radius:7px;padding:7px 14px;font:inherit;cursor:pointer}
  button:hover{border-color:#3987e5}
</style></head>
<body>
  <h1>Bouncy Balls</h1>
  <canvas id="sim" width="480" height="480"></canvas>
  <div class="bar">
    <button id="drop">Drop ball</button>
    <button id="play">Play</button>
    <button id="clear">Clear</button>
  </div>
<script>
(() => {
  const canvas = document.getElementById('sim'), ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GRAV = 0.5, REST = 0.8;            // gravity per step, restitution
  let balls = [];

  const sim = {
    w: W, h: H, gravity: GRAV,
    balls() { return balls.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, r: b.r })); },
    clear() { balls = []; draw(); },
    reset() { balls = []; sim.addBall(W/2, 40, 3, 0); draw(); },
    addBall(x, y, vx = 0, vy = 0, r = 14) { balls.push({ x, y, vx, vy, r }); draw(); },
    step(dt = 1) {
      for (const b of balls) {
        b.vy += GRAV * dt;
        b.x += b.vx * dt; b.y += b.vy * dt;
        // walls
        if (b.x - b.r < 0) { b.x = b.r; b.vx = -b.vx * REST; }
        if (b.x + b.r > W) { b.x = W - b.r; b.vx = -b.vx * REST; }
        // floor / ceiling
        if (b.y + b.r > H) { b.y = H - b.r; b.vy = -b.vy * REST; }
        if (b.y - b.r < 0) { b.y = b.r; b.vy = -b.vy * REST; }
      }
      draw();
    },
  };
  window.sim = sim;

  function draw() {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
    for (const b of balls) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = '#3987e5'; ctx.fill();
    }
  }

  canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    sim.addBall((e.clientX - r.left) / r.width * W, (e.clientY - r.top) / r.height * H,
                (Math.random() - 0.5) * 8, 0);
  });
  document.getElementById('drop').onclick = () => sim.addBall(W/2, 40, (Math.random()-0.5)*8, 0);
  document.getElementById('clear').onclick = () => sim.clear();
  let timer = null;
  document.getElementById('play').onclick = () => {
    if (timer) { clearInterval(timer); timer = null; }
    else timer = setInterval(() => sim.step(1), 16);
  };
  sim.reset();
})();
</script>
</body></html>
