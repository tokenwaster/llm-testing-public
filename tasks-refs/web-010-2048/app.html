<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>2048</title>
<style>
  :root{color-scheme:dark}
  body{background:#0d0d0d;color:#eee;font:14px system-ui,sans-serif;margin:0;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px}
  h1{font-size:20px;margin:0}
  #board{display:grid;grid-template-columns:repeat(4,88px);grid-auto-rows:88px;gap:8px;
    background:#1a1a19;border:1px solid #333;border-radius:10px;padding:8px}
  .cell{display:flex;align-items:center;justify-content:center;border-radius:8px;
    background:#222220;font-size:26px;font-weight:700}
  .cell.v2{background:#2d4a63} .cell.v4{background:#356084} .cell.v8{background:#3a77a8}
  .cell.big{background:#3987e5;color:#fff}
  .bar{display:flex;gap:12px;align-items:center}
  #score{font-weight:650;font-size:16px}
  button{background:#1c1c1b;color:#eee;border:1px solid #333;border-radius:7px;padding:7px 14px;font:inherit;cursor:pointer}
</style></head>
<body>
  <h1>2048</h1>
  <div class="bar"><span id="score">Score: 0</span><button id="reset">New game</button></div>
  <div id="board"></div>
  <div style="color:#898781;font-size:12px">Arrow keys to play.</div>
<script>
(() => {
  const N = 4;
  const boardEl = document.getElementById('board'), scoreEl = document.getElementById('score');
  let grid, score;

  const empty = () => Array.from({length: N}, () => Array(N).fill(0));

  function spawn() {
    const free = [];
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (!grid[r][c]) free.push([r, c]);
    if (!free.length) return;
    const [r, c] = free[Math.floor(Math.random() * free.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function reset() { grid = empty(); score = 0; spawn(); spawn(); render(); }

  function slide(row) {                      // slide+merge toward index 0
    const t = row.filter(v => v);
    const out = [];
    for (let i = 0; i < t.length; i++) {
      if (i + 1 < t.length && t[i] === t[i + 1]) { out.push(t[i] * 2); score += t[i] * 2; i++; }
      else out.push(t[i]);
    }
    while (out.length < N) out.push(0);
    return out;
  }
  const rev = r => r.slice().reverse();
  const transpose = g => g[0].map((_, c) => g.map(row => row[c]));

  function move(dir) {
    const before = JSON.stringify(grid);
    if (dir === 'left')  grid = grid.map(slide);
    else if (dir === 'right') grid = grid.map(r => rev(slide(rev(r))));
    else if (dir === 'up')   grid = transpose(transpose(grid).map(slide));
    else if (dir === 'down') grid = transpose(transpose(grid).map(r => rev(slide(rev(r)))));
    else return false;
    const moved = JSON.stringify(grid) !== before;
    if (moved) spawn();
    render();
    return moved;
  }

  function render() {
    boardEl.innerHTML = '';
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      const v = grid[r][c], d = document.createElement('div');
      d.className = 'cell' + (v ? (v <= 8 ? ' v' + v : ' big') : '');
      d.textContent = v || '';
      boardEl.appendChild(d);
    }
    scoreEl.textContent = 'Score: ' + score;
  }

  window.game = {
    size: N,
    reset, move, score() { return score; },
    board() { return grid.map(r => r.slice()); },
    setBoard(b) { grid = b.map(r => r.slice()); render(); },   // no spawn (grading)
  };

  document.addEventListener('keydown', e => {
    const k = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' }[e.key];
    if (k) { move(k); e.preventDefault(); }
  });
  document.getElementById('reset').onclick = reset;
  reset();
})();
</script>
</body></html>
