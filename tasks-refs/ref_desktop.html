<!doctype html>
<html><head><meta charset="utf-8"><title>MiniDesk</title>
<style>
body { margin:0; font:14px system-ui; background:#2c001e; color:#eee; }
#desktop { position:fixed; inset:0; }
#taskbar { position:absolute; bottom:0; left:0; right:0; height:44px;
  background:#111; display:flex; gap:8px; align-items:center; padding:0 12px; }
#taskbar button { background:#333; color:#eee; border:0; padding:8px 14px; cursor:pointer; }
.win { position:absolute; top:60px; background:#1e1e1e; border:1px solid #555;
  width:420px; min-height:280px; }
#files-window { left:40px; } #notepad-window { left:200px; }
.titlebar { background:#333; padding:6px 10px; display:flex; justify-content:space-between; }
.fs-item { padding:4px 10px; cursor:default; } .fs-item:hover { background:#333; }
.tab { display:inline-block; padding:4px 10px; background:#2a2a2a; margin-right:4px; cursor:pointer; }
.tab.active { background:#444; }
#editor { width:95%; height:150px; background:#111; color:#eee; }
</style></head><body>
<div id="desktop">
  <div id="files-window" class="win" style="display:none">
    <div class="titlebar"><span>Files</span><button class="win-close">×</button></div>
    <div style="padding:8px"><span id="files-path">/</span>
      <button id="files-up">⬆ Up</button></div>
    <div id="files-list"></div>
  </div>
  <div id="notepad-window" class="win" style="display:none">
    <div class="titlebar"><span>Notepad</span><button class="win-close">×</button></div>
    <div style="padding:8px"><span id="tabs"></span><button id="new-tab">＋</button></div>
    <textarea id="editor"></textarea>
  </div>
  <div id="taskbar">
    <button id="open-files">Files</button>
    <button id="open-notepad">Notepad</button>
  </div>
</div>
<script>
const FS = { bin:{}, etc:{}, usr:{}, "var":{},
  home:{ user:{ Documents:{}, Downloads:{}, Pictures:{} } } };
let path = [];
function node(){ let n = FS; for (const p of path) n = n[p]; return n; }
function renderFiles(){
  document.getElementById('files-path').textContent = '/' + path.join('/');
  const list = document.getElementById('files-list');
  list.innerHTML = '';
  for (const name of Object.keys(node())){
    const el = document.createElement('div');
    el.className = 'fs-item'; el.textContent = name;
    el.addEventListener('dblclick', () => {
      if (node()[name] && typeof node()[name] === 'object'){ path.push(name); renderFiles(); }
    });
    list.appendChild(el);
  }
}
document.getElementById('files-up').addEventListener('click', () => {
  path.pop(); renderFiles();
});

let state = JSON.parse(localStorage.getItem('notepad') ||
  '{"tabs":[{"content":""}],"active":0}');
function save(){ localStorage.setItem('notepad', JSON.stringify(state)); }
function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  state.tabs.forEach((t, i) => {
    const el = document.createElement('span');
    el.className = 'tab' + (i === state.active ? ' active' : '');
    el.textContent = 'Tab ' + (i + 1);
    el.addEventListener('click', () => { state.active = i; save(); renderTabs(); });
    tabs.appendChild(el);
  });
  document.getElementById('editor').value = state.tabs[state.active].content;
}
document.getElementById('editor').addEventListener('input', e => {
  state.tabs[state.active].content = e.target.value; save();
});
document.getElementById('new-tab').addEventListener('click', () => {
  state.tabs.push({content: ''}); state.active = state.tabs.length - 1;
  save(); renderTabs();
});

document.getElementById('open-files').addEventListener('click', () => {
  document.getElementById('files-window').style.display = 'block'; renderFiles();
});
document.getElementById('open-notepad').addEventListener('click', () => {
  document.getElementById('notepad-window').style.display = 'block'; renderTabs();
});
document.querySelectorAll('.win-close').forEach(b =>
  b.addEventListener('click', e => e.target.closest('.win').style.display = 'none'));
</script></body></html>
