<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Sort Visualizer</title>
<style>
  :root{color-scheme:dark}
  body{background:#0d0d0d;color:#eee;font:14px system-ui,sans-serif;margin:0;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px}
  h1{font-size:18px;margin:0}
  #bars{display:flex;align-items:flex-end;gap:2px;height:320px;width:480px;
    background:#111;border:1px solid #333;border-radius:8px;padding:8px}
  .bar{flex:1;background:#3987e5;border-radius:2px 2px 0 0}
  .bar.active{background:#e2a24a}
  .bar.done{background:#0ca30c}
  .bar-row{display:flex;align-items:flex-end;gap:2px;height:100%;width:100%}
  button{background:#1c1c1b;color:#eee;border:1px solid #333;border-radius:7px;padding:7px 14px;font:inherit;cursor:pointer}
  .bar-wrap{position:relative;flex:1;height:100%;display:flex;align-items:flex-end}
</style></head>
<body>
  <h1>Sorting Visualizer (bubble sort)</h1>
  <div id="bars"></div>
  <div style="display:flex;gap:10px">
    <button id="sort">Sort</button>
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset</button>
  </div>
<script>
(() => {
  const barsEl = document.getElementById('bars');
  let arr = [], i = 0, j = 0, done = false, timer = null;

  function render() {
    const max = Math.max(1, ...arr);
    barsEl.innerHTML = '';
    arr.forEach((v, k) => {
      const b = document.createElement('div');
      b.className = 'bar' + (done ? ' done' : (k === j || k === j + 1 ? ' active' : ''));
      b.style.height = (v / max * 100) + '%';
      barsEl.appendChild(b);
    });
  }

  function setArray(a) { arr = a.slice(); i = 0; j = 0; done = false; render(); }
  function shuffle() {
    for (let k = arr.length - 1; k > 0; k--) {
      const r = Math.floor(Math.random() * (k + 1));
      [arr[k], arr[r]] = [arr[r], arr[k]];
    }
    i = 0; j = 0; done = false; render();
  }

  function sortStep() {                           // one bubble-sort comparison
    if (done) return true;
    if (arr[j] > arr[j + 1]) { [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]]; }
    j++;
    if (j >= arr.length - 1 - i) { j = 0; i++; if (i >= arr.length - 1) done = true; }
    render();
    return done;
  }

  window.viz = {
    array() { return arr.slice(); },
    setArray, shuffle,
    sortStep,
    sorted() { for (let k = 0; k + 1 < arr.length; k++) if (arr[k] > arr[k + 1]) return false; return true; },
    reset() { setArray([5, 3, 8, 1, 9, 2, 7, 4, 6, 0]); },
  };

  document.getElementById('sort').onclick = () => {
    if (timer) return;
    timer = setInterval(() => { if (sortStep()) { clearInterval(timer); timer = null; } }, 30);
  };
  document.getElementById('shuffle').onclick = () => { clearInterval(timer); timer = null; shuffle(); };
  document.getElementById('reset').onclick = () => { clearInterval(timer); timer = null; window.viz.reset(); };
  window.viz.reset();
})();
</script>
</body></html>
