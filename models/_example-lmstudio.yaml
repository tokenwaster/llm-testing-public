# LM Studio local model. Copy this file (drop the leading underscore), then:
#   1. In LM Studio: Developer tab -> Start Server (default port 1234)
#   2. Set `model` to the exact model identifier shown in LM Studio's server page
#      (or run:  curl http://localhost:1234/v1/models )
name: lmstudio-qwen3-8b          # your label — used in folders & reports
provider: openai                 # LM Studio speaks the OpenAI-compatible API
base_url: http://localhost:1234/v1
model: qwen/qwen3-8b
local: true                      # enables warm-up ping + cold-start metric
stream: true                     # streaming gives time-to-first-token
supports_tools: true             # set false for models that can't do tool calls (skips tier-2)
max_tokens: 4096
temperature: 0.2
pricing: { input_per_mtok: 0, output_per_mtok: 0 }   # local = free
enabled: true
context_length: 0            # local context window for lms load -c; 0 = model default (raise for long-context tasks)
