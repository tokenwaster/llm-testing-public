# Any OpenAI-compatible cloud API (OpenAI, OpenRouter, Groq, Together, ...).
# Copy (drop the underscore) and set the right env var + base_url.
name: gpt-example
provider: openai
base_url: https://api.openai.com/v1          # or https://openrouter.ai/api/v1 etc.
model: gpt-5.2
key_env: OPENAI_API_KEY
local: false
stream: true
supports_tools: true
max_tokens: 4096
temperature: 0.2
pricing: { input_per_mtok: 1.25, output_per_mtok: 10.0 }   # set to the provider's real prices
enabled: true
