# Anthropic cloud model. Copy (drop the underscore) and set ANTHROPIC_API_KEY env var.
# Pricing: check https://docs.anthropic.com/en/docs/about-claude/pricing (USD per Mtok).
name: claude-sonnet-5
provider: anthropic
model: claude-sonnet-5
key_env: ANTHROPIC_API_KEY
local: false
stream: true
supports_tools: true
max_tokens: 4096
temperature: 0.2
pricing: { input_per_mtok: 3.0, output_per_mtok: 15.0 }
enabled: true
