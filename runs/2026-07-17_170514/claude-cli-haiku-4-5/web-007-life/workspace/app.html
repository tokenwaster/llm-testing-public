<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conway's Game of Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #0088ff;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #00aaff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 136, 255, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #play.playing {
            background: #ff6b00;
        }
        
        #life {
            border: 3px solid #0088ff;
            background: #0a0a0a;
            cursor: crosshair;
            display: inline-block;
            width: 400px;
            height: 400px;
            box-shadow: 0 0 20px rgba(0, 136, 255, 0.3);
        }
        
        .info {
            margin-top: 20px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧬 Conway's Game of Life</h1>
        <div class="controls">
            <button id="step">Step</button>
            <button id="play">Play</button>
            <button id="random">Random</button>
            <button id="clear">Clear</button>
        </div>
        <canvas id="life"></canvas>
        <div class="info">Click or drag to paint cells • 40×40 grid</div>
    </div>

    <script>
        const GRID_WIDTH = 40;
        const GRID_HEIGHT = 40;
        const CELL_SIZE = 10;
        
        const canvas = document.getElementById('life');
        const ctx = canvas.getContext('2d');
        
        canvas.width = GRID_WIDTH * CELL_SIZE;
        canvas.height = GRID_HEIGHT * CELL_SIZE;
        
        let grid = Array(GRID_HEIGHT).fill(0).map(() => Array(GRID_WIDTH).fill(0));
        let playing = false;
        
        window.life = {
            w: GRID_WIDTH,
            h: GRID_HEIGHT,
            
            get(x, y) {
                if (x < 0 || x >= GRID_WIDTH || y < 0 || y >= GRID_HEIGHT) {
                    return 0;
                }
                return grid[y][x];
            },
            
            set(x, y, v) {
                if (x >= 0 && x < GRID_WIDTH && y >= 0 && y < GRID_HEIGHT) {
                    grid[y][x] = v ? 1 : 0;
                }
            },
            
            step() {
                const nextGrid = Array(GRID_HEIGHT).fill(0).map(() => Array(GRID_WIDTH).fill(0));
                
                for (let y = 0; y < GRID_HEIGHT; y++) {
                    for (let x = 0; x < GRID_WIDTH; x++) {
                        let count = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = x + dx;
                                const ny = y + dy;
                                if (nx >= 0 && nx < GRID_WIDTH && ny >= 0 && ny < GRID_HEIGHT) {
                                    count += grid[ny][nx];
                                }
                            }
                        }
                        
                        const isAlive = grid[y][x] === 1;
                        if (isAlive && (count === 2 || count === 3)) {
                            nextGrid[y][x] = 1;
                        } else if (!isAlive && count === 3) {
                            nextGrid[y][x] = 1;
                        }
                    }
                }
                
                grid = nextGrid;
                draw();
            },
            
            clear() {
                grid = Array(GRID_HEIGHT).fill(0).map(() => Array(GRID_WIDTH).fill(0));
                draw();
            }
        };
        
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= GRID_WIDTH; x++) {
                ctx.beginPath();
                ctx.moveTo(x * CELL_SIZE, 0);
                ctx.lineTo(x * CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= GRID_HEIGHT; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * CELL_SIZE);
                ctx.lineTo(canvas.width, y * CELL_SIZE);
                ctx.stroke();
            }
            
            ctx.fillStyle = '#00ff88';
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    if (grid[y][x] === 1) {
                        ctx.fillRect(x * CELL_SIZE + 1, y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    }
                }
            }
        }
        
        function gameLoop() {
            if (playing) {
                window.life.step();
            }
            requestAnimationFrame(gameLoop);
        }
        
        document.getElementById('step').addEventListener('click', () => {
            window.life.step();
        });
        
        document.getElementById('play').addEventListener('click', (e) => {
            playing = !playing;
            e.target.classList.toggle('playing');
            e.target.textContent = playing ? 'Pause' : 'Play';
        });
        
        document.getElementById('random').addEventListener('click', () => {
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    grid[y][x] = Math.random() < 0.3 ? 1 : 0;
                }
            }
            draw();
        });
        
        document.getElementById('clear').addEventListener('click', () => {
            window.life.clear();
        });
        
        let isDrawing = false;
        let lastCell = null;
        
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            toggleCell(e);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDrawing) {
                toggleCell(e);
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
            lastCell = null;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
            lastCell = null;
        });
        
        function toggleCell(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
            const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
            
            if (x >= 0 && x < GRID_WIDTH && y >= 0 && y < GRID_HEIGHT) {
                const cell = `${x},${y}`;
                if (cell !== lastCell) {
                    grid[y][x] = grid[y][x] === 1 ? 0 : 1;
                    lastCell = cell;
                    draw();
                }
            }
        }
        
        draw();
        gameLoop();
    </script>
</body>
</html>
