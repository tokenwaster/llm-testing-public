<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouncing Ball Physics Playground</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 24px;
    }

    #sim {
      display: block;
      width: 400px;
      height: 400px;
      background-color: #0d0d0d;
      border: 2px solid #444;
      cursor: crosshair;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 14px;
      background-color: #444;
      color: #fff;
      border: 1px solid #666;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #555;
    }

    button:active {
      background-color: #333;
    }

    .info {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Bouncing Ball Physics</h1>
  <canvas id="sim"></canvas>
  <div class="controls">
    <button id="drop">Drop Ball</button>
    <button id="play">Play</button>
    <button id="clear">Clear</button>
  </div>
  <div class="info">Click canvas to add balls</div>

  <script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');

    const w = 400;
    const h = 400;
    canvas.width = w;
    canvas.height = h;

    const GRAVITY = 0.5;
    const RESTITUTION = 0.8;
    const DEFAULT_RADIUS = 8;

    let balls = [];
    let isAnimating = false;
    let animationFrameId = null;

    window.sim = {
      get w() { return w; },
      get h() { return h; },
      balls() {
        return balls.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, r: b.r }));
      },
      addBall(x, y, vx = 0, vy = 0, r = DEFAULT_RADIUS) {
        balls.push({ x, y, vx, vy, r });
      },
      clear() {
        balls = [];
        draw();
      },
      step(dt = 1) {
        for (let ball of balls) {
          ball.vy += GRAVITY;
          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;

          if (ball.x - ball.r < 0) {
            ball.x = ball.r;
            ball.vx = -ball.vx * RESTITUTION;
          }
          if (ball.x + ball.r > w) {
            ball.x = w - ball.r;
            ball.vx = -ball.vx * RESTITUTION;
          }
          if (ball.y - ball.r < 0) {
            ball.y = ball.r;
            ball.vy = -ball.vy * RESTITUTION;
          }
          if (ball.y + ball.r > h) {
            ball.y = h - ball.r;
            ball.vy = -ball.vy * RESTITUTION;
          }
        }
        draw();
      }
    };

    function draw() {
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, w, h);

      for (let ball of balls) {
        ctx.fillStyle = '#4db8ff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#2d88cc';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function animate() {
      if (isAnimating) {
        window.sim.step(1);
        animationFrameId = requestAnimationFrame(animate);
      }
    }

    document.getElementById('drop').addEventListener('click', () => {
      const vx = (Math.random() - 0.5) * 4;
      window.sim.addBall(w / 2, 50, vx, 0);
      draw();
    });

    document.getElementById('play').addEventListener('click', (e) => {
      isAnimating = !isAnimating;
      e.target.textContent = isAnimating ? 'Pause' : 'Play';
      if (isAnimating) animate();
      else if (animationFrameId) cancelAnimationFrame(animationFrameId);
    });

    document.getElementById('clear').addEventListener('click', () => {
      window.sim.clear();
      isAnimating = false;
      document.getElementById('play').textContent = 'Play';
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const vx = (Math.random() - 0.5) * 4;
      const vy = (Math.random() - 0.5) * 4;
      window.sim.addBall(x, y, vx, vy);
      draw();
    });

    draw();
  </script>
</body>
</html>
