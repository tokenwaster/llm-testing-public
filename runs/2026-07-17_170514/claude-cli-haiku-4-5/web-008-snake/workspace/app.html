<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 32px;
        }

        #snake {
            display: block;
            background-color: #1a1a1a;
            border: 2px solid #00ff00;
            margin: 0 auto 20px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .score-display {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #score {
            font-weight: bold;
            color: #00ff00;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #00ff00;
            color: #0a0a0a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #00cc00;
        }

        button:active {
            background-color: #009900;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Snake</h1>
        <canvas id="snake" width="400" height="400"></canvas>
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snake');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const resetBtn = document.getElementById('reset');

        const BOARD_WIDTH = 20;
        const BOARD_HEIGHT = 20;
        const CELL_SIZE = canvas.width / BOARD_WIDTH;

        let snakeBody = [];
        let direction = 'right';
        let nextDirection = 'right';
        let food = { x: 0, y: 0 };
        let gameScore = 0;
        let gameAlive = true;
        let gameRunning = false;
        let gameLoopId = null;

        function reset() {
            snakeBody = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            gameScore = 0;
            gameAlive = true;
            gameRunning = false;
            scoreElement.textContent = gameScore;
            placeFood();
            draw();
            stopGameLoop();
        }

        function placeFood() {
            let x, y;
            let validPosition = false;
            while (!validPosition) {
                x = Math.floor(Math.random() * BOARD_WIDTH);
                y = Math.floor(Math.random() * BOARD_HEIGHT);
                validPosition = !snakeBody.some(segment => segment.x === x && segment.y === y);
            }
            food = { x, y };
        }

        function setFood(x, y) {
            food = { x, y };
            draw();
        }

        function snake() {
            return snakeBody.map(segment => [segment.x, segment.y]);
        }

        function foodPos() {
            return [food.x, food.y];
        }

        function alive() {
            return gameAlive;
        }

        function getScore() {
            return gameScore;
        }

        function setDir(dir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (opposites[dir] !== direction) {
                nextDirection = dir;
            }
        }

        function tick() {
            if (!gameAlive) return;

            direction = nextDirection;

            const head = snakeBody[0];
            let newHead;

            switch (direction) {
                case 'up':
                    newHead = { x: head.x, y: head.y - 1 };
                    break;
                case 'down':
                    newHead = { x: head.x, y: head.y + 1 };
                    break;
                case 'left':
                    newHead = { x: head.x - 1, y: head.y };
                    break;
                case 'right':
                    newHead = { x: head.x + 1, y: head.y };
                    break;
            }

            if (newHead.x < 0 || newHead.x >= BOARD_WIDTH || newHead.y < 0 || newHead.y >= BOARD_HEIGHT) {
                gameAlive = false;
                stopGameLoop();
                draw();
                return;
            }

            if (snakeBody.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                gameAlive = false;
                stopGameLoop();
                draw();
                return;
            }

            snakeBody.unshift(newHead);

            if (newHead.x === food.x && newHead.y === food.y) {
                gameScore++;
                scoreElement.textContent = gameScore;
                placeFood();
            } else {
                snakeBody.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= BOARD_WIDTH; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= BOARD_HEIGHT; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            snakeBody.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00ff00' : '#00cc00';
                ctx.fillRect(
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2
                );
            });

            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            if (!gameAlive) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            }
        }

        function startGameLoop() {
            if (gameRunning) return;
            gameRunning = true;
            gameLoopId = setInterval(tick, 100);
        }

        function stopGameLoop() {
            gameRunning = false;
            if (gameLoopId) {
                clearInterval(gameLoopId);
                gameLoopId = null;
            }
        }

        function togglePause() {
            if (gameRunning) {
                stopGameLoop();
            } else if (gameAlive) {
                startGameLoop();
            }
        }

        startBtn.addEventListener('click', startGameLoop);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', () => {
            reset();
            draw();
        });

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    setDir('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    setDir('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    setDir('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    setDir('right');
                    break;
            }
        });

        window.game = {
            w: BOARD_WIDTH,
            h: BOARD_HEIGHT,
            reset: reset,
            tick: tick,
            setDir: setDir,
            setFood: setFood,
            snake: snake,
            food: foodPos,
            alive: alive,
            score: getScore
        };

        reset();
        draw();
    </script>
</body>
</html>
