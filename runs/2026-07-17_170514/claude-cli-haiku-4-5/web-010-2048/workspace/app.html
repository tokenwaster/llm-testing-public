<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .info {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 30px;
            align-items: center;
        }
        
        .score-box {
            font-size: 1.2em;
        }
        
        #score {
            font-size: 2em;
            font-weight: bold;
            color: #ffcc00;
        }
        
        #reset {
            padding: 10px 30px;
            font-size: 1em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        #reset:hover {
            background-color: #45a049;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background-color: #bbada0;
            padding: 10px;
            border-radius: 6px;
            margin: 0 auto;
        }
        
        .tile {
            background-color: #cdc1b4;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 2em;
            color: #776e65;
            transition: all 0.1s ease-in-out;
        }
        
        .tile[data-value="0"] {
            background-color: #cdc1b4;
            color: transparent;
        }
        
        .tile[data-value="2"] {
            background-color: #eee4da;
            color: #776e65;
        }
        
        .tile[data-value="4"] {
            background-color: #ede0c8;
            color: #776e65;
        }
        
        .tile[data-value="8"] {
            background-color: #f2b179;
            color: #f9f6f2;
        }
        
        .tile[data-value="16"] {
            background-color: #f59563;
            color: #f9f6f2;
        }
        
        .tile[data-value="32"] {
            background-color: #f67c5f;
            color: #f9f6f2;
        }
        
        .tile[data-value="64"] {
            background-color: #f65e3b;
            color: #f9f6f2;
        }
        
        .tile[data-value="128"] {
            background-color: #edcf72;
            color: #095f6b;
            font-size: 1.5em;
        }
        
        .tile[data-value="256"] {
            background-color: #edcc61;
            color: #095f6b;
            font-size: 1.5em;
        }
        
        .tile[data-value="512"] {
            background-color: #edc850;
            color: #095f6b;
            font-size: 1.5em;
        }
        
        .tile[data-value="1024"] {
            background-color: #edc53f;
            color: #095f6b;
            font-size: 1.2em;
        }
        
        .tile[data-value="2048"] {
            background-color: #edc22e;
            color: #095f6b;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="info">
            <div class="score-box">
                Score: <span id="score">0</span>
            </div>
            <button id="reset">New Game</button>
        </div>
        <div id="board"></div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.currentScore = 0;
            }
            
            reset() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.currentScore = 0;
                this.addNewTile();
                this.addNewTile();
                this.render();
            }
            
            board() {
                return this.grid.map(row => [...row]);
            }
            
            setBoard(arr) {
                this.grid = arr.map(row => [...row]);
                this.render();
            }
            
            score() {
                return this.currentScore;
            }
            
            addNewTile() {
                const empty = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.grid[i][j] === 0) {
                            empty.push([i, j]);
                        }
                    }
                }
                
                if (empty.length === 0) return;
                
                const [row, col] = empty[Math.floor(Math.random() * empty.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                this.grid[row][col] = value;
            }
            
            move(direction) {
                const oldGrid = this.grid.map(row => [...row]);
                
                if (direction === 'left') {
                    this.moveLeft();
                } else if (direction === 'right') {
                    this.moveRight();
                } else if (direction === 'up') {
                    this.moveUp();
                } else if (direction === 'down') {
                    this.moveDown();
                }
                
                const changed = !this.gridEqual(oldGrid, this.grid);
                
                if (changed) {
                    this.addNewTile();
                    this.render();
                }
                
                return changed;
            }
            
            gridEqual(a, b) {
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (a[i][j] !== b[i][j]) return false;
                    }
                }
                return true;
            }
            
            moveLeft() {
                for (let i = 0; i < this.size; i++) {
                    this.grid[i] = this.slideMerge(this.grid[i]);
                }
            }
            
            moveRight() {
                for (let i = 0; i < this.size; i++) {
                    this.grid[i] = this.slideMerge(this.grid[i].reverse()).reverse();
                }
            }
            
            moveUp() {
                for (let j = 0; j < this.size; j++) {
                    const column = [];
                    for (let i = 0; i < this.size; i++) {
                        column.push(this.grid[i][j]);
                    }
                    const merged = this.slideMerge(column);
                    for (let i = 0; i < this.size; i++) {
                        this.grid[i][j] = merged[i];
                    }
                }
            }
            
            moveDown() {
                for (let j = 0; j < this.size; j++) {
                    const column = [];
                    for (let i = 0; i < this.size; i++) {
                        column.push(this.grid[i][j]);
                    }
                    const merged = this.slideMerge(column.reverse()).reverse();
                    for (let i = 0; i < this.size; i++) {
                        this.grid[i][j] = merged[i];
                    }
                }
            }
            
            slideMerge(line) {
                const nonZero = line.filter(x => x !== 0);
                const merged = [];
                const mergedIndices = new Set();
                
                for (let i = 0; i < nonZero.length; i++) {
                    if (mergedIndices.has(i)) continue;
                    
                    if (i + 1 < nonZero.length && nonZero[i] === nonZero[i + 1]) {
                        const newValue = nonZero[i] * 2;
                        merged.push(newValue);
                        this.currentScore += newValue;
                        mergedIndices.add(i + 1);
                        i++;
                    } else {
                        merged.push(nonZero[i]);
                    }
                }
                
                while (merged.length < this.size) {
                    merged.push(0);
                }
                
                return merged;
            }
            
            render() {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';
                
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const tile = document.createElement('div');
                        tile.className = 'tile';
                        tile.setAttribute('data-value', this.grid[i][j]);
                        tile.textContent = this.grid[i][j] === 0 ? '' : this.grid[i][j];
                        boardEl.appendChild(tile);
                    }
                }
                
                document.getElementById('score').textContent = this.currentScore;
            }
        }
        
        const game = new Game2048();
        
        window.game = {
            size: game.size,
            reset: () => game.reset(),
            move: (direction) => game.move(direction),
            board: () => game.board(),
            setBoard: (arr) => game.setBoard(arr),
            score: () => game.score(),
        };
        
        document.getElementById('reset').addEventListener('click', () => {
            game.reset();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                game.move('left');
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                game.move('right');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                game.move('up');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                game.move('down');
            }
        });
        
        game.reset();
    </script>
</body>
</html>
