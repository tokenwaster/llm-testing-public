<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #14161a;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    gap: 14px;
    padding: 20px;
  }
  h1 {
    margin: 0;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: #7bd88f;
  }
  #hud {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 1.1rem;
  }
  #score {
    font-weight: bold;
    color: #ffd166;
    min-width: 90px;
  }
  #status {
    color: #ff6b6b;
    min-height: 1.2em;
    font-size: 0.95rem;
  }
  #board-wrap {
    border: 3px solid #2c313a;
    border-radius: 10px;
    padding: 10px;
    background: #1b1e24;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  #snake {
    display: block;
    background: #10131a;
    border-radius: 6px;
  }
  #controls {
    display: flex;
    gap: 10px;
  }
  button {
    background: #2c313a;
    color: #e6e6e6;
    border: 1px solid #3d4552;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover {
    background: #3d4552;
  }
  button:active {
    background: #4a5361;
  }
  #hint {
    color: #888;
    font-size: 0.85rem;
  }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div id="status"></div>
  </div>
  <div id="board-wrap">
    <canvas id="snake" width="400" height="400"></canvas>
  </div>
  <div id="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
  <div id="hint">Use arrow keys to steer</div>

<script>
(function () {
  const canvas = document.getElementById('snake');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const statusEl = document.getElementById('status');

  const W = 20; // cells wide
  const H = 20; // cells tall
  const CELL = canvas.width / W; // 20px per cell

  const DIRS = {
    up:    { x: 0, y: -1 },
    down:  { x: 0, y: 1 },
    left:  { x: -1, y: 0 },
    right: { x: 1, y: 0 },
  };
  const OPPOSITE = { up: 'down', down: 'up', left: 'right', right: 'left' };

  let snakeArr, dir, pendingDir, foodPos, isAlive, scoreVal;
  let timer = null;
  const TICK_MS = 120;

  function initState() {
    const cx = Math.floor(W / 2);
    const cy = Math.floor(H / 2);
    // head first
    snakeArr = [ [cx, cy], [cx - 1, cy], [cx - 2, cy] ];
    dir = 'right';
    pendingDir = 'right';
    isAlive = true;
    scoreVal = 0;
    placeFood();
    updateHUD();
    draw();
  }

  function placeFood() {
    const free = [];
    for (let x = 0; x < W; x++) {
      for (let y = 0; y < H; y++) {
        if (!snakeArr.some(seg => seg[0] === x && seg[1] === y)) {
          free.push([x, y]);
        }
      }
    }
    if (free.length === 0) {
      foodPos = null;
      return;
    }
    const idx = Math.floor(Math.random() * free.length);
    foodPos = free[idx];
  }

  function updateHUD() {
    scoreEl.textContent = String(scoreVal);
    statusEl.textContent = isAlive ? '' : 'Game Over';
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, H * CELL);
      ctx.stroke();
    }
    for (let y = 0; y <= H; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(W * CELL, y * CELL);
      ctx.stroke();
    }

    // food
    if (foodPos) {
      ctx.fillStyle = '#ff6b6b';
      const [fx, fy] = foodPos;
      const pad = 3;
      ctx.beginPath();
      ctx.roundRect(fx * CELL + pad, fy * CELL + pad, CELL - pad * 2, CELL - pad * 2, 4);
      ctx.fill();
    }

    // snake
    for (let i = snakeArr.length - 1; i >= 0; i--) {
      const [x, y] = snakeArr[i];
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#7bd88f' : '#4fae63';
      const pad = 2;
      ctx.beginPath();
      ctx.roundRect(x * CELL + pad, y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 5);
      ctx.fill();
    }
  }

  function setDir(newDir) {
    if (!DIRS[newDir]) return;
    if (newDir === OPPOSITE[dir]) return; // ignore 180 reversal
    pendingDir = newDir;
  }

  function tick() {
    if (!isAlive) return;

    dir = pendingDir;
    const d = DIRS[dir];
    const head = snakeArr[0];
    const newHead = [head[0] + d.x, head[1] + d.y];

    // wall collision
    if (newHead[0] < 0 || newHead[0] >= W || newHead[1] < 0 || newHead[1] >= H) {
      isAlive = false;
      stopLoop();
      updateHUD();
      draw();
      return;
    }

    // self collision (check against body; tail will move away unless we grow)
    const ateFood = foodPos && newHead[0] === foodPos[0] && newHead[1] === foodPos[1];
    const bodyToCheck = ateFood ? snakeArr : snakeArr.slice(0, snakeArr.length - 1);
    if (bodyToCheck.some(seg => seg[0] === newHead[0] && seg[1] === newHead[1])) {
      isAlive = false;
      stopLoop();
      updateHUD();
      draw();
      return;
    }

    snakeArr.unshift(newHead);
    if (ateFood) {
      scoreVal += 1;
      placeFood();
    } else {
      snakeArr.pop();
    }

    updateHUD();
    draw();
  }

  function startLoop() {
    if (timer !== null) return;
    if (!isAlive) return;
    timer = setInterval(tick, TICK_MS);
  }

  function stopLoop() {
    if (timer !== null) {
      clearInterval(timer);
      timer = null;
    }
  }

  function reset() {
    stopLoop();
    initState();
  }

  // Buttons
  document.getElementById('start').addEventListener('click', () => {
    if (!isAlive) return;
    startLoop();
  });
  document.getElementById('pause').addEventListener('click', () => {
    stopLoop();
  });
  document.getElementById('reset').addEventListener('click', () => {
    reset();
  });

  // Keyboard
  window.addEventListener('keydown', (e) => {
    const map = {
      ArrowUp: 'up',
      ArrowDown: 'down',
      ArrowLeft: 'left',
      ArrowRight: 'right',
    };
    if (map[e.key]) {
      e.preventDefault();
      setDir(map[e.key]);
    }
  });

  // Programmatic API
  window.game = {
    w: W,
    h: H,
    reset: reset,
    tick: tick,
    setDir: setDir,
    setFood: function (x, y) {
      foodPos = [x, y];
      draw();
    },
    snake: function () {
      return snakeArr.map(seg => [seg[0], seg[1]]);
    },
    food: function () {
      return foodPos ? [foodPos[0], foodPos[1]] : null;
    },
    alive: function () {
      return isAlive;
    },
    score: function () {
      return scoreVal;
    },
  };

  initState();
})();
</script>
</body>
</html>
