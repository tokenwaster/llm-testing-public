<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  :root {
    --bg: #121212;
    --board-bg: #1e1e1e;
    --cell-bg: #2a2a2a;
    --text: #f1f1f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
  }
  h1 {
    margin: 0;
    font-size: 2.5em;
    letter-spacing: 2px;
  }
  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #score-box {
    background: var(--board-bg);
    border-radius: 8px;
    padding: 10px 20px;
    text-align: center;
    min-width: 100px;
  }
  #score-box .label {
    font-size: 0.75em;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #score {
    font-size: 1.5em;
    font-weight: bold;
  }
  #reset {
    background: #f67c5f;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
  }
  #reset:hover {
    background: #f4602e;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 10px;
    background: var(--board-bg);
    padding: 10px;
    border-radius: 10px;
  }
  .cell {
    width: 80px;
    height: 80px;
    background: var(--cell-bg);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6em;
    font-weight: bold;
    color: var(--text);
    transition: background 0.1s ease;
  }
  .cell[data-value="0"] { color: transparent; }
  .cell[data-value="2"] { background: #3a3a3a; }
  .cell[data-value="4"] { background: #4a4530; }
  .cell[data-value="8"] { background: #b06a3a; color: #fff; }
  .cell[data-value="16"] { background: #c17b3f; color: #fff; }
  .cell[data-value="32"] { background: #cc6d4f; color: #fff; }
  .cell[data-value="64"] { background: #d65b3a; color: #fff; }
  .cell[data-value="128"] { background: #d9c26a; color: #fff; font-size: 1.4em; }
  .cell[data-value="256"] { background: #d9c157; color: #fff; font-size: 1.4em; }
  .cell[data-value="512"] { background: #d9bb44; color: #fff; font-size: 1.4em; }
  .cell[data-value="1024"] { background: #d9b431; color: #fff; font-size: 1.2em; }
  .cell[data-value="2048"] { background: #d9ad1e; color: #fff; font-size: 1.2em; }
  #hint {
    color: #888;
    font-size: 0.9em;
  }
</style>
</head>
<body>
  <h1>2048</h1>
  <div class="top-bar">
    <div id="score-box">
      <div class="label">Score</div>
      <div id="score">0</div>
    </div>
    <button id="reset">New Game</button>
  </div>
  <div id="board"></div>
  <div id="hint">Use arrow keys to play</div>

<script>
(function () {
  const SIZE = 4;
  let grid = [];
  let currentScore = 0;

  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const resetBtn = document.getElementById('reset');

  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  }

  function cloneGrid(g) {
    return g.map(row => row.slice());
  }

  function gridsEqual(a, b) {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (a[r][c] !== b[r][c]) return false;
      }
    }
    return true;
  }

  function getEmptyCells(g) {
    const cells = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (g[r][c] === 0) cells.push([r, c]);
      }
    }
    return cells;
  }

  function spawnTile(g) {
    const empties = getEmptyCells(g);
    if (empties.length === 0) return false;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    g[r][c] = Math.random() < 0.9 ? 2 : 4;
    return true;
  }

  function render() {
    boardEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const val = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.value = String(val);
        cell.textContent = val === 0 ? '' : String(val);
        boardEl.appendChild(cell);
      }
    }
    scoreEl.textContent = String(currentScore);
  }

  // Slide+merge a single row to the left. Returns { row, gained }.
  function slideRowLeft(row) {
    let arr = row.filter(v => v !== 0);
    let gained = 0;
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] !== 0 && arr[i] === arr[i + 1]) {
        arr[i] = arr[i] * 2;
        gained += arr[i];
        arr[i + 1] = 0;
        i++; // this tile already merged, skip past it
      }
    }
    arr = arr.filter(v => v !== 0);
    while (arr.length < SIZE) arr.push(0);
    return { row: arr, gained };
  }

  function transpose(g) {
    const t = emptyGrid();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        t[c][r] = g[r][c];
      }
    }
    return t;
  }

  function reverseRows(g) {
    return g.map(row => row.slice().reverse());
  }

  function applyMove(g, direction) {
    let working = cloneGrid(g);
    let transposed = false;
    let reversed = false;

    if (direction === 'up' || direction === 'down') {
      working = transpose(working);
      transposed = true;
    }
    if (direction === 'right' || direction === 'down') {
      working = reverseRows(working);
      reversed = true;
    }

    let totalGained = 0;
    for (let r = 0; r < SIZE; r++) {
      const { row, gained } = slideRowLeft(working[r]);
      working[r] = row;
      totalGained += gained;
    }

    if (reversed) working = reverseRows(working);
    if (transposed) working = transpose(working);

    return { grid: working, gained: totalGained };
  }

  function move(direction) {
    if (!['left', 'right', 'up', 'down'].includes(direction)) return false;
    const result = applyMove(grid, direction);
    const changed = !gridsEqual(grid, result.grid);
    if (changed) {
      grid = result.grid;
      currentScore += result.gained;
      spawnTile(grid);
      render();
    }
    return changed;
  }

  function reset() {
    grid = emptyGrid();
    currentScore = 0;
    spawnTile(grid);
    spawnTile(grid);
    render();
  }

  function setBoard(arr) {
    const g = emptyGrid();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        g[r][c] = (arr[r] && typeof arr[r][c] === 'number') ? arr[r][c] : 0;
      }
    }
    grid = g;
    render();
  }

  function board() {
    return grid.map(row => row.slice());
  }

  function score() {
    return currentScore;
  }

  window.game = {
    size: SIZE,
    reset,
    move,
    board,
    setBoard,
    score,
  };

  resetBtn.addEventListener('click', reset);

  const keyMap = {
    ArrowLeft: 'left',
    ArrowRight: 'right',
    ArrowUp: 'up',
    ArrowDown: 'down',
  };

  document.addEventListener('keydown', (e) => {
    const dir = keyMap[e.key];
    if (dir) {
      e.preventDefault();
      move(dir);
    }
  });

  reset();
})();
</script>
</body>
</html>
