<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f1117;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
  }
  h1 {
    margin: 0;
    font-size: 28px;
    letter-spacing: 2px;
    color: #7CFC7C;
    text-shadow: 0 0 12px rgba(124,252,124,0.5);
  }
  #hud {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  #score {
    font-size: 20px;
    font-weight: bold;
    background: #1c1f2b;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #2c3040;
    min-width: 120px;
    text-align: center;
  }
  #score span {
    color: #7CFC7C;
  }
  #board-wrap {
    position: relative;
  }
  #snake {
    background: #12141c;
    border: 2px solid #2c3040;
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    display: block;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    background: rgba(10,10,15,0.75);
    border-radius: 10px;
    font-size: 22px;
    font-weight: bold;
    color: #ff6b6b;
    text-align: center;
  }
  #overlay.show {
    display: flex;
  }
  #controls {
    display: flex;
    gap: 10px;
  }
  button {
    background: #1c1f2b;
    color: #e6e6e6;
    border: 1px solid #2c3040;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover {
    background: #2c3040;
  }
  button:active {
    transform: scale(0.96);
  }
  #hint {
    color: #888;
    font-size: 13px;
  }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="hud">
    <div id="score">Score: <span id="score-val">0</span></div>
  </div>
  <div id="board-wrap">
    <canvas id="snake" width="400" height="400"></canvas>
    <div id="overlay"><div id="overlay-text">Game Over</div></div>
  </div>
  <div id="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
  <div id="hint">Use arrow keys to steer</div>

<script>
(function () {
  const COLS = 20;
  const ROWS = 20;
  const CELL = 20; // 20 * 20 = 400px

  const canvas = document.getElementById('snake');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score-val');
  const overlayEl = document.getElementById('overlay');
  const overlayText = document.getElementById('overlay-text');

  const startBtn = document.getElementById('start');
  const pauseBtn = document.getElementById('pause');
  const resetBtn = document.getElementById('reset');

  const DIRS = {
    up: { x: 0, y: -1 },
    down: { x: 0, y: 1 },
    left: { x: -1, y: 0 },
    right: { x: 1, y: 0 },
  };
  const OPPOSITE = { up: 'down', down: 'up', left: 'right', right: 'left' };

  let snakeArr, dir, nextDir, foodPos, isAlive, scoreVal;
  let timer = null;
  const TICK_MS = 120;

  function initState() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    snakeArr = [[cx, cy], [cx - 1, cy], [cx - 2, cy]];
    dir = 'right';
    nextDir = 'right';
    isAlive = true;
    scoreVal = 0;
    foodPos = randomFreeCell();
  }

  function randomFreeCell() {
    const free = [];
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if (!snakeArr.some(s => s[0] === x && s[1] === y)) {
          free.push([x, y]);
        }
      }
    }
    if (free.length === 0) return [0, 0];
    return free[Math.floor(Math.random() * free.length)];
  }

  function draw() {
    ctx.fillStyle = '#12141c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, ROWS * CELL);
      ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath();
      ctx.moveTo(0, j * CELL);
      ctx.lineTo(COLS * CELL, j * CELL);
      ctx.stroke();
    }

    // food
    if (foodPos) {
      const [fx, fy] = foodPos;
      ctx.fillStyle = '#ff6b6b';
      ctx.beginPath();
      const r = CELL / 2 - 2;
      ctx.arc(fx * CELL + CELL / 2, fy * CELL + CELL / 2, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // snake
    for (let i = snakeArr.length - 1; i >= 0; i--) {
      const [x, y] = snakeArr[i];
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#7CFC7C' : '#4caf50';
      const pad = isHead ? 1 : 2;
      ctx.fillRect(x * CELL + pad, y * CELL + pad, CELL - pad * 2, CELL - pad * 2);
    }

    scoreEl.textContent = String(scoreVal);
    overlayEl.classList.toggle('show', !isAlive);
    if (!isAlive) overlayText.textContent = 'Game Over — Score: ' + scoreVal;
  }

  function setDir(d) {
    if (!DIRS[d]) return;
    if (OPPOSITE[d] === dir) return; // ignore 180 reversal
    nextDir = d;
  }

  function tick() {
    if (!isAlive) return;

    dir = nextDir;
    const v = DIRS[dir];
    const head = snakeArr[0];
    const newHead = [head[0] + v.x, head[1] + v.y];

    // wall collision
    if (newHead[0] < 0 || newHead[0] >= COLS || newHead[1] < 0 || newHead[1] >= ROWS) {
      isAlive = false;
      stopLoop();
      draw();
      return;
    }

    const eating = foodPos && newHead[0] === foodPos[0] && newHead[1] === foodPos[1];

    // self collision — tail cell moves away unless we're growing this tick
    const bodyToCheck = eating ? snakeArr : snakeArr.slice(0, -1);
    if (bodyToCheck.some(s => s[0] === newHead[0] && s[1] === newHead[1])) {
      isAlive = false;
      stopLoop();
      draw();
      return;
    }

    snakeArr.unshift(newHead);
    if (eating) {
      scoreVal++;
      foodPos = randomFreeCell();
    } else {
      snakeArr.pop();
    }

    draw();
  }

  function startLoop() {
    if (timer || !isAlive) return;
    timer = setInterval(tick, TICK_MS);
  }

  function stopLoop() {
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
  }

  function reset() {
    stopLoop();
    initState();
    draw();
  }

  startBtn.addEventListener('click', startLoop);
  pauseBtn.addEventListener('click', stopLoop);
  resetBtn.addEventListener('click', reset);

  window.addEventListener('keydown', (e) => {
    const map = {
      ArrowUp: 'up',
      ArrowDown: 'down',
      ArrowLeft: 'left',
      ArrowRight: 'right',
    };
    const d = map[e.key];
    if (d) {
      e.preventDefault();
      setDir(d);
    }
  });

  initState();
  draw();

  window.game = {
    w: COLS,
    h: ROWS,
    reset() {
      reset();
    },
    tick() {
      tick();
    },
    setDir(d) {
      setDir(d);
    },
    setFood(x, y) {
      foodPos = [x, y];
      draw();
    },
    snake() {
      return snakeArr.map(s => [s[0], s[1]]);
    },
    food() {
      return foodPos ? [foodPos[0], foodPos[1]] : null;
    },
    alive() {
      return isAlive;
    },
    score() {
      return scoreVal;
    },
  };
})();
</script>
</body>
</html>
