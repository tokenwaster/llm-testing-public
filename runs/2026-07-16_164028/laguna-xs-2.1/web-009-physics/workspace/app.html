<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bouncing Ball Physics Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #sim {
    border: 2px solid #444;
    background: #222;
    cursor: crosshair;
  }
  .controls {
    margin-bottom: 15px;
  }
  button {
    background: #333;
    color: #fff;
    border: 1px solid #555;
    padding: 10px 20px;
    margin: 0 5px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    background: #555;
  }
  button:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>
  <div class="controls">
    <button id="drop">Drop</button>
    <button id="play">Play</button>
    <button id="clear">Clear</button>
  </div>
  <canvas id="sim" width="400" height="400"></canvas>

<script>
  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  let balls = [];
  let playing = false;
  let animationId = null;

  window.sim = {
    w: W,
    h: H,
    balls: () => balls.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy, r: b.r })),
    addBall(x, y, vx = 0, vy = 0, r = 20) {
      balls.push({ x, y, vx, vy, r });
    },
    clear() {
      balls = [];
      redraw();
    },
    step(dt = 1) {
      const gravity = 0.5;
      const restitution = 0.8;
      
      for (const ball of balls) {
        ball.vy += gravity * dt;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Left wall
        if (ball.x - ball.r < 0) {
          ball.x = ball.r;
          ball.vx = -ball.vx * restitution;
        }
        // Right wall
        else if (ball.x + ball.r > W) {
          ball.x = W - ball.r;
          ball.vx = -ball.vx * restitution;
        }

        // Top wall
        if (ball.y - ball.r < 0) {
          ball.y = ball.r;
          ball.vy = -ball.vy * restitution;
        }
        // Bottom wall
        else if (ball.y + ball.r > H) {
          ball.y = H - ball.r;
          ball.vy = -ball.vy * restitution;
        }
      }
      redraw();
    }
  };

  function redraw() {
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, W, H);
    
    ctx.fillStyle = '#fff';
    for (const ball of balls) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    sim.addBall(x, y);
  });

  document.getElementById('drop').addEventListener('click', () => {
    sim.addBall(W / 2, 0);
  });

  document.getElementById('play').addEventListener('click', () => {
    playing = !playing;
    if (playing) {
      function loop() {
        sim.step();
        animationId = requestAnimationFrame(loop);
      }
      loop();
    } else if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
  });

  document.getElementById('clear').addEventListener('click', () => {
    sim.clear();
  });

  // Initial redraw
  redraw();
</script>
</body>
</html>
