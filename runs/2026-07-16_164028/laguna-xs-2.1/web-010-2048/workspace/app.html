<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>2048</title>
  <style>
    body {
      background: #1c1c1c;
      color: #f9f6f2;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 5px;
      width: 400px;
      height: 400px;
      background: #bbada0;
      border-radius: 3px;
      padding: 5px;
    }
    .tile {
      background: #cdc9b2;
      border: none;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: #776e65;
    }
    #score {
      margin-top: 20px;
      font-size: 24px;
    }
    #reset {
      margin-top: 20px;
      padding: 10px 20px;
      background: #3e3e3e;
      color: #f9f6f2;
      border: none;
      border-radius: 3px;
      font-size: 18px;
      cursor: pointer;
    }
    #reset:hover {
      background: #5a5a5a;
    }
  </style>
</head>
<body>
  <div id="board"></div>
  <div id="score">Score: 0</div>
  <button id="reset">Reset</button>
  <script>
    let board = [];
    let score = 0;

    function deepEqual(a, b) {
      if (a === b) return true;
      if (a === null || b === null) return false;
      if (typeof a !== 'object' || typeof b !== 'object') return false;
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (!deepEqual(a[i], b[i])) return false;
      }
      return true;
    }

    function getTileColor(val) {
      if (val === 0) return '';
      const exp = Math.log2(val);
      const colors = [
        '#eee4de',
        '#ede0c8',
        '#edc07d',
        '#edaa6d',
        '#f59563',
        '#f67c5f',
        '#f65e3b',
        '#edcf72',
        '#edcc61',
        '#f8cc61',
        '#f8cc61'
      ];
      const index = exp - 1;
      return colors[index] || '#cdc9b2';
    }

    function processRowLeft(row) {
      let newRow = [];
      let last = null;
      for (let val of row) {
        if (val === 0) continue;
        if (newRow.length === 0) {
          newRow.push(val);
          last = val;
        } else {
          if (val === last) {
            newRow[newRow.length - 1] *= 2;
            score += newRow[newRow.length - 1];
            last = null;
          } else {
            newRow.push(val);
            last = val;
          }
        }
      }
      while (newRow.length < 4) {
        newRow.push(0);
      }
      return newRow;
    }

    function processRowRight(row) {
      let reversed = row.slice().reverse();
      let processed = processRowLeft(reversed);
      return processed.slice().reverse();
    }

    function addRandomTile() {
      let empty = [];
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          if (board[i][j] === 0) empty.push([i, j]);
        }
      }
      if (empty.length === 0) return;
      let pos = empty[Math.floor(Math.random() * empty.length)];
      board[pos[0]][pos[1]] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          const cell = document.createElement('div');
          cell.className = 'tile';
          const val = board[i][j];
          cell.textContent = val === 0 ? '' : val;
          if (val !== 0) {
            cell.style.backgroundColor = getTileColor(val);
          }
          boardEl.appendChild(cell);
        }
      }
      document.getElementById('score').textContent = 'Score: ' + score;
    }

    window.game = {
      size: 4,
      reset() {
        board = Array(4).fill().map(() => Array(4).fill(0));
        score = 0;
        addRandomTile();
        addRandomTile();
      },
      move(dir) {
        let original = JSON.parse(JSON.stringify(board));
        let changed = false;

        if (dir === 'left' || dir === 'right') {
          for (let i = 0; i < 4; i++) {
            let row = board[i];
            let newRow;
            if (dir === 'left') {
              newRow = processRowLeft(row);
            } else {
              newRow = processRowRight(row);
            }
            board[i] = newRow;
          }
        } else {
          for (let j = 0; j < 4; j++) {
            let col = [];
            for (let i = 0; i < 4; i++) {
              col.push(board[i][j]);
            }
            let newCol;
            if (dir === 'up') {
              newCol = processRowLeft(col);
            } else {
              newCol = processRowRight(col);
            }
            for (let i = 0; i < 4; i++) {
              board[i][j] = newCol[i];
            }
          }
        }

        changed = !deepEqual(board, original);

        if (changed) {
          addRandomTile();
        }

        return changed;
      },
      board() {
        return board;
      },
      setBoard(arr) {
        board = arr;
      },
      score() {
        return score;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      window.game.reset();
      render();

      document.getElementById('reset').addEventListener('click', () => {
        window.game.reset();
        render();
      });

      document.addEventListener('keydown', (e) => {
        let dir;
        switch (e.key) {
          case 'ArrowLeft': dir = 'left'; break;
          case 'ArrowRight': dir = 'right'; break;
          case 'ArrowUp': dir = 'up'; break;
          case 'ArrowDown': dir = 'down'; break;
          default: return;
        }
        const moved = window.game.move(dir);
        if (moved) {
          render();
        }
      });
    });
  </script>
</body>
</html>
