<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #a0a0ff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    #life {
      border: 2px solid #444;
      background: #111;
      cursor: crosshair;
      image-rendering: pixelated;
    }
    .controls {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }
    button {
      background: #222;
      color: #a0a0ff;
      border: 1px solid #444;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    button:hover {
      background: #333;
      color: #fff;
    }
    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <canvas id="life" width="500" height="500"></canvas>
  <div class="controls">
    <button id="step">Step</button>
    <button id="play">Play</button>
    <button id="random">Random</button>
    <button id="clear">Clear</button>
  </div>
  <script>
    const canvas = document.getElementById('life');
    const ctx = canvas.getContext('2d');
    const w = 50, h = 50;
    const cellSize = canvas.width / w;
    let grid = new Array(w * h).fill(0);
    let isDragging = false;
    let isPlaying = false;
    let intervalId = null;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (grid[y * w + x]) {
            ctx.fillStyle = '#00ff99';
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
          }
        }
      }
    }

    function countNeighbors(x, y) {
      let count = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          const nx = x + dx;
          const ny = y + dy;
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            count += grid[ny * w + nx];
          }
        }
      }
      return count;
    }

    window.life = {
      w, h,
      get(x, y) {
        if (x < 0 || x >= w || y < 0 || y >= h) return 0;
        return grid[y * w + x];
      },
      set(x, y, v) {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        grid[y * w + x] = v ? 1 : 0;
        draw();
      },
      step() {
        const nextGrid = new Array(w * h).fill(0);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const current = grid[y * w + x];
            const neighbors = countNeighbors(x, y);
            if (current) {
              nextGrid[y * w + x] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
            } else {
              nextGrid[y * w + x] = (neighbors === 3) ? 1 : 0;
            }
          }
        }
        grid = nextGrid;
        draw();
      },
      clear() {
        grid.fill(0);
        draw();
      }
    };

    function toggleCell(e) {
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / cellSize);
      const y = Math.floor((e.clientY - rect.top) / cellSize);
      if (x >= 0 && x < w && y >= 0 && y < h) {
        const idx = y * w + x;
        grid[idx] = grid[idx] ? 0 : 1;
        draw();
      }
    }

    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      toggleCell(e);
    });

    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) toggleCell(e);
    });

    canvas.addEventListener('mouseup', () => {
      isDragging = false;
    });

    document.getElementById('step').addEventListener('click', () => {
      window.life.step();
    });

    document.getElementById('play').addEventListener('click', () => {
      if (!isPlaying) {
        isPlaying = true;
        intervalId = setInterval(() => window.life.step(), 100);
      } else {
        clearInterval(intervalId);
        isPlaying = false;
      }
    });

    document.getElementById('random').addEventListener('click', () => {
      for (let i = 0; i < w * h; i++) {
        grid[i] = Math.random() < 0.2 ? 1 : 0;
      }
      draw();
    });

    document.getElementById('clear').addEventListener('click', () => {
      window.life.clear();
    });

    draw();
  </script>
</body>
</html>
