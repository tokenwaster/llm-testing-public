<!DOCTYPE html>
<html>
<head>
  <title>Sorting Visualizer</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: sans-serif;
    }

    #container {
      width: 80%;
      margin: 20px auto;
    }

    #bars {
      display: flex;
      height: 100px;
    }

    .bar {
      background-color: #ddd;
      height: 0%; /* Initial height */
      width: 30px;
      margin: 0 5px;
      box-sizing: border-box;
      border: 1px solid #666;
    }

    button {
      background-color: #333;
      color: #f0f0f0;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>Sorting Visualizer</h1>
    <div id="bars"></div>
    <div>
      <button id="sort">Animate Sort</button>
      <button id="shuffle">Shuffle Array</button>
      <button id="reset">Reset</button>
    </div>
  </div>

  <script>
    const arrayLength = 10;
    let arr = [];
    let barHeights = [];

    function init() {
      arr = Array.from({ length: arrayLength }, () => Math.floor(Math.random() * 100));
      renderBars();
    }

    function renderBars() {
      const barsDiv = document.getElementById('bars');
      barsDiv.innerHTML = ''; // Clear existing bars

      barHeights = [];
      for (let i = 0; i < arr.length; i++) {
        const barHeight = (arr[i] / 100) * 100;
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.height = `${barHeight}%`;
        barsDiv.appendChild(bar);
        barHeights.push(barHeight);
      }
    }

    function sortStep() {
      if (arr.length <= 1) return true;

      // Bubble Sort implementation for animation
      let swapped = false;
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] > arr[i + 1]) {
          const temp = arr[i];
          arr[i] = arr[i + 1];
          arr[i + 1] = temp;
          swapped = true;
        }
      }

      if (!swapped) return true; // Array is sorted

      renderBars();
      return false;
    }


    function sorted() {
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] > arr[i + 1]) {
          return false;
        }
      }
      return true;
    }

    window.viz = {
      array: function() { return [...arr]; },
      setArray: function(a) { arr = a; renderBars(); },
      sortStep: sortStep,
      sorted: sorted,
    };


    document.getElementById('shuffle').addEventListener('click', () => {
      arr = Array.from({ length: arrayLength }, () => Math.floor(Math.random() * 100));
      renderBars();
    });

    document.getElementById('reset').addEventListener('click', init);

    document.getElementById('sort').addEventListener('click', () => {
      if (!sorted()) {
        sortStep();
      }
    });

    init();
  </script>
</body>
</html>
