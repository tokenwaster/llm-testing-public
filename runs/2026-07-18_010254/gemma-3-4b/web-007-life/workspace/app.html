<!DOCTYPE html>
<html>
<head>
  <title>Conway's Game of Life</title>
  <style>
    body {
      background-color: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #life {
      border: 1px solid #333;
      margin-bottom: 20px;
      background-color: #282c34;
    }

    .cell {
      width: 10px;
      height: 10px;
      display: inline-block;
      box-sizing: border-box;
    }

    .alive {
      background-color: #ddd;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
      margin: 5px;
    }

    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <h1>Conway's Game of Life</h1>

  <canvas id="life" width="400" height="400"></canvas>

  <button id="step">Step</button>
  <button id="play">Play</button>
  <button id="random">Randomize</button>
  <button id="clear">Clear</button>

  <script>
    const w = 40;
    const h = 40;
    const grid = [];
    let running = false;

    function get(x, y) {
      if (x < 0 || x >= w || y < 0 || y >= h) {
        return 0;
      }
      return grid[y * w + x];
    }

    function set(x, y, v) {
      if (x < 0 || x >= w || y < 0 || y >= h) return;
      grid[y * w + x] = v;
    }

    function step() {
      const nextGrid = [];
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          let liveNeighbors = 0;
          for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
              if (i === 0 && j === 0) continue;
              liveNeighbors += get(x + i, y + j);
            }
          }

          nextGrid[y * w + x] = (get(x, y) === 1) ? (liveNeighbors === 2 || liveNeighbors === 3) : (liveNeighbors === 3);
        }
      }

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          set(x, y, nextGrid[y * w + x]);
        }
      }
      draw();
    }

    function clear() {
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          set(x, y, 0);
        }
      }
      draw();
    }


    function draw() {
      const ctx = document.getElementById('life').getContext('2d');
      ctx.clearRect(0, 0, w * 10, h * 10); // Clear the canvas

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (get(x, y) === 1) {
            ctx.fillStyle = '#ddd';
            ctx.fillRect(x * 10, y * 10, 10, 10);
          }
        }
      }
    }

    document.getElementById('step').addEventListener('click', step);
    document.getElementById('play').addEventListener('click', () => {
      running = !running;
    });
    document.getElementById('random').addEventListener('click', () => {
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          set(x, y, Math.round(Math.random()));
        }
      }
      draw();
    });
    document.getElementById('clear').addEventListener('click', clear);

    // Initial grid setup (example)
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        set(x, y, Math.random() < 0.2 ? 1 : 0); // Random initial state
      }
    }
    draw();

    window.life = {
      w: w,
      h: h,
      get: get,
      set: set,
      step: step,
      clear: clear
    };
  </script>
</body>
</html>
