<!DOCTYPE html>
<html>
<head>
  <title>Bouncing Ball Playground</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: sans-serif;
      margin: 0;
      overflow: hidden; /* Hide scrollbars */
    }

    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #333;
      padding: 10px;
      border-radius: 5px;
      z-index: 10;
    }

    #drop {
      margin-right: 10px;
      padding: 5px 10px;
      background-color: #555;
      color: #f0f0f0;
      border: none;
      cursor: pointer;
      border-radius: 3px;
    }

    #play {
      padding: 5px 10px;
      background-color: #555;
      color: #f0f0f0;
      border: none;
      cursor: pointer;
      border-radius: 3px;
    }

    #clear {
      padding: 5px 10px;
      background-color: #555;
      color: #f0f0f0;
      border: none;
      cursor: pointer;
      border-radius: 3px;
    }

    #sim {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 400px;
      border: 1px solid #555;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button id="drop">Drop Ball</button>
    <button id="play">Play</button>
    <button id="clear">Clear</button>
  </div>

  <canvas id="sim"></canvas>

  <script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const dropButton = document.getElementById('drop');
    const playButton = document.getElementById('play');
    const clearButton = document.getElementById('clear');

    let balls = [];
    const w = canvas.width;
    const h = canvas.height;
    const gravity = 0.5;
    const restitution = 0.9;

    window.sim = {
      w,
      h,
      balls: () => [...balls],
      addBall(x, y, vx = 0, vy = 0, r = 10) {
        balls.push({ x, y, vx, vy, r });
      },
      clear() {
        balls = [];
      },
      step(dt = 1) {
        for (const ball of balls) {
          ball.vy += gravity * dt;

          // Bounce off floor
          if (ball.y + ball.r > h) {
            ball.y = h - ball.r;
            ball.vy *= -restitution;
          }

          // Bounce off walls
          if (ball.x - ball.r < 0) {
            ball.x = ball.r;
            ball.vx *= -1;
          }
          if (ball.x + ball.r > w) {
            ball.x = w - ball.r;
            ball.vx *= -1;
          }
          if (ball.y - ball.r < 0) {
            ball.y = ball.r;
            ball.vy *= -1;
          }
        }

        ctx.clearRect(0, 0, w, h);
        for (const ball of balls) {
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
          ctx.fillStyle = '#ff6';
          ctx.fill();
          ctx.closePath();
        }
      },
    };

    dropButton.addEventListener('click', () => {
      const x = Math.random() * (w - 20);
      const y = Math.random() * (h - 20);
      const vx = (Math.random() - 0.5) * 3; // Random velocity
      const vy = -5; // Initial downward velocity
      window.sim.addBall(x, y, vx, vy);
    });

    playButton.addEventListener('click', () => {
      window.sim.step();
      requestAnimationFrame(() => window.sim.step());
    });

    clearButton.addEventListener('click', () => {
      window.sim.clear();
    });
  </script>
</body>
</html>
