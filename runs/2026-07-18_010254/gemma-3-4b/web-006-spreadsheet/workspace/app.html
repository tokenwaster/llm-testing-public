<!DOCTYPE html>
<html>
<head>
<title>Mini Spreadsheet</title>
<style>
table {
  border-collapse: collapse;
}

td {
  width: 50px;
  height: 30px;
  text-align: center;
  font-size: 16px;
  border: 1px solid black;
}

input[type="text"] {
  width: 46px;
  height: 26px;
  box-sizing: border-box;
}

button {
  padding: 5px 10px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<table>
  <tbody>
    <tr>
      <th>A</th>
      <th>B</th>
      <th>C</th>
      <th>D</th>
      <th>E</th>
      <th>F</th>
      <th>G</th>
      <th>H</th>
      <th>I</th>
      <th>J</th>
    </tr>
    <tr>
      <td><input type="text" id="cell-A1" value="1"></td>
      <td><input type="text" id="cell-B1" value="2"></td>
      <td><input type="text" id="cell-C1" value="3"></td>
      <td><input type="text" id="cell-D1" value="4"></td>
      <td><input type="text" id="cell-E1" value="5"></td>
      <td><input type="text" id="cell-F1" value="6"></td>
      <td><input type="text" id="cell-G1" value="7"></td>
      <td><input type="text" id="cell-H1" value="8"></td>
      <td><input type="text" id="cell-I1" value="9"></td>
      <td><input type="text" id="cell-J1" value="10"></td>
    </tr>
    <tr>
      <td><input type="text" id="cell-A2" value="=A1+B1"></td>
      <td><input type="text" id="cell-B2" value="=C1*2"></td>
      <td><input type="text" id="cell-C2" value="=A1-D1"></td>
      <td><input type="text" id="cell-D2" value="=E1+F1"></td>
      <td><input type="text" id="cell-E2" value="=G1/H1"></td>
      <td><input type="text" id="cell-F2" value="=I1*J1"></td>
      <td><input type="text" id="cell-G2" value="=(A1+B1)*C1"></td>
      <td><input type="text" id="cell-H2" value="=D1+E1"></td>
      <td><input type="text" id="cell-I2" value="=F2-G2"></td>
      <td><input type="text" id="cell-J2" value="=A1*B1+C1"></td>
    </tr>
    <tr>
      <td><input type="text" id="cell-A3" value="11"></td>
      <td><input type="text" id="cell-B3" value="12"></td>
      <td><input type="text" id="cell-C3" value="13"></td>
      <td><input type="text" id="cell-D3" value="14"></td>
      <td><input type="text" id="cell-E3" value="15"></td>
      <td><input type="text" id="cell-F3" value="16"></td>
      <td><input type="text" id="cell-G3" value="17"></td>
      <td><input type="text" id="cell-H3" value="18"></td>
      <td><input type="text" id="cell-I3" value="19"></td>
      <td><input type="text" id="cell-J3" value="20"></td>
    </tr>
    <tr>
      <td><input type="text" id="cell-A4" value="=A3+B3"></td>
      <td><input type="text" id="cell-B4" value="=C3*D3"></td>
      <td><input type="text" id="cell-C4" value="=A3-E3"></td>
      <td><input type="text" id="cell-D4" value="=F3+G3"></td>
      <td><input type="text" id="cell-E4" value="=H3/I3"></td>
      <td><input type="text" id="cell-F4" value="=J3*K3"></td>
      <td><input type="text" id="cell-G4" value="=(A3+B3)*C3"></td>
      <td><input type="text" id="cell-H4" value="=D3+E3"></td>
      <td><input type="text" id="cell-I4" value="=F4-G4"></td>
      <td><input type="text" id="cell-J4" value="=A3*B3+C3"></td>
    </tr>
     <tr>
      <td><input type="text" id="cell-A5" value="21"></td>
      <td><input type="text" id="cell-B5" value="22"></td>
      <td><input type="text" id="cell-C5" value="23"></td>
      <td><input type="text" id="cell-D5" value="24"></td>
      <td><input type="text" id="cell-E5" value="25"></td>
      <td><input type="text" id="cell-F5" value="26"></td>
      <td><input type="text" id="cell-G5" value="27"></td>
      <td><input type="text" id="cell-H5" value="28"></td>
      <td><input type="text" id="cell-I5" value="29"></td>
      <td><input type="text" id="cell-J5" value="30"></td>
    </tr>
  </tbody>
</table>

<button id="export">Export CSV</button>
<textarea id="csv" rows="10" cols="80"></textarea>

<script>
const cells = document.querySelectorAll('input[type="text"]');
const exportButton = document.getElementById('export');
const csvTextarea = document.getElementById('csv');

function updateCellValues() {
  cells.forEach(cell => {
    const id = cell.id;
    let formula = cell.rawValue();
    if (formula && formula.startsWith("=")) {
      try {
        // Evaluate the formula and set the displayed value
        const result = eval(formula);
        cell.setDisplayValue(result);
      } catch (error) {
        cell.setDisplayValue("#ERR");
      }
    } else {
      // If no formula, display the raw text
      cell.setDisplayValue(formula);
    }
  });
}

function handleCellEdit(event) {
  const cell = event.target;
  const newValue = cell.value();
  cell.setRawValue(newValue); // Update the raw value for evaluation
  updateCellValues();
}

cells.forEach(cell => {
  cell.addEventListener('click', () => {
    cell.setDisplayValue(cell.rawValue());
  });
  cell.addEventListener('input', handleCellEdit);
});

exportButton.addEventListener('click', () => {
  const csvRows = [];
  for (let i = 1; i <= 10; i++) {
    const row = Array(10).fill("");
    for (let j = 1; j <= 10; j++) {
      const cellId = `cell-${i}-${j}`;
      const cell = document.getElementById(cellId);
      if (cell) {
        row[j - 1] = cell.setDisplayValue(); // Get the displayed value
      }
    }
    csvRows.push(row.join(","));
  }
  csvTextarea.value = csvRows.join("\n");
});

// Initialize cell values and update immediately
updateCellValues();
</script>
</body>
</html>
