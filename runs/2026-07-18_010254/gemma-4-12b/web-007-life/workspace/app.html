<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conway's Game of Life</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00ff88;
            --text: #e0e0e0;
            --button-hover: #00cc6d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; }

        #life {
            border: 2px solid #333;
            background-color: #000;
            cursor: crosshair;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-2px);
        }

        button:active { transform: translateY(0); }

        .stats {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GAME OF LIFE</h1>
    <canvas id="life" width="500" height="500"></canvas>
    <div class="controls">
        <button id="step">Step</button>
        <button id="play">Play</button>
        <button id="random">Random</button>
        <button id="clear">Clear</button>
    </div>
    <div class="stats">Click/Drag to paint cells</div>
</div>

<script>
    const canvas = document.getElementById('life');
    const ctx = canvas.getContext('2d');
    const btnStep = document.getElementById('step');
    const btnPlay = document.getElementById('play');
    const btnRandom = document.getElementById('random');
    const btnClear = document.getElementById('clear');

    // Configuration
    const w = 50; // Grid width (>=40)
    const h = 50; // Grid height (>=40)
    const cellSize = canvas.width / w;
    
    let grid = Array(h).fill().map(() => Array(w).fill(0));
    let isPlaying = false;
    let animationId = null;

    // --- Simulation Logic ---

    function get(x, y) {
        if (x < 0 || x >= w || y < 0 || y >= h) return 0;
        return grid[y][x];
    }

    function set(x, y, v) {
        if (x >= 0 && x < w && y >= 0 && y < h) {
            grid[y][x] = v ? 1 : 0;
            draw();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                if (grid[y][x] === 1) {
                    ctx.fillStyle = '#00ff88';
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
                }
            }
        }
    }

    function step() {
        const nextGrid = Array(h).fill().map(() => Array(w).fill(0));
        
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                let neighbors = 0;
                // Check 8 surrounding cells
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        neighbors += get(x + dx, y + dy);
                    }
                }

                const currentState = grid[y][x];
                // B3/S23 Rules
                if (currentState === 1) {
                    nextGrid[y][x] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
                } else {
                    nextGrid[y][x] = (neighbors === 3) ? 1 : 0;
                }
            }
        }
        grid = nextGrid;
        draw();
    }

    function clear() {
        grid = Array(h).fill().map(() => Array(w).fill(0));
        draw();
    }

    function randomize() {
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                grid[y][x] = Math.random() > 0.85 ? 1 : 0;
            }
        }
        draw();
    }

    // --- API Exposure ---
    window.life = {
        w, h,
        get,
        set,
        step,
        clear
    };

    // --- Interaction & Loop ---

    function loop() {
        if (isPlaying) {
            step();
            setTimeout(() => {
                animationId = requestAnimationFrame(loop);
            }, 60); // Control speed slightly for visibility
        }
    }

    btnStep.addEventListener('click', () => {
        isPlaying = false;
        step();
    });

    btnPlay.addEventListener('click', () => {
        isPlaying = !isPlaying;
        btnPlay.textContent = isPlaying ? "Pause" : "Play";
        if (isPlaying) loop();
    });

    btnRandom.addEventListener('click', randomize);
    btnClear.addEventListener('click', clear);

    // Mouse Interaction
    let isDrawing = false;

    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / (rect.width / w));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / h));
        if (x >= 0 && x < w && y >= 0 && y < h) {
            set(x, y, true);
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        handleInput(e);
    });

    window.addEventListener('mousemove', (e) => {
        if (isDrawing) handleInput(e);
    });

    window.addEventListener('mouseup', () => {
        isDrawing = false;
    });

    // Initial Draw
    draw();
</script>

</body>
</html>
