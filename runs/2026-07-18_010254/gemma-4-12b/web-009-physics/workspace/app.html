<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Physics Playground</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        button:active {
            background-color: #666;
        }

        #sim-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #333;
            line-height: 0;
        }

        canvas {
            background-color: #1a1a1a;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="drop">Drop Ball</button>
        <button id="play">Pause/Play</button>
        <button id="clear">Clear All</button>
    </div>

    <div id="sim-container">
        <canvas id="sim" width="600" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sim');
        const ctx = canvas.getContext('2d');
        const dropBtn = document.getElementById('drop');
        const playBtn = document.getElementById('play');
        const clearBtn = document.getElementById('clear');

        // Physics Constants
        const GRAVITY = 0.4;
        const RESTITUTION = 0.8; // Energy loss on bounce
        let isRunning = true;
        let balls = [];

        /**
         * Programmatic API Implementation
         */
        window.sim = {
            w: canvas.width,
            h: canvas.height,

            balls() {
                return balls;
            },

            addBall(x, y, vx = 0, vy = 0, r = 15) {
                // Ensure ball is fully inside on creation
                const safeX = Math.max(r, Math.min(this.w - r, x));
                const safeY = Math.max(r, Math.min(this.h - r, y));
                balls.push({ x: safeX, y: safeY, vx, vy, r });
            },

            clear() {
                balls = [];
            },

            step(dt = 1) {
                // Update Physics
                for (let i = 0; i < balls.length; i++) {
                    const b = balls[i];

                    // Apply Gravity
                    b.vy += GRAVITY * dt;

                    // Move
                    b.x += b.vx * dt;
                    b.y += b.vy * dt;

                    // Floor Collision
                    if (b.y + b.r > this.h) {
                        b.y = this.h - b.r;
                        b.vy *= -RESTITUTION;
                    } 
                    // Ceiling Collision
                    else if (b.y - b.r < 0) {
                        b.y = b.r;
                        b.vy *= -RESTITUTION;
                    }

                    // Right Wall Collision
                    if (b.x + b.r > this.w) {
                        b.x = this.w - b.r;
                        b.vx *= -RESTITUTION;
                    } 
                    // Left Wall Collision
                    else if (b.x - b.r < 0) {
                        b.x = b.r;
                        b.vx *= -RESTITUTION;
                    }
                }

                // Render
                this.draw();
            },

            draw() {
                ctx.clearRect(0, 0, this.w, this.h);
                balls.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a90e2';
                    ctx.fill();
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.closePath();
                });
            }
        };

        // Interaction Logic
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            window.sim.addBall(x, y, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
        });

        dropBtn.addEventListener('click', () => {
            const x = Math.random() * (window.sim.w - 40) + 20;
            const y = 50;
            window.sim.addBall(x, y, (Math.random() - 0.5) * 10, 0);
        });

        playBtn.addEventListener('click', () => {
            isRunning = !isRunning;
        });

        clearBtn.addEventListener('click', () => {
            window.sim.clear();
        });

        // Main Loop
        function loop() {
            if (isRunning) {
                window.sim.step(1);
            }
            requestAnimationFrame(loop);
        }

        // Initial Draw
        window.sim.draw();
        loop();
    </script>
</body>
</html>
