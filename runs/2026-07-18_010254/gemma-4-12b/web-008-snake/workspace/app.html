<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            position: relative;
        }

        #score {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: bold;
            color: #4caf50;
        }

        canvas {
            border: 4px solid #333;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        button:active {
            transform: translateY(2px);
        }

        #start { background-color: #2e7d32; }
        #pause { background-color: #f57c00; }
        #reset { background-color: #c62828; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score">Score: 0</div>
        <canvas id="snake" width="400" height="400"></canvas>
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snake');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const resetBtn = document.getElementById('reset');

        // Configuration
        const gridCount = 20; // 20x20 cells
        const cellSize = canvas.width / gridCount;

        // Game State
        let snake = [];
        let food = [0, 0];
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let isAlive = false;
        let gameInterval = null;

        /**
         * Programmatic API for grading
         */
        window.game = {
            w: gridCount,
            h: gridCount,

            reset() {
                // Initial snake length >= 3
                snake = [
                    {x: 10, y: 10},
                    {x: 9, y: 10},
                    {x: 8, y: 10}
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                isAlive = true;
                spawnFood();
                updateUI();
                draw();
            },

            tick() {
                if (!isAlive) return;

                // Update direction from queue
                direction = nextDirection;

                const head = { ...snake[0] };

                // Move head
                if (direction === 'up') head.y -= 1;
                if (direction === 'down') head.y += 1;
                if (direction === 'left') head.x -= 1;
                if (direction === 'right') head.x += 1;

                // Wall collision
                if (head.x < 0 || head.x >= this.w || head.y < 0 || head.y >= this.h) {
                    isAlive = false;
                    updateUI();
                    draw();
                    return;
                }

                // Self collision
                for (let i = 0; i < snake.length; i++) {
                    if (head.x === snake[i].x && head.y === snake[i].y) {
                        isAlive = false;
                        updateUI();
                        draw();
                        return;
                    }
                }

                // Food collision
                if (head.x === food[0] && head.y === food[1]) {
                    score++;
                    // Grow: don't pop the tail
                    snake.unshift(head);
                    spawnFood();
                } else {
                    // Move body
                    snake.unshift(head);
                    snake.pop();
                }

                updateUI();
                draw();
            },

            setDir(dir) {
                const opposites = {
                    'up': 'down',
                    'down': 'up',
                    'left': 'right',
                    'right': 'left'
                };
                // Ignore 180 degree reversals
                if (dir !== opposites[direction]) {
                    nextDirection = dir;
                }
            },

            setFood(x, y) {
                food = [x, y];
                draw();
            },

            snake() {
                return snake.map(p => [p.x, p.y]);
            },

            food() {
                return food;
            },

            alive() {
                return isAlive;
            },

            score() {
                return score;
            }
        };

        function spawnFood() {
            let newFood;
            while (true) {
                newFood = [Math.floor(Math.random() * window.game.w), 
                           Math.floor(Math.random() * window.game.h)];
                // Ensure food doesn't spawn on snake body
                const onSnake = snake.some(part => part.x === newFood[0] && part.y === newFood[1]);
                if (!onSnake) break;
            }
            food = newFood;
        }

        function updateUI() {
            scoreEl.innerText = `Score: ${score}`;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw food
            ctx.fillStyle = '#ff5252';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff5252';
            ctx.fillRect(food[0] * cellSize + 2, food[1] * cellSize + 2, cellSize - 4, cellSize - 4);

            // Draw snake
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#4caf50';
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#8bc34a' : '#4caf50';
                ctx.fillRect(part.x * cellSize + 1, part.y * cellSize + 1, cellSize - 2, cellSize - 2);
            });
            ctx.shadowBlur = 0;

            if (!isAlive && score !== 0) {
                ctx.fillStyle = 'white';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            }
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': window.game.setDir('up'); break;
                case 'ArrowDown': window.game.setDir('down'); break;
                case 'ArrowLeft': window.game.setDir('left'); break;
                case 'ArrowRight': window.game.setDir('right'); break;
            }
        });

        // Button Logic
        startBtn.addEventListener('click', () => {
            if (gameInterval) return;
            if (!isAlive) window.game.reset();
            gameInterval = setInterval(() => window.game.tick(), 100);
        });

        pauseBtn.addEventListener('click', () => {
            clearInterval(gameInterval);
            gameInterval = null;
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(gameInterval);
            gameInterval = null;
            window.game.reset();
        });

        // Initial State
        window.game.reset();
    </script>
</body>
</html>
