<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',system-ui,sans-serif;}

#desktop{
  width:100vw;height:100vh;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 80% 60% at 20% 80%, rgba(124,58,237,.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(220,38,127,.25) 0%, transparent 55%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #1e1b2e 0%, #0d0b1a 100%);
}

/* subtle grid overlay */
#desktop::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}

/* ── TASKBAR ── */
#taskbar{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:rgba(15,12,28,.88);backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;gap:10px;
  z-index:500;
}

.launcher-btn{
  width:46px;height:46px;border-radius:13px;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:transform .15s,box-shadow .15s;
  position:relative;
}
.launcher-btn::after{
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:#7c3aed;
  opacity:0;transition:opacity .15s;
}
.launcher-btn.active::after{opacity:1;}
#open-files{background:linear-gradient(135deg,#f59e0b,#ef4444);}
#open-notepad{background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
.launcher-btn:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(0,0,0,.5);}
.launcher-btn:active{transform:translateY(-2px);}

/* ── WINDOW BASE ── */
.window{
  position:absolute;
  min-width:360px;min-height:240px;
  background:#1e1c2e;
  border-radius:11px;
  box-shadow:0 24px 64px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;
  transition:box-shadow .15s;
}
.window:focus-within{box-shadow:0 28px 72px rgba(0,0,0,.75),0 0 0 1px rgba(124,58,237,.35);}

.titlebar{
  height:38px;background:#2a2640;
  display:flex;align-items:center;padding:0 12px;
  cursor:move;user-select:none;flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,.4);gap:8px;
}
.tbar-btns{display:flex;gap:6px;align-items:center;}
.win-close{
  width:13px;height:13px;border-radius:50%;
  background:#ff5f57;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:0;color:#820000;transition:font-size .1s;flex-shrink:0;
}
.win-close:hover{font-size:8px;}
.tbar-min,.tbar-max{
  width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;
}
.tbar-min{background:#febc2e;}
.tbar-max{background:#28c840;}
.tbar-title{
  flex:1;text-align:center;font-size:12.5px;font-weight:500;
  color:#b0a8cc;letter-spacing:.3px;padding-right:39px;
}

.win-body{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── FILES WINDOW ── */
#files-window{width:580px;height:420px;top:70px;left:60px;}

#files-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;background:#201d30;
  border-bottom:1px solid #111;flex-shrink:0;
}
#files-up{
  width:30px;height:30px;border-radius:7px;
  background:#3a3555;border:1px solid #4a4470;
  color:#b0a8cc;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .1s;
}
#files-up:hover{background:#4a4570;}
#files-path{
  flex:1;background:#141220;border:1px solid #3a3555;
  border-radius:7px;padding:5px 10px;color:#d0c8f0;
  font-size:12px;font-family:monospace;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#files-list{
  flex:1;overflow-y:auto;padding:10px;
  display:flex;flex-wrap:wrap;align-content:flex-start;gap:2px;
  background:#181626;
}
.fs-item{
  width:82px;padding:8px 4px 6px;border-radius:7px;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:5px;text-align:center;
  color:#c0b8e0;font-size:11.5px;transition:background .12s;
  word-break:break-all;
}
.fs-item:hover{background:rgba(124,58,237,.18);}
.fs-item.selected{background:rgba(124,58,237,.3);}
.fs-item-icon{font-size:30px;line-height:1;display:block;}

/* ── NOTEPAD WINDOW ── */
#notepad-window{width:620px;height:460px;top:90px;left:160px;}

#tabs-bar{
  display:flex;align-items:stretch;
  background:#141220;border-bottom:1px solid #0d0b18;
  flex-shrink:0;overflow:hidden;
}
#tabs{display:flex;flex:1;overflow-x:auto;overflow-y:hidden;}
#tabs::-webkit-scrollbar{height:3px;}
#tabs::-webkit-scrollbar-thumb{background:#4a4570;}

.tab{
  padding:9px 14px;background:#1a1728;
  border:none;color:#7a7299;cursor:pointer;
  font-size:12px;white-space:nowrap;
  border-right:1px solid #0d0b18;
  border-bottom:2px solid transparent;
  transition:background .12s,color .12s;
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;min-width:90px;max-width:160px;
}
.tab:hover{background:#221f35;color:#b0a8cc;}
.tab.active{background:#1e1c2e;color:#e0d8ff;border-bottom-color:#7c3aed;}
.tab-name{flex:1;overflow:hidden;text-overflow:ellipsis;text-align:left;}
.tab-x{
  opacity:0;font-size:11px;line-height:1;color:#7a7299;
  transition:opacity .1s;flex-shrink:0;
  background:none;border:none;cursor:pointer;padding:0;color:inherit;
}
.tab:hover .tab-x,.tab.active .tab-x{opacity:.7;}
.tab-x:hover{opacity:1 !important;}
#new-tab{
  padding:0 14px;background:transparent;border:none;
  color:#5a5282;cursor:pointer;font-size:18px;flex-shrink:0;
  transition:color .12s,background .12s;
}
#new-tab:hover{color:#c0b8e0;background:#221f35;}

#editor{
  flex:1;resize:none;border:none;outline:none;
  background:#13111f;color:#d4cfed;
  padding:14px;font-family:'Courier New',Courier,monospace;
  font-size:13.5px;line-height:1.65;
}
#editor::placeholder{color:#3a3555;}

/* scrollbars */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#3a3555;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#5a5282;}
</style>
</head>
<body>
<div id="desktop">

  <!-- Files Window -->
  <div id="files-window" class="window" style="display:none">
    <div class="titlebar" data-wid="files-window">
      <div class="tbar-btns">
        <button class="win-close" data-wid="files-window" title="Close">✕</button>
        <button class="tbar-min"></button>
        <button class="tbar-max"></button>
      </div>
      <span class="tbar-title">Files</span>
    </div>
    <div class="win-body">
      <div id="files-toolbar">
        <button id="files-up" title="Go up">↑</button>
        <div id="files-path">/</div>
      </div>
      <div id="files-list"></div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window" style="display:none">
    <div class="titlebar" data-wid="notepad-window">
      <div class="tbar-btns">
        <button class="win-close" data-wid="notepad-window" title="Close">✕</button>
        <button class="tbar-min"></button>
        <button class="tbar-max"></button>
      </div>
      <span class="tbar-title">Notepad</span>
    </div>
    <div class="win-body">
      <div id="tabs-bar">
        <div id="tabs"></div>
        <button id="new-tab" title="New tab">+</button>
      </div>
      <textarea id="editor" placeholder="Start typing…"></textarea>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="open-files" class="launcher-btn" title="Files">📁</button>
    <button id="open-notepad" class="launcher-btn" title="Notepad">📝</button>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════
//  FILESYSTEM
// ═══════════════════════════════════════════════
const FS = {
  '/':                                  {dir:true, kids:['bin','etc','home','usr','var','tmp','dev','opt','proc']},
  '/bin':                               {dir:true, kids:['bash','sh','ls','cp','mv','rm','cat','grep','find','chmod','chown']},
  '/etc':                               {dir:true, kids:['hosts','hostname','passwd','shadow','fstab','apt','ssh','nginx','cron.d','resolv.conf']},
  '/etc/apt':                           {dir:true, kids:['sources.list','trusted.gpg','preferences.d']},
  '/etc/apt/preferences.d':            {dir:true, kids:['99local']},
  '/etc/ssh':                           {dir:true, kids:['sshd_config','ssh_config','known_hosts']},
  '/etc/nginx':                         {dir:true, kids:['nginx.conf','sites-enabled','sites-available','conf.d']},
  '/etc/nginx/sites-enabled':          {dir:true, kids:['default']},
  '/etc/nginx/sites-available':        {dir:true, kids:['default','mysite.conf']},
  '/etc/nginx/conf.d':                 {dir:true, kids:['gzip.conf']},
  '/etc/cron.d':                        {dir:true, kids:['backup','logrotate']},
  '/home':                              {dir:true, kids:['user']},
  '/home/user':                         {dir:true, kids:['Documents','Downloads','Pictures','Desktop','Music','.bashrc','.profile','.ssh']},
  '/home/user/.ssh':                    {dir:true, kids:['id_rsa','id_rsa.pub','authorized_keys','config']},
  '/home/user/Documents':              {dir:true, kids:['resume.pdf','notes.txt','budget.xlsx','todo.md','Projects']},
  '/home/user/Documents/Projects':     {dir:true, kids:['website','scripts','data-analysis']},
  '/home/user/Documents/Projects/website':      {dir:true, kids:['index.html','style.css','app.js','README.md']},
  '/home/user/Documents/Projects/scripts':      {dir:true, kids:['backup.sh','deploy.sh','cleanup.py','cron_jobs.sh']},
  '/home/user/Documents/Projects/data-analysis':{dir:true, kids:['notebook.ipynb','data.csv','results.json','plots']},
  '/home/user/Documents/Projects/data-analysis/plots':{dir:true, kids:['histogram.png','scatter.svg','trend.png']},
  '/home/user/Downloads':              {dir:true, kids:['ubuntu-24.04.iso','archive.tar.gz','photo.jpg','setup.deb','movie.mp4']},
  '/home/user/Pictures':               {dir:true, kids:['wallpapers','screenshots','vacation.jpg','profile.png']},
  '/home/user/Pictures/wallpapers':    {dir:true, kids:['dark_mountains.png','aurora.jpg','abstract.png','minimal.png']},
  '/home/user/Pictures/screenshots':   {dir:true, kids:['2025-01-15.png','2025-03-02.png','2025-06-20.png']},
  '/home/user/Desktop':                {dir:true, kids:['terminal.desktop','browser.desktop']},
  '/home/user/Music':                  {dir:true, kids:['playlist.m3u','lofi_session.mp3','focus_mix.flac']},
  '/usr':                               {dir:true, kids:['bin','lib','local','share','include','sbin']},
  '/usr/bin':                           {dir:true, kids:['python3','python3.12','node','npm','git','vim','nano','curl','wget','htop','tmux','zsh']},
  '/usr/lib':                           {dir:true, kids:['python3','x86_64-linux-gnu','systemd']},
  '/usr/lib/python3':                   {dir:true, kids:['dist-packages','site-packages']},
  '/usr/local':                         {dir:true, kids:['bin','lib','share','etc']},
  '/usr/local/bin':                     {dir:true, kids:['code','docker','kubectl','terraform','go']},
  '/usr/share':                         {dir:true, kids:['applications','fonts','icons','doc','man','locale']},
  '/usr/share/applications':           {dir:true, kids:['firefox.desktop','gedit.desktop','nautilus.desktop']},
  '/usr/share/fonts':                  {dir:true, kids:['truetype','opentype']},
  '/usr/include':                       {dir:true, kids:['stdio.h','stdlib.h','string.h','math.h']},
  '/var':                               {dir:true, kids:['log','cache','lib','tmp','www','run','spool']},
  '/var/log':                           {dir:true, kids:['syslog','auth.log','kern.log','dpkg.log','nginx','apt']},
  '/var/log/nginx':                     {dir:true, kids:['access.log','error.log']},
  '/var/log/apt':                       {dir:true, kids:['history.log','term.log']},
  '/var/cache':                         {dir:true, kids:['apt','fontconfig','man']},
  '/var/cache/apt':                     {dir:true, kids:['archives','pkgcache.bin']},
  '/var/lib':                           {dir:true, kids:['apt','dpkg','docker','postgresql']},
  '/var/www':                           {dir:true, kids:['html']},
  '/var/www/html':                      {dir:true, kids:['index.html','about.html','assets']},
  '/var/www/html/assets':              {dir:true, kids:['style.css','app.js','logo.svg']},
  '/tmp':                               {dir:true, kids:['session_a1b2','tmpfile.txt','snap-private-tmp']},
  '/dev':                               {dir:true, kids:['null','zero','random','urandom','sda','sda1','sda2','tty','pts']},
  '/opt':                               {dir:true, kids:['google','sublime-text','jetbrains']},
  '/opt/google':                        {dir:true, kids:['chrome']},
  '/opt/google/chrome':                {dir:true, kids:['chrome','chrome.desktop','libEGL.so']},
  '/opt/jetbrains':                     {dir:true, kids:['idea','pycharm']},
  '/proc':                              {dir:true, kids:['cpuinfo','meminfo','version','uptime','1','42','1337']},
};

function isDir(path){ return FS[path] && FS[path].dir; }

function fileIcon(name, dir){
  if(dir) return '📁';
  const ext = name.split('.').pop().toLowerCase();
  const map={
    sh:'⚙️',bash:'⚙️',py:'🐍',js:'📜',ts:'📜',go:'🔵',
    html:'🌐',css:'🎨',svg:'🎨',
    json:'📋',toml:'📋',yaml:'📋',yml:'📋',
    txt:'📄',md:'📝',pdf:'📕',doc:'📝',docx:'📝',
    xlsx:'📊',csv:'📊',ipynb:'📊',
    jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',
    mp3:'🎵',flac:'🎵',wav:'🎵',m3u:'🎵',
    mp4:'🎬',mkv:'🎬',avi:'🎬',
    zip:'📦',tar:'📦',gz:'📦',bz2:'📦',deb:'📦',
    iso:'💿',img:'💿',
    conf:'⚙️',cfg:'⚙️',log:'📋',list:'📋',
    desktop:'🔗',pub:'🔑',pem:'🔑',
    h:'🔧',so:'🔧',
    sql:'🗄️',db:'🗄️',
  };
  return map[ext]||'📄';
}

let currentPath='/';

function renderFiles(){
  document.getElementById('files-path').textContent=currentPath;
  const list=document.getElementById('files-list');
  list.innerHTML='';
  const entry=FS[currentPath];
  if(!entry||!entry.kids) return;
  entry.kids.forEach(name=>{
    const full=currentPath==='/'?'/'+name:currentPath+'/'+name;
    const dir=isDir(full);
    const el=document.createElement('div');
    el.className='fs-item';
    el.dataset.path=full;
    el.innerHTML=`<span class="fs-item-icon">${fileIcon(name,dir)}</span><span>${name}</span>`;
    el.onclick=()=>{
      list.querySelectorAll('.fs-item').forEach(i=>i.classList.remove('selected'));
      el.classList.add('selected');
    };
    if(dir){
      el.ondblclick=()=>{currentPath=full;renderFiles();};
    }
    list.appendChild(el);
  });
}

document.getElementById('files-up').onclick=()=>{
  if(currentPath==='/') return;
  const parts=currentPath.split('/').filter(Boolean);
  parts.pop();
  currentPath=parts.length?'/'+parts.join('/'):'/' ;
  renderFiles();
};

// ═══════════════════════════════════════════════
//  NOTEPAD  (localStorage persistence)
// ═══════════════════════════════════════════════
const STORE='__desktop_notepad__';
let tabs=[], activeId=null;

function uid(){ return 't'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function persist(){
  localStorage.setItem(STORE,JSON.stringify({tabs,activeId}));
}

function hydrate(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE)||'null');
    if(d&&Array.isArray(d.tabs)&&d.tabs.length){
      tabs=d.tabs;
      activeId=d.activeId&&tabs.find(t=>t.id===d.activeId)?d.activeId:tabs[0].id;
      return;
    }
  }catch(_){}
  const id=uid();
  tabs=[{id,name:'Untitled 1',text:''}];
  activeId=id;
}

function flushEditor(){
  const t=tabs.find(t=>t.id===activeId);
  if(t) t.text=document.getElementById('editor').value;
}

function renderNotepad(){
  const strip=document.getElementById('tabs');
  strip.innerHTML='';
  tabs.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tab'+(t.id===activeId?' active':'');
    btn.dataset.id=t.id;
    btn.innerHTML=`<span class="tab-name">${escHtml(t.name)}</span><button class="tab-x" data-xid="${t.id}" title="Close">✕</button>`;
    btn.onclick=e=>{
      const xid=e.target.closest('[data-xid]')&&e.target.closest('[data-xid]').dataset.xid;
      if(xid){closeTab(xid);return;}
      flushEditor();
      activeId=t.id;
      renderNotepad();
      persist();
    };
    strip.appendChild(btn);
  });
  const active=tabs.find(t=>t.id===activeId);
  document.getElementById('editor').value=active?active.text:'';
}

function closeTab(id){
  flushEditor();
  const idx=tabs.findIndex(t=>t.id===id);
  if(idx===-1) return;
  tabs.splice(idx,1);
  if(!tabs.length){
    const nid=uid(); tabs=[{id:nid,name:'Untitled 1',text:''}]; activeId=nid;
  } else if(activeId===id){
    activeId=tabs[Math.min(idx,tabs.length-1)].id;
  }
  renderNotepad(); persist();
}

document.getElementById('new-tab').onclick=()=>{
  flushEditor();
  const num=tabs.length+1;
  const nid=uid();
  tabs.push({id:nid,name:'Untitled '+num,text:''});
  activeId=nid;
  renderNotepad(); persist();
  document.getElementById('editor').focus();
};

document.getElementById('editor').oninput=()=>{flushEditor();persist();};

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════
//  WINDOW MANAGEMENT
// ═══════════════════════════════════════════════
let zCounter=10;

function bringToFront(win){win.style.zIndex=++zCounter;}

function openWindow(id){
  const win=document.getElementById(id);
  win.style.display='flex';
  bringToFront(win);
  if(id==='files-window') renderFiles();
  if(id==='notepad-window') renderNotepad();
  document.getElementById(id==='files-window'?'open-files':'open-notepad').classList.add('active');
}

function closeWindow(id){
  document.getElementById(id).style.display='none';
  document.getElementById(id==='files-window'?'open-files':'open-notepad').classList.remove('active');
}

document.getElementById('open-files').onclick=()=>{
  const w=document.getElementById('files-window');
  if(w.style.display==='none') openWindow('files-window');
  else bringToFront(w);
};
document.getElementById('open-notepad').onclick=()=>{
  const w=document.getElementById('notepad-window');
  if(w.style.display==='none') openWindow('notepad-window');
  else bringToFront(w);
};

// Close buttons
document.querySelectorAll('.win-close').forEach(btn=>{
  btn.onclick=()=>closeWindow(btn.dataset.wid);
});

// Click to raise
document.querySelectorAll('.window').forEach(win=>{
  win.addEventListener('mousedown',()=>bringToFront(win),true);
});

// ── Drag ──
document.querySelectorAll('.titlebar').forEach(bar=>{
  let dragging=false, ox=0,oy=0, sx=0,sy=0;
  const win=bar.closest('.window');
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('button')) return;
    dragging=true;
    const r=win.getBoundingClientRect();
    ox=r.left; oy=r.top; sx=e.clientX; sy=e.clientY;
    bringToFront(win);
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    const dw=document.getElementById('desktop');
    const dwr=dw.getBoundingClientRect();
    const wr=win.getBoundingClientRect();
    let nx=ox+dx, ny=oy+dy;
    nx=Math.max(dwr.left, Math.min(nx, dwr.right-wr.width));
    ny=Math.max(dwr.top, Math.min(ny, dwr.bottom-40));
    win.style.left=nx+'px';
    win.style.top=ny+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false;});
});

// ── Touch drag support ──
document.querySelectorAll('.titlebar').forEach(bar=>{
  let dragging=false, ox=0,oy=0, sx=0,sy=0;
  const win=bar.closest('.window');
  bar.addEventListener('touchstart',e=>{
    if(e.target.closest('button')) return;
    dragging=true;
    const r=win.getBoundingClientRect();
    ox=r.left; oy=r.top;
    sx=e.touches[0].clientX; sy=e.touches[0].clientY;
    bringToFront(win);
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!dragging) return;
    const dx=e.touches[0].clientX-sx, dy=e.touches[0].clientY-sy;
    win.style.left=(ox+dx)+'px';
    win.style.top=(oy+dy)+'px';
  },{passive:true});
  document.addEventListener('touchend',()=>{dragging=false;});
});

// ═══════════════════════════════════════════════
