<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Billiards</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --accent-color: #1abc9c;
            --text-color: #ecf0f1;
            --wood-color: #5c2c16;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            color: var(--text-color);
        }

        .status-container {
            font-size: 1.1rem;
            margin-top: 5px;
            font-weight: 600;
            min-height: 24px;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 100%;
        }

        /* Table Container with Wood Border */
        .table-outer {
            padding: 22px;
            background: var(--wood-color);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 
                        inset 0 4px 10px rgba(255,255,255,0.15),
                        inset 0 -4px 10px rgba(0,0,0,0.5);
            position: relative;
            border: 4px solid #3d1d0e;
        }

        /* Diamond sights on the rails */
        .table-outer::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            pointer-events: none;
            border-radius: 10px;
        }

        canvas {
            display: block;
            background: #165c35;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
            border-radius: 4px;
            cursor: crosshair;
            max-width: 100%;
            height: auto;
        }

        /* Controls & Info Panel */
        .panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .panel {
                grid-template-columns: 1fr;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            background: #34495e;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #415b76;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        button#reset-btn {
            background: #27ae60;
        }
        button#reset-btn:hover {
            background: #2ecc71;
        }

        button#pause-btn.paused {
            background: #e67e22;
        }

        .instructions {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #bdc3c7;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .instructions h3 {
            margin-top: 0;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        /* Potted Tray */
        .tray-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tray-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8c8d;
            font-weight: bold;
        }

        .potted-tray {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            min-height: 44px;
            padding: 8px 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .potted-ball {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #000;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 2px 2px 4px rgba(0,0,0,0.4);
            position: relative;
            border: 1px solid rgba(0,0,0,0.15);
            user-select: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>8-BALL BILLIARDS</h1>
        <div class="status-container" id="status">Ready to shoot</div>
    </header>

    <div class="main-layout">
        <!-- Table -->
        <div class="table-outer">
            <canvas id="tableCanvas" width="800" height="400"></canvas>
        </div>

        <!-- Potted Tray -->
        <div class="tray-container">
            <div class="tray-title">Potted Balls</div>
            <div class="potted-tray" id="pottedTray"></div>
        </div>

        <!-- Controls & Instructions -->
        <div class="panel">
            <div class="controls">
                <div class="btn-group">
                    <button id="reset-btn">Rack / Reset</button>
                    <button id="pause-btn">Pause</button>
                </div>
            </div>
            <div class="instructions">
                <h3>How to Play</h3>
                <ul>
                    <li>Wait until all balls have come to a complete stop.</li>
                    <li>Click and <strong>drag back</strong> from the white cue ball to aim and set power.</li>
                    <li>Release the mouse button to strike. Longer drag = harder shot!</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('tableCanvas');
            const ctx = canvas.getContext('2d');

            const W = 800;
            const H = 400;
            const R = 12;
            const P_R = 22; // Pocket radius
            const friction = 120; // Deceleration in px/s^2

            let balls = [];
            let isPaused = false;

            // Pockets positions
            const pockets = [
                { x: 0, y: 0 },
                { x: W / 2, y: 0 },
                { x: W, y: 0 },
                { x: 0, y: H },
                { x: W / 2, y: H },
                { x: W, y: H }
            ];

            // Ball Colors Mapping
            function getBallColor(num) {
                const colors = {
                    1: '#f1c40f', // Yellow
                    2: '#2980b9', // Blue
                    3: '#e74c3c', // Red
                    4: '#8e44ad', // Purple
                    5: '#e67e22', // Orange
                    6: '#27ae60', // Green
                    7: '#78281f', // Maroon
                    8: '#111111', // Black
                    9: '#f1c40f', // Yellow stripe
                    10: '#2980b9', // Blue stripe
                    11: '#e74c3c', // Red stripe
                    12: '#8e44ad', // Purple stripe
                    13: '#e67e22', // Orange stripe
                    14: '#27ae60', // Green stripe
                    15: '#78281f'  // Maroon stripe
                };
                return colors[num] || '#ffffff';
            }

            // Initialize / Reset
            function reset(ballsData) {
                if (ballsData && Array.isArray(ballsData)) {
                    balls = ballsData.map((b, index) => ({
                        x: b.x,
                        y: b.y,
                        vx: b.vx || 0,
                        vy: b.vy || 0,
                        cue: !!b.cue,
                        potted: !!b.potted,
                        id: b.cue ? 0 : (index + 1)
                    }));
                } else {
                    // Default 15-ball rack
                    balls = [];
                    const startX = 550;
                    const startY = 200;
                    const dx = R * Math.sqrt(3) + 0.2;
                    const dy = R + 0.1;
                    const rackOrder = [
                        1,
                        2, 3,
                        4, 8, 5,
                        6, 7, 9, 10,
                        11, 12, 13, 14, 15
                    ];
                    let idx = 0;
                    for (let col = 0; col < 5; col++) {
                        let x = startX + col * dx;
                        for (let row = 0; row <= col; row++) {
                            let y = startY + (row - col / 2) * 2 * dy;
                            balls.push({
                                x: x,
                                y: y,
                                vx: 0,
                                vy: 0,
                                cue: false,
                                potted: false,
                                id: rackOrder[idx++] || idx
                            });
                        }
                    }
                    // Add cue ball
                    balls.push({
                        x: 200,
                        y: 200,
                        vx: 0,
                        vy: 0,
                        cue: true,
                        potted: false,
                        id: 0
                    });
                }
                updatePottedTray();
            }

            // Physics Step
            function step(dt) {
                if (dt <= 0) return;

                // Sub-stepping for high-fidelity collision resolution
                const SUB_STEPS = 10;
                const sub_dt = dt / SUB_STEPS;

                for (let step = 0; step < SUB_STEPS; step++) {
                    // 1. Update positions & apply friction
                    for (let b of balls) {
                        if (b.potted) continue;
                        b.x += b.vx * sub_dt;
                        b.y += b.vy * sub_dt;

                        let speed = Math.hypot(b.vx, b.vy);
                        if (speed > 0) {
                            let newSpeed = Math.max(0, speed - friction * sub_dt);
                            if (newSpeed < 1.5) { // Stop completely if very slow
                                b.vx = 0;
                                b.vy = 0;
                            } else {
                                b.vx = (b.vx / speed) * newSpeed;
                                b.vy = (b.vy / speed) * newSpeed;
                            }
                        }
                    }

                    // 2. Check pockets
                    for (let b of balls) {
                        if (b.potted) continue;
                        for (let p of pockets) {
                            if (Math.hypot(b.x - p.x, b.y - p.y) < P_R) {
                                b.potted = true;
                                b.vx = 0;
                                b.vy = 0;
                                updatePottedTray();
                                break;
                            }
                        }
                    }

                    // 3. Wall collisions (Cushions)
                    for (let b of balls) {
                        if (b.potted) continue;
                        if (b.x < R) { b.x = R; b.vx = Math.abs(b.vx); }
                        if (b.x > W - R) { b.x = W - R; b.vx = -Math.abs(b.vx); }
                        if (b.y < R) { b.y = R; b.vy = Math.abs(b.vy); }
                        if (b.y > H - R) { b.y = H - R; b.vy = -Math.abs(b.vy); }
                    }

                    // 4. Ball-to-ball collisions
                    for (let i = 0; i < balls.length; i++) {
                        for (let j = i + 1; j < balls.length; j++) {
                            let b1 = balls[i];
                            let b2 = balls[j];
                            if (b1.potted || b2.potted) continue;

                            let dx = b2.x - b1.x;
                            let dy = b2.y - b1.y;
                            let dist = Math.hypot(dx, dy);
                            let minDist = 2 * R;

                            if (dist < minDist) {
                                // Overlap resolution (static)
                                let overlap = minDist - dist;
                                if (dist === 0) {
                                    dx = 1; dy = 0; dist = 1;
                                }
                                let nx = dx / dist;
                                let ny = dy / dist;

                                b1.x -= nx * overlap * 0.5;
                                b1.y -= ny * overlap * 0.5;
                                b2.x += nx * overlap * 0.5;
                                b2.y += ny * overlap * 0.5;

                                // Elastic collision (dynamic)
                                let kx = b1.vx - b2.vx;
                                let ky = b1.vy - b2.vy;
                                let vn = kx * nx + ky * ny;
                                if (vn > 0) {
                                    let impulseX = vn * nx;
                                    let impulseY = vn * ny;
                                    b1.vx -= impulseX;
                                    b1.vy -= impulseY;
                                    b2.vx += impulseX;
                                    b2.vy += impulseY;
                                }
                            }
                        }
                    }
                }

                // Auto-respawn cue ball if potted and all balls have stopped
                let allStopped = balls.every(b => b.potted || (b.vx === 0 && b.vy === 0));
                if (allStopped) {
                    let cueBall = balls.find(b => b.cue);
                    if (cueBall && cueBall.potted) {
                        cueBall.potted = false;
                        cueBall.x = 200;
                        cueBall.y = 200;
                        cueBall.vx = 0;
                        cueBall.vy = 0;
                        // Avoid spawning on top of another ball
                        let overlap = true;
                        while (overlap) {
                            overlap = false;
                            for (let b of balls) {
                                if (b !== cueBall && !b.potted) {
                                    if (Math.hypot(b.x - cueBall.x, b.y - cueBall.y) < 2 * R) {
                                        cueBall.x += 2 * R;
                                        overlap = true;
                                    }
                                }
                            }
                        }
                        updatePottedTray();
                    }
                }

                // Render
                draw();
                updateStatus(allStopped);
            }

            // State exporter
            function state() {
                return balls.map(b => ({
                    x: b.x,
                    y: b.y,
                    vx: b.vx,
                    vy: b.vy,
                    potted: !!b.potted,
                    cue: !!b.cue
                }));
            }

            // Shoot action
            function shoot(vx, vy) {
                let cueBall = balls.find(b => b.cue);
                if (cueBall && !cueBall.potted) {
                    cueBall.vx = vx;
                    cueBall.vy = vy;
                }
            }

            function pause() {
                isPaused = true;
            }

            function resume() {
                isPaused = false;
            }

            // Expose global API
            window.sim = {
                W: W,
                H: H,
                R: R,
                reset: reset,
                step: step,
                state: state,
                shoot: shoot,
                pause: pause,
                resume: resume
            };

            // --- Drawing & UI Logic ---

            function drawBall(b) {
                if (b.potted) return;
                ctx.save();
                ctx.translate(b.x, b.y);

                // Shadow
                ctx.beginPath();
                ctx.arc(2, 2, R, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.fill();

                // Base Ball
                ctx.beginPath();
                ctx.arc(0, 0, R, 0, Math.PI * 2);
                if (b.cue) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    // Highlight
                    let grad = ctx.createRadialGradient(-R/3, -R/3, 1, 0, 0, R);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(1, '#e0e0e0');
                    ctx.fillStyle = grad;
                    ctx.fill();
                } else {
                    let num = b.id;
                    let color = getBallColor(num);
                    let isStripe = num > 8;

                    if (isStripe) {
                        // White base
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        // Stripe
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(0, 0, R, 0, Math.PI * 2);
                        ctx.clip();
                        ctx.fillStyle = color;
                        ctx.fillRect(-R, -R * 0.5, R * 2, R);
                        ctx.restore();
                    } else {
                        // Solid
                        ctx.fillStyle = color;
                        ctx.fill();
                    }

                    // White center circle for number
                    ctx.beginPath();
                    ctx.arc(0, 0, R * 0.45, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();

                    // Number text
                    ctx.fillStyle = '#000000';
                    ctx.font = `bold ${R * 0.55}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(num, 0, 0);

                    // Gloss overlay
                    let grad = ctx.createRadialGradient(-R/3, -R/3, 1, 0, 0, R);
                    grad.addColorStop(0, 'rgba(255,255,255,0.45)');
                    grad.addColorStop(0.4, 'rgba(255,255,255,0)');
                    grad.addColorStop(1, 'rgba(0,0,0,0.25)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, R, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function draw() {
                // Clear
                ctx.clearRect(0, 0, W, H);

                // Felt Table Bed
                ctx.fillStyle = '#165c35';
                ctx.fillRect(0, 0, W, H);

                // Table markings (Baulk line & spots)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(200, 0);
                ctx.lineTo(200, H);
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.arc(200, H/2, 3, 0, Math.PI * 2); // Head spot
                ctx.arc(600, H/2, 3, 0, Math.PI * 2); // Foot spot
                ctx.fill();

                // Pockets
                pockets.forEach(p => {
                    // Outer brass ring
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, P_R, 0, Math.PI * 2);
                    ctx.fillStyle = '#111111';
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#a38045';
                    ctx.stroke();

                    // Inner dark hole
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, P_R - 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#050505';
                    ctx.fill();
                });

                // Balls
                balls.forEach(drawBall);

                // Aiming Line & Cue Stick
                let cueBall = balls.find(b => b.cue);
                let allStopped = balls.every(b => b.potted || (b.vx === 0 && b.vy === 0));

                if (allStopped && cueBall && !cueBall.potted && !isDragging) {
                    // Subtle glow around cue ball when ready
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(cueBall.x, cueBall.y, R + 4, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 2]);
                    ctx.stroke();
                    ctx.restore();
                }

                if (isDragging && cueBall && !cueBall.potted) {
                    let dx = dragCurrent.x - dragStart.x;
                    let dy = dragCurrent.y - dragStart.y;
                    let dist = Math.hypot(dx, dy);

                    if (dist > 5) {
                        let angle = Math.atan2(-dy, -dx); // Shot is opposite to drag
                        let maxDrag = 150;
                        let intensity = Math.min(dist / maxDrag, 1.0);

                        // 1. Aim Line (Dotted line)
                        ctx.save();
                        ctx.beginPath();
                        ctx.setLineDash([6, 4]);
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.lineWidth = 2;
                        ctx.moveTo(cueBall.x, cueBall.y);
                        let aimDist = 280;
                        ctx.lineTo(cueBall.x + Math.cos(angle) * aimDist, cueBall.y + Math.sin(angle) * aimDist);
                        ctx.stroke();
                        ctx.restore();

                        // 2. Cue Stick (Drawn behind the cue ball, pointing at it)
                        ctx.save();
                        ctx.translate(cueBall.x, cueBall.y);
                        ctx.rotate(angle + Math.PI); // Point away from shot direction

                        let stickOffset = R + 6 + intensity * 25; // Pull back effect
                        let stickLength = 260;
                        let thickWidth = 7;
                        let thinWidth = 4;

                        // Tapered cue stick gradient
                        let grad = ctx.createLinearGradient(stickOffset, 0, stickOffset + stickLength, 0);
                        grad.addColorStop(0, '#f5f5dc'); // Ivory tip
                        grad.addColorStop(0.02, '#f5f5dc');
                        grad.addColorStop(0.03, '#d2b48c'); // Light wood
                        grad.addColorStop(0.7, '#8b5a2b'); // Dark wood
                        grad.addColorStop(0.72, '#111111'); // Black wrap
                        grad.addColorStop(1, '#222222');

                        ctx.beginPath();
                        ctx.moveTo(stickOffset, -thinWidth / 2);
                        ctx.lineTo(stickOffset + stickLength, -thickWidth / 2);
                        ctx.lineTo(stickOffset + stickLength, thickWidth / 2);
                        ctx.lineTo(stickOffset, thinWidth / 2);
                        ctx.closePath();
                        ctx.fillStyle = grad;
                        ctx.fill();

                        // Cue stick shadow
                        ctx.shadowColor = 'rgba(0,0,0,0.4)';
                        ctx.shadowBlur = 4;
                        ctx.shadowOffsetY = 4;

                        ctx.restore();
                    }
                }
            }

            function updateStatus(allStopped) {
                const statusEl = document.getElementById('status');
                if (!statusEl) return;
                if (!allStopped) {
                    statusEl.innerText = 'Balls moving...';
                    statusEl.style.color = '#e74c3c';
                } else {
                    statusEl.innerText = 'Ready to shoot';
                    statusEl.style.color = '#2ecc71';
                }
            }

            function updatePottedTray() {
                const tray = document.getElementById('pottedTray');
                if (!tray) return;
                tray.innerHTML = '';
                balls.forEach(b => {
                    if (b.potted && !b.cue) {
                        let ballEl = document.createElement('div');
                        ballEl.className = 'potted-ball';
                        ballEl.style.backgroundColor = getBallColor(b.id);
                        ballEl.innerText = b.id;
                        if (b.id > 8) {
                            // Visual representation of stripe in tray
                            ballEl.style.background = `linear-gradient(to bottom, #fff 20%, ${getBallColor(b.id)} 20%, ${getBallColor(b.id)} 80%, #fff 80%)`;
                        }
                        tray.appendChild(ballEl);
                    }
                });
            }

            // --- Mouse Event Handlers ---

            let isDragging = false;
            let dragStart = { x: 0, y: 0 };
            let dragCurrent = { x: 0, y: 0 };

            function getMousePos(evt) {
                let rect = canvas.getBoundingClientRect();
                return {
                    x: (evt.clientX - rect.left) * (canvas.width / rect.width),
                    y: (evt.clientY - rect.top) * (canvas.height / rect.height)
                };
            }

            canvas.addEventListener('mousedown', function(e) {
                let mousePos = getMousePos(e);
                let cueBall = balls.find(b => b.cue);
                if (!cueBall || cueBall.potted) return;

                // Only allow shooting if all balls are stopped
                let allStopped = balls.every(b => b.potted || (b.vx === 0 && b.vy === 0));
                if (!allStopped) return;

                // Check if click is near cue ball
                let dist = Math.hypot(mousePos.x - cueBall.x, mousePos.y - cueBall.y);
                if (dist < R * 2.5) { // Generous grab radius
                    isDragging = true;
                    dragStart = { x: cueBall.x, y: cueBall.y };
                    dragCurrent = mousePos;
                }
            });

            canvas.addEventListener('mousemove', function(e) {
                if (isDragging) {
                    dragCurrent = getMousePos(e);
                }
            });

            window.addEventListener('mouseup', function(e) {
                if (isDragging) {
                    let cueBall = balls.find(b => b.cue);
                    if (cueBall) {
                        let dx = dragCurrent.x - dragStart.x;
                        let dy = dragCurrent.y - dragStart.y;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 5) {
                            let maxDrag = 150;
                            let intensity = Math.min(dist / maxDrag, 1.0);
                            let speed = intensity * 900; // Max speed 900 px/s
                            let angle = Math.atan2(-dy, -dx); // Shot is opposite to drag

                            let vx = Math.cos(angle) * speed;
                            let vy = Math.sin(angle) * speed;

                            window.sim.shoot(vx, vy);
                        }
                    }
                    isDragging = false;
                }
            });

            // --- UI Button Listeners ---

            document.getElementById('reset-btn').addEventListener('click', function() {
                window.sim.reset();
            });

            const pauseBtn = document.getElementById('pause-btn');
            pauseBtn.addEventListener('click', function() {
                if (isPaused) {
                    window.sim.resume();
                    pauseBtn.innerText = 'Pause';
                    pauseBtn.classList.remove('paused');
                } else {
                    window.sim.pause();
                    pauseBtn.innerText = 'Resume';
                    pauseBtn.classList.add('paused');
                }
            });

            // --- Game Loop ---

            let lastTime = performance.now();
            function loop(time) {
                requestAnimationFrame(loop);
                let dt = (time - lastTime) / 1000;
                lastTime = time;

                if (!isPaused) {
                    if (dt > 0.1) dt = 0.1; // Cap dt to avoid tunneling on lag spikes
                    window.sim.step(dt);
                }
            }

            // Start Game
            window.sim.reset();
            requestAnimationFrame(loop);

        })();
    </script>
</body>
</html>
