<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,html{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Ubuntu,sans-serif}

#desktop{
  width:100vw;height:100vh;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 35%,#0f3460 65%,#533483 100%);
  position:relative;overflow:hidden
}

/* Top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;height:28px;
  background:rgba(15,15,15,0.88);backdrop-filter:blur(10px);
  display:flex;align-items:center;padding:0 16px;
  color:#ddd;font-size:13px;z-index:200;
  border-bottom:1px solid rgba(255,255,255,0.06)
}
#topbar-activities{font-weight:600;cursor:pointer}
#topbar-activities:hover{color:#fff}
#topbar-right{margin-left:auto;display:flex;gap:14px;align-items:center}
#clock{font-size:13px}

/* Taskbar */
#taskbar{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  height:58px;
  background:rgba(22,22,22,0.92);backdrop-filter:blur(14px);
  border-radius:16px 16px 0 0;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  border:1px solid rgba(255,255,255,0.1);border-bottom:none;
  z-index:200
}
#taskbar button{
  width:46px;height:46px;border:none;border-radius:13px;
  background:rgba(255,255,255,0.08);color:#fff;font-size:22px;
  cursor:pointer;transition:background 0.15s,transform 0.12s;
  display:flex;align-items:center;justify-content:center;position:relative
}
#taskbar button:hover{background:rgba(255,255,255,0.18);transform:translateY(-5px) scale(1.12)}
#taskbar button::after{
  content:attr(data-tip);position:absolute;bottom:54px;
  background:rgba(0,0,0,0.82);color:#fff;font-size:11px;
  padding:3px 9px;border-radius:5px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity 0.18s;border:1px solid rgba(255,255,255,0.1)
}
#taskbar button:hover::after{opacity:1}

/* Window */
.window{
  position:absolute;background:#2d2d2d;border-radius:10px;
  box-shadow:0 24px 64px rgba(0,0,0,0.65),0 0 0 1px rgba(255,255,255,0.07);
  display:none;flex-direction:column;overflow:hidden;
  min-width:360px;min-height:240px
}
.window.visible{display:flex}

.win-titlebar{
  height:36px;background:#3a3a3a;display:flex;align-items:center;
  padding:0 10px;cursor:move;user-select:none;flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,0.35)
}
.win-controls{display:flex;gap:7px;align-items:center}
.win-btn{
  width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;
  transition:filter 0.15s,opacity 0.15s;flex-shrink:0
}
.win-btn:hover{filter:brightness(1.25)}
.win-close{background:#ff5f57}
.win-minimize{background:#ffbd2e}
.win-maximize{background:#28c840}
.win-title{
  flex:1;color:#ddd;font-size:13px;font-weight:500;
  text-align:center;pointer-events:none;padding-right:55px
}

/* Files */
#files-window{top:80px;left:70px;width:560px;height:420px}

.files-toolbar{
  display:flex;align-items:center;padding:5px 10px;gap:8px;
  background:#363636;border-bottom:1px solid rgba(0,0,0,0.25);flex-shrink:0
}
#files-up{
  background:rgba(255,255,255,0.09);border:none;color:#ccc;
  border-radius:6px;padding:4px 12px;cursor:pointer;font-size:13px;
  transition:background 0.15s;white-space:nowrap
}
#files-up:hover{background:rgba(255,255,255,0.18)}
#files-path{
  flex:1;background:rgba(0,0,0,0.28);color:#e0e0e0;
  border-radius:6px;padding:4px 10px;font-size:13px;font-family:monospace;
  border:1px solid rgba(255,255,255,0.07);overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}

#files-content{
  flex:1;overflow-y:auto;padding:10px;
  display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px
}
#files-content::-webkit-scrollbar{width:6px}
#files-content::-webkit-scrollbar-track{background:transparent}
#files-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px}

.fs-item{
  width:90px;padding:8px 4px 6px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:background 0.12s;
  color:#ddd;font-size:11px;text-align:center;
  word-break:break-all;user-select:none
}
.fs-item:hover{background:rgba(255,255,255,0.09)}
.fs-item.selected{background:rgba(230,115,20,0.28);outline:1px solid rgba(230,115,20,0.5)}
.fs-icon{font-size:30px;margin-bottom:4px;line-height:1;pointer-events:none}
.fs-label{pointer-events:none;line-height:1.3;max-width:82px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* Notepad */
#notepad-window{top:110px;left:200px;width:610px;height:460px}

.notepad-tabbar{
  display:flex;align-items:stretch;background:#2f2f2f;
  border-bottom:1px solid rgba(0,0,0,0.3);
  flex-shrink:0;overflow:hidden;min-height:36px
}
#tabs{
  display:flex;flex:1;overflow-x:auto;gap:2px;padding:4px 4px 0;
  align-items:flex-end
}
#tabs::-webkit-scrollbar{height:3px}
#tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:2px}

.tab{
  padding:5px 12px;border-radius:7px 7px 0 0;
  background:rgba(255,255,255,0.05);color:#999;
  font-size:12px;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
  border:1px solid rgba(255,255,255,0.05);border-bottom:none;
  transition:background 0.12s,color 0.12s;user-select:none;
  max-width:160px;min-width:80px;flex-shrink:0
}
.tab.active{background:#2d2d2d;color:#e8e8e8;border-color:rgba(255,255,255,0.09)}
.tab:hover:not(.active){background:rgba(255,255,255,0.1);color:#bbb}
.tab-name{overflow:hidden;text-overflow:ellipsis;flex:1}
.tab-x{
  width:15px;height:15px;border-radius:50%;border:none;
  background:transparent;color:#777;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;line-height:1;flex-shrink:0;transition:background 0.12s,color 0.12s
}
.tab-x:hover{background:rgba(255,70,70,0.3);color:#ff8080}

#new-tab{
  background:transparent;border:none;color:#888;font-size:20px;
  width:34px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
  transition:background 0.12s,color 0.12s;border-radius:0;margin:0 2px
}
#new-tab:hover{background:rgba(255,255,255,0.08);color:#ddd}

#editor{
  flex:1;background:#1e1e1e;color:#d4d4d4;border:none;
  padding:14px 16px;font-family:'Consolas','Courier New',monospace;
  font-size:14px;line-height:1.55;resize:none;outline:none
}
#editor::placeholder{color:#555}

/* Desktop decorative icons */
.desk-icon{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  padding:10px 8px;border-radius:10px;cursor:default;
  color:#fff;font-size:11px;text-align:center;width:76px;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);user-select:none;
  transition:background 0.12s
}
.desk-icon:hover{background:rgba(255,255,255,0.1)}
.desk-icon-img{font-size:36px;margin-bottom:4px;line-height:1}
</style>
</head>
<body>
<div id="desktop">

  <div id="topbar">
    <span id="topbar-activities">Activities</span>
    <div id="topbar-right">
      <span title="Network">🌐</span>
      <span title="Volume">🔊</span>
      <span title="Battery">🔋</span>
      <span id="clock">00:00</span>
    </div>
  </div>

  <!-- Desktop icons -->
  <div class="desk-icon" style="top:50px;left:20px">
    <div class="desk-icon-img">🗑️</div>Trash
  </div>
  <div class="desk-icon" style="top:140px;left:20px">
    <div class="desk-icon-img">💻</div>Computer
  </div>

  <!-- Taskbar / Dock -->
  <div id="taskbar">
    <button id="open-files" data-tip="Files">📁</button>
    <button id="open-notepad" data-tip="Notepad">📝</button>
    <button data-tip="Terminal" style="opacity:.5;cursor:default">🖥️</button>
    <button data-tip="Settings" style="opacity:.5;cursor:default">⚙️</button>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window">
    <div class="win-titlebar">
      <div class="win-controls">
        <button class="win-btn win-close" title="Close"></button>
        <button class="win-btn win-minimize" title="Minimize"></button>
        <button class="win-btn win-maximize" title="Maximize"></button>
      </div>
      <div class="win-title">Files</div>
    </div>
    <div class="files-toolbar">
      <button id="files-up">⬆ Up</button>
      <div id="files-path">/</div>
    </div>
    <div id="files-content"></div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window">
    <div class="win-titlebar">
      <div class="win-controls">
        <button class="win-btn win-close" title="Close"></button>
        <button class="win-btn win-minimize" title="Minimize"></button>
        <button class="win-btn win-maximize" title="Maximize"></button>
      </div>
      <div class="win-title">Notepad</div>
    </div>
    <div class="notepad-tabbar">
      <div id="tabs"></div>
      <button id="new-tab" title="New Tab">+</button>
    </div>
    <textarea id="editor" placeholder="Start typing…"></textarea>
  </div>

</div>

<script>
// ─── Clock ───────────────────────────────────────────────────────────────────
(function tick(){
  const d=new Date();
  document.getElementById('clock').textContent=
    d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  setTimeout(tick,1000);
})();

// ─── Window management ───────────────────────────────────────────────────────
let zTop=10;

function bringToFront(win){win.style.zIndex=++zTop}

function showWindow(win){
  win.classList.add('visible');
  bringToFront(win);
}
function hideWindow(win){
  win.classList.remove('visible');
  win.style.display='';   // class controls display
}

function makeDraggable(win,handle){
  let ox,oy,dragging=false;
  handle.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('win-btn'))return;
    dragging=true;
    const r=win.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top;
    bringToFront(win);
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    let nx=e.clientX-ox, ny=e.clientY-oy;
    const maxX=window.innerWidth-win.offsetWidth;
    const maxY=window.innerHeight-win.offsetHeight;
    win.style.left=Math.max(0,Math.min(nx,maxX))+'px';
    win.style.top=Math.max(28,Math.min(ny,maxY-58))+'px';
  });
  document.addEventListener('mouseup',()=>{dragging=false});
}

document.querySelectorAll('.window').forEach(win=>{
  const bar=win.querySelector('.win-titlebar');
  makeDraggable(win,bar);
  win.addEventListener('mousedown',()=>bringToFront(win));
  win.querySelector('.win-close').addEventListener('click',()=>hideWindow(win));
  win.querySelector('.win-minimize').addEventListener('click',()=>{}); // decorative
  win.querySelector('.win-maximize').addEventListener('click',()=>{}); // decorative
});

document.getElementById('open-files').addEventListener('click',()=>{
  showWindow(document.getElementById('files-window'));
});
document.getElementById('open-notepad').addEventListener('click',()=>{
  showWindow(document.getElementById('notepad-window'));
});

// ─── Filesystem ──────────────────────────────────────────────────────────────
const FS={
  '/':{d:true,c:['bin','etc','home','usr','var']},
  '/bin':{d:true,c:['bash','cat','chmod','cp','echo','grep','ls','mkdir','mv','rm','sh']},
  '/etc':{d:true,c:['apt','fstab','hostname','hosts','network','passwd','ssh']},
  '/etc/apt':{d:true,c:['preferences','sources.list','trusted.gpg']},
  '/etc/ssh':{d:true,c:['ssh_config','sshd_config']},
  '/etc/network':{d:true,c:['interfaces']},
  '/home':{d:true,c:['user']},
  '/home/user':{d:true,c:['.bashrc','.profile','.ssh','Documents','Downloads','Pictures']},
  '/home/user/.ssh':{d:true,c:['authorized_keys','config','id_rsa','id_rsa.pub','known_hosts']},
  '/home/user/Documents':{d:true,c:['budget.xlsx','notes.txt','projects','readme.md','resume.pdf']},
  '/home/user/Documents/projects':{d:true,c:['scripts','webapp']},
  '/home/user/Documents/projects/scripts':{d:true,c:['backup.sh','deploy.sh','sync.sh']},
  '/home/user/Documents/projects/webapp':{d:true,c:['app.js','index.html','style.css']},
  '/home/user/Downloads':{d:true,c:['archive.tar.gz','setup.sh','ubuntu-22.04.iso']},
  '/home/user/Pictures':{d:true,c:['screenshot.png','vacation','wallpaper.jpg']},
  '/home/user/Pictures/vacation':{d:true,c:['beach.jpg','hotel.jpg','panorama.jpg']},
  '/usr':{d:true,c:['bin','include','lib','local','share']},
  '/usr/bin':{d:true,c:['curl','gcc','git','make','nano','node','python3','vim','wget']},
  '/usr/include':{d:true,c:['stdio.h','stdlib.h','string.h']},
  '/usr/lib':{d:true,c:['python3','systemd','x86_64-linux-gnu']},
  '/usr/local':{d:true,c:['bin','lib','share']},
  '/usr/local/bin':{d:true,c:['code','npm','yarn']},
  '/usr/share':{d:true,c:['applications','doc','fonts','icons','man']},
  '/var':{d:true,c:['cache','lib','log','run','tmp']},
  '/var/cache':{d:true,c:['apt','fontconfig']},
  '/var/lib':{d:true,c:['apt','dpkg','systemd']},
  '/var/log':{d:true,c:['apt','auth.log','kern.log','syslog']},
  '/var/log/apt':{d:true,c:['history.log','term.log']},
  '/var/run':{d:true,c:['sshd.pid','systemd']},
  '/var/tmp':{d:true,c:[]}
};

function isDir(path){return !!(FS[path]&&FS[path].d)}

function iconFor(name,parentPath){
  const full=parentPath==='/'?'/'+name:parentPath+'/'+name;
  if(isDir(full)){
    const map={home:'🏠',Documents:'📂',Downloads:'⬇️',Pictures:'🖼️',
               bin:'⚙️',etc:'🔧',usr:'📦',var:'📊',log:'📋',
               lib:'🗄️',share:'📤',local:'🗂️',include:'📎',
               apt:'📦',ssh:'🔐',network:'🌐',cache:'💾',run:'⚡',tmp:'🗑️'};
    return map[name]||'📁';
  }
  const ext=(name.includes('.')?name.split('.').pop():'').toLowerCase();
  const map={
    sh:'⚙️',bash:'⚙️',py:'🐍',js:'🟨',ts:'🔷',
    html:'🌐',css:'🎨',json:'📋',xml:'📋',
    pdf:'📄',txt:'📝',md:'📝',
    png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🖼️',svg:'🖼️',
    iso:'💿',gz:'🗜️',tar:'🗜️',zip:'🗜️',
    xlsx:'📊',csv:'📊',
    log:'📋',conf:'🔧',cfg:'🔧',
    h:'📎',c:'📝',
    rsa:'🔑',pub:'🔑',
    list:'📋'
  };
  return map[ext]||(name.startsWith('.')? '⚙️':'📄');
}

let curPath='/';

function navigate(path){
  if(!isDir(path))return;
  curPath=path;
  document.getElementById('files-path').textContent=path;
  renderFiles();
}

function renderFiles(){
  const el=document.getElementById('files-content');
  el.innerHTML='';
  const node=FS[curPath];
  if(!node)return;
  (node.c||[]).forEach(name=>{
    const full=curPath==='/'?'/'+name:curPath+'/'+name;
    const dir=isDir(full);
    const item=document.createElement('div');
    item.className='fs-item';
    item.dataset.path=full;
    item.dataset.dir=dir?'1':'0';

    const ic=document.createElement('div');
    ic.className='fs-icon';
    ic.textContent=iconFor(name,curPath);

    const lb=document.createElement('div');
    lb.className='fs-label';
    lb.textContent=name;

    item.appendChild(ic);
    item.appendChild(lb);

    item.addEventListener('click',e=>{
      document.querySelectorAll('#files-content .fs-item.selected')
        .forEach(x=>x.classList.remove('selected'));
      item.classList.add('selected');
    });

    let lastClick=0;
    item.addEventListener('click',()=>{
      const now=Date.now();
      if(now-lastClick<400&&dir)navigate(full);
      lastClick=now;
    });
    // Native dblclick also navigates
    item.addEventListener('dblclick',()=>{if(dir)navigate(full)});

    el.appendChild(item);
  });
}

document.getElementById('files-up').addEventListener('click',()=>{
  if(curPath==='/')return;
  const parts=curPath.split('/').filter(Boolean);
  parts.pop();
  navigate(parts.length===0?'/':`/${parts.join('/')}`);
});

navigate('/');

// ─── Notepad (with localStorage) ─────────────────────────────────────────────
const LS_TABS='dt_notepad_tabs';
const LS_ACT='dt_notepad_active';

function loadTabs(){
  try{
    const raw=localStorage.getItem(LS_TABS);
    if(raw){const t=JSON.parse(raw);if(Array.isArray(t)&&t.length)return t;}
  }catch(_){}
  return [{id:1,title:'Untitled 1',content:''}];
}
function loadActive(tabs){
  try{
    const id=parseInt(localStorage.getItem(LS_ACT));
    if(tabs.find(t=>t.id===id))return id;
  }catch(_){}
  return tabs[0].id;
}

let tabs=loadTabs();
let activeId=loadActive(tabs);
let nextId=Math.max(...tabs.map(t=>t.id))+1;

function saveTabs(){
  try{
    localStorage.setItem(LS_TABS,JSON.stringify(tabs));
    localStorage.setItem(LS_ACT,String(activeId));
  }catch(_){}
}

function renderTabs(){
  const strip=document.getElementById('tabs');
  strip.innerHTML='';
  tabs.forEach(tab=>{
    const el=document.createElement('div');
    el.className='tab'+(tab.id===activeId?' active':'');
    el.dataset.id=tab.id;

    const nm=document.createElement('span');
    nm.className='tab-name';
    nm.textContent=tab.title;

    const x=document.createElement('button');
    x.className='tab-x';
    x.textContent='×';
    x.title='Close';

    el.appendChild(nm);
    el.appendChild(x);

    el.addEventListener('click',e=>{
      if(e.target===x)return;
      flushEditor();
      activeId=tab.id;
      saveTabs();
      renderTabs();
      document.getElementById('editor').value=tabs.find(t=>t.id===activeId)?.content||'';
    });
    x.addEventListener('click',e=>{
      e.stopPropagation();
      removeTab(tab.id);
    });

    strip.appendChild(el);
  });
  // scroll active into view
  const activeEl=strip.querySelector('.tab.active');
  if(activeEl)activeEl.scrollIntoView({inline:'nearest',block:'nearest'});
}

function flushEditor(){
  const t=tabs.find(t=>t.id===activeId);
  if(t)t.content=document.getElementById('editor').value;
}

function removeTab(id){
  flushEditor();
  if(tabs.length<=1){
    // Reset single tab
    tabs[0].content='';
    tabs[0].title='Untitled 1';
    activeId=tabs[0].id;
    saveTabs();
    renderTabs();
    document.getElementById('editor').value='';
    return;
  }
  const idx=tabs.findIndex(t=>t.id===id);
  tabs.splice(idx,1);
  if(activeId===id){
    activeId=tabs[Math.min(idx,tabs.length-1)].id;
  }
  saveTabs();
  renderTabs();
  document.getElementById('editor').value=tabs.find(t=>t.id===activeId)?.content||'';
}

document.getElementById('new-tab').addEventListener('click',()=>{
  flushEditor();
  const id=nextId++;
  const num=tabs.length+1;
  tabs.push({id,title:`Untitled ${num}`,content:''});
  activeId=id;
  saveTabs();
  renderTabs();
  const ed=document.getElementById('editor');
  ed.value='';
  ed.focus();
});

document.getElementById('editor').addEventListener('input',()=>{
  const t=tabs.find(t=>t.id===activeId);
  if(!t)return;
  t.content=document.getElementById('editor').value;
  // derive title from first line
  const first=t.content.split('\n')[0].trim();
  const tabIdx=tabs.indexOf(t);
  t.title=first?first.slice(0,22)+(first.length>22?'…':''):`Untitled ${tabIdx+1}`;
  saveTabs();
  // update tab label without full re-render
  const nm=document.querySelector(`#tabs .tab[data-id="${activeId}"] .tab-name`);
  if(nm)nm.textContent=t.title;
});

// Initial render
renderTabs();
document.getElementById('editor').value=tabs.find(t=>t.id===activeId)?.content||'';
</script>
</body>
</html>
