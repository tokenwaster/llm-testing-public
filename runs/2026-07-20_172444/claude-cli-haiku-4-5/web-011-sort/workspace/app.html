<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        #bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            width: 100%;
            height: 400px;
            background-color: #2a2a2a;
            border-radius: 6px;
            padding: 20px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .bar {
            flex: 1;
            background-color: #3b82f6;
            border-radius: 2px;
            transition: all 0.1s ease-out;
            min-width: 1px;
        }

        .bar.comparing {
            background-color: #f59e0b;
        }

        .bar.sorted {
            background-color: #10b981;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 11px 26px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #sort {
            background-color: #3b82f6;
            color: white;
        }

        #sort:hover:not(:disabled) {
            background-color: #2563eb;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        #sort:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #shuffle {
            background-color: #6b7280;
            color: white;
        }

        #shuffle:hover:not(:disabled) {
            background-color: #4b5563;
        }

        #shuffle:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #reset {
            background-color: #8b5cf6;
            color: white;
        }

        #reset:hover {
            background-color: #7c3aed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sorting Visualizer</h1>
        <div id="bars"></div>
        <div class="controls">
            <button id="shuffle">Shuffle</button>
            <button id="sort">Sort</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <script>
        const state = {
            array: [],
            bubblePass: 0,
            bubbleIndex: 0,
            comparingIndices: [],
            isSorted: false,
        };

        function render() {
            const container = document.getElementById('bars');
            container.innerHTML = '';
            
            const maxVal = Math.max(...state.array);
            
            state.array.forEach((val, idx) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = (val / maxVal * 100) + '%';
                
                if (state.comparingIndices.includes(idx)) {
                    bar.classList.add('comparing');
                }
                if (state.isSorted) {
                    bar.classList.add('sorted');
                }
                
                container.appendChild(bar);
            });
        }

        function createArray(size = 60) {
            const arr = Array.from({ length: size }, (_, i) => i + 1);
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function resetSort() {
            state.bubblePass = 0;
            state.bubbleIndex = 0;
            state.comparingIndices = [];
            state.isSorted = false;
        }

        window.viz = {
            array() {
                return [...state.array];
            },
            
            setArray(arr) {
                state.array = [...arr];
                resetSort();
                render();
            },
            
            sorted() {
                for (let i = 1; i < state.array.length; i++) {
                    if (state.array[i] < state.array[i - 1]) {
                        return false;
                    }
                }
                return true;
            },
            
            sortStep() {
                if (state.isSorted) {
                    return true;
                }

                const arr = state.array;
                const n = arr.length;
                
                if (state.bubblePass >= n - 1) {
                    state.isSorted = true;
                    state.comparingIndices = [];
                    render();
                    return true;
                }

                if (state.bubbleIndex >= n - 1 - state.bubblePass) {
                    state.bubblePass++;
                    state.bubbleIndex = 0;
                    
                    if (state.bubblePass >= n - 1) {
                        state.isSorted = true;
                        state.comparingIndices = [];
                        render();
                        return true;
                    }
                }

                const i = state.bubbleIndex;
                state.comparingIndices = [i, i + 1];
                
                if (arr[i] > arr[i + 1]) {
                    [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
                }

                state.bubbleIndex++;
                render();
                
                return false;
            }
        };

        // Button handlers
        document.getElementById('shuffle').addEventListener('click', () => {
            state.array = createArray(state.array.length);
            resetSort();
            render();
        });

        document.getElementById('reset').addEventListener('click', () => {
            state.array = createArray();
            resetSort();
            render();
        });

        document.getElementById('sort').addEventListener('click', async () => {
            document.getElementById('sort').disabled = true;
            document.getElementById('shuffle').disabled = true;
            
            while (!window.viz.sortStep()) {
                await new Promise(resolve => setTimeout(resolve, 10));
            }
            
            document.getElementById('sort').disabled = false;
            document.getElementById('shuffle').disabled = false;
        });

        // Initialize
        state.array = createArray();
        render();
    </script>
</body>
</html>
