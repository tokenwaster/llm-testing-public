<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Physics Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        canvas {
            display: block;
            background-color: #0f0f0f;
            border: 2px solid #333;
            cursor: crosshair;
            width: 600px;
            height: 600px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.05s;
            font-weight: 500;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bouncing Ball Physics</h1>
        <canvas id="sim" width="600" height="600"></canvas>
        <div class="controls">
            <button id="drop">Drop Ball</button>
            <button id="play">Play</button>
            <button id="clear">Clear</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sim');
        const ctx = canvas.getContext('2d');
        
        const GRAVITY = 0.35;
        const RESTITUTION = 0.82;
        const DEFAULT_RADIUS = 7;
        
        let ballsList = [];
        let isAnimating = false;
        let animationId = null;

        const sim = {
            w: canvas.width,
            h: canvas.height,
            
            balls() {
                return ballsList.map(ball => ({
                    x: ball.x,
                    y: ball.y,
                    vx: ball.vx,
                    vy: ball.vy,
                    r: ball.r
                }));
            },
            
            addBall(x, y, vx = 0, vy = 0, r = DEFAULT_RADIUS) {
                const clampedX = Math.max(r, Math.min(x, canvas.width - r));
                const clampedY = Math.max(r, Math.min(y, canvas.height - r));
                ballsList.push({
                    x: clampedX,
                    y: clampedY,
                    vx: vx,
                    vy: vy,
                    r: r
                });
                draw();
            },
            
            clear() {
                ballsList = [];
                draw();
            },
            
            step(dt = 1) {
                for (let ball of ballsList) {
                    ball.vy += GRAVITY * dt;
                    ball.x += ball.vx * dt;
                    ball.y += ball.vy * dt;
                    
                    if (ball.x - ball.r < 0) {
                        ball.x = ball.r;
                        ball.vx *= -RESTITUTION;
                    }
                    if (ball.x + ball.r > canvas.width) {
                        ball.x = canvas.width - ball.r;
                        ball.vx *= -RESTITUTION;
                    }
                    if (ball.y - ball.r < 0) {
                        ball.y = ball.r;
                        ball.vy *= -RESTITUTION;
                    }
                    if (ball.y + ball.r > canvas.height) {
                        ball.y = canvas.height - ball.r;
                        ball.vy *= -RESTITUTION;
                    }
                }
                draw();
            }
        };

        window.sim = sim;

        function draw() {
            ctx.fillStyle = '#0f0f0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            for (let ball of ballsList) {
                const grad = ctx.createRadialGradient(
                    ball.x - ball.r * 0.25, 
                    ball.y - ball.r * 0.25, 
                    0,
                    ball.x, 
                    ball.y, 
                    ball.r
                );
                grad.addColorStop(0, '#60a5fa');
                grad.addColorStop(0.7, '#3b82f6');
                grad.addColorStop(1, '#1d4ed8');
                
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.beginPath();
                ctx.arc(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            if (isAnimating) {
                sim.step(1);
                animationId = requestAnimationFrame(animate);
            }
        }

        document.getElementById('drop').addEventListener('click', () => {
            const x = Math.random() * (canvas.width - DEFAULT_RADIUS * 2) + DEFAULT_RADIUS;
            const vx = (Math.random() - 0.5) * 5;
            sim.addBall(x, 30, vx, 0);
        });

        document.getElementById('play').addEventListener('click', (e) => {
            isAnimating = !isAnimating;
            e.target.textContent = isAnimating ? 'Pause' : 'Play';
            if (isAnimating) {
                animate();
            } else if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });

        document.getElementById('clear').addEventListener('click', () => {
            sim.clear();
            isAnimating = false;
            document.getElementById('play').textContent = 'Play';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            sim.addBall(x, y);
        });

        draw();
    </script>
</body>
</html>
