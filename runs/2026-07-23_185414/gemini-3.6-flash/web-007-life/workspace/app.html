<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conway's Game of Life</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: #0b0f19;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 800px;
      width: 100%;
    }

    header {
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .controls-panel {
      background: #151c2c;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #334155;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: #334155;
      border-color: #475569;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: #10b981;
      color: #022c22;
      border-color: #34d399;
    }

    .btn-primary:hover {
      background: #059669;
      border-color: #10b981;
      color: #ffffff;
    }

    .btn-primary.active {
      background: #f59e0b;
      color: #451a03;
      border-color: #fbbf24;
    }

    .btn-primary.active:hover {
      background: #d97706;
      color: #ffffff;
    }

    .btn-danger:hover {
      background: #ef4444;
      border-color: #f87171;
      color: #ffffff;
    }

    .extra-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .control-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    input[type="range"] {
      accent-color: #10b981;
      cursor: pointer;
      width: 100px;
    }

    select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    select:hover {
      border-color: #475569;
    }

    .canvas-container {
      position: relative;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    #life {
      width: 500px;
      height: 500px;
      min-width: 400px;
      min-height: 400px;
      max-width: 90vw;
      max-height: 90vw;
      aspect-ratio: 1 / 1;
      background-color: #0b0f19;
      border: 1px solid #1e293b;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(16, 185, 129, 0.1);
      cursor: crosshair;
      touch-action: none;
      display: block;
    }

    .stats-panel {
      display: flex;
      gap: 16px;
      width: 100%;
      justify-content: center;
    }

    .stat-card {
      background: #151c2c;
      border: 1px solid #1e293b;
      padding: 8px 16px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 110px;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Conway's Game of Life</h1>
      <p>Standard B3/S23 Rules • Interactive Canvas</p>
    </header>

    <main style="width: 100%; display: flex; flex-direction: column; gap: 20px; align-items: center;">
      <div class="controls-panel">
        <div class="button-group">
          <button id="play" class="btn btn-primary" title="Toggle Auto-Run">▶ Play</button>
          <button id="step" class="btn" title="Advance 1 Generation">⏭ Step</button>
          <button id="random" class="btn" title="Seed Random Cells">🎲 Random</button>
          <button id="clear" class="btn btn-danger" title="Clear Grid">🗑 Clear</button>
        </div>

        <div class="extra-controls">
          <div class="control-item">
            <label for="speed">Speed:</label>
            <input type="range" id="speed" min="1" max="30" value="10">
            <span id="fps-label" style="min-width: 45px;">10 FPS</span>
          </div>

          <div class="control-item">
            <label for="preset">Presets:</label>
            <select id="preset">
              <option value="" disabled selected>Select...</option>
              <option value="glider">Glider</option>
              <option value="blinker">Blinker</option>
              <option value="pulsar">Pulsar</option>
              <option value="gosper">Gosper Gun</option>
              <option value="acorn">Acorn</option>
            </select>
          </div>
        </div>
      </div>

      <div class="canvas-container">
        <canvas id="life" width="600" height="600"></canvas>
      </div>

      <div class="stats-panel">
        <div class="stat-card">
          <span class="stat-label">Generation</span>
          <span id="stat-gen" class="stat-value">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Population</span>
          <span id="stat-pop" class="stat-value">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Density</span>
          <span id="stat-density" class="stat-value">0%</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    const W = 50;
    const H = 50;
    let grid = new Uint8Array(W * H);
    let generation = 0;
    let isRunning = false;
    let timer = null;
    let fps = 10;

    const canvas = document.getElementById('life');
    const ctx = canvas.getContext('2d');

    // Canvas drawing
    function draw() {
      ctx.fillStyle = '#0b0f19';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cellW = canvas.width / W;
      const cellH = canvas.height / H;

      // Draw subtle grid lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 0; x <= W; x++) {
        const px = Math.floor(x * cellW) + 0.5;
        ctx.moveTo(px, 0);
        ctx.lineTo(px, canvas.height);
      }
      for (let y = 0; y <= H; y++) {
        const py = Math.floor(y * cellH) + 0.5;
        ctx.moveTo(0, py);
        ctx.lineTo(canvas.width, py);
      }
      ctx.stroke();

      // Draw live cells
      ctx.fillStyle = '#10b981';
      ctx.shadowColor = '#10b981';
      ctx.shadowBlur = 4;

      const pad = 1.5;
      const rw = cellW - pad * 2;
      const rh = cellH - pad * 2;
      const r = 2;

      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          if (grid[y * W + x]) {
            const rx = x * cellW + pad;
            const ry = y * cellH + pad;
            ctx.beginPath();
            if (ctx.roundRect) {
              ctx.roundRect(rx, ry, rw, rh, r);
            } else {
              ctx.rect(rx, ry, rw, rh);
            }
            ctx.fill();
          }
        }
      }
      ctx.shadowBlur = 0;
    }

    function updateStats() {
      let count = 0;
      for (let i = 0; i < W * H; i++) {
        if (grid[i]) count++;
      }
      document.getElementById('stat-gen').textContent = generation;
      document.getElementById('stat-pop').textContent = count;
      const density = ((count / (W * H)) * 100).toFixed(1);
      document.getElementById('stat-density').textContent = density + '%';
    }

    // Simulation step (Simultaneous update)
    function stepSimulation() {
      const nextGrid = new Uint8Array(W * H);
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          let count = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = x + dx;
              const ny = y + dy;
              if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
                count += grid[ny * W + nx];
              }
            }
          }
          const idx = y * W + x;
          const alive = grid[idx];
          if (alive) {
            nextGrid[idx] = (count === 2 || count === 3) ? 1 : 0;
          } else {
            nextGrid[idx] = (count === 3) ? 1 : 0;
          }
        }
      }
      grid = nextGrid;
      generation++;
      updateStats();
      draw();
    }

    // Programmatic API on window.life
    window.life = {
      w: W,
      h: H,
      get: function(x, y) {
        if (x < 0 || x >= W || y < 0 || y >= H) return 0;
        return grid[y * W + x] ? 1 : 0;
      },
      set: function(x, y, v) {
        if (x >= 0 && x < W && y >= 0 && y < H) {
          grid[y * W + x] = v ? 1 : 0;
          updateStats();
          draw();
        }
      },
      step: function() {
        stepSimulation();
      },
      clear: function() {
        grid.fill(0);
        generation = 0;
        updateStats();
        draw();
      }
    };

    // Auto-run loop
    function startLoop() {
      stopLoop();
      timer = setInterval(() => {
        stepSimulation();
      }, 1000 / fps);
    }

    function stopLoop() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function togglePlay() {
      isRunning = !isRunning;
      const playBtn = document.getElementById('play');
      if (isRunning) {
        playBtn.textContent = '⏸ Pause';
        playBtn.classList.add('active');
        startLoop();
      } else {
        playBtn.textContent = '▶ Play';
        playBtn.classList.remove('active');
        stopLoop();
      }
    }

    function randomize() {
      for (let i = 0; i < W * H; i++) {
        grid[i] = Math.random() < 0.25 ? 1 : 0;
      }
      generation = 0;
      updateStats();
      draw();
    }

    // Interactive Paint / Drag on Canvas
    let isDrawing = false;
    let paintTarget = 1;
    let lastCell = { x: -1, y: -1 };

    function getGridCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX;
      const clientY = e.clientY;
      const x = Math.floor(((clientX - rect.left) / rect.width) * W);
      const y = Math.floor(((clientY - rect.top) / rect.height) * H);
      return { x, y };
    }

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      isDrawing = true;
      const { x, y } = getGridCoords(e);
      if (x >= 0 && x < W && y >= 0 && y < H) {
        paintTarget = window.life.get(x, y) ? 0 : 1;
        window.life.set(x, y, paintTarget);
        lastCell = { x, y };
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDrawing) return;
      const { x, y } = getGridCoords(e);
      if (x >= 0 && x < W && y >= 0 && y < H) {
        if (x !== lastCell.x || y !== lastCell.y) {
          window.life.set(x, y, paintTarget);
          lastCell = { x, y };
        }
      }
    });

    const stopDrawing = (e) => {
      if (isDrawing) {
        isDrawing = false;
        try { canvas.releasePointerCapture(e.pointerId); } catch(err){}
      }
    };

    canvas.addEventListener('pointerup', stopDrawing);
    canvas.addEventListener('pointercancel', stopDrawing);

    // Preset Patterns
    function loadPreset(name) {
      window.life.clear();
      let coords = [];
      if (name === 'glider') {
        coords = [[1,0], [2,1], [0,2], [1,2], [2,2]];
      } else if (name === 'blinker') {
        coords = [[0,1], [1,1], [2,1]];
      } else if (name === 'pulsar') {
        coords = [
          [2,0],[3,0],[4,0],[8,0],[9,0],[10,0],
          [0,2],[5,2],[7,2],[12,2],
          [0,3],[5,3],[7,3],[12,3],
          [0,4],[5,4],[7,4],[12,4],
          [2,5],[3,5],[4,5],[8,5],[9,5],[10,5],
          [2,7],[3,7],[4,7],[8,7],[9,7],[10,7],
          [0,8],[5,8],[7,8],[12,8],
          [0,9],[5,9],[7,9],[12,9],
          [0,10],[5,10],[7,10],[12,10],
          [2,12],[3,12],[4,12],[8,12],[9,12],[10,12]
        ];
      } else if (name === 'gosper') {
        coords = [
          [24,0],[22,1],[24,1],[12,2],[13,2],[20,2],[21,2],[34,2],[35,2],
          [11,3],[15,3],[20,3],[21,3],[34,3],[35,3],[0,4],[1,4],[10,4],[16,4],
          [20,4],[21,4],[0,5],[1,5],[10,5],[14,5],[16,5],[17,5],[22,5],[24,5],
          [10,6],[16,6],[24,6],[11,7],[15,7],[12,8],[13,8]
        ];
      } else if (name === 'acorn') {
        coords = [[1,0],[3,1],[0,2],[1,2],[4,2],[5,2],[6,2]];
      }

      if (coords.length > 0) {
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        coords.forEach(([x, y]) => {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        });
        const pw = maxX - minX + 1;
        const ph = maxY - minY + 1;
        const startX = Math.floor((W - pw) / 2) - minX;
        const startY = Math.floor((H - ph) / 2) - minY;

        coords.forEach(([x, y]) => {
          window.life.set(startX + x, startY + y, 1);
        });
      }
    }

    // Event Listeners
    document.getElementById('play').addEventListener('click', togglePlay);
    document.getElementById('step').addEventListener('click', () => {
      if (isRunning) togglePlay();
      window.life.step();
    });
    document.getElementById('random').addEventListener('click', () => {
      randomize();
    });
    document.getElementById('clear').addEventListener('click', () => {
      if (isRunning) togglePlay();
      window.life.clear();
    });

    const speedInput = document.getElementById('speed');
    const fpsLabel = document.getElementById('fps-label');
    speedInput.addEventListener('input', (e) => {
      fps = parseInt(e.target.value, 10);
      fpsLabel.textContent = `${fps} FPS`;
      if (isRunning) startLoop();
    });

    const presetSelect = document.getElementById('preset');
    presetSelect.addEventListener('change', (e) => {
      if (isRunning) togglePlay();
      loadPreset(e.target.value);
      presetSelect.selectedIndex = 0;
    });

    // Initial load preset
    loadPreset('glider');
  </script>
</body>
</html>
