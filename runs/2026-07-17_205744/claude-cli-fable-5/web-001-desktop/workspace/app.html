<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "Ubuntu", "Segoe UI", "DejaVu Sans", sans-serif;
    font-size: 14px;
    color: #eee;
    user-select: none;
  }

  /* ---------- Desktop ---------- */
  #desktop {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1200px 700px at 70% 30%, rgba(233,84,32,.35), transparent 60%),
      radial-gradient(900px 600px at 20% 80%, rgba(119,33,111,.5), transparent 60%),
      linear-gradient(135deg, #2c001e 0%, #4a1039 45%, #77216f 75%, #e95420 130%);
    overflow: hidden;
  }
  #desktop::after {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 26px 26px;
    pointer-events: none;
  }

  /* ---------- Top bar ---------- */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 30px;
    background: rgba(20, 18, 24, .92);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 12.5px;
    z-index: 5000;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  #topbar .tb-left { font-weight: 700; letter-spacing: .3px; }
  #topbar .tb-right { display: flex; gap: 10px; align-items: center; opacity: .9; }
  #clock { font-variant-numeric: tabular-nums; }

  /* ---------- Dock / taskbar ---------- */
  #taskbar {
    position: absolute;
    left: 0;
    top: 30px;
    bottom: 0;
    width: 68px;
    background: rgba(20, 18, 24, .82);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    gap: 10px;
    z-index: 4000;
    border-right: 1px solid rgba(255,255,255,.06);
  }
  .launcher {
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,.07);
    color: #eee;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 9px;
    transition: background .15s, transform .1s;
  }
  .launcher:hover { background: rgba(255,255,255,.16); }
  .launcher:active { transform: scale(.94); }
  .launcher .icon {
    width: 30px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; line-height: 1;
  }
  .launcher.running::after {
    content: "";
    position: absolute;
    left: 3px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #e95420;
  }
  .launcher { position: relative; }

  /* ---------- Windows ---------- */
  .app-window {
    position: absolute;
    width: 560px;
    height: 400px;
    min-width: 360px;
    min-height: 240px;
    background: #2b2b33;
    border-radius: 10px;
    box-shadow: 0 18px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
  }
  .app-window.hidden { display: none; }

  .titlebar {
    height: 38px;
    flex: 0 0 38px;
    background: linear-gradient(#3a3a44, #313139);
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: grab;
    border-bottom: 1px solid rgba(0,0,0,.35);
  }
  .titlebar:active { cursor: grabbing; }
  .titlebar .title {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 13px;
    color: #ddd;
    pointer-events: none;
  }
  .win-close {
    width: 24px; height: 24px;
    border: none;
    border-radius: 50%;
    background: #e95420;
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter .12s;
  }
  .win-close:hover { filter: brightness(1.2); }
  .win-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #24242b;
  }

  /* ---------- Files app ---------- */
  #files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #2e2e37;
    border-bottom: 1px solid rgba(0,0,0,.35);
    flex: 0 0 auto;
  }
  #files-up {
    border: none;
    background: rgba(255,255,255,.09);
    color: #eee;
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 14px;
  }
  #files-up:hover:not(:disabled) { background: rgba(255,255,255,.18); }
  #files-up:disabled { opacity: .35; cursor: default; }
  #files-path {
    flex: 1;
    background: #1d1d23;
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: "Ubuntu Mono", Consolas, monospace;
    font-size: 13px;
    color: #ffb59a;
    white-space: nowrap;
    overflow-x: auto;
  }
  #files-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 6px;
    align-content: start;
  }
  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 4px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    word-break: break-all;
    font-size: 12.5px;
  }
  .fs-item:hover { background: rgba(255,255,255,.08); }
  .fs-item .fs-icon { font-size: 30px; line-height: 1; pointer-events: none; }
  .fs-item .fs-name { pointer-events: none; }
  .fs-empty { grid-column: 1 / -1; opacity: .55; padding: 20px; text-align: center; }

  /* ---------- Notepad app ---------- */
  #tabs {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 8px 0 8px;
    background: #2e2e37;
    overflow-x: auto;
    flex: 0 0 auto;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(255,255,255,.06);
    border-radius: 7px 7px 0 0;
    cursor: pointer;
    font-size: 12.5px;
    white-space: nowrap;
    color: #bbb;
    border: 1px solid transparent;
    border-bottom: none;
  }
  .tab:hover { background: rgba(255,255,255,.12); }
  .tab.active {
    background: #1d1d23;
    color: #fff;
    border-color: rgba(255,255,255,.1);
  }
  .tab .tab-x {
    opacity: .55;
    font-size: 11px;
    padding: 0 2px;
    border-radius: 3px;
  }
  .tab .tab-x:hover { opacity: 1; background: rgba(255,255,255,.15); }
  #new-tab {
    border: none;
    background: rgba(255,255,255,.09);
    color: #eee;
    border-radius: 6px;
    width: 26px; height: 26px;
    cursor: pointer;
    font-size: 15px;
    flex: 0 0 auto;
    margin-bottom: 4px;
  }
  #new-tab:hover { background: rgba(255,255,255,.2); }
  #editor {
    flex: 1;
    width: 100%;
    resize: none;
    border: none;
    outline: none;
    background: #1d1d23;
    color: #eaeaea;
    padding: 12px 14px;
    font-family: "Ubuntu Mono", Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
    min-height: 0;
    user-select: text;
  }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="desktop">
  <div id="topbar">
    <div class="tb-left">Activities</div>
    <div class="tb-right"><span>&#9679;</span><span id="clock"></span></div>
  </div>

  <div id="taskbar">
    <button id="open-files" class="launcher" title="Files">
      <span class="icon">&#128193;</span><span>Files</span>
    </button>
    <button id="open-notepad" class="launcher" title="Notepad">
      <span class="icon">&#128221;</span><span>Notepad</span>
    </button>
  </div>

  <!-- Files window -->
  <div id="files-window" class="app-window hidden" style="left:130px; top:80px; width:600px; height:420px;">
    <div class="titlebar">
      <span style="width:24px"></span>
      <span class="title">Files</span>
      <button class="win-close" title="Close">&#10005;</button>
    </div>
    <div class="win-body">
      <div id="files-toolbar">
        <button id="files-up" title="Up one level">&#8593;</button>
        <div id="files-path">/</div>
      </div>
      <div id="files-list"></div>
    </div>
  </div>

  <!-- Notepad window -->
  <div id="notepad-window" class="app-window hidden" style="left:280px; top:140px; width:580px; height:410px;">
    <div class="titlebar">
      <span style="width:24px"></span>
      <span class="title">Notepad</span>
      <button class="win-close" title="Close">&#10005;</button>
    </div>
    <div class="win-body">
      <div id="tabs"></div>
      <textarea id="editor" spellcheck="false" placeholder="Start typing…"></textarea>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ================= Clock ================= */
  var clockEl = document.getElementById("clock");
  function tick() {
    var d = new Date();
    var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    function p(n) { return (n < 10 ? "0" : "") + n; }
    clockEl.textContent = days[d.getDay()] + " " + months[d.getMonth()] + " " +
      d.getDate() + "  " + p(d.getHours()) + ":" + p(d.getMinutes());
  }
  tick();
  setInterval(tick, 10000);

  /* ================= Window manager ================= */
  var zCounter = 200;
  var desktop = document.getElementById("desktop");

  function bringToFront(win) {
    win.style.zIndex = ++zCounter;
  }

  function setupWindow(winId, launcherId) {
    var win = document.getElementById(winId);
    var launcher = document.getElementById(launcherId);
    var titlebar = win.querySelector(".titlebar");
    var closeBtn = win.querySelector(".win-close");

    launcher.addEventListener("click", function () {
      win.classList.remove("hidden");
      launcher.classList.add("running");
      bringToFront(win);
    });
    closeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      win.classList.add("hidden");
      launcher.classList.remove("running");
    });
    win.addEventListener("mousedown", function () { bringToFront(win); });

    // Dragging
    var drag = null;
    titlebar.addEventListener("mousedown", function (e) {
      if (e.target === closeBtn) return;
      drag = { x: e.clientX - win.offsetLeft, y: e.clientY - win.offsetTop };
      bringToFront(win);
      e.preventDefault();
    });
    document.addEventListener("mousemove", function (e) {
      if (!drag) return;
      var nx = e.clientX - drag.x;
      var ny = e.clientY - drag.y;
      var maxX = desktop.clientWidth - 120;
      var maxY = desktop.clientHeight - 60;
      win.style.left = Math.min(Math.max(nx, -win.offsetWidth + 120), maxX) + "px";
      win.style.top = Math.min(Math.max(ny, 30), maxY) + "px";
    });
    document.addEventListener("mouseup", function () { drag = null; });
    return win;
  }

  setupWindow("files-window", "open-files");
  setupWindow("notepad-window", "open-notepad");

  /* ================= Files app ================= */
  // Folders are objects; files are strings (fake sizes).
  var FS = {
    bin: { bash: "1.2M", cat: "43K", cp: "153K", ls: "142K", mkdir: "88K", mv: "147K", rm: "72K", sh: "1.2M" },
    boot: { "vmlinuz-6.8.0-45-generic": "13M", "initrd.img-6.8.0-45-generic": "68M", grub: { "grub.cfg": "9.1K" } },
    dev: { null: "0", random: "0", sda: "0", tty: "0", zero: "0" },
    etc: {
      "fstab": "665B", "hostname": "8B", "hosts": "221B", "os-release": "386B",
      "passwd": "2.1K", "resolv.conf": "92B",
      apt: { "sources.list": "2.8K" },
      ssh: { "sshd_config": "3.2K" }
    },
    home: {
      user: {
        Documents: {
          "notes.txt": "1.4K",
          "resume.odt": "38K",
          "thesis-draft.md": "82K",
          projects: { "todo.md": "512B", "ideas.txt": "2.2K" }
        },
        Downloads: { "ubuntu-24.04-desktop-amd64.iso": "5.7G", "wallpaper.jpg": "3.1M" },
        Pictures: { "screenshot-2026-07-17.png": "812K", "vacation.jpg": "4.4M", Camera: {} },
        Music: { "mix.mp3": "8.3M" },
        Videos: {},
        ".bashrc": "3.7K",
        ".profile": "807B"
      }
    },
    lib: { "libc.so.6": "2.2M", modules: {} },
    opt: {},
    proc: { "cpuinfo": "0", "meminfo": "0", "uptime": "0" },
    root: { ".bashrc": "3.1K" },
    sbin: { "fdisk": "121K", "fsck": "55K", "init": "1.6M", "reboot": "27K" },
    srv: {},
    tmp: { "snap-private-tmp": {} },
    usr: {
      bin: { "python3": "6.9M", "gcc": "1.1M", "vim": "3.9M", "curl": "260K", "git": "3.8M" },
      lib: { firefox: {} },
      local: { bin: {}, share: {} },
      share: { doc: {}, icons: {}, fonts: {} }
    },
    var: {
      log: { "syslog": "1.8M", "auth.log": "204K", "kern.log": "633K" },
      cache: { apt: {} },
      spool: {},
      www: { html: { "index.html": "10K" } }
    }
  };

  var filesPathEl = document.getElementById("files-path");
  var filesListEl = document.getElementById("files-list");
  var filesUpBtn = document.getElementById("files-up");
  var cwd = []; // array of path segments; [] = root

  function getNode(segments) {
    var node = FS;
    for (var i = 0; i < segments.length; i++) {
      node = node[segments[i]];
      if (node == null || typeof node !== "object") return null;
    }
    return node;
  }

  function renderFiles() {
    var node = getNode(cwd);
    if (node === null) { cwd = []; node = FS; }
    filesPathEl.textContent = "/" + cwd.join("/");
    filesUpBtn.disabled = cwd.length === 0;
    filesListEl.innerHTML = "";

    var names = Object.keys(node).sort(function (a, b) {
      var aDir = typeof node[a] === "object";
      var bDir = typeof node[b] === "object";
      if (aDir !== bDir) return aDir ? -1 : 1;
      return a.localeCompare(b);
    });

    if (names.length === 0) {
      var empty = document.createElement("div");
      empty.className = "fs-empty";
      empty.textContent = "This folder is empty";
      filesListEl.appendChild(empty);
      return;
    }

    names.forEach(function (name) {
      var isDir = typeof node[name] === "object";
      var item = document.createElement("div");
      item.className = "fs-item";
      item.title = isDir ? "Folder — double-click to open" : "File (" + node[name] + ")";

      var icon = document.createElement("span");
      icon.className = "fs-icon";
      icon.textContent = isDir ? "\uD83D\uDCC1" : "\uD83D\uDCC4";

      var label = document.createElement("span");
      label.className = "fs-name";
      label.textContent = name;

      item.appendChild(icon);
      item.appendChild(label);

      if (isDir) {
        item.addEventListener("dblclick", function () {
          cwd.push(name);
          renderFiles();
        });
      }
      filesListEl.appendChild(item);
    });
  }

  filesUpBtn.addEventListener("click", function () {
    if (cwd.length > 0) {
      cwd.pop();
      renderFiles();
    }
  });

  renderFiles();

  /* ================= Notepad app ================= */
  var STORAGE_KEY = "ubuntu-notepad-v1";
  var tabsEl = document.getElementById("tabs");
  var editorEl = document.getElementById("editor");
  var state; // { tabs: [{id, name, content}], activeId, nextNum }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.tabs) && parsed.tabs.length > 0) {
          return parsed;
        }
      }
    } catch (e) { /* corrupted storage — start fresh */ }
    return {
      tabs: [{ id: "t1", name: "Untitled 1", content: "" }],
      activeId: "t1",
      nextNum: 2
    };
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* storage unavailable — keep working in memory */ }
  }

  function activeTab() {
    for (var i = 0; i < state.tabs.length; i++) {
      if (state.tabs[i].id === state.activeId) return state.tabs[i];
    }
    state.activeId = state.tabs[0].id;
    return state.tabs[0];
  }

  function renderTabs() {
    // Remove old .tab elements, keep #new-tab
    Array.prototype.slice.call(tabsEl.querySelectorAll(".tab")).forEach(function (t) {
      t.remove();
    });
    var newTabBtn = document.getElementById("new-tab");

    state.tabs.forEach(function (tab) {
      var el = document.createElement("div");
      el.className = "tab" + (tab.id === state.activeId ? " active" : "");
      el.dataset.id = tab.id;

      var label = document.createElement("span");
      label.textContent = tab.name;
      el.appendChild(label);

      if (state.tabs.length > 1) {
        var x = document.createElement("span");
        x.className = "tab-x";
        x.textContent = "\u2715";
        x.title = "Close tab";
        x.addEventListener("click", function (e) {
          e.stopPropagation();
          closeTab(tab.id);
        });
        el.appendChild(x);
      }

      el.addEventListener("click", function () {
        state.activeId = tab.id;
        saveState();
        renderTabs();
        renderEditor();
      });

      tabsEl.insertBefore(el, newTabBtn);
    });
    renderEditor();
  }

  function renderEditor() {
    editorEl.value = activeTab().content;
  }

  function closeTab(id) {
    var idx = state.tabs.findIndex(function (t) { return t.id === id; });
    if (idx === -1 || state.tabs.length <= 1) return;
    state.tabs.splice(idx, 1);
    if (state.activeId === id) {
      state.activeId = state.tabs[Math.max(0, idx - 1)].id;
    }
    saveState();
    renderTabs();
  }

  editorEl.addEventListener("input", function () {
    activeTab().content = editorEl.value;
    saveState();
  });

  // Build #new-tab (must live inside #tabs)
  var newTabBtn = document.createElement("button");
  newTabBtn.id = "new-tab";
  newTabBtn.title = "New tab";
  newTabBtn.textContent = "+";
  tabsEl.appendChild(newTabBtn);
  newTabBtn.addEventListener("click", function () {
    var id = "t" + Date.now().toString(36) + Math.floor(Math.random() * 1e4).toString(36);
    var tab = { id: id, name: "Untitled " + state.nextNum, content: "" };
    state.nextNum++;
    state.tabs.push(tab);
    state.activeId = id;
    saveState();
    renderTabs();
    editorEl.focus();
  });

  state = loadState();
  renderTabs();
})();
</script>
</body>
</html>
