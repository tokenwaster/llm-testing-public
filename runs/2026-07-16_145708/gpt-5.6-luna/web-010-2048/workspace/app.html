<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --cell: #374151;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .game {
      width: min(94vw, 460px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 3rem;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-box {
      min-width: 82px;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--panel);
      text-align: center;
      font-size: 0.78rem;
      font-weight: bold;
      color: var(--muted);
      text-transform: uppercase;
    }

    #score {
      display: block;
      margin-top: 2px;
      color: var(--text);
      font-size: 1.25rem;
    }

    #reset {
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      background: var(--accent);
      color: #111827;
      cursor: pointer;
      font-weight: bold;
    }

    #reset:hover {
      filter: brightness(1.1);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      background: var(--panel);
      aspect-ratio: 1;
    }

    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: var(--cell);
      color: var(--text);
      font-size: clamp(1.4rem, 8vw, 2.6rem);
      font-weight: bold;
      user-select: none;
    }

    .tile:not(:empty) {
      background: #4b5563;
    }

    .tile[data-value="2"] { background: #64748b; }
    .tile[data-value="4"] { background: #718096; }
    .tile[data-value="8"] { background: #d97706; }
    .tile[data-value="16"] { background: #ea580c; }
    .tile[data-value="32"] { background: #dc2626; }
    .tile[data-value="64"] { background: #b91c1c; }
    .tile[data-value="128"],
    .tile[data-value="256"],
    .tile[data-value="512"] { background: #7c3aed; }
    .tile[data-value="1024"],
    .tile[data-value="2048"] { background: #ca8a04; }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="game">
    <header>
      <h1>2048</h1>
      <div class="controls">
        <div class="score-box">
          Score
          <span id="score">0</span>
        </div>
        <button id="reset" type="button">New Game</button>
      </div>
    </header>

    <div id="board" aria-label="2048 game board"></div>
    <div class="hint">Use the arrow keys to move</div>
  </main>

  <script>
    (() => {
      const SIZE = 4;
      const boardElement = document.getElementById("board");
      const scoreElement = document.getElementById("score");
      const resetButton = document.getElementById("reset");

      let grid = [];
      let currentScore = 0;

      function emptyGrid() {
        return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      }

      function render() {
        boardElement.innerHTML = "";

        for (let row = 0; row < SIZE; row++) {
          for (let col = 0; col < SIZE; col++) {
            const value = grid[row][col];
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.dataset.value = String(value);
            tile.textContent = value === 0 ? "" : String(value);
            boardElement.appendChild(tile);
          }
        }

        scoreElement.textContent = String(currentScore);
      }

      function addRandomTile() {
        const empty = [];

        for (let row = 0; row < SIZE; row++) {
          for (let col = 0; col < SIZE; col++) {
            if (grid[row][col] === 0) {
              empty.push([row, col]);
            }
          }
        }

        if (empty.length === 0) return;

        const [row, col] = empty[Math.floor(Math.random() * empty.length)];
        grid[row][col] = Math.random() < 0.9 ? 2 : 4;
      }

      function reset() {
        grid = emptyGrid();
        currentScore = 0;
        addRandomTile();
        addRandomTile();
        render();
      }

      function processLine(line) {
        const values = line.filter(value => value !== 0);
        const result = [];
        let gained = 0;

        for (let i = 0; i < values.length; i++) {
          if (i + 1 < values.length && values[i] === values[i + 1]) {
            const merged = values[i] * 2;
            result.push(merged);
            gained += merged;
            i++;
          } else {
            result.push(values[i]);
          }
        }

        while (result.length < SIZE) {
          result.push(0);
        }

        return { line: result, gained };
      }

      function arraysEqual(a, b) {
        for (let i = 0; i < SIZE; i++) {
          if (a[i] !== b[i]) return false;
        }
        return true;
      }

      function move(direction) {
        if (!["left", "right", "up", "down"].includes(direction)) {
          return false;
        }

        const before = grid.map(row => row.slice());
        let gained = 0;

        if (direction === "left" || direction === "right") {
          for (let row = 0; row < SIZE; row++) {
            let line = grid[row].slice();

            if (direction === "right") {
              line.reverse();
            }

            const processed = processLine(line);
            gained += processed.gained;
            line = processed.line;

            if (direction === "right") {
              line.reverse();
            }

            grid[row] = line;
          }
        } else {
          for (let col = 0; col < SIZE; col++) {
            let line = [];

            for (let row = 0; row < SIZE; row++) {
              line.push(grid[row][col]);
            }

            if (direction === "down") {
              line.reverse();
            }

            const processed = processLine(line);
            gained += processed.gained;
            line = processed.line;

            if (direction === "down") {
              line.reverse();
            }

            for (let row = 0; row < SIZE; row++) {
              grid[row][col] = line[row];
            }
          }
        }

        let changed = false;
        for (let row = 0; row < SIZE; row++) {
          if (!arraysEqual(before[row], grid[row])) {
            changed = true;
            break;
          }
        }

        if (!changed) {
          return false;
        }

        currentScore += gained;
        addRandomTile();
        render();
        return true;
      }

      function setBoard(arr) {
        if (
          !Array.isArray(arr) ||
          arr.length !== SIZE ||
          arr.some(row => !Array.isArray(row) || row.length !== SIZE)
        ) {
          throw new Error("Board must be a 4x4 array.");
        }

        grid = arr.map(row => row.map(value => Number(value) || 0));
        render();
      }

      window.game = {
        size: SIZE,
        reset,
        move,
        board: () => grid.map(row => row.slice()),
        setBoard,
        score: () => currentScore
      };

      resetButton.addEventListener("click", reset);

      document.addEventListener("keydown", event => {
        const directions = {
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down"
        };

        if (directions[event.key]) {
          event.preventDefault();
          move(directions[event.key]);
        }
      });

      reset();
    })();
  </script>
</body>
</html>
