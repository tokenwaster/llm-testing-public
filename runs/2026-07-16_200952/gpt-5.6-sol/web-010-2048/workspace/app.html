<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #121419;
      --panel: #1d2027;
      --board: #292d36;
      --empty: #383d48;
      --text: #f5f7fa;
      --muted: #aeb5c2;
      --accent: #8b5cf6;
      --gap: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: auto;
      background:
        radial-gradient(circle at top, #242938 0, var(--page) 55%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    .game {
      width: min(92vw, 500px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 12vw, 5rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .controls {
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .score-box {
      min-width: 105px;
      padding: 9px 14px;
      border: 1px solid #3b414d;
      border-radius: 10px;
      background: var(--panel);
      text-align: center;
      box-shadow: 0 10px 25px #0004;
    }

    .score-label {
      display: block;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    #score {
      display: block;
      font-size: 1.35rem;
      font-weight: 800;
    }

    #reset {
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 25px #0004;
      transition: transform 120ms ease, filter 120ms ease;
    }

    #reset:hover {
      filter: brightness(1.1);
    }

    #reset:active {
      transform: translateY(1px) scale(0.98);
    }

    #reset:focus-visible {
      outline: 3px solid #c4b5fd;
      outline-offset: 3px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      width: 100%;
      aspect-ratio: 1;
      padding: var(--gap);
      border-radius: 16px;
      background: var(--board);
      box-shadow: 0 24px 60px #0007;
      user-select: none;
      touch-action: none;
    }

    .tile {
      display: grid;
      place-items: center;
      min-width: 0;
      border-radius: 10px;
      background: var(--empty);
      color: #f8fafc;
      font-size: clamp(1.2rem, 7vw, 2.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      overflow: hidden;
    }

    .tile[data-value="2"] {
      background: #475569;
    }

    .tile[data-value="4"] {
      background: #526070;
    }

    .tile[data-value="8"] {
      background: #b45309;
    }

    .tile[data-value="16"] {
      background: #c2410c;
    }

    .tile[data-value="32"] {
      background: #dc2626;
    }

    .tile[data-value="64"] {
      background: #e11d48;
    }

    .tile[data-value="128"] {
      background: #7c3aed;
      font-size: clamp(1rem, 6vw, 2.1rem);
    }

    .tile[data-value="256"] {
      background: #6d28d9;
      font-size: clamp(1rem, 6vw, 2.1rem);
    }

    .tile[data-value="512"] {
      background: #4f46e5;
      font-size: clamp(1rem, 6vw, 2.1rem);
    }

    .tile[data-value="1024"] {
      background: #2563eb;
      font-size: clamp(0.85rem, 5vw, 1.75rem);
    }

    .tile[data-value="2048"] {
      background: #059669;
      box-shadow: inset 0 0 0 3px #6ee7b7;
      font-size: clamp(0.85rem, 5vw, 1.75rem);
    }

    .tile.large {
      background: #0f766e;
      font-size: clamp(0.7rem, 4vw, 1.45rem);
    }

    .hint {
      margin: 18px 0 0;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 420px) {
      :root {
        --gap: 8px;
      }

      header {
        align-items: flex-end;
      }

      .controls {
        flex-direction: column;
      }

      #reset {
        min-height: 38px;
      }

      .score-box {
        min-width: 90px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <header>
      <h1>2048</h1>
      <div class="controls">
        <div class="score-box">
          <span class="score-label">Score</span>
          <span id="score">0</span>
        </div>
        <button id="reset" type="button">New Game</button>
      </div>
    </header>

    <div id="board" role="grid" aria-label="2048 game board"></div>
    <p class="hint">Use the arrow keys to move the tiles.</p>
  </main>

  <script>
    (() => {
      "use strict";

      const SIZE = 4;
      const boardElement = document.getElementById("board");
      const scoreElement = document.getElementById("score");
      const resetButton = document.getElementById("reset");

      let grid = createEmptyBoard();
      let currentScore = 0;

      function createEmptyBoard() {
        return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      }

      function cloneBoard(board) {
        return board.map(row => row.slice());
      }

      function boardsEqual(a, b) {
        for (let row = 0; row < SIZE; row++) {
          for (let col = 0; col < SIZE; col++) {
            if (a[row][col] !== b[row][col]) return false;
          }
        }
        return true;
      }

      function render() {
        boardElement.replaceChildren();

        for (let row = 0; row < SIZE; row++) {
          for (let col = 0; col < SIZE; col++) {
            const value = grid[row][col];
            const tile = document.createElement("div");
            tile.className = "tile";
            tile.setAttribute("role", "gridcell");

            if (value !== 0) {
              tile.textContent = String(value);
              tile.dataset.value = String(value);
              tile.setAttribute("aria-label", String(value));

              if (value > 2048) {
                tile.classList.add("large");
              }
            } else {
              tile.setAttribute("aria-label", "empty");
            }

            boardElement.appendChild(tile);
          }
        }

        scoreElement.textContent = String(currentScore);
      }

      function addRandomTile() {
        const emptyCells = [];

        for (let row = 0; row < SIZE; row++) {
          for (let col = 0; col < SIZE; col++) {
            if (grid[row][col] === 0) {
              emptyCells.push([row, col]);
            }
          }
        }

        if (emptyCells.length === 0) return false;

        const index = Math.floor(Math.random() * emptyCells.length);
        const [row, col] = emptyCells[index];
        grid[row][col] = Math.random() < 0.9 ? 2 : 4;
        return true;
      }

      function mergeLine(line) {
        const values = line.filter(value => value !== 0);
        const merged = [];

        for (let index = 0; index < values.length; index++) {
          if (
            index + 1 < values.length &&
            values[index] === values[index + 1]
          ) {
            const combined = values[index] * 2;
            merged.push(combined);
            currentScore += combined;
            index++;
          } else {
            merged.push(values[index]);
          }
        }

        while (merged.length < SIZE) {
          merged.push(0);
        }

        return merged;
      }

      function move(direction) {
        if (!["left", "right", "up", "down"].includes(direction)) {
          return false;
        }

        const before = cloneBoard(grid);
        const next = createEmptyBoard();

        if (direction === "left" || direction === "right") {
          for (let row = 0; row < SIZE; row++) {
            let line = grid[row].slice();

            if (direction === "right") line.reverse();
            line = mergeLine(line);
            if (direction === "right") line.reverse();

            next[row] = line;
          }
        } else {
          for (let col = 0; col < SIZE; col++) {
            let line = [];

            for (let row = 0; row < SIZE; row++) {
              line.push(grid[row][col]);
            }

            if (direction === "down") line.reverse();
            line = mergeLine(line);
            if (direction === "down") line.reverse();

            for (let row = 0; row < SIZE; row++) {
              next[row][col] = line[row];
            }
          }
        }

        const changed = !boardsEqual(before, next);

        if (!changed) {
          render();
          return false;
        }

        grid = next;
        addRandomTile();
        render();
        return true;
      }

      function reset() {
        grid = createEmptyBoard();
        currentScore = 0;
        addRandomTile();
        addRandomTile();
        render();
      }

      function setBoard(arr) {
        if (
          !Array.isArray(arr) ||
          arr.length !== SIZE ||
          arr.some(row => !Array.isArray(row) || row.length !== SIZE)
        ) {
          throw new TypeError("setBoard expects a 4x4 array.");
        }

        grid = arr.map(row =>
          row.map(value => {
            if (
              typeof value !== "number" ||
              !Number.isFinite(value) ||
              value < 0
            ) {
              throw new TypeError("Board cells must be non-negative numbers.");
            }
            return value;
          })
        );

        render();
      }

      window.game = {
        size: SIZE,
        reset,
        move,
        board: () => cloneBoard(grid),
        setBoard,
        score: () => currentScore
      };

      resetButton.addEventListener("click", reset);

      window.addEventListener("keydown", event => {
        const directions = {
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down"
        };

        const direction = directions[event.key];

        if (direction) {
          event.preventDefault();
          move(direction);
        }
      });

      reset();
    })();
  </script>
</body>
</html>
