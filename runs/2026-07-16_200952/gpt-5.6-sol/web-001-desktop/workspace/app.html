<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubuntu Desktop</title>
  <style>
    :root {
      color-scheme: dark;
      --aubergine: #2c071c;
      --orange: #e95420;
      --panel: rgba(25, 20, 27, 0.96);
      --window: #27242a;
      --window-light: #333037;
      --text: #f5f3f5;
      --muted: #b8b3bb;
      --border: rgba(255, 255, 255, 0.13);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.48), 0 4px 14px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Ubuntu", "Segoe UI", system-ui, sans-serif;
      background: #230b1a;
      color: var(--text);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    #desktop {
      position: fixed;
      inset: 0;
      min-width: 360px;
      min-height: 240px;
      overflow: hidden;
      user-select: none;
      background:
        radial-gradient(circle at 77% 27%, rgba(235, 86, 49, 0.44), transparent 24%),
        radial-gradient(circle at 17% 77%, rgba(112, 33, 91, 0.62), transparent 34%),
        linear-gradient(135deg, #1e0718 0%, #4b153b 49%, #982f39 100%);
    }

    #desktop::before,
    #desktop::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(1px);
    }

    #desktop::before {
      width: 55vw;
      height: 55vw;
      right: -19vw;
      top: 9vh;
      border: 2.7vw solid rgba(255, 131, 81, 0.12);
      transform: rotate(-18deg);
    }

    #desktop::after {
      width: 52vw;
      height: 17vw;
      right: 3vw;
      bottom: -12vw;
      background: rgba(255, 126, 76, 0.09);
      transform: rotate(-25deg);
      border-radius: 48%;
    }

    .top-panel {
      position: absolute;
      z-index: 1000;
      inset: 0 0 auto 0;
      height: 32px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 11px;
      color: #fff;
      background: rgba(24, 19, 25, 0.92);
      box-shadow: 0 1px rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }

    .activities {
      font-weight: 650;
      letter-spacing: 0.1px;
    }

    #clock {
      font-weight: 600;
    }

    .system-status {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #eae7eb;
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7ed779;
      box-shadow: 0 0 7px rgba(126, 215, 121, 0.8);
    }

    .desktop-caption {
      position: absolute;
      right: 32px;
      bottom: 25px;
      text-align: right;
      pointer-events: none;
      color: rgba(255, 255, 255, 0.56);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    .desktop-caption strong {
      display: block;
      font-size: clamp(24px, 4vw, 48px);
      font-weight: 300;
      letter-spacing: -1.5px;
    }

    .desktop-caption span {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #taskbar {
      position: absolute;
      z-index: 900;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      width: 64px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(31, 25, 33, 0.78);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.32);
    }

    .launcher {
      position: relative;
      width: 50px;
      height: 50px;
      padding: 0;
      border: 0;
      border-radius: 12px;
      display: grid;
      place-items: center;
      cursor: pointer;
      background: transparent;
      transition: background 140ms ease, transform 140ms ease;
    }

    .launcher:hover,
    .launcher:focus-visible {
      background: rgba(255, 255, 255, 0.13);
      transform: translateX(2px);
      outline: none;
    }

    .launcher.running::before {
      content: "";
      position: absolute;
      left: -6px;
      width: 3px;
      height: 24px;
      border-radius: 0 4px 4px 0;
      background: #f47748;
    }

    .launcher::after {
      content: attr(aria-label);
      position: absolute;
      left: 62px;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateX(-4px);
      background: #201c21;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.35);
      font-size: 12px;
      transition: 120ms ease;
    }

    .launcher:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    .files-icon {
      position: relative;
      width: 35px;
      height: 27px;
      margin-top: 5px;
      border-radius: 4px;
      background: linear-gradient(#efad42, #d88719);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.35), 0 3px 7px rgba(0, 0, 0, 0.25);
    }

    .files-icon::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 3px;
      width: 17px;
      height: 8px;
      border-radius: 4px 4px 0 0;
      background: #e6a33a;
    }

    .notepad-icon {
      width: 31px;
      height: 38px;
      padding-top: 7px;
      border-radius: 4px;
      color: #504f53;
      background:
        repeating-linear-gradient(to bottom, transparent 0 6px, #b6d4e8 6px 7px),
        #f4f3ee;
      box-shadow: inset 5px 0 #e95420, 0 3px 7px rgba(0, 0, 0, 0.27);
    }

    .notepad-icon::before {
      content: "A";
      font-weight: 800;
      font-size: 15px;
    }

    .window {
      position: absolute;
      z-index: 100;
      display: none;
      flex-direction: column;
      min-width: 360px;
      min-height: 300px;
      width: min(760px, calc(100vw - 145px));
      height: min(570px, calc(100vh - 95px));
      overflow: hidden;
      resize: both;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 11px;
      background: var(--window);
      box-shadow: var(--shadow);
    }

    .window.open {
      display: flex;
      animation: window-open 150ms ease-out;
    }

    @keyframes window-open {
      from {
        opacity: 0;
        transform: scale(0.985) translateY(5px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    #files-window {
      top: 62px;
      left: clamp(82px, 9vw, 145px);
    }

    #notepad-window {
      top: 88px;
      left: clamp(102px, 20vw, 300px);
      width: min(720px, calc(100vw - 150px));
      height: min(540px, calc(100vh - 110px));
    }

    .titlebar {
      flex: 0 0 42px;
      min-height: 42px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 45px;
      cursor: grab;
      touch-action: none;
      background: linear-gradient(#3c393f, #302d33);
      border-bottom: 1px solid rgba(0, 0, 0, 0.46);
      font-size: 14px;
      font-weight: 650;
    }

    .titlebar:active {
      cursor: grabbing;
    }

    .titlebar-app {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .win-close {
      position: absolute;
      right: 10px;
      top: 9px;
      width: 25px;
      height: 25px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #e4e1e5;
      background: #555159;
      font-size: 17px;
      line-height: 1;
      transition: 120ms ease;
    }

    .win-close:hover,
    .win-close:focus-visible {
      outline: none;
      color: #fff;
      background: #e95420;
    }

    .window-content {
      min-height: 0;
      flex: 1;
    }

    /* Files */
    .files-layout {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: 166px minmax(0, 1fr);
      background: #252229;
    }

    .files-sidebar {
      padding: 14px 8px;
      overflow: auto;
      border-right: 1px solid rgba(255, 255, 255, 0.09);
      background: #211e24;
    }

    .sidebar-heading {
      margin: 3px 10px 8px;
      color: #918b94;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
      font-weight: 700;
    }

    .place {
      width: 100%;
      padding: 8px 10px;
      border: 0;
      border-radius: 6px;
      text-align: left;
      cursor: pointer;
      color: #ddd9df;
      background: transparent;
      font-size: 13px;
    }

    .place:hover,
    .place.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .place::before {
      display: inline-block;
      width: 22px;
      color: #e99d43;
    }

    .place[data-path="/"]::before { content: "◆"; }
    .place[data-path="/home/user"]::before { content: "⌂"; }
    .place[data-path="/home/user/Documents"]::before { content: "▤"; }
    .place[data-path="/home/user/Downloads"]::before { content: "↓"; }
    .place[data-path="/home/user/Pictures"]::before { content: "▧"; }

    .files-main {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .files-toolbar {
      flex: 0 0 48px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      background: #2e2b31;
    }

    #files-up {
      flex: 0 0 34px;
      width: 34px;
      height: 32px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      background: #3a373e;
      font-size: 20px;
    }

    #files-up:hover:not(:disabled) {
      background: #49454d;
    }

    #files-up:disabled {
      opacity: 0.38;
      cursor: default;
    }

    #files-path {
      min-width: 0;
      flex: 1;
      height: 32px;
      padding: 6px 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: #f2eff3;
      background: #201e23;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
      user-select: text;
    }

    #files-list {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      grid-auto-rows: 104px;
      align-content: start;
      gap: 6px;
      padding: 16px;
      overflow: auto;
    }

    .fs-item {
      position: relative;
      height: 98px;
      padding: 67px 5px 5px;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: default;
      color: #ebe8ec;
      background: transparent;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .fs-item::before {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      width: 56px;
      height: 45px;
    }

    .fs-item[data-type="folder"]::before {
      content: "";
      border-radius: 6px;
      background: linear-gradient(#eeb04d 0 27%, #d99027 27% 100%);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.35), 0 3px 6px rgba(0, 0, 0, 0.22);
      clip-path: polygon(0 14%, 33% 14%, 40% 0, 72% 0, 78% 14%, 100% 14%, 100% 100%, 0 100%);
    }

    .fs-item[data-type="file"]::before {
      content: "TXT";
      width: 40px;
      height: 50px;
      border-radius: 3px;
      color: #747078;
      background:
        linear-gradient(135deg, transparent 0 12px, #d4d1d5 12px) top right / 13px 13px no-repeat,
        #f0eef0;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.25);
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 0.5px;
    }

    .fs-item:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .fs-item.selected {
      border-color: rgba(233, 84, 32, 0.78);
      background: rgba(233, 84, 32, 0.18);
    }

    #files-status {
      flex: 0 0 27px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-top: 1px solid var(--border);
      color: #aaa5ad;
      background: #28252b;
      font-size: 11px;
    }

    /* Notepad */
    .notepad-layout {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #211f23;
    }

    .tabs-bar {
      flex: 0 0 42px;
      min-width: 0;
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: #2d2a30;
    }

    #tabs {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 6px 4px 0 7px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .tab {
      flex: 0 0 auto;
      max-width: 180px;
      min-width: 105px;
      height: 35px;
      padding: 0 13px;
      overflow: hidden;
      border: 1px solid transparent;
      border-bottom: 0;
      border-radius: 7px 7px 0 0;
      cursor: pointer;
      color: #bdb8c0;
      background: transparent;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .tab.active {
      color: #fff;
      border-color: var(--border);
      background: #211f23;
    }

    #new-tab {
      flex: 0 0 42px;
      height: 42px;
      padding: 0;
      border: 0;
      border-left: 1px solid var(--border);
      cursor: pointer;
      color: #d7d3d8;
      background: #343138;
      font-size: 23px;
    }

    #new-tab:hover,
    #new-tab:focus-visible {
      outline: none;
      background: #444048;
    }

    #editor {
      min-width: 0;
      min-height: 0;
      flex: 1;
      width: 100%;
      padding: 20px 22px;
      resize: none;
      border: 0;
      outline: none;
      color: #ece9ed;
      background: #211f23;
      caret-color: #f47748;
      font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
      font-size: 14px;
      line-height: 1.65;
      tab-size: 4;
      user-select: text;
    }

    .editor-status {
      flex: 0 0 27px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-top: 1px solid var(--border);
      color: #aaa5ad;
      background: #29262c;
      font-size: 11px;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      border-radius: 8px;
      background: #5c5760;
      background-clip: padding-box;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    @media (max-width: 640px) {
      #taskbar {
        top: auto;
        bottom: 9px;
        left: 50%;
        width: auto;
        transform: translateX(-50%);
        flex-direction: row;
      }

      .launcher::after {
        display: none;
      }

      .window {
        left: 5px !important;
        top: 38px !important;
      }

      .files-layout {
        grid-template-columns: 1fr;
      }

      .files-sidebar {
        display: none;
      }

      .desktop-caption {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main id="desktop">
    <header class="top-panel">
      <div class="activities">Activities</div>
      <time id="clock"></time>
      <div class="system-status" aria-label="System status">
        <span>◉</span>
        <span>▰</span>
        <span class="status-dot"></span>
      </div>
    </header>

    <nav id="taskbar" aria-label="Applications">
      <button id="open-files" class="launcher" type="button" aria-label="Files">
        <span class="files-icon" aria-hidden="true"></span>
      </button>
      <button id="open-notepad" class="launcher" type="button" aria-label="Notepad">
        <span class="notepad-icon" aria-hidden="true"></span>
      </button>
    </nav>

    <div class="desktop-caption" aria-hidden="true">
      <strong>Orchid</strong>
      <span>Linux Workspace</span>
    </div>

    <section id="files-window" class="window" aria-label="Files window">
      <header class="titlebar">
        <span class="titlebar-app">Files</span>
        <button class="win-close" type="button" aria-label="Close Files">×</button>
      </header>

      <div class="files-layout window-content">
        <aside class="files-sidebar">
          <div class="sidebar-heading">Places</div>
          <button class="place" type="button" data-path="/">Computer</button>
          <button class="place" type="button" data-path="/home/user">Home</button>
          <button class="place" type="button" data-path="/home/user/Documents">Documents</button>
          <button class="place" type="button" data-path="/home/user/Downloads">Downloads</button>
          <button class="place" type="button" data-path="/home/user/Pictures">Pictures</button>
        </aside>

        <div class="files-main">
          <div class="files-toolbar">
            <button id="files-up" type="button" aria-label="Parent folder" title="Parent folder">↑</button>
            <div id="files-path" aria-label="Current path">/</div>
          </div>
          <div id="files-list" aria-label="Folder contents"></div>
          <div id="files-status">0 items</div>
        </div>
      </div>
    </section>

    <section id="notepad-window" class="window" aria-label="Notepad window">
      <header class="titlebar">
        <span class="titlebar-app">Notepad</span>
        <button class="win-close" type="button" aria-label="Close Notepad">×</button>
      </header>

      <div class="notepad-layout window-content">
        <div class="tabs-bar">
          <div id="tabs" role="tablist" aria-label="Open notes"></div>
          <button id="new-tab" type="button" aria-label="New tab" title="New tab">+</button>
        </div>
        <textarea id="editor" aria-label="Note editor" spellcheck="true"></textarea>
        <div class="editor-status">
          <span id="editor-position">Ln 1, Col 1</span>
          <span id="editor-count">0 characters</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const desktop = document.getElementById("desktop");
      const filesWindow = document.getElementById("files-window");
      const notepadWindow = document.getElementById("notepad-window");
      const openFiles = document.getElementById("open-files");
      const openNotepad = document.getElementById("open-notepad");
      let topZ = 100;

      function showWindow(windowElement, launcher) {
        windowElement.classList.add("open");
        launcher.classList.add("running");
        bringToFront(windowElement);

        requestAnimationFrame(() => {
          keepWindowVisible(windowElement);
          const focusTarget = windowElement.querySelector("textarea, button, [tabindex]");
          if (focusTarget && windowElement === notepadWindow) {
            document.getElementById("editor").focus();
          }
        });
      }

      function bringToFront(windowElement) {
        topZ += 1;
        windowElement.style.zIndex = String(topZ);
      }

      function keepWindowVisible(windowElement) {
        if (!windowElement.classList.contains("open")) return;
        const rect = windowElement.getBoundingClientRect();
        const maxLeft = Math.max(0, window.innerWidth - Math.min(rect.width, window.innerWidth));
        const maxTop = Math.max(32, window.innerHeight - Math.min(rect.height, window.innerHeight));

        if (rect.left < 0) windowElement.style.left = "0px";
        if (rect.top < 32) windowElement.style.top = "32px";
        if (rect.left > maxLeft) windowElement.style.left = maxLeft + "px";
        if (rect.top > maxTop) windowElement.style.top = maxTop + "px";
      }

      openFiles.addEventListener("click", () => showWindow(filesWindow, openFiles));
      openNotepad.addEventListener("click", () => showWindow(notepadWindow, openNotepad));

      document.querySelectorAll(".window").forEach(windowElement => {
        windowElement.addEventListener("pointerdown", () => bringToFront(windowElement));

        const closeButton = windowElement.querySelector(".win-close");
        closeButton.addEventListener("click", event => {
          event.stopPropagation();
          windowElement.classList.remove("open");
          const launcher = windowElement === filesWindow ? openFiles : openNotepad;
          launcher.classList.remove("running");
          if (windowElement === notepadWindow) saveNotes();
        });
      });

      function makeDraggable(windowElement) {
        const titlebar = windowElement.querySelector(".titlebar");
        let dragging = false;
        let offsetX = 0;
        let offsetY = 0;

        titlebar.addEventListener("pointerdown", event => {
          if (event.target.closest("button")) return;
          dragging = true;
          bringToFront(windowElement);

          const rect = windowElement.getBoundingClientRect();
          offsetX = event.clientX - rect.left;
          offsetY = event.clientY - rect.top;
          titlebar.setPointerCapture(event.pointerId);
          event.preventDefault();
        });

        titlebar.addEventListener("pointermove", event => {
          if (!dragging) return;

          const rect = windowElement.getBoundingClientRect();
          const maxX = Math.max(0, window.innerWidth - rect.width);
          const maxY = Math.max(32, window.innerHeight - rect.height);

          const left = Math.min(Math.max(0, event.clientX - offsetX), maxX);
          const top = Math.min(Math.max(32, event.clientY - offsetY), maxY);

          windowElement.style.left = left + "px";
          windowElement.style.top = top + "px";
        });

        const stopDragging = event => {
          if (!dragging) return;
          dragging = false;
          if (titlebar.hasPointerCapture(event.pointerId)) {
            titlebar.releasePointerCapture(event.pointerId);
          }
        };

        titlebar.addEventListener("pointerup", stopDragging);
        titlebar.addEventListener("pointercancel", stopDragging);
      }

      makeDraggable(filesWindow);
      makeDraggable(notepadWindow);

      window.addEventListener("resize", () => {
        keepWindowVisible(filesWindow);
        keepWindowVisible(notepadWindow);
      });

      function updateClock() {
        const now = new Date();
        document.getElementById("clock").textContent = now.toLocaleString([], {
          weekday: "short",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      updateClock();
      setInterval(updateClock, 30000);

      /* Files application */
      const fileSystem = {
        "/": [
          { name: "bin", type: "folder" },
          { name: "etc", type: "folder" },
          { name: "home", type: "folder" },
          { name: "opt", type: "folder" },
          { name: "tmp", type: "folder" },
          { name: "usr", type: "folder" },
          { name: "var", type: "folder" }
        ],
        "/bin": [
          { name: "bash", type: "file" },
          { name: "cat", type: "file" },
          { name: "ls", type: "file" }
        ],
        "/etc": [
          { name: "network", type: "folder" },
          { name: "hosts", type: "file" },
          { name: "os-release", type: "file" }
        ],
        "/etc/network": [
          { name: "interfaces", type: "file" }
        ],
        "/home": [
          { name: "user", type: "folder" }
        ],
        "/home/user": [
          { name: "Documents", type: "folder" },
          { name: "Downloads", type: "folder" },
          { name: "Pictures", type: "folder" },
          { name: "Projects", type: "folder" },
          { name: "welcome.txt", type: "file" }
        ],
        "/home/user/Documents": [
          { name: "Notes.txt", type: "file" },
          { name: "Resume.txt", type: "file" }
        ],
        "/home/user/Downloads": [
          { name: "ubuntu-guide.txt", type: "file" }
        ],
        "/home/user/Pictures": [
          { name: "Wallpapers", type: "folder" },
          { name: "mountains.png", type: "file" }
        ],
        "/home/user/Pictures/Wallpapers": [
          { name: "orchid.png", type: "file" }
        ],
        "/home/user/Projects": [
          { name: "desktop", type: "folder" },
          { name: "README.txt", type: "file" }
        ],
        "/home/user/Projects/desktop": [
          { name: "app.html", type: "file" }
        ],
        "/opt": [],
        "/tmp": [],
        "/usr": [
          { name: "bin", type: "folder" },
          { name: "lib", type: "folder" },
          { name: "share", type: "folder" }
        ],
        "/usr/bin": [
          { name: "editor", type: "file" },
          { name: "files", type: "file" }
        ],
        "/usr/lib": [],
        "/usr/share": [
          { name: "applications", type: "folder" }
        ],
        "/usr/share/applications": [],
        "/var": [
          { name: "log", type: "folder" },
          { name: "tmp", type: "folder" }
        ],
        "/var/log": [
          { name: "system.log", type: "file" }
        ],
        "/var/tmp": []
      };

      const filesPath = document.getElementById("files-path");
      const filesList = document.getElementById("files-list");
      const filesUp = document.getElementById("files-up");
      const filesStatus = document.getElementById("files-status");
      let currentPath = "/";

      function childPath(parent, child) {
        return parent === "/" ? "/" + child : parent + "/" + child;
      }

      function parentPath(path) {
        if (path === "/") return "/";
        const parts = path.split("/").filter(Boolean);
        parts.pop();
        return parts.length ? "/" + parts.join("/") : "/";
      }

      function navigate(path) {
        if (!Object.prototype.hasOwnProperty.call(fileSystem, path)) return;
        currentPath = path;
        renderFiles();
      }

      function renderFiles() {
        const entries = fileSystem[currentPath] || [];
        filesPath.textContent = currentPath;
        filesUp.disabled = currentPath === "/";
        filesList.replaceChildren();

        entries.forEach(entry => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "fs-item";
          item.dataset.type = entry.type;
          item.dataset.name = entry.name;
          item.textContent = entry.name;
          item.title = entry.type === "folder"
            ? "Double-click to open " + entry.name
            : entry.name;

          item.addEventListener("click", () => {
            filesList.querySelectorAll(".fs-item").forEach(other => {
              other.classList.toggle("selected", other === item);
            });
            filesStatus.textContent = entry.name + " — " + entry.type;
          });

          item.addEventListener("dblclick", () => {
            if (entry.type === "folder") {
              navigate(childPath(currentPath, entry.name));
            } else {
              filesStatus.textContent = entry.name + " is a read-only sample file";
            }
          });

          filesList.appendChild(item);
        });

        filesStatus.textContent = entries.length + (entries.length === 1 ? " item" : " items");

        document.querySelectorAll(".place").forEach(place => {
          place.classList.toggle("active", place.dataset.path === currentPath);
        });
      }

      filesUp.addEventListener("click", () => navigate(parentPath(currentPath)));

      document.querySelectorAll(".place").forEach(place => {
        place.addEventListener("click", () => navigate(place.dataset.path));
      });

      renderFiles();

      /* Notepad application */
      const STORAGE_KEY = "orchid-desktop-notepad-v1";
      const tabsElement = document.getElementById("tabs");
      const newTabButton = document.getElementById("new-tab");
      const editor = document.getElementById("editor");
      const editorPosition = document.getElementById("editor-position");
      const editorCount = document.getElementById("editor-count");

      let notesState = {
        tabs: [],
        activeId: null,
        nextNumber: 1
      };

      function loadNotes() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed && Array.isArray(parsed.tabs) && parsed.tabs.length) {
              notesState.tabs = parsed.tabs.map((tab, index) => ({
                id: String(tab.id || "tab-" + (index + 1)),
                title: String(tab.title || "Untitled " + (index + 1)),
                content: typeof tab.content === "string" ? tab.content : ""
              }));
              notesState.activeId = notesState.tabs.some(tab => tab.id === parsed.activeId)
                ? parsed.activeId
                : notesState.tabs[0].id;
              notesState.nextNumber = Number.isFinite(parsed.nextNumber)
                ? Math.max(1, parsed.nextNumber)
                : notesState.tabs.length + 1;
              return;
            }
          }
        } catch (error) {
          console.warn("Could not restore notes:", error);
        }

        notesState = {
          tabs: [
            {
              id: "tab-1",
              title: "Untitled 1",
              content: ""
            }
          ],
          activeId: "tab-1",
          nextNumber: 2
        };
        saveNotes();
      }

      function saveNotes() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(notesState));
        } catch (error) {
          console.warn("Could not save notes:", error);
        }
      }

      function activeTab() {
        return notesState.tabs.find(tab => tab.id === notesState.activeId);
      }

      function renderTabs() {
        tabsElement.replaceChildren();

        notesState.tabs.forEach(tabData => {
          const tab = document.createElement("button");
          tab.type = "button";
          tab.className = "tab";
          tab.dataset.id = tabData.id;
          tab.textContent = tabData.title;
          tab.title = tabData.title;
          tab.setAttribute("role", "tab");
          tab.setAttribute("aria-selected", String(tabData.id === notesState.activeId));

          if (tabData.id === notesState.activeId) {
            tab.classList.add("active");
          }

          tab.addEventListener("click", () => switchTab(tabData.id));
          tabsElement.appendChild(tab);
        });

        const current = activeTab();
        editor.value = current ? current.content : "";
        updateEditorStatus();

        const activeButton = tabsElement.querySelector(".tab.active");
        if (activeButton) activeButton.scrollIntoView({ block: "nearest", inline: "nearest" });
      }

      function switchTab(id) {
        const current = activeTab();
        if (current) current.content = editor.value;

        if (!notesState.tabs.some(tab => tab.id === id)) return;
        notesState.activeId = id;
        saveNotes();
        renderTabs();
        editor.focus();
      }

      function createTab() {
        const number = notesState.nextNumber++;
        const tab = {
          id: "tab-" + Date.now() + "-" + number,
          title: "Untitled " + number,
          content: ""
        };

        notesState.tabs.push(tab);
        notesState.activeId = tab.id;
        saveNotes();
        renderTabs();
        editor.focus();
      }

      function updateEditorStatus() {
        const text = editor.value;
        const selection = editor.selectionStart;
        const beforeCursor = text.slice(0, selection);
        const line = beforeCursor.split("\n").length;
        const lastNewline = beforeCursor.lastIndexOf("\n");
        const column = selection - lastNewline;

        editorPosition.textContent = "Ln " + line + ", Col " + column;
        editorCount.textContent = text.length + (text.length === 1 ? " character" : " characters");
      }

      editor.addEventListener("input", () => {
        const current = activeTab();
        if (current) {
          current.content = editor.value;
          saveNotes();
        }
        updateEditorStatus();
      });

      ["click", "keyup", "select"].forEach(eventName => {
        editor.addEventListener(eventName, updateEditorStatus);
      });

      editor.addEventListener("keydown", event => {
        if (event.key === "Tab") {
          event.preventDefault();
          const start = editor.selectionStart;
          const end = editor.selectionEnd;
          editor.setRangeText("    ", start, end, "end");
          editor.dispatchEvent(new Event("input", { bubbles: true }));
        }

        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          const current = activeTab();
          if (current) current.content = editor.value;
          saveNotes();
        }
      });

      newTabButton.addEventListener("click", createTab);

      document.addEventListener("keydown", event => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "n" &&
            notepadWindow.classList.contains("open")) {
          event.preventDefault();
          createTab();
        }
      });

      window.addEventListener("beforeunload", saveNotes);

      loadNotes();
      renderTabs();
    })();
  </script>
</body>
</html>
