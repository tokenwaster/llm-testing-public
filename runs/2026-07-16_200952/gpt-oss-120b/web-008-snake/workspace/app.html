<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
    body{
        margin:0;
        padding:0;
        background:#111;
        color:#eee;
        font-family:Arial,Helvetica,sans-serif;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        height:100vh;
        user-select:none;
        overflow:hidden;
    }
    #container{
        text-align:center;
    }
    canvas{
        background:#222;
        display:block;
        margin:0 auto;
        box-shadow:0 0 10px #000;
    }
    button{
        margin:5px;
        padding:8px 16px;
        background:#444;
        border:none;
        color:#eee;
        cursor:pointer;
        font-size:14px;
        border-radius:4px;
    }
    button:hover{
        background:#555;
    }
    #score{
        margin-top:10px;
        font-size:18px;
    }
</style>
</head>
<body>
<div id="container">
    <canvas id="snake" width="400" height="400"></canvas>
    <div>
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
    </div>
    <div id="score">Score: 0</div>
</div>

<script>
(() => {
    const canvas = document.getElementById('snake');
    const ctx = canvas.getContext('2d');

    const CELL_SIZE = 20;                // 20px per cell
    const w = canvas.width / CELL_SIZE;  // columns
    const h = canvas.height / CELL_SIZE; // rows

    // Game state
    let snake = [];         // array of {x,y}
    let dir = {x:1,y:0};    // current direction
    let nextDir = null;     // queued direction
    let food = null;
    let alive = true;
    let score = 0;
    let intervalId = null;
    const TICK_MS = 120;

    // Utility
    const opposite = (d1,d2)=> d1.x===-d2.x && d1.y===-d2.y;
    const randomFreeCell = ()=>{
        const occupied = new Set(snake.map(p=>p.x+','+p.y));
        let x,y;
        do{
            x = Math.floor(Math.random()*w);
            y = Math.floor(Math.random()*h);
        }while(occupied.has(x+','+y));
        return {x,y};
    };
    const draw = ()=>{
        ctx.fillStyle = '#222';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        // draw food
        if(food){
            ctx.fillStyle = '#e33';
            ctx.fillRect(food.x*CELL_SIZE, food.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
        // draw snake
        ctx.fillStyle = '#0f0';
        snake.forEach((p,i)=>{
            ctx.fillRect(p.x*CELL_SIZE, p.y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
        });
        // score
        document.getElementById('score').textContent = 'Score: '+score;
    };

    const reset = ()=>{
        snake = [
            {x: Math.floor(w/2)-2, y: Math.floor(h/2)},
            {x: Math.floor(w/2)-1, y: Math.floor(h/2)},
            {x: Math.floor(w/2),   y: Math.floor(h/2)}
        ];
        dir = {x:1,y:0};
        nextDir = null;
        food = randomFreeCell();
        alive = true;
        score = 0;
        draw();
    };

    const tick = ()=>{
        if(!alive) return;
        if(nextDir && !opposite(nextDir,dir)){
            dir = nextDir;
        }
        nextDir = null;
        const head = {x: snake[snake.length-1].x + dir.x,
                      y: snake[snake.length-1].y + dir.y};

        // wall collision
        if(head.x<0||head.x>=w||head.y<0||head.y>=h){
            alive = false;
            draw();
            return;
        }
        // self collision
        if(snake.some(p=>p.x===head.x && p.y===head.y)){
            alive = false;
            draw();
            return;
        }
        // move
        snake.push(head);
        if(food && head.x===food.x && head.y===food.y){
            // eat
            score++;
            food = randomFreeCell();
        }else{
            snake.shift(); // remove tail
        }
        draw();
    };

    const setDir = (d)=>{
        const map={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
        const nd = map[d];
        if(!nd) return;
        // ignore reversal
        if(opposite(nd,dir)) return;
        nextDir = nd;
    };

    const setFood = (x,y)=>{
        if(x<0||x>=w||y<0||y>=h) return;
        // ensure not on snake
        if(snake.some(p=>p.x===x && p.y===y)) return;
        food = {x,y};
        draw();
    };

    const snakeArr = ()=> snake.map(p=>[p.x,p.y]);
    const foodPos = ()=> food ? [food.x,food.y] : null;
    const aliveState = ()=> alive;
    const scoreVal = ()=> score;

    // expose API
    window.game = {
        w, h,
        reset,
        tick,
        setDir,
        setFood,
        snake: snakeArr,
        food: foodPos,
        alive: aliveState,
        score: scoreVal
    };

    // Controls
    document.getElementById('start').addEventListener('click', ()=>{
        if(intervalId) return;
        intervalId = setInterval(tick, TICK_MS);
    });
    document.getElementById('pause').addEventListener('click', ()=>{
        clearInterval(intervalId);
        intervalId = null;
    });
    document.getElementById('reset').addEventListener('click', ()=>{
        clearInterval(intervalId);
        intervalId = null;
        reset();
    });

    // Keyboard
    document.addEventListener('keydown', e=>{
        const keyMap = {
            ArrowUp:'up',
            ArrowDown:'down',
            ArrowLeft:'left',
            ArrowRight:'right'
        };
        if(keyMap[e.key]){
            setDir(keyMap[e.key]);
            e.preventDefault();
        }
    });

    // init
    reset();
})();
</script>
</body>
</html>
