<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  :root {
    --bg: #121212;
    --board-bg: #1e1e1e;
    --cell-bg: #2a2a2a;
    --text: #f0f0f0;
    --accent: #4caf50;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  h1 { margin: 10px 0; font-weight: 600; }
  #score {
    font-size: 20px;
    margin-bottom: 12px;
    padding: 6px 14px;
    background: var(--board-bg);
    border-radius: 6px;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(4, 80px);
    gap: 10px;
    background: var(--board-bg);
    padding: 10px;
    border-radius: 10px;
  }
  .cell {
    background: var(--cell-bg);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }
  #reset {
    margin-top: 16px;
    padding: 10px 20px;
    font-size: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  #reset:hover { filter: brightness(1.1); }
</style>
</head>
<body>
  <h1>2048</h1>
  <div id="score">Score: 0</div>
  <div id="board"></div>
  <button id="reset">New Game</button>

<script>
(function () {
  const SIZE = 4;
  let grid = [];
  let currentScore = 0;

  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const resetEl = document.getElementById('reset');

  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  }

  function render() {
    boardEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const val = grid[r][c];
        cell.textContent = val === 0 ? '' : val;
        boardEl.appendChild(cell);
      }
    }
    scoreEl.textContent = 'Score: ' + currentScore;
  }

  function emptyCells() {
    const cells = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) cells.push([r, c]);
    return cells;
  }

  function spawnTile() {
    const cells = emptyCells();
    if (cells.length === 0) return;
    const [r, c] = cells[Math.floor(Math.random() * cells.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function reset() {
    grid = emptyGrid();
    currentScore = 0;
    spawnTile();
    spawnTile();
    render();
  }

  // Slide and merge a single row/col line (array of numbers, left-to-right)
  function slideLine(line) {
    const filtered = line.filter(v => v !== 0);
    const result = [];
    let gained = 0;
    for (let i = 0; i < filtered.length; i++) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        const merged = filtered[i] * 2;
        result.push(merged);
        gained += merged;
        i++;
      } else {
        result.push(filtered[i]);
      }
    }
    while (result.length < SIZE) result.push(0);
    return { line: result, gained };
  }

  function move(dir) {
    let moved = false;
    let gainedTotal = 0;
    const newGrid = emptyGrid();

    if (dir === 'left') {
      for (let r = 0; r < SIZE; r++) {
        const { line, gained } = slideLine(grid[r]);
        newGrid[r] = line;
        gainedTotal += gained;
        if (line.some((v, i) => v !== grid[r][i])) moved = true;
      }
    } else if (dir === 'right') {
      for (let r = 0; r < SIZE; r++) {
        const rev = grid[r].slice().reverse();
        const { line, gained } = slideLine(rev);
        newGrid[r] = line.reverse();
        gainedTotal += gained;
        if (newGrid[r].some((v, i) => v !== grid[r][i])) moved = true;
      }
    } else if (dir === 'up') {
      for (let c = 0; c < SIZE; c++) {
        const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
        const { line, gained } = slideLine(col);
        for (let r = 0; r < SIZE; r++) newGrid[r][c] = line[r];
        gainedTotal += gained;
        if (line.some((v, r) => v !== grid[r][c])) moved = true;
      }
    } else if (dir === 'down') {
      for (let c = 0; c < SIZE; c++) {
        const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
        const { line, gained } = slideLine(col);
        const placed = line.reverse();
        for (let r = 0; r < SIZE; r++) newGrid[r][c] = placed[r];
        gainedTotal += gained;
        if (placed.some((v, r) => v !== grid[r][c])) moved = true;
      }
    }

    if (moved) {
      grid = newGrid;
      currentScore += gainedTotal;
      spawnTile();
      render();
    }
    return moved;
  }

  function board() {
    return grid.map(row => row.slice());
  }

  function setBoard(arr) {
    grid = arr.map(row => row.slice());
    render();
  }

  function score() {
    return currentScore;
  }

  document.addEventListener('keydown', (e) => {
    const map = {
      ArrowLeft: 'left',
      ArrowRight: 'right',
      ArrowUp: 'up',
      ArrowDown: 'down'
    };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  resetEl.addEventListener('click', reset);

  window.game = {
    size: SIZE,
    reset,
    move,
    board,
    setBoard,
    score
  };

  reset();
})();
</script>
</body>
</html>
