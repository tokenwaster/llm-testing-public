<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root {
    --bg: #f4f5f7;
    --col-bg: #ebecf0;
    --card-bg: #ffffff;
    --text: #172b4d;
    --muted: #5e6c84;
    --accent: #0079bf;
    --danger: #eb5a46;
    --shadow: 0 1px 2px rgba(9,30,66,0.25);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 16px;
  }
  .add-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    max-width: 480px;
  }
  #new-card {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #dfe1e6;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  #new-card:focus { border-color: var(--accent); }
  #add-card {
    padding: 10px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  #add-card:hover { background: #026aa7; }
  .board {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .column {
    background: var(--col-bg);
    border-radius: 10px;
    width: 300px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    min-height: 120px;
  }
  .column.drag-over {
    outline: 2px dashed var(--accent);
    outline-offset: -2px;
  }
  .col-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .count {
    background: #dfe1e6;
    color: var(--text);
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 700;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 40px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 8px;
    padding: 10px 12px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    cursor: grab;
    font-size: 14px;
    line-height: 1.3;
  }
  .card:active { cursor: grabbing; }
  .card-title { word-break: break-word; flex: 1; }
  .card-del {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    border-radius: 4px;
  }
  .card-del:hover { color: var(--danger); background: #ffebe6; }
</style>
</head>
<body>
  <h1>Kanban Board</h1>
  <div class="add-bar">
    <input id="new-card" type="text" placeholder="Enter a card title...">
    <button id="add-card">Add Card</button>
  </div>

  <div class="board">
    <div class="column" id="col-todo">
      <div class="col-header">To Do <span class="count">0</span></div>
      <div class="cards"></div>
    </div>
    <div class="column" id="col-doing">
      <div class="col-header">Doing <span class="count">0</span></div>
      <div class="cards"></div>
    </div>
    <div class="column" id="col-done">
      <div class="col-header">Done <span class="count">0</span></div>
      <div class="cards"></div>
    </div>
  </div>

<script>
(function () {
  const STORAGE_KEY = "kanban-board-state-v1";
  const columns = {
    "col-todo": document.querySelector("#col-todo .cards"),
    "col-doing": document.querySelector("#col-doing .cards"),
    "col-done": document.querySelector("#col-done .cards")
  };
  const colEls = {
    "col-todo": document.getElementById("col-todo"),
    "col-doing": document.getElementById("col-doing"),
    "col-done": document.getElementById("col-done")
  };
  const input = document.getElementById("new-card");
  const addBtn = document.getElementById("add-card");

  let state = loadState();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { cards: [] };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function updateCounts() {
    Object.keys(colEls).forEach(id => {
      const count = columns[id].querySelectorAll(".card").length;
      colEls[id].querySelector(".count").textContent = count;
    });
  }

  function createCardEl(card) {
    const el = document.createElement("div");
    el.className = "card";
    el.draggable = true;
    el.dataset.id = card.id;

    const title = document.createElement("div");
    title.className = "card-title";
    title.textContent = card.title;

    const del = document.createElement("button");
    del.className = "card-del";
    del.textContent = "×";
    del.title = "Delete card";
    del.addEventListener("click", () => deleteCard(card.id));

    el.appendChild(title);
    el.appendChild(del);

    el.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", card.id);
      e.dataTransfer.effectAllowed = "move";
    });

    return el;
  }

  function render() {
    Object.values(columns).forEach(c => c.innerHTML = "");
    state.cards.forEach(card => {
      const container = columns[card.col] || columns["col-todo"];
      container.appendChild(createCardEl(card));
    });
    updateCounts();
  }

  function addCard(title) {
    const t = title.trim();
    if (!t) return;
    const card = {
      id: "c_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
      title: t,
      col: "col-todo"
    };
    state.cards.push(card);
    saveState();
    render();
  }

  function deleteCard(id) {
    state.cards = state.cards.filter(c => c.id !== id);
    saveState();
    render();
  }

  function moveCard(id, colId) {
    const card = state.cards.find(c => c.id === id);
    if (card && columns[colId]) {
      card.col = colId;
      saveState();
      render();
    }
  }

  addBtn.addEventListener("click", () => {
    addCard(input.value);
    input.value = "";
    input.focus();
  });
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      addCard(input.value);
      input.value = "";
    }
  });

  Object.entries(colEls).forEach(([colId, colEl]) => {
    colEl.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      colEl.classList.add("drag-over");
    });
    colEl.addEventListener("dragleave", e => {
      if (!colEl.contains(e.relatedTarget)) {
        colEl.classList.remove("drag-over");
      }
    });
    colEl.addEventListener("drop", e => {
      e.preventDefault();
      colEl.classList.remove("drag-over");
      const id = e.dataTransfer.getData("text/plain");
      if (id) moveCard(id, colId);
    });
  });

  render();
})();
</script>
</body>
</html>
