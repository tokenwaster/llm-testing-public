<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Ball Playground</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  #sim {
    background: #000;
    border: 1px solid #333;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    cursor: pointer;
    touch-action: none;
  }
  .controls {
    display: flex;
    gap: 8px;
  }
  button {
    background: #222;
    color: #eee;
    border: 1px solid #444;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background: #333;
  }
</style>
</head>
<body>
  <canvas id="sim" width="400" height="400"></canvas>
  <div class="controls">
    <button id="drop">Drop Ball</button>
    <button id="play">Pause</button>
    <button id="clear">Clear</button>
  </div>

<script>
(function () {
  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const GRAVITY = 0.4;
  const RESTITUTION = 0.85;

  let balls = [];
  let playing = true;
  let rafId = null;

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function addBall(x, y, vx = 0, vy = 0, r) {
    if (r === undefined) r = rand(8, 18);
    x = Math.max(r, Math.min(W - r, x));
    y = Math.max(r, Math.min(H - r, y));
    balls.push({ x, y, vx, vy, r });
    draw();
  }

  function clear() {
    balls = [];
    draw();
  }

  function step(dt = 1) {
    for (const b of balls) {
      b.vy += GRAVITY * dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.x - b.r < 0) {
        b.x = b.r;
        b.vx = -b.vx * RESTITUTION;
      } else if (b.x + b.r > W) {
        b.x = W - b.r;
        b.vx = -b.vx * RESTITUTION;
      }

      if (b.y - b.r < 0) {
        b.y = b.r;
        b.vy = -b.vy * RESTITUTION;
      } else if (b.y + b.r > H) {
        b.y = H - b.r;
        b.vy = -b.vy * RESTITUTION;
      }
    }
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const b of balls) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = '#4fd1c5';
      ctx.fill();
      ctx.strokeStyle = '#2c7a7b';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  function loop() {
    if (playing) step(1);
    rafId = requestAnimationFrame(loop);
  }

  // UI events
  document.getElementById('drop').addEventListener('click', () => {
    addBall(rand(40, W - 40), 30, rand(-2, 2), 0);
  });

  const playBtn = document.getElementById('play');
  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.textContent = playing ? 'Pause' : 'Play';
  });

  document.getElementById('clear').addEventListener('click', clear);

  canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (W / rect.width);
    const y = (e.clientY - rect.top) * (H / rect.height);
    addBall(x, y, rand(-2, 2), 0);
  });

  // Public API
  window.sim = {
    w: W,
    h: H,
    balls: () => balls.map(b => ({ ...b })),
    addBall,
    clear,
    step
  };

  // Start
  draw();
  loop();
})();
</script>
</body>
</html>
