<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Algorithm Visualizer</title>
<style>
  :root {
    --bg: #121212;
    --panel: #1e1e1e;
    --bar: #4fc3f7;
    --bar-sorted: #81c784;
    --text: #e0e0e0;
    --btn: #333;
    --btn-hover: #444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 { margin: 16px 0 8px; font-weight: 500; }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  button {
    background: var(--btn);
    color: var(--text);
    border: 1px solid #555;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover { background: var(--btn-hover); }
  #bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    width: 90vw;
    max-width: 900px;
    height: 60vh;
    background: var(--panel);
    padding: 8px;
    border-radius: 6px;
  }
  .bar {
    flex: 1;
    background: var(--bar);
    border-radius: 2px 2px 0 0;
    transition: height 0.05s linear;
  }
  .bar.sorted { background: var(--bar-sorted); }
</style>
</head>
<body>
  <h1>Sorting Visualizer</h1>
  <div class="controls">
    <button id="sort">Sort</button>
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset</button>
  </div>
  <div id="bars"></div>

<script>
(function () {
  const barsEl = document.getElementById('bars');
  let arr = [];
  let n = 40;
  // Insertion sort state
  let i = 1;
  let j = 0;
  let sorting = false;
  let sortedFlag = false;

  function defaultArray() {
    const a = [];
    for (let k = 1; k <= n; k++) a.push(k);
    return a;
  }

  function shuffleArray(a) {
    for (let k = a.length - 1; k > 0; k--) {
      const r = Math.floor(Math.random() * (k + 1));
      [a[k], a[r]] = [a[r], a[k]];
    }
    return a;
  }

  function draw() {
    barsEl.innerHTML = '';
    const max = Math.max(...arr, 1);
    for (let k = 0; k < arr.length; k++) {
      const bar = document.createElement('div');
      bar.className = 'bar' + (sortedFlag ? ' sorted' : '');
      bar.style.height = (arr[k] / max * 100) + '%';
      barsEl.appendChild(bar);
    }
  }

  function isSorted(a) {
    for (let k = 1; k < a.length; k++) {
      if (a[k - 1] > a[k]) return false;
    }
    return true;
  }

  // One step of insertion sort
  function sortStep() {
    if (sortedFlag) return true;
    if (i >= arr.length) {
      sortedFlag = true;
      draw();
      return true;
    }
    if (j >= 0 && arr[j] > arr[j + 1]) {
      [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
      j--;
    } else {
      i++;
      j = i - 1;
    }
    if (i >= arr.length) {
      sortedFlag = true;
      draw();
      return true;
    }
    draw();
    return false;
  }

  // Public API
  window.viz = {
    array: () => arr.slice(),
    setArray: (a) => {
      arr = a.slice();
      i = 1; j = 0; sortedFlag = false;
      draw();
    },
    sortStep: () => sortStep(),
    sorted: () => isSorted(arr)
  };

  // Buttons
  document.getElementById('shuffle').addEventListener('click', () => {
    arr = shuffleArray(defaultArray());
    i = 1; j = 0; sortedFlag = false;
    draw();
  });

  document.getElementById('reset').addEventListener('click', () => {
    arr = defaultArray();
    i = 1; j = 0; sortedFlag = false;
    draw();
  });

  document.getElementById('sort').addEventListener('click', () => {
    if (sorting) return;
    sorting = true;
    function tick() {
      const done = sortStep();
      if (!done) {
        requestAnimationFrame(tick);
      } else {
        sorting = false;
      }
    }
    tick();
  });

  // Init
  arr = shuffleArray(defaultArray());
  draw();
})();
</script>
</body>
</html>
