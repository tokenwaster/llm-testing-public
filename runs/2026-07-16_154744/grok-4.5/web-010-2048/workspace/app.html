<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #eee;
    font-family: system-ui, -apple-system, sans-serif;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: #e0e0e0;
    letter-spacing: 0.05em;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .score-box {
    background: #16213e;
    border-radius: 8px;
    padding: 0.5rem 1.25rem;
    text-align: center;
    min-width: 100px;
  }
  .score-box .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8899aa;
  }
  #score {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
  }
  #reset {
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.2rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #reset:hover { background: #c73652; }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    background: #0f3460;
    padding: 12px;
    border-radius: 12px;
    width: 360px;
    height: 360px;
  }
  .cell {
    background: #1a1a2e;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.75rem;
    font-weight: 700;
    color: #fff;
    transition: background 0.1s;
  }
  .cell[data-v="2"]    { background: #2a2a4a; color: #ccc; }
  .cell[data-v="4"]    { background: #3a3a5c; color: #ddd; }
  .cell[data-v="8"]    { background: #c47b30; color: #fff; }
  .cell[data-v="16"]   { background: #d45a2a; color: #fff; }
  .cell[data-v="32"]   { background: #e04030; color: #fff; }
  .cell[data-v="64"]   { background: #e02020; color: #fff; }
  .cell[data-v="128"]  { background: #d4a017; color: #fff; font-size: 1.5rem; }
  .cell[data-v="256"]  { background: #d4b017; color: #fff; font-size: 1.5rem; }
  .cell[data-v="512"]  { background: #d4c017; color: #fff; font-size: 1.5rem; }
  .cell[data-v="1024"] { background: #e0c820; color: #fff; font-size: 1.25rem; }
  .cell[data-v="2048"] { background: #f0d830; color: #1a1a2e; font-size: 1.25rem; }
  .cell[data-v="4096"],
  .cell[data-v="8192"] { background: #a020f0; color: #fff; font-size: 1.25rem; }
  .hint {
    margin-top: 1rem;
    color: #667;
    font-size: 0.85rem;
  }
</style>
</head>
<body>
  <h1>2048</h1>
  <div class="header">
    <div class="score-box">
      <div class="label">Score</div>
      <div id="score">0</div>
    </div>
    <button id="reset">New Game</button>
  </div>
  <div id="board"></div>
  <p class="hint">Use arrow keys to play</p>
<script>
(function () {
  const SIZE = 4;
  let grid = [];
  let currentScore = 0;

  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  }

  function cloneGrid(g) {
    return g.map(row => row.slice());
  }

  function boardsEqual(a, b) {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (a[r][c] !== b[r][c]) return false;
    return true;
  }

  function emptyCells() {
    const cells = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) cells.push({ r, c });
    return cells;
  }

  function spawnTile() {
    const cells = emptyCells();
    if (cells.length === 0) return;
    const pick = cells[Math.floor(Math.random() * cells.length)];
    grid[pick.r][pick.c] = Math.random() < 0.9 ? 2 : 4;
  }

  function slideLine(line) {
    // Slide non-zeros to the front, merge equal neighbours once
    const tiles = line.filter(v => v !== 0);
    const result = [];
    let scoreAdd = 0;
    let i = 0;
    while (i < tiles.length) {
      if (i + 1 < tiles.length && tiles[i] === tiles[i + 1]) {
        const merged = tiles[i] * 2;
        result.push(merged);
        scoreAdd += merged;
        i += 2;
      } else {
        result.push(tiles[i]);
        i += 1;
      }
    }
    while (result.length < SIZE) result.push(0);
    return { line: result, scoreAdd };
  }

  function moveLeft() {
    let scoreAdd = 0;
    const next = emptyGrid();
    for (let r = 0; r < SIZE; r++) {
      const { line, scoreAdd: s } = slideLine(grid[r]);
      next[r] = line;
      scoreAdd += s;
    }
    return { next, scoreAdd };
  }

  function moveRight() {
    let scoreAdd = 0;
    const next = emptyGrid();
    for (let r = 0; r < SIZE; r++) {
      const reversed = grid[r].slice().reverse();
      const { line, scoreAdd: s } = slideLine(reversed);
      next[r] = line.reverse();
      scoreAdd += s;
    }
    return { next, scoreAdd };
  }

  function moveUp() {
    let scoreAdd = 0;
    const next = emptyGrid();
    for (let c = 0; c < SIZE; c++) {
      const col = [];
      for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
      const { line, scoreAdd: s } = slideLine(col);
      for (let r = 0; r < SIZE; r++) next[r][c] = line[r];
      scoreAdd += s;
    }
    return { next, scoreAdd };
  }

  function moveDown() {
    let scoreAdd = 0;
    const next = emptyGrid();
    for (let c = 0; c < SIZE; c++) {
      const col = [];
      for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
      const reversed = col.reverse();
      const { line, scoreAdd: s } = slideLine(reversed);
      const restored = line.reverse();
      for (let r = 0; r < SIZE; r++) next[r][c] = restored[r];
      scoreAdd += s;
    }
    return { next, scoreAdd };
  }

  function doMove(dir) {
    let result;
    switch (dir) {
      case 'left':  result = moveLeft();  break;
      case 'right': result = moveRight(); break;
      case 'up':    result = moveUp();    break;
      case 'down':  result = moveDown();  break;
      default: return false;
    }
    if (boardsEqual(grid, result.next)) return false;
    grid = result.next;
    currentScore += result.scoreAdd;
    spawnTile();
    render();
    return true;
  }

  function render() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.v = v;
        cell.textContent = v === 0 ? '' : String(v);
        boardEl.appendChild(cell);
      }
    }
    document.getElementById('score').textContent = String(currentScore);
  }

  function reset() {
    grid = emptyGrid();
    currentScore = 0;
    spawnTile();
    spawnTile();
    render();
  }

  window.game = {
    size: SIZE,
    reset: reset,
    move: function (dir) {
      return doMove(dir);
    },
    board: function () {
      return cloneGrid(grid);
    },
    setBoard: function (arr) {
      grid = arr.map(row => row.slice());
      render();
    },
    score: function () {
      return currentScore;
    }
  };

  document.getElementById('reset').addEventListener('click', reset);

  document.addEventListener('keydown', function (e) {
    const map = {
      ArrowLeft: 'left',
      ArrowRight: 'right',
      ArrowUp: 'up',
      ArrowDown: 'down'
    };
    if (map[e.key]) {
      e.preventDefault();
      doMove(map[e.key]);
    }
  });

  reset();
})();
</script>
</body>
</html>
