<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: #c9d1d9;
  }
  #controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }
  button {
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover {
    background: #30363d;
    border-color: #8b949e;
  }
  button:active { background: #484f58; }
  #sort { background: #238636; border-color: #2ea043; }
  #sort:hover { background: #2ea043; }
  #bars {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
    width: min(900px, 100%);
    height: 360px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px;
  }
  .bar {
    flex: 1 1 0;
    min-width: 2px;
    background: #58a6ff;
    border-radius: 3px 3px 0 0;
    transition: height 0.08s ease, background 0.1s;
  }
  .bar.comparing { background: #f0883e; }
  .bar.sorted { background: #3fb950; }
</style>
</head>
<body>
  <h1>Sorting Algorithm Visualizer</h1>
  <div id="controls">
    <button id="sort">Sort</button>
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset</button>
  </div>
  <div id="bars"></div>

<script>
(function () {
  const DEFAULT = [64, 34, 25, 12, 22, 11, 90, 55, 43, 78, 31, 19, 67, 48, 5];
  let arr = DEFAULT.slice();
  // Bubble-sort state
  let bi = 0; // outer index
  let bj = 0; // inner index
  let n = arr.length;
  let animating = false;
  let animTimer = null;

  const barsEl = document.getElementById('bars');

  function isSorted(a) {
    for (let k = 1; k < a.length; k++) {
      if (a[k - 1] > a[k]) return false;
    }
    return true;
  }

  function resetSortState() {
    bi = 0;
    bj = 0;
    n = arr.length;
  }

  function render(highlight) {
    barsEl.innerHTML = '';
    if (!arr.length) return;
    const max = Math.max.apply(null, arr.concat([1]));
    const fully = isSorted(arr);
    for (let k = 0; k < arr.length; k++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = ((arr[k] / max) * 100) + '%';
      if (fully) {
        bar.classList.add('sorted');
      } else if (highlight && (k === highlight[0] || k === highlight[1])) {
        bar.classList.add('comparing');
      }
      barsEl.appendChild(bar);
    }
  }

  function array() {
    return arr.slice();
  }

  function setArray(a) {
    stopAnim();
    arr = a.slice();
    resetSortState();
    render();
  }

  function sorted() {
    return isSorted(arr);
  }

  /**
   * One step of bubble sort: compare arr[bj] and arr[bj+1], swap if needed,
   * then advance indices. Returns true when fully sorted.
   */
  function sortStep() {
    if (isSorted(arr)) {
      render();
      return true;
    }
    n = arr.length;
    if (n <= 1) {
      render();
      return true;
    }

    // If outer pass finished, done
    if (bi >= n - 1) {
      render();
      return true;
    }

    // Perform one comparison
    const highlight = [bj, bj + 1];
    if (arr[bj] > arr[bj + 1]) {
      const tmp = arr[bj];
      arr[bj] = arr[bj + 1];
      arr[bj + 1] = tmp;
    }

    // Advance
    bj++;
    if (bj >= n - 1 - bi) {
      bj = 0;
      bi++;
    }

    render(highlight);
    return isSorted(arr);
  }

  function stopAnim() {
    animating = false;
    if (animTimer !== null) {
      clearTimeout(animTimer);
      animTimer = null;
    }
  }

  function animateSort() {
    if (animating) return;
    if (isSorted(arr)) {
      render();
      return;
    }
    animating = true;
    function tick() {
      if (!animating) return;
      const done = sortStep();
      if (done) {
        animating = false;
        animTimer = null;
        render();
        return;
      }
      animTimer = setTimeout(tick, 60);
    }
    tick();
  }

  function shuffleArray() {
    stopAnim();
    for (let k = arr.length - 1; k > 0; k--) {
      const r = Math.floor(Math.random() * (k + 1));
      const t = arr[k];
      arr[k] = arr[r];
      arr[r] = t;
    }
    resetSortState();
    render();
  }

  function resetArray() {
    stopAnim();
    arr = DEFAULT.slice();
    resetSortState();
    render();
  }

  document.getElementById('sort').addEventListener('click', animateSort);
  document.getElementById('shuffle').addEventListener('click', shuffleArray);
  document.getElementById('reset').addEventListener('click', resetArray);

  window.viz = {
    array: array,
    setArray: setArray,
    sortStep: sortStep,
    sorted: sorted
  };

  render();
})();
</script>
</body>
</html>
