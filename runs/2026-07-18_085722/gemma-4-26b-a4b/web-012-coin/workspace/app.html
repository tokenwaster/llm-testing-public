<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WastedToken Mint</title>
    <style>
        :root { --bg: #0a0a0a; --text: #e0e0e0; --accent: #d4af37; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow-x: hidden; }
        #coin-hero { width: 100%; height: 80vh; display: block; }
        .hero-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; text-align: center; width: 100%; }
        h1 { font-size: clamp(2rem, 8vw, 5rem); letter-spacing: 0.5rem; color: var(--accent); margin: 0; opacity: 0.7; }
        #about { max-width: 800px; margin: 4rem auto; text-align: center; padding: 0 20px; line-height: 1.6; font-size: 1.2rem; color: #aaa; }
        #collection { max-width: 1100px; margin: 0 auto 5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; padding: 0 20px; }
        .edition { background: #111; border: 1px solid #333; padding: 2rem; text-align: center; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .edition:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .edition-canvas { width: 100%; aspect-ratio: 1/1; margin-bottom: 1rem; }
        .edition-name { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; margin-bottom: 0.5rem; }
        .edition-status { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 1.5rem; color: #666; }
        [data-state="available"] .edition-status { color: #4caf50; }
        [data-state="sold-out"] .edition-status { color: #f44336; }
        [data-state="coming-soon"] .edition-status { color: var(--accent); }
        .buy { background: var(--accent); border: none; padding: 0.8rem 1.5rem; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 10int(100%); transition: 0.3s; }
        .buy:hover { background: #fff; color: #000; }
        [data-edition="bronze"] .edition-name { color: #cd7f32; }
        [data-edition="silver"] .edition-name { color: #c0c0c0; }
        [data-edition="gold"] .edition-name { color: #ffd700; }
        [data-edition="black"] .edition-name { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div style="position:relative">
    <canvas id="coin-hero"></canvas>
    <div class="hero-overlay"><h1>WASTEDTOKEN</h1></div>
</div>

<section id="about">
    <h2>The Standard of Scarcity</h2>
    <p>We forge physical legacies. Each coin is a heavy, tangible manifestation of digital prestige—minted with precision for the elite collectors of the wasteland.</p>
</section>

<div id="collection">
    <div class="edition" data-edition="bronze" data-state="available">
        <canvas class="edition-canvas"></canvas>
        <div class="edition-name">Bronze</div>
        <div class="int(edition-status)">Available</div> <!-- Error in scratchpad -->
        <div class="edition-status">Available</div>
        <button class="buy">Add to cart</button>
    </div>
    <!-- ... (rest of the HTML) -->
