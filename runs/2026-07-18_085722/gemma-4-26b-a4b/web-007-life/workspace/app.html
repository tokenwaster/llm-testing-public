<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conway's Game of Life</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #4ade80;
            --text-color: #e0e0e0;
            --btn-hover: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--panel-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-color);
        }

        #life {
            background-color: #000;
            border: 2px solid #333;
            cursor: crosshair;
            image-rendering: pixelated;
            display: block;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #444;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #play {
            background-color: #2d5a27;
        }

        #play.running {
            background-color: #8b0000;
        }

        #clear {
            background-color: #444;
        }

        #random {
            background-color: #3b82f6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Game of Life</h1>
    <canvas id="life" width="500" height="500"></canvas>
    <div class="controls">
        <button id="step">Step</button>
        <button id="play">Play</button>
        <button id="random">Random</button>
        <button id="clear">Clear</button>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('life');
    const ctx = canvas.getContext('2d');
    const w = 50; // Grid width (cells)
    const h = 50; // Grid height (cells)
    const cellSize = canvas.width / w;

    // Simulation state
    let grid = new Uint8Array(w * h);
    let nextGrid = new Uint8Array(w * h);

    // UI State
    let isPlaying = false;
    let lastTick = 0;
    const tickRate = 120; // ms between generations during play

    /**
     * API Implementation
     */
    window.life = {
        w, h,
        get(x, y) {
            if (x < 0 || x >= w || y < 0 || y >= h) return 0;
            return grid[y * w + x];
        },
        set(x, y, v) {
            if (x >= 0 && x < w && y >= 0 && y < h) {
                grid[y * w + x] = v ? 1 : 0;
                draw();
            }
        },
        step() {
            for (let i = 0; i < w * h; i++) {
                const x = i % w;
                const y = Math.floor(i / w);
                
                // Count neighbors using the get method to handle boundaries correctly
                let neighbors = 0;
                for (let dy = -1; dy <= 1; dy++) {
                    for (str_dx = -1; str_dx <= 1; str_dx++) {
                        if (str_dx === 0 && dy === 0) continue;
                        neighbors += this.get(x + str_dx, y + dy);
                    }
                }

                const currentState = grid[i];
                let nextState = 0;
                if (currentState === 1) {
                    nextState = (neighbors === 2 || neighbors === 3) ? 1 : 0;
                } else {
                    nextState = (neighbors === 3) ? 1 : 0;
                }
                nextGrid[i] = nextState;
            }
            // Apply all changes simultaneously
            grid.set(nextGrid);
            draw();
        },
        clear() {
            grid.fill(0);
            draw();
        }
    };

    /**
     * Rendering logic
     */
    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw grid lines (subtle)
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let i = 0; i <= w; i++) {
            ctx.moveTo(i * cellSize, 0);
            ctx.lineTo(i * cellSize, canvas.height);
        }
        for (let j = 0; j <= h; j++) {
            ctx.moveTo(0, j * cellSize);
            ctx.lineTo(canvas.width, j * cellSize);
        }
        ctx.stroke();

        // Draw cells
        ctx.fillStyle = '#4ade80';
        for (let i = 0; i < w * h; i++) {
            if (grid[i] === 1) {
                const x = i % w;
                const y = Math.floor(i / w);
                // Draw cell slightly smaller than grid square for a "gap" effect
                ctx.fillRect(x * cellSize + 0.5, y * cellSize + 0.5, cellSize - 1, cellSize - 1);
            }
        }
    }

    /**
     * Interaction logic
     */
    let isDragging = false;
    let dragMode = 'paint'; // 'paint' (set to 1) or 'toggle' (flip state)

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / cellSize);
        const y = Math.floor((e.clientY - rect.top) / cellSize);
        return { x, y };
    }

    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        const { x, y } = getCoords(e);
        // Determine if we are toggling or painting based on initial click
        dragMode = window.life.get(x, y) ? 'toggle' : 'paint';
        
        if (dragMode === 'toggle') {
            window.life.set(x, y, 0);
        } else {
            window.life.set(x, y, 1);
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const { x, y } = getCoords(e);
        if (dragMode === 'paint') {
            window.life.set(x, y, 1);
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    /**
     * Control Buttons
     */
    document.getElementById('step').onclick = () => window.life.step();
    
    const playBtn = document.getElementById('play');
    playBtn.onclick = () => {
        isPlaying = !isPlaying;
        playBtn.textContent = isPlaying ? 'Pause' : 'Play';
        playBtn.classList.toggle('running', isPlaying);
    };

    document.getElementById('random').onclick = () => {
        for (let i = 0; i < w * h; i++) {
            grid[i] = Math.random() > 0.85 ? 1 : 0;
        }
        draw();
    };

    document.getElementById('clear').onclick = () => window.life.clear();

    /**
     * Main Loop
     */
    function loop(timestamp) {
        if (isPlaying && timestamp - lastTick > tickRate) {
            window.life.step();
            lastTick = timestamp;
        }
        requestAnimationFrame(loop);
    }

    // Initialize
    draw();
    requestAnimationFrame(loop);

})();
</script>
</body>
</html>
