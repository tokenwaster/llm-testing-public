<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: "Ubuntu", "Segoe UI", "Noto Sans", sans-serif;
    background: #2c001e;
    user-select: none;
  }

  /* ---------- Desktop ---------- */
  #desktop {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 25%, rgba(233,84,32,0.35) 0%, rgba(233,84,32,0) 55%),
      radial-gradient(ellipse at 80% 75%, rgba(119,33,111,0.55) 0%, rgba(119,33,111,0) 60%),
      linear-gradient(135deg, #4b1141 0%, #2c001e 55%, #1a0b14 100%);
    overflow: hidden;
  }

  /* ---------- Top bar ---------- */
  #topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 30px;
    background: rgba(20, 10, 18, 0.92);
    color: #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    font-size: 13px;
    z-index: 5000;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #topbar .tb-left { font-weight: 700; letter-spacing: .3px; }
  #topbar .tb-right { display: flex; gap: 10px; opacity: .85; }

  /* ---------- Taskbar / dock ---------- */
  #taskbar {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 68px;
    background: rgba(20, 10, 18, 0.82);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    z-index: 4000;
    backdrop-filter: blur(6px);
  }
  #taskbar button {
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .1s;
    padding: 0;
  }
  #taskbar button:hover { background: rgba(255,255,255,0.16); transform: scale(1.06); }
  #taskbar button:active { transform: scale(.97); }
  #taskbar button svg { width: 34px; height: 34px; display: block; }
  #taskbar .dock-sep {
    width: 40px; height: 1px;
    background: rgba(255,255,255,0.15);
  }

  /* ---------- Windows ---------- */
  .app-window {
    position: absolute;
    width: 640px;
    height: 440px;
    min-width: 360px;
    min-height: 240px;
    background: #2e2a32;
    border: 1px solid rgba(0,0,0,0.6);
    border-radius: 10px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
  }
  .app-window.hidden { display: none; }

  .titlebar {
    height: 38px;
    flex: 0 0 38px;
    background: linear-gradient(#3a353f, #322d37);
    border-bottom: 1px solid #221e26;
    display: flex;
    align-items: center;
    padding: 0 10px;
    cursor: move;
    gap: 8px;
  }
  .titlebar .win-title {
    flex: 1;
    text-align: center;
    color: #ddd;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .2px;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .win-close {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: #e95420;
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 22px;
    transition: filter .12s;
  }
  .win-close:hover { filter: brightness(1.2); }

  .win-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #262229;
  }

  /* ---------- Files app ---------- */
  #files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #322d37;
    border-bottom: 1px solid #1d1a20;
    flex: 0 0 auto;
  }
  #files-up {
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.07);
    color: #ddd;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 14px;
    cursor: pointer;
    transition: background .12s;
  }
  #files-up:hover:not(:disabled) { background: rgba(255,255,255,0.16); }
  #files-up:disabled { opacity: .35; cursor: default; }
  #files-path {
    flex: 1;
    background: #1d1a20;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: #e8e6ea;
    font-family: "Ubuntu Mono", Consolas, monospace;
    font-size: 13px;
    padding: 6px 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #files-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 6px;
    align-content: start;
  }
  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 4px;
    border-radius: 8px;
    color: #e8e6ea;
    font-size: 12px;
    cursor: default;
    text-align: center;
    word-break: break-all;
  }
  .fs-item:hover { background: rgba(255,255,255,0.08); }
  .fs-item.selected { background: rgba(233,84,32,0.35); }
  .fs-item .fs-icon { width: 40px; height: 40px; pointer-events: none; }
  .fs-item .fs-name { pointer-events: none; line-height: 1.25; }
  .fs-empty {
    grid-column: 1 / -1;
    color: #888;
    font-size: 13px;
    text-align: center;
    padding: 30px 0;
  }

  /* ---------- Notepad app ---------- */
  #notepad-toolbar {
    display: flex;
    align-items: stretch;
    background: #322d37;
    border-bottom: 1px solid #1d1a20;
    flex: 0 0 auto;
  }
  #tabs {
    flex: 1;
    display: flex;
    overflow-x: auto;
    min-width: 0;
  }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    font-size: 12.5px;
    color: #bbb;
    background: transparent;
    border-right: 1px solid #26222b;
    cursor: pointer;
    white-space: nowrap;
    max-width: 180px;
  }
  .tab:hover { background: rgba(255,255,255,0.06); }
  .tab.active {
    background: #262229;
    color: #fff;
    box-shadow: inset 0 -2px 0 #e95420;
  }
  .tab .tab-label {
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
  }
  .tab .tab-x {
    border: none;
    background: transparent;
    color: #999;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .tab .tab-x:hover { background: rgba(255,255,255,0.15); color: #fff; }
  #new-tab {
    flex: 0 0 auto;
    border: none;
    background: transparent;
    color: #ccc;
    font-size: 18px;
    padding: 0 14px;
    cursor: pointer;
  }
  #new-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
  #editor {
    flex: 1;
    width: 100%;
    resize: none;
    border: none;
    outline: none;
    background: #262229;
    color: #eceaee;
    font-family: "Ubuntu Mono", Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
    padding: 12px 14px;
    min-height: 0;
    user-select: text;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="desktop">

  <div id="topbar">
    <span class="tb-left">Activities</span>
    <span class="tb-center" id="clock">--:--</span>
    <span class="tb-right"><span>&#9662; en</span><span>&#128266;</span><span>&#128267; 100%</span></span>
  </div>

  <div id="taskbar">
    <button id="open-files" title="Files" aria-label="Open Files">
      <svg viewBox="0 0 48 48"><path fill="#f5a623" d="M6 10c0-2.2 1.8-4 4-4h10l4 5h14c2.2 0 4 1.8 4 4v21c0 2.2-1.8 4-4 4H10c-2.2 0-4-1.8-4-4V10z"/><path fill="#ffc966" d="M6 17h36v19c0 2.2-1.8 4-4 4H10c-2.2 0-4-1.8-4-4V17z"/></svg>
    </button>
    <button id="open-notepad" title="Notepad" aria-label="Open Notepad">
      <svg viewBox="0 0 48 48"><rect x="9" y="5" width="30" height="38" rx="3" fill="#ececec"/><rect x="9" y="5" width="30" height="8" rx="3" fill="#e95420"/><rect x="14" y="19" width="20" height="2.5" rx="1.2" fill="#9a9a9a"/><rect x="14" y="25" width="20" height="2.5" rx="1.2" fill="#9a9a9a"/><rect x="14" y="31" width="13" height="2.5" rx="1.2" fill="#9a9a9a"/></svg>
    </button>
    <div class="dock-sep"></div>
    <button title="Ubuntu" aria-label="Ubuntu" onclick="void 0">
      <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="#e95420"/><circle cx="24" cy="24" r="8" fill="none" stroke="#fff" stroke-width="3"/><circle cx="24" cy="9.5" r="3.4" fill="#fff"/><circle cx="11.5" cy="31.5" r="3.4" fill="#fff"/><circle cx="36.5" cy="31.5" r="3.4" fill="#fff"/></svg>
    </button>
  </div>

  <!-- ============ Files window ============ -->
  <div id="files-window" class="app-window hidden" style="left: 120px; top: 80px;">
    <div class="titlebar">
      <span class="win-title">&#128193; Files</span>
      <button class="win-close" title="Close">&#10005;</button>
    </div>
    <div class="win-body">
      <div id="files-toolbar">
        <button id="files-up" title="Up one level">&#8593; Up</button>
        <div id="files-path">/</div>
      </div>
      <div id="files-list"></div>
    </div>
  </div>

  <!-- ============ Notepad window ============ -->
  <div id="notepad-window" class="app-window hidden" style="left: 260px; top: 140px;">
    <div class="titlebar">
      <span class="win-title">&#128221; Notepad</span>
      <button class="win-close" title="Close">&#10005;</button>
    </div>
    <div class="win-body">
      <div id="notepad-toolbar">
        <div id="tabs"></div>
        <button id="new-tab" title="New tab">+</button>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Start typing…"></textarea>
    </div>
  </div>

</div>

<script>
(function () {
  "use strict";

  /* ================= Clock ================= */
  var clock = document.getElementById("clock");
  function tick() {
    var d = new Date();
    var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var h = String(d.getHours()).padStart(2, "0");
    var m = String(d.getMinutes()).padStart(2, "0");
    clock.textContent = days[d.getDay()] + " " + months[d.getMonth()] + " " + d.getDate() + "  " + h + ":" + m;
  }
  tick();
  setInterval(tick, 10000);

  /* ================= Window management ================= */
  var zTop = 200;
  function bringToFront(win) {
    zTop += 1;
    win.style.zIndex = zTop;
  }

  function setupWindow(winId, launcherId) {
    var win = document.getElementById(winId);
    var launcher = document.getElementById(launcherId);
    var titlebar = win.querySelector(".titlebar");
    var closeBtn = win.querySelector(".win-close");

    launcher.addEventListener("click", function () {
      win.classList.remove("hidden");
      bringToFront(win);
      clampIntoView(win);
    });

    closeBtn.addEventListener("click", function (e) {
      e.stopPropagation();
      win.classList.add("hidden");
    });

    win.addEventListener("mousedown", function () { bringToFront(win); });

    /* dragging */
    var dragging = false, offX = 0, offY = 0;
    titlebar.addEventListener("mousedown", function (e) {
      if (e.target === closeBtn) return;
      dragging = true;
      var r = win.getBoundingClientRect();
      offX = e.clientX - r.left;
      offY = e.clientY - r.top;
      bringToFront(win);
      e.preventDefault();
    });
    document.addEventListener("mousemove", function (e) {
      if (!dragging) return;
      var x = e.clientX - offX;
      var y = e.clientY - offY;
      x = Math.max(-win.offsetWidth + 80, Math.min(x, window.innerWidth - 80));
      y = Math.max(30, Math.min(y, window.innerHeight - 40));
      win.style.left = x + "px";
      win.style.top = y + "px";
    });
    document.addEventListener("mouseup", function () { dragging = false; });
    return win;
  }

  function clampIntoView(win) {
    var r = win.getBoundingClientRect();
    if (r.right > window.innerWidth) win.style.left = Math.max(90, window.innerWidth - r.width - 10) + "px";
    if (r.bottom > window.innerHeight) win.style.top = Math.max(32, window.innerHeight - r.height - 10) + "px";
  }

  setupWindow("files-window", "open-files");
  setupWindow("notepad-window", "open-notepad");

  /* ================= Files app ================= */
  // Fake filesystem: objects = directories, strings = files.
  var FS = {
    "bin": { "bash": "f", "cat": "f", "cp": "f", "ls": "f", "mv": "f", "rm": "f", "sh": "f" },
    "boot": { "grub": { "grub.cfg": "f" }, "vmlinuz": "f", "initrd.img": "f" },
    "dev": { "null": "f", "random": "f", "sda": "f", "tty0": "f" },
    "etc": {
      "apt": { "sources.list": "f" },
      "ssh": { "sshd_config": "f" },
      "fstab": "f", "hostname": "f", "hosts": "f", "os-release": "f", "passwd": "f"
    },
    "home": {
      "user": {
        "Documents": { "notes.txt": "f", "resume.pdf": "f", "todo.md": "f" },
        "Downloads": { "ubuntu-24.04.iso": "f", "wallpaper.png": "f" },
        "Pictures": { "screenshot.png": "f", "vacation.jpg": "f" },
        "Music": {},
        "Videos": {},
        ".bashrc": "f",
        ".profile": "f"
      }
    },
    "lib": { "modules": {}, "systemd": {} },
    "opt": {},
    "proc": { "cpuinfo": "f", "meminfo": "f", "uptime": "f" },
    "root": {},
    "tmp": {},
    "usr": {
      "bin": { "python3": "f", "gcc": "f", "vim": "f", "curl": "f" },
      "lib": {},
      "local": { "bin": {} },
      "share": { "doc": {}, "icons": {}, "themes": {} }
    },
    "var": {
      "log": { "syslog": "f", "auth.log": "f", "kern.log": "f" },
      "cache": {},
      "tmp": {},
      "www": { "html": { "index.html": "f" } }
    }
  };

  var cwd = []; // path segments; [] = root
  var filesPath = document.getElementById("files-path");
  var filesList = document.getElementById("files-list");
  var filesUp = document.getElementById("files-up");

  function dirAt(segments) {
    var node = FS;
    for (var i = 0; i < segments.length; i++) {
      node = node[segments[i]];
      if (typeof node !== "object" || node === null) return null;
    }
    return node;
  }

  function folderIcon() {
    return '<svg class="fs-icon" viewBox="0 0 48 48"><path fill="#f5a623" d="M6 10c0-2.2 1.8-4 4-4h10l4 5h14c2.2 0 4 1.8 4 4v21c0 2.2-1.8 4-4 4H10c-2.2 0-4-1.8-4-4V10z"/><path fill="#ffc966" d="M6 17h36v19c0 2.2-1.8 4-4 4H10c-2.2 0-4-1.8-4-4V17z"/></svg>';
  }
  function fileIcon() {
    return '<svg class="fs-icon" viewBox="0 0 48 48"><path fill="#dcdcdc" d="M12 4h16l10 10v30H12z"/><path fill="#b8b8b8" d="M28 4l10 10H28z"/><rect x="17" y="22" width="14" height="2" rx="1" fill="#8a8a8a"/><rect x="17" y="27" width="14" height="2" rx="1" fill="#8a8a8a"/><rect x="17" y="32" width="9" height="2" rx="1" fill="#8a8a8a"/></svg>';
  }

  function renderFiles() {
    var path = "/" + cwd.join("/");
    filesPath.textContent = cwd.length ? path : "/";
    filesUp.disabled = cwd.length === 0;
    filesList.innerHTML = "";

    var dir = dirAt(cwd);
    if (!dir) { cwd = []; renderFiles(); return; }

    var names = Object.keys(dir).sort(function (a, b) {
      var aDir = typeof dir[a] === "object", bDir = typeof dir[b] === "object";
      if (aDir !== bDir) return aDir ? -1 : 1;
      return a.localeCompare(b);
    });

    if (names.length === 0) {
      var empty = document.createElement("div");
      empty.className = "fs-empty";
      empty.textContent = "This folder is empty";
      filesList.appendChild(empty);
      return;
    }

    names.forEach(function (name) {
      var isDir = typeof dir[name] === "object";
      var el = document.createElement("div");
      el.className = "fs-item";
      el.innerHTML = (isDir ? folderIcon() : fileIcon()) +
        '<span class="fs-name"></span>';
      el.querySelector(".fs-name").textContent = name;
      el.title = name;

      el.addEventListener("click", function () {
        filesList.querySelectorAll(".fs-item.selected").forEach(function (s) {
          s.classList.remove("selected");
        });
        el.classList.add("selected");
      });

      if (isDir) {
        el.addEventListener("dblclick", function () {
          cwd.push(name);
          renderFiles();
        });
      }
      filesList.appendChild(el);
    });
  }

  filesUp.addEventListener("click", function () {
    if (cwd.length > 0) {
      cwd.pop();
      renderFiles();
    }
  });

  renderFiles();

  /* ================= Notepad app ================= */
  var STORE_KEY = "ubuntu-notepad-tabs-v1";
  var tabsEl = document.getElementById("tabs");
  var newTabBtn = document.getElementById("new-tab");
  var editor = document.getElementById("editor");

  var state = loadState();

  function loadState() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.tabs) && parsed.tabs.length > 0) {
          if (typeof parsed.active !== "number" ||
              parsed.active < 0 || parsed.active >= parsed.tabs.length) {
            parsed.active = 0;
          }
          parsed.tabs = parsed.tabs.map(function (t, i) {
            return {
              title: typeof t.title === "string" && t.title ? t.title : ("Untitled " + (i + 1)),
              content: typeof t.content === "string" ? t.content : ""
            };
          });
          return parsed;
        }
      }
    } catch (e) { /* corrupted storage — start fresh */ }
    return {
      tabs: [{ title: "Untitled 1", content: "" }],
      active: 0,
      counter: 1
    };
  }

  function saveState() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    } catch (e) { /* storage full or unavailable */ }
  }

  function renderTabs() {
    tabsEl.innerHTML = "";
    state.tabs.forEach(function (tab, i) {
      var t = document.createElement("div");
      t.className = "tab" + (i === state.active ? " active" : "");
      var label = document.createElement("span");
      label.className = "tab-label";
      label.textContent = tab.title;
      t.appendChild(label);

      if (state.tabs.length > 1) {
        var x = document.createElement("button");
        x.className = "tab-x";
        x.title = "Close tab";
        x.textContent = "\u2715";
        x.addEventListener("click", function (e) {
          e.stopPropagation();
          closeTab(i);
        });
        t.appendChild(x);
      }

      t.addEventListener("click", function () {
        state.active = i;
        saveState();
        renderTabs();
        renderEditor();
      });
      tabsEl.appendChild(t);
    });
  }

  function renderEditor() {
    editor.value = state.tabs[state.active].content;
  }

  function closeTab(i) {
    state.tabs.splice(i, 1);
    if (state.active >= state.tabs.length) state.active = state.tabs.length - 1;
    else if (i < state.active) state.active -= 1;
    saveState();
    renderTabs();
    renderEditor();
  }

  newTabBtn.addEventListener("click", function () {
    state.counter = (state.counter || state.tabs.length) + 1;
    state.tabs.push({ title: "Untitled " + state.counter, content: "" });
    state.active = state.tabs.length - 1;
    saveState();
    renderTabs();
    renderEditor();
    editor.focus();
  });

  editor.addEventListener("input", function () {
    state.tabs[state.active].content = editor.value;
    saveState();
  });

  renderTabs();
  renderEditor();
})();
</script>
</body>
</html>
