<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      font-size: 14px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #555;
    }

    #score-container {
      margin-top: 10px;
      font-size: 20px;
    }

    canvas {
      border: 2px solid #444;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      background-color: #000;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  
  <canvas id="snake" width="400" height="400"></canvas>
  
  <div class="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
  
  <div id="score-container">Score: <span id="score">0</span></div>

  <script>
    // Game configuration
    const CELL_SIZE = 20;
    const BOARD_WIDTH = 400;
    const BOARD_HEIGHT = 400;
    const GRID_W = BOARD_WIDTH / CELL_SIZE; // 20x20 grid
    const GRID_H = BOARD_HEIGHT / CELL_SIZE; // 20x20 grid
    
    // Game state
    let snake = [];
    let food = null;
    let direction = 'right';
    let nextDirection = 'right';
    let score = 0;
    let alive = true;
    let gameInterval = null;

    // DOM elements
    const canvas = document.getElementById('snake');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start');
    const pauseBtn = document.getElementById('pause');
    const resetBtn = document.getElementById('reset');
    const scoreEl = document.getElementById('score');

    // Initialize game state
    function initGame() {
      snake = [
        {x: 5, y: 10},
        {x: 4, y: 10},
        {x: 3, y: 10}
      ];
      direction = 'right';
      nextDirection = 'right';
      score = 0;
      alive = true;
      placeFood();
      updateScore();
    }

    // Place food on a free cell
    function placeFood() {
      let validPosition = false;
      while (!validPosition) {
        const x = Math.floor(Math.random() * GRID_W);
        const y = Math.floor(Math.random() * GRID_H);
        
        // Check if position is not occupied by snake
        let onSnake = false;
        for (let segment of snake) {
          if (segment.x === x && segment.y === y) {
            onSnake = true;
            break;
          }
        }
        
        if (!onSnake) {
          food = {x, y};
          validPosition = true;
        }
      }
    }

    // Draw the game state
    function draw() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, BOARD_WIDTH, BOARD_HEIGHT);
      
      // Draw snake
      for (let i = 0; i < snake.length; i++) {
        const segment = snake[i];
        
        // Head is a different color
        if (i === 0) {
          ctx.fillStyle = '#4CAF50'; // Green head
        } else {
          ctx.fillStyle = '#2E7D32'; // Darker green body
        }
        
        ctx.fillRect(
          segment.x * CELL_SIZE, 
          segment.y * CELL_SIZE, 
          CELL_SIZE - 1, 
          CELL_SIZE - 1
        );
      }
      
      // Draw food
      if (food) {
        ctx.fillStyle = '#FF5722'; // Orange/red food
        ctx.fillRect(
          food.x * CELL_SIZE, 
          food.y * CELL_SIZE, 
          CELL_SIZE - 1, 
          CELL_SIZE - 1
        );
      }
    }

    // Update game state (one tick)
    function tick() {
      if (!alive) return;
      
      direction = nextDirection; // Apply queued direction
      
      const head = {...snake[0]};
      
      // Move head based on direction
      switch (direction) {
        case 'up': head.y--; break;
        case 'down': head.y++; break;
        case 'left': head.x--; break;
        case 'right': head.x++; break;
      }
      
      // Check wall collision
      if (head.x < 0 || head.x >= GRID_W || head.y < 0 || head.y >= GRID_H) {
        alive = false;
        return;
      }
      
      // Check self-collision
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          alive = false;
          return;
        }
      }
      
      // Add new head to snake
      snake.unshift(head);
      
      // Check food collision
      if (food && head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        placeFood();
        // Don't remove tail, so snake grows
      } else {
        // Remove tail
        snake.pop();
      }
    }

    // Update score display
    function updateScore() {
      scoreEl.textContent = score;
    }

    // Set direction (ignoring 180° reversals)
    function setDir(newDir) {
      if (!alive) return;
      
      const opposites = {
        'up': 'down',
        'down': 'up',
        'left': 'right',
        'right': 'left'
      };
      
      // Only update direction if not opposite of current
      if (opposites[newDir] !== direction) {
        nextDirection = newDir;
      }
    }

    // Game API exposed on window
    window.game = {
      w: GRID_W,
      h: GRID_H,
      
      reset() {
        initGame();
        draw();
      },
      
      tick() {
        tick();
        draw();
      },
      
      setDir(dir) {
        setDir(dir);
      },
      
      setFood(x, y) {
        food = {x, y};
        draw();
      },
      
      snake() {
        return snake.map(segment => [segment.x, segment.y]);
      },
      
      food() {
        return food ? [food.x, food.y] : null;
      },
      
      alive() {
        return alive;
      },
      
      score() {
        return score;
      }
    };

    // Event listeners
    startBtn.addEventListener('click', () => {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(() => {
        window.game.tick();
      }, 100); // 10 ticks per second
    });

    pauseBtn.addEventListener('click', () => {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
    });

    resetBtn.addEventListener('click', () => {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
      window.game.reset();
    });

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp':
          e.preventDefault();
          setDir('up');
          break;
        case 'ArrowDown':
          e.preventDefault();
          setDir('down');
          break;
        case 'ArrowLeft':
          e.preventDefault();
          setDir('left');
          break;
        case 'ArrowRight':
          e.preventDefault();
          setDir('right');
          break;
      }
    });

    // Initialize on load
    initGame();
    draw();

    // Start game automatically for better UX
    startBtn.click();
  </script>
</body>
</html>
