<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        h1 {
            margin-bottom: 20px;
            font-size: 3rem;
            color: #eee;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .score-container {
            background-color: #3c3c3c;
            padding: 15px 30px;
            border-radius: 8px;
            text-align: center;
            min-width: 150px;
        }
        
        .score-label {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .score-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fff;
        }
        
        .board-container {
            background-color: #3c3c3c;
            padding: 10px;
            border-radius: 8px;
            position: relative;
        }
        
        #board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
        }
        
        .tile {
            width: 80px;
            height: 80px;
            background-color: #eee4da;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #776e65;
        }
        
        .tile.empty {
            background-color: #cdc1b4;
            color: transparent;
        }
        
        /* Tile colors based on value */
        .tile[data-value="2"] { background-color: #eee4da; }
        .tile[data-value="4"] { background-color: #ede0c8; }
        .tile[data-value="8"] { background-color: #f2b179; color: #fff; }
        .tile[data-value="16"] { background-color: #f59563; color: #fff; }
        .tile[data-value="32"] { background-color: #f67c5f; color: #fff; }
        .tile[data-value="64"] { background-color: #f65e3b; color: #fff; }
        .tile[data-value="128"] { background-color: #edcf72; color: #fff; font-size: 1.8rem; }
        .tile[data-value="256"] { background-color: #edcc61; color: #fff; font-size: 1.8rem; }
        .tile[data-value="512"] { background-color: #edc850; color: #fff; font-size: 1.8rem; }
        .tile[data-value="1024"] { background-color: #edc53f; color: #fff; font-size: 1.6rem; }
        .tile[data-value="2048"] { background-color: #edc22e; color: #fff; font-size: 1.6rem; }
        
        .controls {
            display: flex;
            gap: 15px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        #reset {
            background-color: #8f7a66;
            color: white;
        }
        
        #reset:hover {
            background-color: #7f6a56;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    
    <div class="game-container">
        <div class="score-container">
            <div class="score-label">Score</div>
            <div id="score" class="score-value">0</div>
        </div>
        
        <div class="board-container">
            <div id="board"></div>
        </div>
        
        <div class="controls">
            <button id="reset">New Game</button>
        </div>
    </div>

    <script>
        // Game state
        let board = [];
        let score = 0;
        const size = 4;

        // Initialize the game
        function initGame() {
            // Create empty board
            board = Array(size).fill().map(() => Array(size).fill(0));
            
            // Add two random tiles
            addRandomTile();
            addRandomTile();
            
            score = 0;
            updateScore();
            renderBoard();
        }

        // Add a random tile (2 or 4) to an empty cell
        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) {
                        emptyCells.push({r, c});
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // Render the board
        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const tile = document.createElement('div');
                    tile.className = `tile ${board[r][c] === 0 ? 'empty' : ''}`;
                    
                    if (board[r][c] !== 0) {
                        tile.textContent = board[r][c];
                        tile.setAttribute('data-value', board[r][c]);
                    }
                    
                    boardElement.appendChild(tile);
                }
            }
        }

        // Update the score display
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // Slide and merge a single row to the left
        function slideRow(row) {
            // Remove zeros
            let filtered = row.filter(num => num !== 0);
            
            // Merge adjacent equal numbers
            for (let i = 0; i < filtered.length - 1; i++) {
                if (filtered[i] === filtered[i + 1]) {
                    filtered[i] *= 2;
                    score += filtered[i];
                    filtered[i + 1] = 0;
                    // Skip the next element as it's been merged
                    i++;
                }
            }
            
            // Remove zeros again after merging
            filtered = filtered.filter(num => num !== 0);
            
            // Pad with zeros to maintain size
            while (filtered.length < size) {
                filtered.push(0);
            }
            
            return filtered;
        }

        // Move in a specific direction
        function move(direction) {
            let moved = false;
            const oldBoard = JSON.parse(JSON.stringify(board));
            
            if (direction === 'left') {
                for (let r = 0; r < size; r++) {
                    board[r] = slideRow(board[r]);
                }
            } else if (direction === 'right') {
                for (let r = 0; r < size; r++) {
                    // Reverse row, slide left, then reverse back
                    let reversed = [...board[r]].reverse();
                    reversed = slideRow(reversed);
                    board[r] = reversed.reverse();
                }
            } else if (direction === 'up') {
                for (let c = 0; c < size; c++) {
                    // Extract column
                    let col = [];
                    for (let r = 0; r < size; r++) {
                        col.push(board[r][c]);
                    }
                    
                    // Slide up (same as slide left)
                    col = slideRow(col);
                    
                    // Put back into board
                    for (let r = 0; r < size; r++) {
                        if (board[r][c] !== col[r]) moved = true;
                        board[r][c] = col[r];
                    }
                }
            } else if (direction === 'down') {
                for (let c = 0; c < size; c++) {
                    // Extract column
                    let col = [];
                    for (let r = 0; r < size; r++) {
                        col.push(board[r][c]);
                    }
                    
                    // Reverse, slide left, reverse back
                    col.reverse();
                    col = slideRow(col);
                    col.reverse();
                    
                    // Put back into board
                    for (let r = 0; r < size; r++) {
                        if (board[r][c] !== col[r]) moved = true;
                        board[r][c] = col[r];
                    }
                }
            }
            
            // Check if anything changed
            const isSame = JSON.stringify(oldBoard) === JSON.stringify(board);
            
            // If the board changed, add a new tile and update display
            if (!isSame) {
                addRandomTile();
                renderBoard();
                updateScore();
                return true;
            }
            
            return false;
        }

        // Set the board directly (for grading)
        function setBoard(arr) {
            board = arr.map(row => [...row]);
            score = 0; // Reset score when setting board
            updateScore();
            renderBoard();
        }

        // Get current board state
        function getBoard() {
            return board.map(row => [...row]);
        }

        // Get current score
        function getScore() {
            return score;
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                e.preventDefault();
                
                let direction = '';
                switch (e.key) {
                    case 'ArrowLeft': direction = 'left'; break;
                    case 'ArrowRight': direction = 'right'; break;
                    case 'ArrowUp': direction = 'up'; break;
                    case 'ArrowDown': direction = 'down'; break;
                }
                
                move(direction);
            }
        });

        document.getElementById('reset').addEventListener('click', initGame);

        // Expose game API to window
        window.game = {
            size,
            reset: initGame,
            move: (direction) => move(direction),
            board: getBoard,
            setBoard: setBoard,
            score: getScore
        };

        // Initialize the game on load
        initGame();
    </script>
</body>
</html>
