<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Ball Physics Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, sans-serif;
    color: #eee;
  }
  #controls {
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
  }
  button {
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #16213e;
    color: #eee;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #0f3460; }
  button:active { transform: scale(0.95); background: #e94560; }
  #sim {
    border: 2px solid #0f3460;
    border-radius: 8px;
    background: #0a0a1a;
    cursor: crosshair;
    display: block;
  }
</style>
</head>
<body>
  <div id="controls">
    <button id="drop">Drop Ball</button>
    <button id="play">Play</button>
    <button id="clear">Clear</button>
  </div>
  <canvas id="sim" width="600" height="600"></canvas>
<script>
(function() {
  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d');
  const dropBtn = document.getElementById('drop');
  const playBtn = document.getElementById('play');
  const clearBtn = document.getElementById('clear');

  const W = canvas.width;
  const H = canvas.height;
  const GRAVITY = 400;
  const RESTITUTION = 0.85;

  let balls = [];
  let running = false;
  let animId = null;

  function drawBall(ball) {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = ball.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const ball of balls) {
      drawBall(ball);
    }
  }

  function step(dt) {
    if (dt === undefined) dt = 1;
    for (const ball of balls) {
      ball.vy += GRAVITY * dt;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      if (ball.y + ball.r > H) {
        ball.y = H - ball.r;
        ball.vy = -ball.vy * RESTITUTION;
      }
      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy = -ball.vy * RESTITUTION;
      }
      if (ball.x + ball.r > W) {
        ball.x = W - ball.r;
        ball.vx = -ball.vx * RESTITUTION;
      }
      if (ball.x - ball.r < 0) {
        ball.x = ball.r;
        ball.vx = -ball.vx * RESTITUTION;
      }
    }
    draw();
  }

  function addBall(x, y, vx, vy, r) {
    if (vx === undefined) vx = 0;
    if (vy === undefined) vy = 0;
    if (r === undefined) r = 15 + Math.random() * 15;
    const colors = ['#e94560','#f5a623','#50fa7b','#8be9fd','#ff79c6','#bd93f9'];
    balls.push({
      x: x, y: y,
      vx: vx, vy: vy,
      r: r,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
    draw();
  }

  function clear() {
    balls = [];
    draw();
  }

  function balls() {
    return balls.slice();
  }

  function togglePlay() {
    running = !running;
    playBtn.textContent = running ? 'Pause' : 'Play';
    if (running) {
      animate();
    } else {
      cancelAnimationFrame(animId);
    }
  }

  function animate() {
    if (!running) return;
    step(1 / 60);
    animId = requestAnimationFrame(animate);
  }

  window.sim = {
    get w() { return W; },
    get h() { return H; },
    balls: balls,
    addBall: addBall,
    clear: clear,
    step: step
  };

  dropBtn.addEventListener('click', () => {
    addBall(W / 2, 50, (Math.random() - 0.5) * 200, 0);
  });

  playBtn.addEventListener('click', togglePlay);
  clearBtn.addEventListener('click', clear);

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    addBall(x, y, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
  });

  draw();
})();
</script>
</body>
</html>
