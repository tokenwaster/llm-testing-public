<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maze Bots</title>
<style>
  body { margin: 0; background: #222; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; }
  #ui { width: 400px; height: 30px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; background: #333; padding: 5px; border-radius: 4px; box-sizing: border-box; }
  #timer { font-weight: bold; color: #fff; }
  #completed { font-weight: bold; color: #aaa; }
  button { background: #444; color: white; border: 1px solid #666; cursor: pointer; padding: 5px 10px; border-radius: 3px; }
  button:hover { background: #555; }
  canvas { background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
</style>

<body>

<div id="ui">
  <span id="timer">0</span> ticks | <span id="completed">0</span>/24 bots
  <button id="reset">Reset</button>
</div>
<canvas id="maze" width="400" height="400"></canvas>

<script>
// Pseudo-Random Number Generator (Mulberry32)
function mulberry32(a) {
    return function() {
        var t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
}

// Constants
const COLS = 31;
const ROWS = 21;
const CELL_SIZE = 400 / COLS; // Approx 12.9px
const WALL_THICKNESS = 2;

// Directions: N, E, S, W
const DIRS = [
    {dr: -1, dc: 0, name: 'N'},
    {dr: 0, dc: 1, name: 'E'},
    {dr: 1, dc: 0, name: 'S'},
    {dr: 0, dc: -1, name: 'W'}
];

class Bot {
    constructor(maze, spawn, seed) {
        this.path = [spawn];
        this.deadEnds = new Set();
        this.finishTick = null;
        
        // Randomize preference order based on seed
        let r = mulberry32(seed);
        let p = [];
        while(p.length < 4) {
            let d = DIRS[Math.floor(r * 4)];
            if (!p.includes(d)) p.push(d);
        }
        this.preferredOrder = p;

        // Visual state
        this.x = spawn.c * CELL_SIZE + CELL_SIZE / 2;
        this.y = spawn.r * CELL_SIZE + CELL_SIZE / 2;
        this.radius = 4;
    }

    update() {
        if (this.finishTick !== null) return false; // Already finished

        let curr = this.path[this.path.length - 1];
        
        // Find neighbors
        let neighbors = [];
        for(let d of DIRS) {
            let nr = curr.r + d.dr;
            let nc = curr.c + d.dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                // Check wall
                if (!this.maze.walls[nr][nc][d.name]) {
                    neighbors.push({r: nr, c: nc, dir: d});
                }
            }
        }

        // Filter out dead ends (cells marked as dead by this bot)
        let validNeighbors = neighbors.filter(n => !this.deadEnds.has(`${n.r},${n.c}`));

        // Check for unvisited neighbors
        let unvisitedNeighbors = validNeighbors.filter(n => !this.path.some(p => p.r === n.r && p.c === n.c));

        if (unvisitedNeighbors.length > 0) {
            // Sort by preference order
            validNeighbors.sort((a, b) => {
                let dirA = getDir(curr, a);
                let dirB = getDir(curr, b);
                return this.preferredOrder.indexOf(dirA) - this.preferredOrder.indexOf(dirB);
            });

            // Pick first unvisited neighbor
            let next = validNeighbors.find(n => !this.path.some(p => p.r === n.r && p.c === n.c));
            
            if (next) {
                this.path.push(next);
                return true; // Moved forward
            } else {
                // All valid neighbors are visited. Backtrack.
                // This implies we hit a dead end branch or looped back to visited area.
                // In perfect maze, this means we are at a leaf of the current exploration tree.
                // We backtrack.
                return false; 
            }
        } else {
            // No unvisited neighbors (all walls or dead ends). Backtrack.
            this.path.pop();
            
            // Mark current cell as dead end for this bot?
            // Yes, because we couldn't go anywhere from here.
            this.deadEnds.add(`${curr.r},${curr.c}`);
            
            return true; // Moved back (logically)
        }
    }

    checkExit() {
        let curr = this.path[this.path.length - 1];
        if (curr.r === this.maze.exit.r && curr.c === this.maze.exit.c) {
            this.finishTick = this.game.elapsed;
            return true;
        }
        return false;
    }
}

function getDir(curr, neighbor) {
    for(let d of DIRS) {
        if (curr.r + d.dr === neighbor.r && curr.c + d.dc === neighbor.c) return d.name;
    }
    return null;
}

class Game {
    constructor() {
        this.maze = null;
        this.bots = [];
        this.spawn = {r: 0, c: 0};
        this.exit = {r: ROWS-1, c: COLS-1};
        this.elapsed = 0;
        this.isFinished = false;
    }

    reset(seed) {
        // Generate Maze
        let r = mulberry32(seed || Math.random() * 1e9);
        this.maze = generateMaze(COLS, ROWS, r);
        
        // Setup Bots
        this.bots = [];
        for(let i=0; i<24; i++) {
            let botSeed = seed ? (seed + i) : (Math.random() * 1e9 + i);
            this.bots.push(new Bot(this.maze, this.spawn, botSeed));
        }

        // Reset State
        this.elapsed = 0;
        this.isFinished = false;
        
        // Update UI
        document.getElementById('timer').innerText = "0";
        document.getElementById('completed').innerText = "0/24";
    }

    tick(n) {
        if (this.isFinished) return;

        let finishedCount = 0;
        for(let i=0; i<n; i++) {
            this.elapsed++;
            
            // Update bots
            for(let bot of this.bots) {
                if (bot.finishTick !== null) continue;
                
                let moved = bot.update();
                
                // Check exit
                if (bot.checkExit()) {
                    finishedCount++;
                }
            }

            // Check if all finished
            if (finishedCount === this.bots.length) {
                this.isFinished = true;
                break;
            }
        }
        
        // Update UI Timer
        document.getElementById('timer').innerText = this.elapsed;
        document.getElementById('completed').innerText = `${this.bots.filter(b => b.finishTick !== null).length}/24`;
    }

    draw() {
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Walls
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                let x = c * CELL_SIZE;
                let y = r * CELL_SIZE;
                
                // Top Wall
                if (this.maze.walls[r][c].n) ctx.fillRect(x, y, CELL_SIZE, 2);
                // Bottom Wall
                if (this.maze.walls[r][c].s) ctx.fillRect(x, y + CELL_SIZE - 2, CELL_SIZE, 2);
                // Left Wall
                if (this.maze.walls[r][c].w) ctx.fillRect(x, y, 2, CELL_SIZE);
                // Right Wall
                if (this.maze.walls[r][c].e) ctx.fillRect(x + CELL_SIZE - 2, y, 2, CELL_SIZE);
            }
        }

        // Draw Spawn
        let sx = this.spawn.c * CELL_SIZE + CELL_SIZE/2;
        let sy = this.spawn.r * CELL_SIZE + CELL_SIZE/2;
        ctx.fillStyle = '#ff0000';
        ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2); ctx.fill();

        // Draw Exit
        let ex = this.exit.c * CELL_SIZE + CELL_SIZE/2;
        let ey = this.exit.r * CELL_SIZE + CELL_SIZE/2;
        ctx.fillStyle = '#00ff00';
        ctx.beginPath(); ctx.arc(ex, ey, 3, 0, Math.PI*2); ctx.fill();

        // Draw Bots
        for(let bot of this.bots) {
            let bx = bot.x;
            let by = bot.y;
            
            // Color based on index
            let hue = (bot.path.length * 15 + (bot.finishTick || 0)) % 360;
            ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
            
            ctx.beginPath();
            ctx.arc(bx, by, bot.radius, 0, Math.PI*2);
            ctx.fill();
        }
    }
}
