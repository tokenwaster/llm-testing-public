<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 10px;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      background-color: #333;
      color: #eee;
      border: none;
      border-radius: 4px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #555;
    }

    #score {
      font-size: 18px;
      margin-bottom: 10px;
    }

    canvas#snake {
      border: 2px solid #444;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      background-color: #000;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="snake" width="400" height="400"></canvas>
  
  <div class="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>

  <script>
    // Game configuration
    const CELL_SIZE = 20;
    const BOARD_WIDTH = 400;
    const BOARD_HEIGHT = 400;
    const GRID_W = BOARD_WIDTH / CELL_SIZE; // 20x20 grid
    const GRID_H = BOARD_HEIGHT / CELL_SIZE; // 20x20 grid
    
    // Game state
    let snake = [];
    let food = null;
    let direction = 'right';
    let nextDirection = 'right';
    let score = 0;
    let alive = true;
    let gameInterval = null;

    // Canvas setup
    const canvas = document.getElementById('snake');
    const ctx = canvas.getContext('2d');

    // Initialize the game state
    function initGame() {
      snake = [
        {x: 5, y: 10},
        {x: 4, y: 10},
        {x: 3, y: 10}
      ];
      direction = 'right';
      nextDirection = 'right';
      score = 0;
      alive = true;
      placeFood();
      updateScoreDisplay();
    }

    // Place food at a random location not occupied by the snake
    function placeFood() {
      let validPosition = false;
      while (!validPosition) {
        const x = Math.floor(Math.random() * GRID_W);
        const y = Math.floor(Math.random() * GRID_H);
        
        // Check if position is on the snake
        validPosition = true;
        for (let segment of snake) {
          if (segment.x === x && segment.y === y) {
            validPosition = false;
            break;
          }
        }
        
        if (validPosition) {
          food = {x, y};
          return;
        }
      }
    }

    // Draw the game state
    function draw() {
      // Clear canvas
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, BOARD_WIDTH, BOARD_HEIGHT);
      
      // Draw snake
      for (let i = 0; i < snake.length; i++) {
        const segment = snake[i];
        // Head is a different color
        if (i === 0) {
          ctx.fillStyle = '#4CAF50'; // Green head
        } else {
          ctx.fillStyle = '#2E7D32'; // Darker green body
        }
        
        ctx.fillRect(
          segment.x * CELL_SIZE, 
          segment.y * CELL_SIZE, 
          CELL_SIZE - 1, 
          CELL_SIZE - 1
        );
      }
      
      // Draw food
      if (food) {
        ctx.fillStyle = '#FF5722'; // Orange/Red for food
        ctx.fillRect(
          food.x * CELL_SIZE,
          food.y * CELL_SIZE,
          CELL_SIZE - 1,
          CELL_SIZE - 1
        );
        
        // Add a little shine to the food
        ctx.fillStyle = '#FFCCBC';
        ctx.fillRect(
          food.x * CELL_SIZE + 3,
          food.y * CELL_SIZE + 3,
          4, 4
        );
      }
    }

    // Update game state for one tick
    function update() {
      if (!alive) return;
      
      // Apply the next direction (prevents 180° turns in a single frame)
      direction = nextDirection;
      
      // Calculate new head position
      const head = {...snake[0]};
      
      switch (direction) {
        case 'up':    head.y--; break;
        case 'down':  head.y++; break;
        case 'left':  head.x--; break;
        case 'right': head.x++; break;
      }
      
      // Check for wall collision
      if (head.x < 0 || head.x >= GRID_W || head.y < 0 || head.y >= GRID_H) {
        alive = false;
        return;
      }
      
      // Check for self-collision
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          alive = false;
          return;
        }
      }
      
      // Move the snake: add new head
      snake.unshift(head);
      
      // Check if food is eaten
      if (food && head.x === food.x && head.y === food.y) {
        score++;
        updateScoreDisplay();
        placeFood();
        // Don't remove tail, so snake grows
      } else {
        // Remove tail to maintain length
        snake.pop();
      }
    }

    // Update the score display
    function updateScoreDisplay() {
      document.getElementById('score').textContent = `Score: ${score}`;
    }

    // Game loop
    function gameLoop() {
      if (alive) {
        update();
        draw();
      }
    }

    // Start the game with auto-advancing
    function startGame() {
      if (!gameInterval) {
        initGame();
        gameInterval = setInterval(gameLoop, 150); // ~6.7 FPS
      } else if (!alive) {
        clearInterval(gameInterval);
        gameInterval = null;
        initGame();
        gameInterval = setInterval(gameLoop, 150);
      }
    }

    // Pause the game
    function pauseGame() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
    }

    // Reset the game
    function resetGame() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
      initGame();
      draw();
    }

    // Set direction with 180° reversal prevention
    function setDirection(newDir) {
      if (!alive && !gameInterval) return; // Don't accept input when dead and not running
      
      const opposites = {
        'up': 'down',
        'down': 'up',
        'left': 'right',
        'right': 'left'
      };
      
      // If the new direction is opposite to current, ignore it
      if (opposites[newDir] === direction) {
        return;
      }
      
      nextDirection = newDir;
    }

    // Expose game API on window
    window.game = {
      w: GRID_W,
      h: GRID_H,
      
      reset() {
        resetGame();
      },
      
      tick() {
        if (alive && !gameInterval) {
          update();
          draw();
        }
      },
      
      setDir(dir) {
        setDirection(dir);
      },
      
      setFood(x, y) {
        food = {x, y};
        draw();
      },
      
      snake() {
        return snake.map(segment => [segment.x, segment.y]);
      },
      
      food() {
        return food ? [food.x, food.y] : null;
      },
      
      alive() {
        return alive;
      },
      
      score() {
        return score;
      }
    };

    // Event listeners for buttons
    document.getElementById('start').addEventListener('click', startGame);
    document.getElementById('pause').addEventListener('click', pauseGame);
    document.getElementById('reset').addEventListener('click', resetGame);

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp':
          e.preventDefault();
          setDirection('up');
          break;
        case 'ArrowDown':
          e.preventDefault();
          setDirection('down');
          break;
        case 'ArrowLeft':
          e.preventDefault();
          setDirection('left');
          break;
        case 'ArrowRight':
          e.preventDefault();
          setDirection('right');
          break;
      }
    });

    // Initialize and draw initial state
    initGame();
    draw();
  </script>
</body>
</html>
