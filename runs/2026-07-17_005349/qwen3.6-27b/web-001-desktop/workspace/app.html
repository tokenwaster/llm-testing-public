<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-dark: #1e1e2e;
    --bg-darker: #181825;
    --bg-panel: #252536;
    --bg-window: #1e1e2e;
    --bg-header: #313244;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --text: #cdd6f4;
    --text-dim: #a6adc8;
    --text-bright: #f5e0dc;
    --border: #45475a;
    --folder-color: #f9e2af;
    --file-color: #cdd6f4;
    --danger: #f38ba8;
    --success: #a6e3a1;
    --taskbar-height: 52px;
    --window-radius: 10px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    background: var(--bg-dark);
    color: var(--text);
    user-select: none;
  }

  #desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
    overflow: hidden;
  }

  #desktop::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── Taskbar ── */
  #taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--taskbar-height);
    background: rgba(24, 24, 37, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(69, 71, 90, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 20px;
    z-index: 1000;
  }

  .launcher-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
    color: var(--text);
  }

  .launcher-btn:hover {
    background: rgba(255,255,255,0.08);
  }

  .launcher-btn:active {
    transform: scale(0.92);
  }

  .launcher-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 3px;
    border-radius: 2px;
    background: var(--accent);
  }

  .launcher-btn svg {
    width: 26px;
    height: 26px;
  }

  .launcher-btn .tooltip {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    border: 1px solid var(--border);
  }

  .launcher-btn:hover .tooltip {
    opacity: 1;
  }

  /* ── Windows ── */
  .window {
    position: absolute;
    background: var(--bg-window);
    border-radius: var(--window-radius);
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    min-width: 420px;
    min-height: 320px;
    overflow: hidden;
    z-index: 100;
    transition: box-shadow 0.2s;
  }

  .window.focused {
    box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.35);
    z-index: 200;
  }

  .window-header {
    height: 40px;
    background: var(--bg-header);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: grab;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(69,71,90,0.4);
  }

  .window-header:active {
    cursor: grabbing;
  }

  .window-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.3px;
  }

  .win-controls {
    display: flex;
    gap: 6px;
    margin-left: auto;
    margin-right: 12px;
  }

  .win-ctrl {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: filter 0.15s;
  }

  .win-ctrl:hover { filter: brightness(1.3); }

  .win-close { background: var(--danger); }
  .win-minimize { background: #f9e2af; }
  .win-maximize { background: var(--success); }

  .window-body {
    flex: 1;
    overflow: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── Files App ── */
  #files-window {
    width: 560px;
    height: 420px;
    top: 80px;
    left: 100px;
  }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(49, 50, 68, 0.5);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #files-up {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #files-up:hover { background: var(--bg-header); }
  #files-up:disabled { opacity: 0.35; cursor: default; }

  #files-path {
    flex: 1;
    background: var(--bg-darker);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .files-content {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 6px;
  }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    min-width: 80px;
    text-align: center;
  }

  .fs-item:hover {
    background: rgba(255,255,255,0.06);
  }

  .fs-item .fs-icon {
    font-size: 36px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .fs-item .fs-name {
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
    max-width: 80px;
    line-height: 1.3;
  }

  .fs-item.folder .fs-icon { color: var(--folder-color); }
  .fs-item.file .fs-icon { color: var(--file-color); }

  /* ── Notepad App ── */
  #notepad-window {
    width: 580px;
    height: 440px;
    top: 120px;
    left: 200px;
  }

  .notepad-toolbar {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    gap: 6px;
    background: rgba(49, 50, 68, 0.4);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #new-tab {
    background: var(--accent);
    border: none;
    color: white;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #new-tab:hover { background: var(--accent-hover); }

  #tabs {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }

  #tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 6px 14px;
    background: var(--bg-panel);
    border: 1px solid transparent;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .tab:hover { background: rgba(255,255,255,0.06); }

  .tab.active {
    background: var(--bg-window);
    color: var(--text);
    border-color: var(--border);
    border-bottom-color: var(--bg-window);
  }

  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .tab-close:hover {
    background: var(--danger);
    color: white;
  }

  #editor {
    flex: 1;
    background: var(--bg-window);
    color: var(--text);
    border: none;
    padding: 14px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 4;
  }

  #editor::placeholder {
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #585b70; }

  /* ── Desktop icons ── */
  .desktop-icon {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .desktop-icon:hover { background: rgba(255,255,255,0.08); }
  .desktop-icon .di-icon { font-size: 32px; }
  .desktop-icon .di-label { font-size: 11px; color: var(--text); text-shadow: 0 1px 3px rgba(0,0,0,0.6); }

  /* ── Status bar ── */
  .status-bar {
    height: 28px;
    background: var(--bg-header);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--text-dim);
    gap: 16px;
    flex-shrink: 0;
  }

  /* ── Animations ── */
  @keyframes windowOpen {
    from { opacity: 0; transform: scale(0.92) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .window { animation: windowOpen 0.2s ease-out; }

  /* ── Top bar ── */
  #topbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 28px;
    background: rgba(24, 24, 37, 0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 999;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid rgba(69,71,90,0.3);
  }

  #topbar .topbar-left { display: flex; align-items: center; gap: 10px; }
  #topbar .topbar-center { font-weight: 600; letter-spacing: 0.3px; }
  #topbar .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-dim); }

  .ubuntu-logo {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }
</style>
</head>
<body>

<div id="desktop">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="topbar-left">
      <span class="ubuntu-logo"></span>
      <span>Activities</span>
    </div>
    <div class="topbar-center" id="clock"></div>
    <div class="topbar-right">
      <span>🔋 100%</span>
      <span>📶</span>
      <span>🔊</span>
    </div>
  </div>

  <!-- Desktop Icons -->
  <div class="desktop-icon" style="top:40px;left:20px;" ondblclick="openWindow('files')">
    <span class="di-icon">📁</span>
    <span class="di-label">Files</span>
  </div>
  <div class="desktop-icon" style="top:110px;left:20px;" ondblclick="openWindow('notepad')">
    <span class="di-icon">📝</span>
    <span class="di-label">Notepad</span>
  </div>
  <div class="desktop-icon" style="top:180px;left:20px;">
    <span class="di-icon">🗑️</span>
    <span class="di-label">Trash</span>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window" style="display:none;">
    <div class="window-header" data-window="files-window">
      <div class="win-controls">
        <button class="win-ctrl win-close" onclick="closeWindow('files')"></button>
        <button class="win-ctrl win-minimize"></button>
        <button class="win-ctrl win-maximize"></button>
      </div>
      <span class="window-title">📁 Files</span>
    </div>
    <div class="window-body">
      <div class="files-toolbar">
        <button id="files-up" onclick="navigateUp()">⬆ Up</button>
        <span id="files-path">/</span>
      </div>
      <div class="files-content" id="files-content"></div>
      <div class="status-bar">
        <span id="files-status">Ready</span>
      </div>
    </div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window" style="display:none;">
    <div class="window-header" data-window="notepad-window">
      <div class="win-controls">
        <button class="win-ctrl win-close" onclick="closeWindow('notepad')"></button>
        <button class="win-ctrl win-minimize"></button>
        <button class="win-ctrl win-maximize"></button>
      </div>
      <span class="window-title">📝 Notepad</span>
    </div>
    <div class="window-body">
      <div class="notepad-toolbar">
        <button id="new-tab" onclick="createNewTab()">＋ New Tab</button>
        <div id="tabs"></div>
      </div>
      <textarea id="editor" placeholder="Start typing..."></textarea>
      <div class="status-bar">
        <span id="editor-status">Ln 1, Col 1</span>
        <span style="margin-left:auto;">UTF-8</span>
      </div>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <button id="open-files" class="launcher-btn" onclick="openWindow('files')">
      <span class="tooltip">Files</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <button id="open-notepad" class="launcher-btn" onclick="openWindow('notepad')">
      <span class="tooltip">Notepad</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  FILESYSTEM
// ═══════════════════════════════════════════
const FS = {
  '/': {
    type: 'folder',
    children: ['bin', 'etc', 'home', 'usr', 'var', 'tmp', 'opt', 'srv']
  },
  '/bin': {
    type: 'folder',
    children: ['bash', 'ls', 'cat', 'grep', 'cp', 'mv', 'rm', 'mkdir', 'chmod', 'ps']
  },
  '/etc': {
    type: 'folder',
    children: ['passwd', 'hosts', 'fstab', 'nginx', 'ssh', 'apt']
  },
  '/etc/nginx': {
    type: 'folder',
    children: ['nginx.conf', 'sites-available', 'sites-enabled']
  },
  '/etc/ssh': {
    type: 'folder',
    children: ['sshd_config', 'ssh_config']
  },
  '/etc/apt': {
    type: 'folder',
    children: ['sources.list', 'apt.conf']
  },
  '/home': {
    type: 'folder',
    children: ['user']
  },
  '/home/user': {
    type: 'folder',
    children: ['Documents', 'Downloads', 'Pictures', 'Music', 'Desktop', '.bashrc', '.profile']
  },
  '/home/user/Documents': {
    type: 'folder',
    children: ['resume.txt', 'notes.md', 'project-plan.txt']
  },
  '/home/user/Downloads': {
    type: 'folder',
    children: ['archive.tar.gz', 'image.png', 'setup.sh']
  },
  '/home/user/Pictures': {
    type: 'folder',
    children: ['wallpaper.jpg', 'screenshot.png', 'photo.png']
  },
  '/home/user/Music': {
    type: 'folder',
    children: ['song1.mp3', 'song2.mp3']
  },
  '/home/user/Desktop': {
    type: 'folder',
    children: ['readme.txt']
  },
  '/usr': {
    type: 'folder',
    children: ['bin', 'lib', 'share', 'local']
  },
  '/usr/bin': {
    type: 'folder',
    children: ['python3', 'node', 'git', 'gcc']
  },
  '/usr/lib': {
    type: 'folder',
    children: ['libstdc++.so', 'libgcc_s.so']
  },
  '/usr/share': {
    type: 'folder',
    children: ['doc', 'man', 'themes']
  },
  '/usr/local': {
    type: 'folder',
    children: ['bin', 'lib', 'share']
  },
  '/var': {
    type: 'folder',
    children: ['log', 'cache', 'lib']
  },
  '/var/log': {
    type: 'folder',
    children: ['syslog', 'auth.log', 'kern.log']
  },
  '/var/cache': {
    type: 'folder',
    children: ['apt']
  },
  '/var/lib': {
    type: 'folder',
    children: ['dpkg', 'apt']
  },
  '/tmp': {
    type: 'folder',
    children: ['session.lock']
  },
  '/opt': {
    type: 'folder',
    children: []
  },
  '/srv': {
    type: 'folder',
    children: []
  }
};

let currentPath = '/';

function getEntry(path) {
  return FS[path] || null;
}

function isFolder(path) {
  const entry = FS[path];
  return entry && entry.type === 'folder';
}

function renderFiles() {
  const entry = getEntry(currentPath);
  const container = document.getElementById('files-content');
  const pathEl = document.getElementById('files-path');
  const upBtn = document.getElementById('files-up');
  const statusEl = document.getElementById('files-status');

  pathEl.textContent = currentPath;
  upBtn.disabled = currentPath === '/';

  if (!entry || !entry.children) {
    container.innerHTML = '<div style="padding:20px;color:var(--text-dim);">Empty directory</div>';
    statusEl.textContent = '0 items';
    return;
  }

  const count = entry.children.length;
  statusEl.textContent = count + (count === 1 ? ' item' : ' items');

  container.innerHTML = '';

  entry.children.forEach(name => {
    const fullPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
    const child = FS[fullPath];
    const isDir = child && child.type === 'folder';

    const item = document.createElement('div');
    item.className = 'fs-item ' + (isDir ? 'folder' : 'file');
    item.textContent = '';

    const icon = document.createElement('span');
    icon.className = 'fs-icon';
    icon.textContent = isDir ? '📁' : getFileIcon(name);
    item.appendChild(icon);

    const label = document.createElement('span');
    label.className = 'fs-name';
    label.textContent = name;
    item.appendChild(label);

    item.addEventListener('dblclick', () => {
      if (isDir) {
        currentPath = fullPath;
        renderFiles();
      }
    });

    container.appendChild(item);
  });
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    txt: '📄', md: '📄', sh: '⚙️', conf: '⚙️',
    jpg: '🖼️', png: '🖼️', gif: '🖼️',
    mp3: '🎵', wav: '🎵',
    gz: '📦', tar: '📦', zip: '📦',
    so: '🔧', py: '🐍', js: '📜',
    log: '📋', lock: '🔒'
  };
  return icons[ext] || '📄';
}

function navigateUp() {
  if (currentPath === '/') return;
  const parts = currentPath.split('/').filter(Boolean);
  parts.pop();
  currentPath = parts.length === 0 ? '/' : '/' + parts.join('/');
  renderFiles();
}

// ═══════════════════════════════════════════
//  NOTEPAD / TABS
// ═══════════════════════════════════════════
const STORAGE_KEY = 'ubuntu_notepad_tabs';
let tabs = [];
let activeTabId = null;

function generateId() {
  return 'tab_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
}

function loadTabs() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      tabs = parsed.tabs || [];
      activeTabId = parsed.activeTabId || null;
    }
  } catch(e) {
    tabs = [];
    activeTabId = null;
  }

  if (tabs.length === 0) {
    createNewTab(true);
  } else if (!activeTabId || !tabs.find(t => t.id === activeTabId)) {
    activeTabId = tabs[0].id;
  }
}

function saveTabs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tabs: tabs,
      activeTabId: activeTabId
    }));
  } catch(e) {}
}

function createNewTab(silent) {
  const tab = {
    id: generateId(),
    title: 'Untitled',
    content: ''
  };
  tabs.push(tab);
  activeTabId = tab.id;
  saveTabs();
  renderTabs();
  updateEditor();

  if (!silent) {
    document.getElementById('editor').focus();
  }
}

function switchTab(tabId) {
  activeTabId = tabId;
  saveTabs();
  renderTabs();
  updateEditor();
}

function closeTab(tabId, e) {
  if (e) e.stopPropagation();
  const idx = tabs.findIndex(t => t.id === tabId);
  if (idx === -1) return;

  tabs.splice(idx, 1);

  if (tabs.length === 0) {
    createNewTab(true);
  } else if (activeTabId === tabId) {
    activeTabId = tabs[Math.min(idx, tabs.length - 1)].id;
  }

  saveTabs();
  renderTabs();
  updateEditor();
}

function getActiveTab() {
  return tabs.find(t => t.id === activeTabId) || null;
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';

  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.textContent = tab.title || 'Untitled';

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '×';
    closeBtn.addEventListener('click', (e) => closeTab(tab.id, e));
    el.appendChild(closeBtn);

    el.addEventListener('click', () => switchTab(tab.id));
    container.appendChild(el);
  });
}

function updateEditor() {
  const tab = getActiveTab();
  const editor = document.getElementById('editor');
  if (tab) {
    editor.value = tab.content;
  }
}

function onEditorInput() {
  const tab = getActiveTab();
  if (tab) {
    tab.content = document.getElementById('editor').value;
    const lines = tab.content.split('\n');
    tab.title = lines[0].substring(0, 20) || 'Untitled';
    saveTabs();
    renderTabs();
    updateEditorStatus();
  }
}

function updateEditorStatus() {
  const editor = document.getElementById('editor');
  const val = editor.value;
  const pos = editor.selectionStart;
  const upToPos = val.substring(0, pos);
  const line = upToPos.split('\n').length;
  const col = pos - upToPos.lastIndexOf('\n');
  document.getElementById('editor-status').textContent = `Ln ${line}, Col ${col}`;
}

// ═══════════════════════════════════════════
//  WINDOW MANAGEMENT
// ═══════════════════════════════════════════
function openWindow(app) {
  const winId = app === 'files' ? 'files-window' : 'notepad-window';
  const win = document.getElementById(winId);
  win.style.display = 'flex';
  focusWindow(win);
  updateLauncherState();

  if (app === 'files') {
    renderFiles();
  } else if (app === 'notepad') {
    loadTabs();
    renderTabs();
    updateEditor();
  }
}

function closeWindow(app) {
  const winId = app === 'files' ? 'files-window' : 'notepad-window';
  document.getElementById(winId).style.display = 'none';
  updateLauncherState();
}

function focusWindow(win) {
  document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
  win.classList.add('focused');
}

function updateLauncherState() {
  const filesWin = document.getElementById('files-window');
  const notepadWin = document.getElementById('notepad-window');
  document.getElementById('open-files').classList.toggle('active', filesWin.style.display !== 'none');
  document.getElementById('open-notepad').classList.toggle('active', notepadWin.style.display !== 'none');
}

// ═══════════════════════════════════════════
//  DRAGGABLE WINDOWS
// ═══════════════════════════════════════════
let dragState = null;

document.querySelectorAll('.window-header').forEach(header => {
  header.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('win-ctrl')) return;
    const win = header.parentElement;
    focusWindow(win);

    const rect = win.getBoundingClientRect();
    dragState = {
      win: win,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top
    };
    e.preventDefault();
  });
});

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const x = e.clientX - dragState.offsetX;
  const y = e.clientY - dragState.offsetY;
  dragState.win.style.left = Math.max(0, x) + 'px';
  dragState.win.style.top = Math.max(28, y) + 'px';
});

document.addEventListener('mouseup', () => {
  dragState = null;
});

// Click on window to focus
document.querySelectorAll('.window').forEach(win => {
  win.addEventListener('mousedown', () => focusWindow(win));
});

// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('clock').textContent = now.toLocaleDateString('en-US', opts);
}
updateClock();
setInterval(updateClock, 10000);

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderFiles();

// Editor events
document.getElementById('editor').addEventListener('input', onEditorInput);
document.getElementById('editor').addEventListener('click', updateEditorStatus);
document.getElementById('editor').addEventListener('keyup', updateEditorStatus);
</script>
