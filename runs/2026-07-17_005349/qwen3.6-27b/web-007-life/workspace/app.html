<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 12px;
    color: #58a6ff;
    text-shadow: 0 0 20px rgba(88,166,255,0.3);
    letter-spacing: 2px;
  }
  #life {
    border: 2px solid #30363d;
    border-radius: 8px;
    cursor: crosshair;
    box-shadow: 0 0 30px rgba(88,166,255,0.08), inset 0 0 60px rgba(0,0,0,0.5);
    background: #161b22;
  }
  .controls {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.15s ease;
    font-weight: 600;
    letter-spacing: 0.5px;
    min-width: 90px;
  }
  button:hover {
    background: #30363d;
    border-color: #58a6ff;
    color: #58a6ff;
    box-shadow: 0 0 12px rgba(88,166,255,0.15);
  }
  button:active {
    transform: scale(0.96);
  }
  #play.playing {
    background: #1a3a1a;
    border-color: #3fb950;
    color: #3fb950;
    box-shadow: 0 0 12px rgba(63,185,80,0.2);
  }
  .info {
    margin-top: 10px;
    font-size: 0.8rem;
    color: #484f58;
    letter-spacing: 1px;
  }
  #gen-count {
    color: #58a6ff;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>🧬 GAME OF LIFE</h1>
<canvas id="life" width="400" height="400"></canvas>
<div class="controls">
  <button id="step">⏭ Step</button>
  <button id="play">▶ Play</button>
  <button id="random">🎲 Random</button>
  <button id="clear">✕ Clear</button>
</div>
<div class="info">Generation: <span id="gen-count">0</span> &nbsp;|&nbsp; Click &amp; drag to paint</div>

<script>
(function() {
  const W = 40;
  const H = 40;
  const CELL = 10; // pixels per cell
  const canvas = document.getElementById('life');
  const ctx = canvas.getContext('2d');
  const genEl = document.getElementById('gen-count');

  // Double-buffered grid
  let grid = createGrid();
  let nextGrid = createGrid();
  let generation = 0;
  let playing = false;
  let intervalId = null;
  let painting = false;
  let paintValue = 1;

  function createGrid() {
    const g = [];
    for (let y = 0; y < H; y++) {
      g[y] = new Uint8Array(W);
    }
    return g;
  }

  function get(x, y) {
    if (x < 0 || x >= W || y < 0 || y >= H) return 0;
    return grid[y][x];
  }

  function set(x, y, v) {
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    grid[y][x] = v ? 1 : 0;
  }

  function countNeighbors(x, y) {
    let count = 0;
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const nx = x + dx;
        const ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          count += grid[ny][nx];
        }
      }
    }
    return count;
  }

  function step() {
    // Simultaneous update: compute next state for all cells from current grid
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const n = countNeighbors(x, y);
        const alive = grid[y][x];
        if (alive) {
          // B3/S23: live cell survives with 2 or 3 neighbors
          nextGrid[y][x] = (n === 2 || n === 3) ? 1 : 0;
        } else {
          // dead cell becomes alive with exactly 3 neighbors
          nextGrid[y][x] = (n === 3) ? 1 : 0;
        }
      }
    }
    // Swap buffers
    const temp = grid;
    grid = nextGrid;
    nextGrid = temp;
    generation++;
    genEl.textContent = generation;
    draw();
  }

  function clear() {
    for (let y = 0; y < H; y++) {
      grid[y].fill(0);
    }
    generation = 0;
    genEl.textContent = 0;
    draw();
  }

  function randomize() {
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        grid[y][x] = Math.random() < 0.3 ? 1 : 0;
      }
    }
    generation = 0;
    genEl.textContent = 0;
    draw();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#161b22';
    ctx.fillRect(0, 0, W * CELL, H * CELL);

    // Grid lines
    ctx.strokeStyle = '#1c2128';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= W; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, H * CELL);
      ctx.stroke();
    }
    for (let y = 0; y <= H; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(W * CELL, y * CELL);
      ctx.stroke();
    }

    // Alive cells
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        if (grid[y][x]) {
          // Glow effect
          ctx.fillStyle = '#3fb950';
          ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
          // Inner highlight
          ctx.fillStyle = '#56d364';
          ctx.fillRect(x * CELL + 2, y * CELL + 2, CELL - 4, CELL - 4);
        }
      }
    }
  }

  // Mouse painting
  function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const cx = Math.floor(mx / CELL);
    const cy = Math.floor(my / CELL);
    return { x: cx, y: cy };
  }

  function paintCell(cx, cy) {
    if (cx >= 0 && cx < W && cy >= 0 && cy < H) {
      grid[cy][cx] = paintValue;
      draw();
    }
  }

  canvas.addEventListener('mousedown', function(e) {
    e.preventDefault();
    painting = true;
    const { x, y } = getCellFromEvent(e);
    if (x >= 0 && x < W && y >= 0 && y < H) {
      // Toggle: if clicking on alive cell, paint dead; otherwise paint alive
      paintValue = grid[y][x] ? 0 : 1;
      paintCell(x, y);
    }
  });

  canvas.addEventListener('mousemove', function(e) {
    if (!painting) return;
    const { x, y } = getCellFromEvent(e);
    paintCell(x, y);
  });

  window.addEventListener('mouseup', function() {
    painting = false;
  });

  // Touch support
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    painting = true;
    const touch = e.touches[0];
    const { x, y } = getCellFromEvent(touch);
    if (x >= 0 && x < W && y >= 0 && y < H) {
      paintValue = grid[y][x] ? 0 : 1;
      paintCell(x, y);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (!painting) return;
    const touch = e.touches[0];
    const { x, y } = getCellFromEvent(touch);
    paintCell(x, y);
  }, { passive: false });

  canvas.addEventListener('touchend', function() {
    painting = false;
  });

  // Button handlers
  document.getElementById('step').addEventListener('click', function() {
    step();
  });

  document.getElementById('play').addEventListener('click', function() {
    playing = !playing;
    const btn = document.getElementById('play');
    if (playing) {
      btn.textContent = '⏸ Pause';
      btn.classList.add('playing');
      intervalId = setInterval(step, 120);
    } else {
      btn.textContent = '▶ Play';
      btn.classList.remove('playing');
      clearInterval(intervalId);
      intervalId = null;
    }
  });

  document.getElementById('random').addEventListener('click', function() {
    randomize();
  });

  document.getElementById('clear').addEventListener('click', function() {
    clear();
    if (playing) {
      playing = false;
      const btn = document.getElementById('play');
      btn.textContent = '▶ Play';
      btn.classList.remove('playing');
      clearInterval(intervalId);
      intervalId = null;
    }
  });

  // Expose API
  window.life = {
    w: W,
    h: H,
    get: get,
    set: set,
    step: step,
    clear: clear
  };

  // Initial draw
  draw();
})();
</script>
</body>
</html>
