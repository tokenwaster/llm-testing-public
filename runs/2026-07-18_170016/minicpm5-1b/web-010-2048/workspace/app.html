<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            margin: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: #2d2d2d;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .game-area {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #board {
            width: 400px;
            height: 400px;
            border: 2px solid #333;
            margin-bottom: 20px;
            background-color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-weight: bold;
        }

        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        button:hover {
            background-color: #900000;
        }

        .reset-btn {
            background-color: #00ffcc;
            color: white;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background-color: #0099ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048 Game</h1>
        
        <div class="game-area">
            <div id="board"></div>
            <div class="score">Score: 0</div>
            <button onclick="resetGame()" class="reset-btn">Reset Game</button>
        </div>
    </div>

    <script>
        // Programmatic API
        window.game = {
            size: 4,
            reset(): {
                // Initialize board with two tiles at top-left and bottom-right corners
                const board = [
                    [0, 0, 0, 0],
                    [2, 0, 0, 0],
                    [0, 0, 0, 0],
                    [0, 4, 0, 0]
                ];
                
                // Set the board exactly (no spawn)
                setBoard(board);
            },
            
            move(key: string): boolean {
                const direction = key.toLowerCase();
                let moved = false;
                
                switch(direction) {
                    case 'left':
                        return moveLeft();
                    case 'right':
                        return moveRight();
                    case 'up':
                        return moveUp();
                    case 'down':
                        return moveDown();
                }
            },
            
            board(): number[][] {
                // Return the current 4x4 grid
                return game.board;
            },
            
            setBoard(arr): void {
                // Set the grid exactly (no spawn)
                for(let i = 0; i < arr.length; i++) {
                    for(let j = 0; j < arr[i].length; j++) {
                        game.board[i][j] = arr[j];
                    }
                }
            },
            
            score(): number {
                // Calculate the current score
                let score = 0;
                
                // Count tiles that have been merged (added to score)
                for(let i = 0; i < game.size; i++) {
                    for(let j = 0; j < game.size; j++) {
                        if(game.board[i][j] > 0) {
                            // Check if tile has been merged
                            let originalValue = game.board[i][j];
                            
                            // If the tile is still present (not merged)
                            if(originalValue !== 0 && !isTileMerged(i, j)) {
                                score += originalValue;
                            }
                        }
                    }
                }
                
                return score;
            },
            
            moveLeft(): boolean {
                const board = game.board();
                let moved = false;
                
                // Find the current tile's position
                for(let i = 0; i < game.size; i++) {
                    for(let j = 0; j < game.size; j++) {
                        if(board[i][j] > 0) {
                            const row = i * 4 + 1;
                            const col = j * 4 + 2;
                            
                            // Move left
                            board[row - 1][col] -= 1;
                            board[row - 1][col + 1] += 1; // Slide left
                            
                            // Check for collisions and merges
                            if(board[row - 1][col + 1] > 0 && board[row - 1][col + 1] === board[row - 1][col]) {
                                // Merge: add double value to score, remove one tile
                                const mergedValue = board[row - 1][col + 1] * 2;
                                moved = true;
                            }
                            
                            // Check for tile merging (each tile can merge at most once)
                            if(board[row - 1][col] > 0 && isTileMerged(row, col)) {
                                // This should not happen because we already checked collisions
                                moved = false; // Reset to avoid double-merging
                            }
                        }
                    }
                }
                
                return moved;
            },
            
            moveRight(): boolean {
                const board = game.board();
                let moved = false;
                
                for(let i = 0; i < game.size; i++) {
                    for(let j = 0; j < game.size; j++) {
                        if(board[i][j] > 0) {
                            const row = i * 4 + 1;
                            const col = j * 4 + 2;
                            
                            // Move right
                            board[row][col - 1] -= 1;
                            board[row][col] += 1; // Slide right
                            
                            if(board[row][col - 1] > 0 && board[row][col - 1] === board[row][col]) {
                                const mergedValue = board[row][col - 1] * 2;
                                moved = true;
                            }
                        }
                    }
                }
                
                return moved;
            },
            
            moveUp(): boolean {
                const board = game.board();
                let moved = false;
                
                for(let i = 0; i < game.size; i++) {
                    for(let j = 0; j < game.size; j++) {
                        if(board[i][j] > 0) {
                            const row = i * 4 + 1;
                            const col = j * 4 + 2;
                            
                            // Move up
                            board[row - 1][col] -= 1;
                            board[row - 1][col + 1] += 1; // Slide up
                            
                            if(board[row - 1][col + 1] > 0 && board[row - 1][col + 1] === board[row - 1][col]) {
                                const mergedValue = board[row - 1][col + 1] * 2;
                                moved = true;
                            }
                        }
                    }
                }
                
                return moved;
            },
            
            moveDown(): boolean {
                const board = game.board();
                let moved = false;
                
                for(let i = 0; i < game.size; i++) {
                    for(let j = 0; j < game.size; j++) {
                        if(board[i][j] > 0) {
                            const row = i * 4 + 1;
                            const col = j * 4 + 2;
                            
                            // Move down
                            board[row + 3][col - 1] -= 1;
                            board[row + 3][col] += 1; // Slide down
                            
                            if(board[row + 3][col - 1] > 0 && board[row + 3][col - 1] === board[row + 3][col]) {
                                const mergedValue = board[row + 3][col - 1] * 2;
                                moved = true;
                            }
                        }
                    }
                }
                
                return moved;
            },
            
            isTileMerged(row: number, col: number): boolean {
                // Check if a tile has been merged in this move
                const board = game.board();
                for(let i = 0; i < game.size; i++) {
                    for(let j = 0; j < game.size; j++) {
                        if(i === row && j === col) return false;
                    }
                }
                
                // Check the neighbors that might have been merged
                const neighbors = [
                    [row - 1, col + 1], [row - 1, col - 1],
                    [row + 1, col + 1], [row + 1, col - 1],
                    [row - 3, col + 1], [row - 3, col - 1],
                    [row + 3, col + 1], [row + 3, col - 1]
                ];
                
                for(let ni of neighbors) {
                    if(ni[0] >= 0 && ni[0] < game.size && ni[1] >= 0 && ni[1] < game.size) {
                        const nj = ni[1];
                        if(board[ni[0]][nj] > 0 && board[ni[0]][nj] === board[row][col]) {
                            return true;
                        }
                    }
                }
                
                return false;
            },
            
            resetGame(): void {
                // Reset the game to initial state
                const board = [
                    [0, 0, 0, 0],
                    [2, 0, 0, 0],
                    [0, 0, 0, 0],
                    [0, 4, 0, 0]
                ];
                
                game.reset();
            }
        };
    </script>
</body>
</html>
