<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorting Algorithm Visualizer</title>
<style>
  body {
    margin:0;
    font-family:sans-serif;
    background:#121212;
    color:#eee;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    overflow:hidden;
  }
  #controls{
    margin:20px 0;
  }
  button{
    padding:.5rem 1rem;
    margin:0 .3rem;
    background:#333;
    color:#eee;
    border:none;
    cursor:pointer;
    font-size:1rem;
  }
  button:hover{background:#444;}
  #bars{
    display:flex;
    align-items:flex-end;
    width:90%;
    height:60vh;
    gap:.2rem;
  }
  .bar{
    flex:1;
    background:#4caf50;
    transition:height .3s,background .3s;
  }
</style>
</head>
<body>

<div id="controls">
  <button id="shuffle">Shuffle</button>
  <button id="sort">Sort</button>
  <button id="reset">Reset</button>
</div>

<div id="bars"></div>

<script>
(() => {
  const container = document.getElementById('bars');
  let arr = [];
  let originalArr = [];

  // Simple bubble sort state
  let i = 0, j = 0;
  let sortedFlag = false;

  function render() {
    container.innerHTML = '';
    arr.forEach(v => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = `${v}%`;
      container.appendChild(bar);
    });
  }

  function setArray(a) {
    arr = a.slice();
    originalArr = a.slice();
    i = j = 0;
    sortedFlag = false;
    render();
  }

  function array() { return arr.slice(); }

  function sortStep() {
    if (sortedFlag) return true;
    if (i >= arr.length - 1) {
      // finished one pass
      i = 0;
      j++;
      if (j >= arr.length - 1) {
        sortedFlag = true;
        render();
        return true;
      }
    }
    const idx = i + j;
    if (arr[idx] > arr[idx+1]) {
      [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
      render();
    }
    i++;
    return false;
  }

  function sorted() { return sortedFlag; }

  // Expose API
  window.viz = { array, setArray, sortStep, sorted };

  // Initial random array
  function randomArray(n=50) {
    const a = [];
    for (let k=0;k<n;k++) a.push(Math.floor(10 + Math.random()*90));
    return a;
  }
  setArray(randomArray());

  // Controls
  document.getElementById('shuffle').onclick = () => setArray(randomArray());
  document.getElementById('reset').onclick = () => setArray(originalArr);
  let anim = null;
  document.getElementById('sort').onclick = () => {
    if (anim) return;
    const step = () => {
      if (!sortStep()) {
        anim = requestAnimationFrame(step);
      } else {
        cancelAnimationFrame(anim);
        anim = null;
      }
    };
    step();
  };
})();
</script>
</body>
</html>
