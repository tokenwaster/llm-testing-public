<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bouncing Ball Playground</title>
<style>
  body{
    margin:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#222;
    color:white;
    font-family:sans-serif;
  }
  #controls{
    margin-top:10px;
  }
  button{
    padding:8px 12px;
    margin:0 5px;
    background:#444;
    border:none;
    color:white;
    cursor:pointer;
    font-size:14px;
  }
  button:hover{background:#555;}
  canvas#sim{
    background:#111;
    display:block;
    width:600px;
    height:600px;
    touch-action:none;
  }
</style>
</head>
<body>
<canvas id="sim" width="600" height="600"></canvas>
<div id="controls">
  <button id="drop">Drop Ball</button>
  <button id="play">Play</button>
  <button id="clear">Clear</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const gravity = 0.5; // pixels per step^2
  const restitution = 0.9;

  let balls = [];
  let animating = false;
  let rafId = null;

  function draw() {
    ctx.clearRect(0,0,w,h);
    for (const b of balls) {
      ctx.beginPath();
      ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.stroke();
    }
  }

  function step(dt=1){
    for (const b of balls) {
      // apply gravity
      b.vy += gravity * dt;
      // update position
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // collision with left/right walls
      if (b.x - b.r < 0){
        b.x = b.r;
        b.vx = -b.vx * restitution;
      } else if (b.x + b.r > w){
        b.x = w - b.r;
        b.vx = -b.vx * restitution;
      }
      // collision with top/bottom walls
      if (b.y - b.r < 0){
        b.y = b.r;
        b.vy = -b.vy * restitution;
      } else if (b.y + b.r > h){
        b.y = h - b.r;
        b.vy = -b.vy * restitution;
      }
    }
    draw();
  }

  function loop(){
    step(1);
    rafId = requestAnimationFrame(loop);
  }

  // API
  window.sim = {
    w, h,
    balls: () => balls.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,r:b.r})),
    addBall: (x,y,vx=0,vy=0,r=20)=>{
      const rad = r || Math.random()*10+10;
      const bx = Math.min(Math.max(x,rad),w-rad);
      const by = Math.min(Math.max(y,rad),h-rad);
      balls.push({x:bx,y:by,vx,vy,r:rad});
    },
    clear: () => {balls=[]; draw();},
    step
  };

  // UI events
  canvas.addEventListener('click', e=>{
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    window.sim.addBall(x,y);
    if (!animating) draw();
  });

  document.getElementById('drop').addEventListener('click', ()=>{
    window.sim.addBall(w/2,h/2,0,-10);
    if (!animating) draw();
  });

  document.getElementById('clear').addEventListener('click', ()=>{
    window.sim.clear();
  });

  document.getElementById('play').addEventListener('click', ()=>{
    animating = !animating;
    document.getElementById('play').textContent = animating ? 'Pause' : 'Play';
    if (animating) loop(); else cancelAnimationFrame(rafId);
  });

  // initial draw
  draw();
})();
</script>
</body>
</html>
