<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bouncing Ball Physics Playground</title>
  <style>
    body {
      margin: 0;
      background-color: #111;
      color: white;
      font-family: sans-serif;
    }
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    canvas {
      width: 400px;
      height: 400px;
      background-color: #222;
      border: 1px solid #555;
    }
    #buttons {
      margin-top: 10px;
    }
    button {
      margin: 0 5px;
      padding: 5px 10px;
      font-size: 14px;
      background-color: #333;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="sim"></canvas>
    <div id="buttons">
      <button id="drop">Drop</button>
      <button id="play">Play</button>
      <button id="clear">Clear</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    canvas.width = 400;
    canvas.height = 400;

    let ballsArr = [];
    const gravity = 1.5;
    const restitution = 0.8;
    let isRunning = false;
    let lastTime = null;

    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let ball of ballsArr) {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    }

    function animate() {
      if (!isRunning) return;
      const now = performance.now();
      const dt = (now - lastTime) / 1000; // seconds
      window.sim.step(dt);
      lastTime = now;
      requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      window.sim.addBall(x, y);
    });

    document.getElementById('drop').addEventListener('click', () => {
      const x = canvas.width / 2;
      const y = 0;
      window.sim.addBall(x, y);
    });

    document.getElementById('play').addEventListener('click', () => {
      isRunning = !isRunning;
      if (isRunning) {
        lastTime = performance.now();
        animate();
      }
    });

    document.getElementById('clear').addEventListener('click', () => {
      window.sim.clear();
    });

    window.sim = {
      w: canvas.width,
      h: canvas.height,
      balls() {
        return ballsArr.map(ball => ({ ...ball }));
      },
      addBall(x, y, vx = 0, vy = 0, r = 10) {
        ballsArr.push({ x, y, vx, vy, r });
      },
      clear() {
        ballsArr = [];
      },
      step(dt = 1) {
        for (let ball of ballsArr) {
          const { x, y, vx, vy, r } = ball;
          let newX = x + vx * dt;
          let newY = y;

          // Apply gravity to velocity
          let newVy = vy + gravity * dt;
          // Update position based on previous velocity
          newY += (newVy - gravity * dt) * dt;

          // Check horizontal collisions
          if (newX < r) {
            newX = r;
            ball.vx *= -restitution;
          } else if (newX > canvas.width - r) {
            newX = canvas.width - r;
            ball.vx *= -restitution;
          }

          // Check vertical collisions
          if (newY < r) {
            newY = r;
            newVy *= -restitution;
          } else if (newY > canvas.height - r) {
            newY = canvas.height - r;
            newVy *= -restitution;
          }

          ball.x = newX;
          ball.y = newY;
          ball.vy = newVy;
        }
        redraw();
      },
    };
  </script>
</body>
</html>
