<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sorting Visualizer</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    #bars {
      display: flex;
      height: 400px;
      margin-top: 20px;
      overflow-x: auto;
    }
    .bar {
      background-color: #4CAF50;
      border-right: 1px solid #333;
      width: 6px;
      margin-right: 2px;
      flex-shrink: 0;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #444;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #666;
    }
  </style>
</head>
<body>
  <div>
    <button id="sort">Sort</button>
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset</button>
  </div>
  <div id="bars"></div>

  <script>
    const originalSorted = [];
    for (let i = 1; i <= 40; i++) {
      originalSorted.push(i);
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    let initialArray = originalSorted.slice();
    shuffleArray(initialArray);

    const vizModule = (() => {
      let array = initialArray;
      let pass = 0;
      let jIndex = 0;
      let swappedInPass = false;

      function updateBars() {
        const barsContainer = document.getElementById('bars');
        const maxValue = Math.max(...array);
        const containerHeight = barsContainer.clientHeight;
        barsContainer.innerHTML = '';
        array.forEach(value => {
          const bar = document.createElement('div');
          bar.className = 'bar';
          const heightPx = (value / maxValue) * containerHeight;
          bar.style.height = heightPx + 'px';
          barsContainer.appendChild(bar);
        });
      }

      function isSorted() {
        for (let i = 0; i < array.length - 1; i++) {
          if (array[i] > array[i+1]) return false;
        }
        return true;
      }

      function resetState() {
        pass = 0;
        jIndex = 0;
        swappedInPass = false;
      }

      updateBars();

      return {
        array: () => array.slice(),
        setArray(newArr) {
          array = newArr.slice();
          resetState();
          updateBars();
        },
        sortStep() {
          if (isSorted()) {
            resetState();
            return true;
          }

          const n = array.length;
          const maxJ = n - pass - 1;

          if (jIndex < maxJ) {
            if (array[jIndex] > array[jIndex + 1]) {
              [array[jIndex], array[jIndex + 1]] = [array[jIndex + 1], array[jIndex]];
              swappedInPass = true;
            }
            jIndex++;
          } else {
            if (!swappedInPass) {
              resetState();
              return true;
            } else {
              pass += 1;
              jIndex = 0;
              swappedInPass = false;
            }
          }

          updateBars();
          return isSorted();
        },
        sorted() {
          return isSorted();
        }
      };
    })();

    window.viz = vizModule;

    document.getElementById('sort').addEventListener('click', () => {
      function animateStep() {
        const done = window.viz.sortStep();
        if (!done) {
          requestAnimationFrame(animateStep);
        }
      }
      animateStep();
    });

    document.getElementById('shuffle').addEventListener('click', () => {
      const shuffledArr = originalSorted.slice();
      shuffleArray(shuffledArr);
      window.viz.setArray(shuffledArr);
    });

    document.getElementById('reset').addEventListener('click', () => {
      window.viz.setArray(originalSorted.slice());
    });
  </script>
</body>
</html>
