<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', Arial, sans-serif;
    user-select: none;
  }

  #desktop {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    position: relative;
    overflow: hidden;
  }

  /* Desktop wallpaper overlay */
  #desktop::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(26,42,108,0.7) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(178,31,31,0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(253,187,45,0.3) 0%, transparent 60%);
    z-index: 0;
  }

  /* Desktop icons area */
  #desktop-icons {
    position: absolute;
    top: 10px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 1;
  }

  .desktop-icon {
    width: 80px;
    text-align: center;
    cursor: pointer;
    padding: 5px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .desktop-icon:hover {
    background: rgba(255,255,255,0.1);
  }

  .desktop-icon .icon-img {
    width: 48px;
    height: 48px;
    margin: 0 auto 5px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: white;
  }

  .desktop-icon .icon-label {
    color: white;
    font-size: 13px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  /* Taskbar */
  #taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(35, 39, 46, 0.97);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    padding: 0 12px;
    z-index: 1000;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  #taskbar .start-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
    margin-right: 12px;
  }

  #taskbar .start-btn:hover {
    background: rgba(255,255,255,0.1);
  }

  #taskbar .start-btn svg {
    width: 24px;
    height: 24px;
  }

  /* Launcher buttons */
  #open-files, #open-notepad {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: white;
    transition: background 0.2s, transform 0.15s;
    margin-right: 8px;
    min-width: 140px;
  }

  #open-files:hover, #open-notepad:hover {
    background: rgba(255,255,255,0.1);
  }

  #open-files:active, #open-notepad:active {
    transform: scale(0.96);
  }

  #open-files .launcher-icon, #open-notepad .launcher-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  #open-files .launcher-icon { background: rgba(253,187,45,0.3); }
  #open-notepad .launcher-icon { background: rgba(255,193,7,0.3); }

  /* Taskbar app indicators */
  #taskbar .app-indicator {
    width: 3px;
    height: 24px;
    border-radius: 2px;
    margin-right: 8px;
    transition: background 0.2s;
  }

  /* Window chrome */
  .window {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 700px;
    min-width: 360px;
    height: 480px;
    min-height: 240px;
    background: #2d3139;
    border-radius: 10px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 100;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .window.active {
    display: flex;
    z-index: 200;
  }

  /* Window title bar */
  .win-titlebar {
    height: 38px;
    background: rgba(45,49,57,0.95);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    cursor: default;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    -webkit-app-region: drag;
  }

  .win-title {
    color: #cdd6f7;
    font-size: 13px;
    flex: 1;
    text-align: center;
    pointer-events: none;
  }

  .win-controls {
    display: flex;
    gap: 8px;
    -webkit-app-region: no-drag;
  }

  .win-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: #cdd6f7;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .win-close:hover {
    background: #e76c53;
    color: white;
  }

  /* Files window */
  #files-window {
    width: 680px;
    height: 460px;
  }

  #files-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(35,39,46,0.8);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  #files-up {
    padding: 6px 14px;
    background: transparent;
    border: none;
    color: #cdd6f7;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }

  #files-up:hover {
    background: rgba(255,255,255,0.08);
  }

  #files-path {
    color: #a9b1d6;
    font-size: 13px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #files-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }

  .fs-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    color: #cdd6f7;
    font-size: 14px;
  }

  .fs-item:hover {
    background: rgba(255,255,255,0.08);
  }

  .fs-item .fs-icon {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .fs-item .fs-name {
    flex: 1;
  }

  /* Notepad window */
  #notepad-window {
    width: 720px;
    height: 500px;
  }

  #tabs {
    display: flex;
    align-items: center;
    background: rgba(35,39,46,0.8);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding: 4px 8px;
    gap: 4px;
    overflow-x: auto;
    -webkit-app-region: no-drag;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    background: transparent;
    color: #a9b1d6;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tab:hover {
    background: rgba(255,255,255,0.06);
    color: #cdd6f7;
  }

  .tab.active {
    background: #3e4451;
    color: white;
  }

  .tab .tab-close {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    opacity: 0.6;
    transition: all 0.2s;
    cursor: pointer;
  }

  .tab .tab-close:hover {
    background: #e76c53;
    opacity: 1;
  }

  #new-tab-btn {
    padding: 4px 12px;
    border-radius: 6px;
    background: transparent;
    color: #a9b1d6;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    white-space: nowrap;
  }

  #new-tab-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #cdd6f7;
  }

  #editor-container {
    flex: 1;
    position: relative;
  }

  #editor {
    width: 100%;
    height: 100%;
    background: #2d3139;
    color: #cdd6f7;
    border: none;
    outline: none;
    resize: none;
    padding: 16px;
    font-family: 'Ubuntu Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* Filesystem icons */
  .icon-folder { background: linear-gradient(135deg, #e76c53, #d4a853); color: white; }
  .icon-file { background: rgba(255,255,255,0.1); color: #cdd6f7; }

  /* Dragging window */
  .window.dragging {
    cursor: move;
    opacity: 0.9;
  }
</style>
</head>
<body>

<div id="desktop">
  <!-- Desktop icons -->
  <div id="desktop-icons">
    <div class="desktop-icon" data-app="files">
      <div class="icon-img" style="background: linear-gradient(135deg, #e76c53, #d4a853);">📁</div>
      <div class="icon-label">Files</div>
    </div>
    <div class="desktop-icon" data-app="notepad">
      <div class="icon-img" style="background: linear-gradient(135deg, #f0c674, #e8a838);">📝</div>
      <div class="icon-label">Notepad</div>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div class="start-btn" title="Start Menu">
      <svg viewBox="0 0 24 24" fill="#e76c53"><path d="M3 12l9-9v9H3V12zm0 2l9 9V13H3v11zm18-11h-9v9h9V3z"/></svg>
    </div>

    <div id="open-files" class="launcher-btn">
      <div class="launcher-icon">📁</div>
      <span>Files</span>
    </div>
    <div id="open-notepad" class="launcher-btn">
      <div class="launcher-icon">📝</div>
      <span>Notepad</span>
    </div>

    <!-- App indicators -->
    <div id="files-indicator" class="app-indicator" style="background: #e76c53;"></div>
    <div id="notepad-indicator" class="app-indicator" style="background: #f0c674;"></div>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="window">
    <div class="win-titlebar">
      <span class="win-title">Files</span>
      <button class="win-close" title="Close">&times;</button>
    </div>
    <div id="files-toolbar">
      <button id="files-up" title="Go up">⬆ Up</button>
      <span id="files-path">/</span>
    </div>
    <div id="files-list"></div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="window">
    <div class="win-titlebar">
      <span class="win-title">Notepad</span>
      <button class="win-close" title="Close">&times;</button>
    </div>
    <div id="tabs"></div>
    <div id="editor-container">
      <textarea id="editor" placeholder="Start typing..."></textarea>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ─── Utility: generate unique IDs ───
  let _idCounter = 0;
  function uid(prefix) { return prefix + (++_idCounter); }

  // ─── Filesystem data (static fake data) ───
  const FS = {
    '/': [
      { name: 'bin', type: 'folder' },
      { name: 'etc', type: 'folder' },
      { name: 'home', type: 'folder' },
      { name: 'usr', type: 'folder' },
      { name: 'var', type: 'folder' }
    ],
    '/bin': [
      { name: 'bash', type: 'file' },
      { name: 'ls', type: 'file' },
      { name: 'cp', type: 'file' },
      { name: 'mv', type: 'file' },
      { name: 'rm', type: 'file' }
    ],
    '/etc': [
      { name: 'passwd', type: 'file' },
      { name: 'hosts', type: 'file' },
      { name: 'ssh_config', type: 'file' },
      { name: 'systemd', type: 'folder' }
    ],
    '/etc/systemd': [
      { name: 'network.conf', type: 'file' },
      { name: 'services.conf', type: 'file' }
    ],
    '/home': [
      { name: 'user', type: 'folder' }
    ],
    '/home/user': [
      { name: 'Documents', type: 'folder' },
      { name: 'Downloads', type: 'folder' },
      { name: 'Pictures', type: 'folder' },
      { name: 'readme.txt', type: 'file' }
    ],
    '/home/user/Documents': [
      { name: 'notes.md', type: 'file' },
      { name: 'todo.txt', type: 'file' },
      { name: 'projects', type: 'folder' }
    ],
    '/home/user/Documents/projects': [
      { name: 'desktop-env.html', type: 'file' },
      { name: 'config.json', type: 'file' }
    ],
    '/home/user/Downloads': [
      { name: 'ubuntu-logo.png', type: 'file' },
      { name: 'manual.pdf', type: 'file' }
    ],
    '/home/user/Pictures': [
      { name: 'screenshot.jpg', type: 'file' },
      { name: 'wallpaper.png', type: 'file' }
    ],
    '/usr': [
      { name: 'bin', type: 'folder' },
      { name: 'lib', type: 'folder' },
      { name: 'share', type: 'folder' }
    ],
    '/usr/bin': [
      { name: 'python3', type: 'file' },
      { name: 'node', type: 'file' },
      { name: 'git', type: 'file' },
      { name: 'npm', type: 'file' }
    ],
    '/usr/lib': [
      { name: 'libc.so.6', type: 'file' },
      { name: 'libssl.so.3', type: 'file' }
    ],
    '/usr/share': [
      { name: 'man', type: 'folder' },
      { name: 'icons', type: 'folder' }
    ],
    '/var': [
      { name: 'log', type: 'folder' },
      { name: 'cache', type: 'folder' },
      { name: 'tmp', type: 'folder' }
    ],
    '/var/log': [
      { name: 'syslog', type: 'file' },
      { name: 'auth.log', type: 'file' }
    ],
    '/var/cache': [
      { name: 'apt', type: 'folder' },
      { name: 'dpkg', type: 'folder' }
    ]
  };

  // ─── Filesystem navigation state ───
  let currentPath = '/';

  function getEntries(path) {
    return FS[path] || [];
  }

  function getParentPath(path) {
    if (path === '/') return path;
    const idx = path.lastIndexOf('/');
    return idx > 0 ? path.substring(0, idx) : '/';
  }

  // ─── Files window rendering ───
  const filesListEl = document.getElementById('files-list');
  const filesPathEl = document.getElementById('files-path');
  const filesUpBtn = document.getElementById('files-up');

  function renderFiles() {
    const entries = getEntries(currentPath);
    filesListEl.innerHTML = '';

    if (entries.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'fs-item';
      empty.style.color = '#6b7280';
      empty.textContent = '(empty directory)';
      filesListEl.appendChild(empty);
      return;
    }

    entries.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'fs-item';
      item.dataset.path = currentPath + '/' + entry.name;

      const icon = document.createElement('div');
      icon.className = 'fs-icon' + (entry.type === 'folder' ? ' icon-folder' : ' icon-file');
      icon.textContent = entry.type === 'folder' ? '📁' : '📄';

      const name = document.createElement('span');
      name.className = 'fs-name';
      name.textContent = entry.name;

      item.appendChild(icon);
      item.appendChild(name);

      // Double-click to navigate into folder
      if (entry.type === 'folder') {
        item.addEventListener('dblclick', () => {
          currentPath = item.dataset.path;
          renderFiles();
        });
      }

      filesListEl.appendChild(item);
    });
  }

  function updatePathDisplay() {
    filesPathEl.textContent = currentPath;
  }

  // ─── Files window open/close ───
  const filesWindow = document.getElementById('files-window');
  let filesDragState = null;

  function openFiles() {
    if (filesWindow.classList.contains('active')) return;
    currentPath = '/';
    renderFiles();
    updatePathDisplay();
    filesWindow.classList.add('active');
    setActiveIndicator('files');
  }

  function closeFiles() {
    filesWindow.classList.remove('active');
    setActiveIndicator('files', false);
  }

  // ─── Notepad window open/close ───
  const notepadWindow = document.getElementById('notepad-window');
  let notepadDragState = null;

  function openNotepad() {
    if (notepadWindow.classList.contains('active')) return;
    loadNotepadTabs();
    notepadWindow.classList.add('active');
    setActiveIndicator('notepad');
  }

  function closeNotepad() {
    notepadWindow.classList.remove('active');
    setActiveIndicator('notepad', false);
  }

  // ─── Notepad tabs persistence ───
  const TABS_KEY = 'ubuntu_notepad_tabs';

  function loadNotepadTabs() {
    try {
      const data = JSON.parse(localStorage.getItem(TABS_KEY));
      if (data && Array.isArray(data) && data.length > 0) {
        renderTabStrip(data);
        activateTab(0, data[0].name);
        return;
      }
    } catch(e) {}

    // Default: one empty tab
    const defaultData = [{ name: 'untitled', content: '' }];
    saveNotepadTabs(defaultData);
    renderTabStrip(defaultData);
    activateTab(0, 'untitled');
  }

  function saveNotepadTabs(tabs) {
    localStorage.setItem(TABS_KEY, JSON.stringify(tabs));
  }

  function createTabElement(tabName, isActive) {
    const tab = document.createElement('div');
    tab.className = 'tab' + (isActive ? ' active' : '');
    tab.dataset.tabId = tabName;

    const closeBtn = document.createElement('span');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '✕';
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      removeTab(tabName);
    });

    tab.appendChild(closeBtn);
    const label = document.createElement('span');
    label.textContent = tabName;
    tab.appendChild(label);

    return tab;
  }

  function renderTabStrip(tabs) {
    const tabsEl = document.getElementById('tabs');
    tabsEl.innerHTML = '';

    tabs.forEach((tab, idx) => {
      const isActive = (idx === activeTabIndex);
      const el = createTabElement(tab.name, isActive);
      el.addEventListener('click', () => activateTab(idx));
      tabsEl.appendChild(el);
    });

    // Add new tab button
    const newBtn = document.createElement('button');
    newBtn.id = 'new-tab-btn';
    newBtn.textContent = '+ New Tab';
    newBtn.addEventListener('click', createNewTab);
    tabsEl.appendChild(newBtn);
  }

  let activeTabIndex = 0;

  function activateTab(idx) {
    const tabs = getNotepadTabs();
    if (idx < 0 || idx >= tabs.length) return;

    // Update tab classes
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', i === idx);
    });

    activeTabIndex = idx;
    const editor = document.getElementById('editor');
    editor.value = tabs[idx].content;
  }

  function getNotepadTabs() {
    try { return JSON.parse(localStorage.getItem(TABS_KEY)); } catch(e) { return []; }
  }

  function createNewTab() {
    const tabs = getNotepadTabs();
    const name = 'untitled-' + (tabs.length + 1);
    tabs.push({ name: name, content: '' });
    saveNotepadTabs(tabs);
    renderTabStrip(tabs);
    activateTab(tabs.length - 1);
  }

  function removeTab(tabName) {
    const tabs = getNotepadTabs();
    const idx = tabs.findIndex(t => t.name === tabName);
    if (idx < 0) return;

    tabs.splice(idx, 1);
    saveNotepadTabs(tabs);

    // If we removed the active tab, switch to another or create new one
    if (tabs.length > 0) {
      const newIndex = Math.min(activeTabIndex, tabs.length - 1);
      renderTabStrip(tabs);
      activateTab(newIndex);
    } else {
      // All closed — show a default tab
      saveNotepadTabs([{ name: 'untitled', content: '' }]);
      renderTabStrip([{ name: 'untitled', content: '' }]);
      activeTabIndex = 0;
      activateTab(0);
    }
  }

  // ─── Notepad window close button ───
  document.querySelector('#notepad-window .win-close').addEventListener('click', closeNotepad);

  // ─── Files window close button ───
  document.querySelector('#files-window .win-close').addEventListener('click', closeFiles);

  // ─── Launcher buttons ───
  document.getElementById('open-files').addEventListener('click', openFiles);
  document.getElementById('open-notepad').addEventListener('click', openNotepad);

  // ─── Files up button ───
  filesUpBtn.addEventListener('click', () => {
    const parent = getParentPath(currentPath);
    if (parent !== currentPath) {
      currentPath = parent;
      renderFiles();
      updatePathDisplay();
    }
  });

  // ─── Window dragging ───
  function makeDraggable(windowEl, stateKey) {
    let isDragging = false;
    let startX, startY, startLeft, startTop;

    const titlebar = windowEl.querySelector('.win-titlebar');

    titlebar.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('win-close')) return;
      isDragging = true;
      stateKey.current = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = windowEl.getBoundingClientRect();
      startLeft = rect.left;
      startTop = rect.top;
      windowEl.classList.add('dragging');
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      windowEl.style.left = (startLeft + dx) + 'px';
      windowEl.style.top = (startTop + dy) + 'px';
      windowEl.style.transform = 'none';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      stateKey.current = false;
      windowEl.classList.remove('dragging');
    });
  }

  makeDraggable(filesWindow, filesDragState);
  makeDraggable(notepadWindow, notepadDragState);

  // ─── Active indicator toggling ───
  function setActiveIndicator(appName, show) {
    const el = document.getElementById(appName + '-indicator');
    if (show !== undefined) {
      el.style.display = show ? 'block' : 'none';
    } else {
      el.style.display = window.getComputedStyle(el).display === 'none' ? 'block' : 'none';
    }
  }

  // ─── Keyboard shortcuts ───
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA') return;

    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      createNewTab();
    }
  });

  // ─── Initial render ───
  renderFiles();
  updatePathDisplay();
})();
</script>
</body>
</html>
