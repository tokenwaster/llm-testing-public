<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }

  #desktop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #2c001e 0%, #4a0033 30%, #1a1a2e 70%, #16213e 100%);
    display: flex;
    flex-direction: column;
    z-index: 0;
  }

  /* Top bar */
  #topbar {
    height: 28px;
    background: rgba(20, 20, 20, 0.95);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    color: #ddd;
    font-size: 13px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  #topbar .left { display: flex; align-items: center; gap: 6px; }
  #topbar .center { color: #aaa; font-size: 12px; letter-spacing: 0.3px; }
  #topbar .right { display: flex; align-items: center; gap: 14px; color: #ccc; font-size: 12px; }

  /* Taskbar / Dock */
  #taskbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(30, 30, 30, 0.92);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 100;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .dock-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
  }

  .dock-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.08); }
  .dock-btn:active { transform: scale(0.95); }

  #open-files { background: linear-gradient(135deg, #e67e22, #d35400); }
  #open-notepad { background: linear-gradient(135deg, #3498db, #2471a3); }

  .dock-btn svg { width: 24px; height: 24px; fill: white; }

  /* Window base */
  .app-window {
    position: absolute;
    background: #2d2d2d;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 360px;
    min-height: 240px;
    z-index: 50;
  }

  .app-window.hidden { display: none !important; }

  /* Title bar */
  .win-titlebar {
    height: 38px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    cursor: default;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .win-titlebar .title {
    color: #ccc;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .win-titlebar .title svg { width: 16px; height: 16px; fill: #aaa; }

  .win-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #999;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .win-close:hover { background: #e74c3c; color: white; }

  /* Files app */
  #files-window { width: 680px; height: 460px; top: 60px; left: 120px; }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #333;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #files-up {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: #ccc;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  #files-up:hover { background: rgba(255,255,255,0.15); color: white; }
  #files-up svg { width: 16px; height: 16px; fill: currentColor; }

  #files-path {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 5px 12px;
    color: #e0a040;
    font-size: 13px;
    font-family: 'Ubuntu Mono', 'Fira Code', monospace;
    outline: none;
  }

  #files-path:focus { border-color: rgba(255,255,255,0.2); }

  .files-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    align-content: start;
  }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 6px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
    min-height: 80px;
  }

  .fs-item:hover { background: rgba(255,255,255,0.06); }
  .fs-item:active { background: rgba(255,255,255,0.1); }

  .fs-item .icon { font-size: 32px; margin-bottom: 6px; line-height: 1; }
  .fs-item .name { color: #ddd; font-size: 11px; word-break: break-word; line-height: 1.3; max-width: 100%; }

  /* Notepad app */
  #notepad-window { width: 620px; height: 480px; top: 70px; left: 200px; }

  .notepad-tabs-bar {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    min-height: 34px;
    padding: 0 8px;
    gap: 2px;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px 6px 0 0;
    color: #999;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    max-width: 160px;
    border: 1px solid transparent;
    border-bottom: none;
  }

  .tab:hover { background: rgba(255,255,255,0.08); color: #ccc; }
  .tab.active { background: #2d2d2d; color: #fff; border-color: rgba(255,255,255,0.06); }

  .tab .close-tab {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #777;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tab .close-tab:hover { background: rgba(231,76,60,0.8); color: white; }

  #new-tab {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #888;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-left: auto;
    flex-shrink: 0;
  }

  #new-tab:hover { background: rgba(255,255,255,0.1); color: white; }

  #editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #editor {
    flex: 1;
    background: #2d2d2d;
    color: #e0e0e0;
    border: none;
    resize: none;
    padding: 14px;
    font-family: 'Ubuntu Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    outline: none;
    tab-size: 2;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* Dragging */
  .app-window.dragging { opacity: 0.85; transition: none; z-index: 999; }
</style>
</head>
<body>

<div id="desktop">
  <!-- Top bar -->
  <div id="topbar">
    <div class="left">
      <span style="font-weight:600;color:#e95420;">●</span>
      <span>Files</span>
      <span style="color:#666;margin-left:10px;">Activities</span>
    </div>
    <div class="center" id="clock"></div>
    <div class="right">
      <span>🔊</span>
      <span>📶</span>
      <span>🔋 87%</span>
    </div>
  </div>

  <!-- Windows -->
  <div id="files-window" class="app-window">
    <div class="win-titlebar" data-drag="files-window">
      <div class="title">
        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        Files
      </div>
      <button class="win-close" aria-label="Close">✕</button>
    </div>
    <div class="files-toolbar">
      <button id="files-up" title="Go up one level">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <input id="files-path" readonly value="/" />
    </div>
    <div class="files-body" id="files-body"></div>
  </div>

  <div id="notepad-window" class="app-window hidden">
    <div class="win-titlebar" data-drag="notepad-window">
      <div class="title">
        <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
        Notepad
      </div>
      <button class="win-close" aria-label="Close">✕</button>
    </div>
    <div class="notepad-tabs-bar">
      <div id="tabs"></div>
      <button id="new-tab" title="New tab">+</button>
    </div>
    <div id="editor-wrap">
      <textarea id="editor" placeholder="Start typing..."></textarea>
    </div>
  </div>

  <!-- Taskbar / Dock -->
  <div id="taskbar">
    <button id="open-files" class="dock-btn" title="Files">
      <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
    </button>
    <button id="open-notepad" class="dock-btn" title="Notepad">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + '  ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Filesystem data ──
  const fs = {
    '/': { type: 'dir', children: ['bin','etc','home','usr','var'] },
    '/bin': { type: 'dir', children: ['bash','ls','cp','mv','rm','cat'] },
    '/etc': { type: 'dir', children: ['passwd','hostname','fstab','hosts','resolv.conf'] },
    '/home': { type: 'dir', children: ['user'] },
    '/usr': { type: 'dir', children: ['bin','lib','share','local'] },
    '/var': { type: 'dir', children: ['log','cache','tmp','mail'] },
    '/home/user': { type: 'dir', children: ['Documents','Downloads','Pictures','.bashrc','.profile'] },
    '/home/user/Documents': { type: 'dir', children: ['notes.txt','todo.md','report.pdf'] },
    '/home/user/Downloads': { type: 'dir', children: ['ubuntu.iso','archive.tar.gz','image.png'] },
    '/home/user/Pictures': { type: 'dir', children: ['wallpaper.jpg','screenshot.png','.gitkeep'] },
    '/bin/bash': { type: 'file' },
    '/bin/ls': { type: 'file' },
    '/bin/cp': { type: 'file' },
    '/bin/mv': { type: 'file' },
    '/bin/rm': { type: 'file' },
    '/bin/cat': { type: 'file' },
    '/etc/passwd': { type: 'file' },
    '/etc/hostname': { type: 'file' },
    '/etc/fstab': { type: 'file' },
    '/etc/hosts': { type: 'file' },
    '/etc/resolv.conf': { type: 'file' },
    '/usr/bin': { type: 'dir', children: ['python3','gcc','make'] },
    '/usr/lib': { type: 'dir', children: ['libc.so','libpthread.so'] },
    '/usr/share': { type: 'dir', children: ['man','doc','locale'] },
    '/usr/local': { type: 'dir', children: ['bin','lib'] },
    '/var/log': { type: 'dir', children: ['syslog','auth.log','kern.log'] },
    '/var/cache': { type: 'dir', children: ['apt','pip'] },
    '/var/tmp': { type: 'dir', children: [] },
    '/var/mail': { type: 'dir', children: ['user'] },
    '/usr/bin/python3': { type: 'file' },
    '/usr/bin/gcc': { type: 'file' },
    '/usr/bin/make': { type: 'file' },
    '/usr/lib/libc.so': { type: 'file' },
    '/usr/lib/libpthread.so': { type: 'file' },
    '/var/log/syslog': { type: 'file' },
    '/var/log/auth.log': { type: 'file' },
    '/var/log/kern.log': { type: 'file' },
    '/home/user/.bashrc': { type: 'file' },
    '/home/user/.profile': { type: 'file' },
    '/home/user/Documents/notes.txt': { type: 'file' },
    '/home/user/Documents/todo.md': { type: 'file' },
    '/home/user/Documents/report.pdf': { type: 'file' },
    '/home/user/Downloads/ubuntu.iso': { type: 'file' },
    '/home/user/Downloads/archive.tar.gz': { type: 'file' },
    '/home/user/Downloads/image.png': { type: 'file' },
    '/home/user/Pictures/wallpaper.jpg': { type: 'file' },
    '/home/user/Pictures/screenshot.png': { type: 'file' },
  };

  // ── Files app state ──
  let currentPath = '/';

  function getIcon(name) {
    if (fs[name] && fs[name].type === 'dir') return '📁';
    const ext = name.split('.').pop().toLowerCase();
    const icons = { txt:'📄', md:'📝', pdf:'📕', iso:'💿', tar:'🗜️', gz:'🗜️', png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️', sh:'🐚', conf:'⚙️', log:'📋', json:'📦', py:'🐍', html:'🌐', css:'🎨', js:'📜' };
    return icons[ext] || '📄';
  }

  function renderFiles() {
    const body = document.getElementById('files-body');
    const pathInput = document.getElementById('files-path');
    pathInput.value = currentPath;

    body.innerHTML = '';
    const entry = fs[currentPath];
    if (!entry || entry.type !== 'dir') return;

    // Sort: directories first, then files
    const children = (entry.children || []).slice().sort((a, b) => {
      const aDir = (fs[a] && fs[a].type === 'dir') ? 0 : 1;
      const bDir = (fs[b] && fs[b].type === 'dir') ? 0 : 1;
      if (aDir !== bDir) return aDir - bDir;
      return a.localeCompare(b);
    });

    for (const child of children) {
      const item = document.createElement('div');
      item.className = 'fs-item';

      const iconEl = document.createElement('div');
      iconEl.className = 'icon';
      iconEl.textContent = getIcon(child);

      const nameEl = document.createElement('div');
      nameEl.className = 'name';
      nameEl.textContent = child;

      item.appendChild(iconEl);
      item.appendChild(nameEl);

      // Double-click to navigate into folders
      let clickTimer = null;
      item.addEventListener('click', function() {
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
        clickTimer = setTimeout(function() {
          clickTimer = null;
        }, 250);
      });

      item.addEventListener('dblclick', function(e) {
        e.preventDefault();
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
        const fullPath = currentPath === '/' ? '/' + child : currentPath + '/' + child;
        if (fs[fullPath] && fs[fullPath].type === 'dir') {
          currentPath = fullPath;
          renderFiles();
        }
      });

      body.appendChild(item);
    }
  }

  document.getElementById('files-up').addEventListener('click', function() {
    if (currentPath === '/') return;
    const parts = currentPath.split('/').filter(Boolean);
    parts.pop();
    currentPath = '/' + parts.join('/') || '/';
    renderFiles();
  });

  // ── Notepad app state & persistence ──
  const STORAGE_KEY = 'notepad-tabs-v1';

  function loadTabs() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return [];
  }

  function saveTabs(tabs) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tabs));
    } catch(e) {}
  }

  let tabs = loadTabs();
  let activeTabIndex = -1;

  function ensureAtLeastOneTab() {
    if (tabs.length === 0) {
      tabs.push({ name: 'Untitled', content: '' });
      saveTabs(tabs);
    }
    if (activeTabIndex < 0 || activeTabIndex >= tabs.length) {
      activeTabIndex = tabs.length - 1;
    }
  }

  function renderTabs() {
    ensureAtLeastOneTab();
    const container = document.getElementById('tabs');
    container.innerHTML = '';

    for (let i = 0; i < tabs.length; i++) {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === activeTabIndex ? ' active' : '');
      tab.dataset.index = i;

      const nameEl = document.createElement('span');
      nameEl.textContent = tabs[i].name;
      nameEl.style.overflow = 'hidden';
      nameEl.style.textOverflow = 'ellipsis';
      nameEl.style.whiteSpace = 'nowrap';

      const closeBtn = document.createElement('button');
      closeBtn.className = 'close-tab';
      closeBtn.innerHTML = '✕';
      closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        removeTab(i);
      });

      tab.appendChild(nameEl);
      tab.appendChild(closeBtn);

      tab.addEventListener('click', function() {
        if (i !== activeTabIndex) {
          activeTabIndex = i;
          renderTabs();
          document.getElementById('editor').value = tabs[i].content;
        }
      });

      container.appendChild(tab);
    }

    // Update editor
    const editor = document.getElementById('editor');
    if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
      editor.value = tabs[activeTabIndex].content;
    }
  }

  function removeTab(index) {
    if (tabs.length <= 1) return; // Keep at least one tab
    tabs.splice(index, 1);
    saveTabs(tabs);
    if (activeTabIndex >= tabs.length) activeTabIndex = tabs.length - 1;
    renderTabs();
  }

  document.getElementById('new-tab').addEventListener('click', function() {
    const idx = tabs.length;
    tabs.push({ name: 'Untitled', content: '' });
    saveTabs(tabs);
    activeTabIndex = idx;
    renderTabs();
    document.getElementById('editor').focus();
  });

  // Save on typing (debounced)
  let saveTimeout = null;
  document.getElementById('editor').addEventListener('input', function() {
    if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
      tabs[activeTabIndex].content = this.value;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(function() { saveTabs(tabs); }, 400);
    }
  });

  // ── Window management ──
  const filesWindow = document.getElementById('files-window');
  const notepadWindow = document.getElementById('notepad-window');

  function showFiles() {
    filesWindow.classList.remove('hidden');
    renderFiles();
  }

  function hideFiles() {
    filesWindow.classList.add('hidden');
  }

  function showNotepad() {
    notepadWindow.classList.remove('hidden');
    ensureAtLeastOneTab();
    renderTabs();
  }

  function hideNotepad() {
    notepadWindow.classList.add('hidden');
  }

  document.getElementById('open-files').addEventListener('click', showFiles);
  document.getElementById('open-notepad').addEventListener('click', showNotepad);

  // Close buttons
  filesWindow.querySelector('.win-close').addEventListener('click', hideFiles);
  notepadWindow.querySelector('.win-close').addEventListener('click', hideNotepad);

  // ── Dragging windows ──
  let dragTarget = null;
  let dragOffsetX = 0, dragOffsetY = 0;
  let isDragging = false;

  document.querySelectorAll('[data-drag]').forEach(function(titlebar) {
    titlebar.addEventListener('mousedown', function(e) {
      if (e.target.closest('.win-close')) return;
      const winId = this.getAttribute('data-drag');
      dragTarget = document.getElementById(winId);
      if (!dragTarget || dragTarget.classList.contains('hidden')) { dragTarget = null; return; }

      isDragging = true;
      dragOffsetX = e.clientX - dragTarget.offsetLeft;
      dragOffsetY = e.clientY - dragTarget.offsetTop;
      dragTarget.classList.add('dragging');
      e.preventDefault();
    });
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging || !dragTarget) return;
    let x = e.clientX - dragOffsetX;
    let y = e.clientY - dragOffsetY;
    // Clamp within viewport
    const maxW = window.innerWidth - 40;
    const maxH = window.innerHeight - 100;
    if (x < 0) x = 0;
    if (y < 28) y = 28;
    if (x > maxW) x = maxW;
    if (y > maxH) y = maxH;
    dragTarget.style.left = x + 'px';
    dragTarget.style.top = y + 'px';
  });

  document.addEventListener('mouseup', function() {
    if (dragTarget) dragTarget.classList.remove('dragging');
    isDragging = false;
    dragTarget = null;
  });

  // ── Init ──
  renderFiles();
})();
</script>
</body>
</html>
