<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Algorithm Visualizer</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    h1 {
        margin-bottom: 16px;
        font-size: 1.8rem;
        color: #e94560;
        letter-spacing: 1px;
    }

    .controls {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
    }

    button {
        padding: 10px 24px;
        font-size: 1rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #sort {
        background: #e94560;
        color: #fff;
    }
    #sort:hover { background: #c81e45; }

    #shuffle {
        background: #0f3460;
        color: #e0e0e0;
    }
    #shuffle:hover { background: #1a4a7a; }

    #reset {
        background: #16213e;
        color: #e0e0e0;
        border: 1px solid #555;
    }
    #reset:hover { background: #1f2b4d; }

    #bars {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        width: 90%;
        max-width: 900px;
        height: 500px;
        background: #16213e;
        border-radius: 8px;
        padding: 10px 10px 0 10px;
        gap: 2px;
    }

    .bar {
        flex: 1;
        min-width: 4px;
        max-width: 60px;
        background: linear-gradient(180deg, #e94560, #c81e45);
        border-radius: 3px 3px 0 0;
        transition: height 0.12s ease;
    }

    .bar.comparing {
        background: linear-gradient(180deg, #ffd700, #ffaa00);
    }

    .bar.sorted {
        background: linear-gradient(180deg, #4ecca3, #2d9e7a);
    }
</style>
</head>
<body>

<h1>Sorting Visualizer</h1>

<div class="controls">
    <button id="sort">Sort</button>
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset</button>
</div>

<div id="bars"></div>

<script>
(function () {
    const barsContainer = document.getElementById('bars');
    let array = [];
    let sortState = null; // tracks progress of the current sort

    function generateArray(n) {
        const arr = [];
        for (let i = 0; i < n; i++) {
            arr.push(Math.floor(Math.random() * 95) + 5);
        }
        return arr;
    }

    function render() {
        barsContainer.innerHTML = '';
        const maxVal = Math.max(...array, 1);
        for (let i = 0; i < array.length; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            const heightPct = (array[i] / maxVal) * 100;
            bar.style.height = Math.max(heightPct, 2) + '%';
            bar.title = array[i];
            barsContainer.appendChild(bar);
        }
    }

    function initSortState() {
        sortState = {
            i: 0,
            j: 0,
            n: array.length,
            done: false
        };
    }

    // Bubble sort driven step-by-step
    function sortStep() {
        if (sortState.done) return true;
        const s = sortState;
        const n = s.n;

        if (n <= 1) {
            s.done = true;
            render();
            return true;
        }

        // Each call performs exactly one comparison/swap step of bubble sort
        if (s.i < n - 1) {
            if (s.j < n - 1 - s.i) {
                if (array[s.j] > array[s.j + 1]) {
                    const tmp = array[s.j];
                    array[s.j] = array[s.j + 1];
                    array[s.j + 1] = tmp;
                }
                s.j++;
            } else {
                s.i++;
                s.j = 0;
            }
        }

        render();

        // Check if fully sorted
        let allSorted = true;
        for (let k = 1; k < array.length; k++) {
            if (array[k] < array[k - 1]) {
                allSorted = false;
                break;
            }
        }

        if (allSorted) {
            s.done = true;
            return true;
        }

        return false;
    }

    function sorted() {
        for (let i = 1; i < array.length; i++) {
            if (array[i] < array[i - 1]) return false;
        }
        return true;
    }

    // Public API
    window.viz = {
        array: function () {
            return array.slice();
        },

        setArray: function (a) {
            if (!Array.isArray(a)) throw new Error('Expected an array');
            array = a.slice();
            sortState = null; // reset any in-progress sort
            render();
        },

        sortStep: sortStep,

        sorted: sorted
    };

    // Button handlers
    document.getElementById('sort').addEventListener('click', function () {
        if (!sortState) initSortState();
        let step = setInterval(function () {
            const done = window.viz.sortStep();
            if (done) clearInterval(step);
        }, 30);
    });

    document.getElementById('shuffle').addEventListener('click', function () {
        array = generateArray(40);
        sortState = null;
        render();
    });

    document.getElementById('reset').addEventListener('click', function () {
        array = [];
        sortState = null;
        barsContainer.innerHTML = '';
    });

    // Initialize with a random array
    window.viz.setArray(generateArray(40));
})();
</script>

</body>
</html>
