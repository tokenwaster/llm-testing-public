<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0c10;
      color: #c5c6c7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    h1 {
      margin: 0 0 0.5rem;
      letter-spacing: 0.1em;
      color: #66fcf1;
      text-transform: uppercase;
      font-size: 1.75rem;
    }
    #snake {
      display: block;
      width: 400px;
      height: 400px;
      background: #1f2833;
      border: 2px solid #45a29e;
      border-radius: 6px;
      box-shadow: 0 0 20px rgba(69, 162, 158, 0.25);
    }
    .controls {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
    }
    button {
      padding: 0.55rem 1.1rem;
      font-size: 1rem;
      font-weight: 600;
      color: #0b0c10;
      background: #66fcf1;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.15s ease;
    }
    button:hover {
      background: #45a29e;
    }
    button:active {
      transform: scale(0.96);
    }
    #score {
      margin-left: 0.5rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: #66fcf1;
      min-width: 2ch;
      display: inline-block;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <canvas id="snake" width="400" height="400"></canvas>
  <div class="controls">
    <button id="start">Start</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    <span>Score: <span id="score">0</span></span>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('snake');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');

      const W = 20;
      const H = 20;
      const CELL = canvas.width / W; // 20 px per cell

      let snakeBody = [];
      let currentDir = { x: 1, y: 0 };
      let nextDir = { x: 1, y: 0 };
      let foodPos = { x: 0, y: 0 };
      let scoreVal = 0;
      let isAlive = false;
      let timer = null;
      const TICK_MS = 120;

      function randInt(n) {
        return Math.floor(Math.random() * n);
      }

      function isSnakeCell(x, y) {
        return snakeBody.some(seg => seg[0] === x && seg[1] === y);
      }

      function spawnFood() {
        let x, y;
        do {
          x = randInt(W);
          y = randInt(H);
        } while (isSnakeCell(x, y));
        foodPos = { x, y };
      }

      function resetGame() {
        stopLoop();
        const cx = Math.floor(W / 2);
        const cy = Math.floor(H / 2);
        snakeBody = [[cx, cy], [cx - 1, cy], [cx - 2, cy]];
        currentDir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        scoreVal = 0;
        isAlive = true;
        spawnFood();
        draw();
      }

      function stopLoop() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function startLoop() {
        if (timer || !isAlive) return;
        timer = setInterval(tick, TICK_MS);
      }

      function tick() {
        if (!isAlive) return;

        currentDir = nextDir;

        const head = snakeBody[0];
        const nx = head[0] + currentDir.x;
        const ny = head[1] + currentDir.y;

        // Wall collision
        if (nx < 0 || nx >= W || ny < 0 || ny >= H) {
          isAlive = false;
          stopLoop();
          draw();
          return;
        }

        const eating = nx === foodPos.x && ny === foodPos.y;

        // Self collision
        for (let i = 0; i < snakeBody.length; i++) {
          const seg = snakeBody[i];
          if (seg[0] === nx && seg[1] === ny) {
            // Moving into the current tail is safe only if the tail will vacate
            // and we are not eating (which would keep the tail in place).
            if (i === snakeBody.length - 1 && !eating) {
              continue;
            }
            isAlive = false;
            stopLoop();
            draw();
            return;
          }
        }

        snakeBody.unshift([nx, ny]);

        if (eating) {
          scoreVal += 1;
          spawnFood();
        } else {
          snakeBody.pop();
        }

        draw();
      }

      function setDir(dir) {
        let dx = 0, dy = 0;
        switch (dir) {
          case 'up': dy = -1; break;
          case 'down': dy = 1; break;
          case 'left': dx = -1; break;
          case 'right': dx = 1; break;
          default: return;
        }
        // Ignore 180° reversals relative to the current heading.
        if (dx === -currentDir.x && dy === -currentDir.y) return;
        nextDir = { x: dx, y: dy };
      }

      function setFood(x, y) {
        if (x < 0 || x >= W || y < 0 || y >= H) return;
        foodPos = { x, y };
        draw();
      }

      function drawEyes() {
        const [hx, hy] = snakeBody[0];
        const cx = hx * CELL + CELL / 2;
        const cy = hy * CELL + CELL / 2;
        const offset = CELL / 4;
        const r = 2.5;
        let eyes = [];

        if (currentDir.x === 1) {
          eyes = [[cx + offset, cy - offset], [cx + offset, cy + offset]];
        } else if (currentDir.x === -1) {
          eyes = [[cx - offset, cy - offset], [cx - offset, cy + offset]];
        } else if (currentDir.y === -1) {
          eyes = [[cx - offset, cy - offset], [cx + offset, cy - offset]];
        } else {
          eyes = [[cx - offset, cy + offset], [cx + offset, cy + offset]];
        }

        ctx.fillStyle = '#064e3b';
        eyes.forEach(([ex, ey]) => {
          ctx.beginPath();
          ctx.arc(ex, ey, r, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function draw() {
        // Clear board
        ctx.fillStyle = '#1f2833';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid lines
        ctx.strokeStyle = '#2c3a4a';
        ctx.lineWidth = 1;
        for (let x = 0; x <= W; x++) {
          ctx.beginPath();
          ctx.moveTo(x * CELL + 0.5, 0);
          ctx.lineTo(x * CELL + 0.5, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= H; y++) {
          ctx.beginPath();
          ctx.moveTo(0, y * CELL + 0.5);
          ctx.lineTo(canvas.width, y * CELL + 0.5);
          ctx.stroke();
        }

        // Food
        ctx.fillStyle = '#ff4d4d';
        ctx.shadowColor = '#ff4d4d';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(
          foodPos.x * CELL + CELL / 2,
          foodPos.y * CELL + CELL / 2,
          CELL / 2 - 2,
          0,
          Math.PI * 2
        );
        ctx.fill();
        ctx.shadowBlur = 0;

        // Snake
        snakeBody.forEach((seg, i) => {
          const gx = seg[0] * CELL;
          const gy = seg[1] * CELL;
          const grad = ctx.createLinearGradient(gx, gy, gx + CELL, gy + CELL);
          if (i === 0) {
            grad.addColorStop(0, '#6ee7b7');
            grad.addColorStop(1, '#34d399');
            ctx.shadowColor = '#34d399';
            ctx.shadowBlur = 8;
          } else {
            grad.addColorStop(0, '#10b981');
            grad.addColorStop(1, '#059669');
            ctx.shadowBlur = 0;
          }
          ctx.fillStyle = grad;
          ctx.fillRect(gx + 1, gy + 1, CELL - 2, CELL - 2);
          ctx.shadowBlur = 0;
        });

        drawEyes();

        // Score
        scoreEl.textContent = scoreVal;

        // Game over overlay
        if (!isAlive) {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#66fcf1';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = 'bold 34px system-ui, sans-serif';
          ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 16);
          ctx.font = '18px system-ui, sans-serif';
          ctx.fillStyle = '#c5c6c7';
          ctx.fillText('Score: ' + scoreVal, canvas.width / 2, canvas.height / 2 + 20);
        }
      }

      // Keyboard controls
      document.addEventListener('keydown', (e) => {
        switch (e.key) {
          case 'ArrowUp':
          case 'w':
          case 'W':
            setDir('up');
            e.preventDefault();
            break;
          case 'ArrowDown':
          case 's':
          case 'S':
            setDir('down');
            e.preventDefault();
            break;
          case 'ArrowLeft':
          case 'a':
          case 'A':
            setDir('left');
            e.preventDefault();
            break;
          case 'ArrowRight':
          case 'd':
          case 'D':
            setDir('right');
            e.preventDefault();
            break;
        }
      });

      startBtn.addEventListener('click', () => {
        if (!isAlive) resetGame();
        startLoop();
      });

      pauseBtn.addEventListener('click', stopLoop);

      resetBtn.addEventListener('click', resetGame);

      // Public API required for grading
      window.game = {
        w: W,
        h: H,
        reset: resetGame,
        tick: tick,
        setDir: setDir,
        setFood: setFood,
        snake: () => snakeBody.map(seg => [seg[0], seg[1]]),
        food: () => [foodPos.x, foodPos.y],
        alive: () => isAlive,
        score: () => scoreVal
      };

      resetGame();
    })();
  </script>
</body>
</html>
