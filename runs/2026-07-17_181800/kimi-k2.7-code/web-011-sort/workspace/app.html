<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorting Visualizer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      background: #121212;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 { margin: 0 0 20px; font-weight: 400; }
    #bars {
      width: 90vw;
      height: 60vh;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      padding: 10px;
      overflow: hidden;
    }
    .bar {
      flex: 1 1 auto;
      background: linear-gradient(to top, #4facfe, #00f2fe);
      border-radius: 4px 4px 0 0;
      transition: height 0.08s ease;
      min-width: 2px;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }
    button {
      padding: 10px 22px;
      font-size: 1rem;
      color: #fff;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3a3a3a; }
    button:active { background: #555; }
  </style>
</head>
<body>
  <h1>Sorting Visualizer</h1>
  <div id="bars"></div>
  <div class="controls">
    <button id="sort">Sort</button>
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset</button>
  </div>

  <script>
    const DEFAULT_SIZE = 50;

    let arr = generateSorted(DEFAULT_SIZE);
    let initialArr = arr.slice();
    let sortState = null; // bubble-sort state
    let isSorting = false;
    let abortSort = false;

    function generateSorted(n) {
      return Array.from({ length: n }, (_, i) => i + 1);
    }

    function shuffleInPlace(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
    }

    function renderBars() {
      const container = document.getElementById('bars');
      container.innerHTML = '';
      const max = Math.max(...arr, 1);
      const fragment = document.createDocumentFragment();
      arr.forEach(value => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = (value / max * 100) + '%';
        fragment.appendChild(bar);
      });
      container.appendChild(fragment);
    }

    function initSortState() {
      sortState = { i: 0, j: 0, swapped: false, n: arr.length };
    }

    function sorted() {
      for (let i = 1; i < arr.length; i++) {
        if (arr[i] < arr[i - 1]) return false;
      }
      return true;
    }

    function sortStep() {
      if (sorted()) {
        sortState = null;
        renderBars();
        return true;
      }

      if (!sortState || sortState.n !== arr.length) {
        initSortState();
      }

      const s = sortState;
      const n = s.n;

      // One comparison / step of bubble sort
      if (arr[s.j] > arr[s.j + 1]) {
        [arr[s.j], arr[s.j + 1]] = [arr[s.j + 1], arr[s.j]];
        s.swapped = true;
      }

      s.j++;

      // End of an inner pass
      if (s.j >= n - s.i - 1) {
        if (!s.swapped) {
          sortState = null;
          renderBars();
          return true;
        }
        s.i++;
        s.j = 0;
        s.swapped = false;

        if (s.i >= n - 1) {
          sortState = null;
          renderBars();
          return true;
        }
      }

      renderBars();
      return sorted();
    }

    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    async function animateSort(delay = 25) {
      if (isSorting) return;
      isSorting = true;
      abortSort = false;

      while (!abortSort && !sorted()) {
        sortStep();
        await sleep(delay);
      }

      isSorting = false;
    }

    document.getElementById('sort').addEventListener('click', () => animateSort());

    document.getElementById('shuffle').addEventListener('click', () => {
      abortSort = true;
      isSorting = false;
      arr = generateSorted(arr.length);
      shuffleInPlace(arr);
      initialArr = arr.slice();
      sortState = null;
      renderBars();
    });

    document.getElementById('reset').addEventListener('click', () => {
      abortSort = true;
      isSorting = false;
      arr = initialArr.slice();
      sortState = null;
      renderBars();
    });

    window.viz = {
      array() {
        return arr.slice();
      },
      setArray(a) {
        arr = a.slice();
        initialArr = arr.slice();
        sortState = null;
        abortSort = true;
        isSorting = false;
        renderBars();
      },
      sortStep() {
        return sortStep();
      },
      sorted() {
        return sorted();
      }
    };

    renderBars();
  </script>
</body>
</html>
