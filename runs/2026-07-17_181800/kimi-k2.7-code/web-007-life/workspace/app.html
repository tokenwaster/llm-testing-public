<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --accent: #38bdf8;
    --alive: #f472b6;
    --dead: #334155;
    --text: #e2e8f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 0.5rem;
    font-size: 1.75rem;
    letter-spacing: 0.05em;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  canvas#life {
    width: 600px;
    height: 600px;
    max-width: 95vw;
    max-height: 60vh;
    background: #020617;
    border: 3px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
    cursor: crosshair;
    image-rendering: pixelated;
  }
  .controls {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 0.7rem 1.2rem;
    border: none;
    border-radius: 999px;
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 0 #0f172a;
    transition: transform .05s, box-shadow .05s, background .2s;
  }
  button:hover {
    background: #334155;
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #0f172a;
  }
  button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #0f172a;
  }
  button.active {
    background: var(--accent);
    color: #0f172a;
  }
  .hint {
    font-size: 0.85rem;
    opacity: 0.7;
    margin-top: 0.25rem;
  }
</style>
</head>
<body>
  <h1>Game of Life</h1>
  <div class="stage">
    <canvas id="life" width="600" height="600"></canvas>
    <div class="controls">
      <button id="step" title="Advance one generation">Step</button>
      <button id="play" title="Toggle auto-run">Play</button>
      <button id="random" title="Seed random cells">Random</button>
      <button id="clear" title="Kill all cells">Clear</button>
    </div>
    <div class="hint">Click or drag on the grid to paint cells.</div>
  </div>

<script>
const canvas = document.getElementById('life');
const ctx = canvas.getContext('2d');

const W = 50;
const H = 50;

let current = new Uint8Array(W * H);
let next = new Uint8Array(W * H);

let running = false;
let timer = null;
const STEP_MS = 80;

function idx(x, y) { return y * W + x; }
function inBounds(x, y) { return x >= 0 && x < W && y >= 0 && y < H; }

function get(x, y) {
  if (!inBounds(x, y)) return 0;
  return current[idx(x, y)];
}

function set(x, y, v) {
  if (!inBounds(x, y)) return;
  current[idx(x, y)] = v ? 1 : 0;
  draw();
}

function clear() {
  current.fill(0);
  next.fill(0);
  draw();
}

function countNeighbors(x, y) {
  let n = 0;
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx;
      const ny = y + dy;
      if (inBounds(nx, ny) && current[idx(nx, ny)]) {
        n++;
      }
    }
  }
  return n;
}

function step() {
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const alive = current[idx(x, y)];
      const neighbors = countNeighbors(x, y);
      let v = 0;
      if (alive) {
        if (neighbors === 2 || neighbors === 3) v = 1;
      } else {
        if (neighbors === 3) v = 1;
      }
      next[idx(x, y)] = v;
    }
  }
  const tmp = current;
  current = next;
  next = tmp;
  draw();
}

function draw() {
  const cw = canvas.width / W;
  const ch = canvas.height / H;

  ctx.fillStyle = '#020617';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#f472b6';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (current[idx(x, y)]) {
        ctx.fillRect(x * cw, y * ch, cw - 1, ch - 1);
      }
    }
  }
}

function randomize() {
  for (let i = 0; i < current.length; i++) {
    current[i] = Math.random() < 0.25 ? 1 : 0;
  }
  draw();
}

// Controls
document.getElementById('step').addEventListener('click', step);

document.getElementById('play').addEventListener('click', () => {
  running = !running;
  const btn = document.getElementById('play');
  if (running) {
    btn.textContent = 'Pause';
    btn.classList.add('active');
    timer = setInterval(step, STEP_MS);
  } else {
    btn.textContent = 'Play';
    btn.classList.remove('active');
    clearInterval(timer);
    timer = null;
  }
});

document.getElementById('random').addEventListener('click', randomize);
document.getElementById('clear').addEventListener('click', clear);

// Click / drag painting
let painting = false;
let paintValue = 0;

function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / rect.width * W);
  const y = Math.floor((e.clientY - rect.top) / rect.height * H);
  return { x, y };
}

function startPaint(e) {
  painting = true;
  const { x, y } = cellFromEvent(e);
  paintValue = get(x, y) ? 0 : 1;
  set(x, y, paintValue);
}

function movePaint(e) {
  if (!painting) return;
  const { x, y } = cellFromEvent(e);
  set(x, y, paintValue);
}

function endPaint() {
  painting = false;
}

canvas.addEventListener('mousedown', startPaint);
window.addEventListener('mousemove', movePaint);
window.addEventListener('mouseup', endPaint);

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  startPaint(e.touches[0]);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  movePaint(e.touches[0]);
}, { passive: false });

canvas.addEventListener('touchend', endPaint);

// Public grading API
window.life = {
  w: W,
  h: H,
  get,
  set,
  step,
  clear
};

draw();
</script>
</body>
</html>
