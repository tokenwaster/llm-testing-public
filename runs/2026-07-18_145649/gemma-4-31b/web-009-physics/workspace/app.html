<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Physics</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        button:active {
            background-color: #555;
        }

        #sim {
            background-color: #000;
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
            display: block;
        }

        .container {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <button id="drop">Drop Ball</button>
            <button id="play">Pause/Play</button>
            <button id="clear">Clear All</button>
        </div>
        <canvas id="sim" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('sim');
        const ctx = canvas.getContext('2d');
        const btnDrop = document.getElementById('drop');
        const btnPlay = document.getElementById('play');
        const btnClear = document.getElementById('clear');

        // Physics Constants
        const GRAVITY = 0.25;
        const RESTITUTION = 0.8; // Energy loss on bounce
        const DEFAULT_RADIUS = 10;

        let balls = [];
        let isPlaying = true;

        // API implementation
        window.sim = {
            w: canvas.width,
            h: canvas.height,
            
            balls() {
                return balls;
            },

            addBall(x, y, vx = 0, vy = 0, r = DEFAULT_RADIUS) {
                balls.push({ x, y, vx, vy, r });
                draw();
                return balls[balls.length - 1];
            },

            clear() {
                balls = [];
                draw();
            },

            step(dt = 1) {
                // Update physics for all balls
                for (let i = 0; i < balls.length; i++) {
                    const b = balls[i];

                    // Apply Gravity
                    b.vy += GRAVITY * dt;

                    // Update Position
                    b.x += b.vx * dt;
                    b.y += b.vy * dt;

                    // Bounce Floor
                    if (b.y + b.r > window.sim.h) {
                        b.y = window.sim.h - b.r;
                        b.vy = -b.vy * RESTITUTION;
                    } else if (b.y - b.r < 0) {
                        // Bounce Ceiling
                        b.y = b.r;
                        b.vy = -b.vy * RESTITUTION;
                    }

                    // Bounce Walls
                    if (b.x + b.r > window.sim.w) {
                        b.x = window.sim.w - b.r;
                        b.vx = -b.vx * RESTITUTION;
                    } else if (b.x - b.r < 0) {
                        b.x = b.r;
                        b.vx = -b.vx * RESTITUTION;
                    }
                }
                draw();
            }
        };

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw balls
            balls.forEach((b, index) => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                // Give each ball a slightly different color based on its index/radius
                ctx.fillStyle = `hsl(${(index * 40) % 360}, 70%, 60%)`;
                ctx.fill();
                ctx.closePath();
            });
        }

        function loop() {
            if (isPlaying) {
                window.sim.step();
            }
            requestAnimationFrame(loop);
        }

        // Event Listeners
        btnDrop.addEventListener('click', () => {
            // Drop a ball at the top center with some random horizontal velocity
            const vx = (Math.random() - 0.5) * 10;
            window.sim.addBall(window.sim.w / 2, 50, vx, 0);
        });

        btnPlay.addEventListener('click', () => {
            isPlaying = !isPlaying;
        });

        btnClear.addEventListener('click', () => {
            window.sim.clear();
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            // Add ball at click position with a slight random burst
            const vx = (Math.random() - 0.5) * 4;
            const vy = (Math.random() - 0.5) * 4;
            window.sim.addBall(x, y, vx, vy);
        });

        // Initialize
        draw();
        loop();
    </script>
</body>
</html>
