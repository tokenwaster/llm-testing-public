<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 80vw;
            height: 60vh;
            gap: 2px;
            margin-bottom: 2rem;
        }

        .bar {
            background-color: #4caf50;
            width: 100%;
            transition: height 0.1s ease;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            font-size: 1rem;
        }

        button:hover {
            background-color: #444;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="bars"></div>

    <div class="controls">
        <button id="shuffle">Shuffle</button>
        <button id="sort">Sort</button>
        <button id="reset">Reset</button>
    </div>

    <script>
        // State management
        let data = [];
        let i = 0;
        let j = 0;
        let isSorting = false;
        let sortInterval = null;

        const barsContainer = document.getElementById('bars');

        function render() {
            barsContainer.innerHTML = '';
            if (data.length === 0) return;
            
            const maxVal = Math.max(...data);
            data.forEach(val => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                // Height proportional to value relative to max
                const heightPercent = (val / maxVal) * 100;
                bar.style.height = `${heightPercent}%`;
                barsContainer.appendChild(bar);
            });
        }

        function shuffleArray() {
            const size = 50;
            data = Array.from({ length: size }, () => Math.floor(Math.random() * 100) + 1);
            resetSortState();
            render();
        }

        function resetSortState() {
            i = 0;
            j = 0;
            isSorting = false;
            if (sortInterval) clearInterval(sortInterval);
        }

        // API Implementation
        window.viz = {
            array: () => data,
            setArray: (a) => {
                data = [...a];
                resetSortState();
                render();
            },
            sorted: () => {
                for (let k = 0; k < data.length - 1; k++) {
                    if (data[k] > data[k + 1]) return false;
                }
                return true;
            },
            sortStep: () => {
                if (window.viz.sorted()) return true;

                // Bubble Sort implementation as a state machine
                if (i >= data.length) return true;

                if (j >= data.length - 1 - i) {
                    j = 0;
                    i++;
                    // Check if we are done after incrementing outer loop
                    if (i >= data.length - 1) {
                        render();
                        return window.viz.sorted();
                    }
                }

                if (data[j] > data[j + 1]) {
                    let temp = data[j];
                    data[j] = data[j + 1];
                    data[j + 1] = temp;
                }
                j++;
                
                render();
                return window.viz.sorted();
            }
        };

        // UI Event Listeners
        document.getElementById('shuffle').addEventListener('click', () => {
            shuffleArray();
        });

        document.getElementById('reset').addEventListener('click', () => {
            resetSortState();
            shuffleArray();
        });

        document.getElementById('sort').addEventListener('click', async () => {
            if (isSorting) return;
            isSorting = true;
            
            const btn = document.getElementById('sort');
            btn.disabled = true;

            const runSort = () => {
                const finished = window.viz.sortStep();
                if (finished) {
                    clearInterval(sortInterval);
                    isSorting = false;
                    btn.disabled = false;
                }
            };

            sortInterval = setInterval(runSort, 10);
        });

        // Initialize
        shuffleArray();
    </script>
</body>
</html>
