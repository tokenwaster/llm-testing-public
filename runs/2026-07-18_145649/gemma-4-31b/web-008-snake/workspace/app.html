<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #snake {
            background-color: #000;
            display: block;
            margin: 0 auto 20px auto;
            border: 4px solid #444;
            box-shadow: inset 0 0 10px #000;
        }
        .controls {
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        #score {
            color: #4caf50;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #666;
        }
        button:active {
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="controls">Score: <span id="score">0</span></div>
        <canvas id="snake" width="400" height="400"></canvas>
        <div class="buttons">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('snake');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score');
            const startBtn = document.getElementById('start');
            const pauseBtn = document.getElementById('pause');
            const resetBtn = document.getElementById('reset');

            const CELL_SIZE = 20;
            const GRID_W = canvas.width / CELL_SIZE;
            const GRID_H = canvas.height / CELL_SIZE;

            let state = {
                snake: [],
                food: [0, 0],
                dir: 'right',
                nextDir: 'right',
                alive: false,
                score: 0,
                running: false
            };

            const DIR_MAP = {
                'up': { x: 0, y: -1 },
                'down': { x: 0, y: 1 },
                'left': { x: -1, y: 0 },
                'right': { x: 1, y: 0 }
            };

            const OPPOSITES = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };

            function spawnFood() {
                let fx, fy;
                do {
                    fx = Math.floor(Math.random() * GRID_W);
                    fy = Math.floor(Math.random() * GRID_H);
                } while (state.snake.some(seg => seg[0] === fx && seg[1] === fy));
                state.food = [fx, fy];
            }

            function draw() {
                // Clear background
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw food
                ctx.fillStyle = '#ff4d4d';
                ctx.fillRect(state.food[0] * CELL_SIZE + 1, state.food[1] * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);

                // Draw snake
                ctx.fillStyle = '#4caf50';
                state.snake.forEach((seg, index) => {
                    if (index === 0) ctx.fillStyle = '#8bc34a'; // Head slightly lighter
                    else ctx.fillStyle = '#4caf50';
                    ctx.fillRect(seg[0] * CELL_SIZE + 1, seg[1] * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                });

                scoreEl.innerText = state.score;
            }

            window.game = {
                w: GRID_W,
                h: GRID_H,
                reset: function() {
                    state.snake = [
                        [5, 10], [4, 10], [3, 10]
                    ];
                    state.dir = 'right';
                    state.nextDir = 'right';
                    state.score = 0;
                    state.alive = true;
                    spawnFood();
                    draw();
                },
                tick: function() {
                    if (!state.alive) return;

                    state.dir = state.nextDir;
                    const head = state.snake[0];
                    const move = DIR_MAP[state.dir];
                    const newHead = [head[0] + move.x, head[1] + move.y];

                    // Wall collision
                    if (newHead[0] < 0 || newHead[0] >= GRID_W || newHead[1] < 0 || newHead[1] >= GRID_H) {
                        state.alive = false;
                        return;
                    }

                    // Self collision
                    if (state.snake.some(seg => seg[0] === newHead[0] && seg[1] === newHead[1])) {
                        state.alive = false;
                        return;
                    }

                    state.snake.unshift(newHead);

                    // Food collision
                    if (newHead[0] === state.food[0] && newHead[1] === state.food[1]) {
                        state.score++;
                        spawnFood();
                    } else {
                        state.snake.pop();
                    }
                    draw();
                },
                setDir: function(dir) {
                    if (DIR_MAP[dir] && dir !== OPPOSITES[state.dir]) {
                        state.nextDir = dir;
                    }
                },
                setFood: function(x, y) {
                    state.food = [x, y];
                    draw();
                },
                snake: function() { return state.snake; },
                food: function() { return state.food; },
                alive: function() { return state.alive; },
                score: function() { return state.score; }
            };

            // Game Loop
            let gameInterval = null;
            function startLoop() {
                if (gameInterval) return;
                state.running = true;
                gameInterval = setInterval(() => {
                    window.game.tick();
                    if (!state.alive) {
                        clearInterval(gameInterval);
                        gameInterval = null;
                        state.running = false;
                    }
                }, 150);
            }

            function pauseLoop() {
                clearInterval(gameInterval);
                gameInterval = null;
                state.running = false;
            }

            // Input Handlers
            window.addEventListener('keydown', e => {
                switch(e.key) {
                    case 'ArrowUp': window.game.setDir('up'); break;
                    case 'ArrowDown': window.game.setDir('down'); break;
                    case 'ArrowLeft': window.game.setDir('left'); break;
                    case 'ArrowRight': window.game.setDir('right'); break;
                }
            });

            startBtn.addEventListener('click', () => {
                if (!state.alive) window.game.reset();
                startLoop();
            });
            pauseBtn.addEventListener('click', pauseLoop);
            resetBtn.addEventListener('click', () => {
                pauseLoop();
                window.game.reset();
            });

            // Initial state
            window.game.reset();
            draw();
        })();
    </script>
</body>
</html>
