<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bouncing Ball Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #1a1a2e; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh; 
  font-family: system-ui, -apple-system, sans-serif;
}
#sim-container {
  position: relative;
  background: #16213e;
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
canvas { 
  display: block; 
  background: #0f3460;
  border-radius: 4px;
  cursor: crosshair;
}
.controls {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  justify-content: center;
}
button {
  padding: 8px 16px;
  border: none;
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
button:hover { opacity: 0.85; }
#drop { background: #e94560; color: white; }
#play { background: #533483; color: white; }
#clear { background: #2a2a4a; color: #aaa; border: 1px solid #533483; }
</style>
</head>
<body>
<div id="sim-container">
  <canvas id="sim"></canvas>
  <div class="controls">
    <button id="drop">Drop Ball</button>
    <button id="play">Play/Pause</button>
    <button id="clear">Clear All</button>
  </div>
</div>

<script>
const canvas = document.getElementById('sim');
canvas.width = 500;
canvas.height = 500;
const ctx = canvas.getContext('2d');

let balls = [];
let isPlaying = true;
const GRAVITY = 0.5;
const RESTITUTION = 0.8;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const b of balls) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    const hue = ((b.x + b.y) % 360) + 180;
    ctx.fillStyle = `hsl(${hue}, 75%, 55%)`;
    ctx.fill();
  }
}

window.sim = {
  w: canvas.width,
  h: canvas.height,

  balls() { return [...balls]; },

  addBall(x, y, vx = 0, vy = 0, r) {
    const radius = r || Math.min(canvas.width, canvas.height) * 0.02;
    x = Math.max(radius, Math.min(canvas.width - radius, x));
    y = Math.max(radius, Math.min(canvas.height - radius, y));
    balls.push({ x, y, vx, vy, r: radius });
  },

  clear() {
    balls = [];
  },

  step(dt = 1) {
    for (const b of balls) {
      b.vy += GRAVITY * dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.y + b.r >= canvas.height) {
        b.y = canvas.height - b.r;
        b.vy *= -RESTITUTION;
      } else if (b.y - b.r <= 0) {
        b.y = b.r;
        b.vy *= -RESTITUTION;
      }

      if (b.x + b.r >= canvas.width) {
        b.x = canvas.width - b.r;
        b.vx *= -RESTITUTION;
      } else if (b.x - b.r <= 0) {
        b.x = b.r;
        b.vx *= -RESTITUTION;
      }
    }

    draw();
  },

  _animate() {
    requestAnimationFrame(() => {
      if (isPlaying) window.sim.step();
      else draw();
      window.sim._animate();
    });
  }
};

document.getElementById('drop').addEventListener('click', () => {
  window.sim.addBall(canvas.width / 2, canvas.height - 30);
});

document.getElementById('play').addEventListener('click', () => {
  isPlaying = !isPlaying;
  if (isPlaying) window.sim._animate();
  else draw();
});

document.getElementById('clear').addEventListener('click', () => {
  window.sim.clear();
  draw();
});

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  window.sim.addBall(x, y);
  draw();
});

draw();
</script>
</body>
</html>
