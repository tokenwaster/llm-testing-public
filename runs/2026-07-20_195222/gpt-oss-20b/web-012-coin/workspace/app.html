<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WastedToken Mint – Coin Showcase</title>
<style>
  body{margin:0;font-family:sans-serif;background:#111;color:#eee}
  header{padding:2rem;text-align:center}
  h1{font-size:3rem;margin:0}
  .about{max-width:800px;margin:auto;padding:1rem}
  .grid{display:grid;gap:1.5rem;padding:2rem;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .edition{position:relative;background:#222;border-radius:.5rem;padding-top:120%;overflow:hidden;text-align:center}
  .edition canvas{position:absolute;top:0;left:0;width:100%;height:100%}
  button.buy{margin-top:.5rem;background:#28a745;color:white;border:none;padding:.5rem 1rem;font-size:1rem;border-radius:.3rem;cursor:pointer}
  button.buy[disabled]{background:#555;cursor:not-allowed}
</style>
</head>
<body>

<header id="coin-hero-container">
  <canvas id="coin-hero" width="400" height="400"></canvas>
</header>

<section class="about">
  <h2>About WastedToken Mint</h2>
  <p>
    At WastedToken Mint we craft limited‑edition challenge coins that celebrate
    the spirit of play, community and digital ownership. Each coin is a tangible
    token of achievement, minted with precision and an eye for detail.
  </p>
</section>

<section class="grid">
  <!-- Bronze -->
  <div class="edition" data-edition="bronze" data-state="available">
    <canvas class="edition-canvas"></canvas>
    <button class="buy">Add to cart</button>
  </div>
  <!-- Silver -->
  <div class="edition" data-edition="silver" data-state="available">
    <canvas class="edition-canvas"></canvas>
    <button class="buy">Add to cart</button>
  </div>
  <!-- Gold – sold out -->
  <div class="edition" data-edition="gold" data-state="sold-out">
    <canvas class="edition-canvas"></canvas>
    <span>SOLD OUT</span>
  </div>
  <!-- Black – coming soon -->
  <div class="edition" data-edition="black" data-state="coming-soon">
    <canvas class="edition-canvas"></canvas>
    <span>SPRING SEASON</span>
  </div>
</section>

<script>
// ---------- Utility functions ----------
function lerp(a,b,t){return a+(b-a)*t}
function degToRad(d){return d*Math.PI/180}

// ---------- Coin rendering logic ----------
const coinCanvas = document.getElementById('coin-hero')
const ctx = coinCanvas.getContext('2d')
const centerX = coinCanvas.width/2
const centerY = coinCanvas.height/2
const radius = 120

function drawCoin(t){
  const angle = t*2*Math.PI // full rotation
  const cosA = Math.cos(angle)
  const faceFront = cosA >= 0
  const highlightPos = (t%1)*coinCanvas.width

  ctx.clearRect(0,0,coinCanvas.width,coinCanvas.height)

  // Draw rim with ridges
  ctx.save()
  ctx.translate(centerX,centerY)
  ctx.rotate(angle)
  ctx.scale(Math.abs(cosA),1) // simulate flip by scaling X
  ctx.beginPath()
  ctx.arc(0,0,radius,0,2*Math.PI)
  const rimGrad = ctx.createRadialGradient(-radius/4,0,radius/8,radius/4,0,radius*1.5)
  rimGrad.addColorStop(0,'#444')
  rimGrad.addColorStop(1,'#222')
  ctx.fillStyle = rimGrad
  ctx.fill()
  // Ridges
  for(let i=0;i<30;i++){
    const r = radius - (i*radius/30)
    ctx.beginPath()
    ctx.arc(0,0,r,0,2*Math.PI)
    ctx.strokeStyle = '#111'
    ctx.lineWidth = 1
    ctx.stroke()
  }
  ctx.restore()

  // Draw face
  ctx.save()
  ctx.translate(centerX,centerY)
  ctx.rotate(angle)
  ctx.scale(Math.abs(cosA),1)
  const faceGrad = ctx.createRadialGradient(0,0,radius*0.8,radius*0.9,0,radius)
  if(faceFront){
    // Front face – emblem
    faceGrad.addColorStop(0,'#ffd700')
    faceGrad.addColorStop(1,'#b8860b')
  }else{
    // Back face – denomination
    faceGrad.addColorStop(0,'#c0c0c0')
    faceGrad.addColorStop(1,'#808080')
  }
  ctx.fillStyle = faceGrad
  ctx.beginPath()
  ctx.arc(0,0,radius*0.9,0,2*Math.PI)
  ctx.fill()

  // Text on back face
  if(!faceFront){
    ctx.font='bold 24px sans-serif'
    ctx.textAlign='center'
    ctx.textBaseline='middle'
    ctx.fillStyle='#000'
    ctx.fillText('10,000 TOKENS',0,0)
  }

  // Emblem on front face (simple stylized shape)
  if(faceFront){
    ctx.beginPath()
    ctx.moveTo(-30,-20)
    ctx.lineTo(30,-20)
    ctx.lineTo(30,20)
    ctx.lineTo(-30,20)
    ctx.closePath()
    ctx.fillStyle='#000'
    ctx.fill()

    // Raised effect
    ctx.strokeStyle='#555'
    ctx.lineWidth=4
    ctx.stroke()
  }

  // Specular highlight moving across surface
  const hGrad = ctx.createLinearGradient(highlightPos-200,0,highlightPos+200,0)
  hGrad.addColorStop(0,'rgba(255,255,255,0)')
  hGrad.addColorStop(0.5,'rgba(255,255,255,0.6)')
  hGrad.addColorStop(1,'rgba(255,255,255,0)')
  ctx.fillStyle = hGrad
  ctx.beginPath()
  ctx.arc(0,0,radius*0.9,0,2*Math.PI)
  ctx.fill()

  ctx.restore()
}

// ---------- Animation control ----------
let animationId=null
function animate(){
  const start=performance.now()
  function step(now){
    const t=((now-start)/5000)%1 // 5 second loop
    drawCoin(t)
    animationId=requestAnimationFrame(step)
  }
  animationId=requestAnimationFrame(step)
}
animate()

// Expose API for grading
window.demo={
  canvas:coinCanvas,
  setTime:function(t){
    if(animationId){cancelAnimationFrame(animationId);animationId=null}
    drawCoin(lerp(0,1,t))
  },
  pause:function(){
    if(animationId){cancelAnimationFrame(animationId);animationId=null}
  }
}

// ---------- Edition tiles rendering ----------
const editions=document.querySelectorAll('.edition')
editions.forEach(ed=>{
  const canvas=ed.querySelector('canvas')
  const ctx=canvas.getContext('2d')
  const w=canvas.width
  const h=canvas.height
  const r=Math.min(w,h)/2*0.9

  // Simple color based on edition
  let col='#888'
  switch(ed.dataset.edition){
    case 'bronze':col='#cd7f32';break
    case 'silver':col='#c0c0c0';break
    case 'gold':col='#ffd700';break
    case 'black':col='#000';break
  }

  ctx.fillStyle=col
  ctx.beginPath()
  ctx.arc(w/2,h/2,r,0,2*Math.PI)
  ctx.fill()

  // Text overlay
  ctx.font='bold 18px sans-serif'
  ctx.textAlign='center'
  ctx.textBaseline='middle'
  ctx.fillStyle='#fff'
  ctx.fillText(ed.dataset.edition.toUpperCase(),w/2,h/2)

  // Disable button if not available
  const btn=ed.querySelector('button')
  if(btn && ed.dataset.state!=='available'){
    btn.disabled=true
    btn.style.display='none'
  }
})
</script>
</body>
</html>
