<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubuntu Desktop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    font-family: 'Ubuntu', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }

  #desktop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, #2c001e 0%, #4a0033 25%, #1a1a2e 60%, #16213e 100%);
    z-index: 0;
  }

  /* Top Bar */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(15, 15, 15, 0.95);
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 13px;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  #topbar .left { display: flex; align-items: center; gap: 16px; }
  #topbar .ubuntu-logo { font-weight: bold; color: #e95420; letter-spacing: 1px; }
  #topbar .right { display: flex; align-items: center; gap: 14px; opacity: 0.85; }

  /* Taskbar / Dock */
  #taskbar {
    position: fixed;
    left: 0; top: 28px; bottom: 0;
    width: 56px;
    background: rgba(15, 15, 15, 0.88);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
    gap: 6px;
    z-index: 999;
    border-right: 1px solid rgba(255,255,255,0.07);
  }

  #taskbar .dock-separator {
    width: 32px; height: 1px;
    background: rgba(255,255,255,0.12);
    margin: 4px 0;
  }

  .dock-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    position: relative;
  }

  .dock-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.08); }
  .dock-btn:active { transform: scale(0.95); }

  .dock-btn svg { width: 26px; height: 26px; }

  #open-files { background: rgba(74, 127, 217, 0.35); }
  #open-notepad { background: rgba(98, 175, 98, 0.35); }

  .dock-btn .indicator {
    position: absolute;
    left: -4px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 0;
    background: #e95420;
    border-radius: 0 2px 2px 0;
    transition: height 0.15s ease;
  }

  .dock-btn.active .indicator { height: 18px; }

  /* Windows */
  .app-window {
    position: absolute;
    background: #2d2d2d;
    border-radius: 10px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 380px;
    min-height: 280px;
    z-index: 100;
  }

  .app-window.hidden { display: none !important; }

  .win-titlebar {
    height: 36px;
    background: #3a3a3a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    cursor: default;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .win-titlebar .title {
    color: #d0d0d0;
    font-size: 13px;
    font-weight: 500;
    pointer-events: none;
  }

  .win-controls { display: flex; gap: 7px; align-items: center; }

  .win-close {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: none;
    background: #e95420;
    color: white;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }

  .win-close:hover { background: #c7431b; }

  .win-body {
    flex: 1;
    overflow-y: auto;
    color: #d4d4d4;
    font-size: 13px;
  }

  /* Scrollbar */
  .win-body::-webkit-scrollbar { width: 8px; }
  .win-body::-webkit-scrollbar-track { background: transparent; }
  .win-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  /* Files App */
  #files-window { width: 680px; height: 460px; }

  .files-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #353535;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #files-up {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: none;
    background: rgba(255,255,255,0.07);
    color: #d0d0d0;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }

  #files-up:hover { background: rgba(255,255,255,0.14); }

  #files-path {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 5px 10px;
    color: #e95420;
    font-size: 13px;
    font-family: 'Ubuntu Mono', 'Consolas', monospace;
    outline: none;
  }

  #files-path:focus { border-color: rgba(233,84,32,0.5); }

  .files-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    padding: 14px;
  }

  .fs-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 6px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    text-align: center;
    gap: 6px;
    min-height: 90px;
  }

  .fs-item:hover { background: rgba(255,255,255,0.07); }
  .fs-item:active { background: rgba(255,255,255,0.12); }

  .fs-item .icon { font-size: 36px; line-height: 1; }
  .fs-item .name { font-size: 11px; color: #c8c8c8; word-break: break-word; line-height: 1.3; }

  /* Notepad App */
  #notepad-window { width: 620px; height: 440px; }

  .notepad-tabs-bar {
    display: flex;
    align-items: center;
    background: #353535;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 0 8px;
    min-height: 34px;
    gap: 2px;
  }

  #new-tab {
    width: 28px; height: 28px;
    border-radius: 5px;
    border: none;
    background: rgba(255,255,255,0.07);
    color: #d0d0d0;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
    flex-shrink: 0;
  }

  #new-tab:hover { background: rgba(255,255,255,0.14); }

  #tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    overflow-x: auto;
    flex: 1;
  }

  .tab {
    padding: 5px 14px;
    border-radius: 6px 6px 0 0;
    background: rgba(255,255,255,0.04);
    color: #a0a0a0;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid transparent;
    border-bottom: none;
    max-width: 160px;
  }

  .tab:hover { background: rgba(255,255,255,0.08); color: #d0d0d0; }

  .tab.active {
    background: #2d2d2d;
    color: #e95420;
    border-color: rgba(255,255,255,0.06);
    font-weight: 500;
  }

  .tab .close-tab {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #888;
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: all 0.1s;
  }

  .tab .close-tab:hover { background: rgba(233,84,32,0.6); color: white; }

  #editor {
    width: 100%;
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: #2d2d2d;
    color: #e8e8e8;
    font-family: 'Ubuntu Mono', 'Consolas', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px;
    tab-size: 4;
  }

  #editor::placeholder { color: #555; }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0; right: 0;
    width: 16px; height: 16px;
    cursor: nwse-resize;
  }

  .resize-handle::after {
    content: '';
    position: absolute;
    bottom: 3px; right: 3px;
    width: 8px; height: 8px;
    border-right: 2px solid rgba(255,255,255,0.15);
    border-bottom: 2px solid rgba(255,255,255,0.15);
  }

  /* Window focus ring */
  .app-window.focused { box-shadow: 0 14px 56px rgba(0,0,0,0.6), 0 0 0 1px rgba(233,84,32,0.2); }

  /* Wallpaper pattern overlay */
  #desktop::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(233,84,32,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(74,127,217,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Context hint */
  .desktop-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.12);
    font-size: 18px;
    text-align: center;
    pointer-events: none;
    line-height: 1.6;
  }

  .desktop-hint span { display: block; font-size: 48px; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="desktop">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="left">
      <span class="ubuntu-logo">Ubuntu</span>
      <span style="opacity:0.6; font-size:12px;">Files</span>
      <span style="opacity:0.6; font-size:12px;">Text Editor</span>
    </div>
    <div class="right">
      <span id="clock"></span>
    </div>
  </div>

  <!-- Taskbar / Dock -->
  <div id="taskbar">
    <button id="open-files" class="dock-btn" title="Files">
      <div class="indicator"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="#7aa2f7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
    </button>

    <div class="dock-separator"></div>

    <button id="open-notepad" class="dock-btn" title="Text Editor">
      <div class="indicator"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="#7ec87e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </button>

    <div style="flex:1;"></div>

    <!-- Trash placeholder -->
    <button class="dock-btn" title="Trash" style="opacity:0.4; cursor:default;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    </button>
  </div>

  <!-- Files Window -->
  <div id="files-window" class="app-window hidden focused" style="left:120px; top:80px;">
    <div class="win-titlebar">
      <span class="title">Files</span>
      <div class="win-controls">
        <button class="win-close" title="Close">✕</button>
      </div>
    </div>
    <div class="files-toolbar">
      <button id="files-up" title="Go up one level">↑</button>
      <input id="files-path" type="text" readonly />
    </div>
    <div class="win-body">
      <div class="files-grid" id="files-grid"></div>
    </div>
    <div class="resize-handle"></div>
  </div>

  <!-- Notepad Window -->
  <div id="notepad-window" class="app-window hidden focused" style="left:200px; top:100px;">
    <div class="win-titlebar">
      <span class="title">Text Editor</span>
      <div class="win-controls">
        <button class="win-close" title="Close">✕</button>
      </div>
    </div>
    <div class="notepad-tabs-bar">
      <button id="new-tab" title="New tab">+</button>
      <div id="tabs"></div>
    </div>
    <textarea id="editor" placeholder="Start typing..."></textarea>
    <div class="resize-handle"></div>
  </div>

  <!-- Desktop hint -->
  <div class="desktop-hint">
    <span>🐘</span>
    Click the dock icons to open apps
  </div>
</div>

<script>
(function() {
  'use strict';

  // ==================== CLOCK ====================
  function updateClock() {
    const now = new Date();
    const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById('clock').textContent = now.toLocaleDateString('en-US', opts);
  }
  updateClock();
  setInterval(updateClock, 30000);

  // ==================== FILE SYSTEM DATA ====================
  const fileSystem = {
    '/': {
      bin: 'folder', etc: 'folder', home: 'folder', usr: 'folder', var: 'folder',
      tmp: 'folder', lib: 'folder', sbin: 'folder', dev: 'folder', proc: 'folder'
    },
    '/bin': {
      'bash': 'file', 'ls': 'file', 'cat': 'file', 'cp': 'file', 'mv': 'file',
      'rm': 'file', 'grep': 'file', 'find': 'file', 'chmod': 'file', 'chown': 'file'
    },
    '/etc': {
      'passwd': 'file', 'hostname': 'file', 'fstab': 'file', 'hosts': 'file',
      'resolv.conf': 'file', 'ssh': 'folder', 'apt': 'folder', 'xdg': 'folder'
    },
    '/etc/ssh': {
      'sshd_config': 'file', 'ssh_host_rsa_key': 'file', 'ssh_host_ed25519_key': 'file'
    },
    '/etc/apt': {
      'sources.list': 'file', 'apt.conf': 'file', 'preferences': 'file'
    },
    '/etc/xdg': {
      'autostart': 'folder'
    },
    '/home': {
      'user': 'folder', 'guest': 'folder'
    },
    '/home/user': {
      'Documents': 'folder', 'Downloads': 'folder', 'Pictures': 'folder',
      'Music': 'folder', 'Videos': 'folder', '.bashrc': 'file', '.profile': 'file',
      '.ssh': 'folder'
    },
    '/home/user/Documents': {
      'readme.txt': 'file', 'notes.md': 'file', 'todo.txt': 'file',
      'projects': 'folder'
    },
    '/home/user/Documents/projects': {
      'Makefile': 'file', 'src': 'folder', 'README': 'file'
    },
    '/home/user/Documents/projects/src': {
      'main.c': 'file', 'utils.h': 'file', 'utils.c': 'file'
    },
    '/home/user/Downloads': {
      'ubuntu-22.04.iso': 'file', 'archive.tar.gz': 'file', 'photo.jpg': 'file'
    },
    '/home/user/Pictures': {
      'wallpaper.png': 'file', 'screenshot.png': 'file', 'avatar.jpg': 'file'
    },
    '/home/user/Music': {
      'playlist.m3u': 'file', 'song.mp3': 'file'
    },
    '/home/user/Videos': {
      'tutorial.mp4': 'file'
    },
    '/home/user/.ssh': {
      'id_rsa': 'file', 'id_rsa.pub': 'file', 'known_hosts': 'file'
    },
    '/home/guest': {
      'Desktop': 'folder'
    },
    '/home/guest/Desktop': {},
    '/usr': {
      'bin': 'folder', 'lib': 'folder', 'share': 'folder', 'local': 'folder'
    },
    '/usr/bin': {
      'python3': 'file', 'node': 'file', 'gcc': 'file', 'make': 'file', 'git': 'file'
    },
    '/usr/lib': {},
    '/usr/share': {
      'applications': 'folder', 'doc': 'folder'
    },
    '/usr/local': {
      'bin': 'folder', 'lib': 'folder'
    },
    '/var': {
      'log': 'folder', 'cache': 'folder', 'tmp': 'folder', 'www': 'folder'
    },
    '/var/log': {
      'syslog': 'file', 'auth.log': 'file', 'kern.log': 'file'
    },
    '/var/cache': {},
    '/var/tmp': {},
    '/var/www': {
      'index.html': 'file', 'css': 'folder', 'js': 'folder'
    },
    '/tmp': {
      '.X11-unix': 'folder', 'pulse': 'folder'
    },
    '/lib': {
      'x86_64-linux-gnu': 'folder'
    },
    '/sbin': {
      'init': 'file', 'fdisk': 'file'
    },
    '/dev': {
      'sda': 'file', 'sdb': 'file', 'null': 'file', 'zero': 'file'
    },
    '/proc': {
      'cpuinfo': 'file', 'meminfo': 'file', 'version': 'file'
    }
  };

  // ==================== FILES APP ====================
  const filesWindow = document.getElementById('files-window');
  const filesGrid = document.getElementById('files-grid');
  const filesPathInput = document.getElementById('files-path');
  const filesUpBtn = document.getElementById('files-up');
  let currentPath = '/';

  function getIcon(name, type) {
    if (type === 'folder') return '📁';
    const ext = name.split('.').pop().toLowerCase();
    const iconMap = {
      txt: '📄', md: '📝', pdf: '📕', jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🖼️',
      mp3: '🎵', wav: '🎵', m4a: '🎵', flac: '🎵',
      mp4: '🎬', avi: '🎬', mkv: '🎬', mov: '🎬',
      iso: '💿', tar: '📦', gz: '📦', zip: '📦', '7z': '📦',
      sh: '⚙️', c: '🔧', h: '🔧', py: '🐍', js: '🟨', html: '🌐', css: '🎨',
      conf: '⚙️', list: '📋', log: '📊', m3u: '🎶'
    };
    return iconMap[ext] || '📄';
  }

  function renderFiles() {
    filesGrid.innerHTML = '';
    const entries = fileSystem[currentPath];
    if (!entries) {
      filesPathInput.value = currentPath;
      return;
    }

    // Sort: folders first, then files alphabetically
    const sorted = Object.entries(entries).sort((a, b) => {
      if (a[1] === 'folder' && b[1] !== 'folder') return -1;
      if (a[1] !== 'folder' && b[1] === 'folder') return 1;
      return a[0].localeCompare(b[0]);
    });

    for (const [name, type] of sorted) {
      const item = document.createElement('div');
      item.className = 'fs-item';
      item.innerHTML = `<span class="icon">${getIcon(name, type)}</span><span class="name">${name}</span>`;

      if (type === 'folder') {
        let clickCount = 0;
        let timer = null;
        item.addEventListener('click', function() {
          clickCount++;
          if (clickCount === 1) {
            timer = setTimeout(function() {
              // Single click: select (visual feedback only)
              item.style.background = 'rgba(233,84,32,0.15)';
              setTimeout(() => { item.style.background = ''; }, 200);
              clickCount = 0;
            }, 250);
          } else if (clickCount === 2) {
            clearTimeout(timer);
            // Double-click: navigate into folder
            const newPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
            if (fileSystem[newPath] !== undefined) {
              currentPath = newPath;
              filesPathInput.value = currentPath;
              renderFiles();
            }
            clickCount = 0;
          }
        });

        item.addEventListener('dblclick', function(e) {
          e.preventDefault();
          clearTimeout(timer);
          const newPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
          if (fileSystem[newPath] !== undefined) {
            currentPath = newPath;
            filesPathInput.value = currentPath;
            renderFiles();
          }
          clickCount = 0;
        });
      }

      filesGrid.appendChild(item);
    }

    filesPathInput.value = currentPath;
  }

  filesUpBtn.addEventListener('click', function() {
    if (currentPath === '/') return;
    const parts = currentPath.split('/').filter(Boolean);
    parts.pop();
    currentPath = '/' + parts.join('/') || '/';
    renderFiles();
  });

  // ==================== NOTEPAD APP ====================
  const notepadWindow = document.getElementById('notepad-window');
  const tabsContainer = document.getElementById('tabs');
  const newTabBtn = document.getElementById('new-tab');
  const editor = document.getElementById('editor');

  let tabs = [];
  let activeTabIndex = -1;

  function loadTabs() {
    try {
      const saved = localStorage.getItem('notepad-tabs');
      if (saved) {
        tabs = JSON.parse(saved);
      }
    } catch(e) {}
    if (!tabs.length) {
      tabs.push({ name: 'Untitled', content: '' });
    }
    activeTabIndex = 0;
    renderTabs();
    editor.value = tabs[activeTabIndex].content || '';
  }

  function saveTabs() {
    try {
      localStorage.setItem('notepad-tabs', JSON.stringify(tabs));
    } catch(e) {}
  }

  function renderTabs() {
    tabsContainer.innerHTML = '';
    tabs.forEach(function(tab, i) {
      const el = document.createElement('div');
      el.className = 'tab' + (i === activeTabIndex ? ' active' : '');
      el.innerHTML = `<span class="tab-name">${escapeHtml(tab.name)}</span><button class="close-tab" data-index="${i}">✕</button>`;

      el.addEventListener('click', function(e) {
        if (e.target.classList.contains('close-tab')) return;
        activeTabIndex = i;
        renderTabs();
        editor.value = tabs[i].content || '';
      });

      const closeBtn = el.querySelector('.close-tab');
      closeBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (tabs.length <= 1) return; // Don't close last tab
        const wasActive = i === activeTabIndex;
        tabs.splice(i, 1);
        if (wasActive) {
          activeTabIndex = Math.min(activeTabIndex, tabs.length - 1);
        } else if (i < activeTabIndex) {
          activeTabIndex--;
        }
        renderTabs();
        editor.value = tabs[activeTabIndex].content || '';
        saveTabs();
      });

      tabsContainer.appendChild(el);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  newTabBtn.addEventListener('click', function() {
    const num = tabs.length + 1;
    tabs.push({ name: 'Untitled-' + num, content: '' });
    activeTabIndex = tabs.length - 1;
    renderTabs();
    editor.value = '';
    saveTabs();
  });

  // Save on input (debounced)
  let saveTimeout = null;
  editor.addEventListener('input', function() {
    if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
      tabs[activeTabIndex].content = editor.value;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveTabs, 400);
    }
  });

  // ==================== WINDOW MANAGEMENT ====================
  const filesOpenBtn = document.getElementById('open-files');
  const notepadOpenBtn = document.getElementById('open-notepad');

  function showWindow(win) {
    win.classList.remove('hidden');
    focusWindow(win);
  }

  function hideWindow(win) {
    win.classList.add('hidden');
  }

  function focusWindow(win) {
    // Unfocus all
    document.querySelectorAll('.app-window').forEach(w => w.classList.remove('focused'));
    win.classList.add('focused');
    updateDockIndicators();
  }

  function updateDockIndicators() {
    const filesOpen = filesWindow.classList.contains('hidden') ? '' : 'active';
    const notepadOpen = notepadWindow.classList.contains('hidden') ? '' : 'active';
    filesOpenBtn.className = 'dock-btn ' + filesOpen;
    notepadOpenBtn.className = 'dock-btn ' + notepadOpen;
  }

  // Open buttons
  filesOpenBtn.addEventListener('click', function() {
    showWindow(filesWindow);
    renderFiles();
  });

  notepadOpenBtn.addEventListener('click', function() {
    showWindow(notepadWindow);
    if (tabs.length === 0) loadTabs();
    else {
      renderTabs();
      editor.value = tabs[activeTabIndex].content || '';
    }
  });

  // Close buttons
  document.querySelectorAll('.win-close').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const win = this.closest('.app-window');
      hideWindow(win);
      updateDockIndicators();
    });
  });

  // Click window to focus
  document.querySelectorAll('.app-window').forEach(function(win) {
    win.addEventListener('mousedown', function() {
      focusWindow(this);
    });
  });

  // ==================== DRAGGABLE WINDOWS ====================
  function makeDraggable(win, titlebar) {
    let isDragging = false;
    let startX, startY, origX, origY;

    titlebar.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('win-close')) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = win.getBoundingClientRect();
      origX = rect.left;
      origY = rect.top;
      win.style.transition = 'none';
      focusWindow(win);
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      win.style.left = (origX + dx) + 'px';
      win.style.top = (origY + dy) + 'px';
    });

    document.addEventListener('mouseup', function() {
      if (isDragging) {
        isDragging = false;
        win.style.transition = '';
      }
    });
  }

  makeDraggable(filesWindow, filesWindow.querySelector('.win-titlebar'));
  makeDraggable(notepadWindow, notepadWindow.querySelector('.win-titlebar'));

  // ==================== RESIZABLE WINDOWS ====================
  function makeResizable(win) {
    const handle = win.querySelector('.resize-handle');
    if (!handle) return;
    let isResizing = false;
    let startX, startY, startW, startH;

    handle.addEventListener('mousedown', function(e) {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = win.getBoundingClientRect();
      startW = rect.width;
      startH = rect.height;
      win.style.transition = 'none';
      focusWindow(win);
      e.preventDefault();
      e.stopPropagation();

      function onMove(e) {
        if (!isResizing) return;
        const w = Math.max(380, startW + (e.clientX - startX));
        const h = Math.max(280, startH + (e.clientY - startY));
        win.style.width = w + 'px';
        win.style.height = h + 'px';
      }

      function onUp() {
        isResizing = false;
        win.style.transition = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  makeResizable(filesWindow);
  makeResizable(notepadWindow);

  // ==================== INIT ====================
  renderFiles();
  loadTabs();
  updateDockIndicators();

})();
</script>
</body>
</html>
