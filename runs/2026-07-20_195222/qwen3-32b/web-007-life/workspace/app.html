<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conway's Game of Life</title>
  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    #controls {
      margin-bottom: 20px;
    }
    button {
      background-color: #333;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #555;
    }
    canvas {
      border: 2px solid #444;
      background-color: #2e2e2e;
    }
  </style>
</head>
<body>
  <div id="controls">
    <button id="step">Step</button>
    <button id="play">Play</button>
    <button id="random">Random</button>
    <button id="clear">Clear</button>
  </div>
  <canvas id="life" width="400" height="400"></canvas>
  <script>
    const w = 40;
    const h = 40;
    let grid;

    function initGrid() {
      grid = new Array(w * h).fill(0);
    }

    initGrid();

    const canvas = document.getElementById('life');
    const ctx = canvas.getContext('2d');
    const size = 10; // 400 / 40

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const cell = grid[y * w + x];
          if (cell === 1) {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(x * size, y * size, size, size);
          }
        }
      }
    }

    let isMouseDown = false;

    function toggleCell(x, y) {
      const current = grid[y * w + x];
      window.life.set(x, y, !current);
    }

    canvas.addEventListener('mousedown', (e) => {
      isMouseDown = true;
      handleMouse(e);
    });

    canvas.addEventListener('mouseup', () => {
      isMouseDown = false;
    });

    canvas.addEventListener('mouseout', () => {
      isMouseDown = false;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (isMouseDown) {
        handleMouse(e);
      }
    });

    function handleMouse(e) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const x = Math.floor(mx / size);
      const y = Math.floor(my / size);
      if (x >= 0 && x < w && y >= 0 && y < h) {
        toggleCell(x, y);
      }
    }

    document.getElementById('step').addEventListener('click', () => window.life.step());
    document.getElementById('play').addEventListener('click', () => {
      const playBtn = document.getElementById('play');
      if (window.playing) {
        clearInterval(window.intervalId);
        playBtn.textContent = 'Play';
        window.playing = false;
      } else {
        window.intervalId = setInterval(() => {
          window.life.step();
        }, 100);
        playBtn.textContent = 'Pause';
        window.playing = true;
      }
    });
    document.getElementById('random').addEventListener('click', () => {
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          if (Math.random() > 0.5) {
            window.life.set(x, y, true);
          }
        }
      }
    });
    document.getElementById('clear').addEventListener('click', () => window.life.clear());

    window.life = {
      w,
      h,
      get(x, y) {
        if (x < 0 || x >= w || y < 0 || y >= h) return 0;
        return grid[y * w + x];
      },
      set(x, y, v) {
        if (x < 0 || x >= w || y < 0 || y >= h) return;
        const value = v ? 1 : 0;
        grid[y * w + x] = value;
        draw();
      },
      step() {
        const newGrid = new Array(w * h).fill(0);
        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            let liveNeighbors = 0;
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                if (dx === 0 && dy === 0) continue;
                liveNeighbors += this.get(x + dx, y + dy);
              }
            }

            const current = this.get(x, y);
            let nextValue = 0;

            if (current === 1) {
              if (liveNeighbors === 2 || liveNeighbors === 3) {
                nextValue = 1;
              }
            } else {
              if (liveNeighbors === 3) {
                nextValue = 1;
              }
            }

            newGrid[y * w + x] = nextValue;
          }
        }
        grid = newGrid;
        draw();
      },
      clear() {
        initGrid();
        draw();
      }
    };

    draw();
  </script>
</body>
</html>
